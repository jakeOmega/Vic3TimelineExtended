 CB_ASSET_RELIEF_DESC:"The State shall purchase 'toxic' or non-performing assets from private ledgers to cleanse the financial system. This provides a clean slate for growth without the crushing weight of a credit hike."
 CB_CAPITAL_CONTROLS_OUT:"Capital Controls (Outflows)"
 CB_CAPITAL_CONTROLS_OUT_DESC:"To prevent 'Capital Flight' during times of crisis or war, we forbid the movement of investment funds across our borders. This ensures the national wealth stays at home, even if it harms our international standing."
 CB_COUNTERCYCLICAL_BUFFER_DESC:"Forcing financial institutions to retain a higher percentage of their earnings during boom years builds a 'war chest' for the lean years, though it slows the immediate rate of reinvestment from our wealthiest citizens."
 CB_DIRECTED_CREDIT_INFRA:"Directed Credit to Infrastructure"
 CB_DIRECTED_CREDIT_INFRA_DESC:"By mandating that credit flow toward national infrastructure and manufacturing, we can force industrialization even when the private market is hesitant. The Industrialists may chafe at the loss of control, but the State's goals must come first."
 CB_DISABLE_ASSET_RELIEF:"End Asset Relief Program"
 CB_DISABLE_ASSET_RELIEF_DESC:"Terminate the asset relief program and remove its ongoing support from the financial system."
 CB_DISABLE_CAPITAL_CONTROLS_OUT:"End Capital Controls (Outflows)"
 CB_DISABLE_CAPITAL_CONTROLS_OUT_DESC:"Lift the emergency restrictions on capital outflows and allow investment funds to move abroad again."
 CB_DISABLE_COUNTERCYCLICAL_BUFFER:"End Counter-cyclical Buffer"
 CB_DISABLE_COUNTERCYCLICAL_BUFFER_DESC:"Suspend the counter-cyclical capital buffer and stop forcing financial institutions to retain extra reserves."
 CB_DISABLE_DIRECTED_CREDIT_INFRA:"End Directed Credit to Infrastructure"
 CB_DISABLE_DIRECTED_CREDIT_INFRA_DESC:"Stop directing credit into infrastructure and manufacturing and return lending decisions to the market."
 CB_DISABLE_EMERGENCY_LIQUIDITY:"End Emergency Liquidity Program"
 CB_DISABLE_EMERGENCY_LIQUIDITY_DESC:"Close the emergency liquidity facilities and withdraw the standing lender-of-last-resort support."
 CB_DISABLE_EXPAND_DEPOSIT_GUARANTEE:"End Deposit Guarantee Expansion"
 CB_DISABLE_EXPAND_DEPOSIT_GUARANTEE_DESC:"Scale back the expanded deposit guarantee and remove its continuing stabilizing effect."
 CB_DISABLE_EXPORT_CREDIT:"End Export Credit Facility"
 CB_DISABLE_EXPORT_CREDIT_DESC:"Shut down the export credit facility, ending the subsidized lending program and its ongoing fiscal burden."
 CB_DISABLE_FX_DEVALUATION:"End FX Devaluation"
 CB_DISABLE_FX_DEVALUATION_DESC:"Cease the devaluation policy and stop suppressing the currency's value."
 CB_DISABLE_FX_SUPPORT:"End FX Support"
 CB_DISABLE_FX_SUPPORT_DESC:"Withdraw foreign-exchange support operations and stop propping up the currency, ending the ongoing drain on our reserves."
 CB_DISABLE_FX_SWAP_LINES:"End FX Swap Lines"
 CB_DISABLE_FX_SWAP_LINES_DESC:"Terminate the reciprocal swap-line arrangements and remove their stabilizing support."
 CB_DISABLE_MORAL_SUASION:"End Moral Suasion"
 CB_DISABLE_MORAL_SUASION_DESC:"Cease the Bank's informal pressure campaign and remove its cautionary guidance from the market."
 CB_DISABLE_OPEN_MARKET_OPS:"End Open-Market Operations"
 CB_DISABLE_OPEN_MARKET_OPS_DESC:"Stop the special open-market purchases and remove their continuing liquidity support."
 CB_DISABLE_POLICY_RATE_HIKE:"Lower Policy Rate"
 CB_DISABLE_POLICY_RATE_HIKE_DESC:"Reverse the policy-rate hike and remove its ongoing tightening effect on credit."
 CB_DISABLE_RAISE_MARGIN_REQ:"Lower Margin Requirements"
 CB_DISABLE_RAISE_MARGIN_REQ_DESC:"Relax elevated margin requirements and remove the extra collateral burden from borrowers."
 CB_EMERGENCY_LIQUIDITY_DESC:"As the 'Lender of Last Resort,' we must open the vaults to provide credit to banks facing a run. It is an expensive and risky move that can reignite speculation, but it is often the fastest way to arrest a systemic panic and restore confidence."
 CB_EXPAND_DEPOSIT_GUARANTEE:"Expand Deposit Guarantee"
 CB_EXPAND_DEPOSIT_GUARANTEE_DESC:"To prevent a total collapse of public trust during a panic, the State will guarantee the savings of the common citizen. This ensures loyalty and social stability, even as the markets tremble."
 CB_EXPORT_CREDIT_DESC:"Establishing a facility to provide subsidized, low-interest credit to firms engaged in the export of manufactured goods allows our industry to undercut foreign competitors and dominate global markets. The ongoing cost of maintaining these favorable terms is a continuous drain on the public purse."
 CB_FX_DEVALUATION_DESC:"Artificially lowering the value of our currency makes our exports cheaper abroad and foreign imports more expensive, providing a massive boon to our domestic factory owners at the expense of the consumer."
 CB_FX_SUPPORT_DESC:"Deploying our gold and foreign-exchange reserves to prop up the currency ensures that vital imports remain affordable for our people, preventing the radicalization that follows sharp spikes in the cost of living. However, defending the currency is a costly endeavor that steadily depletes the national reserves."
 CB_FX_SWAP_LINES:"FX Swap Lines"
 CB_FX_SWAP_LINES_DESC:"By establishing reciprocal credit lines with other Great Powers, we lean on their financial prestige to stabilize our own markets, though such dependency may alarm our peers."
 CB_MORAL_SUASION_DESC:"Sometimes a stern word from the Governor of the Bank is enough. Through informal 'arm-twisting' and guidance, we can encourage lenders to be more cautious without the need for heavy-handed legislation."
 CB_OPEN_MARKET_OPS:"Open-Market Operations"
 CB_OPEN_MARKET_OPS_DESC:"The proactive purchase of government securities and commercial paper injects immediate cash into the banking system, stimulating service-sector growth and encouraging new capital ventures."
 CB_POLICY_RATE_HIKE:"Raise Policy Rate"
 CB_POLICY_RATE_HIKE_DESC:"By increasing the cost of borrowing from the central discount window, we can effectively drain excess liquidity from the market, curbing rampant speculation at the cost of industrial expansion."
 CB_RAISE_MARGIN_REQ:"Raise Margin Requirements"
 CB_RAISE_MARGIN_REQ_DESC:"Speculation on credit has become too common among the middle strata. By requiring higher upfront collateral for loans, we ensure that only stable ventures proceed, protecting the economy."
 CE_CULTURAL_ASSIMILATION_DESC:0 "Launch a program to assimilate colonial populations into the metropolitan culture. Costly in bureaucracy but accelerates cultural acceptance and integration."
 CE_INVEST_IN_DEVELOPMENT:0 "Invest in Colonial Development"
 CE_INVEST_IN_DEVELOPMENT_DESC:0 "Pour resources into developing infrastructure and institutions in our colonial territories. Costs bureaucracy and prestige but steadily increases colonial stability."
 CE_MILITARY_GARRISON_DESC:0 "Station military forces in colonial territories to maintain order. Reduces army projection and increases bureaucratic costs, but stabilizes the colonies."
 CE_NEEDS_COLONIAL_STATES:0 "Must have colonial territories (non-homeland states)."
 CE_PLANNED_DECOLONIZATION_DESC:0 "Release all remaining colonial territories as independent nations in an orderly fashion. A graceful end to empire."
 CE_RELEASE_COLONIAL_TERRITORY:0 "Release Colonial Territory"
 CE_RELEASE_COLONIAL_TERRITORY_DESC:0 "Release one colonial territory as an independent nation. Improves stability and grants a peaceful decolonization prestige bonus."
