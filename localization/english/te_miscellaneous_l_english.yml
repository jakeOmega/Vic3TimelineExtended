 HE_ENABLE_ADMIN_FOCUS:0 "Administrative Focus"
 HE_ENABLE_ADMIN_FOCUS_DESC:0 "Focus the heir's education on governance, law, and economic management. Each month there is a chance of advancing administrative training, which improves the likelihood of developing the #bold Skilled Administrator#! or #bold Exceptional Administrator#! traits.\n\nThe #bold Industrialists#! approve; the #bold Armed Forces#! see it as neglecting martial preparation.\n\n#R Costs 100 Authority while active.#!"
 HE_ENABLE_CONSERVATIVE_DESC:0 "Engage traditional and religious tutors to guide the heir toward conservative values. May cultivate ideologies such as #bold Royalist#!, #bold Traditionalist#!, #bold Authoritarian#!, or #bold Theocrat#!.\n\nThe #bold Devout#! and #bold Landowners#! approve; the #bold Intelligentsia#! and #bold Trade Unions#! are displeased.\n\n#R Costs 100 Authority while active.#!"
 HE_ENABLE_DIPLO_FOCUS:0 "Diplomatic Focus"
 HE_ENABLE_DIPLO_FOCUS_DESC:0 "Focus the heir's education on languages, statecraft, and diplomatic protocol. Each month there is a chance of advancing diplomatic training, which improves the likelihood of developing the #bold Skilled Diplomat#! or #bold Exceptional Diplomat#! traits.\n\nThe #bold Intelligentsia#! are pleased by this scholarly approach, but the #bold Industrialists#! would prefer a more practical education.\n\n#R Costs 100 Authority while active.#!"
 HE_ENABLE_MILITARY_FOCUS:0 "Military Focus"
 HE_ENABLE_MILITARY_FOCUS_DESC:0 "Send the heir to a military academy for training in strategy, tactics, and command. Each month there is a chance of advancing military training, which improves the likelihood of developing the #bold Skilled Commander#! or #bold Military Genius#! traits.\n\nThe #bold Armed Forces#! heartily approve; the #bold Intelligentsia#! would prefer a broader education.\n\n#R Costs 100 Authority while active.#!"
 HE_ENABLE_MODERATE_DESC:0 "Arrange mentorship from industrialists, merchants, and military officers. May push the heir toward the #bold Industrialists#!, #bold Petty Bourgeoisie#!, or #bold Armed Forces#!.\n\nThe #bold Industrialists#!, #bold Petty Bourgeoisie#!, and #bold Armed Forces#! approve.\n\n#R Costs 100 Authority while active.#!"
 HE_ENABLE_PROGRESSIVE_DESC:0 "Engage progressive and liberal-minded tutors to expose the heir to modern ideas. May cultivate ideologies such as #bold Reformer#!, #bold Liberal#!, #bold Social Democrat#!, #bold Humanitarian#!, or in extreme cases #bold Communist#!.\n\nThe #bold Intelligentsia#! and #bold Trade Unions#! approve; the #bold Devout#! and #bold Landowners#! are alarmed.\n\n#R Costs 100 Authority while active.#!"
 HE_ENABLE_RADICAL_DESC:0 "Arrange mentorship from academics, common folk, and trade unionists. May push the heir toward the #bold Intelligentsia#!, #bold Rural Folk#!, or (rarely) #bold Trade Unions#!.\n\nThe #bold Intelligentsia#!, #bold Rural Folk#!, and #bold Trade Unions#! approve; the #bold Landowners#! and #bold Devout#! are appalled.\n\n#R Costs 100 Authority while active.#!"
 HE_ENABLE_REGRESSIVE_DESC:0 "Arrange mentorship from the landed gentry and clergy. May push the heir toward the #bold Landowners#! or #bold Devout#!.\n\nThe #bold Landowners#! and #bold Devout#! approve; the #bold Intelligentsia#! and #bold Trade Unions#! are dismayed.\n\n#R Costs 100 Authority while active.#!"
