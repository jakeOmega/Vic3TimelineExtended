 GW_CARBON_TAX_DESC:0 "Levy a carbon tax on coal and oil industries across your market. All countries in the market receive #v -10%#! coal and oil output and #v +3%#! tax capacity, and the market's greenhouse gas emissions are directly reduced by #v -20%#!. Available once global warming reaches mild levels. #bold Market leaders only#!."
 GW_CLIMATE_ADAPTATION_DESC:0 "Spend #v 25 authority#! to build climate resilience infrastructure. This reduces mortality and raises living standards for your population."
 GW_EMISSION_STANDARDS_DESC:0 "Impose binding industrial emission standards across your entire market. All countries in the market receive #v -2%#! building throughput compliance overhead, and the market's greenhouse gas emissions are cut by #v -10%#!. Costs #v 20 authority#!/month. Available once global warming reaches mild levels. #bold Market leaders only#!."
 GW_FOSSIL_FUEL_DIVESTMENT:0 "Mandate Fossil Fuel Divestment"
 GW_FOSSIL_FUEL_DIVESTMENT_DESC:0 "Force state and private capital out of coal and oil industries. Costs #v 20 authority#! and sharply reduces coal output (#v -20%#!) and oil output (#v -10%#!). Available to all nations once warming reaches #v 1.0°C#!."
 GW_GREEN_BUILDING_CODES:0 "Enact Green Building Codes"
 GW_GREEN_BUILDING_CODES_DESC:0 "Require energy-efficient standards in new construction. Costs #v 10 authority#! and reduces construction costs (#v -3%#!) while boosting electricity output (#v +5%#!). Available to all nations once global warming reaches mild levels."
 GW_PUBLIC_TRANSIT_DESC:0 "Fund urban transit infrastructure. Costs #v 15 authority#! and raises standard of living (#v +0.5#!) while reducing construction costs (#v -2%#!). Available to all nations once global warming reaches mild levels."
 GW_REMOVE_CARBON_TAX:0 "Repeal Carbon Tax"
 GW_REMOVE_CARBON_TAX_DESC:0 "Repeal the carbon tax for all countries in your market, ending the reduction to coal and oil output, the associated tax revenue, and the emissions reduction."
 GW_REMOVE_CLIMATE_ADAPTATION:0 "Cut Adaptation Funding"
 GW_REMOVE_CLIMATE_ADAPTATION_DESC:0 "End the climate adaptation program and recover the ongoing authority expenditure."
 GW_REMOVE_EMISSION_STANDARDS:0 "Repeal Emission Standards"
 GW_REMOVE_EMISSION_STANDARDS_DESC:0 "Repeal the emission standards mandate for all countries in your market, ending the compliance overhead and the associated emissions reduction."
 GW_REMOVE_FOSSIL_FUEL_DIVESTMENT:0 "End Fossil Fuel Divestment"
 GW_REMOVE_FOSSIL_FUEL_DIVESTMENT_DESC:0 "Lift the divestment mandate, restoring coal and oil output and losing the associated emissions benefits."
 GW_REMOVE_GREEN_BUILDING_CODES:0 "Repeal Green Building Codes"
 GW_REMOVE_GREEN_BUILDING_CODES_DESC:0 "Repeal building efficiency standards, ending the construction savings and electricity benefits."
 GW_REMOVE_PUBLIC_TRANSIT:0 "Defund Public Transit"
 GW_REMOVE_PUBLIC_TRANSIT_DESC:0 "End public transit investment, losing the quality-of-life and construction savings."
 GW_REMOVE_REFORESTATION_DESC:0 "End reforestation funding, losing the agricultural and drought-resilience benefits."
 GW_REMOVE_RENEWABLE_INVESTMENT:0 "End Renewable Investment"
 GW_REMOVE_RENEWABLE_INVESTMENT_DESC:0 "End the renewable energy program for all countries in your market, restoring conventional power plant output and ending the emissions reduction."
 GW_RENEWABLE_INVESTMENT_DESC:0 "Redirect spending toward renewable energy across your market. All countries in the market receive #v -10%#! conventional power plant output and #v +15%#! electricity output, and the market's greenhouse gas emissions are cut by #v -15%#!. Available once global warming reaches mild levels. #bold Market leaders only#!."
