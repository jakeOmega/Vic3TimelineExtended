 CW_CAPITAL_PLAN_DESC:0 "Member cooperatives pool surplus for a coordinated capacity investment across the light industrial sector. Strong recovery tool; avoid during [concept_bubble_pressure] expansion."
 CW_CONSUMPTION_CEILING_DESC:0 "A hard democratic cap on per-member consumption allowances, voted in by the Federation Council. Powerfully deflates [concept_bubble_pressure]; generates significant lower strata discontent."
 CW_COUNCIL_DIRECTIVE_DESC:0 "A formal written guidance from the Federation Council to member cooperative boards on financial restraint. Light and cheap; provides modest [concept_bubble_pressure] reduction when used proactively."
 CW_CREDIT_EXPANSION_DESC:0 "The federation authorises credit unions to expand lending capacity and reduce interest rates for member cooperatives. Provides liquidity during downturns: avoid when [concept_bubble_pressure] is already building."
 CW_DISABLE_CAPITAL_PLAN:0 "Postpone Capital Investment Plan"
 CW_DISABLE_CAPITAL_PLAN_DESC:0 "Defer the coordinated investment program and return pooled surplus to individual cooperatives."
 CW_DISABLE_CONSUMPTION_CEILING:0 "Lift Consumption Ceiling"
 CW_DISABLE_CONSUMPTION_CEILING_DESC:0 "Remove the allowance cap and restore normal member consumption rights."
 CW_DISABLE_COUNCIL_DIRECTIVE:0 "Withdraw Council Directive"
 CW_DISABLE_COUNCIL_DIRECTIVE_DESC:0 "Recall the advisory directive and return financial authority to individual cooperative boards."
 CW_DISABLE_CREDIT_EXPANSION:0 "Tighten Credit Union Lending"
 CW_DISABLE_CREDIT_EXPANSION_DESC:0 "Return cooperative credit unions to standard lending parameters."
 CW_DISABLE_DIVIDEND_RESTRAINT:0 "Lift Dividend Restraint"
 CW_DISABLE_DIVIDEND_RESTRAINT_DESC:0 "Allow member cooperatives to resume full payout distribution."
 CW_DISABLE_MUTUAL_AID_FUND:0 "Wind Down Mutual Aid Fund"
 CW_DISABLE_MUTUAL_AID_FUND_DESC:0 "Conclude the emergency mutual aid deployment and return reserves to standard oversight."
 CW_DISABLE_SOLIDARITY_CAMPAIGN:0 "End Solidarity Campaign"
 CW_DISABLE_SOLIDARITY_CAMPAIGN_DESC:0 "Conclude the coordinated media campaign."
 CW_DISABLE_WORKER_BUYOUT:0 "End Worker Buyout Program"
 CW_DISABLE_WORKER_BUYOUT_DESC:0 "Conclude the facilitated buyout program."
 CW_DIVIDEND_RESTRAINT_DESC:0 "The council votes to cap per-member payout ratios and redirect surplus to collective reinvestment funds. Reduces [concept_bubble_pressure] but requires cooperation of trade unions."
 CW_MUTUAL_AID_FUND:0 "Mutual Aid Fund Deployment"
 CW_MUTUAL_AID_FUND_DESC:0 "Activate the federation's emergency mutual aid reserve to rescue cooperatives near insolvency. Expensive but essential during panic: boosts lower strata loyalty."
 CW_SOLIDARITY_CAMPAIGN_DESC:0 "A public media campaign urging worker-owners to voluntarily moderate consumption and prioritize reinvestment. Cheap and broadly applicable; effective before crisis peaks."
 CW_WORKER_BUYOUT_DESC:0 "Enable workers at failing enterprises to acquire them before insolvency cascades through the network. Best deployed in panic or deep downturn to preserve productive capacity."
