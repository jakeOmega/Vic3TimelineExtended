 UN_ARMS_CONTROL_DESC:0 "Join UN arms control agreements. Grants #bold +5 Diplomatic Reputation#!, #bold −5% Kill Rate#!, #bold −15% Devastation#!, and #bold −5% Military Goods Cost#!. #G +3 UN Authority.#! Requires Humanitarian Regulations, Limited War, or War Crimes Forbidden law."
 UN_CHAMPION_ORDER_DESC:0 "Use our nation's diplomatic weight to strengthen the United Nations. #G Ongoing monthly UN Authority boost#! (scales with global rank). Drains #R Authority#! and #R Influence#! while active. Great Powers only. Toggle off to stop."
 UN_DEFUND_DEVELOPMENT_DESC:0 "Stop contributing to UN development programs. Removes the #bold +5 Diplo Rep, +25 Prestige, −50 Bureaucracy#! modifier. #R −2 UN Authority.#!"
 UN_END_PEACEKEEPING_DESC:0 "Withdraw our forces from peacekeeping operations. Removes the #bold +5 Diplo Rep, +25 Prestige, +3% Military Costs#! modifier. #R −2 UN Authority.#!"
 UN_FUND_DEVELOPMENT_DESC:0 "Contribute to UN development programs. Grants #bold +5 Diplomatic Reputation#! and #bold +25 Prestige#!, but costs #bold −50 Bureaucracy#!. #G +2 UN Authority.#! Requires Major Power rank."
 UN_HUMAN_RIGHTS_DESC:0 "Champion a human rights resolution at the UN. Grants #bold +5 Diplomatic Reputation#!, #bold +25 Prestige#!, and #bold +5% Institution Change Speed#!. #G +3 UN Authority.#! Requires Multiculturalism, Universal Suffrage, or Protected Speech."
 UN_LIFT_SANCTIONS_DESC:0 "Remove all UN sanctions currently in effect. The target loses the #bold −15 Diplo Rep, −50 Prestige, −15% Trade Competitiveness#! penalty. #R −3 UN Authority.#!"
 UN_PROPOSE_SANCTIONS_DESC:0 "Propose UN sanctions against a rival. The target receives #bold −15 Diplomatic Reputation#!, #bold −50 Prestige#!, and #bold −15% Trade Competitiveness#!. You gain #bold +5 Diplo Rep#! as enforcer. #G +5 UN Authority.#! Requires Major Power rank and an unsanctioned rival."
 UN_STOP_CHAMPIONING_DESC:0 "Cease active efforts to champion the international order. Removes the ongoing authority and influence drain."
 UN_STOP_UNDERMINING_DESC:0 "Cease active efforts to undermine the international order. Removes the ongoing authority and influence drain."
 UN_UNDERMINE_ORDER_DESC:0 "Use our nation's weight to weaken the United Nations and assert sovereign independence. #R Ongoing monthly UN Authority reduction#! (scales with global rank). Drains #R Authority#! and #R Influence#! while active. Great Powers only. Toggle off to stop."
 UN_WITHDRAW_ARMS_CONTROL:0 "Withdraw from Arms Control"
 UN_WITHDRAW_ARMS_CONTROL_DESC:0 "Withdraw from arms control agreements. Removes the #bold +5 Diplo Rep, −5% Kill Rate, −15% Devastation, −5% Military Costs#! modifier. #R −3 UN Authority.#!"
 UN_WITHDRAW_HUMAN_RIGHTS:0 "Withdraw Human Rights Support"
 UN_WITHDRAW_HUMAN_RIGHTS_DESC:0 "Withdraw our support for human rights resolutions. Removes the #bold +5 Diplo Rep, +25 Prestige, +5% Institution Speed#! modifier. #R −3 UN Authority.#!"
 WW_APPEASE_BUTTON_DESC:0 "Seek to accommodate the demands of rival powers through diplomatic concessions, hoping to avoid war. Improves diplomatic reputation but weakens military readiness. Only available for democratic nations."
 WW_APPEASE_POSSIBLE_TT:0 "Must be a democratic nation with ideological tensions above 20%."
 WW_JOIN_WAR_BUTTON:0 "Enter the War"
 WW_JOIN_WAR_BUTTON_DESC:0 "Commit our nation to the ongoing world war against the aggressor powers. Our fresh forces will have a temporary combat advantage, but we will bear the full costs of total war."
 WW_JOIN_WAR_POSSIBLE_TT:0 "A world war must be active, we must not already be at war, and we must not have recently attempted to join."
 WW_LEND_LEASE_BUTTON:0 "Provide Lend-Lease"
 WW_LEND_LEASE_BUTTON_DESC:0 "Supply military equipment and resources to nations fighting on the side we favor, without committing our own troops to combat. Boosts prestige and influence at the cost of increased military goods spending."
 WW_LEND_LEASE_POSSIBLE_TT:0 "Must be at least a major power with ideological tensions above 40%, or during an active world war."
 WW_PROPAGANDA_POSSIBLE_TT:0 "Must have researched Mass Media and be actively at war during the world war."
 WW_REARM_BUTTON_DESC:0 "Initiate a major military buildup in response to rising ideological tensions. Increases military effectiveness and prestige but raises costs and generates unrest among workers."
 WW_REARM_POSSIBLE_TT:0 "Must have researched Combined Arms with ideological tensions above 30%."
 WW_STOP_APPEASE_BUTTON:0 "End Appeasement"
 WW_STOP_APPEASE_BUTTON_DESC:0 "Abandon the policy of diplomatic accommodation. Appeasement has failed."
 WW_STOP_LEND_LEASE_BUTTON:0 "End Lend-Lease"
 WW_STOP_LEND_LEASE_BUTTON_DESC:0 "Cease supplying military equipment to foreign belligerents."
 WW_STOP_REARM_BUTTON:0 "Halt Rearmament"
 WW_STOP_REARM_BUTTON_DESC:0 "Scale back military buildup, reducing costs but weakening deterrence."
 WW_STOP_TOTAL_WAR_ECONOMY_BUTTON:0 "Demobilize Economy"
 WW_STOP_TOTAL_WAR_ECONOMY_BUTTON_DESC:0 "Return the economy to peacetime production. Removes the total war economy bonuses and penalties."
 WW_STOP_WARTIME_RATIONING_BUTTON:0 "End Rationing"
 WW_STOP_WARTIME_RATIONING_BUTTON_DESC:0 "End wartime rationing and restore civilian consumption levels."
 WW_STOP_WAR_PROPAGANDA_BUTTON:0 "End War Propaganda"
 WW_STOP_WAR_PROPAGANDA_BUTTON_DESC:0 "Cease the government propaganda campaign."
 WW_TOTAL_WAR_ECONOMY_BUTTON:0 "Total War Economy"
 WW_TOTAL_WAR_ECONOMY_BUTTON_DESC:0 "Redirect the entire national economy toward the war effort. Massive military bonuses and conscription boost, but severely damages civilian standard of living and increases construction costs."
 WW_TOTAL_WAR_POSSIBLE_TT:0 "Must have researched Combined Arms and be actively at war during the world war."
 WW_WARTIME_RATIONING_BUTTON:0 "Impose Rationing"
 WW_WARTIME_RATIONING_BUTTON_DESC:0 "Institute strict wartime rationing to ensure military supply. Hurts standard of living but keeps agriculture functional."
 WW_WAR_PROPAGANDA_BUTTON:0 "Launch War Propaganda"
 WW_WAR_PROPAGANDA_BUTTON_DESC:0 "Mobilize the press and media for the war effort. Boosts morale and authority but generates disapproval from intellectuals."
