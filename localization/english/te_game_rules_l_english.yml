 rule_banking_system_rule:0 "Banking System"
 rule_covert_warfare_rule:0 "Covert Warfare"
 rule_cultural_hegemony_rule:0 "Cultural Hegemony"
 rule_decolonization_rule:0 "Decolonization"
 rule_global_warming_rule:0 "Global Warming"
 rule_heir_education_rule:0 "Heir Education"
 rule_nuclear_weapons_rule:0 "Nuclear Weapons"
 rule_social_movements_rule:0 "Social Movements"
 rule_space_race_rule:0 "Space Race"
 rule_united_nations_rule:0 "United Nations"
 rule_world_war_rule:0 "World War"
 setting_banking_system_disabled:0 "Banking System Disabled"
 setting_banking_system_disabled_desc:0 "The banking cycle journal entry is disabled. Financial regulation laws still provide standard economic effects such as construction cost reductions and infrastructure bonuses, but banking-specific modifiers are inactive."
 setting_banking_system_enabled:0 "Banking System Enabled"
 setting_banking_system_enabled_desc:0 "The banking cycle journal entry is active. Financial regulation laws provide banking intervention tools, momentum effects, and crash chance modifiers that interact with the banking cycle system."
 setting_covert_warfare_disabled:0 "Covert Warfare Disabled"
 setting_covert_warfare_disabled_desc:0 "The covert warfare journal entry is disabled. [concept_intelligence_capacity] modifiers from technologies still appear but covert operations are unavailable."
 setting_covert_warfare_enabled:0 "Covert Warfare Enabled"
 setting_covert_warfare_enabled_desc:0 "The [concept_covert_warfare_system] journal entry is active. Nations build [concept_intelligence_capacity] through technology and literacy, and can launch [concept_covert_operations] against rivals. Unused operation slots boost domestic defense."
 setting_cultural_hegemony_disabled:0 "Cultural Hegemony Disabled"
 setting_cultural_hegemony_disabled_desc:0 "The cultural hegemony journal entry is disabled. Cultural pull modifiers from technologies and events still apply to tooltips but have no gameplay effect."
 setting_cultural_hegemony_enabled:0 "Cultural Hegemony Enabled"
 setting_cultural_hegemony_enabled_desc:0 "The [concept_cultural_hegemony_system] journal entry is active. Nations compete for global cultural influence through art, prestige, living standards, and technology. The dominant cultural power attracts migrants and spreads technology."
 setting_custom_religions_allowed:0 "Custom Religions Allowed"
 setting_custom_religions_allowed_desc:0 "Custom religions are allowed in this game. You will receive a journal entry allowing you to select the ideology and name of your religion."
 setting_custom_religions_not_allowed:0 "Custom Religions Not Allowed"
 setting_custom_religions_not_allowed_desc:0 "Custom religions are not allowed in this game."
 setting_decolonization_disabled:0 "Decolonization Disabled"
 setting_decolonization_disabled_desc:0 "The colonial empire journal entry is disabled. Decolonization technology effects still apply but the decolonization event chain and colonial stability tracking are inactive."
 setting_decolonization_enabled:0 "Decolonization Enabled"
 setting_decolonization_enabled_desc:0 "The colonial empire journal entry is active. Nations with overseas colonies face decolonization pressures, colonial stability tracking, and related events after researching decolonization technology."
 setting_global_warming_disabled:0 "Global Warming Disabled"
 setting_global_warming_disabled_desc:0 "The global warming journal entry is disabled. Greenhouse gas tracking is inactive, but environmental policies and events still provide pollution reduction effects as an alternative."
 setting_global_warming_enabled:0 "Global Warming Enabled"
 setting_global_warming_enabled_desc:0 "The global warming journal entry is active. Greenhouse gas emissions are tracked and climate policies affect global temperature rise. Environmental modifiers provide both emissions reduction and pollution reduction effects."
 setting_heir_education_disabled:0 "Heir Education Disabled"
 setting_heir_education_disabled_desc:0 "The heir education journal entry is disabled. Heirs do not receive education investments and their future capabilities are unaffected by this system."
 setting_heir_education_enabled:0 "Heir Education Enabled"
 setting_heir_education_enabled_desc:0 "The heir education journal entry is active. Nations can invest in the education of their heirs, affecting their future capabilities and governance."
 setting_nuclear_weapons_disabled:0 "Nuclear Weapons Disabled"
 setting_nuclear_weapons_disabled_desc:0 "The nuclear weapons journal entry is disabled. Nuclear weapons technology can still be researched but the nuclear program progression, stockpile tracking, and related events are inactive."
 setting_nuclear_weapons_enabled:0 "Nuclear Weapons Enabled"
 setting_nuclear_weapons_enabled_desc:0 "The nuclear weapons journal entry is active. Great powers and eligible major powers can pursue nuclear weapons programs with funding levels, stockpile tracking, and related diplomatic consequences."
 setting_social_movements_disabled:0 "Social Movements Disabled"
 setting_social_movements_disabled_desc:0 "Social movement journal entries are disabled. This includes civil rights, decline of religion, LGBTQ+ rights, second wave feminism, human augmentation, digital rights, environmental crisis, post-scarcity transition, and mental health crisis. Related technologies and laws still exist but the guided journal entry progression and events are inactive."
 setting_social_movements_enabled:0 "Social Movements Enabled"
 setting_social_movements_enabled_desc:0 "Social movement journal entries are active. Nations experience guided progression through civil rights, decline of religion, LGBTQ+ rights, feminism, human augmentation debates, digital rights, environmental crisis, post-scarcity transition, and mental health awareness as they research relevant technologies."
 setting_space_race_disabled:0 "Space Race Disabled"
 setting_space_race_disabled_desc:0 "The space race journal entries are disabled. Space-related technologies can still be researched but the milestone competition system, funding programs, and space race events are inactive."
 setting_space_race_enabled:0 "Space Race Enabled"
 setting_space_race_enabled_desc:0 "The space race journal entries are active. Great powers and major powers compete through a milestone-based progression from suborbital flight to interstellar probes, with funding levels affecting progress speed."
 setting_united_nations_disabled:0 "United Nations Disabled"
 setting_united_nations_disabled_desc:0 "The United Nations journal entry is disabled. Intergovernmental organization technology can still be researched but the UN founding, membership, voting, and related diplomatic events are inactive."
 setting_united_nations_enabled:0 "United Nations Enabled"
 setting_united_nations_enabled_desc:0 "The United Nations journal entry is active. Nations can found and join the UN, participate in General Assembly votes, contribute to peacekeeping, and engage with UN-related diplomatic events."
 setting_world_war_disabled:0 "World War Disabled"
 setting_world_war_disabled_desc:0 "The world war journal entry is disabled. Ideological tensions and world war events will not occur."
 setting_world_war_enabled:0 "World War Enabled"
 setting_world_war_enabled_desc:0 "The world war journal entry is active for great powers. Ideological tensions between great powers can escalate into a global conflict with leadup, active war, and post-war phases."
