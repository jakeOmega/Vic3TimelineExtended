 BANKING_CMD_BUBBLE_EXPLAIN:0 "In a Command Economy this 'bubble pressure' represents the accumulation of administrative errors, misallocated inputs, and supply-chain friction that builds when production targets outpace logistical capacity. High values signal systemic coordination failures rather than speculative excess."
 BANKING_CMD_CRASH_EXPLAIN:0 "A 'panic' in a command economy is a systemic supply-chain breakdown: a key raw material or transport sector has failed, causing cascading stoppages across the plan. Remedies are administrative directives, targeted directed credit, or plan revisions to clear bottlenecks."
 BANKING_CMD_HARVEST_EXPLAIN:0 "Agricultural shortfalls in a command economy represent a logistics failure (input distribution, transport), not a market liquidity problem. Interventions should prioritize directed allocations and rapid transport fixes."
 BANKING_CMD_MOMENTUM_EXPLAIN:0 "Momentum here measures how well industrial inputs are synchronized with plan targets. Positive momentum means inputs and production are aligned; negative momentum indicates cascading shortages or bureaucratic delays."
 BANKING_COOP_BUBBLE_EXPLAIN:0 "In Cooperative Ownership, 'bubble pressure' denotes excessive short-term payouts and reduced reinvestment by worker-owned firms. High pressure risks depleting maintenance and R&D funds, leading to stagnation."
 BANKING_COOP_HARVEST_EXPLAIN:0 "Rural cooperative distress often reflects depleted cooperative funds rather than a credit shortage. Support via mutual aid or coordinated supply of inputs preserves the collective network."
 BANKING_COOP_MOMENTUM_EXPLAIN:0 "Momentum captures the balance between worker consumption and reinvestment. Positive momentum shows healthy reinvestment; negative momentum warns that cooperatives may be prioritizing payouts over long-term viability."
 BANKING_COOP_PANIC_EXPLAIN:0 "A panic among cooperatives looks like an operating-cash crisis: widespread dividend payouts and short hours have starved maintenance and supply lines. Policy tools include mutual-aid funds, council moral suasion, or temporary coordinated reinvestment directives."
