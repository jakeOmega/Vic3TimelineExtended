 je_global_warming_goal:0 "Temperature reaches 4°C above pre-industrial levels"
 je_global_warming_reason:0 "Global Warming is the long-term rise in Earth's average surface temperature driven by the burning of coal and oil. Its consequences - crop failures, coastal flooding, mass displacement, and surging mortality - threaten every nation on Earth.\n\n#bold Current Temperature Anomaly:#! #v [SCOPE.GetRootScope.ScriptValue('temperature_anomaly_display')]#! °C\n#bold Cumulative Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('greenhouse_gas_emissions_display')]#!\n#bold Annual Market Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('market_greenhouse_gas_emissions_script_value_display')]#!\n#bold Global Annual Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('global_greenhouse_gas_emissions_script_value_display')]#!\n\n#bold Market-Leader Policies (direct emissions reduction):#!\n#bold  Carbon Tax:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_carbon_tax_script_value')]#! nations\n#bold  Renewable Investment:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_renewables_script_value')]#! nations\n#bold  Emission Standards:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_emission_standards_script_value')]#! nations\n\n#bold General Policies (available to all):#!\n#bold  Adaptation Programs:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_adaptation_script_value')]#! nations\n#bold  Reforestation Subsidies:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_reforestation_script_value')]#! nations\n#bold  Public Transit:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_public_transit_script_value')]#! nations\n#bold  Fossil Fuel Divestment:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_divestment_script_value')]#! nations\n#bold  Green Building Codes:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_green_buildings_script_value')]#! nations\n\n#bold Effects:#! Climate warming scales linearly with temperature - warmer means worse. At 0.5°C warming is mild; at 1.0°C moderate; at 2.0°C severe; at 3.0°C catastrophic. Market leaders can reduce warming directly via emissions policies; all nations can invest in adaptation and resilience."
 je_nuclear_program_goal:0 "Progress reaches #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_goal_value')]#!"
 je_nuclear_program_reason:0 "We are currently spending @innovation! #v [Country.MakeScope.ScriptValue('nuclear_weapons_program_current_cost')]#! weekly innovation on our nuclear program.\nThis gives a monthly progress of #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_monthly_progress')]#!.\n When we reach #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_goal_value')]#! we will create enough nuclear weapons for another strike.\n\nWe have enough #bold Nuclear Weapons#! in our stockpile for #N [Country.MakeScope.Var('nuclear_weapon_stockpile').GetValue]#! nuclear strikes."
 law_investment_banking_separation:0 "Banking Separation"
 law_investment_banking_separation_desc:0 "Commercial and investment banking are strictly separated to prevent risky financial behavior from threatening the wider economy."
 law_securitization_and_derivatives:0 "Securitization & Derivatives"
 law_securitization_and_derivatives_desc:0 "The state actively encourages the bundling of assets into complex securities and the trading of derivative products. This unlocks vast amounts of capital and promises high returns, at the cost of greatly increased systemic risk."
 minor_events_timelineextended.5.a:0 "Grant independence to the colony"
 minor_events_timelineextended.5.b:0 "Refuse the demands for independence"
 minor_events_timelineextended.5.c:0 "Negotiate concessions to maintain control"
 minor_events_timelineextended.5.d:0 "A delegation from one of our colonies has arrived at the capital, demanding independence. They demand the independence of [SCOPE.GetRootScope.ScriptValue('states_demanding_independence')] states centered on [SCOPE.sState('colony_state').GetName]."
 minor_events_timelineextended.5.f:0 "The delegation stands before you, their faces resolute and their voices unwavering. They speak of the injustices they have endured, the exploitation they have suffered, and the dreams of freedom that have fueled their struggle. The weight of history hangs heavy in the air as you listen to their demands, knowing that the decisions you make in this moment will shape the future of your nation and its relationship with its colonies. The path ahead is fraught with challenges, but the call for independence cannot be ignored."
 minor_events_timelineextended.5.t:0 "Colonial Delegation Demands Independence"
