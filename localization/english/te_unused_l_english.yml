 environmental_events.2.c:0 "Co-opt the movement"
 environmental_events.2.d:0 "A mass environmental protest has erupted, with thousands blocking roads and chaining themselves to factory gates. The protesters demand the establishment of a Ministry of the Environment with real power."
 environmental_events.2.f:0 "Their banners read: There Is No Planet B."
 environmental_events.2.t:0 "Environmental Protest"
 environmental_events.200.a:0 "We have secured a future for our children."
 environmental_events.200.d:0 "[ROOT.GetCountry.GetName] has enacted sweeping environmental protections. The air clears, the forests regenerate, and the waters run clean once more — a testament to what collective action can achieve."
 environmental_events.200.f:0 "#italic The earth does not belong to us; we belong to the earth.#!"
 environmental_events.200.t:0 "Green Victory"
 environmental_events.3.a:0 "Crack down, but acknowledge grievances"
 environmental_events.3.b:0 "Use incident to justify environmental reforms"
 environmental_events.3.c:0 "Label all environmentalists as terrorists"
 environmental_events.3.d:0 "A [concept_radical] environmentalist cell has sabotaged industrial [concept_infrastructure], destroying pipelines and setting fire to a factory. While the public condemns the violence, many sympathize with the underlying cause. The government must respond carefully."
 environmental_events.3.f:0 "The pipeline burned for three days before anyone claimed responsibility."
 environmental_events.3.t:0 "Eco-Terrorism"
 environmental_events.4.a:0 "Launch a massive cleanup effort"
 environmental_events.4.b:0 "Hold industry accountable"
 environmental_events.4.c:0 "Minimize the damage publicly"
 environmental_events.4.d:0 "A catastrophic oil spill has devastated the coastline near [SCOPE.sState('spill_state').GetName]. Marine life is dying, fishing communities are ruined, and the images of oil-soaked wildlife have galvanized public outrage."
 environmental_events.4.f:0 "Fishermen hauled up nets thick with oil. The company's lawyers arrived before the cleanup crews."
 environmental_events.4.t:0 "Oil Spill Disaster"
 environmental_events.5.a:0 "Pledge environmental reforms"
 environmental_events.5.b:0 "Reject foreign interference"
 environmental_events.5.c:0 "Greenwash with token gestures"
 environmental_events.5.d:0 "Foreign nations have publicly criticized our environmental record, pointing to our lack of environmental regulation. Pressure mounts to act, but many see this as an infringement on national sovereignty."
 environmental_events.5.f:0 "The foreign correspondent filed her story from beside a river that had not been safe to drink from in ten years. The dispatch ran on the front page of six capitals."
 environmental_events.5.t:0 "International Environmental Pressure"
 environmental_legislation_triumph_modifier:0 "Environmental Legislation Triumph"
 environmental_legislation_triumph_modifier_desc:0 "Comprehensive environmental legislation has been passed, earning [concept_prestige] and driving green innovation."
 environmental_neglect_modifier:0 "Environmental Neglect"
 environmental_neglect_modifier_desc:0 "The failure to address environmental destruction damages national [concept_prestige]."
 environmental_paralysis_modifier:0 "Environmental Paralysis"
 environmental_paralysis_modifier_desc:0 "Political paralysis on environmental issues damages national [concept_prestige]."
 environmentalist_leader:0 "Environmentalist leader"
 extend_influence_effects_desc:0 "• Generates [concept_power_bloc_leverage] for the target country, deepening ties to the source's [concept_power_bloc]."
 feminism_backlash_character_modifier:0 "Feminist Backlash"
 feminism_backlash_character_modifier_desc:0 "Traditionalist victory has rolled back women's public standing. Female characters are seen as less popular and less qualified to lead."
 feminism_emancipated_character_modifier:0 "Feminist Emancipation"
 feminism_emancipated_character_modifier_desc:0 "Hard-won emancipation has lifted the public standing of women. Female characters are more popular and more credible candidates for leadership."
 feminism_movement_crushed_modifier:0 "Feminist Movement Collapsed"
 feminism_movement_crushed_modifier_desc:0 "The feminist movement has collapsed. Traditional gender roles are reinforced."
 feminism_stagnation_modifier:0 "Feminist Stagnation"
 feminism_stagnation_modifier_desc:0 "The unresolved gender equality question damages national [concept_prestige]."
 feminism_struggle_active_modifier:0 "Feminist Movement Active"
 feminism_struggle_active_modifier_desc:0 "The feminist movement creates political tension as gender equality is debated."
 feminism_triumph_modifier:0 "Feminist Triumph"
 feminism_triumph_modifier_desc:0 "Gender equality has been achieved, boosting innovation and international [concept_prestige]."
 feminist_events.1.a:0 "Mandate equal pay"
 feminist_events.1.b:0 "Break the strike"
 feminist_events.1.c:0 "Commission a study"
 feminist_events.1.d:0 "Women across multiple industries have walked off the job, demanding equal pay for equal work. Factories and offices grind to a halt as the strike spreads. The government faces a choice."
 feminist_events.1.f:0 "Their signs read: Same Work, Same Pay."
 feminist_events.1.t:0 "The Equal Pay Strike"
 feminist_events.100.a:0 "Traditional values prevail"
 feminist_events.100.b:0 "A quiet setback"
 feminist_events.100.desc:0 "The second-wave feminist movement has collapsed under the weight of political opposition. With restrictive laws still firmly in place, the dream of gender equality fades into the background as traditional roles are reasserted."
 feminist_events.100.f:0 "The bill was shelved. The committee was dissolved. The petitions were filed in a cabinet that no one opened again."
 feminist_events.100.t:0 "The Movement Falters"
 feminist_events.2.a:0 "Promote her immediately"
 feminist_events.2.b:0 "Settle the matter quietly"
 feminist_events.2.c:0 "The decision stands"
 feminist_events.2.d:0 "A prominent and highly qualified woman has been publicly denied a senior government position solely on the basis of her sex. The incident has become a flashpoint for the broader gender equality debate."
 feminist_events.2.f:0 "Three letters of recommendation, seventeen years of service, and a note from the appointments secretary: 'The Minister prefers a male candidate.'"
 feminist_events.2.t:0 "The Glass Ceiling"
 feminist_events.200.a:0 "A victory for half our population — and all of it."
 feminist_events.200.d:0 "The feminist movement in [ROOT.GetCountry.GetName] has accomplished its goals. Gender equality is now deeply embedded in law and culture, opening doors that were once firmly shut."
 feminist_events.200.f:0 "#italic The story of women's struggle for equality belongs to no single feminist — it is the story of all who care about human rights.#!"
 feminist_events.200.t:0 "Equality Achieved"
 feminist_events.3.a:0 "State-subsidized contraception"
 feminist_events.3.b:0 "Allow but don't subsidize"
 feminist_events.3.c:0 "Restrict contraception access"
 feminist_events.3.d:0 "The arrival of the contraceptive pill has ignited a fierce debate about reproductive rights and bodily autonomy. Women's groups demand universal access, while religious leaders warn of moral collapse. The government must navigate between progress and tradition."
 feminist_events.3.f:0 "The pharmacist dispensed the prescription without comment. His predecessor had refused. His predecessor's predecessor had called the police."
 feminist_events.3.t:0 "The Reproductive Rights Debate"
 feminist_events.4.a:0 "Full combat roles for women"
 feminist_events.4.b:0 "Support roles only"
 feminist_events.4.c:0 "No women in the military"
 feminist_events.4.d:0 "Pressure is mounting to allow women to serve in combat roles in the armed forces. Military reformers argue that denying capable soldiers based on gender weakens national defense, while traditionalists insist on maintaining established norms."
 feminist_events.4.f:0 "She carried the same pack, fired the same weapon, and marched the same twenty miles. The debate about whether she belonged there continued in offices she would never visit."
 feminist_events.4.t:0 "Women in the Military"
 feminist_events.5.a:0 "Fund feminist literature programs"
 feminist_events.5.b:0 "Let it flourish without state involvement"
 feminist_events.5.c:0 "Ban subversive literature"
 feminist_events.5.d:0 "A wave of feminist writing has captured the national imagination. Bestselling books challenge traditional gender roles and inspire a new generation of women to demand equality. The literary movement is reshaping public discourse."
 feminist_events.5.f:0 "The book sold three hundred thousand copies in its first month. Several legislators admitted, off the record, that their wives had made them read it."
 feminist_events.5.t:0 "Feminist Literature Boom"
 forced_disarmament_article_short_desc:0 "[SOURCE_COUNTRY.GetNameNoFormatting] will reduce military capacity"
 forced_disarmament_effects_desc:0 "• Reduces [Concept('concept_military_wage', 'military wages')] by 25% in the source country.\n• Halves conscription rates.\n• Source country loses [concept_prestige]."
 fossil_fuel_business:0 "Fossil fuel business interests"
 free_port_concession_article_short_desc:0 "[SOURCE_COUNTRY.GetNameNoFormatting] will open [SCOPE.sArticleOption('article_option').GetInputState.GetName] as a free port"
 free_port_concession_effects_desc:0 "• Massively increases [concept_trade_capacity] and migration pull in the target state.\n• Reduces cultural [concept_assimilation] in the cosmopolitan port.\n• Source country loses [concept_authority].\n• Target country gains [concept_prestige]."
 gdp_tooltip:0 "$GDP_TOOLTIP$"
 government_service_need:0 "Government Service Need: [State.MakeScope.ScriptValue('government_service_net')|D+=] ([State.MakeScope.ScriptValue('government_service_have')]/[State.MakeScope.ScriptValue('government_service_need')|0])"
 green_jobs_interest:0 "Green jobs and worker safety"
 healthcare_aid_effects_desc:0 "• Reduces mortality and improves [concept_sol] in the target country.\n• Source country pays increased health system costs.\n• Improves relations over time."
 heir_education_progress_bar_name:0 "Education Progress"
 humanitarian_interest:0 "Humanitarian interest"
 imperialist_ideology:0 "Imperialist ideology"
 intelligence_sharing_pact_effects_desc:0 "• +5% intelligence [concept_institution] effectiveness for both countries.\n• +3 [concept_intelligence_capacity] for both.\n• +1 Economic, Military, and Ideological covert defense for both.\n• +10% intelligence institution costs for both.\n• +300 [concept_treaty] leverage generation for both.\n• Both countries gain 1 [concept_infamy] upon signing.\n• Improves relations over time (max +60)."
 iw_cancel_comms_disruption_button:0 "Cancel Comms Disruption"
 iw_cancel_comms_disruption_button_desc:0 "Terminate the communications disruption operation. This will also happen automatically when peace is signed."
 iw_cancel_destabilization_button:0 "Cancel Destabilization"
 iw_cancel_election_interference_button:0 "Cancel Election Interference"
 iw_cancel_election_interference_button_desc:0 "Terminate the ongoing election interference operation and free up the operation slot."
 iw_cancel_financial_subversion_button:0 "Cancel Financial Subversion"
 iw_cancel_financial_subversion_button_desc:0 "Terminate the ongoing financial subversion operation and free up the operation slot."
 iw_cancel_fund_movements_button_desc:0 "Terminate the movement funding operation and free up the operation slot. This will also happen automatically if the target has no active movements."
 iw_cancel_ideological_subversion_button:0 "Cancel Ideological Subversion"
 iw_cancel_industrial_espionage_button:0 "Cancel Industrial Espionage"
 iw_cancel_industrial_espionage_button_desc:0 "Terminate the industrial espionage operation and free up the operation slot."
 iw_cancel_influence_campaign_button:0 "Cancel Influence Campaign"
 iw_cancel_influence_campaign_button_desc:0 "Terminate the influence campaign and free up the operation slot. This will also happen automatically if you lose [concept_power_bloc] leadership or the target joins your bloc."
 iw_cancel_infrastructure_sabotage_button:0 "Cancel Infrastructure Sabotage"
 iw_cancel_infrastructure_sabotage_button_desc:0 "Terminate the [concept_infrastructure] sabotage operation. This will also happen automatically when peace is signed."
 iw_cancel_military_espionage_button:0 "Cancel Military Espionage"
 iw_cancel_military_espionage_button_desc:0 "Terminate the military espionage operation and free up the operation slot."
 iw_launch_comms_disruption_button:0 "Launch Comms Disruption"
 iw_launch_comms_disruption_button_desc:0 "Deploy cyber weapons to degrade enemy military communications during wartime, reducing combat effectiveness.\n\n#bold Requires:#! Available operation slot, active war.\n#bold Effect:#! Reduces enemy Offense and Defense.\n#bold Risk:#! Monthly detection chance; if detected, generates [concept_infamy]."
 iw_launch_election_interference_button:0 "Launch Election Interference"
 iw_launch_election_interference_button_desc:0 "Deploy intelligence assets to covertly interfere in a rival's elections, undermining their political [concept_legitimacy].\n\n#bold Requires:#! Available operation slot, rivalry with a foreign power, peacetime.\n#bold Effect:#! Reduces target's Legitimacy and Authority.\n#bold Risk:#! Monthly detection chance; if detected, generates [concept_infamy]."
 iw_launch_financial_subversion_button:0 "Launch Financial Subversion"
 iw_launch_financial_subversion_button_desc:0 "Deploy intelligence assets to destabilize a rival's financial system, increasing their banking crisis probability.\n\n#bold Requires:#! Available operation slot, rivalry with a foreign power, peacetime.\n#bold Effect:#! Increases target's [concept_bubble_pressure].\n#bold Risk:#! Monthly detection chance; if detected, generates [concept_infamy]."
 iw_launch_infrastructure_sabotage_button:0 "Launch Infrastructure Sabotage"
 iw_launch_infrastructure_sabotage_button_desc:0 "Deploy cyber weapons to disrupt enemy [concept_infrastructure] during wartime, reducing production and transport capacity.\n\n#bold Requires:#! Available operation slot, active war.\n#bold Effect:#! Reduces enemy infrastructure and [concept_throughput].\n#bold Risk:#! Monthly detection chance; if detected, generates [concept_infamy]."
 iw_not_at_war_tt:0 "Must be at peace (peacetime operation)"
 je_banking_cycle_command_economy:0 "Logistics & Allocation Gauge"
 je_banking_cycle_cooperative_ownership:0 "Cooperative Finance Dashboard"
 je_banking_cycle_reason:0 "In a Market Economy the [concept_banking_cycle] should be read as a liquidity and sentiment gauge: momentum captures investor-driven growth, while [concept_bubble_pressure] signals overvaluation and systemic fragility. Use interest-rate policy, macroprudential tightening, targeted bailouts, open-market operations, and swap lines to steer the cycle. Apply measured regulatory tightening and liquidity drains to cool speculative excess; when contagion risk appears, deploy guarantees, asset-relief, or emergency liquidity to preserve credit and the real economy. Expect political trade-offs — some tools slow growth or strain public finances."
 je_banking_cycle_reason_command_economy:0 "In a Command Economy the cycle should be read as a logistics coordination gauge: momentum and [concept_bubble_pressure] track supply-chain synchronization and administrative strain rather than investor confidence. Use directed credit, plan revisions, and allocation orders to resolve bottlenecks."
 je_banking_cycle_reason_cooperative_ownership:0 "Under Cooperative Ownership the cycle tracks the balance between worker consumption and capital availability. High [concept_bubble_pressure] reflects excessive payouts and low reinvestment; interventions include mutual aid funds and council moral suasion to prioritize long-term viability."
 je_banking_cycle_title_market:0 "Boom & Bust Cycle"
 je_civil_rights_reason:0 "Discriminated communities are demanding equal treatment under the law."
 je_civil_rights_status_discriminatory:0 "Our current laws perpetuate #N [concept_discrimination]#! against minority communities. The movement demands systemic reform."
 je_civil_rights_status_hostile:0 "Our laws enforce #R active hostility#! toward minority communities. The movement faces a long and difficult struggle."
 je_civil_rights_status_indifferent:0 "Our government takes no position on minority rights. The movement pushes for #G active protection#!."
 je_civil_rights_status_protective:0 "We have enacted protective measures, but the movement will not rest until #G full equality#! is achieved."
 je_colonial_empire_reason:0 "Our nation controls overseas territories that are not part of our cultural [concept_homeland]. The era of [concept_decolonization_system] is upon us - will we integrate these lands fully into our nation, or release them to self-governance?"
 je_decline_of_religion:0 "Decline of Religion"
 je_decline_of_religion_reason:0 "Secularism spreads as organized religion loses its grip on society. The meaning vacuum creates new cultural tensions."
 je_decline_religion_status_ministry:0 "#Y The Ministry of Religion still holds power,#! but secular forces push to disestablish it."
 je_decline_religion_status_secular:0 "#G The state has separated from organized religion,#! but a meaning vacuum persists."
 je_digital_rights_reason:0 "As digital surveillance becomes ubiquitous, citizens demand privacy protections. The state must balance security against liberty in the digital age."
 je_environmental_crisis:0 "[concept_environmental_crisis] Response"
 je_environmental_crisis_reason:0 "[concept_pollution_system] and environmental degradation demand a political response. Industry and environmentalists clash over the future of our natural world."
 je_environmental_status_no_ministry:0 "#R No environmental ministry exists.#! [concept_pollution_system] continues unchecked as industry prioritizes profit over the planet."
 je_feminism_status_no_rights:0 "Women have no legal rights in our nation. The feminist movement demands fundamental change, beginning with the right to own property."
 je_feminism_status_property:0 "Women may own property, but cannot vote. The suffragist movement grows stronger with each passing year."
 je_feminism_status_suffrage:0 "Women have won the vote, but full equality remains elusive. The movement presses on toward protected class status."
 je_global_warming_goal:0 "Temperature reaches 4°C above pre-industrial levels"
 je_global_warming_reason:0 "Global Warming is the long-term rise in Earth's average surface temperature driven by the burning of coal and oil. Its consequences - crop failures, coastal flooding, mass displacement, and surging mortality - threaten every nation on Earth.\n\n#bold Current [concept_temperature_anomaly]:#! #v [SCOPE.GetRootScope.ScriptValue('temperature_anomaly_display')]#! °C\n#bold Cumulative Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('greenhouse_gas_emissions_display')]#!\n#bold Annual Market Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('market_greenhouse_gas_emissions_script_value_display')]#! ([SCOPE.GetRootScope.ScriptValue('market_carbon_capture_script_value_display')] from carbon capture)\n#bold Global Annual Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('global_greenhouse_gas_emissions_script_value_display')]#!\n#bold Yearly Temperature Change:#! [GetPlayer.GetCustom('te_yearly_temp_change_prefix')][SCOPE.GetRootScope.ScriptValue('yearly_temperature_change_abs_display')|2]#! °C\n\n#bold Market-Leader Policies (direct emissions reduction):#!\n#bold  Carbon Tax:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_carbon_tax_script_value')]#! nations\n#bold  Renewable Investment:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_renewables_script_value')]#! nations\n#bold  Emission Standards:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_emission_standards_script_value')]#! nations\n\n#bold General Policies (available to all):#!\n#bold  Adaptation Programs:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_adaptation_script_value')]#! nations\n#bold  Reforestation Subsidies:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_reforestation_script_value')]#! nations\n#bold  Public Transit:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_public_transit_script_value')]#! nations\n#bold  Fossil Fuel Divestment:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_divestment_script_value')]#! nations\n#bold  Green Building Codes:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_green_buildings_script_value')]#! nations\n\n#bold Effects:#! Climate warming scales linearly with temperature - warmer means worse. At 0.5°C warming is mild; at 1.0°C moderate; at 2.0°C severe; at 3.0°C catastrophic. Market leaders can reduce warming directly via emissions policies; all nations can invest in adaptation and resilience."
 je_human_augmentation_reason:0 "Augmentation technology forces society to confront fundamental questions about human identity. The divide between enhanced and natural citizens threatens social [concept_power_bloc_cohesion]."
 je_human_augmentation_status_banned:0 "#R Augmentation is banned.#! A black market thrives in the shadows."
 je_human_augmentation_status_mandatory:0 "#R Mandatory augmentation#! has been decreed. Opposition grows among those who value natural humanity."
 je_human_augmentation_status_medical:0 "#Y Augmentation is limited to medical use.#! Many push for broader access."
 je_human_augmentation_status_regulated:0 "#G A regulated augmentation market exists,#! balancing innovation with safety."
 je_human_augmentation_status_unrestricted:0 "#Y Unrestricted augmentation#! is creating a growing divide between enhanced elites and natural citizens."
 je_iw_funding_status:0 "\n#bold Funding Level:#! [ROOT.ScriptValue('covert_funding_level_display')] / [ROOT.ScriptValue('iw_funding_level_max')]"
 je_iw_operations_summary:0 "\n#bold Active [concept_covert_operations]:#! [ROOT.ScriptValue('covert_active_display')] / [ROOT.ScriptValue('covert_slots_display')] slots"
 je_iw_slots_breakdown:0 "\n  Sources: [ROOT.GetCountry.GetModifier.GetValueWithBreakdownFor('country_covert_operation_slot_add')]"
 je_lgbtq_rights:0 "LGBTQ+ Rights Movement"
 je_lgbtq_rights_reason:0 "The struggle for LGBTQ+ equality demands a political response. The movement for legal recognition and equal treatment grows stronger with each passing year."
 je_lgbtq_rights_status_basic:0 "#G Basic protections are in place,#! but the movement pushes for comprehensive equality."
 je_lgbtq_rights_status_comprehensive:0 "#G Comprehensive rights have been achieved.#! Full equality and protection remains the goal."
 je_lgbtq_rights_status_limbo:0 "#Y LGBTQ+ citizens exist in legal limbo.#! Neither protected nor actively persecuted, but lacking formal rights."
 je_lgbtq_rights_status_persecuted:0 "#R LGBTQ+ citizens face active persecution under the law.#! The movement fights for basic survival."
 je_mental_health_crisis_reason:0 "Modern life has produced a mental health epidemic. Depression, anxiety, and addiction sweep through the population, demanding a response."
 je_nuclear_program_goal:0 "Progress reaches #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_goal_value')]#!"
 je_nuclear_program_reason:0 "We are currently spending @innovation! #v [Country.MakeScope.ScriptValue('nuclear_weapons_program_current_cost')]#! weekly innovation on our [concept_nuclear_program].\nThis gives a monthly progress of #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_monthly_progress')]#!.\n When we reach #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_goal_value')]#! we will create enough nuclear weapons for another strike.\n\nWe have enough #bold Nuclear Weapons#! in our stockpile for #N [Country.MakeScope.Var('nuclear_weapon_stockpile').GetValue]#! nuclear strikes."
 je_post_scarcity_reason:0 "Automation and AI are making traditional labor obsolete. Society must decide what comes next as the old economic order crumbles."
 je_second_wave_feminism:0 "Second-Wave Feminism"
 je_second_wave_feminism_reason:0 "A new wave of feminism demands more than suffrage. Workplace equality, reproductive rights, and cultural representation are now the battleground."
 je_second_wave_feminism_status_no_rights:0 "#R Women have no formal rights.#! The movement must fight for the most basic protections."
 je_second_wave_feminism_status_property:0 "#Y Women have gained property rights,#! but the fight for equality continues."
 je_second_wave_feminism_status_suffrage:0 "#G Women can vote,#! but workplace [concept_discrimination] and cultural barriers persist."
 je_strategic_reserve_ammunition_progress:0 "Ammunition Reserve"
 je_strategic_reserve_ammunition_progress_reason:0 "Track the fill percentage of the national ammunition stockpile."
 je_strategic_reserve_fill_line:0 "\n#bold Reserve Fill:#! #v [ROOT.GetCountry.MakeScope.ScriptValue('st_res_reserve_fill_pct')|0]#!%\n"
 je_strategic_reserve_grain_progress:0 "Grain Reserve"
 je_strategic_reserve_grain_progress_reason:0 "Track the fill percentage of the national grain stockpile."
 je_strategic_reserve_oil_progress:0 "Oil Reserve"
 je_strategic_reserve_oil_progress_reason:0 "Track the fill percentage of the national oil stockpile."
 je_united_nations_goal:0 "The United Nations persists as long as the international order endures."
 je_united_nations_reason:0 "The United Nations is an intergovernmental organization promoting international cooperation. As a member, your country gains diplomatic benefits that #bold scale with [concept_un_authority]#!.\n\n#bold UN Authority#! (0–100) measures institutional [concept_legitimacy]:\n• Drifts toward 50 each month (±0.5)\n• #G [Concept('concept_great_power', 'Great Powers')] with Humanitarian Regulations: +0.2/month each#!\n• #R Wars between member states: −1/month each#!\n• Joining programs raises it; defying resolutions lowers it\n\n#bold Membership Benefits#! (when Authority ≥ 30):\nScaled by Authority ÷ 50: at 50 you get 1× base benefit (#bold +5 Diplo Rep#!, #bold +1% Research#!, #bold +25 [concept_prestige]#!). At 100, 2×.\n\n#bold Security Council:#! First 5 Great Powers to join get permanent seats (+10 Diplo Rep, +20 Leverage, +25 Authority). Lost if you leave or drop below GP rank.\n\n#bold Headquarters:#! First signatory hosts [concept_hq] (+10 Diplo Rep, +100 Prestige, +10 Leverage).\n\n#bold Specialized Agencies#! (7) are created when members first adopt resolutions on each topic: WHO (health), UNESCO (heritage), ICJ (justice), UNHRC (human rights), IAEA (nuclear), UNEP (environment), UNHCR (refugees).\n\n#bold Resolutions & Events:#!\nEach month, UN members may receive resolution events based on a weighted random draw. Eligibility depends on your country's rank, laws, technologies, and current programs. Events fire individually: not all members receive the same event. Higher-rank nations see more diplomatic and reform events; all members can receive humanitarian, heritage, and arms control proposals.\n\n#bold Available Programs:#!\n• Peacekeeping: +5 Diplo Rep, +25 Prestige, +3% Military Costs\n• Development: +5 Diplo Rep, +25 Prestige, −50 [concept_bureaucracy]\n• Human Rights: +5 Diplo Rep, +25 Prestige, +5% [concept_institution] Speed\n• Arms Control: +5 Diplo Rep, −5% [concept_kill_rate], −15% [concept_devastation]\n• Sanctions: Target a rival with −15% Trade Competitiveness"
 je_world_war_ideology_authoritarian:0 "#bold Our Ideology:#! Authoritarian"
 je_world_war_ideology_communist:0 "#bold Our Ideology:#! #R Communist#!"
 je_world_war_ideology_democratic:0 "#bold Our Ideology:#! #G Democratic#!"
 je_world_war_ideology_fascist:0 "#bold Our Ideology:#! #R Fascist#!"
 je_world_war_ideology_nonaligned:0 "#bold Our Ideology:#! Non-Aligned"
 jingoist_leader:0 "Jingoist leader"
 join_united_nations_effects_desc:0 "• Obliges the source country to join the United Nations.\n• The country will be auto-enrolled when the UN membership [concept_journal_entry] processes."
 joint_military_exercises_effects_desc:0 "• Increases army and navy experience gain by 25% for both countries.\n• Slightly increases [Concept('concept_military_good', 'military goods')] costs.\n• Improves relations over time."
 law_investment_banking_separation:0 "Banking Separation"
 law_investment_banking_separation_desc:0 "Commercial and investment banking are strictly separated to prevent risky financial behavior from threatening the wider economy."
 law_securitization_and_derivatives:0 "Securitization & Derivatives"
 law_securitization_and_derivatives_desc:0 "The state actively encourages the bundling of assets into complex securities and the trading of derivative products. This unlocks vast amounts of capital and promises high returns, at the cost of greatly increased systemic risk."
 lgbtq_events.1.a:0 "Let them march freely"
 lgbtq_events.1.b:0 "Disperse the march"
 lgbtq_events.1.c:0 "Ignore it"
 lgbtq_events.1.d:0 "Thousands of LGBTQ+ citizens and their allies have organized a pride march through the capital. Rainbow flags line the streets as the procession demands equal rights and recognition. The government must decide how to respond."
 lgbtq_events.1.f:0 "Traffic was diverted. The police chief assigned extra officers. Nobody threw anything. It was, by all accounts, a parade."
 lgbtq_events.1.t:0 "The Pride March"
 lgbtq_events.100.a:0 "Order is restored"
 lgbtq_events.100.b:0 "A quiet shame lingers"
 lgbtq_events.100.desc:0 "The LGBTQ+ rights movement has been broken. Under the weight of persecution laws, activists have been silenced, organizations disbanded, and any hope of reform extinguished. The state has made its position clear."
 lgbtq_events.100.f:0 "The meeting hall was empty. The organizer's apartment had been searched last week. Nobody came to the next meeting, or the one after that."
 lgbtq_events.100.t:0 "Movement Crushed"
 lgbtq_events.2.a:0 "Stand firm for equal rights"
 lgbtq_events.2.b:0 "Seek a compromise"
 lgbtq_events.2.c:0 "Side with the devout"
 lgbtq_events.2.d:0 "The [SCOPE.gsInterestGroup('devout_ig').GetName] have launched a fierce campaign against LGBTQ+ rights, calling the movement an affront to traditional values. Religious leaders demand the government take their side."
 lgbtq_events.2.f:0 "The bishop's letter was read aloud in every parish that Sunday. Two congregations walked out. The rest sat in uncomfortable silence."
 lgbtq_events.2.t:0 "Religious Backlash"
 lgbtq_events.200.a:0 "Love is love."
 lgbtq_events.200.d:0 "The LGBTQ rights movement in [ROOT.GetCountry.GetName] has won its battles. Full legal equality is now enshrined in law, and a more tolerant society has emerged from decades of activism."
 lgbtq_events.200.f:0 "#italic No one is free when others are oppressed.#!"
 lgbtq_events.200.t:0 "Pride and Progress"
 lgbtq_events.3.a:0 "Allow openly LGBTQ+ soldiers"
 lgbtq_events.3.b:0 "Don't ask, don't tell"
 lgbtq_events.3.c:0 "Ban LGBTQ+ military service"
 lgbtq_events.3.d:0 "A heated debate has erupted over whether LGBTQ+ citizens should be permitted to serve openly in the armed forces. Military leaders are divided, with some arguing ability should be the only criterion for service while others warn of disruption to unit [concept_power_bloc_cohesion]."
 lgbtq_events.3.f:0 "The sergeant's service record was spotless — twelve years, no complaints. The discharge papers cited 'incompatibility with service norms.'"
 lgbtq_events.3.t:0 "The Military Service Debate"
 lgbtq_events.4.a:0 "Celebrate and endorse publicly"
 lgbtq_events.4.b:0 "No comment from the government"
 lgbtq_events.4.c:0 "Condemn and censor"
 lgbtq_events.4.d:0 "A beloved public figure has come out, sparking an intense national conversation about LGBTQ+ identity. Their courage has inspired many, but also drawn fury from traditionalists who see it as moral decay."
 lgbtq_events.4.f:0 "The interview aired at nine o'clock. By midnight, the switchboard had received four thousand calls — roughly half in support, half in fury."
 lgbtq_events.4.t:0 "A Public Coming Out"
 lgbtq_events.5.a:0 "Investigate as a hate crime"
 lgbtq_events.5.b:0 "Use as leverage for reform"
 lgbtq_events.5.c:0 "Downplay the incident"
 lgbtq_events.5.d:0 "A violent attack against an LGBTQ+ citizen has shocked the nation. The victim was targeted solely for their identity, and now the public demands action. Some call for hate crime legislation, others see a political opportunity."
 lgbtq_events.5.f:0 "The hospital report listed sixteen injuries. The motive column read 'suspected bias.' The suspect was known to the community."
 lgbtq_events.5.t:0 "Hate Crime"
 lgbtq_movement_crushed_modifier:0 "LGBTQ+ Movement Crushed"
 lgbtq_movement_crushed_modifier_desc:0 "The LGBTQ+ movement has been crushed. Order is restored, but at the cost of international [concept_prestige]."
