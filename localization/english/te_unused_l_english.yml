 environmental_events.1.c:0 "Launch an investigation"
 environmental_events.1.d:0 "A major [concept_pollution_system] incident has contaminated waterways and choked the air in several industrial regions. Citizens demand action as respiratory diseases spike and farmland is poisoned."
 environmental_events.1.f:0 "The children downstream wore surgical masks to school. The factory upstream posted record profits."
 environmental_events.1.t:0 "The Pollution Crisis"
 environmental_events.100.a:0 "Industry must continue"
 environmental_events.100.b:0 "We acknowledge the damage"
 environmental_events.100.desc:0 "The environmental movement has been defeated. Industrial interests have successfully lobbied against reform, and the government has failed to establish meaningful environmental protections despite the growing crisis."
 environmental_events.100.f:0 "The technology existed. The funding was available. The committee voted it down eleven to three."
 environmental_events.100.t:0 "Environmental Collapse"
