 nuke_diplo_action_action_notification_name:0 "Nuclear Weapon Industrial Strike Launched"
 nuke_success_attack_modifier_breakdown_tt:0 "#tooltip_header Attack chance contributors#!\n$TOOLTIP_DELIMITER$\n#variable [Country.MakeScope.ScriptValue('country_nuclear_weapon_attack_success_add_display')]%#! current total\n\n#variable +100%#! from $nuclear_weapons$\n#variable +50%#! from $hypersonic_weapons$\n#variable +50%#! from $orbital_weapon_platforms$\n\nThis value is the sum of this country's active bonuses to $country_nuclear_weapon_attack_success_add$."
 nuke_success_defense_modifier_breakdown_tt:0 "#tooltip_header Defense chance contributors#!\n$TOOLTIP_DELIMITER$\n#variable [Country.MakeScope.ScriptValue('country_nuclear_weapon_defense_chance_add_display')]%#! current total\n\n#variable +25%#! from $military_aviation$\n#variable +25%#! from $radar$\n#variable +50%#! from $missile_defense_systems$\n#variable +50%#! from $directed_energy_defenses$\n#variable +50%#! from $orbital_weapon_platforms$\n\nThis value is the sum of this country's active bonuses to $country_nuclear_weapon_defense_chance_add$."
 nuke_success_final_chance_breakdown_tt:0 "#tooltip_header Final success chance formula#!\n$TOOLTIP_DELIMITER$\n#variable [Country.MakeScope.ScriptValue('country_nuclear_weapon_attack_success_add_display')]%#! attack modifier\n\nThe target country's defense modifier is subtracted from this value, and the result is clamped between #variable 5%#! and #variable 100%#!.\n\nFinal displayed chance: #variable [Country.MakeScope.ScriptValue('country_nuclear_weapon_attack_success_add_display')]%#! minus target defense, then clamped."
