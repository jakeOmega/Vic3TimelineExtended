 iw_launch_comms_disruption_button:0 "Launch Comms Disruption"
 iw_launch_comms_disruption_button_desc:0 "Deploy cyber weapons to degrade enemy military communications during wartime, reducing combat effectiveness.\n\n#bold Requires:#! Available operation slot, active war.\n#bold Effect:#! Reduces enemy Offense and Defense.\n#bold Risk:#! Monthly detection chance; if detected, generates Infamy."
 iw_launch_election_interference_button:0 "Launch Election Interference"
 iw_launch_election_interference_button_desc:0 "Deploy intelligence assets to covertly interfere in a rival's elections, undermining their political legitimacy.\n\n#bold Requires:#! Available operation slot, rivalry with a foreign power, peacetime.\n#bold Effect:#! Reduces target's Legitimacy and Authority.\n#bold Risk:#! Monthly detection chance; if detected, generates Infamy."
 iw_launch_financial_subversion_button:0 "Launch Financial Subversion"
 iw_launch_financial_subversion_button_desc:0 "Deploy intelligence assets to destabilize a rival's financial system, increasing their banking crisis probability.\n\n#bold Requires:#! Available operation slot, rivalry with a foreign power, peacetime.\n#bold Effect:#! Increases target's bubble pressure.\n#bold Risk:#! Monthly detection chance; if detected, generates Infamy."
 iw_launch_infrastructure_sabotage_button:0 "Launch Infrastructure Sabotage"
 iw_launch_infrastructure_sabotage_button_desc:0 "Deploy cyber weapons to disrupt enemy infrastructure during wartime, reducing production and transport capacity.\n\n#bold Requires:#! Available operation slot, active war.\n#bold Effect:#! Reduces enemy infrastructure and throughput.\n#bold Risk:#! Monthly detection chance; if detected, generates Infamy."
 je_banking_cycle_command_economy:0 "Logistics & Allocation Gauge"
 je_banking_cycle_cooperative_ownership:0 "Cooperative Finance Dashboard"
 je_banking_cycle_reason:0 "In a Market Economy the banking cycle should be read as a liquidity and sentiment gauge: momentum captures investor-driven growth, while bubble pressure signals overvaluation and systemic fragility. Use interest-rate policy, macroprudential tightening, targeted bailouts, open-market operations, and swap lines to steer the cycle. Apply measured regulatory tightening and liquidity drains to cool speculative excess; when contagion risk appears, deploy guarantees, asset-relief, or emergency liquidity to preserve credit and the real economy. Expect political trade-offs — some tools slow growth or strain public finances."
 je_banking_cycle_reason_command_economy:0 "In a Command Economy the cycle should be read as a logistics coordination gauge: momentum and bubble pressure track supply-chain synchronization and administrative strain rather than investor confidence. Use directed credit, plan revisions, and allocation orders to resolve bottlenecks."
 je_banking_cycle_reason_cooperative_ownership:0 "Under Cooperative Ownership the cycle tracks the balance between worker consumption and capital availability. High bubble pressure reflects excessive payouts and low reinvestment; interventions include mutual aid funds and council moral suasion to prioritize long-term viability."
 je_banking_cycle_title_market:0 "Boom & Bust Cycle"
 je_civil_rights_reason:0 "Discriminated communities are demanding equal treatment under the law."
 je_colonial_empire_reason:0 "Our nation controls overseas territories that are not part of our cultural homeland. The era of decolonization is upon us - will we integrate these lands fully into our nation, or release them to self-governance?"
 je_decline_of_religion_reason:0 "Secularism spreads as organized religion loses its grip on society. The meaning vacuum creates new cultural tensions."
 je_digital_rights_reason:0 "As digital surveillance becomes ubiquitous, citizens demand privacy protections. The state must balance security against liberty in the digital age."
 je_environmental_crisis_reason:0 "Pollution and environmental degradation demand a political response. Industry and environmentalists clash over the future of our natural world."
 je_global_warming_goal:0 "Temperature reaches 4°C above pre-industrial levels"
 je_global_warming_reason:0 "Global Warming is the long-term rise in Earth's average surface temperature driven by the burning of coal and oil. Its consequences - crop failures, coastal flooding, mass displacement, and surging mortality - threaten every nation on Earth.\n\n#bold Current Temperature Anomaly:#! #v [SCOPE.GetRootScope.ScriptValue('temperature_anomaly_display')]#! °C\n#bold Cumulative Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('greenhouse_gas_emissions_display')]#!\n#bold Annual Market Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('market_greenhouse_gas_emissions_script_value_display')]#! ([SCOPE.GetRootScope.ScriptValue('market_carbon_capture_script_value_display')] from carbon capture)\n#bold Global Annual Emissions:#! #v [SCOPE.GetRootScope.ScriptValue('global_greenhouse_gas_emissions_script_value_display')]#!\n#bold Yearly Temperature Change:#! [GetPlayer.GetCustom('te_yearly_temp_change_prefix')][SCOPE.GetRootScope.ScriptValue('yearly_temperature_change_abs_display')|2]#! °C\n\n#bold Market-Leader Policies (direct emissions reduction):#!\n#bold  Carbon Tax:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_carbon_tax_script_value')]#! nations\n#bold  Renewable Investment:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_renewables_script_value')]#! nations\n#bold  Emission Standards:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_emission_standards_script_value')]#! nations\n\n#bold General Policies (available to all):#!\n#bold  Adaptation Programs:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_adaptation_script_value')]#! nations\n#bold  Reforestation Subsidies:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_reforestation_script_value')]#! nations\n#bold  Public Transit:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_public_transit_script_value')]#! nations\n#bold  Fossil Fuel Divestment:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_divestment_script_value')]#! nations\n#bold  Green Building Codes:#! #v [SCOPE.GetRootScope.ScriptValue('gw_countries_with_green_buildings_script_value')]#! nations\n\n#bold Effects:#! Climate warming scales linearly with temperature - warmer means worse. At 0.5°C warming is mild; at 1.0°C moderate; at 2.0°C severe; at 3.0°C catastrophic. Market leaders can reduce warming directly via emissions policies; all nations can invest in adaptation and resilience."
 je_human_augmentation_reason:0 "Augmentation technology forces society to confront fundamental questions about human identity. The divide between enhanced and natural citizens threatens social cohesion."
 je_human_augmentation_status_banned:0 "#R Augmentation is banned.#! A black market thrives in the shadows."
 je_human_augmentation_status_mandatory:0 "#R Mandatory augmentation#! has been decreed. Opposition grows among those who value natural humanity."
 je_human_augmentation_status_medical:0 "#Y Augmentation is limited to medical use.#! Many push for broader access."
 je_human_augmentation_status_regulated:0 "#G A regulated augmentation market exists,#! balancing innovation with safety."
 je_human_augmentation_status_unrestricted:0 "#Y Unrestricted augmentation#! is creating a growing divide between enhanced elites and natural citizens."
 je_lgbtq_rights_reason:0 "The struggle for LGBTQ+ equality demands a political response. The movement for legal recognition and equal treatment grows stronger with each passing year."
 je_mental_health_crisis_reason:0 "Modern life has produced a mental health epidemic. Depression, anxiety, and addiction sweep through the population, demanding a response."
 je_nuclear_program_goal:0 "Progress reaches #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_goal_value')]#!"
 je_nuclear_program_reason:0 "We are currently spending @innovation! #v [Country.MakeScope.ScriptValue('nuclear_weapons_program_current_cost')]#! weekly innovation on our nuclear program.\nThis gives a monthly progress of #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_monthly_progress')]#!.\n When we reach #v [Country.MakeScope.ScriptValue('nuclear_weapon_program_goal_value')]#! we will create enough nuclear weapons for another strike.\n\nWe have enough #bold Nuclear Weapons#! in our stockpile for #N [Country.MakeScope.Var('nuclear_weapon_stockpile').GetValue]#! nuclear strikes."
 je_post_scarcity_reason:0 "Automation and AI are making traditional labor obsolete. Society must decide what comes next as the old economic order crumbles."
 je_second_wave_feminism_reason:0 "A new wave of feminism demands more than suffrage. Workplace equality, reproductive rights, and cultural representation are now the battleground."
 je_second_wave_feminism_status_no_rights:0 "#R Women have no formal rights.#! The movement must fight for the most basic protections."
 je_second_wave_feminism_status_property:0 "#Y Women have gained property rights,#! but the fight for equality continues."
 je_second_wave_feminism_status_suffrage:0 "#G Women can vote,#! but workplace discrimination and cultural barriers persist."
 je_united_nations_goal:0 "The United Nations persists as long as the international order endures."
 je_united_nations_reason:0 "The United Nations is an intergovernmental organization promoting international cooperation. As a member, your country gains diplomatic benefits that #bold scale with UN Authority#!.\n\n#bold UN Authority#! (0–100) measures institutional legitimacy:\n• Drifts toward 50 each month (±0.5)\n• #G Great Powers with Humanitarian Regulations: +0.2/month each#!\n• #R Wars between member states: −1/month each#!\n• Joining programs raises it; defying resolutions lowers it\n\n#bold Membership Benefits#! (when Authority ≥ 30):\nScaled by Authority ÷ 50: at 50 you get 1× base benefit (#bold +5 Diplo Rep#!, #bold +1% Research#!, #bold +25 Prestige#!). At 100, 2×.\n\n#bold Security Council:#! First 5 Great Powers to join get permanent seats (+10 Diplo Rep, +20 Leverage, +25 Authority). Lost if you leave or drop below GP rank.\n\n#bold Headquarters:#! First signatory hosts HQ (+10 Diplo Rep, +100 Prestige, +10 Leverage).\n\n#bold Specialized Agencies#! (7) are created when members first adopt resolutions on each topic: WHO (health), UNESCO (heritage), ICJ (justice), UNHRC (human rights), IAEA (nuclear), UNEP (environment), UNHCR (refugees).\n\n#bold Resolutions & Events:#!\nEach month, UN members may receive resolution events based on a weighted random draw. Eligibility depends on your country's rank, laws, technologies, and current programs. Events fire individually: not all members receive the same event. Higher-rank nations see more diplomatic and reform events; all members can receive humanitarian, heritage, and arms control proposals.\n\n#bold Available Programs:#!\n• Peacekeeping: +5 Diplo Rep, +25 Prestige, +3% Military Costs\n• Development: +5 Diplo Rep, +25 Prestige, −50 Bureaucracy\n• Human Rights: +5 Diplo Rep, +25 Prestige, +5% Institution Speed\n• Arms Control: +5 Diplo Rep, −5% Kill Rate, −15% Devastation\n• Sanctions: Target a rival with −15% Trade Competitiveness"
