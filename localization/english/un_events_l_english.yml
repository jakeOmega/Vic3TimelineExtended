l_english:
 je_united_nations:0 "United Nations"
 je_un_status_not_member:0 "#v Not a member.#! Join to gain diplomatic benefits and participate in global governance."
 je_un_status_member:0 "#G Active member.#! Participating in UN governance and eligible for all resolutions."
 je_un_authority_collapsed:0 "#R UN Authority: Collapsed.#! The institution has lost all credibility. Member states act unilaterally."
 je_un_authority_weak:0 "#Y UN Authority: Weak.#! Resolutions are routinely ignored. The institution struggles for relevance."
 je_un_authority_moderate:0 "#v UN Authority: Moderate.#! The UN functions but lacks teeth. Major powers comply selectively."
 je_un_authority_strong:0 "#G UN Authority: Strong.#! Resolutions carry real weight. Most nations respect the international order."
 je_un_authority_dominant:0 "#B UN Authority: Dominant.#! The UN shapes global policy. Defying it carries severe consequences."
 je_un_active_policies:0 "Active policies are shown above. Use buttons to join, propose resolutions, or contribute to programs."
 un_authority_progress_desc:0 "UN Authority represents the legitimacy and enforcement power of the United Nations. Higher authority means resolutions carry more weight and members gain greater benefits."
 un_authority_bar_name:0 "UN Authority"
 un_authority_bar_desc:0 "The collective legitimacy and enforcement power of the United Nations. Rises when members cooperate, falls when they defy resolutions or go to war with each other."
 UN_JOIN:0 "Join the United Nations"
 UN_JOIN_DESC:0 "Become a member of the United Nations, gaining diplomatic benefits and the ability to participate in resolutions, peacekeeping, and international governance."
 UN_LEAVE:0 "Leave the United Nations"
 UN_LEAVE_DESC:0 "Withdraw from the United Nations. All UN policies and benefits will be removed, and our diplomatic reputation will suffer."
 UN_PROPOSE_SANCTIONS:0 "Propose Sanctions"
 UN_PROPOSE_SANCTIONS_DESC:0 "Propose UN sanctions against a rival state, reducing their trade competitiveness and diplomatic standing. Requires Major Power rank."
 UN_LIFT_SANCTIONS:0 "Lift Sanctions"
 UN_LIFT_SANCTIONS_DESC:0 "Remove all UN sanctions currently in effect. Reduces UN Authority slightly."
 UN_PEACEKEEPING:0 "Contribute to Peacekeeping"
 UN_PEACEKEEPING_DESC:0 "Commit military resources to UN peacekeeping operations, boosting our diplomatic reputation and prestige at the cost of military upkeep."
 UN_END_PEACEKEEPING:0 "End Peacekeeping Contribution"
 UN_END_PEACEKEEPING_DESC:0 "Withdraw our forces from peacekeeping operations."
 UN_FUND_DEVELOPMENT:0 "Fund Development Programs"
 UN_FUND_DEVELOPMENT_DESC:0 "Contribute to UN development programs, boosting diplomatic reputation and prestige but requiring additional bureaucracy."
 UN_DEFUND_DEVELOPMENT:0 "Withdraw Development Funding"
 UN_DEFUND_DEVELOPMENT_DESC:0 "Stop contributing to UN development programs."
 UN_HUMAN_RIGHTS:0 "Champion Human Rights Resolution"
 UN_HUMAN_RIGHTS_DESC:0 "Push for a human rights resolution at the UN, boosting our reputation and institutional reform speed. Requires progressive laws."
 UN_WITHDRAW_HUMAN_RIGHTS:0 "Withdraw Human Rights Support"
 UN_WITHDRAW_HUMAN_RIGHTS_DESC:0 "Withdraw our support for human rights resolutions."
 UN_ARMS_CONTROL:0 "Join Arms Control Treaty"
 UN_ARMS_CONTROL_DESC:0 "Participate in UN arms control agreements, reducing military devastation and kill rates but limiting military flexibility. Requires war crimes limitations."
 UN_WITHDRAW_ARMS_CONTROL:0 "Withdraw from Arms Control"
 UN_WITHDRAW_ARMS_CONTROL_DESC:0 "Withdraw from arms control agreements."
 un_events.1.t:0 "The United Nations Charter"
 un_events.1.d:0 "In the aftermath of devastating global conflict, the nations of the world have come together to establish an international body dedicated to maintaining peace, fostering cooperation, and preventing the horrors of war from recurring. The charter of the United Nations has been drafted, and [ROOT.GetCountry.GetName] has been invited to sign as a founding member.\n\nThis organization promises a forum for resolving disputes, coordinating humanitarian relief, and building a rules-based international order. But membership carries obligations — we must accept the jurisdiction of international courts, contribute to collective security, and sometimes subordinate national interests to the common good."
 un_events.1.f:0 "We the peoples of the United Nations, determined to save succeeding generations from the scourge of war..."
 un_events.1.a:0 "Sign the Charter. We believe in this vision."
 un_events.1.b:0 "We shall observe, but not yet commit."
 un_events.1.c:0 "This undermines our sovereignty."
 un_events.2.t:0 "General Assembly Condemns Aggression"
 un_events.2.d:0 "The General Assembly has convened an emergency session to address the military aggression of [SCOPE.sCountry('condemned_country').GetName]. Delegates from around the world are calling for a formal condemnation resolution. As a member state, [ROOT.GetCountry.GetName] must decide how to vote.\n\nLeading the condemnation would enhance our diplomatic standing significantly, but it will harden the lines of the conflict. Abstaining preserves our flexibility but undermines the institution."
 un_events.2.f:0 "The eyes of the world are upon this assembly."
 un_events.2.a:0 "Lead the condemnation resolution."
 un_events.2.b:0 "Vote in favor, but let others lead."
 un_events.2.c:0 "We shall abstain from this vote."
 un_events.3.t:0 "Declaration of Universal Human Rights"
 un_events.3.d:0 "A landmark declaration has been proposed at the United Nations — a Universal Declaration of Human Rights that would establish fundamental freedoms as the common standard for all peoples and nations. The declaration covers civil, political, economic, and social rights.\n\nRatifying it fully would signal our commitment to the international order, but its provisions may conflict with some of our domestic policies. We could sign with reservations, preserving our sovereignty on sensitive matters, or reject it outright."
 un_events.3.f:0 "All human beings are born free and equal in dignity and rights."
 un_events.3.a:0 "Ratify the declaration in full."
 un_events.3.b:0 "Sign with reservations."
 un_events.3.c:0 "We will not be bound by this."
 un_events.4.t:0 "Peacekeeping Mission Authorized"
 un_events.4.d:0 "The United Nations Security Council has authorized a peacekeeping mission in the conflict zone involving [SCOPE.sCountry('peacekeeping_target').GetName]. As a committed peacekeeping contributor, [ROOT.GetCountry.GetName] has been called upon to provide troops for the operation.\n\nA full deployment would be costly in both money and political capital, but would significantly boost our international standing. We could send observers instead — a lighter commitment with less impact — or decline entirely."
 un_events.4.f:0 "Blue helmets deploying to a shattered land."
 un_events.4.a:0 "Deploy a full peacekeeping force."
 un_events.4.b:0 "Send observers only."
 un_events.4.c:0 "We cannot spare the resources."
 un_events.5.t:0 "Enforcing the Sanctions Regime"
 un_events.5.d:0 "The UN sanctions against [SCOPE.sCountry('sanctioned_country').GetName] are now in effect, but enforcement requires active cooperation from member states. Strictly complying with the sanctions will hurt our own trade routes and upset domestic business interests. However, the alternative — quietly circumventing the sanctions — would undermine the very institution we helped create."
 un_events.5.f:0 "The machinery of international order grinds slowly, but it grinds."
 un_events.5.a:0 "Enforce the sanctions strictly."
 un_events.5.b:0 "Partial compliance — the letter of the law."
 un_events.5.c:0 "Quietly profit from the gaps."
 un_events.6.t:0 "UN Reform: Expanding the Security Council"
 un_events.6.d:0 "A growing coalition of nations is demanding reform of the United Nations Security Council. The current structure, with its permanent members and veto power, is seen as increasingly outdated and unrepresentative. As a great power, [ROOT.GetCountry.GetName] must decide whether to champion reform, defend the status quo that benefits us, or propose a compromise.\n\nReform would boost UN Authority and global legitimacy but dilute our own influence. Defending the status quo preserves our power but risks making the institution irrelevant."
 un_events.6.f:0 "The architecture of 1945 strains under the weight of a changed world."
 un_events.6.a:0 "Champion reform. The UN must evolve."
 un_events.6.b:0 "Defend the status quo. Our veto is sacred."
 un_events.6.c:0 "Propose a middle path."
 un_events.7.t:0 "Humanitarian Crisis Demands Response"
 un_events.7.d:0 "Reports from [SCOPE.sCountry('crisis_country').GetName] paint a dire picture — widespread famine, displacement, and suffering on a massive scale. The United Nations has issued an urgent appeal for humanitarian assistance from member states. A major contribution would drain our treasury but cement our reputation as a responsible global power. We could make a token contribution, or declare that this crisis falls outside our sphere of concern."
 un_events.7.f:0 "The measure of a civilization is how it treats its most vulnerable."
 un_events.7.a:0 "Mount a major humanitarian relief effort."
 un_events.7.b:0 "Contribute what we can spare."
 un_events.7.c:0 "This is not our responsibility."
 un_events.8.t:0 "International Court Rules Against Us"
 un_events.8.d:0 "The International Court of Justice has issued a ruling against [ROOT.GetCountry.GetName], citing violations of international humanitarian law. The ruling is non-binding but carries enormous symbolic weight. Compliance would require us to modify our military conduct and potentially pay reparations — a bitter pill for our military establishment. But defying the court would severely damage UN Authority and our international standing."
 un_events.8.f:0 "Justice delayed is justice denied, but justice imposed may be justice rejected."
 un_events.8.a:0 "Accept the ruling. We must uphold the law."
 un_events.8.b:0 "Contest the court's jurisdiction."
 un_events.8.c:0 "We do not recognize this verdict."
 un_events.9.t:0 "UNESCO: Protecting World Heritage"
 un_events.9.d:0 "The United Nations Educational, Scientific and Cultural Organization has launched an ambitious program to identify and preserve sites of outstanding cultural and natural heritage around the world. Several sites within [ROOT.GetCountry.GetName] have been nominated. Full participation would boost our prestige and cultural standing, though it requires funding and accepting international oversight of heritage sites."
 un_events.9.f:0 "Heritage is our legacy to the future — it must not perish with us."
 un_events.9.a:0 "Fully fund our heritage preservation program."
 un_events.9.b:0 "Participate with limited funding."
 un_events.9.c:0 "Culture is a domestic matter."
 un_events.10.t:0 "The United Nations in Crisis"
 un_events.10.d:0 "The United Nations faces a crisis of legitimacy. Resolutions are routinely ignored, great powers act unilaterally, and member states question whether the institution serves any purpose beyond providing a venue for empty speeches. As a great power and founding member, [ROOT.GetCountry.GetName] is in a unique position to either rally support for the institution or let it fade into irrelevance.\n\nReviving the UN would require significant diplomatic investment, but a functional international order serves everyone's long-term interests."
 un_events.10.f:0 "The United Nations was not created to take mankind to heaven, but to save humanity from hell."
 un_events.10.a:0 "Rally the world. The UN must survive."
 un_events.10.b:0 "Propose incremental reforms."
 un_events.10.c:0 "The UN has failed. Let it go."
 un_member_modifier:0 "UN Member State"
 un_member_modifier_desc:0 "This country is a member of the United Nations, gaining diplomatic benefits and participating in international governance."
 un_membership_benefits_modifier:0 "UN Membership Benefits"
 un_membership_benefits_modifier_desc:0 "Scaled benefits from UN membership. Higher UN Authority means greater rewards for cooperation."
 un_withdrawal_penalty_modifier:0 "UN Withdrawal Consequences"
 un_withdrawal_penalty_modifier_desc:0 "Having withdrawn from the United Nations, this country faces a temporary reduction in diplomatic reputation and prestige."
 un_expelled_cooldown:0 "Expelled from the UN"
 un_expelled_cooldown_desc:0 "This country has been expelled from the United Nations and cannot rejoin for some time."
 un_founding_member_modifier:0 "UN Founding Member"
 un_founding_member_modifier_desc:0 "As a founding member of the United Nations, this country enjoys enhanced prestige and diplomatic influence."
 un_observer_status_modifier:0 "UN Observer Status"
 un_observer_status_modifier_desc:0 "This country holds observer status at the United Nations — present but not fully committed."
 un_rejectionist_modifier:0 "UN Rejectionist"
 un_rejectionist_modifier_desc:0 "This country has rejected the United Nations, strengthening domestic authority but damaging international standing."
 un_ga_resolution_modifier:0 "General Assembly Resolution Participant"
 un_ga_resolution_modifier_desc:0 "This country recently participated in a UN General Assembly resolution."
 un_condemnation_leader_modifier:0 "Led UN Condemnation"
 un_condemnation_leader_modifier_desc:0 "This country led a condemnation resolution at the UN General Assembly, enhancing its diplomatic reputation."
 un_human_rights_declaration_modifier:0 "Human Rights Declaration Ratified"
 un_human_rights_declaration_modifier_desc:0 "Having ratified the Universal Declaration of Human Rights, this country gains prestige and institutional reform momentum."
 un_human_rights_reservations_modifier:0 "Human Rights Declaration — With Reservations"
 un_human_rights_reservations_modifier_desc:0 "This country has signed the Universal Declaration of Human Rights with reservations on certain provisions."
 un_human_rights_refusal_modifier:0 "Refused Human Rights Declaration"
 un_human_rights_refusal_modifier_desc:0 "This country has refused to sign the Universal Declaration of Human Rights, strengthening domestic authority but damaging its international image."
 un_human_rights_champion_modifier:0 "Human Rights Champion"
 un_human_rights_champion_modifier_desc:0 "This country is actively championing human rights at the United Nations."
 un_peacekeeping_contributor_modifier:0 "UN Peacekeeping Contributor"
 un_peacekeeping_contributor_modifier_desc:0 "This country contributes troops and resources to UN peacekeeping operations, boosting diplomatic reputation at a military cost."
 un_peacekeeping_deployed_modifier:0 "Peacekeeping Force Deployed"
 un_peacekeeping_deployed_modifier_desc:0 "A full peacekeeping contingent has been deployed under our flag, significantly boosting our international standing."
 un_observer_mission_modifier:0 "Observer Mission Active"
 un_observer_mission_modifier_desc:0 "This country has sent observers to a conflict zone under UN auspices."
 un_peacekeeping_cooldown:0 "Peacekeeping Commitment Active"
 un_peacekeeping_cooldown_desc:0 "A peacekeeping commitment is already in effect."
 un_sanctions_enforcer_modifier:0 "Sanctions Enforcer"
 un_sanctions_enforcer_modifier_desc:0 "This country is enforcing UN sanctions against a target state."
 un_sanctions_target_modifier:0 "Under UN Sanctions"
 un_sanctions_target_modifier_desc:0 "This country is under UN sanctions, suffering severe trade and diplomatic penalties."
 un_sanctions_cooldown:0 "Recent Sanctions Action"
 un_sanctions_cooldown_desc:0 "A sanctions action was recently taken."
 un_sanctions_enforcement_modifier:0 "Strict Sanctions Enforcement"
 un_sanctions_enforcement_modifier_desc:0 "Strictly enforcing UN sanctions, this country takes a small trade hit but gains significant diplomatic credibility."
 un_sanctions_partial_modifier:0 "Partial Sanctions Compliance"
 un_sanctions_partial_modifier_desc:0 "This country is partially complying with UN sanctions — enough to avoid condemnation, but not enough to impress."
 un_sanctions_busting_modifier:0 "Sanctions Busting"
 un_sanctions_busting_modifier_desc:0 "This country is quietly circumventing UN sanctions for commercial advantage, at the cost of diplomatic reputation."
 un_development_contributor_modifier:0 "UN Development Contributor"
 un_development_contributor_modifier_desc:0 "This country contributes to UN development programs, boosting diplomatic reputation and prestige at a bureaucratic cost."
 un_arms_control_participant_modifier:0 "Arms Control Participant"
 un_arms_control_participant_modifier_desc:0 "This country participates in UN arms control agreements, reducing military devastation and costs."
 un_reform_champion_modifier:0 "UN Reform Champion"
 un_reform_champion_modifier_desc:0 "This country is championing UN reform, pushing for a more representative and effective institution."
 un_reform_opponent_modifier:0 "UN Reform Opponent"
 un_reform_opponent_modifier_desc:0 "This country is blocking UN reform, defending the existing power structure."
 un_reform_compromise_modifier:0 "UN Reform Compromise"
 un_reform_compromise_modifier_desc:0 "This country has proposed a compromise on UN reform, balancing institutional effectiveness with political reality."
 un_humanitarian_aid_modifier:0 "Major Humanitarian Aid Contributor"
 un_humanitarian_aid_modifier_desc:0 "This country has mounted a major humanitarian relief effort through the United Nations."
 un_humanitarian_token_modifier:0 "Humanitarian Aid Contributor"
 un_humanitarian_token_modifier_desc:0 "This country has made a modest contribution to UN humanitarian relief."
 un_court_compliance_modifier:0 "ICJ Ruling Compliance"
 un_court_compliance_modifier_desc:0 "This country has accepted an International Court of Justice ruling, boosting its standing in the international legal order."
 un_court_contested_modifier:0 "ICJ Jurisdiction Contested"
 un_court_contested_modifier_desc:0 "This country is contesting the jurisdiction of the International Court of Justice."
 un_court_defiance_modifier:0 "ICJ Ruling Defied"
 un_court_defiance_modifier_desc:0 "This country has openly defied an International Court of Justice ruling, severely damaging its international reputation."
 un_heritage_program_modifier:0 "UNESCO Heritage Program"
 un_heritage_program_modifier_desc:0 "This country is fully participating in the UNESCO world heritage preservation program."
 un_heritage_token_modifier:0 "UNESCO Heritage Participant"
 un_heritage_token_modifier_desc:0 "This country has made a modest contribution to UNESCO heritage preservation."
 un_authority_restored_modifier:0 "UN Authority Restored"
 un_authority_restored_modifier_desc:0 "This country has successfully rallied support to restore the United Nations' authority and legitimacy."
 un_authority_crisis_modifier:0 "UN Authority Weakened"
 un_authority_crisis_modifier_desc:0 "The United Nations is in crisis, and incremental reforms are underway."
 un_events.1.d_council:0 "The workers of the world have long dreamed of international solidarity — now, in the aftermath of devastating global conflict, that dream takes institutional form. A new organization, the United Nations, has been proposed to maintain peace and foster cooperation among nations. For [ROOT.GetCountry.GetName], this represents an opportunity to shape the world order in the interest of the working class.\n\nOf course, the capitalist powers seek to use this body as a tool for their own hegemony. But refusing to participate would cede the field entirely. We must decide: join and fight for the people's agenda from within, or reject this bourgeois institution outright."
 un_events.1.d_authoritarian:0 "In the aftermath of devastating global conflict, the nations of the world have come together to establish an international body — the United Nations. For [ROOT.GetCountry.GetName], this institution presents both opportunity and risk. A seat at the table means influence over the emerging world order and a voice in disputes that might otherwise be settled by force.\n\nBut membership carries obligations — accepting the jurisdiction of international courts, contributing to collective security, and tolerating the interference of lesser powers in our affairs. The question is whether the benefits of legitimacy outweigh the constraints on our sovereignty."
 un_events.1.d_theocratic:0 "In the wake of devastating global conflict, the nations of the world have proposed a new institution — the United Nations — dedicated to maintaining peace and fostering cooperation. For [ROOT.GetCountry.GetName], guided as we are by divine law, this represents a test of faith: can an assembly of nations with vastly different moral foundations truly serve justice?\n\nThe charter speaks of universal human rights and dignity — principles we recognize, though we ground them in sacred truth rather than secular philosophy. Membership would give us a platform to advocate for moral governance. But it would also mean accepting the equal standing of nations whose laws offend the divine order."
 un_events.3.d_council:0 "A Universal Declaration of Human Rights has been proposed at the United Nations. For [ROOT.GetCountry.GetName], this declaration is a complex matter — it affirms many rights that our revolution was fought to secure: the right to work, to education, to social security, and to an adequate standard of living.\n\nBut the declaration also enshrines bourgeois civil liberties that have historically been used to protect the privileges of the exploiting class. Ratifying it could be seen as endorsing the capitalist conception of freedom. We could sign with reservations, emphasizing economic rights while rejecting provisions that would undermine the people's state."
 un_events.3.d_theocratic:0 "A Universal Declaration of Human Rights has been proposed at the United Nations. For [ROOT.GetCountry.GetName], where law derives from divine authority, this secular declaration poses fundamental questions. Some of its provisions align with our sacred teachings — the dignity of the person, the prohibition of torture, the right to education.\n\nBut other provisions contradict our understanding of the divine order, particularly concerning freedom of religion and the equality of all beliefs. Ratifying it fully would mean accepting principles that challenge the foundations of our governance. We could sign with reservations, acknowledging the rights we share while preserving our sacred law."
 un_events.3.d_authoritarian:0 "A Universal Declaration of Human Rights has been proposed at the United Nations. The declaration, drafted by a committee of idealists, purports to establish fundamental freedoms as a universal standard. For [ROOT.GetCountry.GetName], where the state ensures order and stability, many of these so-called rights are luxuries that would undermine the strength of the nation.\n\nFreedom of the press, freedom of assembly, freedom from arbitrary detention — these are tools of subversion dressed up as principles. Yet refusing to sign entirely would make us a pariah. Perhaps we can sign with reservations, preserving the appearance of cooperation while protecting our authority."
 un_events.6.d_council:0 "A growing coalition of nations is demanding reform of the United Nations Security Council. The current structure, with its permanent members and veto power, reflects the power dynamics of an earlier era. As a council republic, [ROOT.GetCountry.GetName] is uniquely positioned in this debate — we can champion democratic reform of the international order, arguing that the veto power of a few great powers is fundamentally undemocratic.\n\nBut reform carries risks. A more representative council might also be more hostile to our system of governance. And abolishing the veto would mean losing our own ability to block resolutions that threaten the revolutionary project."
 un_events.6.d_authoritarian:0 "A growing coalition of nations is demanding reform of the United Nations Security Council. The current structure, with its permanent members and veto power, is under attack from those who call it undemocratic and unrepresentative. For [ROOT.GetCountry.GetName], the veto power is an essential tool — it ensures that no resolution can be passed that fundamentally threatens our interests.\n\nChampioning reform might buy goodwill with the international community, but it would dilute our own influence. The pragmatic choice is to defend the status quo, perhaps with cosmetic concessions that change nothing of substance."
 un_events.6.d_hq:0 "\n\nDelegates have gathered at the United Nations headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the halls are thick with backroom deals and passionate speeches. The outcome of this debate will shape the institution for decades to come."
 un_events.10.d_authoritarian:0 "The United Nations faces a crisis of legitimacy — and from our perspective, it has been a crisis long in the making. Resolutions are flouted, great powers act without consequence, and the institution increasingly serves as a platform for moral grandstanding rather than practical statecraft. For [ROOT.GetCountry.GetName], the question is whether to invest further in an institution that constrains us, or to let it wither.\n\nA functional international order might serve our interests by providing legitimacy for our actions. But a weak UN might serve us even better, by leaving us free to act without the pretense of collective consent."
 un_events.10.d_council:0 "The United Nations faces a crisis of legitimacy. For [ROOT.GetCountry.GetName], this crisis exposes the fundamental contradiction at the heart of the institution — it was designed to preserve a world order that serves capitalist interests, and now that order is crumbling. The question is whether we should try to salvage this bourgeois institution or accelerate its collapse.\n\nReviving the UN could serve the revolutionary cause if we can redirect its agenda toward genuine equality between nations. But propping up a failing institution may only delay the emergence of a truly just international order."
 un_events.11.t:0 "Security Council Veto Crisis"
 un_events.11.d:0 "[SCOPE.sCountry('veto_power').GetName] has exercised its veto power in the Security Council, blocking a resolution that had broad support among member states. The vetoed resolution would have authorized collective action to address a growing international crisis, but the veto has killed it.\n\nAs a great power, [ROOT.GetCountry.GetName] must decide how to respond. We could publicly denounce the veto and build a coalition to isolate the obstructionist, accept the outcome as the normal functioning of the institution, or use this moment to push for fundamental reform of the veto system itself."
 un_events.11.d_council:0 "The council republic of [SCOPE.sCountry('veto_power').GetName] has wielded its veto in the Security Council, blocking a resolution supported by the majority of member states. The [SCOPE.sCountry('veto_power').GetAdjectiveName] delegation invoked the right of sovereign nations to resist imperialist coercion, but critics see this as a cynical power play that undermines the collective will.\n\nAs a great power, [ROOT.GetCountry.GetName] must decide how to respond. We could denounce this as an abuse of power, accept the veto as legitimate procedure, or push to abolish the veto system entirely."
 un_events.11.d_authoritarian:0 "[SCOPE.sCountry('veto_power').GetName] has deployed its veto in the Security Council, crushing a resolution that had been carefully negotiated among the other great powers. The [SCOPE.sCountry('veto_power').GetAdjectiveName] regime shows no interest in the niceties of multilateral diplomacy — only in preserving its own power and sphere of influence.\n\nAs a great power, [ROOT.GetCountry.GetName] must decide how to respond. A public denunciation would score diplomatic points, accepting the outcome preserves institutional stability, or we could seize this moment to propose reforms that serve our interests."
 un_events.11.d_theocratic:0 "The theocratic government of [SCOPE.sCountry('veto_power').GetName] has exercised its veto in the Security Council, blocking a resolution on moral grounds rooted in their interpretation of divine law. While some sympathize with the principle of moral governance, others see this as an unacceptable imposition of one nation's religious beliefs on the international order.\n\nAs a great power, [ROOT.GetCountry.GetName] must decide how to respond to this crisis of institutional authority."
 un_events.11.f:0 "The veto — shield of the powerful, bane of the collective will."
 un_events.11.a:0 "Denounce this obstruction publicly."
 un_events.11.b:0 "The veto is legitimate procedure."
 un_events.11.c:0 "Propose abolishing the veto entirely."
 un_events.12.t:0 "Decolonization Resolution"
 un_events.12.d:0 "The General Assembly is debating a sweeping resolution calling for the immediate end of colonialism in all its forms. Dozens of newly independent nations and their supporters are demanding that the great powers relinquish their overseas territories and grant self-determination to all peoples.\n\nFor [ROOT.GetCountry.GetName], this debate touches on fundamental questions of sovereignty, development, and the international order. Supporting decolonization would align us with the majority of the Assembly, but it may set precedents that complicate our own interests."
 un_events.12.d_council:0 "The General Assembly is debating a resolution on the immediate end of colonialism. For [ROOT.GetCountry.GetName], this is a cause that strikes at the heart of our revolutionary principles — the liberation of oppressed peoples from imperialist exploitation. Our delegation has been vocal in demanding that the colonial powers answer for centuries of plunder.\n\nSupporting a strong resolution would cement our leadership of the anti-colonial movement and embarrass the capitalist powers. But even our allies may chafe if the resolution's language is turned against our own relationships with fraternal states."
 un_events.12.d_colonial:0 "The General Assembly is debating a resolution calling for the immediate end of colonialism — and [ROOT.GetCountry.GetName], as a power with overseas dependencies, finds itself squarely in the crosshairs. The resolution's sponsors argue that all colonial relationships are inherently exploitative, regardless of whatever development programs we may point to.\n\nOur colonial administration has brought infrastructure, education, and stability to these territories — or so we tell ourselves. The question is whether to defend our record and resist the resolution, or to accept the changing tide and begin a managed transition."
 un_events.12.f:0 "The wind of change is blowing through the Assembly halls."
 un_events.12.a:0 "Champion decolonization. Free all peoples!"
 un_events.12.b:0 "Defend our development programs."
 un_events.12.c:0 "Call for a gradual, orderly transition."
 un_events.13.t:0 "Ideological Confrontation at the Assembly"
 un_events.13.d:0 "Tensions between rival great powers have erupted into open confrontation at the United Nations General Assembly. [SCOPE.sCountry('ideological_rival').GetName] and [ROOT.GetCountry.GetName] represent fundamentally different visions for the world — and both sides have marshaled their allies to dominate the Assembly's agenda.\n\nDelegations are choosing sides. Non-aligned nations watch nervously as the two blocs trade accusations and threats. The question is whether to escalate the confrontation, seek détente, or make a dramatic gesture."
 un_events.13.d_vs_council:0 "The council republic of [SCOPE.sCountry('ideological_rival').GetName] has turned the General Assembly into a platform for revolutionary agitation. Their delegation denounces [ROOT.GetCountry.GetName] and our allies as tools of capitalist exploitation, calling for the oppressed peoples of the world to rise up. Our own allies respond with equal fervor, defending the principles of individual liberty and market freedom.\n\nThe Assembly has become a battleground between two irreconcilable worldviews. Non-aligned nations are being pressured to choose sides."
 un_events.13.d_vs_authoritarian:0 "The authoritarian regime of [SCOPE.sCountry('ideological_rival').GetName] has been flexing its muscle at the General Assembly, using its bloc of client states to push resolutions that serve its geopolitical agenda. [ROOT.GetCountry.GetName] finds itself leading the opposition, rallying nations who reject the [SCOPE.sCountry('ideological_rival').GetAdjectiveName] model of governance.\n\nThe confrontation is not just about policy — it is about what kind of world order will prevail. Democracy versus autocracy, cooperation versus domination."
 un_events.13.d_vs_theocratic:0 "The theocratic government of [SCOPE.sCountry('ideological_rival').GetName] has brought its religious crusade to the floor of the General Assembly, demanding that international law be reformed to reflect divine moral principles. [ROOT.GetCountry.GetName] and our secular allies have pushed back, defending the separation of religious authority from international governance.\n\nThe debate has exposed deep fault lines between nations that ground their laws in faith and those that ground them in reason."
 un_events.13.d_vs_monarchy:0 "The monarchist establishment of [SCOPE.sCountry('ideological_rival').GetName] has been rallying traditional powers to resist the modernizing agenda at the Assembly. Their delegation speaks of ancient rights, divine mandate, and the dangers of unchecked populism. [ROOT.GetCountry.GetName] and our allies stand on the other side of this divide.\n\nThe confrontation reflects a deeper struggle between the old order and the new — between those who look backward and those who push forward."
 un_events.13.d_hq:0 "\n\nThe confrontation plays out in the Assembly hall at the United Nations headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the galleries are packed with journalists and the corridors echo with urgent whispers."
 un_events.13.f:0 "The Assembly hall crackles with ideological fire."
 un_events.13.a:0 "Champion our way of life."
 un_events.13.b:0 "Call for peaceful coexistence."
 un_events.13.c:0 "Walk out in protest."
 un_events.14.t:0 "Nuclear Non-Proliferation Treaty"
 un_events.14.d:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty — a binding agreement to prevent the spread of nuclear weapons, promote disarmament, and facilitate the peaceful use of nuclear energy. For [ROOT.GetCountry.GetName], without nuclear weapons of our own, the treaty offers protection from proliferation by rival states.\n\nSigning would demonstrate our commitment to international security, but it would also constrain our future options should the strategic situation change."
 un_events.14.d_nuclear:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. As a nuclear-armed state, [ROOT.GetCountry.GetName] occupies a complicated position — the treaty would legitimize our existing arsenal while preventing rivals from developing their own. But it also commits us to eventual disarmament, and accepting international inspections would limit our strategic flexibility.\n\nThe military establishment argues that our deterrent is non-negotiable. The diplomatists counter that signing would enhance our prestige and reduce the risk of proliferation by hostile powers."
 un_events.14.d_aspiring:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. The timing could not be worse for [ROOT.GetCountry.GetName] — our nuclear program is underway but not yet complete. Signing this treaty would effectively end our pursuit of the ultimate deterrent, locking us into a position of nuclear inferiority.\n\nBut refusing to sign would make us a pariah and invite international sanctions. We face a stark choice between strategic capability and diplomatic acceptance."
 un_events.14.f:0 "The atom splits the world into those who have the bomb and those who do not."
 un_events.14.a:0 "Sign the Non-Proliferation Treaty."
 un_events.14.b:0 "Sign with reservations on existing arsenals."
 un_events.14.c:0 "Our deterrent is non-negotiable."
 un_events.15.t:0 "International Trade Dispute"
 un_events.15.d:0 "A major trade dispute between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('trade_rival').GetName] has been brought before the United Nations for arbitration. Both sides accuse the other of unfair practices — dumping goods below cost, subsidizing domestic industries, and erecting hidden trade barriers.\n\nAccepting international arbitration would demonstrate our commitment to the rules-based order, but the ruling might not favor us. Alternatively, we could negotiate a bilateral deal or simply impose our own tariffs."
 un_events.15.d_command:0 "A trade dispute between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our command economy operates on fundamentally different principles than the market systems of most other nations — state-directed production and pricing are seen by our rivals as inherently unfair.\n\nAccepting international arbitration would mean subjecting our economic model to judgment by institutions designed for capitalist economies. But escalating the dispute risks isolation."
 un_events.15.d_protectionist:0 "A trade dispute between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our protectionist trade policies, designed to nurture domestic industry and preserve jobs, are under attack as violations of free trade principles.\n\nAccepting international arbitration might force us to lower our tariffs, gutting protections our industries depend on. But refusing to engage risks diplomatic isolation and retaliatory sanctions."
 un_events.15.f:0 "When goods don't cross borders, armies eventually will."
 un_events.15.a:0 "Accept international arbitration."
 un_events.15.b:0 "Negotiate a bilateral deal."
 un_events.15.c:0 "Impose unilateral tariffs."
 un_events.16.t:0 "Global Pandemic Response"
 un_events.16.d:0 "A devastating pandemic is sweeping across continents, and the World Health Organization — a United Nations body — is coordinating the international response. Member states are being asked to share medical data, pool vaccine research, and contribute to a global stockpile of treatments.\n\nFor [ROOT.GetCountry.GetName], full cooperation would mean sharing sensitive health data and potentially diverting scarce medical resources abroad. But a coordinated response could end the crisis faster and save lives everywhere, including among our own people."
 un_events.16.d_authoritarian:0 "A pandemic is ravaging the world, and the WHO is coordinating the response. For [ROOT.GetCountry.GetName], our centralized system of governance gives us tools that democratic nations lack — we can impose quarantines, direct production, and control information with an efficiency that the liberal world can only envy.\n\nThe question is whether to share our methods and resources with the international community, or to focus entirely on protecting our own population. Cooperation means opening our borders to foreign inspectors and sharing data we would rather keep secret."
 un_events.16.d_liberal:0 "A pandemic is sweeping across the world, and the WHO is calling for a coordinated international response. For [ROOT.GetCountry.GetName], our open society and free press mean the crisis is already front-page news — the public demands action, and our elected officials must respond.\n\nFull cooperation with the UN would demonstrate global leadership and might accelerate a solution. But it also means diverting resources from our own citizens, and sharing research that our pharmaceutical companies have invested heavily in developing."
 un_events.16.f:0 "Disease respects no borders, no ideology, no flag."
 un_events.16.a:0 "Full cooperation. Share everything."
 un_events.16.b:0 "Cooperate selectively."
 un_events.16.c:0 "Our people come first."
 un_events.17.t:0 "Climate Change Resolution"
 un_events.17.d:0 "The United Nations has proposed a binding resolution on climate change, requiring member states to commit to specific emissions reduction targets and submit to international monitoring. The scientific consensus is clear, but the economic costs of compliance are staggering.\n\nFor [ROOT.GetCountry.GetName], this resolution represents a test of our commitment to the international order versus our economic interests. Binding targets would constrain our industrial development, but failing to act risks environmental catastrophe."
 un_events.17.d_command:0 "The United Nations has proposed binding climate targets. For [ROOT.GetCountry.GetName], where the state directs economic production, compliance would mean rewriting our industrial plans from the top down — a massive undertaking, but one our centralized system is uniquely capable of executing.\n\nThe real question is whether the economic sacrifice is worth the diplomatic gain. Our industrial output is the foundation of our power. Cutting emissions means cutting production, at least in the short term. But we could also use compliance as proof that planned economies can respond to global challenges more effectively than chaotic markets."
 un_events.17.d_laissez:0 "The United Nations has proposed binding emissions targets that would require [ROOT.GetCountry.GetName] to fundamentally alter our economic model. Our free-market economy thrives on minimal regulation, and these binding commitments would represent exactly the kind of government interference our system is designed to avoid.\n\nIndustrialists are already lobbying furiously against compliance, arguing that the targets would cripple our competitiveness while countries that cheat face no consequences. But the scientific evidence is hard to dismiss, and our international reputation hangs in the balance."
 un_events.17.f:0 "The planet does not negotiate."
 un_events.17.a:0 "Accept binding emissions targets."
 un_events.17.b:0 "Pledge voluntary targets only."
 un_events.17.c:0 "Economic growth comes first."
 un_events.18.t:0 "International Refugee Crisis"
 un_events.18.d:0 "Conflict and famine in [SCOPE.sCountry('refugee_source').GetName] have created a massive refugee crisis. Millions of displaced people are seeking safety, and the United Nations is calling on member states to open their borders and accept resettlement quotas.\n\nFor [ROOT.GetCountry.GetName], the humanitarian argument is compelling, but the political costs are real. Accepting large numbers of refugees strains our resources and may provoke backlash from citizens who feel their own needs are being neglected."
 un_events.18.d_open:0 "Conflict and famine in [SCOPE.sCountry('refugee_source').GetName] have displaced millions. With our open borders policy, [ROOT.GetCountry.GetName] is already a destination for many of these desperate people. The UN is calling for a coordinated international response, and our existing infrastructure gives us a head start.\n\nBut the sheer scale of this crisis tests even our generous policies. Local communities report strain on housing, employment, and social services. We could expand our resettlement programs further, or we could quietly manage the intake to prevent social disruption."
 un_events.18.d_closed:0 "Conflict and famine in [SCOPE.sCountry('refugee_source').GetName] have displaced millions, and the United Nations is pressuring member states to accept resettlement quotas. For [ROOT.GetCountry.GetName], with our closed borders policy, this request is particularly unwelcome.\n\nOur borders are closed for good reason — to protect our citizens, our culture, and our economy. The UN may call it callous, but we call it responsible governance. Still, the diplomatic pressure is intense, and being the one nation that refuses to help could cost us dearly on the international stage."
 un_events.18.f:0 "They come with nothing but hope, and even that is fading."
 un_events.18.a:0 "Launch a major resettlement program."
 un_events.18.b:0 "Accept a managed quota."
 un_events.18.c:0 "Close the borders. Not our problem."
 un_events.19.t:0 "International Space Cooperation"
 un_events.19.d:0 "The United Nations is proposing an ambitious international space cooperation program — a joint effort to build an orbital research station, pool scientific knowledge, and share the costs of space exploration. For [ROOT.GetCountry.GetName], this represents a chance to participate in one of humanity's greatest endeavors while sharing the enormous costs.\n\nFull partnership would accelerate our technological development and enhance our prestige, but it would also mean sharing sensitive research and accepting foreign personnel in our space facilities."
 un_events.19.d_council:0 "The United Nations has proposed international space cooperation, and for [ROOT.GetCountry.GetName], this is a matter of revolutionary pride. Our space program represents the triumph of collective planning over capitalist inefficiency — we will not easily share our achievements with the bourgeois powers.\n\nBut cooperation could accelerate our technological progress and demonstrate to the world that socialism leads humanity to the stars. The question is whether the propaganda value of going it alone outweighs the practical benefits of sharing the costs."
 un_events.19.d_authoritarian:0 "The United Nations has proposed an international space cooperation program. For [ROOT.GetCountry.GetName], our space program is as much a military and prestige asset as a scientific one. Sharing our launch capabilities and research with the international community would compromise strategic advantages we have invested heavily to build.\n\nOn the other hand, the costs of space exploration are staggering even for a great power. Cooperation might free resources for other priorities, and our participation would enhance our international standing."
 un_events.19.f:0 "The stars belong to those bold enough to reach for them."
 un_events.19.a:0 "Full partnership. To the stars together."
 un_events.19.b:0 "Limited contribution."
 un_events.19.c:0 "Space serves national interests."
 un_events.20.t:0 "Assembly Walkout"
 un_events.20.d:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a dramatic walkout from the United Nations General Assembly, followed by several aligned nations. The walkout was triggered by a contentious debate, and the departing delegates accused the Assembly of bias and hypocrisy.\n\nThe walkout has thrown the institution into crisis. As a great power, [ROOT.GetCountry.GetName] must decide how to respond — condemn the walkout and rally the remaining members, attempt to mediate, or join the walkout ourselves."
 un_events.20.d_council:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a dramatic walkout from the General Assembly, taking the entire socialist bloc with them. The [SCOPE.sCountry('walkout_leader').GetAdjectiveName] ambassador denounced the institution as a tool of capitalist hegemony before storming out, followed by thunderous applause from their allies.\n\nThe remaining delegates sit in stunned silence. For [ROOT.GetCountry.GetName], this is both a crisis and an opportunity — the walkout could weaken the UN fatally, or it could allow us to reshape the institution in our image."
 un_events.20.d_authoritarian:0 "The authoritarian bloc led by [SCOPE.sCountry('walkout_leader').GetName] has walked out of the General Assembly in protest, accusing the institution of meddling in sovereign affairs. The [SCOPE.sCountry('walkout_leader').GetAdjectiveName] ambassador declared that the UN has lost all legitimacy and no longer represents the interests of great powers.\n\nThe walkout has shaken the Assembly. Several non-aligned nations are wavering, and the institution's authority hangs in the balance. For [ROOT.GetCountry.GetName], this is a moment that demands decisive action."
 un_events.20.d_theocratic:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a walkout of religiously-aligned nations from the General Assembly, condemning the institution for promoting values they consider incompatible with divine law. The [SCOPE.sCountry('walkout_leader').GetAdjectiveName] ambassador called the UN a godless institution before leading the faithful out of the chamber.\n\nThe walkout has exposed deep cultural fault lines within the international community. For [ROOT.GetCountry.GetName], this crisis demands a response."
 un_events.20.d_hq:0 "\n\nThe walkout unfolds at the United Nations headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where empty seats in the Assembly hall stand as a visible rebuke to the institution's authority."
 un_events.20.f:0 "Empty chairs speak louder than any resolution."
 un_events.20.a:0 "Condemn the walkout. Rally the faithful."
 un_events.20.b:0 "Call for dialogue and reconciliation."
 un_events.20.c:0 "Join the walkout."
 un_veto_crisis_modifier:0 "Veto Crisis Denouncer"
 un_veto_crisis_modifier_desc:0 "This country publicly denounced a great power's veto at the Security Council, gaining diplomatic standing at the cost of institutional authority."
 un_veto_abolition_modifier:0 "Veto Abolition Advocate"
 un_veto_abolition_modifier_desc:0 "This country has proposed abolishing the Security Council veto, pushing for democratic reform of the United Nations."
 un_decolonization_champion_modifier:0 "Decolonization Champion"
 un_decolonization_champion_modifier_desc:0 "This country is leading the charge for decolonization at the United Nations, gaining prestige among newly independent nations."
 un_colonial_defender_modifier:0 "Colonial Status Quo Defender"
 un_colonial_defender_modifier_desc:0 "This country is defending colonial development programs at the UN, strengthening domestic authority but losing international reputation."
 un_ideological_champion_modifier:0 "Ideological Champion at the UN"
 un_ideological_champion_modifier_desc:0 "This country has championed its political system at the United Nations, rallying allies and challenging rivals."
 un_coexistence_modifier:0 "Peaceful Coexistence Advocate"
 un_coexistence_modifier_desc:0 "This country has called for peaceful coexistence between rival ideological blocs at the United Nations."
 un_nonproliferation_modifier:0 "Non-Proliferation Treaty Signatory"
 un_nonproliferation_modifier_desc:0 "This country has signed the Nuclear Non-Proliferation Treaty, gaining diplomatic prestige and supporting arms control."
 un_nonproliferation_refusal_modifier:0 "Non-Proliferation Treaty Refusal"
 un_nonproliferation_refusal_modifier_desc:0 "This country has refused to sign the Nuclear Non-Proliferation Treaty, prioritizing its nuclear deterrent over diplomatic acceptance."
 un_trade_arbitration_modifier:0 "Trade Arbitration Accepted"
 un_trade_arbitration_modifier_desc:0 "This country has accepted international arbitration in a trade dispute, demonstrating commitment to the rules-based order."
 un_unilateral_tariffs_modifier:0 "Unilateral Tariffs Imposed"
 un_unilateral_tariffs_modifier_desc:0 "This country has imposed unilateral tariffs in defiance of international arbitration, boosting domestic industry at the cost of diplomatic reputation."
 un_pandemic_cooperation_modifier:0 "Pandemic Response Leader"
 un_pandemic_cooperation_modifier_desc:0 "This country is leading the international response to a global pandemic through the World Health Organization."
 un_pandemic_isolationist_modifier:0 "Pandemic Response Isolationist"
 un_pandemic_isolationist_modifier_desc:0 "This country has prioritized its own pandemic response over international cooperation."
 un_climate_binding_modifier:0 "Climate Accords Signatory"
 un_climate_binding_modifier_desc:0 "This country has accepted binding emissions targets under the UN Climate Resolution, gaining diplomatic prestige at an economic cost."
 un_climate_refusal_modifier:0 "Climate Accords Refusal"
 un_climate_refusal_modifier_desc:0 "This country has refused to accept binding climate targets, prioritizing economic growth over environmental commitments."
 un_refugee_program_modifier:0 "Major Refugee Resettlement Program"
 un_refugee_program_modifier_desc:0 "This country has launched a major refugee resettlement program under UN coordination, gaining prestige and migration pull."
 un_refugee_closed_modifier:0 "Refugee Crisis — Borders Closed"
 un_refugee_closed_modifier_desc:0 "This country has closed its borders during an international refugee crisis, reducing migration and diplomatic reputation."
 un_space_partnership_modifier:0 "International Space Partnership"
 un_space_partnership_modifier_desc:0 "This country is participating fully in the UN international space cooperation program, accelerating research and boosting prestige."
 un_space_independent_modifier:0 "Independent Space Program"
 un_space_independent_modifier_desc:0 "This country has rejected international space cooperation in favor of an independent program, prioritizing national prestige and military applications."
 un_walkout_condemn_modifier:0 "Condemned Assembly Walkout"
 un_walkout_condemn_modifier_desc:0 "This country condemned a bloc walkout at the General Assembly and rallied the remaining members."
 un_walkout_mediator_modifier:0 "Assembly Walkout Mediator"
 un_walkout_mediator_modifier_desc:0 "This country attempted to mediate after a dramatic walkout at the General Assembly."
 un_walkout_join_modifier:0 "Joined Assembly Walkout"
 un_walkout_join_modifier_desc:0 "This country joined a bloc walkout at the General Assembly, rejecting the institution's authority."
