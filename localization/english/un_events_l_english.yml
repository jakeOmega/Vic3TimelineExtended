 un_court_defiance_modifier:0 "ICJ Ruling Defied"
 un_court_defiance_modifier_desc:0 "This country has openly defied an International Court of Justice ruling, severely damaging its international reputation."
 un_heritage_program_modifier:0 "UNESCO Heritage Program"
 un_heritage_program_modifier_desc:0 "This country is fully participating in the UNESCO world heritage preservation program."
 un_heritage_token_modifier:0 "UNESCO Heritage Participant"
 un_heritage_token_modifier_desc:0 "This country has made a modest contribution to UNESCO heritage preservation."
 un_authority_restored_modifier:0 "UN Authority Restored"
 un_authority_restored_modifier_desc:0 "This country has successfully rallied support to restore the United Nations' authority and legitimacy."
 un_authority_crisis_modifier:0 "UN Authority Weakened"
 un_authority_crisis_modifier_desc:0 "The United Nations is in crisis, and incremental reforms are underway."
 un_events.1.d_council:0 "The workers of the world have long dreamed of international solidarity - now, in the aftermath of devastating conflict, that dream takes institutional form. The United Nations has been proposed to maintain peace, and [ROOT.GetCountry.GetName] has an opportunity to shape this new order in the interest of the working class - though the capitalist powers intend to use it for their own hegemony."
 un_events.1.d_authoritarian:0 "In the aftermath of devastating conflict, the United Nations has been established. For [ROOT.GetCountry.GetName], a seat at the table means influence - but membership carries obligations, including international courts, collective security, and tolerating the interference of lesser powers in our affairs."
 un_events.1.d_theocratic:0 "In the wake of devastating conflict, the United Nations has been proposed. For [ROOT.GetCountry.GetName], guided by divine law, this is a test of faith: can an assembly of nations with vastly different moral foundations serve justice? Membership would grant us a platform for moral governance, but also mean accepting the equal standing of nations whose laws offend the divine order."
 un_events.3.d_council:0 "A Universal Declaration of Human Rights has been proposed. For [ROOT.GetCountry.GetName], it affirms rights our revolution was fought to secure - work, education, social security. But it also enshrines bourgeois civil liberties historically used to protect the exploiting class."
 un_events.3.d_theocratic:0 "A Universal Declaration of Human Rights has been proposed. For [ROOT.GetCountry.GetName], where law derives from divine authority, some provisions align with sacred teachings - the dignity of the person, the prohibition of torture. But others contradict the divine order, particularly concerning freedom of religion."
 un_events.3.d_authoritarian:0 "A Universal Declaration of Human Rights has been proposed, drafted by a committee of idealists. For [ROOT.GetCountry.GetName], where the state ensures order, many of these so-called rights are tools of subversion dressed as principles. Yet refusing to sign entirely would make us a pariah."
 un_events.6.d_council:0 "A growing coalition demands reform of the Security Council. As a council republic, [ROOT.GetCountry.GetName] can champion democratic reform - arguing that the veto power of a few great powers is fundamentally undemocratic - but abolishing the veto would also strip our ability to block hostile resolutions."
 un_events.6.d_authoritarian:0 "A growing coalition demands reform of the Security Council. For [ROOT.GetCountry.GetName], the veto is essential - it ensures no resolution can pass that threatens our interests. Championing reform might buy goodwill, but would dilute our influence."
 un_events.6.d_hq:0 "\n\nDelegates have gathered at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the halls are thick with backroom deals."
 un_events.10.d_authoritarian:0 "The United Nations faces a crisis of legitimacy - resolutions are flouted, great powers act unilaterally, and the institution serves as a platform for moral grandstanding. For [ROOT.GetCountry.GetName], the question is whether to invest in an institution that constrains us, or let it wither."
 un_events.10.d_council:0 "The United Nations faces a crisis of legitimacy. For [ROOT.GetCountry.GetName], this exposes the fundamental contradiction - the institution was designed to preserve a capitalist world order, and now that order is crumbling. The question is whether to salvage this bourgeois institution or accelerate its collapse."
 un_events.11.t:0 "Security Council Veto Crisis"
 un_events.11.d:0 "[SCOPE.sCountry('veto_power').GetName] has exercised its veto in the Security Council, blocking a resolution with broad support among member states. The vetoed resolution would have authorized collective action to address a growing international crisis."
 un_events.11.d_council:0 "The council republic of [SCOPE.sCountry('veto_power').GetName] has wielded its veto in the Security Council, blocking a resolution supported by the majority of member states. The [SCOPE.sCountry('veto_power').GetAdjectiveName] delegation invoked the right of sovereign nations to resist imperialist coercion."
 un_events.11.d_authoritarian:0 "[SCOPE.sCountry('veto_power').GetName] has deployed its veto in the Security Council, crushing a resolution carefully negotiated among the other great powers. The [SCOPE.sCountry('veto_power').GetAdjectiveName] regime shows no interest in the niceties of multilateral diplomacy."
 un_events.11.d_theocratic:0 "The theocratic government of [SCOPE.sCountry('veto_power').GetName] has exercised its veto in the Security Council, blocking a resolution on moral grounds rooted in their interpretation of divine law."
 un_events.11.f:0 "The chamber erupted. Delegates shouted across the aisle; the chair's gavel cracked against wood like a pistol shot.\n\nIn the corridor afterward, a junior diplomat loosened his tie. 'We spent six months drafting that resolution,' he said. 'Six months of negotiations, concessions, rewording. And one raised hand killed it.'\n\nHis colleague shrugged. 'That is what a veto is for.'\n\n'That is what a veto is #italic against#!.'"
 un_events.11.a:0 "Denounce this obstruction publicly."
 un_events.11.b:0 "The veto is legitimate procedure."
 un_events.11.c:0 "Propose abolishing the veto entirely."
 un_events.12.t:0 "Decolonization Resolution"
 un_events.12.d:0 "The General Assembly is debating a sweeping resolution calling for the immediate end of colonialism in all its forms. Dozens of newly independent nations are demanding that the great powers relinquish their overseas territories."
 un_events.12.d_council:0 "The General Assembly is debating a resolution on the end of colonialism - a cause that strikes at the heart of our revolutionary principles. Our delegation has been vocal in demanding that the colonial powers answer for centuries of plunder."
 un_events.12.d_colonial:0 "The General Assembly is debating a resolution calling for the immediate end of colonialism, and [ROOT.GetCountry.GetName], as a power with overseas dependencies, finds itself in the crosshairs. The resolution's sponsors argue that all colonial relationships are inherently exploitative."
 un_events.12.f:0 "The new delegate adjusted the flag on his desk - a flag that had not existed three years ago - and addressed the chamber.\n\n'My country was administered, developed, and civilized, so we are told, for one hundred and forty years,' he said. 'In all that time, not one of our administrators thought to ask us whether we wished to be civilized. We have come here today to provide the answer.'"
 un_events.12.a:0 "Champion decolonization. Free all peoples!"
 un_events.12.b:0 "Defend our development programs."
 un_events.12.c:0 "Call for a gradual, orderly transition."
 un_events.13.t:0 "Ideological Confrontation at the Assembly"
 un_events.13.d:0 "Tensions between rival great powers have erupted into open confrontation at the United Nations General Assembly. [SCOPE.sCountry('ideological_rival').GetName] and [ROOT.GetCountry.GetName] represent fundamentally different visions for the world - and both sides have marshaled their allies to dominate the Assembly's agenda.\n\nDelegations are choosing sides. Non-aligned nations watch nervously as the two blocs trade accusations and threats. The question is whether to escalate the confrontation, seek détente, or make a dramatic gesture."
 un_events.13.d_vs_council:0 "The council republic of [SCOPE.sCountry('ideological_rival').GetName] has turned the General Assembly into a platform for revolutionary agitation. Their delegation denounces [ROOT.GetCountry.GetName] and our allies as tools of capitalist exploitation, calling for the oppressed peoples of the world to rise up. Our own allies respond with equal fervor, defending the principles of individual liberty and market freedom.\n\nThe Assembly has become a battleground between two irreconcilable worldviews. Non-aligned nations are being pressured to choose sides."
 un_events.13.d_vs_authoritarian:0 "The authoritarian regime of [SCOPE.sCountry('ideological_rival').GetName] has been flexing its muscle at the General Assembly, using its bloc of client states to push resolutions that serve its geopolitical agenda. [ROOT.GetCountry.GetName] finds itself leading the opposition, rallying nations who reject the [SCOPE.sCountry('ideological_rival').GetAdjectiveName] model of governance.\n\nThe confrontation is not just about policy - it is about what kind of world order will prevail. Democracy versus autocracy, cooperation versus domination."
 un_events.13.d_vs_theocratic:0 "The theocratic government of [SCOPE.sCountry('ideological_rival').GetName] has brought its religious crusade to the floor of the General Assembly, demanding that international law be reformed to reflect divine moral principles. [ROOT.GetCountry.GetName] and our secular allies have pushed back, defending the separation of religious authority from international governance.\n\nThe debate has exposed deep fault lines between nations that ground their laws in faith and those that ground them in reason."
 un_events.13.d_vs_monarchy:0 "The monarchist establishment of [SCOPE.sCountry('ideological_rival').GetName] has been rallying traditional powers to resist the modernizing agenda at the Assembly. Their delegation speaks of ancient rights, divine mandate, and the dangers of unchecked populism. [ROOT.GetCountry.GetName] and our allies stand on the other side of this divide.\n\nThe confrontation reflects a deeper struggle between the old order and the new - between those who look backward and those who push forward."
 un_events.13.d_hq:0 "\n\nThe confrontation plays out at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the galleries are packed with journalists."
 un_events.13.f:0 "The [SCOPE.sCountry('ideological_rival').GetAdjectiveName] delegate slammed his fist upon the lectern. His counterpart smiled - the thin, practiced smile of a man who has been insulted in six languages and enjoyed every one.\n\n'The gentleman confuses volume with virtue,' he said into the microphone. 'But then, that has always been the hallmark of his system of government.'\n\nTranslators scrambled. The gallery held its breath. Somewhere, a wire service correspondent was already composing the headline."
 un_events.13.a:0 "Champion our way of life."
 un_events.13.b:0 "Call for peaceful coexistence."
 un_events.13.c:0 "Walk out in protest."
 un_events.14.t:0 "Nuclear Non-Proliferation Treaty"
 un_events.14.d:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty - a binding agreement to prevent the spread of nuclear weapons and promote disarmament. For [ROOT.GetCountry.GetName], without a nuclear arsenal, the treaty offers protection from proliferation by rival states."
 un_events.14.d_nuclear:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. As a nuclear-armed state, [ROOT.GetCountry.GetName] occupies a complicated position - the treaty would legitimize our existing arsenal while preventing rivals from developing their own, but commits us to eventual disarmament."
 un_events.14.d_aspiring:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. The timing could not be worse for [ROOT.GetCountry.GetName] - our nuclear program is underway but not yet complete. Signing would effectively end our pursuit of the ultimate deterrent."
 un_events.14.f:0 "The physicist adjusted his reading glasses and studied the treaty text. 'It is an elegant piece of hypocrisy,' he said. 'Those who have the bomb promise to someday give it up. Those who do not have the bomb promise never to build one. And everyone pretends not to notice the asymmetry.'\n\n'Will it work?' his colleague asked.\n\n'It will work precisely as long as everyone is more afraid of the alternative.'"
 un_events.14.a:0 "Sign the Non-Proliferation Treaty."
 un_events.14.b:0 "Sign with reservations on existing arsenals."
 un_events.14.c:0 "Our deterrent is non-negotiable."
 un_events.15.t:0 "International Trade Dispute"
 un_events.15.d:0 "A major trade dispute between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('trade_rival').GetName] has been brought before the United Nations for arbitration. Both sides accuse the other of unfair practices - dumping goods below cost, subsidizing industries, and erecting hidden barriers."
 un_events.15.d_command:0 "A trade dispute with [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our command economy operates on principles that our rivals consider inherently unfair - state-directed pricing looks like dumping to a free-market observer."
 un_events.15.d_protectionist:0 "A trade dispute with [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our protectionist trade policies, designed to nurture domestic industry, are under attack as violations of free trade principles."
 un_events.15.f:0 "'Their textiles undercut ours by forty percent,' the manufacturer said, jabbing the table with a thick finger. 'Forty percent! No honest factory can compete with that.'\n\nThe trade attaché folded his hands. 'Their workers earn a tenth of what yours do. Is that unfair, or is it merely inconvenient?'\n\n'To my workers, sir, the distinction is academic.'"
 un_events.15.a:0 "Accept international arbitration."
 un_events.15.b:0 "Negotiate a bilateral deal."
 un_events.15.c:0 "Impose unilateral tariffs."
 un_events.16.t:0 "Global Pandemic Response"
 un_events.16.d:0 "A devastating pandemic is sweeping across continents, and the World Health Organization is coordinating the international response. Member states are being asked to share medical data, pool research, and contribute to a global stockpile of treatments."
 un_events.16.d_authoritarian:0 "A pandemic is ravaging the world, and the WHO is coordinating the response. For [ROOT.GetCountry.GetName], our centralized system gives us tools that democratic nations lack - we can impose quarantines and direct production with unmatched efficiency."
 un_events.16.d_liberal:0 "A pandemic is sweeping the world, and the WHO is calling for a coordinated response. For [ROOT.GetCountry.GetName], our open society means the crisis is already front-page news and the public demands action."
 un_events.16.f:0 "The doctor peeled off her gloves and dropped them into the bin marked BIOHAZARD. 'The samples from the northern provinces match the strain in the south,' she said. 'It has already crossed three borders.'\n\n'Should we share the data?'\n\nShe looked at the official as though he had asked whether water was wet. 'The virus does not care about your diplomatic reservations. Share the data or bury more people. Those are the options.'"
 un_events.16.a:0 "Full cooperation. Share everything."
 un_events.16.b:0 "Cooperate selectively."
 un_events.16.c:0 "Our people come first."
 un_events.17.t:0 "Climate Change Resolution"
 un_events.17.d:0 "The United Nations has proposed a binding resolution on climate change, requiring member states to commit to specific emissions reduction targets. The scientific consensus is clear, but the economic costs of compliance are staggering."
 un_events.17.d_command:0 "The United Nations has proposed binding climate targets. For [ROOT.GetCountry.GetName], where the state directs production, compliance would mean rewriting our industrial plans from the top down - a massive undertaking, but one our system is uniquely capable of executing."
 un_events.17.d_laissez:0 "The United Nations has proposed binding emissions targets that would require [ROOT.GetCountry.GetName] to fundamentally alter our economic model. Industrialists are already lobbying against compliance, arguing the targets would cripple our competitiveness."
 un_events.17.f:0 "The delegate from the sinking island nation spread a map across the table. 'This is my country,' she said, tracing the coastline with her finger. 'This -' she drew a line two inches inland '- is my country in thirty years.'\n\nThe industrial minister across the table cleared his throat. 'We sympathize, of course. But you must understand, our economy -'\n\n'Your economy,' she said, folding the map, 'is what is drowning mine.'"
 un_events.17.a:0 "Accept binding emissions targets."
 un_events.17.b:0 "Pledge voluntary targets only."
 un_events.17.c:0 "Economic growth comes first."
 un_events.18.t:0 "International Refugee Crisis"
 un_events.18.d:0 "Conflict and famine in [SCOPE.sCountry('refugee_source').GetName] have created a massive refugee crisis. Millions are seeking safety, and the United Nations is calling on member states to accept resettlement quotas."
 un_events.18.d_open:0 "Conflict in [SCOPE.sCountry('refugee_source').GetName] has displaced millions. With our open borders policy, [ROOT.GetCountry.GetName] is already a destination for many, but the sheer scale tests even our generous infrastructure."
 un_events.18.d_closed:0 "Conflict in [SCOPE.sCountry('refugee_source').GetName] has displaced millions, and the United Nations is pressuring member states to accept resettlement quotas. For [ROOT.GetCountry.GetName], with our closed borders, this request is unwelcome."
 un_events.18.f:0 "The border guard studied the woman's papers - or rather, the scrap of cardboard that served as papers. Behind her, the queue stretched to the horizon. Children slept standing up, leaning against their mothers' legs.\n\n'These documents are not valid,' he said.\n\nShe looked at him with the flat patience of someone who has been told this before. 'Neither is the country that issued them. It does not exist anymore. So here I am.'"
 un_events.18.a:0 "Launch a major resettlement program."
 un_events.18.b:0 "Accept a managed quota."
 un_events.18.c:0 "Close the borders. Not our problem."
 un_events.19.t:0 "International Space Cooperation"
 un_events.19.d:0 "The United Nations is proposing an international space cooperation program - a joint effort to build an orbital research station and share the costs of exploration. For [ROOT.GetCountry.GetName], this is a chance to participate in one of humanity's greatest endeavors."
 un_events.19.d_council:0 "The United Nations has proposed international space cooperation. For [ROOT.GetCountry.GetName], our space program represents the triumph of collective planning - we will not easily share our achievements with the bourgeois powers."
 un_events.19.d_authoritarian:0 "The United Nations has proposed an international space cooperation program. For [ROOT.GetCountry.GetName], our space program is as much a military and prestige asset as a scientific one. Sharing it would compromise strategic advantages."
 un_events.19.f:0 "The mission director stood before the assembled delegations and pointed to the architectural model of the station. 'Twelve modules,' he said. 'Six nations. One orbit.'\n\n'And whose flag flies on the outside?' someone asked from the back.\n\nThe director permitted himself a thin smile. 'That, excellency, is precisely the question we are here to avoid.'"
 un_events.19.a:0 "Full partnership. To the stars together."
 un_events.19.b:0 "Limited contribution."
 un_events.19.c:0 "Space serves national interests."
 un_events.20.t:0 "Assembly Walkout"
 un_events.20.d:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a dramatic walkout from the General Assembly, followed by several aligned nations. The departing delegates accused the Assembly of bias and hypocrisy, throwing the institution into crisis."
 un_events.20.d_council:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a walkout from the General Assembly, taking the socialist bloc with them. The [SCOPE.sCountry('walkout_leader').GetAdjectiveName] ambassador denounced the institution as a tool of capitalist hegemony before storming out."
 un_events.20.d_authoritarian:0 "The authoritarian bloc led by [SCOPE.sCountry('walkout_leader').GetName] has walked out of the General Assembly in protest, accusing the institution of meddling in sovereign affairs."
 un_events.20.d_theocratic:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a walkout of religiously-aligned nations, condemning the institution for promoting values incompatible with divine law."
 un_events.20.d_hq:0 "\n\nThe walkout unfolds at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where empty seats stand as a visible rebuke to the institution's authority."
 un_events.20.f:0 "The doors slammed. The echo rolled across the chamber like a judgment. For a long moment, no one spoke.\n\nThen the secretary-general removed his reading glasses and looked at the empty seats. 'Well,' he said, with the calm of a man watching his house burn from a safe distance. 'I suppose we shall have to manage without them.'\n\n'Can we?' his aide whispered.\n\n'That, my dear fellow, is the question this institution was built to answer.'"
 un_events.20.a:0 "Condemn the walkout. Rally the faithful."
 un_events.20.b:0 "Call for dialogue and reconciliation."
 un_events.20.c:0 "Join the walkout."
 un_veto_crisis_modifier:0 "Veto Crisis Denouncer"
 un_veto_crisis_modifier_desc:0 "This country publicly denounced a great power's veto at the Security Council, gaining diplomatic standing at the cost of institutional authority."
 un_veto_abolition_modifier:0 "Veto Abolition Advocate"
 un_veto_abolition_modifier_desc:0 "This country has proposed abolishing the Security Council veto, pushing for democratic reform of the United Nations."
 un_decolonization_champion_modifier:0 "Decolonization Champion"
 un_decolonization_champion_modifier_desc:0 "This country is leading the charge for decolonization at the United Nations, gaining prestige among newly independent nations."
 un_colonial_defender_modifier:0 "Colonial Status Quo Defender"
 un_colonial_defender_modifier_desc:0 "This country is defending colonial development programs at the UN, strengthening domestic authority but losing international reputation."
 un_ideological_champion_modifier:0 "Ideological Champion at the UN"
 un_ideological_champion_modifier_desc:0 "This country has championed its political system at the United Nations, rallying allies and challenging rivals."
 un_coexistence_modifier:0 "Peaceful Coexistence Advocate"
 un_coexistence_modifier_desc:0 "This country has called for peaceful coexistence between rival ideological blocs at the United Nations."
 un_nonproliferation_modifier:0 "Non-Proliferation Treaty Signatory"
 un_nonproliferation_modifier_desc:0 "This country has signed the Nuclear Non-Proliferation Treaty, gaining diplomatic prestige and supporting arms control."
 un_nonproliferation_refusal_modifier:0 "Non-Proliferation Treaty Refusal"
 un_nonproliferation_refusal_modifier_desc:0 "This country has refused to sign the Nuclear Non-Proliferation Treaty, prioritizing its nuclear deterrent over diplomatic acceptance."
 un_trade_arbitration_modifier:0 "Trade Arbitration Accepted"
 un_trade_arbitration_modifier_desc:0 "This country has accepted international arbitration in a trade dispute, demonstrating commitment to the rules-based order."
 un_unilateral_tariffs_modifier:0 "Unilateral Tariffs Imposed"
 un_unilateral_tariffs_modifier_desc:0 "This country has imposed unilateral tariffs in defiance of international arbitration, boosting domestic industry at the cost of diplomatic reputation."
 un_pandemic_cooperation_modifier:0 "Pandemic Response Leader"
 un_pandemic_cooperation_modifier_desc:0 "This country is leading the international response to a global pandemic through the World Health Organization."
 un_pandemic_isolationist_modifier:0 "Pandemic Response Isolationist"
 un_pandemic_isolationist_modifier_desc:0 "This country has prioritized its own pandemic response over international cooperation."
 un_climate_binding_modifier:0 "Climate Accords Signatory"
 un_climate_binding_modifier_desc:0 "This country has accepted binding emissions targets under the UN Climate Resolution, gaining diplomatic prestige at an economic cost."
 un_climate_refusal_modifier:0 "Climate Accords Refusal"
 un_climate_refusal_modifier_desc:0 "This country has refused to accept binding climate targets, prioritizing economic growth over environmental commitments."
 un_refugee_program_modifier:0 "Major Refugee Resettlement Program"
 un_refugee_program_modifier_desc:0 "This country has launched a major refugee resettlement program under UN coordination, gaining prestige and migration pull."
 un_refugee_closed_modifier:0 "Refugee Crisis - Borders Closed"
 un_refugee_closed_modifier_desc:0 "This country has closed its borders during an international refugee crisis, reducing migration and diplomatic reputation."
 un_space_partnership_modifier:0 "International Space Partnership"
 un_space_partnership_modifier_desc:0 "This country is participating fully in the UN international space cooperation program, accelerating research and boosting prestige."
 un_space_independent_modifier:0 "Independent Space Program"
 un_space_independent_modifier_desc:0 "This country has rejected international space cooperation in favor of an independent program, prioritizing national prestige and military applications."
 un_walkout_condemn_modifier:0 "Condemned Assembly Walkout"
 un_walkout_condemn_modifier_desc:0 "This country condemned a bloc walkout at the General Assembly and rallied the remaining members."
 un_walkout_mediator_modifier:0 "Assembly Walkout Mediator"
 un_walkout_mediator_modifier_desc:0 "This country attempted to mediate after a dramatic walkout at the General Assembly."
 un_walkout_join_modifier:0 "Joined Assembly Walkout"
 un_walkout_join_modifier_desc:0 "This country joined a bloc walkout at the General Assembly, rejecting the institution's authority."
 un_events.101.t:0 "International Aid Arrives"
 un_events.101.d:0 "[SCOPE.sCountry('aid_donor').GetName] has mounted a major humanitarian relief effort for [ROOT.GetCountry.GetName] through the United Nations. Convoys of food, medicine, and emergency supplies are arriving at our ports and airfields."
 un_events.101.f:0 "The crates bore foreign markings and foreign flags. The dockworkers unloaded them in silence.\n\n'Grain,' the port supervisor noted, checking his manifest. 'Rice. Medical supplies. Powdered milk.' He looked up. 'Enough to feed the northern provinces for a month.'\n\n'And after the month?'\n\nHe folded the manifest and tucked it into his coat. 'After the month, we will need another shipment, and another reason to be grateful.'"
 un_events.101.a:0 "We are grateful for this generosity."
 un_events.101.b:0 "We accept the aid, but we are not a charity case."
 un_events.102.t:0 "Foreign Peacekeepers on Our Soil"
 un_events.102.d:0 "[SCOPE.sCountry('peacekeeping_donor').GetName] has deployed a peacekeeping force to [ROOT.GetCountry.GetName] under a United Nations mandate. Blue-helmeted soldiers now patrol our streets. Their presence brings stability, but raises questions about sovereignty."
 un_events.102.f:0 "The child stared at the foreign soldier standing on the corner, his blue helmet catching the afternoon sun. The soldier smiled and waved. The child did not wave back.\n\n'Who are they?' the child asked his mother.\n\n'They are here to help,' she said, without conviction.\n\n'Help with what?'\n\nShe took his hand and walked a little faster. 'With everything we could not do ourselves.'"
 un_events.102.a:0 "Welcome the peacekeepers. Stability comes first."
 un_events.102.b:0 "This is an affront to our sovereignty."
 un_events.103.t:0 "Our People Resettled Abroad"
 un_events.103.d:0 "[SCOPE.sCountry('resettlement_host').GetName] has launched a major refugee resettlement program, accepting thousands of displaced people from [ROOT.GetCountry.GetName]. For the refugees, this is a lifeline. For our country, the departure of so many citizens is a complicated blessing."
 un_events.103.f:0 "At the airport, the families queued with suitcases held together by rope and prayer. A grandmother clutched a photograph of a house that no longer stood.\n\n'Will we come back?' the boy asked.\n\nHis father hoisted him onto his shoulders so he could see the departure board. 'When there is something to come back to,' he said. He did not look at his wife when he said it."
 un_events.103.a:0 "We are grateful for the assistance."
 un_events.103.b:0 "Our people belong here, not in exile."
 un_humanitarian_aid_received_modifier:0 "International Humanitarian Aid"
 un_humanitarian_aid_received_modifier_desc:0 "A foreign power has provided major humanitarian aid through the United Nations, improving food security and reducing mortality."
 un_humanitarian_token_received_modifier:0 "Modest Humanitarian Assistance"
 un_humanitarian_token_received_modifier_desc:0 "A foreign power has provided a modest contribution to humanitarian relief."
 un_peacekeeping_welcomed_modifier:0 "Peacekeepers Welcomed"
 un_peacekeeping_welcomed_modifier_desc:0 "UN peacekeeping forces have been welcomed, reducing devastation but at the cost of national prestige."
 un_peacekeeping_resented_modifier:0 "Peacekeepers Resented"
 un_peacekeeping_resented_modifier_desc:0 "Foreign peacekeeping forces are viewed as an imposition on national sovereignty, rallying domestic authority but damaging diplomatic standing."
 un_refugee_source_relief_modifier:0 "Refugee Resettlement Relief"
 un_refugee_source_relief_modifier_desc:0 "International resettlement programs have eased the burden of displacement, modestly improving living standards."
 un_refugee_source_brain_drain_modifier:0 "Population Exodus"
 un_refugee_source_brain_drain_modifier_desc:0 "The departure of thousands of citizens has created a brain drain, reducing living standards and migration pull."
 un_trade_deal_bilateral_modifier:0 "Bilateral Trade Agreement"
 un_trade_deal_bilateral_modifier_desc:0 "A bilateral trade agreement has improved trade competitiveness and diplomatic standing."
 un_tariff_retaliation_modifier:0 "Targeted by Unilateral Tariffs"
 un_tariff_retaliation_modifier_desc:0 "A rival nation has imposed unilateral tariffs, hurting our trade competitiveness and diplomatic reputation."
