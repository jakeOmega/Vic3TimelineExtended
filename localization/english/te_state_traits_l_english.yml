l_english:

#
# STATE_TRAITS
#
 state_trait_atacama_copper_belt:0 "Atacama Copper Belt"
 state_trait_atacama_copper_belt_desc:0 "Porphyry copper deposits of unmatched scale beneath the driest desert on Earth, including Chuquicamata and Escondida."
 state_trait_bayan_obo:0 "Bayan Obo"
 state_trait_bayan_obo_desc:0 "The largest known rare-earth deposit in the world, a hydrothermal complex yielding cerium, neodymium, and niobium in industrial quantities."
 state_trait_bushveld_complex:0 "Bushveld Igneous Complex"
 state_trait_bushveld_complex_desc:0 "The world's richest reserves of platinum-group metals and chromium, layered through a vast magmatic intrusion two billion years old."
 state_trait_ceylon_graphite:0 "Ceylon Graphite Veins"
 state_trait_ceylon_graphite_desc:0 "Vein graphite of exceptional crystallinity — prized for crucibles, brushes, and electrodes since the earliest days of industrial chemistry."
 state_trait_chiatura_manganese:0 "Chiatura Manganese Deposits"
 state_trait_chiatura_manganese_desc:0 "Georgia's Imereti region holds high-grade manganese ores that fed steelworks across the Russian Empire and the Soviet Union."
 state_trait_copperbelt:0 "Central African Copperbelt"
 state_trait_copperbelt_desc:0 "An arc of sediment-hosted copper deposits running from Katanga into Northern Rhodesia, exceptionally rich and shallow enough for open-pit mining."
 state_trait_cornish_tin:0 "Cornish Tin Lodes"
 state_trait_cornish_tin_desc:0 "Granite-hosted tin and tungsten veins worked since antiquity, the historic heart of European base-metal mining."
 state_trait_dead_sea_potash:0 "Dead Sea Mineral Works"
 state_trait_dead_sea_potash_desc:0 "Solar evaporation of the world's saltiest natural body of water yields potash, bromine, and salt in industrial quantities."
 state_trait_erzgebirge:0 "Erzgebirge Mineral District"
 state_trait_erzgebirge_desc:0 "The 'Ore Mountains' yield a remarkable variety of base, precious, and rare metals — tin, silver, cobalt, bismuth, and the lithium ores that gave the element its name."
 state_trait_great_basin_borates:0 "Great Basin Borates"
 state_trait_great_basin_borates_desc:0 "Dry lake beds rich in borax, soda ash, and lithium brines — the chemical foundation of countless industrial processes."
 state_trait_jamaican_bauxite:0 "Jamaican Bauxite"
 state_trait_jamaican_bauxite_desc:0 "Tropical weathering of the island's limestone bedrock has left behind some of the most accessible high-grade bauxite in the Americas."
 state_trait_kola_apatite:0 "Kola Apatite-Nepheline Complex"
 state_trait_kola_apatite_desc:0 "Vast intrusive bodies on the Kola Peninsula yield apatite, nepheline, and the rare-earth-bearing loparite that anchored Soviet strategic-mineral production."
 state_trait_madagascar_graphite:0 "Madagascan Graphite"
 state_trait_madagascar_graphite_desc:0 "Coarse-flake crystalline graphite of unusual purity, the global benchmark for electrode-grade ore."
 state_trait_moroccan_phosphate:0 "Moroccan Phosphate Plateau"
 state_trait_moroccan_phosphate_desc:0 "The Khouribga plateau and its neighbours host the largest phosphate reserves on Earth, the foundation of modern fertilizer production."
 state_trait_nauru_phosphate:0 "Nauru Guano Deposits"
 state_trait_nauru_phosphate_desc:0 "Centuries of seabird droppings on a raised coral island have produced the purest phosphate rock ever mined commercially."
 state_trait_nikopol_manganese:0 "Nikopol Manganese Basin"
 state_trait_nikopol_manganese_desc:0 "The world's largest sedimentary manganese deposit, central to the Russian and Soviet steel industries for over a century."
 state_trait_pilbara:0 "Pilbara Mineral Province"
 state_trait_pilbara_desc:0 "Among the oldest exposed crust on Earth, the Pilbara hosts enormous deposits of iron and manganese alongside emerging reserves of bauxite and rare metals."
 state_trait_saskatchewan_potash:0 "Saskatchewan Potash Beds"
 state_trait_saskatchewan_potash_desc:0 "Buried evaporite formations holding nearly half the world's recoverable potash, mined for fertilizer at industrial scale."
 state_trait_stassfurt_salts:0 "Stassfurt Salt Beds"
 state_trait_stassfurt_salts_desc:0 "The first commercially exploited potash deposits in the world, layered with rock salt and the unusual potassium-magnesium minerals that founded modern fertilizer chemistry."
 state_trait_sudbury_basin:0 "Sudbury Basin"
 state_trait_sudbury_basin_desc:0 "A meteoritic impact crater whose shattered crust concentrates nickel, copper, and platinum-group metals in quantities found nowhere else."
 state_trait_weipa_bauxite:0 "Weipa Bauxite"
 state_trait_weipa_bauxite_desc:0 "Vast laterite plateaus along the Cape York coast hold some of the largest and richest bauxite reserves in the world."
