 banking_event_provincial_exchange:0 "Provincial Exchange Growth"
 banking_event_provincial_exchange_desc:0 "New provincial stock exchanges are expanding access to capital markets."
 banking_event_qe_stimulus:0 "Monetary Stimulus"
 banking_event_qe_stimulus_desc:0 "Central bank bond-buying program is reducing borrowing costs."
 banking_event_quiet_rescue:0 "Quiet Financial Rescue"
 banking_event_quiet_rescue_desc:0 "The government has quietly arranged a bailout of a failing financial institution, at considerable fiscal cost."
 banking_event_railway_fever:0 "Railway Investment Fever"
 banking_event_railway_fever_desc:0 "A wave of railway investment is channeling capital into infrastructure expansion."
 banking_event_rating_crackdown:0 "Credit Rating Reforms"
 banking_event_rating_crackdown_desc:0 "Overhaul of the credit rating system is temporarily disrupting financial markets."
 banking_event_rural_credit:0 "Emergency Rural Credit"
 banking_event_rural_credit_cost:0 "Rural Credit Fiscal Cost"
 banking_event_rural_credit_cost_desc:0 "Government spending on emergency rural credit programs."
 banking_event_rural_credit_desc:0 "Government-backed emergency lending is propping up the rural credit system at fiscal cost."
 banking_event_scandal_fallout:0 "Banking Scandal Fallout"
 banking_event_scandal_fallout_desc:0 "A banking scandal has shaken confidence in financial institutions."
 banking_event_selective_bailout:0 "Selective Bank Bailout"
 banking_event_selective_bailout_cost:0 "Bailout Fiscal Cost"
 banking_event_selective_bailout_cost_desc:0 "Government spending on the selective bank bailout."
 banking_event_selective_bailout_desc:0 "The government has bailed out key banking institutions, stabilizing the system but creating moral hazard."
 banking_event_shadow_regulation:0 "Shadow Banking Regulation"
 banking_event_shadow_regulation_desc:0 "Bringing shadow banks under regulation has reduced systemic risk but contracted credit availability and financial services output."
 banking_event_sovereign_wealth_fund:0 "Sovereign Wealth Fund"
 banking_event_sovereign_wealth_fund_cost:0 "Sovereign Wealth Fund Cost"
 banking_event_sovereign_wealth_fund_cost_desc:0 "Government contributions to the sovereign wealth fund."
 banking_event_sovereign_wealth_fund_desc:0 "A state investment fund is building a reserve against future downturns, enhancing national prestige."
