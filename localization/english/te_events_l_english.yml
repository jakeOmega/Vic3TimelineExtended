 un_events.1.a:0 "Sign the Charter. We believe in this vision."
 un_events.1.b:0 "We shall observe, but not yet commit."
 un_events.1.c:0 "This undermines our sovereignty."
 un_events.1.d:0 "In the aftermath of another devastating conflict, the nations of the world have drafted a charter for a new international body - the United Nations. [ROOT.GetCountry.GetName] has been invited to sign as a founding member. Membership promises a seat at the table of global governance, but carries obligations: international courts, collective security, and the subordination of national interests to the common good."
 un_events.1.d_authoritarian:0 "In the aftermath of devastating conflict, the United Nations has been established. For [ROOT.GetCountry.GetName], a seat at the table means influence - but membership carries obligations, including international courts, collective security, and tolerating the interference of lesser powers in our affairs."
 un_events.1.d_council:0 "The workers of the world have long dreamed of international solidarity - now, in the aftermath of devastating conflict, that dream takes institutional form. The United Nations has been proposed to maintain peace, and [ROOT.GetCountry.GetName] has an opportunity to shape this new order in the interest of the working class - though the capitalist powers intend to use it for their own hegemony."
 un_events.1.d_theocratic:0 "In the wake of devastating conflict, the United Nations has been proposed. For [ROOT.GetCountry.GetName], guided by divine law, this is a test of faith: can an assembly of nations with vastly different moral foundations serve justice? Membership would grant us a platform for moral governance, but also mean accepting the equal standing of nations whose laws offend the divine order."
 un_events.1.f:0 "The ambassador set down his pen and stared at the document. 'Do you know,' he said to no one in particular, 'how many treaties have promised to end all wars?'\n\n'Every single one of them,' his aide replied. 'And yet here we are, drafting another.'\n\n'Yes. And yet here we are.'"
 un_events.1.t:0 "The United Nations Charter"
 un_events.10.a:0 "Rally the world. The UN must survive."
 un_events.10.b:0 "Propose incremental reforms."
 un_events.10.c:0 "The UN has failed. Let it go."
 un_events.10.d:0 "The United Nations faces a crisis of legitimacy. Resolutions are routinely ignored, great powers act unilaterally, and member states question whether the institution serves any purpose. As a great power, [ROOT.GetCountry.GetName] must decide whether to rally support or let it fade."
 un_events.10.d_authoritarian:0 "The United Nations faces a crisis of legitimacy - resolutions are flouted, great powers act unilaterally, and the institution serves as a platform for moral grandstanding. For [ROOT.GetCountry.GetName], the question is whether to invest in an institution that constrains us, or let it wither."
 un_events.10.d_council:0 "The United Nations faces a crisis of legitimacy. For [ROOT.GetCountry.GetName], this exposes the fundamental contradiction - the institution was designed to preserve a capitalist world order, and now that order is crumbling. The question is whether to salvage this bourgeois institution or accelerate its collapse."
 un_events.10.f:0 "'When I joined the diplomatic service,' the old ambassador said, swirling his brandy, 'this building meant something. Resolutions had teeth. Delegations arrived with instructions to compromise.'\n\n'And now?'\n\n'Now they arrive with instructions to be seen arriving. It is theater, my dear boy. Very expensive theater.'"
 un_events.10.t:0 "The United Nations in Crisis"
 un_events.101.a:0 "We are grateful for this generosity."
 un_events.101.b:0 "We accept the aid, but we are not a charity case."
 un_events.101.d:0 "[SCOPE.sCountry('aid_donor').GetName] has mounted a major humanitarian relief effort for [ROOT.GetCountry.GetName] through the United Nations. Convoys of food, medicine, and emergency supplies are arriving at our ports and airfields."
 un_events.101.f:0 "The crates bore foreign markings and foreign flags. The dockworkers unloaded them in silence.\n\n'Grain,' the port supervisor noted, checking his manifest. 'Rice. Medical supplies. Powdered milk.' He looked up. 'Enough to feed the northern provinces for a month.'\n\n'And after the month?'\n\nHe folded the manifest and tucked it into his coat. 'After the month, we will need another shipment, and another reason to be grateful.'"
 un_events.101.t:0 "International Aid Arrives"
 un_events.102.a:0 "Welcome the peacekeepers. Stability comes first."
 un_events.102.b:0 "This is an affront to our sovereignty."
 un_events.102.d:0 "[SCOPE.sCountry('peacekeeping_donor').GetName] has deployed a peacekeeping force to [ROOT.GetCountry.GetName] under a United Nations mandate. Blue-helmeted soldiers now patrol our streets. Their presence brings stability, but raises questions about sovereignty."
 un_events.102.f:0 "The child stared at the foreign soldier standing on the corner, his blue helmet catching the afternoon sun. The soldier smiled and waved. The child did not wave back.\n\n'Who are they?' the child asked his mother.\n\n'They are here to help,' she said, without conviction.\n\n'Help with what?'\n\nShe took his hand and walked a little faster. 'With everything we could not do ourselves.'"
 un_events.102.t:0 "Foreign Peacekeepers on Our Soil"
 un_events.103.a:0 "We are grateful for the assistance."
 un_events.103.b:0 "Our people belong here, not in exile."
 un_events.103.d:0 "[SCOPE.sCountry('resettlement_host').GetName] has launched a major refugee resettlement program, accepting thousands of displaced people from [ROOT.GetCountry.GetName]. For the refugees, this is a lifeline. For our country, the departure of so many citizens is a complicated blessing."
 un_events.103.f:0 "At the airport, the families queued with suitcases held together by rope and prayer. A grandmother clutched a photograph of a house that no longer stood.\n\n'Will we come back?' the boy asked.\n\nHis father hoisted him onto his shoulders so he could see the departure board. 'When there is something to come back to,' he said. He did not look at his wife when he said it."
 un_events.103.t:0 "Our People Resettled Abroad"
 un_events.11.a:0 "Denounce this obstruction publicly."
 un_events.11.b:0 "The veto is legitimate procedure."
 un_events.11.c:0 "Propose abolishing the veto entirely."
 un_events.11.d:0 "[SCOPE.sCountry('veto_power').GetName] has exercised its veto in the Security Council, blocking a resolution with broad support among member states. The vetoed resolution would have authorized collective action to address a growing international crisis."
 un_events.11.d_authoritarian:0 "[SCOPE.sCountry('veto_power').GetName] has deployed its veto in the Security Council, crushing a resolution carefully negotiated among the other great powers. The [SCOPE.sCountry('veto_power').GetAdjectiveName] regime shows no interest in the niceties of multilateral diplomacy."
 un_events.11.d_council:0 "The council republic of [SCOPE.sCountry('veto_power').GetName] has wielded its veto in the Security Council, blocking a resolution supported by the majority of member states. The [SCOPE.sCountry('veto_power').GetAdjectiveName] delegation invoked the right of sovereign nations to resist imperialist coercion."
 un_events.11.d_theocratic:0 "The theocratic government of [SCOPE.sCountry('veto_power').GetName] has exercised its veto in the Security Council, blocking a resolution on moral grounds rooted in their interpretation of divine law."
 un_events.11.f:0 "The chamber erupted. Delegates shouted across the aisle; the chair's gavel cracked against wood like a pistol shot.\n\nIn the corridor afterward, a junior diplomat loosened his tie. 'We spent six months drafting that resolution,' he said. 'Six months of negotiations, concessions, rewording. And one raised hand killed it.'\n\nHis colleague shrugged. 'That is what a veto is for.'\n\n'That is what a veto is #italic against#!.'"
 un_events.11.t:0 "Security Council Veto Crisis"
 un_events.12.a:0 "Champion decolonization. Free all peoples!"
 un_events.12.b:0 "Defend our development programs."
 un_events.12.c:0 "Call for a gradual, orderly transition."
 un_events.12.d:0 "The General Assembly is debating a sweeping resolution calling for the immediate end of colonialism in all its forms. Dozens of newly independent nations are demanding that the great powers relinquish their overseas territories."
 un_events.12.d_colonial:0 "The General Assembly is debating a resolution calling for the immediate end of colonialism, and [ROOT.GetCountry.GetName], as a power with overseas dependencies, finds itself in the crosshairs. The resolution's sponsors argue that all colonial relationships are inherently exploitative."
 un_events.12.d_council:0 "The General Assembly is debating a resolution on the end of colonialism - a cause that strikes at the heart of our revolutionary principles. Our delegation has been vocal in demanding that the colonial powers answer for centuries of plunder."
 un_events.12.f:0 "The new delegate adjusted the flag on his desk - a flag that had not existed three years ago - and addressed the chamber.\n\n'My country was administered, developed, and civilized, so we are told, for one hundred and forty years,' he said. 'In all that time, not one of our administrators thought to ask us whether we wished to be civilized. We have come here today to provide the answer.'"
 un_events.12.t:0 "Decolonization Resolution"
 un_events.13.a:0 "Champion our way of life."
 un_events.13.b:0 "Call for peaceful coexistence."
 un_events.13.c:0 "Walk out in protest."
 un_events.13.d:0 "Tensions between rival great powers have erupted into open confrontation at the United Nations General Assembly. [SCOPE.sCountry('ideological_rival').GetName] and [ROOT.GetCountry.GetName] represent fundamentally different visions for the world - and both sides have marshaled their allies to dominate the Assembly's agenda.\n\nDelegations are choosing sides. Non-aligned nations watch nervously as the two blocs trade accusations and threats. The question is whether to escalate the confrontation, seek détente, or make a dramatic gesture."
 un_events.13.d_hq:0 "\n\nThe confrontation plays out at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the galleries are packed with journalists."
 un_events.13.d_vs_authoritarian:0 "The authoritarian regime of [SCOPE.sCountry('ideological_rival').GetName] has been flexing its muscle at the General Assembly, using its bloc of client states to push resolutions that serve its geopolitical agenda. [ROOT.GetCountry.GetName] finds itself leading the opposition, rallying nations who reject the [SCOPE.sCountry('ideological_rival').GetAdjectiveName] model of governance.\n\nThe confrontation is not just about policy - it is about what kind of world order will prevail. Democracy versus autocracy, cooperation versus domination."
 un_events.13.d_vs_council:0 "The council republic of [SCOPE.sCountry('ideological_rival').GetName] has turned the General Assembly into a platform for revolutionary agitation. Their delegation denounces [ROOT.GetCountry.GetName] and our allies as tools of capitalist exploitation, calling for the oppressed peoples of the world to rise up. Our own allies respond with equal fervor, defending the principles of individual liberty and market freedom.\n\nThe Assembly has become a battleground between two irreconcilable worldviews. Non-aligned nations are being pressured to choose sides."
 un_events.13.d_vs_monarchy:0 "The monarchist establishment of [SCOPE.sCountry('ideological_rival').GetName] has been rallying traditional powers to resist the modernizing agenda at the Assembly. Their delegation speaks of ancient rights, divine mandate, and the dangers of unchecked populism. [ROOT.GetCountry.GetName] and our allies stand on the other side of this divide.\n\nThe confrontation reflects a deeper struggle between the old order and the new - between those who look backward and those who push forward."
 un_events.13.d_vs_theocratic:0 "The theocratic government of [SCOPE.sCountry('ideological_rival').GetName] has brought its religious crusade to the floor of the General Assembly, demanding that international law be reformed to reflect divine moral principles. [ROOT.GetCountry.GetName] and our secular allies have pushed back, defending the separation of religious authority from international governance.\n\nThe debate has exposed deep fault lines between nations that ground their laws in faith and those that ground them in reason."
 un_events.13.f:0 "The [SCOPE.sCountry('ideological_rival').GetAdjectiveName] delegate slammed his fist upon the lectern. His counterpart smiled - the thin, practiced smile of a man who has been insulted in six languages and enjoyed every one.\n\n'The gentleman confuses volume with virtue,' he said into the microphone. 'But then, that has always been the hallmark of his system of government.'\n\nTranslators scrambled. The gallery held its breath. Somewhere, a wire service correspondent was already composing the headline."
 un_events.13.t:0 "Ideological Confrontation at the Assembly"
 un_events.14.a:0 "Sign and propose the treaty to the General Assembly."
 un_events.14.b:0 "Sign with reservations on existing arsenals."
 un_events.14.c:0 "Our deterrent is non-negotiable."
 un_events.14.d:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty - a binding agreement to prevent the spread of nuclear weapons and promote disarmament. For [ROOT.GetCountry.GetName], without a nuclear arsenal, the treaty offers protection from proliferation by rival states."
 un_events.14.d_aspiring:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. The timing could not be worse for [ROOT.GetCountry.GetName] - our nuclear program is underway but not yet complete. Signing would effectively end our pursuit of the ultimate deterrent."
 un_events.14.d_nuclear:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. As a nuclear-armed state, [ROOT.GetCountry.GetName] occupies a complicated position - the treaty would legitimize our existing arsenal while preventing rivals from developing their own, but commits us to eventual disarmament."
 un_events.14.f:0 "The physicist adjusted his reading glasses and studied the treaty text. 'It is an elegant piece of hypocrisy,' he said. 'Those who have the bomb promise to someday give it up. Those who do not have the bomb promise never to build one. And everyone pretends not to notice the asymmetry.'\n\n'Will it work?' his colleague asked.\n\n'It will work precisely as long as everyone is more afraid of the alternative.'"
 un_events.14.t:0 "Nuclear Non-Proliferation Treaty"
 un_events.15.a:0 "Accept international arbitration."
 un_events.15.b:0 "Negotiate a bilateral deal."
 un_events.15.c:0 "Impose unilateral tariffs."
 un_events.15.d:0 "A major trade dispute between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('trade_rival').GetName] has been brought before the United Nations for arbitration. Both sides accuse the other of unfair practices - dumping goods below cost, subsidizing industries, and erecting hidden barriers."
 un_events.15.d_command:0 "A trade dispute with [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our command economy operates on principles that our rivals consider inherently unfair - state-directed pricing looks like dumping to a free-market observer."
 un_events.15.d_protectionist:0 "A trade dispute with [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our protectionist trade policies, designed to nurture domestic industry, are under attack as violations of free trade principles."
 un_events.15.f:0 "'Their textiles undercut ours by forty percent,' the manufacturer said, jabbing the table with a thick finger. 'Forty percent! No honest factory can compete with that.'\n\nThe trade attaché folded his hands. 'Their workers earn a tenth of what yours do. Is that unfair, or is it merely inconvenient?'\n\n'To my workers, sir, the distinction is academic.'"
 un_events.15.t:0 "International Trade Dispute"
 un_events.16.a:0 "Full cooperation. Share everything."
 un_events.16.b:0 "Cooperate selectively."
 un_events.16.c:0 "Our people come first."
 un_events.16.d:0 "A devastating pandemic is sweeping across continents, and the World Health Organization is coordinating the international response. Member states are being asked to share medical data, pool research, and contribute to a global stockpile of treatments."
 un_events.16.d_authoritarian:0 "A pandemic is ravaging the world, and the WHO is coordinating the response. For [ROOT.GetCountry.GetName], our centralized system gives us tools that democratic nations lack - we can impose quarantines and direct production with unmatched efficiency."
 un_events.16.d_liberal:0 "A pandemic is sweeping the world, and the WHO is calling for a coordinated response. For [ROOT.GetCountry.GetName], our open society means the crisis is already front-page news and the public demands action."
 un_events.16.f:0 "The doctor peeled off her gloves and dropped them into the bin marked BIOHAZARD. 'The samples from the northern provinces match the strain in the south,' she said. 'It has already crossed three borders.'\n\n'Should we share the data?'\n\nShe looked at the official as though he had asked whether water was wet. 'The virus does not care about your diplomatic reservations. Share the data or bury more people. Those are the options.'"
 un_events.16.t:0 "Global Pandemic Response"
 un_events.17.a:0 "Propose binding targets to the General Assembly."
 un_events.17.b:0 "Pledge voluntary targets only."
 un_events.17.c:0 "Economic growth comes first."
 un_events.17.d:0 "The United Nations has proposed a binding resolution on climate change, requiring member states to commit to specific emissions reduction targets. The scientific consensus is clear, but the economic costs of compliance are staggering."
 un_events.17.d_command:0 "The United Nations has proposed binding climate targets. For [ROOT.GetCountry.GetName], where the state directs production, compliance would mean rewriting our industrial plans from the top down - a massive undertaking, but one our system is uniquely capable of executing."
 un_events.17.d_laissez:0 "The United Nations has proposed binding emissions targets that would require [ROOT.GetCountry.GetName] to fundamentally alter our economic model. Industrialists are already lobbying against compliance, arguing the targets would cripple our competitiveness."
 un_events.17.f:0 "The delegate from the sinking island nation spread a map across the table. 'This is my country,' she said, tracing the coastline with her finger. 'This -' she drew a line two inches inland '- is my country in thirty years.'\n\nThe industrial minister across the table cleared his throat. 'We sympathize, of course. But you must understand, our economy -'\n\n'Your economy,' she said, folding the map, 'is what is drowning mine.'"
 un_events.17.t:0 "Climate Change Resolution"
 un_events.18.a:0 "Launch a major resettlement program."
 un_events.18.b:0 "Accept a managed quota."
 un_events.18.c:0 "Close the borders. Not our problem."
 un_events.18.d:0 "Conflict and famine in [SCOPE.sCountry('refugee_source').GetName] have created a massive refugee crisis. Millions are seeking safety, and the United Nations is calling on member states to accept resettlement quotas."
 un_events.18.d_closed:0 "Conflict in [SCOPE.sCountry('refugee_source').GetName] has displaced millions, and the United Nations is pressuring member states to accept resettlement quotas. For [ROOT.GetCountry.GetName], with our closed borders, this request is unwelcome."
 un_events.18.d_open:0 "Conflict in [SCOPE.sCountry('refugee_source').GetName] has displaced millions. With our open borders policy, [ROOT.GetCountry.GetName] is already a destination for many, but the sheer scale tests even our generous infrastructure."
 un_events.18.f:0 "The border guard studied the woman's papers - or rather, the scrap of cardboard that served as papers. Behind her, the queue stretched to the horizon. Children slept standing up, leaning against their mothers' legs.\n\n'These documents are not valid,' he said.\n\nShe looked at him with the flat patience of someone who has been told this before. 'Neither is the country that issued them. It does not exist anymore. So here I am.'"
 un_events.18.t:0 "International Refugee Crisis"
 un_events.19.a:0 "Full partnership. To the stars together."
 un_events.19.b:0 "Limited contribution."
 un_events.19.c:0 "Space serves national interests."
 un_events.19.d:0 "The United Nations is proposing an international space cooperation program - a joint effort to build an orbital research station and share the costs of exploration. For [ROOT.GetCountry.GetName], this is a chance to participate in one of humanity's greatest endeavors."
 un_events.19.d_authoritarian:0 "The United Nations has proposed an international space cooperation program. For [ROOT.GetCountry.GetName], our space program is as much a military and prestige asset as a scientific one. Sharing it would compromise strategic advantages."
 un_events.19.d_council:0 "The United Nations has proposed international space cooperation. For [ROOT.GetCountry.GetName], our space program represents the triumph of collective planning - we will not easily share our achievements with the bourgeois powers."
 un_events.19.f:0 "The mission director stood before the assembled delegations and pointed to the architectural model of the station. 'Twelve modules,' he said. 'Six nations. One orbit.'\n\n'And whose flag flies on the outside?' someone asked from the back.\n\nThe director permitted himself a thin smile. 'That, excellency, is precisely the question we are here to avoid.'"
 un_events.19.t:0 "International Space Cooperation"
 un_events.2.a:0 "Propose a condemnation resolution to the General Assembly."
 un_events.2.b:0 "Vote in favor, but let others lead."
 un_events.2.c:0 "We shall abstain from this vote."
 un_events.2.d:0 "The General Assembly has convened an emergency session to address the military aggression of [SCOPE.sCountry('condemned_country').GetName]. Delegates from around the world are calling for a formal condemnation resolution, and [ROOT.GetCountry.GetName] must decide how to vote."
 un_events.2.f:0 "The delegate from [SCOPE.sCountry('defender_country').GetName] rose to speak, his hands trembling. 'My country has no army,' he said. 'We have no bombs, no warships, no leverage of any kind. We have only this chamber and the hope that words spoken here still carry some weight.'\n\nThe gallery fell silent. For a moment, the institution almost believed in itself."
 un_events.2.t:0 "General Assembly Condemns Aggression"
 un_events.20.a:0 "Condemn the walkout. Rally the faithful."
 un_events.20.b:0 "Call for dialogue and reconciliation."
 un_events.20.c:0 "Join the walkout."
 un_events.20.d:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a dramatic walkout from the General Assembly, followed by several aligned nations. The departing delegates accused the Assembly of bias and hypocrisy, throwing the institution into crisis."
 un_events.20.d_authoritarian:0 "The authoritarian bloc led by [SCOPE.sCountry('walkout_leader').GetName] has walked out of the General Assembly in protest, accusing the institution of meddling in sovereign affairs."
 un_events.20.d_council:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a walkout from the General Assembly, taking the socialist bloc with them. The [SCOPE.sCountry('walkout_leader').GetAdjectiveName] ambassador denounced the institution as a tool of capitalist hegemony before storming out."
 un_events.20.d_hq:0 "\n\nThe walkout unfolds at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where empty seats stand as a visible rebuke to the institution's authority."
 un_events.20.d_theocratic:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a walkout of religiously-aligned nations, condemning the institution for promoting values incompatible with divine law."
 un_events.20.f:0 "The doors slammed. The echo rolled across the chamber like a judgment. For a long moment, no one spoke.\n\nThen the secretary-general removed his reading glasses and looked at the empty seats. 'Well,' he said, with the calm of a man watching his house burn from a safe distance. 'I suppose we shall have to manage without them.'\n\n'Can we?' his aide whispered.\n\n'That, my dear fellow, is the question this institution was built to answer.'"
 un_events.20.t:0 "Assembly Walkout"
 un_events.3.a:0 "Propose the declaration to the General Assembly."
 un_events.3.b:0 "Sign with reservations."
 un_events.3.c:0 "We will not be bound by this."
 un_events.3.d:0 "A Universal Declaration of Human Rights has been proposed at the United Nations, establishing fundamental freedoms as the common standard for all peoples and nations. Ratifying it would signal our commitment to the international order, though some provisions may conflict with domestic policy."
 un_events.3.d_authoritarian:0 "A Universal Declaration of Human Rights has been proposed, drafted by a committee of idealists. For [ROOT.GetCountry.GetName], where the state ensures order, many of these so-called rights are tools of subversion dressed as principles. Yet refusing to sign entirely would make us a pariah."
 un_events.3.d_council:0 "A Universal Declaration of Human Rights has been proposed. For [ROOT.GetCountry.GetName], it affirms rights our revolution was fought to secure - work, education, social security. But it also enshrines bourgeois civil liberties historically used to protect the exploiting class."
 un_events.3.d_theocratic:0 "A Universal Declaration of Human Rights has been proposed. For [ROOT.GetCountry.GetName], where law derives from divine authority, some provisions align with sacred teachings - the dignity of the person, the prohibition of torture. But others contradict the divine order, particularly concerning freedom of religion."
 un_events.3.f:0 "'Article One,' the chairwoman read aloud. 'All human beings are born free and equal in dignity and rights.' She looked up from the page. 'Does any delegation object?'\n\nA long silence. Then, from the back row, a dry voice: 'To the sentiment, Madam Chair, no one objects. To the enforcement - that is where the arguments begin.'"
 un_events.3.t:0 "Declaration of Universal Human Rights"
 un_events.4.a:0 "Deploy a full peacekeeping force."
 un_events.4.b:0 "Send observers only."
 un_events.4.c:0 "We cannot spare the resources."
 un_events.4.d:0 "The Security Council has authorized a peacekeeping mission in the conflict zone involving [SCOPE.sCountry('peacekeeping_target').GetName]. As a committed contributor, [ROOT.GetCountry.GetName] has been called upon to provide troops for the operation."
 un_events.4.f:0 "The colonel studied the deployment orders and folded them carefully into his breast pocket. 'Blue helmets,' he said to his adjutant. 'Rules of engagement that would embarrass a traffic warden. No authority to fire unless fired upon, and even then, only if committee approves.'\n\nHe paused at the door. 'Still. Someone has to stand between the guns.'"
 un_events.4.t:0 "Peacekeeping Mission Authorized"
 un_events.5.a:0 "Enforce the sanctions strictly."
 un_events.5.b:0 "Partial compliance - the letter of the law."
 un_events.5.c:0 "Quietly profit from the gaps."
 un_events.5.d:0 "The UN sanctions against [SCOPE.sCountry('sanctioned_country').GetName] are now in effect, but enforcement requires active cooperation from member states. Strict compliance will hurt our own trade routes; the alternative is to quietly circumvent the very institution we helped create."
 un_events.5.f:0 "'The manifest says fertilizer,' the customs inspector said, turning the page with exaggerated slowness. 'Quite a lot of fertilizer.' He looked up. 'For a country with no farms.'\n\nThe shipping agent smiled and slid an envelope across the desk. 'A clerical error. I'm sure you understand.'"
 un_events.5.t:0 "Enforcing the Sanctions Regime"
 un_events.6.a:0 "Champion reform. The UN must evolve."
 un_events.6.b:0 "Defend the status quo. Our veto is sacred."
 un_events.6.c:0 "Propose a middle path."
 un_events.6.d:0 "A growing coalition of nations is demanding reform of the Security Council. The current structure, with its permanent members and veto power, is seen as increasingly unrepresentative. As a great power, [ROOT.GetCountry.GetName] must decide whether to champion reform or defend the status quo."
 un_events.6.d_authoritarian:0 "A growing coalition demands reform of the Security Council. For [ROOT.GetCountry.GetName], the veto is essential - it ensures no resolution can pass that threatens our interests. Championing reform might buy goodwill, but would dilute our influence."
 un_events.6.d_council:0 "A growing coalition demands reform of the Security Council. As a council republic, [ROOT.GetCountry.GetName] can champion democratic reform - arguing that the veto power of a few great powers is fundamentally undemocratic - but abolishing the veto would also strip our ability to block hostile resolutions."
 un_events.6.d_hq:0 "\n\nDelegates have gathered at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the halls are thick with backroom deals."
 un_events.6.f:0 "'We are told this body represents the world,' the ambassador said, adjusting his spectacles. 'And yet the same five nations have held the same five seats since before half the countries in this room existed.'\n\nThe delegate from the permanent member state inspected his fingernails. 'The architecture has served us well,' he replied. 'One does not renovate a cathedral to please the tourists.'"
 un_events.6.t:0 "UN Reform: Expanding the Security Council"
 un_events.7.a:0 "Mount a major humanitarian relief effort."
 un_events.7.b:0 "Contribute what we can spare."
 un_events.7.c:0 "This is not our responsibility."
 un_events.7.d:0 "Reports from [SCOPE.sCountry('crisis_country').GetName] paint a dire picture - widespread famine, displacement, and suffering on a massive scale. The United Nations has issued an urgent appeal for humanitarian assistance from member states."
 un_events.7.f:0 "The relief coordinator set down the telegram and pressed her palms flat against the desk. 'Three hundred thousand displaced,' she said. 'That is the confirmed figure. The actual number is anyone's guess.'\n\nHer aide handed her a coffee, gone cold. 'How much can we send?'\n\n'The question is not how much we can send. The question is how much we are willing to be seen not sending.'"
 un_events.7.t:0 "Humanitarian Crisis Demands Response"
 un_events.8.a:0 "Accept the ruling. We must uphold the law."
 un_events.8.b:0 "Contest the court's jurisdiction."
 un_events.8.c:0 "We do not recognize this verdict."
 un_events.8.d:0 "The International Court of Justice has issued a ruling against [ROOT.GetCountry.GetName], citing violations of international humanitarian law. The ruling is non-binding but carries enormous symbolic weight. Compliance would require modifications to our military conduct and possible reparations."
 un_events.8.f:0 "'The court has ruled,' the foreign minister said, tossing the document onto the cabinet table. 'We are, it seems, in violation of seventeen articles of international law that half the world's nations have never read.'\n\n'And the other half?' the defence minister asked.\n\n'The other half would prefer we hadn't read them either.'"
 un_events.8.t:0 "International Court Rules Against Us"
 un_events.9.a:0 "Fully fund our heritage preservation program."
 un_events.9.b:0 "Participate with limited funding."
 un_events.9.c:0 "Culture is a domestic matter."
 un_events.9.d:0 "UNESCO has launched a program to identify and preserve sites of outstanding cultural and natural heritage. Several sites within [ROOT.GetCountry.GetName] have been nominated, and participation would boost our prestige, though it requires funding and accepting international oversight."
 un_events.9.f:0 "The antiquarian ran his hand across the ancient stonework. 'This wall is older than our nation,' he said. 'Older than most nations.'\n\nThe treasury official beside him frowned at the estimate. 'And the cost of preserving it is older than my patience. Can we not simply photograph it and move on?'\n\n'You can photograph a ruin. You cannot photograph what it meant to stand.'"
 un_events.9.t:0 "UNESCO: Protecting World Heritage"

#
# UN_VOTE
#
 un_vote.1.a:0 "We vote in favor."
 un_vote.1.b:0 "We vote against."
 un_vote.1.c:0 "We abstain."
 un_vote.1.d:0 "A resolution has been proposed to the General Assembly. All member states are called upon to cast their vote."
 un_vote.1.d_climate:0 "The General Assembly has received a proposal for a binding Climate Accord from [SCOPE.sCountry('un_vote_proposer').GetName], requiring member states to commit to specific emissions reduction targets. A vote in favor commits our country to binding limits on industrial pollution."
 un_vote.1.d_condemn:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has brought a resolution before the General Assembly calling for the formal condemnation of [SCOPE.sCountry('un_vote_target').GetName] for its military aggression. The eyes of the world are upon us - how shall [ROOT.GetCountry.GetName] vote?"
 un_vote.1.d_human_rights:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed a Universal Declaration of Human Rights to the General Assembly, establishing fundamental freedoms as the common standard for all peoples and nations. A vote in favor means our country ratifies the declaration and commits to upholding its principles."
 un_vote.1.d_npt:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has brought the Nuclear Non-Proliferation Treaty before the General Assembly. A vote in favor commits [ROOT.GetCountry.GetName] to the treaty's terms - renouncing the pursuit of nuclear weapons and accepting international inspections."
 un_vote.1.f:0 "'All those in favor,' the president of the assembly intoned, 'shall signify by raising their placards. All those against, likewise. Abstentions will be recorded.'\n\nThe delegates shifted in their seats. Some glanced at allies for reassurance. Others stared straight ahead, already decided. Everyone understood that the real negotiations had happened in the corridors long before this moment."
 un_vote.1.t:0 "UN General Assembly Vote"
 un_vote.1.t_climate:0 "Climate Accord Vote"
 un_vote.1.t_condemn:0 "Condemnation Resolution Vote"
 un_vote.1.t_human_rights:0 "Human Rights Declaration Vote"
 un_vote.1.t_npt:0 "Non-Proliferation Treaty Vote"
 un_vote.2.a:0 "So it is decided."
 un_vote.2.d_climate_failed:0 "The proposed Climate Accord has failed in the General Assembly. Industrial economies and their allies successfully blocked the resolution, arguing that binding emissions targets would cripple economic growth. The atmosphere, it seems, must wait for the balance sheets to improve."
 un_vote.2.d_climate_passed:0 "The Climate Accord has been adopted by the General Assembly with a decisive majority. Binding emissions targets are now enshrined in international law. A landmark moment - though the hard work of implementation lies ahead."
 un_vote.2.d_condemn_failed:0 "The condemnation resolution against [SCOPE.sCountry('un_vote_target').GetName] has failed to achieve a majority in the General Assembly. Divided loyalties and geopolitical calculations have shielded the aggressor from international censure. A dark day for the international order."
 un_vote.2.d_condemn_passed:0 "The General Assembly has voted to formally condemn the military aggression of [SCOPE.sCountry('un_vote_target').GetName]. The resolution carried by a clear majority, sending an unambiguous message: the international community will not stand silent in the face of naked aggression."
 un_vote.2.d_failed:0 "The resolution has failed to achieve a majority in the General Assembly. The proposing delegation gathers its papers in silence."
 un_vote.2.d_human_rights_failed:0 "The proposed Universal Declaration of Human Rights has failed to achieve majority support in the General Assembly. Too many nations found its provisions inconvenient, its aspirations too demanding. The dream of a universal standard for human dignity has been deferred."
 un_vote.2.d_human_rights_passed:0 "The Universal Declaration of Human Rights has been adopted by the General Assembly with overwhelming support. A new chapter in international law begins - fundamental freedoms are now the declared standard of the civilized world. The UN Human Rights Council is established to monitor compliance."
 un_vote.2.d_npt_failed:0 "The Nuclear Non-Proliferation Treaty has failed to pass the General Assembly. Nuclear powers and aspiring states alike found common cause in rejecting constraints on their arsenals. The atom remains unbound by international law."
 un_vote.2.d_npt_passed:0 "The Nuclear Non-Proliferation Treaty has been adopted by the General Assembly with a strong majority. The international community has spoken clearly against the spread of nuclear weapons. The International Atomic Energy Agency is established to enforce the treaty's provisions."
 un_vote.2.d_passed:0 "The resolution has passed the General Assembly with a clear majority. The international community has spoken."
 un_vote.2.f_failed:0 "The president's gavel fell with a hollow sound. 'The resolution has not achieved the required majority,' he announced. 'It is hereby rejected.'\n\nThe proposing delegation gathered their papers in silence. A sympathetic colleague leaned over: 'You can always try again next year.'\n\n'Next year,' came the tired reply, 'may be too late.'"
 un_vote.2.f_passed:0 "The president's gavel fell. For a moment, the chamber erupted - one side in applause, the other in stony silence.\n\n'The resolution is adopted,' the president announced. 'Let the record show that the General Assembly has spoken.'\n\nWhether anyone would listen was, as always, another matter entirely."
 un_vote.2.t:0 "General Assembly Vote Results"

#
# WORLD_WAR_EVENTS
#
 world_war_events.1.a:0 "We will not yield an inch."
 world_war_events.1.b:0 "Open negotiations."
 world_war_events.1.c:0 "Issue a counter-ultimatum."
 world_war_events.1.d:0 "[SCOPE.sCountry('ideological_rival').GetName] has issued a series of provocative demands, challenging our ideological stance on the world stage. Their aggressive posture threatens to destabilize the fragile peace between the great powers."
 world_war_events.1.f:0 "The foreign minister read the demands aloud, then set the paper down and removed his spectacles.\n\n'They wish us to renounce our system of government,' he said. 'Publicly. Before the world press.'\n\nThe room was quiet for a long time.\n\n'And if we refuse?'\n\n'Then, I rather think, we shall have our answer about whether they want peace or something else entirely.'"
 world_war_events.1.t:0 "Ideological Confrontation"
 world_war_events.10.a:0 "Sell war bonds!"
 world_war_events.10.b:0 "Use this moment for conscription."
 world_war_events.10.d:0 "A surge of patriotic fervor sweeps the nation. Citizens line the streets waving flags, factories run double shifts, and volunteers flood recruitment offices. The will to fight has never been stronger."
 world_war_events.10.f:0 "The factory foreman wiped his hands on his apron and addressed the morning shift. 'Double production this week,' he said. 'The front needs shells more than you need sleep.'\n\nNo one complained. The woman at the lathe had received a telegram yesterday. Her husband was not coming home. She picked up her tools and worked a sixteen-hour shift without a word."
 world_war_events.10.t:0 "Home Front Rally"
 world_war_events.100.a:0 "Impose a harsh peace."
 world_war_events.100.b:0 "Seek a just and lasting peace."
 world_war_events.100.c:0 "Establish a new world order."
 world_war_events.100.d:0 "The guns have fallen silent at last. The victorious powers gather to redraw the map of the world and shape the post-war order. The decisions made here will echo for generations."
 world_war_events.100.f:0 "The delegates filed into the palace hall in silence. Chandeliers blazed overhead; below, the carpet was threadbare from the boots of soldiers quartered there during the siege.\n\n'Shall we begin?' the chairman asked.\n\nA diplomat from the losing side studied his hands. 'We are here to receive your terms,' he said. 'Let us not pretend this is a negotiation.'\n\nThe chairman permitted himself a thin smile. 'Quite right. Shall we call it an opportunity instead?'"
 world_war_events.100.t:0 "The Peace Conference"
 world_war_events.101.a:0 "Accept the new order."
 world_war_events.101.b:0 "Resist the occupation."
 world_war_events.101.d:0 "The victorious powers have demanded a complete transformation of our government. Our former ideology - the one we fought and bled for - is to be dismantled. A new political order will be imposed upon us."
 world_war_events.101.f:0 "The foreign officer placed the document on the desk with the careful courtesy of a man delivering a death sentence. 'Your new constitution,' he said. 'We have taken the liberty of drafting it.'\n\nThe minister stared at the seal - not his nation's seal, but theirs. 'And if we object to its provisions?'\n\n'You misunderstand your position. You may object to the font.'"
 world_war_events.101.t:0 "Regime Change"
 world_war_events.102.a:0 "Accept the aid."
 world_war_events.102.b:0 "We will rebuild alone."
 world_war_events.102.d:0 "The victorious powers have offered substantial aid to rebuild our shattered nation. Their generosity comes with strings attached - closer economic ties, political alignment, and a permanent military presence. But the alternative is years of poverty and isolation."
 world_war_events.102.f:0 "The trucks arrived at dawn, stenciled with foreign markings. Canned meat, steel girders, sacks of cement. The mayor stood in the rubble of what had been the town hall and watched them unload.\n\n'Generous of them,' his deputy muttered.\n\n'Generous.' The mayor kicked a piece of masonry. 'Last year they dropped bombs on us. This year, powdered milk. I suppose that is what they call the arc of civilization.'"
 world_war_events.102.t:0 "Reconstruction Aid"
 world_war_events.103.a:0 "Prosecute the war criminals."
 world_war_events.103.b:0 "Focus on healing, not vengeance."
 world_war_events.103.c:0 "Bury the evidence."
 world_war_events.103.d:0 "As the fog of war lifts, horrifying revelations emerge about atrocities committed during the conflict. Mass graves, forced labor, systematic brutality - the scale of the crimes shocks the world. The question is: what do we do about it?"
 world_war_events.103.f:0 "The prosecutor held up the photograph. The courtroom fell silent.\n\n'The defendant claims he was following orders,' she said. 'Let us examine what those orders produced.'\n\nIn the dock, the old soldier stared straight ahead. He had not spoken since the trial began. His lawyer had advised him to show remorse. He showed nothing at all, and in its way, that was the most damning testimony of the week."
 world_war_events.103.t:0 "War Crimes Tribunal"
 world_war_events.104.a:0 "Establish our sphere of influence."
 world_war_events.104.b:0 "Champion self-determination."
 world_war_events.104.c:0 "Focus on domestic recovery."
 world_war_events.104.d:0 "With the great conflict behind us, the victorious powers must decide what kind of world they wish to build. Spheres of influence, new alliances, and international institutions are all on the table."
 world_war_events.104.f:0 "'We have won the war,' the prime minister said, pouring himself a brandy. 'Now we must win the peace, which, I am given to understand, is considerably more difficult.'\n\n'Spheres of influence?'\n\n'Naturally. The question is how large a sphere our friends will permit us, and how small a sphere we can persuade our enemies to accept.'\n\nHe raised his glass. 'To the new world order. May it last longer than the one we just buried.'"
 world_war_events.104.t:0 "The Post-War Order"
 world_war_events.105.a:0 "Prepare for the long struggle."
 world_war_events.105.b:0 "Seek peaceful coexistence."
 world_war_events.105.d:0 "The war is over, but already the seeds of the next conflict are being sown. [SCOPE.sCountry('new_rival_power').GetName] - once our ally of convenience - now stands as the greatest rival to our vision of the world. Two superpowers, two ideologies, one world."
 world_war_events.105.f:0 "The intelligence briefing was three pages long. The analyst summarized it in one sentence: 'They are building what we are building, and they are not building it for friendship.'\n\nThe defence minister closed the folder. 'Six months ago they were our allies.'\n\n'Six months ago we had a common enemy. Now we are each other's.'"
 world_war_events.105.t:0 "The New Rivalry"
 world_war_events.11.a:0 "Strengthen air defenses."
 world_war_events.11.b:0 "Retaliate in kind."
 world_war_events.11.c:0 "Focus on the ground war."
 world_war_events.11.d:0 "Enemy bombers have struck our cities, leaving devastation in their wake. Fires burn through the night as rescue crews dig through the rubble. The civilian toll mounts, but so does our resolve."
 world_war_events.11.f:0 "The sirens woke the children first. Then the thunder came - not from the sky but from the street, where the grocery had stood that morning.\n\nThe warden found the family in the cellar, covered in plaster dust, the youngest still clutching a wooden horse. 'Everyone accounted for?' he asked.\n\n'Everyone,' the mother said. She did not mention the cat, or the kitchen, or the life they had built above ground. There would be time for that later. Or there would not."
 world_war_events.11.t:0 "Strategic Bombing"
 world_war_events.12.a:0 "Support the resistance."
 world_war_events.12.b:0 "Order a crackdown."
 world_war_events.12.d:0 "In the occupied territories, a resistance movement has taken root. Brave men and women sabotage enemy supply lines, shelter fugitives, and maintain a flicker of hope in the darkness of occupation."
 world_war_events.12.f:0 "The baker slid the loaves across the counter and, beneath them, a folded note. The customer pocketed it without looking.\n\n'Same time Thursday?' she asked.\n\n'If the flour holds out.'\n\nNeither smiled. In occupied territory, a smile between strangers was as conspicuous as a gunshot."
 world_war_events.12.t:0 "Resistance Movement"
 world_war_events.2.a:0 "Demand a formal apology."
 world_war_events.2.b:0 "Downplay the incident."
 world_war_events.2.c:0 "Mobilize troops to the border."
 world_war_events.2.d:0 "A violent skirmish has erupted along the frontier with [SCOPE.sCountry('border_rival').GetName]. Shots were fired and casualties reported. Both sides blame the other. The incident threatens to spiral into something far larger."
 world_war_events.2.f:0 "The lieutenant's hands were still shaking when he filed the report. 'They crossed the line,' he said. 'I gave the order to fire.'\n\n'And the casualties?'\n\n'Three of theirs. One of ours. A corporal, twenty-two years old.'\n\nThe colonel closed the file. Somewhere between this desk and the capital, those numbers would become a crisis."
 world_war_events.2.t:0 "Border Incident"
 world_war_events.20.a:0 "Enter the war against the aggressors."
 world_war_events.20.b:0 "Provide material support only."
 world_war_events.20.c:0 "Maintain our neutrality."
 world_war_events.20.d:0 "The world war rages on, and we have remained on the sidelines. But the balance of power is shifting, and neutrality grows ever more untenable. [SCOPE.sCountry('ww_main_aggressor').GetName] grows stronger with each passing month. If we do not act soon, the window of opportunity may close forever."
 world_war_events.20.f:0 "The general spread the map across the cabinet table and tapped the front line with a blunt finger. 'Here,' he said. 'And here. If they break through, there will be nothing between them and the coast.'\n\n'And if we intervene?'\n\n'Then we are at war.' He folded his arms. 'But if we do not intervene, excellency, we shall be at their mercy - which, I assure you, is considerably worse.'"
 world_war_events.20.t:0 "The Hour of Decision"
 world_war_events.3.a:0 "Guarantee their sovereignty."
 world_war_events.3.b:0 "This is not our fight."
 world_war_events.3.c:0 "Form a defensive alliance."
 world_war_events.3.d:0 "[SCOPE.sCountry('crisis_aggressor').GetName] is pressuring smaller nations in our sphere of influence, demanding territorial concessions and political subservience. If we do not act, the balance of power may shift irrevocably."
 world_war_events.3.f:0 "The ambassador from the small nation placed both palms flat on the table, as if to steady himself. 'If your guarantees mean nothing,' he said, 'then say so plainly, and we will make other arrangements.'\n\n'What arrangements?' the foreign minister asked.\n\n'The only kind available to nations without powerful friends: surrender.'"
 world_war_events.3.t:0 "Diplomatic Crisis"
 world_war_events.30.a:0 "We must push through to victory."
 world_war_events.30.b:0 "Explore diplomatic channels."
 world_war_events.30.d:0 "The war has dragged on far longer than anyone expected. Casualty lists grow longer by the day, food is scarce, and the civilian population is exhausted. Voices demanding peace grow louder - but our enemies show no sign of surrender."
 world_war_events.30.f:0 "The postman no longer knocked. He simply left the telegrams on the step, because the sound of knocking had become something the women on this street could not bear to hear.\n\n'Another one,' the neighbor said, watching from her window. 'The Hendersons.'\n\n'That's their third son.'\n\nSilence. Somewhere, a church bell rang. It had been ringing for so many funerals that no one could remember the last time it rang for joy."
 world_war_events.30.t:0 "War Weariness"
 world_war_events.5.a:0 "To arms! For our nation and our cause!"
 world_war_events.5.d:0 "The tensions that have been building for years have finally exploded into open conflict. The great powers have chosen their sides. There is no turning back now - the world is engulfed in the most devastating war in human history."
 world_war_events.5.f:0 "The telegram arrived at three in the morning. The minister read it standing in his dressing gown, his face grey in the lamplight.\n\n'War,' he said. The word hung in the air like smoke.\n\nHis secretary waited, pen in hand. 'Shall I draft the mobilization order?'\n\n'Draft it. Date it. And pray to God that the men who must carry it out are braver than I feel at this moment.'"
 world_war_events.5.t:0 "The World at War"

#
# OTHER_EVENT_KEYS
#
 banking_event_austerity:0 "Government Austerity"
 banking_event_austerity_desc:0 "Severe spending cuts have been imposed to reassure bond markets, reducing borrowing costs but cutting bureaucratic capacity."
 banking_event_cb_independence:0 "Central Bank Independence"
 banking_event_cb_independence_desc:0 "The government has affirmed the central bank's independence, bolstering market confidence and reducing borrowing costs."
 banking_event_consolidation_boom:0 "Bank Consolidation Boom"
 banking_event_consolidation_boom_desc:0 "The consolidation of the banking sector has created larger, more efficient institutions that are channeling capital more effectively into the services economy."
 banking_event_credit_rebalance:0 "Credit Rebalancing"
 banking_event_credit_rebalance_desc:0 "Government policy is redirecting credit from oversaturated industrial sectors toward consumer-facing enterprises."
 banking_event_currency_collapse:0 "Currency Collapse"
 banking_event_currency_collapse_desc:0 "The national currency has lost significant value, disrupting trade and damaging our international prestige."
 banking_event_deposit_guarantee_emergency:0 "Emergency Deposit Guarantee"
 banking_event_deposit_guarantee_emergency_desc:0 "The government has guaranteed all bank deposits in an emergency measure to halt the bank run, at significant fiscal cost."
 banking_event_derivatives_crackdown:0 "Derivatives Crackdown"
 banking_event_derivatives_crackdown_desc:0 "Aggressive prosecution of financial fraud has chilled the derivatives market, reducing services output and raising borrowing costs."
 banking_event_dual_mandate:0 "Dual Central Bank Mandate"
 banking_event_dual_mandate_desc:0 "The central bank has been restructured with a dual mandate for both price stability and employment, modestly supporting growth."
 banking_event_emergency_controls:0 "Emergency Capital Controls"
 banking_event_emergency_controls_desc:0 "Emergency restrictions on capital movement have been imposed to stem a currency crisis, constraining trade."
 banking_event_fx_defense:0 "Foreign Exchange Defense"
 banking_event_fx_defense_desc:0 "The central bank is burning through foreign reserves to defend the currency, at significant fiscal cost."
 banking_event_gold_defense:0 "Gold Standard Defense"
 banking_event_gold_defense_desc:0 "High interest rates are being maintained to defend the gold peg, restricting credit availability."
