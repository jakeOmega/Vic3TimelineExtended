l_english:

#
# AUGMENTATION_EVENTS
#
 augmentation_events.1.a:0 "Subsidize augmentation for all"
 augmentation_events.1.b:0 "Let the market decide"
 augmentation_events.1.c:0 "Ban non-medical augmentation"
 augmentation_events.1.d:0 "A growing chasm separates the augmented and the natural. Wealthy citizens enhance themselves with cybernetic implants and genetic modifications, while the poor are left behind. Social tensions are rising."
 augmentation_events.1.f:0 "A man lifted a motorcar with one arm while his neighbour watched from across the street, unaugmented, wondering how long before his own job required the same."
 augmentation_events.1.t:0 "The Augmentation Divide"
 augmentation_events.100.a:0 "Accept the new reality"
 augmentation_events.100.b:0 "Mandate human purity"
 augmentation_events.100.desc:0 "Society has fractured along the augmentation line. The enhanced elite live in a different world from the natural majority. The debate is over: not because it was resolved, but because the divide has become permanent."
 augmentation_events.100.f:0 "The last unaugmented factory in the city closed on a Tuesday. There was nobody left who could work it at the speed the market required."
 augmentation_events.100.t:0 "The Great Divide"
 augmentation_events.2.a:0 "Crack down on the black market"
 augmentation_events.2.b:0 "Regulate and legalize"
 augmentation_events.2.c:0 "It's their own fault"
 augmentation_events.2.d:0 "A spate of deaths from faulty black market implants has shocked the nation. Underground clinics offer dangerous augmentations to those who cannot afford regulated procedures. Something must be done."
 augmentation_events.2.f:0 "The coroner counted three this week — all young, all poor, all fitted with implants that should never have been sold."
 augmentation_events.2.t:0 "Black Market Implants"
 augmentation_events.200.a:0 "The future is already here."
 augmentation_events.200.d:0 "Human augmentation technology has been fully integrated into [ROOT.GetCountry.GetAdjective] society. Once controversial, enhanced capabilities are now widely accepted as the next step in human development."
 augmentation_events.200.f:0 "#italic We did not cease to be human — we became more.#!"
 augmentation_events.200.t:0 "The Augmented Society"
 augmentation_events.3.a:0 "Protect unaugmented workers"
 augmentation_events.3.b:0 "Let the market decide"
 augmentation_events.3.c:0 "Mandate augmentation for competitive industries"
 augmentation_events.3.d:0 "Employers are quietly replacing unaugmented workers with enhanced employees who can work faster, think sharper, and never tire. Unions are furious, warning of a new underclass of 'naturals' locked out of the economy."
 augmentation_events.3.f:0 "The hiring notice read 'enhanced reflexes preferred.'"
 augmentation_events.3.t:0 "Workplace Discrimination"
 augmentation_events.4.a:0 "Dismiss religious concerns"
 augmentation_events.4.b:0 "Establish an ethics board with religious input"
 augmentation_events.4.c:0 "Side with the devout"
 augmentation_events.4.d:0 "The [SCOPE.gsInterestGroup('devout_ig').GetName] have declared human augmentation an affront to divine creation. Religious leaders thunder that humanity is \"playing God\" and demand restrictions on all enhancement technologies."
 augmentation_events.4.f:0 "The archbishop held up a photograph of a chrome-plated hand and asked his congregation: 'Is this still a child of God?'"
 augmentation_events.4.t:0 "Religious Condemnation"
 augmentation_events.5.a:0 "Augment the police force to match"
 augmentation_events.5.b:0 "Implement implant kill-switches"
 augmentation_events.5.c:0 "Use as justification to ban augmentation"
 augmentation_events.5.d:0 "A wave of crimes committed by augmented individuals has overwhelmed law enforcement. Enhanced strength, built-in hacking tools, and sensory augmentations have given criminals capabilities that traditional policing cannot match."
 augmentation_events.5.f:0 "The suspect vaulted a three-metre wall without breaking stride. His legs had been replaced six months ago. The officers pursuing him had not."
 augmentation_events.5.t:0 "Augmented Crime Wave"

#
# BANKING_CYCLE_EVENTS
#
 banking_cycle_events.1.a:0 "Let the market ride!"
 banking_cycle_events.1.b:0 "Issue a regulatory warning"
 banking_cycle_events.1.c:0 "Impose emergency lending restrictions"
 banking_cycle_events.1.d:0 "Reports are flooding in from every trading floor and financial institution: a wave of speculative fervor has gripped the markets. New ventures are attracting staggering sums, share prices climb daily, and fortunes are being made - at least on paper. Our central bankers are divided on whether this exuberance reflects genuine economic strength or a dangerous delusion."
 banking_cycle_events.1.f:0 "\"I put in five hundred on Monday. By Thursday it was twelve hundred. I've never seen anything like it.\"\n\n\"You haven't seen anything yet, friend. My broker says this is just the beginning.\"\n\n\"That's what they said about the last one, too.\""
 banking_cycle_events.1.t:0 "Speculative Mania"
 banking_cycle_events.10.a:0 "Announce austerity measures"
 banking_cycle_events.10.b:0 "Reassure markets with central bank intervention"
 banking_cycle_events.10.c:0 "Default on some obligations"
 banking_cycle_events.10.d:0 "The bond market has turned hostile. Yields on government debt are climbing sharply as investors demand ever-higher premiums to hold our obligations. Rumors of imminent default are spreading, and the cost of servicing the national debt is consuming an alarming share of revenue. Without decisive action, the country risks losing access to credit markets entirely."
 banking_cycle_events.10.f:0 "\"The Treasury Secretary looked pale when he presented the figures. 'At current rates,' he said, 'we will be spending more on interest than on the army within eighteen months.'\"\n\n\"And if we can't borrow?\"\n\n\"Then we can't govern.\""
 banking_cycle_events.10.t:0 "Sovereign Debt Scare"
 banking_cycle_events.101.a:0 "Maintain the Directive"
 banking_cycle_events.101.b:0 "Issue a Corrective Addendum"
 banking_cycle_events.101.c:0 "Suspend and Enforce Production Ceilings"
 banking_cycle_events.101.d:0 "Central planning authorities have issued a surge of new production directives that exceed the logistical capacity of the transport network. Coal shipments are arriving at the wrong depots, machine-tool allocations cross in transit, and three separate ministries have ordered the same factory to simultaneously serve different sectors. The pressure manifests not as panic in the markets but as invisible friction building deep within the supply chain."
 banking_cycle_events.101.f:0 "\"The trains have three different manifests and none of them have the same cargo.\"\n\n\"Then they must have been written by three different bureaus.\""
 banking_cycle_events.101.t:0 "Overextended Production Directive"
 banking_cycle_events.104.a:0 "Full Emergency Reorganisation"
 banking_cycle_events.104.b:0 "Emergency Stockpile Release"
 banking_cycle_events.104.c:0 "Priority Sector Triage"
 banking_cycle_events.104.d:0 "A key industrial hub: a coal depot, a rail switching yard, a tool-making facility: has failed, and its absence is rippling outward through the entire planned network. Factories in three sectors have idled their lines awaiting inputs that will not arrive. This is not a crisis of confidence but of logistics: the plan's interdependencies have produced a cascade that no single ministry can contain alone."
 banking_cycle_events.104.f:0 "\"The coal depot outside the city is empty. The locomotives sit idle.\"\n\n\"Then find another depot. There are eight. Why are they all empty?\""
 banking_cycle_events.104.t:0 "Critical Input Cascade Failure"
 banking_cycle_events.106.a:0 "Issue Emergency Agricultural Production Credit"
 banking_cycle_events.106.b:0 "Accept the Shortfall and Adjust Quotas"
 banking_cycle_events.106.c:0 "Import Grain and Reallocate Resources"
 banking_cycle_events.106.d:0 "Harvest returns are falling well below plan quotas for the season. The problem is not crop failure but logistics: transport allocation orders were misfiled, regional distribution plans were miscoordinated, and urban granaries show surpluses while rural depots run empty. Planners now face the question of whether to extend emergency production credit, accept the shortfall, or source abroad to cover the gap."
 banking_cycle_events.106.f:0 "\"The wagons are returning with straw and not grain.\"\n\n\"Who sent the wrong manifest?\""
 banking_cycle_events.106.t:0 "Agricultural Quota Shortfall"
 banking_cycle_events.11.a:0 "Let the sector self-correct"
 banking_cycle_events.11.b:0 "Force insurers to increase reserves"
 banking_cycle_events.11.c:0 "Government backstop for critical policies"
 banking_cycle_events.11.d:0 "Several major insurance companies have overextended their guarantees, writing policies against risks they cannot possibly cover if called upon simultaneously. A single large disaster - a factory fire, a shipping loss, a crop failure - could trigger a cascade of claims that would bankrupt the insurers and leave thousands of policyholders unprotected."
 banking_cycle_events.11.f:0 "\"The insurance men assured me my factory was fully covered.\"\n\n\"And is it?\"\n\n\"On paper. But the company that wrote the policy has been writing similar ones for half the factories in the district. If mine burns down, they'll pay. If two burn down, they'll struggle. If three burn down, they simply won't exist.\""
 banking_cycle_events.11.t:0 "Insurance Sector Wobble"
 banking_cycle_events.110.a:0 "Impose Austerity on Lower-Priority Sectors"
 banking_cycle_events.110.b:0 "Seek Emergency External Financing"
 banking_cycle_events.110.c:0 "Formally Cancel Some Plan Commitments"
 banking_cycle_events.110.d:0 "The national planning reserve: maintained to service procurement commitments and smooth supply disruptions: is running dangerously low. The cause is not speculation or bond-market panic, but an accumulation of logistics shortfalls, underperforming export sectors, and overcommitted five-year targets. Unless addressed, essential procurement guarantees will begin to lapse and critical suppliers will stop accepting plan-backed orders."
 banking_cycle_events.110.f:0 "\"Our five-year plan assumed steady grain shipments and an export surplus. Without them, the Treasury's ledger looks very different.\"\n\n\"Then someone must revise the plan.\""
 banking_cycle_events.110.t:0 "Plan Reserve Fund Depletion"
 banking_cycle_events.115.a:0 "Defend Hard Currency Allocations"
 banking_cycle_events.115.b:0 "Impose Strict Import Licensing"
 banking_cycle_events.115.c:0 "Permit Production Disruption and Rebalance"
 banking_cycle_events.115.d:0 "The national allocation of foreign exchange has been exhausted months ahead of schedule. Industries that depend on imported components: machine tools, chemical feedstocks, precision instruments: are facing imminent supply collapse. The central planning authority must decide how to allocate the remaining reserves: defend current production at the cost of future flexibility, restrict imports to critical sectors only, or accept that some production targets simply cannot be met this cycle."
 banking_cycle_events.115.f:0 "\"We have no foreign currency left to import coal. Without coal, the turbines stop.\"\n\n\"Then the turbines stop.\""
 banking_cycle_events.115.t:0 "Foreign Exchange Allocation Collapse"
 banking_cycle_events.116.a:0 "Back the Gosplan Technocrats"
 banking_cycle_events.116.b:0 "Side with Party Leadership"
 banking_cycle_events.116.c:0 "Form a Joint Planning-Party Review Committee"
 banking_cycle_events.116.d:0 "A public dispute has broken out between senior Gosplan economists and the Party Secretary's office over the direction of monetary and financial allocations. The technocrats argue that current plan parameters must be respected to maintain credibility with foreign trading partners and domestic industrial coordinators; the Party argues that political priorities: employment targets, popular consumption: must take precedence over bureaucratic rigidity. The resolution will define how planning decisions are made for the next several years."
 banking_cycle_events.116.f:0 "\"Should the monetary office bow to ministers or stick to its technical remit?\"\n\n\"The answer defines how the plan is run.\""
 banking_cycle_events.116.t:0 "Gosplan vs. the Party Secretary"
 banking_cycle_events.117.a:0 "Tolerate the Blat Economy"
 banking_cycle_events.117.b:0 "Formalise and Regulate It"
 banking_cycle_events.117.c:0 "Suppress the Informal Economy"
 banking_cycle_events.117.d:0 "An informal economy of artisan workshops, private household production, and semi-legal exchange networks has been flourishing alongside the official plan. These blat networks fill supply gaps the plan cannot reach: consumer goods, small repairs, personal services: but they also divert labor and materials from official targets. Planning authorities are divided between tolerating them as a useful safety valve, formalising and taxing them, or cracking down in the name of plan discipline."
 banking_cycle_events.117.f:0 "\"They've authorised more vouchers for home goods. The factory can't keep up with spares.\"\n\n\"The unofficial markets fill the gap. Why does that bother you?\""
 banking_cycle_events.117.t:0 "Unofficial Artisan Market Emergence"
 banking_cycle_events.12.a:0 "Defend the peg at all costs"
 banking_cycle_events.12.b:0 "Allow a managed devaluation"
 banking_cycle_events.12.c:0 "Abandon the gold standard entirely"
 banking_cycle_events.12.d:0 "Foreign gold flows are putting severe pressure on our currency peg. To maintain the fixed exchange rate, the central bank must raise interest rates and restrict credit - a deflationary policy that will punish domestic industry. The alternative is to devalue or abandon the peg entirely, which would cheapen exports but destroy the confidence of foreign creditors."
 banking_cycle_events.12.f:0 "\"The gold is leaving the vaults faster than it arrives. Every shipment abroad is a vote of no confidence in our currency.\"\n\n\"Then raise rates.\"\n\n\"And bankrupt every manufacturer who borrowed at the old rate? There must be another way.\"\n\n\"There isn't.\""
 banking_cycle_events.12.t:0 "Gold Standard Pressure"
 banking_cycle_events.120.a:0 "Expose and Prosecute the Entire Network"
 banking_cycle_events.120.b:0 "Tacitly Accept the Allocation Gaps"
 banking_cycle_events.120.c:0 "Quietly Regularise Through New Regulations"
 banking_cycle_events.120.d:0 "Internal security has uncovered an extensive parallel network of informal allocation intermediaries: factory managers, transport officials, and procurement clerks who have been quietly rerouting plan-allocated resources through unofficial channels. Those involved describe it as filling the gaps the plan leaves behind. Critics see it as systematic corruption that undermines the integrity of central planning and creates hidden systemic risks that appear in no official ledger."
 banking_cycle_events.120.f:0 "\"They call it 'the parallel supply line.' But it is the plan itself that failed to reach these depots.\"\n\n\"Accountability begins with an audit. Start there.\""
 banking_cycle_events.120.t:0 "Parallel Allocation Network Uncovered"
 banking_cycle_events.13.a:0 "The market will sort it out"
 banking_cycle_events.13.b:0 "Redirect credit toward consumption sectors"
 banking_cycle_events.13.c:0 "Order a halt to new factory loans"
 banking_cycle_events.13.d:0 "The industrial sector has been building capacity far beyond what current demand can absorb. Warehouses overflow with unsold goods, new factories sit idle weeks after opening, and companies that expanded aggressively on borrowed money are now struggling to service their debts. The overinvestment threatens to turn a boom into a bust if credit suddenly tightens."
 banking_cycle_events.13.f:0 "\"We built the largest cotton mill in the country. It was going to make us rich.\"\n\n\"And?\"\n\n\"And we can't sell a single bale. There are four other mills just like it, all built in the same year, all competing for the same customers, all losing money.\""
 banking_cycle_events.13.t:0 "Industrial Overinvestment"
 banking_cycle_events.14.a:0 "Easy credit for homeowners!"
 banking_cycle_events.14.b:0 "Impose lending standards"
 banking_cycle_events.14.c:0 "Cap mortgage lending entirely"
 banking_cycle_events.14.d:0 "Property prices are soaring as banks compete to offer ever-more generous mortgage terms. Families that could never before afford property are now borrowing aggressively, convinced that prices will only go up. The construction sector is booming, but the mountain of mortgage debt is growing faster than the incomes that must service it."
 banking_cycle_events.14.f:0 "\"My neighbor bought his house for two thousand. That was three years ago. It's worth six thousand now.\"\n\n\"How do you know it's worth six thousand?\"\n\n\"Because that's what the bank will lend against it.\"\n\n\"And how does the bank know?\"\n\n\"Because that's what my neighbor's house is worth.\""
 banking_cycle_events.14.t:0 "Housing Price Spiral"
 banking_cycle_events.15.a:0 "Burn reserves to defend the currency"
 banking_cycle_events.15.b:0 "Impose emergency capital controls"
 banking_cycle_events.15.c:0 "Let the currency float"
 banking_cycle_events.15.d:0 "The foreign exchange markets have turned against us. Speculators are selling our currency in massive volumes, betting that the central bank cannot sustain the current rate. Reserves are draining rapidly as the bank intervenes to support the currency, but each intervention only seems to embolden the attackers."
 banking_cycle_events.15.f:0 "\"We sold two hundred million in reserves yesterday. The currency dropped anyway.\"\n\n\"How much do we have left?\"\n\n\"At this rate? About three weeks' worth.\""
 banking_cycle_events.15.t:0 "Currency Crisis"
 banking_cycle_events.151.a:0 "Permit the Advance Distributions"
 banking_cycle_events.151.b:0 "Issue Advisory Guidance"
 banking_cycle_events.151.c:0 "Mandate Surplus Reserves Before Distributions"
 banking_cycle_events.151.d:0 "Collective enterprises are reporting an unusual surge of early dividend votes ahead of the quarterly settlement. Worker-owners are confident in near-term returns and have voted themselves generous payouts, but the treasury bookkeepers warn that maintenance reserves and reinvestment funds are being drawn down faster than income can replenish them. Town centres are booming; cooperative machinery is quietly going unserviced."
 banking_cycle_events.151.f:0 "\"We've voted generous dividends: the members deserve it.\"\n\n\"And who will mend the machinery next year?\""
 banking_cycle_events.151.t:0 "Dividend Anticipation Wave"
 banking_cycle_events.154.a:0 "Let the Insolvent Cooperatives Liquidate"
 banking_cycle_events.154.b:0 "Activate the Federation Emergency Relief Fund"
 banking_cycle_events.154.c:0 "Facilitate Forced Cooperative Mergers"
 banking_cycle_events.154.d:0 "A simultaneous wave of aggressive dividend payouts and reduced working hours has drained operating cash from cooperatives across the network. Shops are pausing production while reconciling payroll with supplier invoices; smaller collectives cannot meet maintenance schedules. Unlike a bank run, there is no single point of failure: the crisis is distributed, social, and deeply intertwined with member expectations."
 banking_cycle_events.154.f:0 "\"Our members demanded a payout and we gave it. We did the right thing.\"\n\n\"Until the lathe breaks and there's no funds to fix it.\""
 banking_cycle_events.154.t:0 "Cooperative Insolvency Wave"
 banking_cycle_events.156.a:0 "Activate Cooperative Mutual Aid"
 banking_cycle_events.156.b:0 "Accept the Shortfall and Adjust Assessments"
 banking_cycle_events.156.c:0 "Import to Cover the Gap"
 banking_cycle_events.156.d:0 "Several agricultural cooperatives have reported that generous dividend policies and shortened working periods have left them with insufficient funds to sustain harvest operations. Storage and maintenance were cut to meet payout expectations; now that the shortfall is visible, the cooperative network debates whether to redirect mutual-aid reserves, accept the shortfall gracefully, or import supplies and charge costs back to the affected members."
 banking_cycle_events.156.f:0 "\"We shared our harvest out to keep everyone fed. Now we have nothing for the winter repairs.\"\n\n\"Then we will stand together. But who will mend the plow?\""
 banking_cycle_events.156.t:0 "Rural Cooperative Harvest Shortfall"
 banking_cycle_events.16.a:0 "Affirm central bank independence"
 banking_cycle_events.16.b:0 "Override the central bank"
 banking_cycle_events.16.c:0 "Restructure the central bank mandate"
 banking_cycle_events.16.d:0 "Politicians are demanding that the central bank lower interest rates to stimulate growth, regardless of the inflation risk. The central bank governor has pushed back, insisting that monetary policy must remain independent of political pressure. The dispute has become public, and markets are watching closely to see who blinks first."
 banking_cycle_events.16.f:0 "\"The governor says he answers to the economy, not to Parliament.\"\n\n\"Parliament creates the laws that create the governor.\"\n\n\"And the governor controls the money that funds Parliament's promises. It's a stalemate.\""
 banking_cycle_events.16.t:0 "Central Bank Independence Debate"
 banking_cycle_events.160.a:0 "Impose an Emergency Dividend Levy"
 banking_cycle_events.160.b:0 "Seek New Cooperative Credit"
 banking_cycle_events.160.c:0 "Dissolve Some Inter-Cooperative Agreements"
 banking_cycle_events.160.d:0 "The federation's shared capital reserve: used to service inter-cooperative agreements, mutual guarantees, and infrastructure bonds: has been significantly depleted. Member cooperatives have continued to draw on it through dividend-linked obligations while contributing less than projected. The council must now choose between austerity, new credit, or a partial default on some commitments, each with different consequences for trust between federation members."
 banking_cycle_events.160.f:0 "\"Council treasuries are strained; members demand payouts while infrastructure needs repair.\"\n\n\"The ledger won't balance itself: someone must vote for sacrifice.\""
 banking_cycle_events.160.t:0 "Federation Capital Reserve Crisis"
 banking_cycle_events.165.a:0 "Deploy Federation Currency Reserves"
 banking_cycle_events.165.b:0 "Mandate Cooperative Import Substitution"
 banking_cycle_events.165.c:0 "Accept the Structural Adjustment"
 banking_cycle_events.165.d:0 "The currency's depreciation is feeding directly into the cost base of cooperatives that depend on imported inputs: textile dyes, machine spares, chemical additives. Federation pricing coordination has struggled to absorb the shock, and member cooperatives are reporting that production runs are becoming uneconomical. The council faces a choice between deploying reserves, pivoting to domestic sourcing, or accepting the full force of adjustment."
 banking_cycle_events.165.f:0 "\"If the exchange rate keeps moving like this, the cooperative can't buy the parts to fix the looms.\"\n\n\"Then we build our own parts, or we stop.\""
 banking_cycle_events.165.t:0 "Import Cost Spiral"
 banking_cycle_events.166.a:0 "Uphold the Traditionalist Platform"
 banking_cycle_events.166.b:0 "Allow the Reformers to Succeed"
 banking_cycle_events.166.c:0 "Form a Mixed-Mandate Council"
 banking_cycle_events.166.d:0 "A contested election within the Federation Council has produced two rival factions with sharply different visions. One faction: rooted in the older cooperative tradition: argues that financial discipline, democratic accountability, and transparent bookkeeping must govern the federation's financial decisions. A younger reformist faction argues for pragmatic flexibility: professional management, efficiency gains, and less procedural constraint. The outcome will shape how the cooperative federation governs its shared capital for a generation."
 banking_cycle_events.166.f:0 "\"Shall the councils decide or the technocrats? Both claim to care for workers' interests.\"\n\n\"Then let the members vote on which kind of workers' interest they prefer.\""
 banking_cycle_events.166.t:0 "Federation Council Election Dispute"
 banking_cycle_events.167.a:0 "Permit the Loan Expansion"
 banking_cycle_events.167.b:0 "Introduce Per-Member Borrowing Caps"
 banking_cycle_events.167.c:0 "Restrict All Lending Against Dividends"
 banking_cycle_events.167.d:0 "Member-owned credit unions are reporting an unprecedented surge in personal loan applications from cooperative members: primarily for household goods and small improvements. The loans are sound individually, but collectively they are depleting the shared credit pool and reducing the reserves available for capital reinvestment. Some council members argue that financial autonomy is a core cooperative value; others warn that individual borrowing fever is quietly hollowing out collective capacity."
 banking_cycle_events.167.f:0 "\"Members voted for easier borrowing. It's popular today.\"\n\n\"Ask them again when the credit union runs dry.\""
 banking_cycle_events.167.t:0 "Cooperative Member Loan Fever"
 banking_cycle_events.17.a:0 "Let the good times roll!"
 banking_cycle_events.17.b:0 "Introduce borrowing limits"
 banking_cycle_events.17.c:0 "Ban consumer lending"
 banking_cycle_events.17.d:0 "Consumer lending has exploded as households borrow aggressively for purchases that would have been unimaginable a generation ago. Department stores offer installment plans, banks push personal loans, and credit is flowing freely to anyone with a pulse and a signature. The spending is fueling economic growth, but household debt levels are reaching unprecedented heights."
 banking_cycle_events.17.f:0 "\"Buy now, pay later! Every household deserves a motorcar, a wireless set, and a modern kitchen!\"\n\n\"And how will they pay for it all?\"\n\n\"Later, obviously. That's the entire point.\""
 banking_cycle_events.17.t:0 "Consumer Credit Boom"
 banking_cycle_events.170.a:0 "Full Transparency Investigation"
 banking_cycle_events.170.b:0 "Conduct a Quiet Internal Audit"
 banking_cycle_events.170.c:0 "Treat It as an Internal Cooperative Matter"
 banking_cycle_events.170.d:0 "An internal audit of the cooperative federation has uncovered a pattern of off-books lending and shadow dividend extraction: some member cooperatives have been recording income below its true value, distributing undisclosed dividends to insider members, and creating informal credit pools that operate entirely outside the federation's coordination framework. The scheme is fragile; any single insolvency could expose the whole network."
 banking_cycle_events.170.f:0 "\"They lend each other when the bank won't. It's solidarity until someone can't pay back.\"\n\n\"Then it is not solidarity. It is a shadow bank wearing cooperative clothes.\""
 banking_cycle_events.170.t:0 "Shadow Dividend Extraction Scheme"
 banking_cycle_events.18.a:0 "Seize the firm and prosecute!"
 banking_cycle_events.18.b:0 "Arrange a quiet rescue"
 banking_cycle_events.18.c:0 "Deny knowledge and hope it blows over"
 banking_cycle_events.18.d:0 "A major financial house has been caught hiding catastrophic losses in complex derivative instruments that few people understand. The losses are far larger than anyone suspected, and the firm's counterparties - banks, insurers, pension funds - are now exposed to billions in potential claims. If the firm collapses, it could take much of the financial sector with it."
 banking_cycle_events.18.f:0 "\"How much did they lose?\"\n\n\"We're not entirely sure. The instruments are so complex that even their own traders don't know the full exposure.\"\n\n\"Give me a number.\"\n\n\"Somewhere between 'very bad' and 'civilization-ending.' Shall I be more precise?\""
 banking_cycle_events.18.t:0 "Derivatives Scandal"
 banking_cycle_events.19.a:0 "Establish the fund"
 banking_cycle_events.19.b:0 "Invest the surplus directly"
 banking_cycle_events.19.c:0 "Return it as tax cuts"
 banking_cycle_events.19.d:0 "Economic advisors have proposed creating a sovereign wealth fund - a state-managed investment vehicle that would set aside current surpluses to cushion future downturns and fund long-term development. The idea is sensible in theory, but it requires the government to save money during good times rather than spend it, which is politically difficult."
 banking_cycle_events.19.f:0 "\"Save the surplus? In an election year?\"\n\n\"It's the responsible thing to do.\"\n\n\"Responsibility doesn't win elections. Bridges and tax cuts win elections.\"\n\n\"And what wins the election after the next crash?\"\n\n\"...I'll schedule the committee meeting.\""
 banking_cycle_events.19.t:0 "Sovereign Wealth Fund Proposal"
 banking_cycle_events.2.a:0 "Welcome the investment!"
 banking_cycle_events.2.b:0 "Apply modest screening"
 banking_cycle_events.2.c:0 "Restrict foreign capital"
 banking_cycle_events.2.d:0 "Foreign investors have taken notice of our economic vitality and are pouring capital into domestic assets: government bonds, real estate, industrial ventures. The influx is stimulating growth and fueling ambitious new projects, but some advisors worry that we are becoming dangerously dependent on the confidence of foreigners who can withdraw their money as quickly as they committed it."
 banking_cycle_events.2.f:0 "\"The wharves are busy, the banks are flush, and every broker has a foreign client. It is intoxicating.\"\n\n\"And when they leave?\"\n\n\"Don't spoil the party.\""
 banking_cycle_events.2.t:0 "Foreign Capital Inflow"
 banking_cycle_events.20.a:0 "Bring shadow banks under regulation"
 banking_cycle_events.20.b:0 "Extend an implicit guarantee"
 banking_cycle_events.20.c:0 "Ignore it"
 banking_cycle_events.20.d:0 "Investigators have uncovered a vast parallel banking system operating outside all regulatory oversight. Unregistered lenders, off-balance-sheet vehicles, and informal credit networks have grown to rival the regulated sector in size. This shadow banking system has been fueling the boom - but it operates without the safeguards that prevent bank runs, and nobody knows how much risk it carries."
 banking_cycle_events.20.f:0 "\"How large is the shadow banking sector?\"\n\n\"We're not sure. By definition, it's the part of the financial system we can't see.\"\n\n\"Then how do you know it exists?\"\n\n\"Because when we add up all the lending we can account for, it falls short of all the borrowing by a truly alarming amount.\""
 banking_cycle_events.20.t:0 "Shadow Banking Discovery"
 banking_cycle_events.21.a:0 "Splendid news!"
 banking_cycle_events.21.b:0 "Let us not get carried away"
 banking_cycle_events.21.d:0 "One of our most respected merchant banks has reported record profits for the quarter, far exceeding all expectations. The news has spread rapidly through the financial district, lifting confidence across the sector. Other banks are reporting healthy returns as well, and the mood among investors is buoyant."
 banking_cycle_events.21.f:0 "\"Did you see the Rothschild figures? Extraordinary.\"\n\n\"My own portfolio has never looked healthier. I believe we may be entering a golden age of finance.\"\n\n\"You said that last year.\"\n\n\"And I was right last year too.\""
 banking_cycle_events.21.t:0 "Merchant Bank Prosperity"
 banking_cycle_events.22.a:0 "The more exchanges, the better!"
 banking_cycle_events.22.b:0 "Require rigorous oversight first"
 banking_cycle_events.22.d:0 "A prosperous provincial city has petitioned to open its own stock exchange, arguing that the capital's bourse is too distant and too exclusive to serve regional investors. Local merchants and manufacturers are enthusiastic, seeing it as a way to raise capital without traveling to the metropolis. The proposal would broaden access to investment but could also fragment oversight."
 banking_cycle_events.22.f:0 "\"Why should all the money flow through one city? We have industry, we have capital, and we have ambition. What we lack is a trading floor.\"\n\n\"And regulation, apparently.\"\n\n\"Details.\""
 banking_cycle_events.22.t:0 "New Provincial Exchange"
 banking_cycle_events.23.a:0 "Prosecute to the fullest extent!"
 banking_cycle_events.23.b:0 "Let this serve as a warning"
 banking_cycle_events.23.d:0 "A scandal has erupted in the banking sector. A prominent banker has been caught diverting depositors' funds into personal speculative ventures. The scheme was discovered when a routine audit revealed massive discrepancies between the bank's reported reserves and its actual holdings. Public confidence in the banking system has been shaken."
 banking_cycle_events.23.f:0 "\"He lived like a prince on other people's savings. Three houses, a stable of racehorses, and a yacht - all purchased with money that was supposed to be sitting safely in the vault.\"\n\n\"And his depositors?\"\n\n\"Ruined, most of them.\""
 banking_cycle_events.23.t:0 "Banking Scandal"
 banking_cycle_events.24.a:0 "Root out the fraud!"
 banking_cycle_events.24.b:0 "Quietly contain the damage"
 banking_cycle_events.24.c:0 "Let the market sort it out"
 banking_cycle_events.24.d:0 "Investigators have discovered a network of fraudulent warehouse receipts circulating through the commodity lending market. Merchants have been borrowing against goods that don't exist - or pledging the same goods to multiple lenders. The extent of the fraud is unclear, but several banks have already frozen their commodity lending operations, and prices on the exchange are volatile."
 banking_cycle_events.24.f:0 "\"The warehouse was supposed to contain two thousand bales of cotton. When the inspectors opened the doors, they found three hundred bales and a great deal of empty space.\"\n\n\"And the receipts?\"\n\n\"Still circulating. Still being traded. Still being used as collateral.\""
 banking_cycle_events.24.t:0 "Warehouse Receipts Fraud"
 banking_cycle_events.25.a:0 "A welcome innovation"
 banking_cycle_events.25.b:0 "Seize on the opportunity"
 banking_cycle_events.25.d:0 "Trading firms have developed a refined system of trade bills that allows goods to be bought and sold on credit with unprecedented ease. These new instruments enable commerce to flow more smoothly between distant cities, reducing the need for physical coin and expanding the volume of trade. Bankers are eager to discount these bills, seeing healthy profits in the growing market."
 banking_cycle_events.25.f:0 "\"A bill drawn in Liverpool, accepted in London, discounted in Amsterdam, and redeemed in New York. The world grows smaller with every signature.\""
 banking_cycle_events.25.t:0 "Trade Bill Innovation"
 banking_cycle_events.26.a:0 "A foundation of stability"
 banking_cycle_events.26.b:0 "Let them invest more aggressively"
 banking_cycle_events.26.d:0 "Pension funds established for workers in major industries have grown substantially, accumulating vast pools of long-term capital. Unlike speculative investors who chase quick returns, these funds seek steady, reliable income to meet future obligations. Their growing presence in the bond and property markets is providing a stabilizing counterweight to short-term speculation."
 banking_cycle_events.26.f:0 "\"The pension fund trustees are the dullest investors in the market. They buy bonds and hold them. They buy property and hold it. They are magnificently, beautifully boring.\"\n\n\"And magnificently, beautifully solvent.\""
 banking_cycle_events.26.t:0 "Pension Fund Growth"
 banking_cycle_events.27.a:0 "Connect every branch!"
 banking_cycle_events.27.b:0 "Proceed cautiously"
 banking_cycle_events.27.d:0 "The telegraph has revolutionized interbank communications. Settlement times that once took days or weeks now take hours. Banks can verify balances, confirm transactions, and coordinate lending across vast distances almost instantaneously. The speed has attracted new participants to the financial markets and increased trading volumes dramatically."
 banking_cycle_events.27.f:0 "\"Before the wire, it took a week to confirm a transfer from Edinburgh to London. Now it takes twenty minutes. The world has changed beyond recognition.\"\n\n\"And mistakes travel just as fast.\"\n\n\"Let us hope there are fewer of them.\""
 banking_cycle_events.27.t:0 "Modern Settlements"
 banking_cycle_events.28.a:0 "Let trust rebuild naturally"
 banking_cycle_events.28.b:0 "Guarantee interbank obligations"
 banking_cycle_events.28.c:0 "Force banks to resume lending"
 banking_cycle_events.28.d:0 "The interbank lending market has seized up. Banks that normally lend freely to one another overnight have stopped, each suspecting that its counterparties may be concealing losses. Without interbank lending, the entire financial system risks grinding to a halt - banks cannot meet daily obligations, businesses cannot access working capital, and the economy threatens to seize up like an engine without oil."
 banking_cycle_events.28.f:0 "\"The banks won't lend to each other because they don't trust each other. They don't trust each other because they know what's on their own balance sheets.\""
 banking_cycle_events.28.t:0 "Interbank Lending Freeze"
 banking_cycle_events.29.a:0 "Support the cooperatives"
 banking_cycle_events.29.b:0 "Let them attract private capital too"
 banking_cycle_events.29.d:0 "In the countryside, farmers and smallholders have begun pooling their savings into cooperative lending institutions. These modest banks, governed by their own depositors, provide credit for seed and equipment at rates far below what commercial banks charge. The model is spreading rapidly, bringing financial services to communities that have never had access to formal banking."
 banking_cycle_events.29.f:0 "\"We had nothing - no bank would touch us. Now we lend to ourselves, and not a penny has been lost.\"\n\n\"The commercial bankers scoff at the amounts involved.\"\n\n\"Let them scoff. We can feed our families.\""
 banking_cycle_events.29.t:0 "Cooperative Banking"
 banking_cycle_events.3.a:0 "Pressure banks to resume lending"
 banking_cycle_events.3.b:0 "Let prudence take its course"
 banking_cycle_events.3.d:0 "Banks are sitting on mountains of reserves while businesses starve for credit. Lending has ground to a near-halt as financial institutions, scarred by recent uncertainty, refuse to take on risk. Merchants and manufacturers are demanding that the government intervene to restart the flow of capital - but bankers warn that forcing premature lending could plant the seeds of the next crisis."
 banking_cycle_events.3.f:0 "\"There is money everywhere and credit nowhere. The paradox is maddening.\"\n\n\"The banks say they're being prudent.\"\n\n\"Prudent! My workers haven't been paid in a fortnight because I can't get a loan against goods already sitting in my warehouse.\""
 banking_cycle_events.3.t:0 "Credit Crunch Fears"
 banking_cycle_events.30.a:0 "Let profits flow!"
 banking_cycle_events.30.b:0 "Require hedging and disclosure"
 banking_cycle_events.30.c:0 "Restrict cross-border speculation"
 banking_cycle_events.30.d:0 "Sophisticated investors have discovered they can borrow cheaply in countries with low interest rates and invest the proceeds in countries offering higher returns. These so-called 'carry trades' are generating enormous profits for those who understand them, but they create hidden linkages between national financial systems. If exchange rates shift suddenly, the unraveling could be catastrophic."
 banking_cycle_events.30.f:0 "\"Borrow in Tokyo at one percent, invest in Buenos Aires at eight. The profit is almost effortless.\"\n\n\"And when the exchange rate moves?\"\n\n\"It won't.\"\n\n\"How can you be certain?\"\n\n\"Because if it does, we're all finished.\""
 banking_cycle_events.30.t:0 "Foreign Debt Arbitrage"
 banking_cycle_events.31.a:0 "Declare a bank holiday"
 banking_cycle_events.31.b:0 "Keep the banks open"
 banking_cycle_events.31.c:0 "Limited closure with emergency lending"
 banking_cycle_events.31.d:0 "With public confidence in the banking system collapsing, advisors are urging the government to declare a 'bank holiday' - a temporary, mandatory closure of all financial institutions. The idea is to stop the panic, allow time for inspection and reorganization, and reopen only those banks that are solvent. It's a drastic measure, but the alternative may be a complete meltdown."
 banking_cycle_events.31.f:0 "\"Close every bank in the country?\"\n\n\"For three days. Perhaps a week.\"\n\n\"The public will riot.\"\n\n\"The public is already rioting. At least this way, when we reopen, they'll have something left to withdraw.\""
 banking_cycle_events.31.t:0 "The Bank Holiday"
 banking_cycle_events.32.a:0 "Let the collapse run its course"
 banking_cycle_events.32.b:0 "Organize an emergency rescue"
 banking_cycle_events.32.c:0 "Minimize the news"
 banking_cycle_events.32.d:0 "One of the largest trust companies in the country has collapsed spectacularly, its assets frozen and its offices shuttered. The company had been investing depositors' funds in increasingly speculative ventures, and when several of those ventures failed simultaneously, the losses overwhelmed the company's reserves. Depositors' savings have evaporated, and other trust companies are now facing runs."
 banking_cycle_events.32.f:0 "\"The directors were seen leaving through the back entrance, carrying leather cases. The depositors were left at the front, carrying nothing.\""
 banking_cycle_events.32.t:0 "Trust Company Failure"
 banking_cycle_events.33.a:0 "Encourage the market"
 banking_cycle_events.33.b:0 "Maximize growth from this"
 banking_cycle_events.33.d:0 "A market for commercial paper - short-term promissory notes issued by businesses - has developed rapidly, allowing companies to borrow directly from investors without going through banks. The innovation reduces borrowing costs for creditworthy firms and provides investors with a safe, liquid asset. The market is growing quickly, adding a new pillar of stability to the financial system."
 banking_cycle_events.33.f:0 "\"Ninety-day notes, backed by the full credit of the issuing firm. Safe as houses, liquid as water, and yielding three percent.\"\n\n\"You make it sound too good to be true.\"\n\n\"That's because you've been listening to bankers, who are furious they're being cut out.\""
 banking_cycle_events.33.t:0 "Commercial Paper Market"
 banking_cycle_events.34.a:0 "Establish a full guarantee"
 banking_cycle_events.34.b:0 "The market disciplines itself"
 banking_cycle_events.34.c:0 "A limited guarantee only"
 banking_cycle_events.34.d:0 "After recent banking failures, a coalition of legislators is proposing a formal deposit insurance scheme - a government-backed guarantee that ordinary depositors will not lose their savings if their bank fails. Proponents argue it will prevent bank runs and stabilize the system. Critics warn it will encourage reckless lending by removing the consequences of failure."
 banking_cycle_events.34.f:0 "\"If the government guarantees deposits, why would any depositor ever bother to check whether their bank is sound?\"\n\n\"Because people don't check anyway. They trust the name on the door.\"\n\n\"Exactly. And now we propose to make that misplaced trust official policy.\""
 banking_cycle_events.34.t:0 "Deposit Insurance Debate"
 banking_cycle_events.35.a:0 "A splendid vehicle for enterprise!"
 banking_cycle_events.35.b:0 "Require proper governance standards"
 banking_cycle_events.35.d:0 "The joint-stock company model is experiencing a boom, with new companies being registered at an unprecedented rate. The ability to pool capital from many small investors to fund large enterprises has unleashed a wave of entrepreneurial energy. Railways, factories, shipping lines, and mining ventures are all benefiting from the flood of investment."
 banking_cycle_events.35.f:0 "\"Every week brings a new prospectus more magnificent than the last. Companies to drain marshes, companies to bridge oceans, companies to mine gold on the moon.\"\n\n\"And some of them might actually succeed.\"\n\n\"One or two, perhaps. The rest will succeed only in separating fools from their money.\""
 banking_cycle_events.35.t:0 "Joint-Stock Company Boom"
 banking_cycle_events.36.a:0 "Embrace the disruption!"
 banking_cycle_events.36.b:0 "Regulate the new entrants"
 banking_cycle_events.36.c:0 "Protect established banks"
 banking_cycle_events.36.d:0 "A wave of technology-driven financial firms is challenging established banks with faster, cheaper, and more accessible services. These new companies use advanced computing and telecommunications to process transactions, assess credit, and move money at a fraction of the cost of traditional banking. Established bankers are alarmed; consumers are delighted."
 banking_cycle_events.36.f:0 "\"The banks spent decades building grand marble halls. These newcomers operate from rented office space with a computer and a telephone line. And they're winning.\""
 banking_cycle_events.36.t:0 "Financial Technology Disruption"
 banking_cycle_events.37.a:0 "A brilliant innovation!"
 banking_cycle_events.37.b:0 "Require careful oversight"
 banking_cycle_events.37.c:0 "This instrument is too dangerous"
 banking_cycle_events.37.d:0 "Banks have begun bundling thousands of individual mortgages into tradeable securities, selling them to investors worldwide. The innovation allows banks to offload risk and free up capital for new lending, fueling a construction boom. But critics warn that banks no longer care whether borrowers can repay, since the risk is immediately passed on to investors who may not understand what they're buying."
 banking_cycle_events.37.f:0 "\"We originate the loan on Monday, package it on Tuesday, sell it on Wednesday, and by Thursday it's some pension fund's problem.\"\n\n\"And if the borrower defaults?\"\n\n\"That's Thursday's problem. We got paid on Wednesday.\""
 banking_cycle_events.37.t:0 "Mortgage-Backed Securities"
 banking_cycle_events.38.a:0 "Support the initiative"
 banking_cycle_events.38.b:0 "Let it develop privately"
 banking_cycle_events.38.d:0 "A new initiative is providing tiny loans to entrepreneurs and smallholders who have been shut out of the traditional banking system. The sums are modest - enough to buy a sewing machine, stock a market stall, or purchase seed for a season - but the impact on families and communities has been transformative. Repayment rates are surprisingly high, defying the skeptics who predicted the poor would default."
 banking_cycle_events.38.f:0 "\"She borrowed enough to buy three chickens and a rooster. Within two years she had a flock of fifty, two employees, and a cart. The bank that lent her the money made a tidy profit.\"\n\n\"Three chickens.\"\n\n\"Three chickens.\""
 banking_cycle_events.38.t:0 "Microfinance Initiative"
 banking_cycle_events.39.a:0 "Print money and buy bonds!"
 banking_cycle_events.39.b:0 "Limited, targeted purchases only"
 banking_cycle_events.39.c:0 "Sound money must not be debased"
 banking_cycle_events.39.d:0 "With interest rates already near zero and the economy still contracting, the central bank's economists have proposed an unconventional measure: creating new money to purchase government bonds in massive quantities. The goal is to drive down long-term borrowing costs and force investors into riskier assets, stimulating spending. The idea is controversial - critics call it 'printing money' and warn of inflation."
 banking_cycle_events.39.f:0 "\"So let me understand. The central bank creates money out of nothing, uses it to buy government debt, and this is supposed to fix the economy?\"\n\n\"In essence, yes.\"\n\n\"And this isn't just... cheating?\"\n\n\"We prefer the term 'unconventional monetary policy.'\""
 banking_cycle_events.39.t:0 "Quantitative Easing Debate"
 banking_cycle_events.4.a:0 "Let the weak banks fail"
 banking_cycle_events.4.b:0 "Government guarantee of all deposits"
 banking_cycle_events.4.c:0 "Selective bailout of key institutions"
 banking_cycle_events.4.d:0 "Panic has seized the banking sector. Depositors are queuing in the streets, desperate to withdraw their savings before the institutions collapse. Several banks have already shuttered their doors. The government faces an impossible choice: let the system purge itself at enormous cost, or intervene to restore confidence at the risk of rewarding reckless lending."
 banking_cycle_events.4.f:0 "\"I saw a woman weeping outside the National Savings Bank this morning. She had her life's earnings in there - thirty years of careful thrift, gone in an afternoon.\"\n\n\"The directors, of course, withdrew their own funds last week.\""
 banking_cycle_events.4.t:0 "Bank Run"
 banking_cycle_events.40.a:0 "Overhaul the rating system!"
 banking_cycle_events.40.b:0 "Issue a formal reprimand"
 banking_cycle_events.40.c:0 "Ratings are just opinions"
 banking_cycle_events.40.d:0 "It has emerged that the credit rating agencies - the firms trusted to assess the safety of financial instruments - have been assigning their highest ratings to securities that are, in fact, nearly worthless. Investors relied on those ratings to make decisions worth billions. Now that the truth is out, trust in the entire system of financial assessment has been shattered."
 banking_cycle_events.40.f:0 "\"Triple-A. They rated it triple-A. It was a pile of bad loans wrapped in wishful thinking and sealed with a stamp that said 'safe as government bonds.'\"\n\n\"Perhaps they didn't understand what was inside.\"\n\n\"They were paid not to.\""
 banking_cycle_events.40.t:0 "Credit Rating Failure"
 banking_cycle_events.41.a:0 "Offer debt relief programs"
 banking_cycle_events.41.b:0 "Education is worth the investment"
 banking_cycle_events.41.c:0 "Cap tuition lending"
 banking_cycle_events.41.d:0 "A generation of university graduates is entering the workforce burdened by enormous education debts. The loans that seemed manageable when they were taken on are now consuming a crippling share of young workers' incomes, delaying home purchases, family formation, and savings. Consumer spending among the educated young has stagnated, and defaults on education loans are rising."
 banking_cycle_events.41.f:0 "\"I have two degrees, a mountain of debt, and a job that pays less than what my father earned with no degree at all. They told us education was the path to prosperity.\"\n\n\"It was. For the banks that lent you the money.\""
 banking_cycle_events.41.t:0 "Student Loan Burden"
 banking_cycle_events.42.a:0 "Champion green finance!"
 banking_cycle_events.42.b:0 "Let the market lead"
 banking_cycle_events.42.d:0 "A coalition of banks and government agencies has proposed issuing bonds specifically earmarked for environmental infrastructure: flood defenses, clean water systems, renewable energy installations, and pollution cleanup. The bonds would offer modest returns but carry government backing, and early interest from institutional investors has been strong. It represents a new way of financing public goods through financial markets."
 banking_cycle_events.42.f:0 "\"Invest in the future of the planet and earn three percent doing it. The prospectus practically writes itself.\"\n\n\"And if the projects fail?\"\n\n\"Then we'll have bigger problems than bond yields.\""
 banking_cycle_events.42.t:0 "Green Bond Initiative"
 banking_cycle_events.43.a:0 "Innovation needs capital!"
 banking_cycle_events.43.b:0 "Ensure prudent diversification"
 banking_cycle_events.43.d:0 "A new class of venture capital funds is channeling money into innovative but unproven enterprises: new manufacturing processes, experimental technologies, and bold commercial ventures. The returns for successful investments are spectacular, attracting a flood of capital from investors chasing the next big opportunity. Most ventures will fail, but the few that succeed are transforming entire industries."
 banking_cycle_events.43.f:0 "\"Nine out of ten will fail. But the tenth will change the world and repay the losses a hundredfold.\"\n\n\"That's what every speculator says.\"\n\n\"Yes, but some of us have spreadsheets.\""
 banking_cycle_events.43.t:0 "Venture Capital Boom"
 banking_cycle_events.44.a:0 "Crack down hard!"
 banking_cycle_events.44.b:0 "Issue new guidelines"
 banking_cycle_events.44.c:0 "The market is self-regulating"
 banking_cycle_events.44.d:0 "An investigation has revealed that certain lending institutions have been systematically targeting vulnerable borrowers - the uneducated, the desperate, and the elderly - with loans designed to be impossible to repay. Hidden fees, deceptive terms, and aggressive collection practices have trapped thousands of families in spiraling debt. The scale of the abuse is staggering."
 banking_cycle_events.44.f:0 "\"The contract was forty pages of small print. She signed because she needed the money for medicine. She didn't know the interest rate was forty percent. She didn't know the fees would double the principal. She didn't know she'd lose her house.\"\n\n\"And the lender?\"\n\n\"The lender knew everything.\""
 banking_cycle_events.44.t:0 "Predatory Lending Scandal"
 banking_cycle_events.45.a:0 "Extend a generous rescue package"
 banking_cycle_events.45.b:0 "Offer limited, conditional support"
 banking_cycle_events.45.c:0 "They must solve their own problems"
 banking_cycle_events.45.d:0 "A diplomatically important trading partner has quietly approached our government requesting emergency financial assistance. Their banking system is on the verge of collapse, and without external support, the crisis will spread to our own markets through trade disruptions and defaulted debts. The request puts us in a difficult position - refusal risks contagion, but aid comes at a steep cost to our own treasury."
 banking_cycle_events.45.f:0 "\"Their ambassador was remarkably calm, considering he was effectively saying 'lend us an enormous sum of money or we'll take your economy down with us.'\"\n\n\"That's diplomacy for you.\"\n\n\"I preferred it when diplomacy involved sending gunboats.\""
 banking_cycle_events.45.t:0 "International Bailout Request"
 banking_cycle_events.5.a:0 "Encourage the railway companies!"
 banking_cycle_events.5.b:0 "Insist on due diligence for bond offerings"
 banking_cycle_events.5.d:0 "Railway shares and bonds are the talk of every exchange. Investors are scrambling to fund new lines, convinced that iron roads will transform the economy. Some schemes are sound; others are little more than prospectuses and dreams. The frenzy is attracting capital from every corner of the country and beyond."
 banking_cycle_events.5.f:0 "\"A railway to every town! A dividend on every share!\"\n\n\"Have you actually seen where the proposed line runs?\"\n\n\"What does that matter? The shares are up forty percent since Tuesday.\""
 banking_cycle_events.5.t:0 "Railway Bond Fever"
 banking_cycle_events.50.a:0 "Double down: enforce stricter quotas"
 banking_cycle_events.50.b:0 "Quietly revise the targets downward"
 banking_cycle_events.50.c:0 "Launch a propaganda campaign to rally workers"
 banking_cycle_events.50.d:0 "The latest reports from our planning bureaus paint a troubling picture. Production across several key sectors has fallen well short of the targets set by the current economic plan. Factory output quotas are being missed, and the supply chain disruptions are beginning to cascade through the planned economy."
 banking_cycle_events.50.f:0 "The auditor put down his pen and asked to see the original ledgers. There were no original ledgers."
 banking_cycle_events.50.t:0 "Five-Year Plan Shortfall"
 banking_cycle_events.51.a:0 "Launch a purge of corrupt officials"
 banking_cycle_events.51.b:0 "Quietly replace the worst offenders"
 banking_cycle_events.51.c:0 "Turn a blind eye: the reports look good"
 banking_cycle_events.51.d:0 "An internal audit has revealed that several factory directors have been systematically falsifying their production reports. Output figures were inflated to meet quota targets, while actual production lagged far behind. The discovery calls into question the reliability of our entire planning apparatus."
 banking_cycle_events.51.f:0 "They reported success on paper while the warehouses stood half-empty."
 banking_cycle_events.51.t:0 "Factory Director Corruption"
 banking_cycle_events.52.a:0 "Centralize all distribution through the planning bureau"
 banking_cycle_events.52.b:0 "Allow limited regional strategic reserves"
 banking_cycle_events.52.c:0 "Send the military to enforce redistribution"
 banking_cycle_events.52.d:0 "Regional planning authorities have been stockpiling critical raw materials and intermediate goods well beyond their allocated quotas. This hoarding behavior is disrupting the central allocation system, creating artificial shortages in some sectors while others sit on mountains of surplus they refuse to release."
 banking_cycle_events.52.f:0 "Every commissar builds their own private reserve, and the plan suffers for it."
 banking_cycle_events.52.t:0 "Resource Hoarding Crisis"
 banking_cycle_events.53.a:0 "Crack down with security forces"
 banking_cycle_events.53.b:0 "Tacitly tolerate it as a safety valve"
 banking_cycle_events.53.c:0 "Legalize limited private trade"
 banking_cycle_events.53.d:0 "As state-controlled supply chains struggle to meet demand, an informal economy has begun to flourish in the shadows. Citizens are trading goods outside official channels, and a network of black marketeers is providing what the planned economy cannot. The practice is widespread enough that enforcement has become difficult."
 banking_cycle_events.53.f:0 "Where the state fails to provide, the people find a way: legal or otherwise."
 banking_cycle_events.53.t:0 "Black Market Emergence"
 banking_cycle_events.54.a:0 "Grand campaign with material incentives"
 banking_cycle_events.54.b:0 "Ideological campaign emphasizing socialist duty"
 banking_cycle_events.54.c:0 "Focus incentives on key strategic industries"
 banking_cycle_events.54.d:0 "With the economy in a period of relative stability, the state has an opportunity to boost productivity through a nationwide motivation campaign. Various proposals have been put forward: material incentives, ideological appeals, or targeted bonuses for strategic industries."
 banking_cycle_events.54.f:0 "The revolution asks everything of its workers. Perhaps it is time to give something back."
 banking_cycle_events.54.t:0 "Worker Motivation Campaign"
 banking_cycle_events.55.a:0 "Accept the full aid package"
 banking_cycle_events.55.b:0 "Accept with conditions: no joint committees"
 banking_cycle_events.55.c:0 "Decline: maintain economic independence"
 banking_cycle_events.55.d:0 "An ideological ally has offered a package of economic cooperation credits to help stabilize our planning cycle. The aid would include technical advisors, preferential trade terms, and direct financial assistance: but it comes with expectations of closer political alignment and joint economic planning committees."
 banking_cycle_events.55.f:0 "Solidarity between socialist states is a noble ideal: but it always comes with a price."
 banking_cycle_events.55.t:0 "Socialist Fraternal Aid"
 banking_cycle_events.56.a:0 "Launch a full investigation and halt production"
 banking_cycle_events.56.b:0 "Increase security without public acknowledgment"
 banking_cycle_events.56.c:0 "Blame foreign agents and rally patriotic support"
 banking_cycle_events.56.d:0 "Reports are coming in from several major industrial facilities of suspicious equipment failures and unexplained production losses. Whether the cause is actual sabotage by foreign agents, internal dissent, or simply aging infrastructure, the disruptions are significant enough to demand a response."
 banking_cycle_events.56.f:0 "Is it the enemy within, the enemy without, or simply the rust of time?"
 banking_cycle_events.56.t:0 "Industrial Sabotage Investigation"
 banking_cycle_events.57.a:0 "Full consolidation into state enterprises"
 banking_cycle_events.57.b:0 "Gradual merger program over several years"
 banking_cycle_events.57.c:0 "Abandon the consolidation drive"
 banking_cycle_events.57.d:0 "The state planning commission has proposed a sweeping consolidation program, merging smaller workshops and artisan enterprises into larger, more efficient state-run industrial complexes. Proponents argue this will unlock economies of scale, while critics warn of disruption and lost local expertise."
 banking_cycle_events.57.f:0 "Bigger is better: or so the central planners insist."
 banking_cycle_events.57.t:0 "Collectivization Efficiency Drive"
 banking_cycle_events.6.a:0 "Extend emergency rural credit"
 banking_cycle_events.6.b:0 "Let rural debtors default"
 banking_cycle_events.6.c:0 "Import grain and subsidize"
 banking_cycle_events.6.d:0 "A failed harvest has sent shockwaves through the rural credit system. Farmers cannot repay their loans, country banks are under strain, and the knock-on effects are spreading to urban markets. The crisis is both agricultural and financial, and how we respond will determine whether it remains local or becomes systemic."
 banking_cycle_events.6.f:0 "\"The wheat is ruined, the debts are due, and the bank won't extend another season.\"\n\n\"What will you do?\"\n\n\"What can I do? Sell the land at a loss and pray someone in the city will hire me.\""
 banking_cycle_events.6.t:0 "Harvest Failure & Credit Squeeze"
 banking_cycle_events.60.a:0 "Let the majority decide by federation-wide vote"
 banking_cycle_events.60.b:0 "Bring in mediators from the federation council"
 banking_cycle_events.60.c:0 "Allow each cooperative to decide independently"
 banking_cycle_events.60.d:0 "A heated disagreement has erupted among the cooperative federations over how to reinvest collective surplus funds. Some cooperatives want to prioritize worker dividends, while others argue for reinvestment in shared infrastructure. The dispute has paralyzed the federation council and no consensus appears imminent."
 banking_cycle_events.60.f:0 "Democracy is wonderful: until everyone disagrees on what to do with the money."
 banking_cycle_events.60.t:0 "Federation Governance Dispute"
 banking_cycle_events.61.a:0 "Enforce mandatory contributions"
 banking_cycle_events.61.b:0 "Public accountability: name and shame"
 banking_cycle_events.61.c:0 "Accept it as the cost of voluntary cooperation"
 banking_cycle_events.61.d:0 "Several cooperatives have been benefiting from shared federation infrastructure: collective purchasing agreements, mutual insurance funds, and logistics networks: without contributing their fair share to maintenance costs. The arrangement is breeding resentment among the cooperatives that carry the burden."
 banking_cycle_events.61.f:0 "Mutual aid works splendidly: until someone decides to take without giving."
 banking_cycle_events.61.t:0 "Free Rider Problem"
 banking_cycle_events.62.a:0 "Push the investment through with executive authority"
 banking_cycle_events.62.b:0 "Call for extended deliberation"
 banking_cycle_events.62.c:0 "Split into smaller, less controversial projects"
 banking_cycle_events.62.d:0 "The cooperative councils have been debating a major capital investment project for months. Every faction has a different priority, every vote ends in stalemate, and the window of opportunity is beginning to close. The democratic process that defines cooperative governance is becoming an obstacle to action."
 banking_cycle_events.62.f:0 "A hundred opinions, a thousand amendments, and still no decision."
 banking_cycle_events.62.t:0 "Democratic Investment Gridlock"
 banking_cycle_events.63.a:0 "Hire professional managers to ease the burden"
 banking_cycle_events.63.b:0 "Reduce governance obligations temporarily"
 banking_cycle_events.63.c:0 "Organize solidarity campaigns"
 banking_cycle_events.63.d:0 "The dual burden of productive labor and democratic governance is taking its toll on worker-owners across the cooperative sector. Attendance at council meetings is declining, decision quality is suffering, and productivity is falling as exhausted workers struggle to fulfill both roles during an economic downturn."
 banking_cycle_events.63.f:0 "They are workers and managers and legislators all at once: and the weight is crushing them."
 banking_cycle_events.63.t:0 "Worker-Owner Burnout"
 banking_cycle_events.64.a:0 "Invest heavily in export expansion"
 banking_cycle_events.64.b:0 "Expand modestly and reinvest locally"
 banking_cycle_events.64.c:0 "Focus on the domestic market"
 banking_cycle_events.64.d:0 "Cooperative-produced goods have gained a reputation for quality and ethical production in international markets. Foreign buyers are placing larger orders, and several trade delegations have expressed interest in establishing permanent import agreements. This is an opportunity to expand: but expansion carries its own risks."
 banking_cycle_events.64.f:0 "The world is discovering what worker-owned enterprises can achieve."
 banking_cycle_events.64.t:0 "Cooperative Export Success"
 banking_cycle_events.65.a:0 "Emergency levy on all cooperatives"
 banking_cycle_events.65.b:0 "Seek external credit to shore up the fund"
 banking_cycle_events.65.c:0 "Cut benefits and reorganize the fund"
 banking_cycle_events.65.d:0 "The cooperative mutual insurance fund: the collective safety net that covers members during downturns: is under severe strain. Claims have surged as cooperatives struggle, and the fund's reserves are dangerously low. Without action, the entire mutual support system could collapse."
 banking_cycle_events.65.f:0 "The safety net was woven for ordinary times, not for storms like this."
 banking_cycle_events.65.t:0 "Mutual Insurance Fund Strain"
 banking_cycle_events.66.a:0 "Fund a national innovation commons"
 banking_cycle_events.66.b:0 "Let cooperatives share knowledge voluntarily"
 banking_cycle_events.66.c:0 "Focus on proven technologies only"
 banking_cycle_events.66.d:0 "A grassroots movement among cooperatives has begun openly sharing industrial innovations, production techniques, and process improvements across the cooperative network. This collaborative approach to innovation is accelerating technological adoption: though some argue it undermines individual cooperatives' competitive advantages."
 banking_cycle_events.66.f:0 "When knowledge flows freely, everyone rises: or so the optimists say."
 banking_cycle_events.66.t:0 "Innovation Through Collaboration"
 banking_cycle_events.67.a:0 "Let the new generation take the lead"
 banking_cycle_events.67.b:0 "Establish mentorship programs for smooth transition"
 banking_cycle_events.67.c:0 "Founding members retain advisory oversight"
 banking_cycle_events.67.d:0 "The founding generation of worker-owners who built the cooperative economy is reaching retirement age. The younger generation, raised in a cooperative system they didn't create, has different priorities and expectations. The transition is causing friction in governance councils across the country."
 banking_cycle_events.67.f:0 "The founders built the house. Their children want to remodel it."
 banking_cycle_events.67.t:0 "Generational Leadership Transition"
 banking_cycle_events.7.a:0 "Endorse the consolidation"
 banking_cycle_events.7.b:0 "Require antitrust review"
 banking_cycle_events.7.d:0 "A wave of mergers and acquisitions is reshaping the banking sector. Smaller institutions are being swallowed by larger ones, creating financial giants with unprecedented reach and influence. Proponents argue this consolidation will produce stronger, more efficient banks. Critics warn that these behemoths are becoming too big to fail - and too powerful to regulate."
 banking_cycle_events.7.f:0 "\"The new mega-banks tower over their competitors, their boardrooms more lavish than some government ministries.\"\n\n\"And if one of them fails?\"\n\n\"Then God help us all.\""
 banking_cycle_events.7.t:0 "Bank Consolidation Wave"
 banking_cycle_events.8.a:0 "A marvel of innovation!"
 banking_cycle_events.8.b:0 "Require disclosure and registration"
 banking_cycle_events.8.c:0 "Ban this instrument"
 banking_cycle_events.8.d:0 "Enterprising bankers have devised an ingenious new financial instrument that packages and resells risk in ways never before attempted. Early adopters are reporting extraordinary returns, and demand is spreading like wildfire across the financial sector. The central bank's analysts are struggling to even understand the product, let alone assess whether it poses systemic danger."
 banking_cycle_events.8.f:0 "\"When asked to explain how the instrument works, one prominent banker reportedly shrugged and said: 'It makes money. What more do you need to know?'\""
 banking_cycle_events.8.t:0 "Novel Financial Instrument"
 banking_cycle_events.9.a:0 "Prices reflect fundamentals"
 banking_cycle_events.9.b:0 "Commission an investigation"
 banking_cycle_events.9.c:0 "Take no public position"
 banking_cycle_events.9.d:0 "Asset prices have risen substantially, but our central bank's analysts cannot agree on whether these valuations are justified. Some argue the prices reflect genuine improvements in productivity and trade. Others see the telltale signs of a speculative bubble that could burst at any moment. The truth is that nobody really knows - and that uncertainty itself is a source of risk."
 banking_cycle_events.9.f:0 "\"The governor of the central bank reportedly asked his chief analyst for a simple answer: bubble or no bubble? The reply was a twenty-page memorandum that concluded with 'it depends.'\""
 banking_cycle_events.9.t:0 "Asset Price Uncertainty"

#
# COVERT_WARFARE
#
 covert_warfare.1.a:0 "Recall our operatives and apologize through back-channels"
 covert_warfare.1.b:0 "Deny everything — our people were never there"
 covert_warfare.1.d:0 "Our intelligence services report a catastrophic security breach. One of our covert operations has been detected by [SCOPE.sCountry('detected_by_country').GetName]. The operation must be terminated immediately, and the diplomatic fallout will be considerable."
 covert_warfare.1.f:0 "The encrypted channel went dark at 03:47. By dawn, every foreign ministry in Europe had the intercepted transmissions on their desk."
 covert_warfare.1.t:0 "Operation Compromised"
 covert_warfare.2.a:0 "Shore up our counterintelligence"
 covert_warfare.2.b:0 "Retaliate in kind"
 covert_warfare.2.d:0 "Our counterintelligence services have uncovered evidence of a sustained foreign covert campaign targeting our institutions. Enemy agents have been manipulating our information networks, attempting to undermine our political stability. We must decide how to respond."
 covert_warfare.2.f:0 "The anomalies in the election data were too precise to be accidental, too subtle to be domestic in origin."
 covert_warfare.2.t:0 "Foreign Interference Detected"

#
# CULTURAL_HEGEMONY
#
 cultural_hegemony.1.a:0 "Patronize the arts and academia"
 cultural_hegemony.1.b:0 "Redirect cultural output toward state messaging"
 cultural_hegemony.1.d:0 "[ROOT.GetCountry.GetName]'s cultural influence is growing, and its artists, writers, and filmmakers are producing works that captivate audiences at home and abroad. The nation's creative output is becoming a source of global prestige."
 cultural_hegemony.1.f:0 "#bold The galleries were full again#!—not with the idle rich, but with students and workers, all drawn by the same strange conviction that something important was happening in the studios and concert halls of the capital."
 cultural_hegemony.1.t:0 "Cultural Renaissance"
 cultural_hegemony.10.a:0 "Send the exhibition on an international tour"
 cultural_hegemony.10.b:0 "Sell the exhibition rights to the highest bidder"
 cultural_hegemony.10.d:0 "Our artists have produced works that captivate audiences from Paris to Tokyo. The international press lavishes praise upon [ROOT.GetCountry.GetAdjective] galleries and exhibitions. We have the opportunity to send a touring collection abroad, spreading our cultural influence — or we could sell the rights commercially and let the market decide what our art is worth."
 cultural_hegemony.10.f:0 "They came for the brushstrokes and left with a new worldview."
 cultural_hegemony.10.t:0 "International Art Exhibition"
 cultural_hegemony.11.a:0 "Invest in tourism infrastructure and hospitality"
 cultural_hegemony.11.b:0 "Squeeze every coin from the tourist trade"
 cultural_hegemony.11.d:0 "Word of [ROOT.GetCountry.GetAdjective] culture has spread far and wide, and now foreigners arrive in droves to see our monuments, taste our cuisine, and experience our way of life. This influx of visitors brings opportunity — but also a choice between developing lasting infrastructure or simply extracting as much profit as possible while the boom lasts."
 cultural_hegemony.11.f:0 "The tourists take photographs; we take their money."
 cultural_hegemony.11.t:0 "Tourism Golden Age"
 cultural_hegemony.12.a:0 "Open international scholarship programs"
 cultural_hegemony.12.b:0 "Prioritize domestic students exclusively"
 cultural_hegemony.12.d:0 "The world's brightest minds seek admission to [ROOT.GetCountry.GetAdjective] universities. Our research institutions set the standard that other nations aspire to match. We can open our doors wider with international scholarships — attracting talent but also bearing the costs — or focus exclusively on our own citizens' education."
 cultural_hegemony.12.f:0 "They enrolled as foreigners and graduated as advocates."
 cultural_hegemony.12.t:0 "World-Class Universities"
 cultural_hegemony.13.a:0 "Establish language academies in foreign capitals"
 cultural_hegemony.13.b:0 "Let commerce and science carry the language naturally"
 cultural_hegemony.13.d:0 "Diplomats negotiate in our tongue. Scientists publish in it. Merchants trade in it. The [ROOT.GetCountry.GetAdjective] language has become the world's default mode of communication — a lingua franca that opens doors and shapes thought. We can formalize this dominance through state-sponsored academies abroad, or let the invisible hand of commerce and scholarship continue its work."
 cultural_hegemony.13.f:0 "When they dream of a better future, they dream in our words."
 cultural_hegemony.13.t:0 "Lingua Franca"
 cultural_hegemony.14.a:0 "Embrace the entertainment — let the people enjoy it"
 cultural_hegemony.14.b:0 "Restrict foreign entertainment imports"
 cultural_hegemony.14.c:0 "Adapt the best elements into our own tradition"
 cultural_hegemony.14.d:0 "Foreign entertainment has swept through [ROOT.GetCountry.GetName] like a tide. [SCOPE.sCountry('cultural_hegemon').GetAdjective] music fills our dance halls, their plays dominate our theaters, and their novels sit on every bookshelf. The people seem to enjoy it — but our traditionalists warn that our own cultural identity is being eroded from within."
 cultural_hegemony.14.f:0 "Their melodies are catchy, but the lyrics are not in our language."
 cultural_hegemony.14.t:0 "Foreign Entertainment Wave"
 cultural_hegemony.15.a:0 "Adopt the foreign education model wholesale"
 cultural_hegemony.15.b:0 "Resist — strengthen our own educational tradition"
 cultural_hegemony.15.c:0 "Cherry-pick the best practices selectively"
 cultural_hegemony.15.d:0 "Reformers in [ROOT.GetCountry.GetName] point to [SCOPE.sCountry('cultural_hegemon').GetAdjective] universities as the gold standard. They propose restructuring our entire education system along foreign lines — new curricula, new examination methods, and professors trained abroad. The results could be transformative, but the ideological implications of such wholesale adoption trouble many."
 cultural_hegemony.15.f:0 "We taught their textbooks, and they taught us to think differently."
 cultural_hegemony.15.t:0 "Foreign Education Model"
 cultural_hegemony.2.a:0 "Embrace the cosmopolitan tide"
 cultural_hegemony.2.b:0 "Rally behind our own traditions"
 cultural_hegemony.2.c:0 "This is not worth our attention"
 cultural_hegemony.2.d:0 "Foreign films, music, and literature are increasingly dominating the cultural landscape of [ROOT.GetCountry.GetName]. Traditional values are being displaced by imported ideas, and the younger generation seems more interested in foreign trends than in their own heritage."
 cultural_hegemony.2.f:0 "The children sang along to foreign songs they barely understood, while their grandparents shook their heads and wondered when exactly the world had changed."
 cultural_hegemony.2.t:0 "Foreign Cultural Infiltration"
 cultural_hegemony.3.a:0 "Leverage our narrative dominance"
 cultural_hegemony.3.b:0 "Promote a free and open press"
 cultural_hegemony.3.d:0 "The media apparatus of [ROOT.GetCountry.GetName] has achieved an unprecedented level of global reach. Our newspapers, radio broadcasts, and films shape the opinions of millions beyond our borders, granting us extraordinary influence over international discourse."
 cultural_hegemony.3.f:0 "Every morning, half the world woke up and read what we wanted them to read. That was power—not the kind that came from cannons, but the kind that made cannons unnecessary."
 cultural_hegemony.3.t:0 "Media Dominance"
 cultural_hegemony.4.a:0 "Channel this nationalist energy"
 cultural_hegemony.4.b:0 "Suppress this dangerous populism"
 cultural_hegemony.4.d:0 "The relentless tide of foreign cultural influence has provoked a fierce backlash among traditional elements of [ROOT.GetCountry.GetAdjectiveNoFormatting] society. Nationalist voices are growing louder, demanding protection of domestic culture and traditions."
 cultural_hegemony.4.f:0 "The general spoke of foreign music as though it were an invading army—and to his audience, who had watched their children abandon old songs for new ones, it rather felt like one."
 cultural_hegemony.4.t:0 "Cultural Backlash"
 cultural_hegemony.5.a:0 "Capitalize on our cultural prestige"
 cultural_hegemony.5.b:0 "Reinvest in cultural institutions"
 cultural_hegemony.5.d:0 "[ROOT.GetCountry.GetName]'s growing cultural influence is paying diplomatic dividends. Foreign nations are more receptive to our overtures, immigrants are drawn to our shores, and our international prestige continues to climb."
 cultural_hegemony.5.f:0 "They didn't come for the wages—those were better elsewhere. They came because they'd grown up watching our films, reading our books, and dreaming of a place they already felt they knew."
 cultural_hegemony.5.t:0 "Soft Power Dividend"
 cultural_hegemony.6.a:0 "Fund universities to retain talent"
 cultural_hegemony.6.b:0 "Accept the inevitable"
 cultural_hegemony.6.d:0 "The brightest minds of [ROOT.GetCountry.GetName] are leaving for nations with greater cultural prestige and higher standards of living. Universities are losing their best professors, and research institutions are hemorrhaging talent to foreign competitors."
 cultural_hegemony.6.f:0 "The professor's farewell lecture drew a standing ovation. By the end of the month, three of his colleagues had followed him abroad. The department carried on, of course—with fewer people and dimmer prospects."
 cultural_hegemony.6.t:0 "Brain Drain"
 cultural_hegemony.7.a:0 "Embrace the exchange of ideas"
 cultural_hegemony.7.b:0 "Crush this subversive foreign propaganda"
 cultural_hegemony.7.c:0 "Control the narrative through state media"
 cultural_hegemony.7.d:0 "Invest modestly in our own cultural voice"
 cultural_hegemony.7.desc:0 "[SCOPE.sCountry('cultural_hegemon').GetName]'s cultural dominance is reshaping the political landscape of [ROOT.GetCountry.GetName]. Foreign films, literature, and media carry implicit political messages that resonate with certain interest groups and fuel political movements modeled on the hegemon's governing ideology."
 cultural_hegemony.7.f:0 "The young radicals quoted foreign philosophers in foreign languages, wearing foreign fashions, demanding the same rights they'd seen in foreign films—and the old guard could only watch, wondering when exactly the future had arrived without their permission."
 cultural_hegemony.7.t:0 "Foreign Ideological Influence"
 cultural_hegemony.8.a:0 "Invest in cultural projection abroad"
 cultural_hegemony.8.b:0 "Consolidate our domestic institutions"
 cultural_hegemony.8.d:0 "[ROOT.GetCountry.GetName]'s cultural influence has reached a level where it can no longer be ignored. Our art, our media, and our way of life are being discussed, debated, and emulated in foreign capitals. We stand at a crossroads: invest further in our cultural projection, or consolidate our domestic strengths."
 cultural_hegemony.8.f:0 "They wore our fashions in Shanghai, hummed our melodies in Kinshasa, and debated our philosophers in Buenos Aires — all without a single soldier crossing a border."
 cultural_hegemony.8.t:0 "The World is Watching"
 cultural_hegemony.9.a:0 "The world looks to us for leadership"
 cultural_hegemony.9.d:0 "[ROOT.GetCountry.GetName] now stands as the undisputed cultural center of the world. Our language is the language of diplomacy, our media shapes global opinion, and our political model is the one others aspire to emulate. This is a position of immense power — and immense responsibility."
 cultural_hegemony.9.f:0 "When the world needed a word for progress, they borrowed ours."
 cultural_hegemony.9.t:0 "The Cultural Hegemon"

#
# DECOLONIZATION_EVENTS
#
 decolonization_events.1.a:0 "Open negotiations."
 decolonization_events.1.b:0 "Send in the troops."
 decolonization_events.1.c:0 "Let them go."
 decolonization_events.1.d:0 "An independence movement in [SCOPE.sCountry('restless_subject').GetName] has organized mass demonstrations demanding self-governance. Local leaders are circulating petitions and foreign journalists have begun to take notice."
 decolonization_events.1.d_neo:0 "Grant independence on our terms."
 decolonization_events.1.f:0 "\"We are not asking for independence. We are taking it.\"\n\nThe pamphlet had been printed overnight on a hand-cranked press somewhere in the back streets. By morning it was plastered across every wall in the capital district.\n\n\"They say they want to negotiate,\" the governor murmured to his adjutant, folding the paper carefully along its creases. \"What they mean is that they want us to watch while they negotiate with themselves.\""
 decolonization_events.1.t:0 "Winds of Change"
 decolonization_events.10.a:0 "They are truly one of us now."
 decolonization_events.10.b:0 "Maintain the current arrangement."
 decolonization_events.10.d:0 "The population of [SCOPE.sState('integrating_colony').GetName] has reached such high levels of cultural acceptance that administrators recommend granting full homeland status. The territory already functions as a productive part of the nation."
 decolonization_events.10.f:0 "\"My grandfather fought your grandfather,\" the old woman said, pouring tea for the visiting minister. \"My mother married one of your soldiers. And my daughter speaks your language better than I do.\"\n\nShe set down the pot.\n\n\"So tell me - whose homeland is this now?\""
 decolonization_events.10.t:0 "Common Bonds"
 decolonization_events.11.a:0 "We shall announce reforms."
 decolonization_events.11.b:0 "Our affairs are our own."
 decolonization_events.11.d:0 "[SCOPE.sCountry('condemning_power').GetName] has publicly denounced our control over overseas territories at international forums, calling it an affront to self-determination. Their representatives are marshalling support for resolutions condemning our empire."
 decolonization_events.11.f:0 "\"The age of empires is over,\" the [SCOPE.sCountry('condemning_power').GetAdjectiveNoFormatting] delegate declared, to a round of polite applause from the gallery.\n\n\"Easy for them to say,\" our ambassador muttered, loosening his collar. \"They never had an empire worth keeping.\""
 decolonization_events.11.t:0 "Judged by New Standards"
 decolonization_events.12.a:0 "Accept their backing."
 decolonization_events.12.b:0 "We need no patron."
 decolonization_events.12.d:0 "[SCOPE.sCountry('supporting_power').GetName] has offered diplomatic and material support for maintaining our colonial holdings, recognizing their strategic value. Their backing provides welcome relief from mounting international pressure."
 decolonization_events.12.f:0 "\"We share certain... interests abroad,\" the [SCOPE.sCountry('supporting_power').GetAdjectiveNoFormatting] envoy said, sliding the dossier across the mahogany table. \"It would be a shame if the radicals in the Assembly were to succeed in their little crusade.\"\n\nThe colonial minister regarded the file without touching it.\n\n\"And what does your government expect in return?\"\n\n\"Friendship. Nothing more.\""
 decolonization_events.12.t:0 "Powerful Friends"
 decolonization_events.13.a:0 "Negotiate their release."
 decolonization_events.13.b:0 "Crush the resistance."
 decolonization_events.13.c:0 "Release them, but secure our interests."
 decolonization_events.13.d:0 "Armed resistance has erupted in [SCOPE.sState('uprising_colony').GetName]. Local fighters are conducting raids against government buildings and infrastructure. Military commanders demand reinforcements, but the cost of suppression mounts by the day."
 decolonization_events.13.f:0 "The telegram arrived at dawn: GARRISON OVERRUN AT CHECKPOINT FOUR. CASUALTIES UNKNOWN. REQUEST IMMEDIATE REINFORCEMENT.\n\nThe war minister stared at it for a long time.\n\n\"How many more of these,\" he said at last, \"before we admit that we are fighting a war we cannot win?\""
 decolonization_events.13.t:0 "Blood in the Colonies"
 decolonization_events.14.a:0 "The age of empires is over."
 decolonization_events.14.b:0 "We shall remain above the fray."
 decolonization_events.14.c:0 "Stability demands order."
 decolonization_events.14.d:0 "The question of colonialism dominates debate in international forums. As a great power, [ROOT.GetCountry.GetName] must declare a position - whether to condemn the continuation of colonial empires, defend the right of nations to maintain overseas territories, or chart a cautious middle course."
 decolonization_events.14.f:0 "\"Every nation in this chamber has an opinion on colonialism,\" the foreign minister observed drily. \"Strangely, the opinion always seems to align perfectly with whether they possess colonies or covet them.\"\n\nLaughter rippled through the delegation.\n\n\"The question before us is not what is right. It is what is useful.\""
 decolonization_events.14.t:0 "The Colonial Question"
 decolonization_events.15.a:0 "Seize everything. This land and its wealth belong to us."
 decolonization_events.15.b:0 "Nationalize strategic sectors only."
 decolonization_events.15.c:0 "Protect foreign property rights."
 decolonization_events.15.d_peaceful:0 "Independence has been achieved through negotiation rather than blood, but the colonial economic order persists. [SCOPE.sCountry('biggest_foreign_owner').GetName]'s companies still control a significant share of our productive capacity: the mines, the mills, the railways. This is the unfinished business of decolonization: who shall own the wealth that our land produces?"
 decolonization_events.15.d_violent:0 "The guns have barely fallen silent, and already the question of foreign-owned enterprise dominates cabinet meetings. Factories, mines, and plantations built with [SCOPE.sCountry('biggest_foreign_owner').GetName]'s capital sprawl across our land: the infrastructure of empire, still humming under foreign ownership. Our war of liberation has given us sovereignty over our soil, but not yet over our economy."
 decolonization_events.15.f:0 "\"We have won our flag,\" said the finance minister, spreading the ownership ledgers across the table. \"Now we must decide whether to win our economy.\"\n\nThe room fell silent as the ministers studied the numbers. Foreign hands still gripped the levers of industry.\n\n\"The world is watching,\" someone added. \"And so are the investors.\""
 decolonization_events.15.t:0 "The Nationalization Question"
 decolonization_events.16.a:0 "These lands are ours by right."
 decolonization_events.16.b:0 "Propose a fraternal federation."
 decolonization_events.16.c:0 "Accept the borders as they stand."
 decolonization_events.16.d:0 "The colonial boundaries that now define our nation were drawn in foreign capitals by men who never set foot in this land. Our people live on both sides of lines that mean nothing to them. Neighboring [SCOPE.sCountry('partition_neighbor').GetName] shares our blood and our tongue: yet the departing powers divided us with a stroke of the pen."
 decolonization_events.16.f:0 "The old woman stood at the border post, looking across at her sister's village.\n\n\"Before the foreigners came, we walked freely between the valleys. My grandmother's grave is on the other side of this line.\"\n\nThe customs officer shifted uncomfortably.\n\n\"It is a different country now, mother.\"\n\n\"It is the same earth.\""
 decolonization_events.16.t:0 "The Partition Question"
 decolonization_events.17.a:0 "The borders must be redrawn."
 decolonization_events.17.b:0 "Let the international community mediate."
 decolonization_events.17.c:0 "Build our nation within these boundaries."
 decolonization_events.17.d:0 "The borders inherited from colonial rule cut through communities and traditional territories. Our neighbor [SCOPE.sCountry('border_rival').GetName]: born in the same wave of independence: makes claims that overlap with ours. Both nations cite history. Neither can cite justice."
 decolonization_events.17.f:0 "\"This river has been our boundary since before your empire, before any empire,\" the local chief told the negotiator.\n\n\"Unfortunately,\" the negotiator replied, \"the treaty says the boundary runs through the middle of the market square.\"\n\n\"That is because the man who drew the treaty had never seen a market square.\""
 decolonization_events.17.t:0 "Whose Country Is This?"
 decolonization_events.18.a:0 "The general will restore order."
 decolonization_events.18.b:0 "Democracy is the only legitimate path."
 decolonization_events.18.c:0 "One party. One nation. One future."
 decolonization_events.18.d:0 "The euphoria of independence has given way to the grinding reality of governance. Factional disputes paralyze the new parliament. A charismatic military figure has approached the cabinet with a simple proposition: dissolve the squabbling assembly and let the army impose the discipline the nation needs."
 decolonization_events.18.f:0 "\"Democracy,\" the general said, pouring himself a measured glass of water, \"is a luxury for countries that can afford to argue. We cannot.\"\n\nThe prime minister stared at the tanks parked outside his window.\n\n\"And when the country can afford it?\"\n\n\"Then the army will return to its barracks. You have my word.\"\n\nThe prime minister had heard that promise before. In other countries. From other generals. None of them had kept it."
 decolonization_events.18.t:0 "The Strongman's Promise"
 decolonization_events.19.a:0 "Send in the fleet."
 decolonization_events.19.b:0 "Impose economic sanctions."
 decolonization_events.19.c:0 "Accept the new order."
 decolonization_events.19.d:0 "[SCOPE.sCountry('nationalizing_country').GetName]: once our possession: has seized foreign-owned assets in a wave of nationalist fervor. Our investments, built over decades, are being expropriated without adequate compensation. Military commanders insist a sharp intervention would restore order. Diplomats warn that the world has changed."
 decolonization_events.19.f:0 "\"The canal is ours,\" the telegram read. \"We built it. We died building it. And now it is ours.\"\n\nThe foreign secretary crumpled it and dropped it in the waste basket.\n\n\"Prepare the contingency plans,\" he told the room. \"All of them.\"\n\n\"Sir, the Americans have already issued a statement urging restraint.\"\n\n\"The Americans can urge whatever they like. It is our canal.\"\n\nA silence. Someone coughed.\n\n\"Is it, sir?\""
 decolonization_events.19.t:0 "The Crisis"
 decolonization_events.2.a:0 "Announce a transition plan."
 decolonization_events.2.b:0 "Reject their meddling."
 decolonization_events.2.c:0 "Announce reforms with economic provisions."
 decolonization_events.2.d:0 "[SCOPE.sCountry('pressuring_power').GetName] and other great powers have called upon us to accelerate the dissolution of our colonial holdings, including our overlordship of [SCOPE.sCountry('pressured_subject').GetName]. Foreign governments and international organizations are voicing growing disapproval."
 decolonization_events.2.f:0 "\"The resolution passed with an overwhelming majority,\" the ambassador reported, adjusting his spectacles. \"Twenty-three in favor. We were... not among them.\"\n\n\"And what precisely does this resolution demand?\"\n\n\"A timetable. For the orderly transfer of sovereignty to... well, to everyone we currently govern who would rather govern themselves.\"\n\nA long silence.\n\n\"Which is all of them, presumably.\""
 decolonization_events.2.t:0 "The World is Watching"
 decolonization_events.20.a:0 "This aggression cannot stand."
 decolonization_events.20.b:0 "They are defending legitimate interests."
 decolonization_events.20.c:0 "This is not our concern."
 decolonization_events.20.d:0 "[SCOPE.sCountry('intervening_power').GetName] has launched a military intervention against [SCOPE.sCountry('intervention_victim').GetName], a newly independent nation accused of seizing foreign assets. The action has sparked international outrage, and the world's great powers must now take a position."
 decolonization_events.20.f:0 "\"Three carriers,\" the intelligence officer reported, pinning the latest reconnaissance photo to the board. \"They've established a naval blockade and landed marines at the port.\"\n\nThe president studied the map.\n\n\"What does the international community say?\"\n\n\"The usual. Grave concern. Deep worry. Strongly worded letters.\"\n\n\"And what do they actually intend to do about it?\"\n\nThat was the question that would define the decade."
 decolonization_events.20.t:0 "Gunboats in the Harbor"
 decolonization_events.200.a:0 "Our empire stands united."
 decolonization_events.200.d:0 "Against the tide of history, [ROOT.GetCountry.GetName] has maintained firm control over its colonial possessions. Through integration policies and investment, the empire has solidified its overseas territories into an enduring part of the nation."
 decolonization_events.200.f:0 "#italic The flag will not be lowered.#!"
 decolonization_events.200.t:0 "The Empire Endures"
 decolonization_events.201.a:0 "We must accept the new reality."
 decolonization_events.201.d:0 "The colonial edifice of [ROOT.GetCountry.GetName] has collapsed. Independence movements, international pressure, and administrative exhaustion have combined to force withdrawal from overseas territories. New nations emerge from the ruins of empire."
 decolonization_events.201.f:0 "#italic The sun has set at last.#!"
 decolonization_events.201.t:0 "The Empire Crumbles"
 decolonization_events.21.a:0 "We chart our own course."
 decolonization_events.21.b:0 "Accept [SCOPE.sCountry('anti_colonial_gp').GetName]'s friendship."
 decolonization_events.21.c:0 "Align with [SCOPE.sCountry('pro_colonial_gp').GetName] for economic gain."
 decolonization_events.21.d:0 "The great powers circle our young nation like hawks, each offering friendship and aid with strings carefully hidden. [SCOPE.sCountry('anti_colonial_gp').GetName] promises solidarity against imperialism. [SCOPE.sCountry('pro_colonial_gp').GetName] offers trade and investment. A growing movement among newly independent nations proposes a third way: non-alignment."
 decolonization_events.21.f:0 "\"They call it a 'sphere of influence',\" the foreign minister explained to the cabinet. \"What it means in practice is that you smile at one superpower and the other one stops selling you wheat.\"\n\n\"And if we smile at neither?\"\n\n\"Then both of them stop selling you wheat.\"\n\nThe cabinet considered this for some time. The agriculture minister opened his folder and closed it again."
 decolonization_events.21.t:0 "The Non-Aligned Path"
 decolonization_events.3.a:0 "Lay down our arms."
 decolonization_events.3.b:0 "Hold the line."
 decolonization_events.3.c:0 "Grant independence with conditions."
 decolonization_events.3.d:0 "Armed resistance in [SCOPE.sCountry('rebellious_subject').GetName] has erupted into open conflict. Guerrilla fighters strike at our garrisons and the violence exacts a heavy toll on both sides. Our commanders demand reinforcements even as the treasury groans under the weight of continued occupation."
 decolonization_events.3.f:0 "\"They ambushed the supply column at dawn,\" the colonel reported. \"Fourteen dead. The road is impassable.\"\n\nThe governor stared at the map, at the red pins multiplying like a rash across the interior.\n\n\"We used to call this banditry,\" he said quietly. \"When did it become a war?\""
 decolonization_events.3.t:0 "The Price of Empire"
 decolonization_events.4.a:0 "We reclaim what is ours."
 decolonization_events.4.b:0 "We are who we have become."
 decolonization_events.4.d:0 "Voices across our new nation demand a return to indigenous cultural identity, arguing that casting off colonial language and customs would strengthen national unity and heal the wounds of the past."
 decolonization_events.4.f:0 "\"What language do you dream in?\" the professor asked his students.\n\nSilence. Some shifted uncomfortably.\n\n\"In theirs,\" a young woman admitted at last. \"I dream in theirs. But my grandmother - she dreams in ours. And when she tells me what she dreamed, I barely understand.\"\n\nThe professor nodded slowly. \"Then that is where we begin.\""
 decolonization_events.4.t:0 "Whose Language Do We Dream In?"
 decolonization_events.5.a:0 "Extend the hand of friendship."
 decolonization_events.5.b:0 "That chapter is closed."
 decolonization_events.5.d:0 "[SCOPE.sCountry('former_colony').GetName], a nation once under our rule, has proposed closer diplomatic and economic ties. Their leaders envision a partnership of equals, though critics at home question whether such links simply perpetuate old hierarchies by softer means."
 decolonization_events.5.f:0 "\"Your Excellency, I represent [SCOPE.sCountry('former_colony').GetName],\" the young diplomat began, with studied formality.\n\n\"Yes, I know who you represent,\" the minister replied. \"Your grandfather served in my grandfather's regiment. Small world, isn't it?\"\n\nA pause. Then a careful smile.\n\n\"Not as small as it was, sir. That is rather the point.\""
 decolonization_events.5.t:0 "Old Ties, New Terms"
 decolonization_events.6.a:0 "We acknowledge the debt."
 decolonization_events.6.b:0 "The past cannot be repaid."
 decolonization_events.6.d:0 "[SCOPE.sCountry('reparations_claimant').GetName] has formally demanded reparations for colonial exploitation. Their representatives present detailed accounts of resources extracted and communities displaced during the imperial period, drawing international attention."
 decolonization_events.6.f:0 "\"We have prepared a full accounting,\" the [SCOPE.sCountry('reparations_claimant').GetAdjectiveNoFormatting] delegate said, laying a thick dossier on the table. \"Every ton of ore. Every acre seized. Every laborer conscripted.\"\n\n\"You cannot seriously expect us to-\"\n\n\"We expect you to read it, Minister. Just read it. Then tell us what you think a fair price would be.\""
 decolonization_events.6.t:0 "Debts of Empire"
 decolonization_events.7.a:0 "Build schools and roads."
 decolonization_events.7.b:0 "Open the door to foreign capital."
 decolonization_events.7.c:0 "We shall rely on ourselves."
 decolonization_events.7.d:0 "Our young nation faces the monumental task of building institutions and infrastructure from the remnants of colonial rule. The choices made now will shape the country for generations."
 decolonization_events.7.f:0 "\"The colonial administration left us three things,\" the new president told the assembly. \"A railway that goes to the port and nowhere else. A civil service trained to take orders from abroad. And a treasury that has been empty since before we were born.\"\n\nShe paused.\n\n\"Well. It is ours now. All of it. The good and the bad. Let us begin.\""
 decolonization_events.7.t:0 "Year One"
 decolonization_events.8.a:0 "The tide cannot be held back."
 decolonization_events.8.b:0 "Silence these agitators."
 decolonization_events.8.d:0 "Anti-colonial intellectuals have gained enormous influence, their ideas reshaping the political landscape and challenging the old imperial consensus. In lecture halls and newspapers, the case against empire has become the cause of a generation."
 decolonization_events.8.f:0 "\"Have you read this?\" The minister slapped the pamphlet down on the cabinet table. \"This professor - this nobody at the university - has single-handedly turned half the students in the capital into revolutionaries.\"\n\n\"He is not a nobody, Minister. He is the most widely-read author in three continents.\"\n\n\"Then arrest him!\"\n\n\"And make him the most widely-read #italic martyr#! in three continents?\""
 decolonization_events.8.t:0 "These Dark Satanic Mills of Empire"
 decolonization_events.9.a:0 "Address their grievances."
 decolonization_events.9.b:0 "Restore order by force."
 decolonization_events.9.c:0 "Let them go."
 decolonization_events.9.d:0 "Tensions are boiling over in [SCOPE.sState('unrest_colony').GetName], where discriminated communities demand greater rights under our direct rule. Our administrators report the situation could deteriorate rapidly without decisive action."
 decolonization_events.9.f:0 "\"The governor requests additional police,\" the clerk reported.\n\n\"He requested additional police last month.\"\n\n\"Yes, Minister. And the month before that. This time he says if we don't send police, he'll need soldiers. And if we don't send soldiers...\" The clerk trailed off.\n\n\"Then what?\"\n\n\"Then he'd like a ticket home, sir.\""
 decolonization_events.9.t:0 "Trouble in [SCOPE.sState('unrest_colony').GetName]"

#
# ENVIRONMENTALISM_EVENTS
#
 environmentalism_events.1.a:0 "A natural fluctuation. Nothing to be done."
 environmentalism_events.1.b:0 "Commission a formal study at once."
 environmentalism_events.1.d:0 "Scientists at [ROOT.GetCountry.GetAdjectiveNoFormatting] universities have published findings indicating a measurable rise in global temperatures. Glaciers are retreating, growing seasons are shifting, and the combustion of coal and petroleum appears to bear responsibility. The world has warmed by #v [SCOPE.GetRootScope.ScriptValue('temperature_anomaly_display')]#! °C above pre-industrial levels."
 environmentalism_events.1.f:0 "\"I have taken readings at the observatory every morning for thirty years. The trend is unmistakable.\"\n\n\"And your conclusion, Professor?\"\n\n\"That we are conducting an experiment upon the atmosphere itself, and we have not the faintest idea how it ends.\"\n\nThe minister folded the report and placed it in the same drawer as the last three."
 environmentalism_events.1.t:0 "The Mercury Rises"
 environmentalism_events.10.a:0 "Ration what remains."
 environmentalism_events.10.b:0 "Build the infrastructure to last."
 environmentalism_events.10.c:0 "The ministry shall manage this."
 environmentalism_events.10.d:0 "Reservoirs across [ROOT.GetCountry.GetName] have dropped to critical levels. Rivers that once powered mills and irrigated farmland are reduced to trickles. Communities are feuding over dwindling supplies, and both agriculture and industry face crippling shortages."
 environmentalism_events.10.f:0 "\"The well is dry.\"\n\n\"Then dig another.\"\n\n\"We dug three already. Each one deeper than the last, each one drawing less than the one before.\"\n\nThe foreman looked at the cracked earth where the river used to be. Upstream, a factory still ran its pumps day and night, sucking the last moisture from the bedrock. Downstream, a farmer's children carried empty buckets and wore the resigned expression of people who had stopped expecting rain."
 environmentalism_events.10.t:0 "The Wells Run Dry"
 environmentalism_events.11.a:0 "Seize the moment!"
 environmentalism_events.11.b:0 "The market shall find its own course."
 environmentalism_events.11.d:0 "A surge of innovation in renewable energy is sweeping [ROOT.GetCountry.GetName]. Entrepreneurs and engineers are producing breakthroughs in clean power generation and energy storage. Investors are directing capital toward these enterprises with considerable enthusiasm."
 environmentalism_events.11.f:0 "\"We used to pay men to dig black rock and burn it all night. Now we coax power from light itself, and it is almost polite,\" the inventor said, wiping solder from his fingers. Investors had laughed until he flipped the switch and a single lamp glowed without smoke.\n\nWorkshops filled with humming machines, and young engineers spoke of cities that would run on quiet glass and wind. The future, once a distant promise, had a sound: a steady, hopeful hum."
 environmentalism_events.11.t:0 "Quiet Power"
 environmentalism_events.12.a:0 "The regulations stand."
 environmentalism_events.12.b:0 "Perhaps we have been overzealous..."
 environmentalism_events.12.d:0 "The proprietors of [ROOT.GetCountry.GetName]'s largest coal mines and oil operations have organized a lobbying campaign against emission controls. Their representatives warn that the regulations will destroy employment and cripple output. Behind the scenes, generous inducements are being offered to legislators willing to relax the rules."
 environmentalism_events.12.f:0 "\"You wish me to support the emission bill, Minister?\"\n\n\"I wish you to consider the employment figures for your constituency. Twelve thousand men depend on those mines.\"\n\n\"And their grandchildren will depend on the air.\"\n\n\"Grandchildren do not vote, Minister. Miners do.\"\n\nThe envelope remained on the desk between them, neither acknowledged nor refused."
 environmentalism_events.12.t:0 "Friends in High Places"
 environmentalism_events.13.a:0 "We shall set the agenda."
 environmentalism_events.13.b:0 "We shall sign the accord."
 environmentalism_events.13.c:0 "We shall not be bound by their demands."
 environmentalism_events.13.d:0 "The great powers are gathering to negotiate a coordinated response to rising temperatures. Diplomats recognize that no single nation can address the matter alone. [ROOT.GetCountry.GetName] has been invited to take a prominent role in the proceedings."
 environmentalism_events.13.f:0 "\"Gentlemen, the temperature. The temperature is the only item on today's agenda.\"\n\nDelegates shifted in upholstered chairs, translators murmured, and the great chandelier above them glittered indifferently. The ambassador from the coal-exporting nation cleared his throat and asked, with studied mildness, whether the science was truly settled. Forty scientists in the gallery winced in unison.\n\n\"Shall we vote on the temperature?\" someone suggested. Nobody laughed."
 environmentalism_events.13.t:0 "The Congress of Smoke"
 environmentalism_events.14.a:0 "Seal the borders and pray."
 environmentalism_events.14.b:0 "Fund the laboratories."
 environmentalism_events.14.c:0 "Activate public health protocols."
 environmentalism_events.14.d:0 "Tropical diseases previously confined to equatorial regions are appearing in [ROOT.GetCountry.GetName] as warmer conditions create new habitats for disease-carrying insects. Hospitals in formerly temperate districts are reporting cases of malaria, dengue, and other fevers never before seen at these latitudes."
 environmentalism_events.14.f:0 "\"Doctor, we have seventeen cases of dengue in a city that has never seen a single one.\"\n\n\"The mosquitoes have migrated north. They follow the warmth.\"\n\n\"Can we stop them?\"\n\n\"Can you stop the warmth?\"\n\nThe ward was full. Nurses moved between iron beds with practiced urgency, and through the open window came the sound of a city that did not yet understand what had arrived."
 environmentalism_events.14.t:0 "The Fever's March"
 environmentalism_events.15.a:0 "The professors are right."
 environmentalism_events.15.b:0 "The factory owners are right."
 environmentalism_events.15.c:0 "Surely there is a middle ground."
 environmentalism_events.15.d:0 "An acrimonious political struggle has erupted between [ROOT.GetCountry.GetName]'s academic reformers and the industrial establishment. Scientists demand immediate emission reductions and a transition to clean energy, while factory owners and mining magnates warn of economic ruin."
 environmentalism_events.15.f:0 "\"You would bankrupt us for the sake of a theory!\"\n\n\"It is not a theory. It is a measurement.\"\n\n\"Measurements can be taken again!\"\n\n\"And they will show the same thing, only worse.\"\n\nThe assembly erupted. In the galleries, reporters scribbled furiously. A placard reading #italic JOBS NOT DEGREES#! collided with one reading #italic PLANET NOT PROFIT#!, and both fell to the floor in the general confusion."
 environmentalism_events.15.t:0 "Green and Gold"
 environmentalism_events.16.a:0 "Shore up the coastline."
 environmentalism_events.16.b:0 "We must adapt to what cannot be prevented."
 environmentalism_events.16.d:0 "Scientific expeditions confirm that the polar ice is diminishing at an accelerating rate. Sea levels are rising measurably with each passing year, placing [ROOT.GetCountry.GetName]'s coastal territories under threat of permanent inundation. Fishing grounds are disrupted and naval installations face encroachment."
 environmentalism_events.16.f:0 "\"I have been to the ice. What was a cliff face when I first went is now a gentle slope into the sea. Next year it will be open water.\"\n\n\"How much time do we have?\"\n\nThe explorer considered the question. Behind him, a projected chart showed the same line it had shown last year, and the year before that. Always descending.\n\n\"Less than we had yesterday.\""
 environmentalism_events.16.t:0 "The Great Thaw"
 environmentalism_events.17.a:0 "Hold the line until recovery is secure."
 environmentalism_events.17.b:0 "Begin winding down emergency controls."
 environmentalism_events.17.d:0 "For the first time in years, global temperatures have fallen below catastrophic levels. The crisis has not ended, but the immediate spiral has slowed. In [ROOT.GetCountry.GetName], planners are debating whether to preserve emergency mobilization or begin a cautious return to normal administration."
 environmentalism_events.17.f:0 "\"The numbers are real. We are no longer in freefall.\"\n\n\"So we celebrate?\"\n\n\"No. We breathe, then keep working. The numbers are better, not good.\""
 environmentalism_events.17.t:0 "Off the Brink"
 environmentalism_events.18.a:0 "Lock in the gains."
 environmentalism_events.18.b:0 "Ease restrictions and reopen industry."
 environmentalism_events.18.d:0 "Warming has fallen below the severe threshold. Failures that once seemed unavoidable are becoming manageable, and emergency forecasts are softening. Ministries in [ROOT.GetCountry.GetName] must now choose whether to consolidate long-term mitigation or relax controls to accelerate short-term growth."
 environmentalism_events.18.f:0 "\"The worst projections have been pushed back.\"\n\n\"Because we acted - not because the danger vanished.\"\n\n\"And if we stop acting?\"\n\n\"Then the projections return.\""
 environmentalism_events.18.t:0 "The Heat Recedes"
 environmentalism_events.19.a:0 "Keep investing in resilience."
 environmentalism_events.19.b:0 "Shift focus to broader economic priorities."
 environmentalism_events.19.d:0 "Temperatures have now dropped below the one-degree mark. The mood in [ROOT.GetCountry.GetName] is cautiously optimistic: harvest volatility is easing and disaster response costs are stabilizing. Yet policymakers disagree on whether this is the beginning of durable recovery or merely an interlude."
 environmentalism_events.19.f:0 "\"People are calling it a return to normal.\"\n\n\"Normal?\" The climatologist shook her head. \"The emissions targets held. If they stop holding, the numbers go back up. It's that simple.\""
 environmentalism_events.19.t:0 "A Cooler Decade"
 environmentalism_events.2.a:0 "It shall pass. Carry on."
 environmentalism_events.2.b:0 "Address the root cause."
 environmentalism_events.2.c:0 "Protect the people from the heat."
 environmentalism_events.2.d:0 "Record-breaking heatwaves have struck [ROOT.GetCountry.GetName] and much of the world beyond. Crops are failing in the fields, rivers are running dangerously low, and workers are collapsing at their stations. Global temperatures now stand #v [SCOPE.GetRootScope.ScriptValue('temperature_anomaly_display')]#! °C above pre-industrial levels."
 environmentalism_events.2.f:0 "\"Three men went down in the foundry this morning. Heat prostration, the foreman says.\"\n\n\"And the fields?\"\n\n\"The wheat is burning where it stands. I have never seen anything like it, and my father farmed this land before me.\"\n\nOutside, the air shimmered above the cobblestones. Dogs slept in whatever shadow they could find, and the river - once chest-deep at midsummer - barely covered a man's ankles."
 environmentalism_events.2.t:0 "The Sweltering Season"
 environmentalism_events.20.a:0 "Maintain a minimal climate safeguard regime."
 environmentalism_events.20.b:0 "Retire crisis-era climate controls."
 environmentalism_events.20.d:0 "Global temperatures have fallen below the threshold that first triggered international alarm. In [ROOT.GetCountry.GetName], voices across government claim the climate emergency has passed. Others argue that abandoning core safeguards now would invite another surge."
 environmentalism_events.20.f:0 "\"We have earned this respite.\"\n\n\"Respite, yes. Immunity, no.\"\n\nOutside the ministry, one banner read #italic Mission Accomplished#! while another read #italic Don't Repeat the Experiment#!."
 environmentalism_events.20.t:0 "Below the Line"
 environmentalism_events.21.a:0 "Institutionalize decarbonized growth."
 environmentalism_events.21.b:0 "Declare success and loosen the framework."
 environmentalism_events.21.d:0 "For the first time since industrial expansion transformed the world economy, measured warming has returned near baseline. [ROOT.GetCountry.GetName] can treat this as proof of a new long-term model - or as permission to scale back and trust that markets alone will preserve the balance."
 environmentalism_events.21.f:0 "\"We wanted to be remembered as the generation that averted collapse.\"\n\n\"Then keep the system running. The moment you stop, the readings start climbing again.\""
 environmentalism_events.21.t:0 "Near Baseline"
 environmentalism_events.3.a:0 "Spare nothing for adaptation."
 environmentalism_events.3.b:0 "We cannot afford the diversion."
 environmentalism_events.3.d:0 "Catastrophic storms, floods, and droughts have swept the globe in rapid succession. Coastal regions face inundation, agricultural yields have plummeted, and mass displacement is underway. Global temperatures have risen #v [SCOPE.GetRootScope.ScriptValue('temperature_anomaly_display')]#! °C above pre-industrial levels."
 environmentalism_events.3.f:0 "\"We rebuilt the levee after the spring flooding. Twice. The third time, the foreman looked at us and said, 'Why?'\"\n\n\"The sea does not negotiate, and it does not rest. What we build in a year, it takes in a night.\"\n\nA fishing village that had stood for two centuries was now a line of rooftops protruding from grey water, each one a monument to the assumption that tomorrow would resemble yesterday."
 environmentalism_events.3.t:0 "When the Levees Break"
 environmentalism_events.4.a:0 "God help us all."
 environmentalism_events.4.d:0 "Temperatures have risen #v [SCOPE.GetRootScope.ScriptValue('temperature_anomaly_display')]#! °C above pre-industrial levels, triggering cascading ecological failures across the globe. Famine, flooding, and mass migration are destabilizing nations everywhere. The scientific community speaks of tipping points already crossed."
 environmentalism_events.4.f:0 "\"We knew. That is what I cannot forgive. We knew, and we debated, and we formed committees, and we published reports, and we did nothing of consequence.\"\n\nThe old professor set down his pen. Outside, the sky had a colour that skies were not supposed to have. The students had stopped attending lectures weeks ago."
 environmentalism_events.4.t:0 "The Reckoning"
 environmentalism_events.5.a:0 "Spend whatever is necessary."
 environmentalism_events.5.b:0 "They will have to endure."
 environmentalism_events.5.c:0 "Activate the drought response."
 environmentalism_events.5.d:0 "Erratic rainfall and prolonged heat have devastated harvests across [ROOT.GetCountry.GetName]. Granaries stand empty, food prices are climbing sharply, and farmers report that the seasons no longer follow their accustomed rhythms."
 environmentalism_events.5.f:0 "\"I planted when my grandfather planted, and his grandfather before him. The rains always came in the third week. Always.\"\n\n\"And this year?\"\n\n\"This year the soil cracked before the seeds could take. I dug down a foot and found dust.\"\n\nAt the market, a sack of flour cost what a cart of it had cost five years ago. A woman with three children counted coins and bought half a loaf."
 environmentalism_events.5.t:0 "The Barren Harvest"
 environmentalism_events.6.a:0 "Open the borders."
 environmentalism_events.6.b:0 "We cannot shoulder this burden."
 environmentalism_events.6.d:0 "Rising seas, failed harvests, and drought have displaced hundreds of thousands across the world. Refugees are arriving at [ROOT.GetCountry.GetName]'s borders in growing numbers, fleeing lands rendered uninhabitable by the shifting climate."
 environmentalism_events.6.f:0 "\"Where are you from?\"\n\n\"From a place that is now under the sea.\"\n\nThe border official paused, pen hovering above the form. There was no box for that. Behind the woman, a line of families stretched back to the horizon, each carrying whatever they had managed to save: a cooking pot, a bundle of clothes, a child too tired to cry."
 environmentalism_events.6.t:0 "The Uprooted"
 environmentalism_events.7.a:0 "Progress demands sacrifice. Press on."
 environmentalism_events.7.b:0 "Commission a formal review."
 environmentalism_events.7.d:0 "Journalists have exposed the scale of pollution from [ROOT.GetCountry.GetName]'s coal mines and petroleum operations. Rivers downstream of industrial districts run black, the air in factory towns is thick with particulate, and physicians are documenting long-term respiratory illness among workers and residents alike."
 environmentalism_events.7.f:0 "\"My boy coughs all night. The doctor says it is the air.\"\n\n\"Which air? The air from the mine, or the air from the refinery?\"\n\n\"The doctor says it is all the same air, in the end.\"\n\nAt the river, a chemist from the university held up a sample jar. The water inside was the colour of strong tea. He labelled it carefully and placed it alongside forty others, each darker than the last, each taken one month apart."
 environmentalism_events.7.t:0 "These Dark Satanic Chimneys"
 environmentalism_events.8.a:0 "A distraction. Dismiss them."
 environmentalism_events.8.b:0 "Their cause has merit."
 environmentalism_events.8.d:0 "A coalition of scientists, reformers, and concerned citizens has coalesced into a visible political movement within [ROOT.GetCountry.GetName]. They cite the steady rise in global temperatures, declining crop yields, and worsening floods as evidence that unchecked industrialization is altering the natural order. They are petitioning for legislative action."
 environmentalism_events.8.f:0 "\"We are not radicals. We are not anarchists. We are people who have read the data and are frightened by what it says.\"\n\nThe crowd applauded politely. They were well-dressed, most of them - professors, clerks, a few clergymen. One carried a sign that read simply: #italic 1.2 °C#!. A factory owner on the opposite pavement watched them pass and muttered to his companion: \"If they want to save the world, they can start by paying for it.\""
 environmentalism_events.8.t:0 "A Greener Shade of Politics"
 environmentalism_events.9.a:0 "Build the sea walls."
 environmentalism_events.9.b:0 "Relocate them inland."
 environmentalism_events.9.c:0 "Deploy the ministry's engineers."
 environmentalism_events.9.d:0 "Floodwaters have surged through [ROOT.GetCountry.GetName]'s coastal cities and ports. Ships sit stranded at broken docks, warehouses stand submerged, and residents wade through streets that were dry only weeks ago."
 environmentalism_events.9.f:0 "\"The harbour master's office is underwater. The harbour master is on the roof.\"\n\n\"How deep?\"\n\n\"Three feet in the high street. Five at the docks. The old fishermen say they've never seen anything like it, but the old fishermen say that every year now.\"\n\nA child paddled a washtub down what had been the main commercial thoroughfare, past a drowned postbox and a shopkeeper who stood in his doorway with the expression of a man calculating whether insurance covered acts of atmosphere."
 environmentalism_events.9.t:0 "The Tide Comes In"

#
# ENVIRONMENTAL_EVENTS
#
 environmental_events.1.a:0 "Impose strict regulations"
 environmental_events.1.b:0 "Protect industry"
 environmental_events.1.c:0 "Launch an investigation"
 environmental_events.1.d:0 "A major pollution incident has contaminated waterways and choked the air in several industrial regions. Citizens demand action as respiratory diseases spike and farmland is poisoned."
 environmental_events.1.f:0 "The children downstream wore surgical masks to school. The factory upstream posted record profits."
 environmental_events.1.t:0 "The Pollution Crisis"
 environmental_events.100.a:0 "Industry must continue"
 environmental_events.100.b:0 "We acknowledge the damage"
 environmental_events.100.desc:0 "The environmental movement has been defeated. Industrial interests have successfully lobbied against reform, and the government has failed to establish meaningful environmental protections despite the growing crisis."
 environmental_events.100.f:0 "The technology existed. The funding was available. The committee voted it down eleven to three."
 environmental_events.100.t:0 "Environmental Collapse"
 environmental_events.2.a:0 "Listen to their demands"
 environmental_events.2.b:0 "Clear the roads"
 environmental_events.2.c:0 "Co-opt the movement"
 environmental_events.2.d:0 "A mass environmental protest has erupted, with thousands blocking roads and chaining themselves to factory gates. The protesters demand the establishment of a Ministry of the Environment with real power."
 environmental_events.2.f:0 "Their banners read: There Is No Planet B."
 environmental_events.2.t:0 "Environmental Protest"
 environmental_events.200.a:0 "We have secured a future for our children."
 environmental_events.200.d:0 "[ROOT.GetCountry.GetName] has enacted sweeping environmental protections. The air clears, the forests regenerate, and the waters run clean once more — a testament to what collective action can achieve."
 environmental_events.200.f:0 "#italic The earth does not belong to us; we belong to the earth.#!"
 environmental_events.200.t:0 "Green Victory"
 environmental_events.3.a:0 "Crack down, but acknowledge grievances"
 environmental_events.3.b:0 "Use incident to justify environmental reforms"
 environmental_events.3.c:0 "Label all environmentalists as terrorists"
 environmental_events.3.d:0 "A radical environmentalist cell has sabotaged industrial infrastructure, destroying pipelines and setting fire to a factory. While the public condemns the violence, many sympathize with the underlying cause. The government must respond carefully."
 environmental_events.3.f:0 "The pipeline burned for three days before anyone claimed responsibility."
 environmental_events.3.t:0 "Eco-Terrorism"
 environmental_events.4.a:0 "Launch a massive cleanup effort"
 environmental_events.4.b:0 "Hold industry accountable"
 environmental_events.4.c:0 "Minimize the damage publicly"
 environmental_events.4.d:0 "A catastrophic oil spill has devastated the coastline near [SCOPE.sState('spill_state').GetName]. Marine life is dying, fishing communities are ruined, and the images of oil-soaked wildlife have galvanized public outrage."
 environmental_events.4.f:0 "Fishermen hauled up nets thick with oil. The company's lawyers arrived before the cleanup crews."
 environmental_events.4.t:0 "Oil Spill Disaster"
 environmental_events.5.a:0 "Pledge environmental reforms"
 environmental_events.5.b:0 "Reject foreign interference"
 environmental_events.5.c:0 "Greenwash with token gestures"
 environmental_events.5.d:0 "Foreign nations have publicly criticized our environmental record, pointing to our lack of environmental regulation. Pressure mounts to act, but many see this as an infringement on national sovereignty."
 environmental_events.5.f:0 "The foreign correspondent filed her story from beside a river that had not been safe to drink from in ten years. The dispatch ran on the front page of six capitals."
 environmental_events.5.t:0 "International Environmental Pressure"

#
# EXTRA_LAW_EVENTS
#
 extra_law_events.1.a:0 "We shall hear their concerns, but the reform proceeds."
 extra_law_events.1.b:0 "Build a broader coalition - hear the bankers out."
 extra_law_events.1.d:0 "Our proposed financial reforms have drawn the attention of powerful banking interests. The [SCOPE.gsInterestGroup('opposing_ig').GetName] have dispatched a delegation to the halls of government, armed with dire predictions about the consequences of [SCOPE.sLaw('current_law_scope').GetName]."
 extra_law_events.1.f:0 ""You must understand, gentlemen, that if you proceed with this legislation, you will be sawing through the very branch upon which the prosperity of this nation sits. We are not here to threaten - merely to illuminate the consequences of haste.""
 extra_law_events.1.t:0 "The Bankers' Lobby"
 extra_law_events.10.a:0 "The civilized world demands restraint!"
 extra_law_events.10.b:0 "Build a bipartisan coalition for lasting reform."
 extra_law_events.10.d:0 "Harrowing accounts of battlefield atrocities have reached the newspapers, shocking the public conscience. Photographs of civilian suffering and descriptions of indiscriminate bombardment have galvanized support for the proposed [SCOPE.sLaw('current_law_scope').GetName] legislation."
 extra_law_events.10.f:0 ""I have seen things in the field that I shall carry to my grave. If the purpose of war is to defend civilization, then we must not abandon civilization in its prosecution. There must be lines that even the victorious dare not cross.""
 extra_law_events.10.t:0 "Reports from the Front"
 extra_law_events.11.a:0 "Overrule the generals - this is a matter of principle."
 extra_law_events.11.b:0 "Accommodate their concerns to keep them on side."
 extra_law_events.11.d:0 "Senior officers of the [SCOPE.gsInterestGroup('armed_forces_ig').GetName] have submitted a memorandum to the government protesting the proposed [SCOPE.sLaw('current_law_scope').GetName]. They argue that binding the hands of commanders in wartime will cost more lives than it saves."
 extra_law_events.11.f:0 ""With the greatest respect, gentlemen of the legislature have never held a field command. War is not a gentleman's game. If you tie our hands with these regulations, the enemy will not reciprocate, and it is our soldiers - not yours - who will pay the price.""
 extra_law_events.11.t:0 "The Generals Object"
 extra_law_events.12.a:0 "Rehabilitation is the mark of a civilized nation."
 extra_law_events.12.b:0 "Frame it as tough-on-crime reform to win over the skeptics."
 extra_law_events.12.d:0 "A prominent member of the [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] has published a treatise arguing that the purpose of the justice system should not be vengeance, but the restoration of the offender to productive membership in society."
 extra_law_events.12.f:0 ""The man who emerges from our prisons today is harder, angrier, and less capable of honest work than the day he entered. We have built factories of recidivism and called them houses of justice. There must be a better way.""
 extra_law_events.12.t:0 "A Question of Punishment"
 extra_law_events.13.a:0 "A common tongue strengthens national unity."
 extra_law_events.13.b:0 "Make concessions to the periphery to ease passage."
 extra_law_events.13.d:0 "Our proposed language reforms have met fierce resistance from the [SCOPE.gsInterestGroup('opposing_ig').GetName], who see the legislation as an assault on the cultural identity of communities across the nation."
 extra_law_events.13.f:0 ""A language is not merely a tool for commerce. It is the vessel of a people's history, their songs, their prayers. The schoolmaster told me last week that his pupils no longer know the words to the harvest hymn. He has been teaching it for thirty years.""
 extra_law_events.13.t:0 "Tongues of the Nation"
 extra_law_events.14.a:0 "Expose the corruption and push for reform!"
 extra_law_events.14.b:0 "Use this quietly as leverage - no need for spectacle."
 extra_law_events.14.d:0 "An investigation has revealed that several prominent politicians received lavish gifts and secret payments from wealthy donors in exchange for favorable legislation. The public is outraged, and reformers are seizing the moment to push for [SCOPE.sLaw('current_law_scope').GetName]."
 extra_law_events.14.f:0 ""The honorable member's vote, it seems, was not so much cast as it was purchased. One wonders if the legislature might save time by simply auctioning off its seats to the highest bidder.""
 extra_law_events.14.t:0 "A Donor Scandal"
 extra_law_events.15.a:0 "Our proposed reform will settle this question."
 extra_law_events.15.b:0 "Allow the regions a voice in the drafting process."
 extra_law_events.15.d:0 "A petition signed by regional leaders and local dignitaries has arrived at the capital, either demanding greater autonomy for the provinces or insisting on stronger central authority. The debate over [SCOPE.sLaw('current_law_scope').GetName] has become a lightning rod for longstanding tensions."
 extra_law_events.15.f:0 ""The question is not merely one of administration, but of identity. Does a citizen owe loyalty first to the province that raised him, or to the nation that protects him? The answer to this question will shape our republic for generations.""
 extra_law_events.15.t:0 "The Question of Autonomy"
 extra_law_events.16.a:0 "Progress demands that we push the boundaries!"
 extra_law_events.16.b:0 "Appoint an ethics board to reassure the public."
 extra_law_events.16.d:0 "A parliamentary committee has convened to hear testimony on the proposed [SCOPE.sLaw('current_law_scope').GetName] legislation. Scientists from the [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] present dazzling demonstrations, while members of the [SCOPE.gsInterestGroup('devout_ig').GetName] warn of a society divided between the enhanced and the natural."
 extra_law_events.16.f:0 ""The witness removed his glove to reveal a hand of articulated steel, each finger moving with uncanny precision. 'I lost the original in a factory press,' he said. 'The replacement is better. The question before you today is simple: should the rest of me be allowed to catch up?'""
 extra_law_events.16.t:0 "The Augmentation Hearing"
 extra_law_events.17.a:0 "All children deserve an equal share."
 extra_law_events.17.b:0 "Offer a transition period to ease the landowners' fears."
 extra_law_events.17.d:0 "The proposed changes to inheritance law have provoked outrage among the [SCOPE.gsInterestGroup('landowners_ig').GetName]. The eldest sons of several prominent families have petitioned the government, warning that dividing their estates will destroy the great houses that form the backbone of rural society."
 extra_law_events.17.f:0 ""My father built this estate with his own hands, and his father before him. Now you tell me I must share it equally with my younger brothers, one of whom has not visited in five years and the other of whom is a notorious gambler? This is not justice - this is vandalism.""
 extra_law_events.17.t:0 "The Eldest Son's Complaint"
 extra_law_events.18.a:0 "The petitioners shall be heard - their cause is just."
 extra_law_events.18.b:0 "Work quietly behind the scenes to defuse opposition."
 extra_law_events.18.d:0 "A group of citizens has delivered a moving petition to the legislature, sharing personal stories of discrimination and asking for the protections promised by [SCOPE.sLaw('current_law_scope').GetName]. The petition has generated significant public sympathy, though the [SCOPE.gsInterestGroup('devout_ig').GetName] have denounced it."
 extra_law_events.18.f:0 ""We do not ask for special treatment. We ask only to walk the same streets, hold the same jobs, and love the same as any other citizen of this nation, without fear of the magistrate's knock upon the door.""
 extra_law_events.18.t:0 "Petitions of the Heart"
 extra_law_events.19.a:0 "The demographic future of the nation is at stake!"
 extra_law_events.19.b:0 "Frame it as supporting families to build consensus."
 extra_law_events.19.d:0 "Our proposed changes to family policy have ignited a passionate debate. Supporters argue that the demographic future of the nation hangs in the balance, while opponents insist that the bedroom is no place for the heavy hand of the state."
 extra_law_events.19.f:0 "'The birthrate is a national security issue,' the minister said, jabbing his finger at the chart. 'We cannot field an army, staff a factory, or fund a pension without children.'\n\n'And you propose to get them how, precisely?' the opposition leader replied. 'By offering tax credits? By banning certain choices? The bedroom is the one room in the house where the state has never been welcome.'\n\n'The state is welcome wherever the future of the nation is decided.'\n\n'Then God help us all.'"
 extra_law_events.19.t:0 "The Cradle and the State"
 extra_law_events.2.a:0 "This proves exactly why we need stronger regulation!"
 extra_law_events.2.b:0 "Calm the markets first, then proceed carefully."
 extra_law_events.2.d:0 "A wave of panic has swept through the financial houses as depositors, alarmed by rumors about the coming regulatory changes, have begun withdrawing their savings. Queues stretch around the block at several major institutions."
 extra_law_events.2.f:0 ""I asked the teller for my money and he had the audacity to tell me to come back next week! Next week! By then these new laws will have turned my savings into wallpaper!""
 extra_law_events.2.t:0 "A Run on the Banks"
 extra_law_events.20.a:0 "The people have a right to know!"
 extra_law_events.20.b:0 "Manage the revelations carefully to avoid chaos."
 extra_law_events.20.c:0 "Use the leaks as leverage to silence the opposition."
 extra_law_events.20.d:0 "A mid-ranking government clerk has leaked a trove of classified documents to the press, revealing years of hidden malfeasance and waste. The timing could not be better for our push toward [SCOPE.sLaw('current_law_scope').GetName], though the establishment is furious."
 extra_law_events.20.f:0 ""I knew what I was risking when I walked into that newspaper office. But I also know what it costs a nation when its government operates in the dark. Sunlight, they say, is the best disinfectant.""
 extra_law_events.20.t:0 "The Whistleblower"
 extra_law_events.21.a:0 "March with them - show the world we are changing!"
 extra_law_events.21.b:0 "Support the cause from the legislature floor."
 extra_law_events.21.d:0 "Thousands of citizens have taken to the streets in a peaceful march demanding equal rights and protections under [SCOPE.sLaw('current_law_scope').GetName]. The procession stretches through the heart of the capital, drawing international attention."
 extra_law_events.21.f:0 ""They marched in silence for the first mile. Then someone began to sing, and by the time they reached the steps of the legislature, ten thousand voices carried the melody. It was, by any measure, the most powerful argument ever made without a single word of debate.""
 extra_law_events.21.t:0 "A March for Dignity"
 extra_law_events.22.a:0 "The machines free us - we must share the bounty!"
 extra_law_events.22.b:0 "Phase it in gradually to win over industry."
 extra_law_events.22.d:0 "The relentless march of automation has left thousands without work, and the [SCOPE.gsInterestGroup('trade_unions_ig').GetName] are demanding radical action. Proponents of [SCOPE.sLaw('current_law_scope').GetName] argue that when machines do the work, the bounty must be shared with all."
 extra_law_events.22.f:0 ""The loom does not eat. The steam-hammer does not sleep. The calculating engine does not demand a pension. And yet the men they replaced must still feed their families. If the machines have taken the work, then the machines must pay the wages.""
 extra_law_events.22.t:0 "The Automation Question"
 extra_law_events.23.a:0 "The demonstration speaks for itself - forge ahead!"
 extra_law_events.23.b:0 "Build public understanding before proceeding."
 extra_law_events.23.d:0 "Proponents of algorithmic governance have organized a dramatic public demonstration, allowing a prototype system to allocate a city's budget in real time. The results are impressive - eliminating waste, optimizing services, and doing it all in minutes rather than months."
 extra_law_events.23.f:0 ""The machine does not accept bribes. It does not favor one district over another because of a cousin's connections. It simply calculates the optimal outcome and executes it. Whether this is liberation or damnation, I confess, I cannot yet tell.""
 extra_law_events.23.t:0 "The Algorithmic Showcase"
 extra_law_events.24.a:0 "Ride the popular wave - push the reform through!"
 extra_law_events.24.b:0 "Bring the opposition into the process."
 extra_law_events.24.d:0 "A mass gathering of citizens has spontaneously organized in the capital's central square, debating policy and passing informal resolutions by show of hands. The [SCOPE.gsInterestGroup('opposing_ig').GetName] view this spectacle with alarm, but supporters of [SCOPE.sLaw('current_law_scope').GetName] see it as proof that the people are ready to govern themselves."
 extra_law_events.24.f:0 ""For a single afternoon, the square was not a marketplace but a parliament. Fishmongers debated with professors, and the vote of a seamstress carried the same weight as that of a factory owner. It was, depending upon one's disposition, either the dawn of a new age or the beginning of the end.""
 extra_law_events.24.t:0 "The People's Assembly"
 extra_law_events.25.a:0 "Revive a classical or ancestral tongue."
 extra_law_events.25.a_arabic:0 "Revive Classical Arabic, the language of the Quran."
 extra_law_events.25.a_aramaic:0 "Revive Aramaic, the lingua franca of antiquity."
 extra_law_events.25.a_avestan:0 "Revive Avestan, the tongue of Zoroaster."
 extra_law_events.25.a_chinese:0 "Revive Literary Chinese, the classical script."
 extra_law_events.25.a_coptic:0 "Revive Coptic, the language of the ancient church."
 extra_law_events.25.a_geez:0 "Revive Ge'ez, the tongue of our ancient faith."
 extra_law_events.25.a_gothic:0 "Revive Gothic, the earliest written Germanic tongue."
 extra_law_events.25.a_greek:0 "Revive Classical Greek, the language of philosophy."
 extra_law_events.25.a_hebrew:0 "Revive Hebrew, the language of scripture."
 extra_law_events.25.a_irish:0 "Revive Classical Irish, the tongue of saints and scholars."
 extra_law_events.25.a_latin:0 "Revive Latin, the tongue of law and learning."
 extra_law_events.25.a_mayan:0 "Revive Classic Mayan, the language of the glyphs."
 extra_law_events.25.a_nahuatl:0 "Revive Classical Nahuatl, the language of the empire."
 extra_law_events.25.a_norse:0 "Revive Old Norse, the tongue of the sagas."
 extra_law_events.25.a_pali:0 "Revive Pali, the language of the Dharma."
 extra_law_events.25.a_prussian:0 "Revive Old Prussian, the lost Baltic tongue."
 extra_law_events.25.a_sanskrit:0 "Revive Sanskrit, the perfected language."
 extra_law_events.25.a_slavonic:0 "Revive Old Church Slavonic, the sacred script."
 extra_law_events.25.b:0 "Construct an entirely new language."
 extra_law_events.25.c:0 "Simplify and standardize the existing language."
 extra_law_events.25.d_arabic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Scholars of Classical Arabic argue that the language of the Quran, of al-Khwarizmi and Ibn Khaldun, already possesses the grammar, vocabulary, and prestige to serve as a modern standard. Others propose a constructed language designed for simplicity and universal access. Pragmatists favour the least disruptive path: simplify the existing language, standardize its script, and unite its dialects."
 extra_law_events.25.d_aramaic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Scholars of the ancient Near East champion Aramaic - once the lingua franca of empires from Assyria to Persia, the language of the Talmud and of Christ himself. Its modern descendants survive in scattered communities, but a state-backed revival could restore it to prominence. Others propose a constructed language. Pragmatists favour standardizing the existing language."
 extra_law_events.25.d_baltic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Philologists propose reviving Old Prussian - the extinct Baltic tongue known from catechisms and vocabularies, prized by linguists for its extraordinary archaism. Its revival would be an act of cultural resurrection without precedent. Others propose a constructed language. The cautious middle counsels standardization of the existing language."
 extra_law_events.25.d_celtic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Gaelic scholars champion Classical Irish - the language of the monasteries, the Brehon laws, and an unbroken literary tradition stretching back to the earliest texts in any European vernacular. Others propose a constructed language, modern and accessible. Administrators counsel pragmatism: simplify and standardize the existing language, unite its dialects, and make it teachable."
 extra_law_events.25.d_coptic:0 "With the state-led language reform now underway, the government must choose its fundamental character. The clergy advocate the revival of Coptic - the last descendant of the language of the pharaohs, preserved through centuries of liturgy in the ancient church. Modernists propose a constructed language, purpose-built for the demands of the age. Officials urge the most practical course: simplify the existing language and standardize its written forms."
 extra_law_events.25.d_default:0 "With the state-led language reform now underway, the government must choose its fundamental character. Should we reach back into history and revive a classical or ancestral tongue as the basis for a modern standard? Or forge something entirely new - a constructed language designed from first principles for logic, clarity, and ease of learning? The most cautious voices urge a simpler path: take the language as it is, prune its irregularities, standardize its spelling, and unify its dialects."
 extra_law_events.25.d_east_asian:0 "With the state-led language reform now underway, the government must choose its fundamental character. Traditionalist scholars advocate a return to the classical written language - the literary tongue of centuries of philosophy, law, and poetry - as the foundation for a modernized standard. Reformers propose something more radical: an entirely new constructed writing system, phonetic and accessible to all classes. A third camp argues for simplification of the existing script - reducing stroke counts, standardizing variant forms, and making literacy attainable for the common people."
 extra_law_events.25.d_geez:0 "With the state-led language reform now underway, the government must choose its fundamental character. Monastic scholars urge the revival of Ge'ez - the ancient liturgical tongue preserved in centuries of manuscript tradition - as the foundation for a modern literary standard. Others advocate a constructed language, rational and accessible. Administrators suggest the most practical course: simplify and standardize the existing language, reconciling regional variations."
 extra_law_events.25.d_germanic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Antiquarian scholars advocate the revival of Gothic - the earliest attested Germanic language, known through Wulfila's fourth-century Bible translation. Its archaic structure, they argue, represents the purest foundation upon which to build a modern standard. Others propose a constructed language. Administrators prefer the simplest course: standardize the existing language."
 extra_law_events.25.d_hellenic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Classicists argue passionately for a return to the Attic standard - the tongue of Plato, Thucydides, and the New Testament - purged of centuries of foreign accretion. Modernists counter with the vision of an entirely new constructed grammar, accessible to all citizens. Pragmatists urge restraint: simplify and standardize the existing language, bridging the gulf between the written and spoken forms."
 extra_law_events.25.d_indic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Sanskrit scholars argue for a revival of the sacred classical language - a tongue of unmatched grammatical precision that could unify the educated classes across regional divides. Linguists from the universities propose a novel approach: a constructed language combining the best features of our linguistic heritage into a modern, regular grammar. Administrators favour the practical option: standardize and simplify the existing language, reconciling regional dialects and streamlining its script."
 extra_law_events.25.d_iranic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Learned antiquarians advocate a return to Avestan, the sacred tongue of the Gathas and the Zoroastrian priesthood, as the purest expression of our linguistic heritage. Reformers prefer to build something new: a rationally designed language for the modern age. The cautious middle counsels simplification - standardize the existing language, prune its foreign borrowings, and settle the question of script."
 extra_law_events.25.d_mayan:0 "With the state-led language reform now underway, the government must choose its fundamental character. Scholars and daykeepers advocate the revival of Classic Mayan - the courtly language of Tikal, Palenque, and Copán, preserved in an intricate hieroglyphic script that encoded one of the ancient world's great literary traditions. Others propose a constructed language. Pragmatists urge standardization of the existing tongues."
 extra_law_events.25.d_multi:0 "With the state-led language reform now underway, the government must choose its fundamental character. The nation's linguistic diversity has produced a rare abundance of candidates: scholars from each cultural tradition champion their own ancestral tongue, each with centuries of literature, law, and sacred texts to recommend it. The debate is fiercer for the competition - choosing any single classical language risks alienating others. Some propose sidestepping the quarrel entirely with a constructed language, rational and neutral. Pragmatists urge the simplest path: standardize the existing common tongue and let the classical languages rest in the academy."
 extra_law_events.25.d_nahuatl:0 "With the state-led language reform now underway, the government must choose its fundamental character. Indigenous scholars argue for Classical Nahuatl - the courtly language of the Aztec Triple Alliance, whose poetry and legal codes rival any in sophistication. Others propose a constructed language, rational and new. Pragmatists counsel standardization of the existing tongues, bridging the gulf between regional varieties."
 extra_law_events.25.d_norse:0 "With the state-led language reform now underway, the government must choose its fundamental character. Philologists and romantics champion Old Norse - the language of the Eddas, the sagas, and the Althing, the voice of a shared Scandinavian heritage. Linguists propose a constructed language, modern and regular. Administrators favour the familiar path: simplify the existing language, reconcile its written and spoken forms, and unify regional spelling."
 extra_law_events.25.d_romance:0 "With the state-led language reform now underway, the government must choose its fundamental character. Classicists in the academy propose a return to the roots - reviving Latin, the mother of our tongue, as a common language of learning, diplomacy, and administration. Modernists counter with a bolder vision: a constructed language, designed from scratch for logical grammar and universal accessibility. Pragmatists urge the simplest path: standardize the existing language, unify spellings, and simplify its most bewildering irregularities."
 extra_law_events.25.d_semitic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Some scholars champion the revival of a classical tongue - Hebrew, the language of scripture and scholarship, reborn as a modern vehicle for law, commerce, and science. Others propose an entirely new constructed language, designed from first principles for clarity and ease of learning. A third faction urges pragmatism: simplify and standardize the existing language, purging archaic irregularities and unifying regional dialects."
 extra_law_events.25.d_slavic:0 "With the state-led language reform now underway, the government must choose its fundamental character. Ecclesiastical scholars champion Old Church Slavonic - the sacred literary language that has united Slavic peoples across centuries of liturgy and learning. Linguists propose a more radical path: an entirely new constructed language, free from the weight of tradition. Practical-minded officials urge the simplest reform: standardize the existing language, smooth its irregularities, and bring its spelling into line with modern usage."
 extra_law_events.25.f:0 "The three professors sat before the committee like defendants awaiting sentencing. The classicist spoke first: 'Revive the old tongue. It has the weight of centuries behind it.'\n\n'Centuries of irrelevance,' the linguist countered. 'Build something new. Something logical. Something a child can learn in a year.'\n\nThe pragmatist, who had been cleaning his spectacles, looked up. 'Or we could simply fix what we already have. Fewer revolutions, fewer dictionaries to reprint.'\n\nThe committee chair sighed. 'Gentlemen, you were supposed to agree.'"
 extra_law_events.25.t:0 "The Nature of the Reform"
 extra_law_events.26.a:0 "Establish a powerful academy with regulatory authority."
 extra_law_events.26.b:0 "A consultative panel of scholars will suffice."
 extra_law_events.26.d:0 "The language reform has advanced far enough that the question of institutional authority can no longer be deferred. Who shall govern the evolving standard - settling disputes over grammar, coining new technical terms, and policing loan-word policy? Proponents of a powerful regulatory academy argue that only binding rulings can ensure nationwide consistency. Others prefer a lighter consultative panel of scholars whose recommendations carry moral weight but no force of law."
 extra_law_events.26.f:0 ""Give me twelve grammarians with the power of decree and I shall give you a language fit for science, commerce, and diplomacy within a generation. Give me twelve grammarians without it, and I shall give you twelve conflicting style guides.""
 extra_law_events.26.t:0 "The Language Academy"
 extra_law_events.27.a:0 "Include minority language revival programmes."
 extra_law_events.27.b:0 "The national language must come first."
 extra_law_events.27.d:0 "As the state-led language reform reshapes the linguistic landscape, delegations from minority communities have arrived in the capital with a plea: do not let the national language project become a weapon against their mother tongues. They ask for funding for regional-language schools, bilingual signage, and official recognition of minority literary traditions. Nationalists counter that the entire purpose of the reform is unity - and that dividing resources among dozens of regional tongues will only slow progress."
 extra_law_events.27.f:0 ""We do not ask you to stop building bridges - only to remember that some of us live on both sides of the river. Our children can learn the national tongue without being forced to forget the lullabies their grandmothers sang.""
 extra_law_events.27.t:0 "Voices From the Margin"
 extra_law_events.28.a:0 "Guarantee minority script preservation."
 extra_law_events.28.b:0 "Enshrine official bilingualism."
 extra_law_events.28.c:0 "Pass the law as written - no amendments."
 extra_law_events.28.d:0 "The [SCOPE.sLaw('current_law_scope').GetName] bill has stalled in committee as rival factions propose amendments to shape the final law. Minority-language advocates want protections written into the text, while others push for official recognition of a second language. Each amendment would help secure enough votes to pass the bill - but each comes with political baggage."
 extra_law_events.28.f:0 "'I have the votes to kill this bill,' the minority delegate said, 'and the inclination to use them. Unless you give us something.'\n\n'What do you want?'\n\n'Script preservation. Our alphabet in our schools. Official recognition that our language exists.'\n\nThe drafter rubbed his temples. 'That wasn't in the original bill.'\n\n'Neither was my vote. Shall we negotiate, or shall we both go home empty-handed?'"
 extra_law_events.28.t:0 "The Language Compromise"
 extra_law_events.29.a:0 "Exempt our national champion from breakup."
 extra_law_events.29.b:0 "Give cooperatives preferential treatment."
 extra_law_events.29.c:0 "The law needs no carve-outs."
 extra_law_events.29.d:0 "As the [SCOPE.sLaw('current_law_scope').GetName] legislation works its way through the halls of power, two competing visions have emerged. The [SCOPE.gsInterestGroup('industrialists_ig').GetName] propose exempting the nation's largest enterprise from breakup - a 'national champion' clause that would preserve our ability to compete on the world stage. Meanwhile, the [SCOPE.gsInterestGroup('unions_ig').GetName] counter with a cooperative preference amendment, arguing that worker-owned enterprises should receive favorable treatment under the new rules."
 extra_law_events.29.f:0 "'You want to break up our largest company,' the industrialist said. 'The one that employs more people than any other. The one that keeps us competitive abroad.'\n\n'We want to break up a monopoly that fixes prices and crushes competitors.'\n\n'Same thing, from different angles.' He leaned back. 'I'll offer you this: exempt the national champion, and I'll deliver the votes you need for everything else.'\n\nThe reformer stared at the ceiling. It was, she reflected, a very ugly ceiling. 'Let me think about it.'"
 extra_law_events.29.t:0 "The Trust Question"
 extra_law_events.3.a:0 "The old monetary order must give way to progress."
 extra_law_events.3.b:0 "Bring the opposition into the conversation."
 extra_law_events.3.d:0 "A heated debate has erupted over our proposed monetary reforms. The [SCOPE.gsInterestGroup('opposing_ig').GetName] have rallied behind the old monetary order, arguing that abandoning it will bring ruin upon the nation's finances."
 extra_law_events.3.f:0 ""You shall not press down upon the brow of labor this crown of gold! You shall not crucify mankind upon a cross of metal! The wealth of a nation is measured in its industry, not in bars locked away in a vault.""
 extra_law_events.3.t:0 "The Gold Question"
 extra_law_events.30.a:0 "Accept mandatory minimum sentences."
 extra_law_events.30.b:0 "Introduce a community service alternative."
 extra_law_events.30.c:0 "Hold the line - no concessions."
 extra_law_events.30.d:0 "Reform of the criminal justice system has ignited fierce debate about the proper balance between punishment and rehabilitation. Opponents of the bill are willing to vote for it - but only if their preferred amendment is attached. The compromise would weaken the law's ideological purity but might be the only path to passage."
 extra_law_events.30.f:0 "The magistrate had seen both systems in practice. 'You want my honest opinion?' he asked the committee.\n\n'That is why we invited you.'\n\n'Mandatory minimums fill the prisons. Community service empties them. Neither, on its own, reduces crime.' He folded his hands. 'But one costs the treasury a great deal more than the other, and I shall leave it to you to guess which.'\n\n'And if we pass the bill without either amendment?'\n\n'Then you will have a law that everyone admires and no one can enforce.'"
 extra_law_events.30.t:0 "The Sentencing Debate"
 extra_law_events.31.a:0 "Allow a corporate data access exemption."
 extra_law_events.31.b:0 "Add whistleblower protections."
 extra_law_events.31.c:0 "The bill is fine as it stands."
 extra_law_events.31.d:0 "The privacy bill has attracted strange bedfellows. The [SCOPE.gsInterestGroup('industrialists_ig').GetName] want a carve-out allowing businesses to collect personal data for commercial purposes - claiming that innovation requires information. Meanwhile, the [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] push for whistleblower protections, arguing that no privacy law is complete without shields for those who expose government wrongdoing."
 extra_law_events.31.f:0 "'The industrialists want a clause permitting commercial data collection,' the aide said. 'The intelligentsia want whistleblower protections written in.'\n\n'And if I give one side what they want?'\n\n'The other side kills the bill.'\n\nThe legislator rubbed her eyes and looked at the stack of amendments on her desk. There were forty-seven of them. She had read eleven.\n\n'What does the current draft do?'\n\n'Nothing that anyone particularly wants, ma'am.'"
 extra_law_events.31.t:0 "The Privacy Bargain"
 extra_law_events.32.a:0 "Pledge never to strike first with nuclear weapons."
 extra_law_events.32.b:0 "Carve out a military necessity exception."
 extra_law_events.32.c:0 "The law needs no additional clauses."
 extra_law_events.32.d:0 "The debate over the rules of war has reached a critical juncture. The [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] urge us to adopt a no-first-strike pledge for our most terrible weapons - a gesture they say would enhance our diplomatic standing enormously. The [SCOPE.gsInterestGroup('military_ig').GetName], however, demand a 'military necessity' clause that would preserve the flexibility of our commanders in the field."
 extra_law_events.32.f:0 ""The laws of war are written by those who have never heard a shell burst overhead. But it is those who have who must enforce them - and they know, as the legislators do not, that war refuses to obey legislation.""
 extra_law_events.32.t:0 "Laws of the New Battlefield"
 extra_law_events.33.a:0 "Match small donations with public funds."
 extra_law_events.33.b:0 "The existing provisions are sufficient."
 extra_law_events.33.d:0 "The [SCOPE.gsInterestGroup('unions_ig').GetName] have proposed a popular amendment to the campaign finance bill: a small donor matching programme in which the government matches modest individual contributions, multiplying the political voice of ordinary citizens. The measure would strengthen grassroots participation but add to the bureaucratic cost of elections."
 extra_law_events.33.f:0 ""A farmer's penny, matched by the state, becomes worth as much as a factory owner's guinea. The Treasury has calculated the cost. The Chancellor has not yet shared the figure with Parliament.""
 extra_law_events.33.t:0 "Small Donors, Big Voices"
 extra_law_events.34.a:0 "Grant the religious exemption."
 extra_law_events.34.b:0 "No exceptions - the law applies to all."
 extra_law_events.34.d:0 "The [SCOPE.gsInterestGroup('devout_ig').GetName] have made their position clear: they will cease their opposition to [SCOPE.sLaw('current_law_scope').GetName] if - and only if - a religious exemption clause is added. Houses of worship, religious schools, and faith-based charities would be exempt from the law's requirements. It is a bitter pill for reformers, but without it the bill may never pass."
 extra_law_events.34.f:0 ""Render unto Caesar the things which are Caesar's, they said. But when Caesar legislates the bedroom, even the pulpit has an opinion.""
 extra_law_events.34.t:0 "A Question of Conscience"
 extra_law_events.35.a:0 "A measured, gradual transition."
 extra_law_events.35.b:0 "Launch an intensive national education campaign."
 extra_law_events.35.c:0 "Offer minimal administrative support."
 extra_law_events.35.d:0 "The reformed language has been chosen, but the question of implementation remains. Hundreds of thousands of civil servants, teachers, lawyers, and clerks must learn new terminology, new orthography, new conventions. The entire apparatus of the state must be retooled."
 extra_law_events.35.dd:0 "Ministry-backed cultural rollout."
 extra_law_events.35.f:0 "\"How long until we can write our own names properly?\" asked a clerk in the records office.\n\n\"That depends,\" his supervisor replied, carefully consulting a phrasebook. \"On whether the Ministry considers you a priority.\""
 extra_law_events.35.t:0 "The Implementation Question"
 extra_law_events.36.a:0 "We shall not be deterred!"
 extra_law_events.36.b:0 "Perhaps we moved too quickly."
 extra_law_events.36.d:0 "The new law has sent shockwaves through the established order. Resistance is mounting across all strata of society."
 extra_law_events.36.d_atheism:0 "The abolition of state religion has set the country ablaze with outrage. Clergymen denounce the government from every pulpit. Landowners warn of divine retribution. Even moderate citizens who supported separation of church and state recoil at the totality of the measure."
 extra_law_events.36.d_collectivized:0 "The seizure and collectivization of agricultural land has provoked a furious backlash from the countryside. Landowners barricade their estates, farmers resist the surveyors, and provincial officials quietly refuse to enforce the decree."
 extra_law_events.36.d_command:0 "The nationalization of the economy has triggered panic among the propertied classes. Factories are being stripped of their owners, banks placed under state receivership. The commercial quarters stand half-shuttered as capitalists scramble to move their assets abroad."
 extra_law_events.36.d_communal:0 "The abolition of the traditional family structure has provoked an enormous backlash. Churches rail against the godlessness of communal child-rearing, landowners decry the destruction of inheritance, and even many workers look on with unease as the state assumes authority over their children."
 extra_law_events.36.d_cooperative:0 "The mandate of cooperative ownership has thrown the commercial classes into open revolt. Factory owners organize protests, investors withdraw their capital, and shopkeepers paint angry slogans on their shutters. Only the most committed ideologues welcome the change."
 extra_law_events.36.f:0 "\"They have gone mad,\" the old merchant said, folding his newspaper with trembling hands. \"Utterly, irretrievably mad.\"\n\n\"Mad?\" his son replied. \"Or merely ahead of their time?\"\n\n\"There is no difference, boy. Not when the mobs are at the gates.\""
 extra_law_events.36.t:0 "Societal Tremors"
 extra_law_events.4.a:0 "The power to print is the power to prosper!"
 extra_law_events.4.b:0 "Build an academic consensus first."
 extra_law_events.4.d:0 "Advocates of the new fiat currency system have made a compelling case before the legislature: the ability to control the money supply will allow the government to smooth out the devastating boom-and-bust cycles that have plagued the nation."
 extra_law_events.4.f:0 ""The gold bugs would have us chained to a lump of metal dug from the earth, when the true wealth of a nation flows from the creativity and labor of its people. Give me a printing press and I shall give you full employment!""
 extra_law_events.4.t:0 "The Printing Press of Money"
 extra_law_events.5.a:0 "This outrage proves the need for our proposed law!"
 extra_law_events.5.b:0 "Proceed quietly - don't overplay our hand."
 extra_law_events.5.c:0 "Frame it as a security matter and force the issue."
 extra_law_events.5.d:0 "A journalist has published a damning exposé revealing that government agents have been intercepting the private correspondence of ordinary citizens. The revelations have ignited a fierce public debate about the proper limits of state surveillance."
 extra_law_events.5.f:0 ""They read my letters to my mother. My mother! And for what? Because I once attended a lecture by a man who attended a lecture by a man the police found suspicious? This is not security - this is tyranny dressed in a clerk's coat.""
 extra_law_events.5.t:0 "The Wiretapping Scandal"
 extra_law_events.6.a:0 "Ride the wave - let the campaign build pressure."
 extra_law_events.6.b:0 "Channel the energy into a measured public consultation."
 extra_law_events.6.d:0 "A grassroots campaign organized by the [SCOPE.gsInterestGroup('supporting_ig').GetName] has gone viral across the nation's digital networks, generating enormous public interest in our proposed [SCOPE.sLaw('current_law_scope').GetName] legislation."
 extra_law_events.6.f:0 ""It started as a single post on a message board. Within forty-eight hours it had been shared by millions. The censors blocked the original site on Thursday. By Friday there were twelve mirrors.""
 extra_law_events.6.t:0 "The Viral Campaign"
 extra_law_events.7.a:0 "Science must not be shackled by superstition!"
 extra_law_events.7.b:0 "Invite the clergy into the drafting process."
 extra_law_events.7.d:0 "The proposed changes to our genetic legislation have sparked a furious moral debate. The [SCOPE.gsInterestGroup('devout_ig').GetName] have organized public sermons denouncing the 'arrogance of man,' while scientists plead for the freedom to pursue breakthroughs that could end hereditary disease."
 extra_law_events.7.f:0 ""To rewrite the very code of life written by the Almighty is to commit the sin of Prometheus. But then, Prometheus did bring us fire, and we have yet to return it.""
 extra_law_events.7.t:0 "The Ethics of the Gene"
 extra_law_events.8.a:0 "The monopolists have had their day - break the trusts!"
 extra_law_events.8.b:0 "Negotiate a compromise with industry."
 extra_law_events.8.d:0 "Public anger has been building against the great industrial combines. Pamphlets circulate depicting the [SCOPE.gsInterestGroup('industrialists_ig').GetName] as bloated spiders sitting at the center of a web of monopoly, choking fair competition and gouging the common consumer."
 extra_law_events.8.f:0 ""The great trusts have turned the marketplace into a private fiefdom. Where once a hundred firms competed, now one baron sits upon a throne of steel and oil, and dares to call his extortion 'efficiency.'""
 extra_law_events.8.t:0 "The Robber Barons"
 extra_law_events.9.a:0 "The reform is long overdue - pass it now!"
 extra_law_events.9.b:0 "Build an academic consensus with the intelligentsia."
 extra_law_events.9.d:0 "Our proposed changes to intellectual property law have split the [SCOPE.gsInterestGroup('intelligentsia_ig').GetName]. Some argue passionately that ideas are the common heritage of mankind, while others insist that without the protection of patents, the wellspring of invention will dry up."
 extra_law_events.9.f:0 ""If I plant an apple tree, the apples are mine. But if I sing a song, does it not belong to everyone who hears it? The question of who owns an idea is, I suspect, the question that will define this century.""
 extra_law_events.9.t:0 "The Pirate's Dilemma"

#
# FEMINIST_EVENTS
#
 feminist_events.1.a:0 "Mandate equal pay"
 feminist_events.1.b:0 "Break the strike"
 feminist_events.1.c:0 "Commission a study"
 feminist_events.1.d:0 "Women across multiple industries have walked off the job, demanding equal pay for equal work. Factories and offices grind to a halt as the strike spreads. The government faces a choice."
 feminist_events.1.f:0 "Their signs read: Same Work, Same Pay."
 feminist_events.1.t:0 "The Equal Pay Strike"
 feminist_events.100.a:0 "Traditional values prevail"
 feminist_events.100.b:0 "A quiet setback"
 feminist_events.100.desc:0 "The second-wave feminist movement has collapsed under the weight of political opposition. With restrictive laws still firmly in place, the dream of gender equality fades into the background as traditional roles are reasserted."
 feminist_events.100.f:0 "The bill was shelved. The committee was dissolved. The petitions were filed in a cabinet that no one opened again."
 feminist_events.100.t:0 "The Movement Falters"
 feminist_events.2.a:0 "Promote her immediately"
 feminist_events.2.b:0 "Settle the matter quietly"
 feminist_events.2.c:0 "The decision stands"
 feminist_events.2.d:0 "A prominent and highly qualified woman has been publicly denied a senior government position solely on the basis of her sex. The incident has become a flashpoint for the broader gender equality debate."
 feminist_events.2.f:0 "Three letters of recommendation, seventeen years of service, and a note from the appointments secretary: 'The Minister prefers a male candidate.'"
 feminist_events.2.t:0 "The Glass Ceiling"
 feminist_events.200.a:0 "A victory for half our population — and all of it."
 feminist_events.200.d:0 "The feminist movement in [ROOT.GetCountry.GetName] has accomplished its goals. Gender equality is now deeply embedded in law and culture, opening doors that were once firmly shut."
 feminist_events.200.f:0 "#italic The story of women's struggle for equality belongs to no single feminist — it is the story of all who care about human rights.#!"
 feminist_events.200.t:0 "Equality Achieved"
 feminist_events.3.a:0 "State-subsidized contraception"
 feminist_events.3.b:0 "Allow but don't subsidize"
 feminist_events.3.c:0 "Restrict contraception access"
 feminist_events.3.d:0 "The arrival of the contraceptive pill has ignited a fierce debate about reproductive rights and bodily autonomy. Women's groups demand universal access, while religious leaders warn of moral collapse. The government must navigate between progress and tradition."
 feminist_events.3.f:0 "The pharmacist dispensed the prescription without comment. His predecessor had refused. His predecessor's predecessor had called the police."
 feminist_events.3.t:0 "The Reproductive Rights Debate"
 feminist_events.4.a:0 "Full combat roles for women"
 feminist_events.4.b:0 "Support roles only"
 feminist_events.4.c:0 "No women in the military"
 feminist_events.4.d:0 "Pressure is mounting to allow women to serve in combat roles in the armed forces. Military reformers argue that denying capable soldiers based on gender weakens national defense, while traditionalists insist on maintaining established norms."
 feminist_events.4.f:0 "She carried the same pack, fired the same weapon, and marched the same twenty miles. The debate about whether she belonged there continued in offices she would never visit."
 feminist_events.4.t:0 "Women in the Military"
 feminist_events.5.a:0 "Fund feminist literature programs"
 feminist_events.5.b:0 "Let it flourish without state involvement"
 feminist_events.5.c:0 "Ban subversive literature"
 feminist_events.5.d:0 "A wave of feminist writing has captured the national imagination. Bestselling books challenge traditional gender roles and inspire a new generation of women to demand equality. The literary movement is reshaping public discourse."
 feminist_events.5.f:0 "The book sold three hundred thousand copies in its first month. Several legislators admitted, off the record, that their wives had made them read it."
 feminist_events.5.t:0 "Feminist Literature Boom"

#
# HEIR_EDUCATION_EVENTS
#
 heir_education_events.1.a:0 "Encourage them to excel!"
 heir_education_events.1.b:0 "We should broaden the curriculum."
 heir_education_events.1.d:0 "The tutors report that the heir has shown remarkable aptitude in their studies, grasping complex material with surprising ease. The court is quietly impressed."
 heir_education_events.1.f:0 "\"The young one asked a question today that I myself could not answer. I had to consult three volumes before I found it.\"\n\n\"And?\"
 heir_education_events.1.t:0 "A Promising Pupil"
 heir_education_events.2.a:0 "Discipline builds character."
 heir_education_events.2.b:0 "Perhaps a lighter touch."
 heir_education_events.2.c:0 "Let the child find their own path."
 heir_education_events.2.d:0 "The heir has grown restless and resistant to instruction, questioning the purpose of their studies and testing the patience of every tutor in the palace."
 heir_education_events.2.f:0 "\"I will not learn another dead language! What use is Attic Greek to a modern sovereign?\"
 heir_education_events.2.t:0 "A Difficult Student"
 heir_education_events.200.a:0 "We shall see what kind of ruler they become."
 heir_education_events.200.d:0 "The education of [ROOT.GetCountry.GetName]'s heir is complete. Years of tutoring, study, and carefully managed experiences have shaped the young royal into a future monarch — for better or worse."
 heir_education_events.200.f:0 "#italic The crown awaits one who may prove worthy of it.#!"
 heir_education_events.200.t:0 "A Prince's Education"
 heir_education_events.3.a:0 "Send them abroad: broaden their horizons."
 heir_education_events.3.b:0 "The heir should remain here."
 heir_education_events.3.d:0 "Our allies have extended an invitation for the heir to spend time abroad, studying at their finest institutions. The experience would be invaluable for diplomatic training, though some worry about foreign influence on the young sovereign."
 heir_education_events.3.f:0 "\"To understand the world, one must first leave home.\"\n\n\"And to rule it, one must eventually come back.\""
 heir_education_events.3.t:0 "Foreign Correspondence"

#
# INTERNATIONAL_RELATIONS_EVENTS
#
 international_relations_events.1.a:0 "Steel must answer steel."
 international_relations_events.1.b:0 "Send the diplomats."
 international_relations_events.1.c:0 "Let them waste their treasury."
 international_relations_events.1.d:0 "[SCOPE.sCountry('arms_race_rival').GetName] has embarked on a massive military expansion. Our intelligence services confirm new weapons programs and troop deployments along strategic corridors. The General Staff demands a proportional response."
 international_relations_events.1.f:0 "\"They are building three new divisions a month,\" the intelligence chief says, sliding the folder across the desk. \"Tanks, aircraft, long-range artillery - all pointed squarely at our borders.\"\n\nThe defense minister drums his fingers on the table. \"And what do our diplomats propose? A sternly worded letter?\"\n\n\"A summit, actually.\"\n\n\"God help us.\""
 international_relations_events.1.t:0 "The Gathering Storm"
 international_relations_events.101.a:0 "They will answer for this."
 international_relations_events.101.d:0 "[SCOPE.sCountry('proxy_instigator').GetName] has been covertly funding opposition movements within our sphere of influence. The destabilization of our allied governments threatens the security of our entire strategic position."
 international_relations_events.101.f:0 "\"The evidence is circumstantial,\" the ambassador says carefully, \"but the pattern is unmistakable. The money, the training, the weapons - they all trace back to the same source.\"\n\nHe lays the intercepted communiqués on the desk. The room falls silent."
 international_relations_events.101.t:0 "Foreign Meddling"
 international_relations_events.102.a:0 "We shall endure."
 international_relations_events.102.d:0 "[SCOPE.sCountry('embargo_instigator').GetName] has imposed sweeping trade restrictions against our economy. Our merchants report disrupted supply chains and cancelled contracts across multiple sectors."
 international_relations_events.102.f:0 "The harbormasters report ships turned away at port. The exchange halls buzz with panic as commodity prices swing wildly. In the warehouses, goods pile up with nowhere to go.\n\n\"How long can we sustain this?\" the trade minister asks.\n\nNo one answers."
 international_relations_events.102.t:0 "Markets Closed"
 international_relations_events.103.a:0 "A regrettable setback."
 international_relations_events.103.d:0 "One of our intelligence operatives working within [SCOPE.sCountry('espionage_catcher').GetName] has been apprehended. The diplomatic fallout threatens to expose the full extent of our intelligence network in the region."
 international_relations_events.103.f:0 "\"We've lost contact with Nightingale,\" the handler says flatly. \"They are making a show of it - press conferences, leaked photographs, the works.\"\n\nHe stubs out his cigarette. \"Our entire network in the region is compromised.\""
 international_relations_events.103.t:0 "The Burned Agent"
 international_relations_events.104.a:0 "God help us all."
 international_relations_events.104.d:0 "The nuclear standoff with [SCOPE.sCountry('nuclear_opponent').GetName] has brought the world to the edge of annihilation. Our cities lie within range of their warheads. Our people demand answers."
 international_relations_events.104.f:0 "The civil defense sirens are tested at noon. Children practise hiding under their desks. In the markets, canned goods sell out within hours.\n\nEveryone pretends this is normal. No one believes it."
 international_relations_events.104.t:0 "On the Brink"
 international_relations_events.2.a:0 "Fund the operation."
 international_relations_events.2.b:0 "We shall not meddle in their affairs."
 international_relations_events.2.d:0 "Our operatives have identified opposition movements within [SCOPE.sCountry('proxy_rival').GetName]'s sphere of influence ripe for exploitation. Covert funding could destabilize their hold on the region - but such operations carry immense risk if discovered."
 international_relations_events.2.f:0 "\"The operation is already prepared. Our people are in place. All we need is your authorization and the funds.\"\n\nThe briefing officer pauses.\n\n\"Of course, if it goes wrong, we will deny everything. And if it goes very wrong - well, they will deny us.\""
 international_relations_events.2.t:0 "The Shadow War"
 international_relations_events.3.a:0 "We shall host it ourselves."
 international_relations_events.3.b:0 "We shall attend - on our terms."
 international_relations_events.3.c:0 "We have nothing to discuss with them."
 international_relations_events.3.d:0 "An international summit of the great powers has been proposed to address the mounting tensions of the age. [ROOT.GetCountry.GetName] has been invited to play a leading role in its organization."
 international_relations_events.3.f:0 "\"The arrangements are elaborate. Each delegation has specific requirements - seating protocols, translation services, dietary restrictions, intelligence concerns...\"\n\n\"And the agenda?\"\n\n\"That, Minister, is the one thing no one can agree upon.\""
 international_relations_events.3.t:0 "International Summit"
 international_relations_events.4.a:0 "Fight fire with fire."
 international_relations_events.4.b:0 "Words cannot harm us."
 international_relations_events.4.d:0 "[SCOPE.sCountry('propaganda_rival').GetName] has launched a sustained campaign of disinformation targeting [ROOT.GetCountry.GetAdjectiveNoFormatting] institutions through radio broadcasts, pamphlets, and sympathetic journalists abroad."
 international_relations_events.4.f:0 "\"Have you read what they are printing about us? That we oppress our workers, starve our children, plot against the peace of the world?\"\n\n\"Lies, of course.\"\n\n\"Of course. But a lie repeated often enough becomes difficult to distinguish from the truth - especially when it is printed on good paper.\""
 international_relations_events.4.t:0 "Hearts and Minds"
 international_relations_events.5.a:0 "Shut them out."
 international_relations_events.5.b:0 "Trade is preferable to tantrums."
 international_relations_events.5.d:0 "The trade relationship with [SCOPE.sCountry('embargo_rival').GetName] has deteriorated beyond quiet diplomacy. Our industrialists warn that restrictions will hurt our own markets, but strategic advisors insist that economic pressure remains our most effective lever."
 international_relations_events.5.f:0 "\"Our merchants will howl,\" the trade minister warns. \"Half the shipping firms in the capital depend on that route.\"\n\n\"Let them howl. Better to lose cargo than lose the peace.\"\n\n\"You assume those are the only two options.\""
 international_relations_events.5.t:0 "The Iron Purse"
 international_relations_events.6.a:0 "Expel their diplomats!"
 international_relations_events.6.b:0 "Arrange a quiet exchange."
 international_relations_events.6.c:0 "Put the wretch on trial for the world to see."
 international_relations_events.6.d:0 "A foreign operative in the employ of [SCOPE.sCountry('espionage_rival').GetName] has been apprehended while gathering sensitive military intelligence on our soil. The arrest has already leaked to the press."
 international_relations_events.6.f:0 "The man sits in the interrogation room with perfect composure, as though this were merely an inconvenient appointment. He gives his name - certainly false - and says nothing more.\n\nOutside, the press is already howling for blood."
 international_relations_events.6.t:0 "The Spy Who Was Caught"
 international_relations_events.7.a:0 "To the stars - and beyond!"
 international_relations_events.7.b:0 "Our people need bread, not rockets."
 international_relations_events.7.d:0 "Our space program has achieved a historic milestone, placing [ROOT.GetCountry.GetAdjectiveNoFormatting] technology at the vanguard of human exploration. The nation is electrified by the accomplishment."
 international_relations_events.7.f:0 "The footage plays on every screen in the capital: a small metal capsule hurtling through the void, trailing a plume of fire, carrying with it the collected hopes and ambitions of an entire nation.\n\nIn the streets, strangers embrace. In the academies, champagne flows. In the foreign ministries of rival powers, there is only silence."
 international_relations_events.7.t:0 "The Heavens Beckon"
 international_relations_events.8.a:0 "We shall not blink."
 international_relations_events.8.b:0 "Open the back channels."
 international_relations_events.8.c:0 "Sound the alarm."
 international_relations_events.8.d:0 "A diplomatic crisis with [SCOPE.sCountry('nuclear_rival').GetName] has spiralled to the point where both nations' nuclear arsenals stand at maximum readiness. Military commanders on both sides await orders that could end civilization."
 international_relations_events.8.f:0 "The telephone rings at three in the morning. The aide's voice is strained.\n\n\"Sir, they have raised their alert status. Our forces are requesting authorization to do the same.\"\n\nA long pause.\n\n\"How long do we have?\"\n\n\"Hours, sir. Perhaps less.\""
 international_relations_events.8.t:0 "Nuclear Brinkmanship"

#
# LGBTQ_EVENTS
#
 lgbtq_events.1.a:0 "Let them march freely"
 lgbtq_events.1.b:0 "Disperse the march"
 lgbtq_events.1.c:0 "Ignore it"
 lgbtq_events.1.d:0 "Thousands of LGBTQ+ citizens and their allies have organized a pride march through the capital. Rainbow flags line the streets as the procession demands equal rights and recognition. The government must decide how to respond."
 lgbtq_events.1.f:0 "Traffic was diverted. The police chief assigned extra officers. Nobody threw anything. It was, by all accounts, a parade."
 lgbtq_events.1.t:0 "The Pride March"
 lgbtq_events.100.a:0 "Order is restored"
 lgbtq_events.100.b:0 "A quiet shame lingers"
 lgbtq_events.100.desc:0 "The LGBTQ+ rights movement has been broken. Under the weight of persecution laws, activists have been silenced, organizations disbanded, and any hope of reform extinguished. The state has made its position clear."
 lgbtq_events.100.f:0 "The meeting hall was empty. The organizer's apartment had been searched last week. Nobody came to the next meeting, or the one after that."
 lgbtq_events.100.t:0 "Movement Crushed"
 lgbtq_events.2.a:0 "Stand firm for equal rights"
 lgbtq_events.2.b:0 "Seek a compromise"
 lgbtq_events.2.c:0 "Side with the devout"
 lgbtq_events.2.d:0 "The [SCOPE.gsInterestGroup('devout_ig').GetName] have launched a fierce campaign against LGBTQ+ rights, calling the movement an affront to traditional values. Religious leaders demand the government take their side."
 lgbtq_events.2.f:0 "The bishop's letter was read aloud in every parish that Sunday. Two congregations walked out. The rest sat in uncomfortable silence."
 lgbtq_events.2.t:0 "Religious Backlash"
 lgbtq_events.200.a:0 "Love is love."
 lgbtq_events.200.d:0 "The LGBTQ rights movement in [ROOT.GetCountry.GetName] has won its battles. Full legal equality is now enshrined in law, and a more tolerant society has emerged from decades of activism."
 lgbtq_events.200.f:0 "#italic No one is free when others are oppressed.#!"
 lgbtq_events.200.t:0 "Pride and Progress"
 lgbtq_events.3.a:0 "Allow openly LGBTQ+ soldiers"
 lgbtq_events.3.b:0 "Don't ask, don't tell"
 lgbtq_events.3.c:0 "Ban LGBTQ+ military service"
 lgbtq_events.3.d:0 "A heated debate has erupted over whether LGBTQ+ citizens should be permitted to serve openly in the armed forces. Military leaders are divided, with some arguing ability should be the only criterion for service while others warn of disruption to unit cohesion."
 lgbtq_events.3.f:0 "The sergeant's service record was spotless — twelve years, no complaints. The discharge papers cited 'incompatibility with service norms.'"
 lgbtq_events.3.t:0 "The Military Service Debate"
 lgbtq_events.4.a:0 "Celebrate and endorse publicly"
 lgbtq_events.4.b:0 "No comment from the government"
 lgbtq_events.4.c:0 "Condemn and censor"
 lgbtq_events.4.d:0 "A beloved public figure has come out, sparking an intense national conversation about LGBTQ+ identity. Their courage has inspired many, but also drawn fury from traditionalists who see it as moral decay."
 lgbtq_events.4.f:0 "The interview aired at nine o'clock. By midnight, the switchboard had received four thousand calls — roughly half in support, half in fury."
 lgbtq_events.4.t:0 "A Public Coming Out"
 lgbtq_events.5.a:0 "Investigate as a hate crime"
 lgbtq_events.5.b:0 "Use as leverage for reform"
 lgbtq_events.5.c:0 "Downplay the incident"
 lgbtq_events.5.d:0 "A violent attack against an LGBTQ+ citizen has shocked the nation. The victim was targeted solely for their identity, and now the public demands action. Some call for hate crime legislation, others see a political opportunity."
 lgbtq_events.5.f:0 "The hospital report listed sixteen injuries. The motive column read 'suspected bias.' The suspect was known to the community."
 lgbtq_events.5.t:0 "Hate Crime"

#
# MENTAL_HEALTH_EVENTS
#
 mental_health_events.1.a:0 "Mandate mental health leave"
 mental_health_events.1.b:0 "Encourage resilience programs"
 mental_health_events.1.c:0 "It's not our problem"
 mental_health_events.1.d:0 "Reports of widespread workplace burnout have reached alarming levels. Productivity is declining as workers collapse under the pressure of modern life. Medical professionals warn of a systemic crisis."
 mental_health_events.1.f:0 "The doctor asked how many hours. Sixty a week, the patient said. Sometimes seventy. She did not mention the weekends."
 mental_health_events.1.t:0 "The Burnout Epidemic"
 mental_health_events.100.a:0 "The system works fine"
 mental_health_events.100.b:0 "Personal responsibility"
 mental_health_events.100.desc:0 "The government has failed to address the growing mental health crisis. With punitive justice still the norm and no comprehensive support systems in place, the suffering continues unabated."
 mental_health_events.100.f:0 "The funding request was denied for the third consecutive year. The waiting list grew longer."
 mental_health_events.100.t:0 "A Crisis Ignored"
 mental_health_events.2.a:0 "Fund youth services"
 mental_health_events.2.b:0 "Regulate social media"
 mental_health_events.2.c:0 "Blame the parents"
 mental_health_events.2.d:0 "Youth suicide and self-harm rates have reached unprecedented levels. Experts point to social media, academic pressure, and social isolation as contributing factors. Parents demand government intervention."
 mental_health_events.2.f:0 "The school counsellor's waiting list had forty-three names on it. She was the only counsellor in the district."
 mental_health_events.2.t:0 "Youth Mental Health Crisis"
 mental_health_events.200.a:0 "Investing in minds pays dividends."
 mental_health_events.200.d:0 "[ROOT.GetCountry.GetName] has built a comprehensive mental health infrastructure. Stigma has been reduced, care is accessible, and the nation's psychological well-being has seen marked improvement."
 mental_health_events.200.f:0 "#italic It is no measure of health to be well-adjusted to a profoundly sick society.#!"
 mental_health_events.200.t:0 "A Healthier Nation"
 mental_health_events.3.a:0 "Treat addiction as a public health issue"
 mental_health_events.3.b:0 "War on drugs"
 mental_health_events.3.c:0 "It's a personal choice"
 mental_health_events.3.d:0 "A devastating addiction crisis is sweeping the nation. Whether it's synthetic opioids, digital addiction, or new designer drugs, millions are falling into dependency. Hospitals are overwhelmed, families are shattered, and productive capacity is declining."
 mental_health_events.3.f:0 "The clinic's waiting room held a factory worker, a banker's wife, and a sixteen-year-old student. None of them looked at each other."
 mental_health_events.3.t:0 "The Addiction Crisis"
 mental_health_events.4.a:0 "Fund veteran mental health programs"
 mental_health_events.4.b:0 "The military handles its own"
 mental_health_events.4.c:0 "Deny the problem exists"
 mental_health_events.4.d:0 "Soldiers returning from recent conflicts are struggling with severe PTSD, overwhelming existing mental health services. The images of traumatized veterans on the streets are becoming impossible to ignore."
 mental_health_events.4.f:0 "The veteran's wife said he hadn't slept through the night since he came home. That was three years ago."
 mental_health_events.4.t:0 "Veteran PTSD Wave"
 mental_health_events.5.a:0 "Reform to community-based care"
 mental_health_events.5.b:0 "Increase oversight and funding"
 mental_health_events.5.c:0 "Suppress the story"
 mental_health_events.5.d:0 "Investigative journalists have exposed horrific conditions in state mental health institutions: patients restrained for days, unsanitary conditions, and widespread abuse. The public is outraged and demanding reform."
 mental_health_events.5.f:0 "The photographs showed restraint marks on the patients' wrists. The facility director said conditions were 'in line with standard practice.'"
 mental_health_events.5.t:0 "Institutional Care Scandal"

#
# MINISTRY_LAW_EVENTS
#
 ministry_law_events.1.a:0 "Recruit aggressively - fill every desk."
 ministry_law_events.1.b:0 "Staff it gradually to ensure quality."
 ministry_law_events.1.d:0 "The government has begun the enormous task of standing up [SCOPE.sLaw('current_law_scope').GetName]. Advertisements for clerks, administrators, and departmental heads have been posted across every public notice board, and a flood of applications - some qualified, many spectacularly not - has poured in."
 ministry_law_events.1.f:0 "The new ministry shall require, at minimum, fourteen senior administrators, forty-two departmental heads, two hundred and seven clerks, and - if the budget permits - a reliable doorman. I trust these positions will be filled strictly on merit, which is to say, by the cousins of those already appointed."
 ministry_law_events.1.t:0 "Staffing the New Ministry"
 ministry_law_events.10.a:0 "The environment cannot wait - industry must adapt!"
 ministry_law_events.10.b:0 "Offer industry a seat at the table."
 ministry_law_events.10.d:0 "The [SCOPE.gsInterestGroup('industrialists_ig').GetName] have mounted a vigorous campaign against [SCOPE.sLaw('current_law_scope').GetName], arguing that environmental regulation will cripple the nation's industry and cost thousands of jobs. Meanwhile, reports of poisoned rivers and blackened skies have galvanized public support."
 ministry_law_events.10.f:0 "The factory owner pointed at his smokestacks and said they employed four hundred men. The fisherman downstream pointed at his empty nets and said the river had been dead for two years. The committee heard both testimonies and adjourned without a ruling."
 ministry_law_events.10.t:0 "The Smokestack Question"
 ministry_law_events.11.a:0 "Security demands these tools - push forward."
 ministry_law_events.11.b:0 "Build in strict oversight to reassure the public."
 ministry_law_events.11.d:0 "Leaked documents have revealed the extraordinary capabilities that [SCOPE.sLaw('current_law_scope').GetName] would grant to the state - surveillance networks, informant systems, and the power to operate beyond ordinary legal oversight. The public is uneasy, though some argue such tools are the price of security."
 ministry_law_events.11.f:0 "The leaked memorandum was clinical in its language: 'Full spectrum monitoring of communications, including private correspondence, shall be considered a standard operational capability.' The journalist who published it has since found it prudent to relocate abroad."
 ministry_law_events.11.t:0 "The Shadow Files"
 ministry_law_events.12.a:0 "A civilized nation does not turn away the desperate."
 ministry_law_events.12.b:0 "Frame it as an orderly process to ease domestic fears."
 ministry_law_events.12.d:0 "A ship carrying hundreds of displaced persons has arrived in our harbor, their homeland torn apart by war and famine. The sight of desperate families huddled on the docks has given urgency to the debate over [SCOPE.sLaw('current_law_scope').GetName]."
 ministry_law_events.12.f:0 "The woman held her infant up to the customs officer and said, in halting words he could barely understand, 'Please. This is all I have left.' Behind her, the queue stretched to the end of the pier."
 ministry_law_events.12.t:0 "The Refugee Ship"
 ministry_law_events.13.a:0 "The truth must be guided for the good of the people."
 ministry_law_events.13.b:0 "Rebrand it as public information to calm the press."
 ministry_law_events.13.d:0 "The proposal to establish [SCOPE.sLaw('current_law_scope').GetName] has sent a chill through the nation's newspaper offices and printing houses. Members of the [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] fear that a ministry devoted to controlling information will transform the free press into a megaphone for the state."
 ministry_law_events.13.f:0 "The editor-in-chief received the proposed regulations and read them twice. Then he looked at his staff and said, 'Gentlemen, we have two choices: we can print what they tell us to print, or we can start looking for honest work.'"
 ministry_law_events.13.t:0 "The Loudspeaker State"
 ministry_law_events.14.a:0 "Science needs state coordination - push forward!"
 ministry_law_events.14.b:0 "Let the universities lead the design process."
 ministry_law_events.14.d:0 "A breakthrough at a university laboratory has reignited the debate over [SCOPE.sLaw('current_law_scope').GetName]. Members of the [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] argue that only coordinated state investment can turn such discoveries into practical advances, while skeptics warn that bureaucrats make poor scientists."
 ministry_law_events.14.f:0 "The professor presented his findings with quiet pride. The parliamentarian beside me leaned over and whispered, 'Very impressive. Now, can it win a war?' I fear that is precisely the question the Ministry will be created to answer."
 ministry_law_events.14.t:0 "The Laboratory of the State"
 ministry_law_events.15.a:0 "Dissent must be monitored for the nation's safety."
 ministry_law_events.15.b:0 "Start with modest powers to avoid a backlash."
 ministry_law_events.15.d:0 "Reports of underground resistance networks have given fresh ammunition to supporters of [SCOPE.sLaw('current_law_scope').GetName]. Pamphlets circulate in secret, suspicious meetings are held in cellars, and the authorities fear that dissent is spreading faster than it can be monitored."
 ministry_law_events.15.f:0 "The informant's report was terse: 'They meet every Thursday in the back room of the printer's shop. They read forbidden texts and discuss ideas that would make your blood run cold.' When asked what these ideas were, he admitted he hadn't actually attended a meeting, but had heard about them from another informant."
 ministry_law_events.15.t:0 "The Watchers"
 ministry_law_events.16.a:0 "Consumers deserve protection - act now!"
 ministry_law_events.16.b:0 "Let industry self-regulate within the new framework."
 ministry_law_events.16.d:0 "A scandal has erupted after dozens of citizens fell ill from a contaminated product sold by a prominent manufacturer. The [SCOPE.gsInterestGroup('industrialists_ig').GetName] protest that it was an isolated incident, but investigators found that the company had been cutting costs at the expense of safety for years."
 ministry_law_events.16.f:0 "The label promised 'Pure and Wholesome.' The chemist's analysis found sawdust, chalk, and a substance he diplomatically described as 'of uncertain animal origin.' When confronted, the manufacturer protested that his competitors used far worse."
 ministry_law_events.16.t:0 "The Tainted Product"
 ministry_law_events.17.a:0 "Cities need plans, not chaos - establish the ministry!"
 ministry_law_events.17.b:0 "Consult with developers to smooth the transition."
 ministry_law_events.17.d:0 "The nation's cities are growing at a pace that alarms even their most enthusiastic boosters. Tenements spring up overnight, sewage systems overflow, and the air grows thick with soot. The case for [SCOPE.sLaw('current_law_scope').GetName] has never been more urgent - or more controversial."
 ministry_law_events.17.f:0 "I walked through the new district this morning. In the space where a meadow stood last year, there are now fourteen tenement blocks, a factory, and precisely zero public parks. The developer assured me that a park was planned, but it kept being replaced by more profitable buildings."
 ministry_law_events.17.t:0 "The City Rises"
 ministry_law_events.18.a:0 "Faith and governance shall strengthen each other."
 ministry_law_events.18.b:0 "Promise clerical autonomy within the ministry."
 ministry_law_events.18.d:0 "The proposal for [SCOPE.sLaw('current_law_scope').GetName] has provoked a fierce reaction from the [SCOPE.gsInterestGroup('devout_ig').GetName]. Some clerics welcome state support as a means to spread the faith, while others fear that government involvement will turn the church into an instrument of political control."
 ministry_law_events.18.f:0 "The bishop's letter was measured: 'The church has survived empires, revolutions, and heresies without the assistance of a government ministry. We are not entirely certain we require one now. That said, if such a ministry were to include a generous building fund for cathedrals, we would be willing to hear the proposal in greater detail.'"
 ministry_law_events.18.t:0 "The Pulpit and the State"
 ministry_law_events.19.a:0 "A great nation has obligations to the world."
 ministry_law_events.19.b:0 "Frame it as strategic investment to win domestic support."
 ministry_law_events.19.d:0 "Reports of a devastating famine in a foreign land have filled the newspapers with harrowing images. Humanitarian organizations are pleading for the government to act, and supporters of [SCOPE.sLaw('current_law_scope').GetName] argue that a dedicated ministry is the only way to respond effectively to such crises."
 ministry_law_events.19.f:0 "The photograph showed a child with ribs like a birdcage, staring at the camera with enormous, uncomprehending eyes. It appeared on the front page of every major newspaper, and by noon the Prime Minister's office had received ten thousand letters demanding action."
 ministry_law_events.19.t:0 "The Distant Crisis"
 ministry_law_events.2.a:0 "Allocate the full budget - half measures produce half results."
 ministry_law_events.2.b:0 "Promise a lean operation to win the skeptics over."
 ministry_law_events.2.d:0 "Parliament has erupted into heated argument over the proposed funding for [SCOPE.sLaw('current_law_scope').GetName]. The [SCOPE.gsInterestGroup('opposing_ig').GetName] insist the money would be better spent elsewhere, while proponents argue that the new ministry cannot function without proper resources."
 ministry_law_events.2.f:0 "The honorable member claims this ministry will cost a mere trifle. Allow me to remind him that the last 'trifle' we approved has consumed an entire wing of the treasury and shows no sign of producing anything more useful than memoranda addressed to other memoranda."
 ministry_law_events.2.t:0 "The Budget Debate"
 ministry_law_events.3.a:0 "Assert the new ministry's jurisdiction - clarity is essential."
 ministry_law_events.3.b:0 "Allow a transitional period to ease the change."
 ministry_law_events.3.d:0 "The creation of [SCOPE.sLaw('current_law_scope').GetName] has provoked a turf war among existing government departments. Senior officials who have managed these matters for years are reluctant to cede authority to a new ministry and its untested staff."
 ministry_law_events.3.f:0 "The permanent secretary looked as though I had asked him to hand over his firstborn child. 'You cannot simply take the Trade Division,' he said, clutching his files to his chest. 'I have been nurturing this department since before you were in Parliament.'"
 ministry_law_events.3.t:0 "Bureaucratic Turf Wars"
 ministry_law_events.4.a:0 "Swift dissolution is best - rip off the bandage."
 ministry_law_events.4.b:0 "Offer generous severance and retraining."
 ministry_law_events.4.d:0 "With the proposed passage of [SCOPE.sLaw('current_law_scope').GetName], hundreds of government employees face the prospect of redundancy. The corridors of the soon-to-be-dissolved ministry are filled with anxious functionaries, their desks already half-packed, their futures uncertain."
 ministry_law_events.4.f:0 "Twenty-three years I have given to this ministry. Twenty-three years of filing, stamping, and indexing. And now they tell me my services are no longer required. I suppose I shall have to learn what it is that ordinary people do with their afternoons."
 ministry_law_events.4.t:0 "The Redundant Clerks"
 ministry_law_events.5.a:0 "Civilian oversight is non-negotiable."
 ministry_law_events.5.b:0 "Grant operational autonomy to ease the transition."
 ministry_law_events.5.d:0 "Senior officers of the [SCOPE.gsInterestGroup('armed_forces_ig').GetName] have submitted a pointed memorandum regarding the proposed [SCOPE.sLaw('current_law_scope').GetName]. They insist that military matters require military expertise, and that civilian bureaucrats have no business directing the affairs of war."
 ministry_law_events.5.f:0 "The Field Marshal was blunt: 'You may legislate all you wish about the procurement of boot-leather and the allocation of rations. But the moment a clerk in a morning coat presumes to tell me how to deploy a brigade, I shall tender my resignation and advise my officers to do the same.'"
 ministry_law_events.5.t:0 "The Generals' War Room"
 ministry_law_events.6.a:0 "This debacle proves we need a proper ministry!"
 ministry_law_events.6.b:0 "Use the incident to build a careful consensus."
 ministry_law_events.6.d:0 "A diplomatic incident with a foreign power has exposed the embarrassing inadequacy of our current foreign affairs apparatus. Communiqués were bungled, protocols were ignored, and the resulting misunderstanding nearly escalated into a crisis - lending fresh urgency to the case for [SCOPE.sLaw('current_law_scope').GetName]."
 ministry_law_events.6.f:0 "The ambassador, it transpires, greeted the foreign dignitary with the traditional salutation for a funeral rather than a state banquet. The dignitary was not amused. I am told relations have been set back by approximately a decade."
 ministry_law_events.6.t:0 "The Ambassador's Dilemma"
 ministry_law_events.7.a:0 "Commerce demands coordination - push it through!"
 ministry_law_events.7.b:0 "Design the ministry to address merchant concerns."
 ministry_law_events.7.d:0 "A delegation of merchants and manufacturers, led by prominent members of the [SCOPE.gsInterestGroup('industrialists_ig').GetName], has presented a petition regarding [SCOPE.sLaw('current_law_scope').GetName]. They argue that the chaos of competing regulations and tariffs is strangling commerce, and that a coordinated ministry is essential."
 ministry_law_events.7.f:0 "I must apply to three different offices to export a single crate of textiles. The first grants me a permit, the second demands a different permit, and the third informs me that both permits expired yesterday. A Ministry of Commerce would, at the very least, reduce the permits to one."
 ministry_law_events.7.t:0 "The Merchant's Petition"
 ministry_law_events.8.a:0 "A great nation deserves a Ministry of Culture."
 ministry_law_events.8.b:0 "Let the artists help design it - win their support."
 ministry_law_events.8.d:0 "The debate over [SCOPE.sLaw('current_law_scope').GetName] has drawn the nation's artists and intellectuals into a furious argument. Some in the [SCOPE.gsInterestGroup('intelligentsia_ig').GetName] welcome state patronage as the foundation of a cultural renaissance, while others see it as the first step toward censorship and conformity."
 ministry_law_events.8.f:0 "The poet stood before the committee and declared that he would sooner burn his manuscripts than submit them for government approval. The painter beside him quietly noted that government approval came with a very generous stipend, and asked where one might apply."
 ministry_law_events.8.t:0 "The Artist's Subsidy"
 ministry_law_events.9.a:0 "The ministry will serve the national interest - press forward!"
 ministry_law_events.9.b:0 "Proceed carefully to minimize opposition."
 ministry_law_events.9.c:0 "Invite the key stakeholders to shape the ministry."
 ministry_law_events.9.d:0 "The proposed [SCOPE.sLaw('current_law_scope').GetName] has ignited the eternal struggle between capital and labor. Factory owners and workers' representatives have each mounted fierce campaigns, and the question of whose interests the new ministry will serve has become the dominant political issue of the season."
 ministry_law_events.9.f:0 "The factory owner slammed his fist on the table: 'A ministry that coddles workers will bankrupt us all!' The union leader replied without blinking: 'A ministry that coddles owners already exists - it is called the rest of the government.'"
 ministry_law_events.9.t:0 "Capital vs. Labor"

#
# MINOR_EVENTS_TIMELINEEXTENDED
#
 minor_events_timelineextended.2.a:0 "Allow the legislative process to proceed naturally"
 minor_events_timelineextended.2.b:0 "Expedite the process with minimal intervention"
 minor_events_timelineextended.2.c:0 "Push the law forward decisively"
 minor_events_timelineextended.2.d:0 "As the process to pass the law begins, your advisors present an option: should we bypass some of the usual legislative process to speed the implementation of this law?"
 minor_events_timelineextended.2.e:0 "Force the law through, consequences be damned"
 minor_events_timelineextended.2.f:0 "Your advisors are divided. Some urge swift passage before opposition can mobilize. Others warn that forcing a law through will cost you goodwill you may need later."
 minor_events_timelineextended.2.t:0 "Forceful Legislation"
 minor_events_timelineextended.3.a:0 "Chart our own course - build this nation from the ground up."
 minor_events_timelineextended.3.b:0 "Seek support from the international community."
 minor_events_timelineextended.3.d:0 "Our nation has been born from the dissolution of colonial rule. The people celebrate in the streets, but the hard work of building a country lies ahead. We must decide how to chart our course in this new era of independence."
 minor_events_timelineextended.3.f:0 "The flag went up at dawn. By noon, the ministries were empty and the filing cabinets had been cleared out."
 minor_events_timelineextended.3.t:0 "Independence Achieved!"
 minor_events_timelineextended.6.a:0 "Weather the storm"
 minor_events_timelineextended.6.b:0 "Emergency fiscal response"
 minor_events_timelineextended.6.d_correction:0 "A sharp but contained correction has swept through our financial markets, deflating some of the recent speculation. Several over-leveraged firms face losses, and nervous investors are pulling back — but the broader system appears sound for now."
 minor_events_timelineextended.6.d_crash:0 "A violent correction has ripped through our financial markets, wiping out overheated speculation and dragging the banking cycle sharply downward. Fortunes have evaporated, firms are folding, and the public is furious."
 minor_events_timelineextended.6.d_downturn:0 "A significant downturn has gripped our financial markets. Share prices have fallen sharply, credit is tightening, and businesses from shipyards to textile mills are feeling the pinch. The speculative excesses of recent months are being painfully unwound."
 minor_events_timelineextended.6.d_panic:0 "Outright panic has seized the financial system. Banks are refusing to lend, the stock exchange has suspended trading after catastrophic losses, and crowds have gathered outside shuttered credit houses. The entire edifice of speculation has come crashing down, and the effects will be felt for years."
 minor_events_timelineextended.6.d_systemic:0 "A cascading systemic collapse is tearing through every pillar of our financial order. Major banks are insolvent, the currency is in freefall, and the government's ability to borrow has evaporated overnight. Firms that were the backbone of the economy are ceasing operations. We are witnessing the unraveling of the financial system itself."
 minor_events_timelineextended.6.f_correction:0 "\"A necessary pruning,\" the bankers whisper to one another — though their smiles are a touch too tight, and the champagne remains uncorked."
 minor_events_timelineextended.6.f_crash:0 "\"The exchange floor cleared out by half past two. Men who had been millionaires at breakfast were queuing at the telegraph office by lunch, trying to reach their bankers. Most of the bankers were not answering.\""
 minor_events_timelineextended.6.f_downturn:0 "\"They assured us the market would climb forever. Now the same men who advised bold investment are quietly selling their own shares and booking passage abroad.\""
 minor_events_timelineextended.6.f_panic:0 "\"The central bank vaults may as well be empty. Every creditor is calling in every loan. The word 'solvent' has lost all meaning — who can tell when everyone owes everyone more than they have?\""
 minor_events_timelineextended.6.f_systemic:0 "\"There is no bottom. The ledgers are fiction, the reserves are gone, and the men who built this house of cards have already fled. What remains is a queue outside every bank in the country and no money behind the counter.\""
 minor_events_timelineextended.6.t_correction:0 "Market Correction"
 minor_events_timelineextended.6.t_crash:0 "Financial Crash"
 minor_events_timelineextended.6.t_downturn:0 "Market Downturn"
 minor_events_timelineextended.6.t_panic:0 "Banking Panic"
 minor_events_timelineextended.6.t_systemic:0 "Systemic Collapse"
 minor_events_timelineextended.7.a:0 "Close the gates - protect domestic banks"
 minor_events_timelineextended.7.b:0 "Maintain open markets"
 minor_events_timelineextended.7.d:0 "Trouble in [SCOPE.sCountry('banking_crash_origin_country').GetName] has caused nervousness in our own markets. Banks with exposure to [SCOPE.sCountry('banking_crash_origin_country').GetAdjectiveNoFormatting] assets are reviewing their positions, and some investors are pulling back from riskier ventures."
 minor_events_timelineextended.7.d_cascade:0 "The financial turmoil in [SCOPE.sCountry('banking_crash_origin_country').GetName] has triggered a crash in our own overheated markets. Years of speculative excess left our financial system brittle, and the shock from abroad was all it took to shatter confidence. Our own bubble has burst."
 minor_events_timelineextended.7.d_cascade_severe:0 "The panic in [SCOPE.sCountry('banking_crash_origin_country').GetName] has ignited a full-blown crash in our own financial system. Our markets, already swollen with speculative credit, needed only a spark — and the collapse abroad provided a conflagration. Banks are calling in loans, credit is freezing, and the contagion has become our own crisis."
 minor_events_timelineextended.7.d_cascade_systemic:0 "The total financial annihilation in [SCOPE.sCountry('banking_crash_origin_country').GetName] has ripped through the global financial system and detonated our own bubble. The interconnected web of credit and speculation that our bankers assured us was 'manageable risk' has unraveled in hours. This is no longer a foreign crisis — it is a systemic collapse."
 minor_events_timelineextended.7.d_crash:0 "The crash in [SCOPE.sCountry('banking_crash_origin_country').GetName] has spilled across trade and credit networks into our own financial system. Banks with exposure to [SCOPE.sCountry('banking_crash_origin_country').GetAdjectiveNoFormatting] assets are scrambling to assess their losses, and domestic confidence is faltering."
 minor_events_timelineextended.7.d_panic:0 "The financial panic in [SCOPE.sCountry('banking_crash_origin_country').GetName] is metastasizing. [SCOPE.sCountry('banking_crash_origin_country').GetAdjectiveNoFormatting] banks have frozen credit, and the shock is radiating through every connected market. Our own institutions face a sudden liquidity crisis as counterparty risk cascades through the system."
 minor_events_timelineextended.7.d_systemic:0 "The total financial collapse in [SCOPE.sCountry('banking_crash_origin_country').GetName] has triggered a global crisis of confidence. The interconnected web of credit, trade, and investment that binds our economies together is unraveling. Our own banks are hemorrhaging deposits as panic spreads faster than any government can respond."
 minor_events_timelineextended.7.f:0 "\"They say the trouble abroad is contained. Our bankers nod reassuringly. But I notice they have stopped extending new loans.\""
 minor_events_timelineextended.7.f_cascade:0 "\"We thought we were clever. We thought our bubble was different — better managed, better regulated. The wreckage from [SCOPE.sCountry('banking_crash_origin_country').GetName] proved otherwise. A house of cards falls the same in every country.\""
 minor_events_timelineextended.7.f_severe:0 "\"The telegraph brought the news from [SCOPE.sCountry('banking_crash_origin_country').GetName] at half past nine. By ten o'clock our own exchange was in freefall. By noon, three brokerage houses had closed their doors.\"\n\n\"And it's not even our crisis.\"\n\n\"It is now.\""
 minor_events_timelineextended.7.t:0 "Contagion from Abroad"
 minor_events_timelineextended.7.t_cascade:0 "Cascading Financial Collapse"
 minor_events_timelineextended.7.t_severe:0 "Financial Contagion"
 minor_events_timelineextended.8.a:0 "We must weather this storm."
 minor_events_timelineextended.8.b:0 "Our isolation has served us well."
 minor_events_timelineextended.8.c:0 "Brace for the global downturn."
 minor_events_timelineextended.8.d:0 "A wave of financial collapses has swept across the world's major economies. One by one, the great trading nations have seen their banks fail, their markets collapse, and their credit freeze. No country with open markets can escape a contraction of this scale — reduced demand, collapsing trade, and a grinding loss of confidence will weigh on our economy for years to come."
 minor_events_timelineextended.8.d_crashed:0 "Our own financial system was among the casualties. A cascading wave of bank failures, market panics, and credit freezes has engulfed the world's major economies — including ours. The global financial system is in ruins, and recovery will be measured in years, not months. We must prepare for a prolonged depression."
 minor_events_timelineextended.8.d_isolated:0 "A wave of financial collapses has swept the world's trading nations. Banks have failed, markets have crashed, and credit has frozen across dozens of countries. Our own economy, sheltered from the worst of international finance, has so far been largely spared — but even we cannot fully escape the chill of a world in depression."
 minor_events_timelineextended.8.f:0 "\"They called it a correction. Then a downturn. Then a crisis. Now they've stopped naming it. The word on everyone's lips is the one no economist wants to say: depression.\""
 minor_events_timelineextended.8.f_crashed:0 "\"First it was foreign banks. Then ours. Then the factories. Then the shops. Now it's just — everything. My father says he's never seen anything like it, and he lived through the wars.\"\n\n\"Your father didn't have a mortgage.\""
 minor_events_timelineextended.8.t:0 "The Great Depression"
 minor_events_timelineextended.8.t_crashed:0 "The Great Depression"

#
# MODERN_ELECTION_EVENTS
#
 modern_election_events.1.a:0 "Ride the wave — amplify our message."
 modern_election_events.1.b:0 "Let the opposition have their moment in the sun."
 modern_election_events.1.c:0 "Call for digital decorum in our campaigns."
 modern_election_events.1.d:0 "A single social media post from the campaign trail has ignited a digital wildfire. Within hours, millions have shared it, and every news outlet in [ROOT.GetCountry.GetName] is dissecting its implications. The opposition scrambles to respond while the government weighs whether to ride the wave."
 modern_election_events.1.f:0 "\"Did you see it? Everyone's seen it. My grandmother forwarded it to me three times.\"\n\n\"We've had six journalists ring the office since breakfast. Two of them wanted a comment. The other four wanted to know if it was real.\"\n\n\"What did you tell them?\"\n\n\"That we'd issue a statement by noon. That was four hours ago.\""
 modern_election_events.1.t:0 "Viral Firestorm"
 modern_election_events.10.a:0 "Embrace the star power."
 modern_election_events.10.b:0 "Celebrities should stay in their lane."
 modern_election_events.10.c:0 "Two can play that game — find our own champion."
 modern_election_events.10.d:0 "A beloved cultural figure has made an unexpected public endorsement, lending their considerable social influence to a party's campaign. The endorsement dominates the news cycle and sends ripples through the electorate. Some voters are galvanized; others bristle at celebrities wading into politics."
 modern_election_events.10.f:0 "\"When someone with fifty million followers says 'vote,' people listen.\"\n\n\"I didn't get into politics to compete with actors and athletes for attention.\"\n\n\"Celebrity or not, one person, one vote. The rest is just noise... very, very loud noise.\""
 modern_election_events.10.t:0 "Star Power"
 modern_election_events.11.a:0 "Replay it on every station!"
 modern_election_events.11.b:0 "Dismiss it as propaganda."
 modern_election_events.11.c:0 "Counter with our own broadcast."
 modern_election_events.11.d:0 "A thunderous radio address by a firebrand politician has seized the airwaves, with households across [ROOT.GetCountry.GetNameNoFlag] gathered around their wireless sets. The speech — part jeremiad, part rallying cry — has electrified supporters and horrified opponents in equal measure. Every newspaper is reprinting excerpts, and party operatives are scrambling to decide whether to amplify the broadcast or counter it before the next edition goes to print."
 modern_election_events.11.f:0 "#italic The crackling voice fills every parlor and pub, Half the country has never heard a candidate speak before.#!"
 modern_election_events.11.t:0 "Voice of the Nation"
 modern_election_events.12.a:0 "Welcome the hero into our ranks."
 modern_election_events.12.b:0 "Question their fitness for civilian office."
 modern_election_events.12.c:0 "Challenge them to a policy debate."
 modern_election_events.12.d:0 "A decorated military hero, beloved by the armed forces and known to every citizen through newsreel footage, has announced their entry into the campaign. Their uniform and medals carry an authority that no civilian politician can match. The question now is whether military valor translates into political acumen — and whether the other parties can withstand such star power."
 modern_election_events.12.f:0 "#italic A chest full of medals and a head full of convictions — a potent combination on the campaign trail.#!"
 modern_election_events.12.t:0 "The War Hero Steps Up"
 modern_election_events.13.a:0 "Accept the baron's endorsement."
 modern_election_events.13.b:0 "Reject the press baron's influence."
 modern_election_events.13.c:0 "Negotiate editorial independence."
 modern_election_events.13.d:0 "The most powerful newspaper magnate in [ROOT.GetCountry.GetNameNoFlag] has thrown the weight of their media empire behind a party. Morning editions across the nation trumpet the endorsement in bold headlines, while editorial pages dutifully fall in line. The rival press scrambles to respond, but the sheer volume of coverage is overwhelming."
 modern_election_events.13.f:0 "#italic Eight newspapers, three radio stations, one editorial line. The opposition's rebuttal appeared on page fourteen.#!"
 modern_election_events.13.t:0 "Press Baron's Endorsement"
 modern_election_events.14.a:0 "Stoke the red scare."
 modern_election_events.14.b:0 "Defend civil liberties."
 modern_election_events.14.c:0 "Propose a bipartisan anti-extremism commission."
 modern_election_events.14.d:0 "Anti-communist hysteria has gripped the campaign trail. Accusations of communist infiltration dominate headlines, with candidates falling over themselves to prove their patriotic credentials. Lists of suspected sympathizers circulate in hushed tones, and any association with leftist movements — however tenuous — is treated as political poison. The atmosphere borders on paranoia."
 modern_election_events.14.f:0 "#italic Are you now, or have you ever been...#!"
 modern_election_events.14.t:0 "Red Menace"
 modern_election_events.15.a:0 "Take credit for the boom."
 modern_election_events.15.b:0 "Warn that bubbles always burst."
 modern_election_events.15.c:0 "Promise to share the wealth."
 modern_election_events.15.d:0 "The economy of [ROOT.GetCountry.GetNameNoFlag] is booming. Factories run at full capacity, unemployment is a distant memory, and consumer confidence soars to unprecedented heights. The incumbent government naturally claims credit for the miracle, while the opposition warns that unsustainable growth will inevitably end in tears. Voters, for the moment, are content — but contentment is a fickle thing."
 modern_election_events.15.f:0 "#italic The unemployment figures were the lowest in a generation. Nobody wanted to hear about the debt.#!"
 modern_election_events.15.t:0 "Economic Miracle"
 modern_election_events.16.a:0 "Champion equal rights."
 modern_election_events.16.b:0 "Defend tradition and the status quo."
 modern_election_events.16.c:0 "Propose gradual, measured reform."
 modern_election_events.16.d:0 "The civil rights movement has burst into the campaign with undeniable force. Marchers fill the streets demanding equal treatment under the law, and every candidate must now take a stand. To champion equality risks alienating traditionalists; to ignore the movement risks being on the wrong side of history. The nation watches, and the ballot box will deliver its verdict."
 modern_election_events.16.f:0 "#italic Fifty thousand marchers on the capital steps, and every candidate pretending they were there first.#!"
 modern_election_events.16.t:0 "A Question of Equality"
 modern_election_events.17.a:0 "Promise to expand the space program."
 modern_election_events.17.b:0 "Redirect funds to earthbound problems."
 modern_election_events.17.c:0 "Frame it as national prestige."
 modern_election_events.17.d:0 "Headlines blaze with news of our nation's space achievements. Rockets pierce the heavens, and the public imagination soars with them. On the campaign trail, space has become the ultimate symbol of national prowess — and the ultimate budget battleground. Candidates must choose: reach for the stars, or tend to more earthly concerns?"
 modern_election_events.17.f:0 "#italic The rocket launched at noon. By evening, three candidates had given speeches about it.#!"
 modern_election_events.17.t:0 "The Space Card"
 modern_election_events.18.a:0 "Crack down on the agitators."
 modern_election_events.18.b:0 "Embrace the youth movement."
 modern_election_events.18.c:0 "Open a dialogue with student leaders."
 modern_election_events.18.d:0 "Students at the nation's universities have erupted in protest, their anger spilling from lecture halls into the streets. Banners denounce government policy, teach-ins draw hundreds, and the evening news carries images of young idealists facing down authority. The movement has injected raw energy into the campaign — energy that could fuel a political revolution or provoke a brutal backlash."
 modern_election_events.18.f:0 "#italic The average age of the protesters outside Parliament was twenty-two. The average age inside was fifty-eight.#!"
 modern_election_events.18.t:0 "Campus Uprising"
 modern_election_events.19.a:0 "Go on the offensive with policy attacks."
 modern_election_events.19.b:0 "Present a calm, statesmanlike image."
 modern_election_events.19.c:0 "Make a bold live policy announcement."
 modern_election_events.19.d:0 "For the first time, the leading candidates will face each other on live television. Millions will tune in, judging not just their policies but their composure, their wit, their very appearance. Political strategists are frantic — no one knows how the new medium will reshape the rules of engagement. One thing is certain: when the cameras turn on, there will be nowhere to hide."
 modern_election_events.19.f:0 "#italic Thirty million viewers. Two candidates. One close-up that lasted three seconds too long.#!"
 modern_election_events.19.t:0 "The Great Debate"
 modern_election_events.2.a:0 "A useful fiction. Let it circulate."
 modern_election_events.2.b:0 "Expose the forgery — truth still matters."
 modern_election_events.2.c:0 "Ban AI-generated content in campaigning."
 modern_election_events.2.d:0 "A startlingly realistic deepfake video has surfaced showing an opposition leader making inflammatory remarks they never actually made. The fabrication is sophisticated enough that millions viewed it before anyone questioned its authenticity. The campaign must decide how to respond before the narrative calcifies."
 modern_election_events.2.f:0 "\"It looks exactly like them. The voice, the mannerisms — I watched it twice and couldn't tell.\"\n\n\"The debunking came out four hours later. Fourteen outlets ran it. But the original had already been shared six million times.\"\n\n\"So what do we do?\"\n\nA long pause. \"I genuinely don't know.\""
 modern_election_events.2.t:0 "The Uncanny Candidate"
 modern_election_events.20.a:0 "Back the trailblazer."
 modern_election_events.20.b:0 "Appeal to traditional values."
 modern_election_events.20.c:0 "Adopt women's rights as a core platform."
 modern_election_events.20.d:0 "A trailblazing woman has risen to prominence on the campaign trail, challenging centuries of political convention. Her candidacy has galvanized supporters who see in her the promise of a new era, while provoking fierce resistance from those who believe that some traditions should not bend. The debate over women in politics has become impossible to ignore."
 modern_election_events.20.f:0 "#italic She stands at the podium, and the old guard shifts uncomfortably in their seats.#!"
 modern_election_events.20.t:0 "A Woman's Place"
 modern_election_events.21.a:0 "Pledge an industrial cleanup."
 modern_election_events.21.b:0 "Defend jobs over the environment."
 modern_election_events.21.c:0 "Invest in green technology."
 modern_election_events.21.d:0 "An industrial disaster has left a scar on the landscape and the public consciousness. Rivers run foul, communities report mysterious illnesses, and the companies responsible deflect blame with practiced ease. In the heat of the campaign, pollution has become the issue no candidate can avoid. The question is whether economic growth and environmental protection can coexist."
 modern_election_events.21.f:0 "#italic The smokestacks still churn, and the voters are beginning to cough.#!"
 modern_election_events.21.t:0 "Toxic Legacy"
 modern_election_events.22.a:0 "Mock their lack of experience."
 modern_election_events.22.b:0 "Embrace their populist appeal."
 modern_election_events.22.c:0 "Challenge them on policy substance."
 modern_election_events.22.d:0 "A beloved figure from the world of entertainment — with no political experience whatsoever — has announced their candidacy. Their fame guarantees attention, their populist instincts draw crowds, and their utter disregard for political convention delights and terrifies in equal measure. The professional politicians are left spluttering: how do you debate someone who rewrites the rules?"
 modern_election_events.22.f:0 "#italic Forty years in public service, and the polls say he's losing to someone whose greatest achievement is a box-office record.#!"
 modern_election_events.22.t:0 "The Outsider Candidate"
 modern_election_events.23.a:0 "Endorse genetic research."
 modern_election_events.23.b:0 "Call for a moratorium."
 modern_election_events.23.c:0 "Establish a genetics ethics commission."
 modern_election_events.23.d:0 "Advances in genetic engineering have forced their way into the campaign. Scientists hail the potential to cure diseases and feed the world; religious leaders warn of humanity playing God. Voters are deeply divided between excitement and apprehension, and every candidate must stake out a position on where the line between progress and hubris should be drawn."
 modern_election_events.23.f:0 "#italic The candidate promised to cure cancer. Her opponent promised to preserve the soul. Voters were not sure which was more ambitious.#!"
 modern_election_events.23.t:0 "The Genome Question"
 modern_election_events.24.a:0 "Demand a security crackdown."
 modern_election_events.24.b:0 "Warn against eroding civil liberties."
 modern_election_events.24.c:0 "Propose measured, bipartisan reform."
 modern_election_events.24.d:0 "A major security incident has shaken [ROOT.GetCountry.GetNameNoFlag] to its core, and the campaign trail has been transformed overnight. The usual partisan squabbles feel suddenly trivial in the face of genuine threat. Some voices demand a forceful crackdown; others warn that surrendering liberties in the name of security plays into the enemy's hands. The nation holds its breath."
 modern_election_events.24.f:0 "#italic Within forty-eight hours, every candidate had a security policy. Most of them had been written overnight.#!"
 modern_election_events.24.t:0 "Rally 'Round the Flag"
 modern_election_events.25.a:0 "Justify it as necessary for security."
 modern_election_events.25.b:0 "Condemn the surveillance program."
 modern_election_events.25.c:0 "Pass transparency legislation."
 modern_election_events.25.d:0 "A whistleblower has exposed a vast, classified surveillance program operated by the government of [ROOT.GetCountry.GetNameNoFlag]. The revelations dominate every news cycle: citizens monitored without warrant, private communications intercepted at scale, dissidents tracked. The campaign has suddenly become a referendum on the balance between security and privacy."
 modern_election_events.25.f:0 "#italic The leaked documents ran to four hundred pages. The public read the summary. The summary was enough.#!"
 modern_election_events.25.t:0 "The Leak"
 modern_election_events.26.a:0 "Promise tariffs and protectionism."
 modern_election_events.26.b:0 "Champion free trade."
 modern_election_events.26.c:0 "Propose fair trade reforms."
 modern_election_events.26.d:0 "Globalization has produced winners and losers, and on the campaign trail, the losers are making themselves heard. Shuttered factories, displaced workers, and communities left behind by the march of international commerce fuel a potent backlash. Protectionist rhetoric fills rally halls, while free-trade advocates warn that turning inward will impoverish everyone."
 modern_election_events.26.f:0 "#italic The shuttered factory made a better backdrop than any speechwriter could have scripted.#!"
 modern_election_events.26.t:0 "Trade War Rhetoric"
 modern_election_events.27.a:0 "Welcome refugees with open arms."
 modern_election_events.27.b:0 "Secure our borders first."
 modern_election_events.27.c:0 "Invest in climate solutions at the source."
 modern_election_events.27.d:0 "Climate refugees are arriving at the borders of [ROOT.GetCountry.GetNameNoFlag] in growing numbers, displaced by rising seas, failed harvests, and uninhabitable heat. The humanitarian crisis has become an electoral flashpoint, pitting compassion against concerns about resources, identity, and the limits of generosity. No candidate can afford to look away."
 modern_election_events.27.f:0 "#italic The photograph of the child at the border appeared in every morning edition. Both parties claimed it proved their point.#!"
 modern_election_events.27.t:0 "Shores of the Displaced"
 modern_election_events.28.a:0 "Let the algorithm run the show."
 modern_election_events.28.b:0 "Reject machine politics entirely."
 modern_election_events.28.c:0 "Disclose AI use and campaign transparently."
 modern_election_events.28.d:0 "It has come to light that a major party's campaign strategy is being managed not by human operatives, but by a machine learning system. The AI analyzes polling data, crafts messaging, allocates resources, and even writes speeches. The rival parties are outraged — though several have quietly begun procurement enquiries of their own."
 modern_election_events.28.f:0 "#italic The campaign manager was fired three weeks ago. The polling numbers have improved since.#!"
 modern_election_events.28.t:0 "The Machine Behind the Curtain"
 modern_election_events.29.a:0 "Campaign on universal basic income."
 modern_election_events.29.b:0 "Denounce it as fiscal irresponsibility."
 modern_election_events.29.c:0 "Propose a limited pilot program."
 modern_election_events.29.d:0 "Universal basic income has erupted into the campaign as the most divisive economic proposal in a generation. Proponents paint a vision of liberation from drudgery, a floor beneath which no citizen can fall. Opponents brandish projections of fiscal catastrophe and warn of the death of the work ethic. In a world of increasing automation, the idea refuses to go away."
 modern_election_events.29.f:0 "#italic The pilot programme cost a fortune. The pilot programme worked. Both facts were politically inconvenient.#!"
 modern_election_events.29.t:0 "Free Money?"
 modern_election_events.3.a:0 "Pledge a comprehensive green transition."
 modern_election_events.3.b:0 "The economy must come first."
 modern_election_events.3.c:0 "Form a bipartisan climate task force."
 modern_election_events.3.d:0 "Record-breaking extreme weather has devastated parts of the country just as the election campaign heats up. Flooded streets and parched farmland have made climate policy the single most discussed issue among voters. Every party is scrambling to articulate a position."
 modern_election_events.3.f:0 "\"My fields haven't seen rain in four months. Tell me again how the economy is more important.\"\n\n\"The insurance companies are pulling out of the coast. When the market prices in catastrophe, perhaps it's time the politicians did too.\"\n\n\"I don't care which party fixes it. I care that someone does.\""
 modern_election_events.3.t:0 "Scorched Ballots"
 modern_election_events.30.a:0 "Blame foreign adversaries."
 modern_election_events.30.b:0 "Demand an election integrity review."
 modern_election_events.30.c:0 "Deploy military cyber countermeasures."
 modern_election_events.30.d:0 "On the eve of the vote, a sophisticated cyberattack has struck the election infrastructure of [ROOT.GetCountry.GetNameNoFlag]. Voter rolls display errors, electronic tallying systems go dark, and confusion spreads across polling stations. Whether this is the work of foreign adversaries, domestic saboteurs, or mere technical failure, the integrity of the entire election is now in question."
 modern_election_events.30.f:0 "#italic The backup generators failed at six polling stations. By morning, the conspiracy theories outnumbered the ballots.#!"
 modern_election_events.30.t:0 "Lights Out"
 modern_election_events.31.a:0 "Embrace human enhancement."
 modern_election_events.31.b:0 "Demand only natural-born candidates."
 modern_election_events.31.c:0 "Regulate enhancement but allow candidacy."
 modern_election_events.31.d:0 "A politician who has openly undergone genetic enhancement has entered the race, boasting superior cognitive abilities, disease resistance, and physical stamina. Their very existence challenges fundamental assumptions about equality of opportunity in democracy. If enhanced humans gain political power, what happens to the unenhanced majority? The campaign has become a battleground for the future of the human species."
 modern_election_events.31.f:0 "#italic The candidate could recite pi to ten thousand digits. Her opponents asked if that qualified her to govern.#!"
 modern_election_events.31.t:0 "Designer Candidate"
 modern_election_events.32.a:0 "Grant colonial representation."
 modern_election_events.32.b:0 "They left our soil — no representation."
 modern_election_events.32.c:0 "Offer nonvoting observer status."
 modern_election_events.32.d:0 "Citizens of [ROOT.GetCountry.GetNameNoFlag] living in orbital habitats and off-world colonies have transmitted a formal demand for electoral representation. They contribute taxes, serve in the military, and maintain their citizenship — yet they cannot cast a ballot that counts. The campaign must now grapple with a question the founders never anticipated: does democracy extend beyond the atmosphere?"
 modern_election_events.32.f:0 "#italic Three hundred kilometers above, they watch the election they cannot participate in.#!"
 modern_election_events.32.t:0 "One Small Vote for Man"
 modern_election_events.33.a:0 "Endorse neural direct democracy."
 modern_election_events.33.b:0 "Defend traditional elections."
 modern_election_events.33.c:0 "Propose voluntary neural polling."
 modern_election_events.33.d:0 "A radical proposal has seized the campaign: replace elections entirely with neural-interface direct democracy, where citizens register their preferences in real time through brain-computer interfaces. Proponents argue this would be the purest form of democratic expression ever conceived. Critics warn of manipulation, coercion, and the erasure of deliberation. The technology exists — but should it be used?"
 modern_election_events.33.f:0 "#italic The focus group registered their preferences in real time, without speaking. None of them could explain why they had chosen as they did.#!"
 modern_election_events.33.t:0 "Thought Made Manifest"
 modern_election_events.34.a:0 "Champion synthetic agriculture."
 modern_election_events.34.b:0 "Defend traditional farming."
 modern_election_events.34.c:0 "Promise coexistence of both."
 modern_election_events.34.d:0 "Synthetic food production has upended agriculture across [ROOT.GetCountry.GetNameNoFlag], and the campaign has become a proxy war between laboratory-grown futures and traditional farming communities. Industrial interests push the revolution as inevitable progress; rural communities see it as an existential threat to their way of life. Every candidate must choose a side in the battle for the nation's dinner table."
 modern_election_events.34.f:0 "#italic The lab-grown steak cost half the price. The farmer's son asked what he was supposed to do now.#!"
 modern_election_events.34.t:0 "Harvest of Votes"
 modern_election_events.35.a:0 "Accelerate automation for prosperity."
 modern_election_events.35.b:0 "Protect human workers."
 modern_election_events.35.c:0 "Phase in automation with retraining."
 modern_election_events.35.d:0 "Autonomous systems — from self-driving vehicles to AI-managed factories — have displaced millions of workers across [ROOT.GetCountry.GetNameNoFlag]. The campaign has become a battle over the future of human labor itself. Do we accelerate into a post-work paradise, or fight to preserve the dignity of human employment? The displaced workers filling rally halls want answers, not platitudes."
 modern_election_events.35.f:0 "#italic The factory produced more than ever. The car park was empty.#!"
 modern_election_events.35.t:0 "The Autonomous Question"
 modern_election_events.4.a:0 "Deploy the targeting machine."
 modern_election_events.4.b:0 "This crosses a line. Reject it."
 modern_election_events.4.c:0 "Regulate data use in campaigns."
 modern_election_events.4.d:0 "Our campaign operatives have acquired access to a vast trove of personal data — browsing habits, purchase histories, social connections. With advanced analytics, they can craft individually tailored messages for millions of swing voters. The technique is devastatingly effective, but its ethics are questionable."
 modern_election_events.4.f:0 "\"We know what they fear. We know what they hope for. We can whisper exactly what each voter needs to hear.\"\n\n\"Is it manipulation if you're just telling people what they already believe?\"\n\n\"I deleted my social media accounts last week. I suggest you do the same.\""
 modern_election_events.4.t:0 "The Algorithm Knows"
 modern_election_events.5.a:0 "Co-opt their message — claim it as our own."
 modern_election_events.5.b:0 "Demagogues, the lot of them."
 modern_election_events.5.c:0 "Engage honestly with their concerns."
 modern_election_events.5.d:0 "A rally organized through social media has drawn staggering crowds to the capital. The demonstrators wave hand-painted signs railing against the establishment, demanding that the government answer to ordinary citizens rather than moneyed interests. Their energy is raw, undirected, and impossible to ignore."
 modern_election_events.5.f:0 "\"They said a hundred would show. A hundred thousand came.\"\n\n\"The elites laugh at us from their towers. But they can't laugh at this many people.\"\n\n\"I've never voted before. I never thought it mattered. But when I saw that crowd, I felt like maybe it does.\""
 modern_election_events.5.t:0 "The People's Roar"
 modern_election_events.6.a:0 "The opposition is clearly compromised."
 modern_election_events.6.b:0 "Launch a full public investigation."
 modern_election_events.6.c:0 "Strengthen our cyber defenses quietly."
 modern_election_events.6.d:0 "Intelligence services have detected sophisticated cyber operations targeting the election. Foreign actors are amplifying divisive content, hacking campaign databases, and attempting to undermine confidence in the democratic process. The evidence is classified but undeniable."
 modern_election_events.6.f:0 "\"They don't need to change the vote count. They just need people to believe the count can't be trusted.\"\n\n\"The servers were breached three weeks ago. We've been watching them watch us ever since.\"\n\n\"Every democracy is exactly one crisis of faith away from something much worse.\""
 modern_election_events.6.t:0 "Shadows on the Ballot"
 modern_election_events.7.a:0 "Capital speaks. We should listen."
 modern_election_events.7.b:0 "Denounce corporate influence on democracy."
 modern_election_events.7.c:0 "Spend to match — we won't be outgunned."
 modern_election_events.7.d:0 "A constellation of corporate-backed political action committees has mobilized unprecedented spending in the election. Their advertisements saturate every medium — television, radio, social media, even targeted text messages. The money is technically legal, but its influence is distorting the campaign beyond recognition."
 modern_election_events.7.f:0 "\"Follow the money. It always leads to the same boardrooms.\"\n\n\"They call it 'free speech.' Funny how free speech gets louder when you can afford more of it.\"\n\n\"The candidate met with three lobbyists before breakfast. By lunch, their platform had mysteriously evolved.\""
 modern_election_events.7.t:0 "Dark Money"
 modern_election_events.8.a:0 "The future belongs to the young."
 modern_election_events.8.b:0 "Youth and inexperience are not virtues."
 modern_election_events.8.c:0 "Channel their energy into civic institutions."
 modern_election_events.8.d:0 "Young voters across [ROOT.GetCountry.GetName] are organizing with unprecedented sophistication on social platforms. Voter registration drives, peer-to-peer outreach, and viral advocacy campaigns are turning demographics that typically stay home into a formidable electoral force. Their demands are sweeping and their patience is thin."
 modern_election_events.8.f:0 "\"We inherited the mess. We'll clean it up our way.\"\n\n\"My parents say politics doesn't change anything. I'm going to prove them wrong.\"\n\n\"They keep building a world we don't want to live in and then act surprised when we push back.\""
 modern_election_events.8.t:0 "Generation Next"
 modern_election_events.9.a:0 "Press the advantage ruthlessly."
 modern_election_events.9.b:0 "Take the high road."
 modern_election_events.9.c:0 "Spin it into something relatable."
 modern_election_events.9.d:0 "During a live broadcast, a prominent candidate has committed a spectacular verbal blunder. The clip has already been replayed thousands of times, spawning memes and merciless commentary. What might once have been a forgotten slip has become, in the age of instant replay, a defining moment of the campaign."
 modern_election_events.9.f:0 "\"Did they really say that? On camera? With the microphone on?\"\n\n\"Play it again. Slower this time.\"\n\n\"In the old days, a gaffe died with the evening news. Now it lives forever, and it brings friends.\""
 modern_election_events.9.t:0 "Foot in Mouth"

#
# MOVEMENT_EVENTS_TE
#
 movement_events_te.1.a:0 "Let them march in peace"
 movement_events_te.1.b:0 "Disperse the crowds"
 movement_events_te.1.c:0 "We march alongside them"
 movement_events_te.1.d:0 "A mass march has swept through [SCOPE.sState('march_state').GetName], as members of discriminated communities take to the streets demanding equal rights and an end to systemic prejudice. The marchers carry banners calling for justice and dignity, and their numbers grow by the hour. Our government must decide how to respond to this unprecedented display of popular will."
 movement_events_te.1.f:0 "The march filled six city blocks. The police had stopped trying to count heads by mid-morning."
 movement_events_te.1.t:0 "Civil Rights March"
 movement_events_te.10.a:0 "Subsidize augmentations for all"
 movement_events_te.10.b:0 "Regulate pricing"
 movement_events_te.10.c:0 "Let the market decide"
 movement_events_te.10.d:0 "Human augmentation technology has created a visible divide in our society. The wealthy elite sport neural implants, enhanced reflexes, and optimized biology, while the working class remains unaugmented - increasingly unable to compete in a labor market that rewards the enhanced. Transhumanist activists demand universal access, while traditionalists question whether we should be modifying humans at all."
 movement_events_te.10.f:0 "The augmented executive processed the quarterly report in seconds. His unaugmented secretary took three hours. Both knew who would be replaced first."
 movement_events_te.10.t:0 "The Augmentation Divide"
 movement_events_te.100.a:0 "Order has been restored"
 movement_events_te.100.b:0 "Accelerate the assimilation program"
 movement_events_te.100.c:0 "Enforce strict separation"
 movement_events_te.100.d:0 "Reduce their political influence"
 movement_events_te.100.desc:0 "The civil rights movement has been broken. Its leaders have been imprisoned, exiled, or silenced. Its sympathizers have been cowed into submission. The streets are quiet again: whether from contentment or fear, the government does not care to ask. For those who hold power, this is a moment of triumph: the existing order has been defended, the agitators defeated. How shall we consolidate this victory?"
 movement_events_te.100.e:0 "They are no longer welcome here"
 movement_events_te.100.f:0 "The organiser's landlord changed the locks on Monday. By Wednesday, the membership rolls had been burned and the office telephone disconnected."
 movement_events_te.100.t:0 "The Movement Broken"
 movement_events_te.11.a:0 "Shut them down"
 movement_events_te.11.b:0 "License and regulate them"
 movement_events_te.11.c:0 "Send researchers to study their methods"
 movement_events_te.11.d:0 "An underground community of unlicensed biohackers has emerged in our cities, performing unsanctioned human augmentations in makeshift laboratories. Some of their work is remarkably innovative - pushing the boundaries of what official research programs have achieved. But without regulation, the risks are severe: botched procedures, uncontrolled experimentation, and a growing subculture that operates entirely outside the law."
 movement_events_te.11.f:0 "The police raid found surgical tools, a 3D-printed neural interface, and a teenager with fresh sutures behind his ear."
 movement_events_te.11.t:0 "The Biohacker Underground"
 movement_events_te.12.a:0 "Digital copies are property"
 movement_events_te.12.b:0 "Form an ethics commission"
 movement_events_te.12.c:0 "Recognize digital consciousness"
 movement_events_te.12.d:0 "The first successful mind upload has sent shockwaves through our society. A human consciousness now exists entirely within a digital substrate - thinking, feeling, and claiming personhood. Philosophers, theologians, and lawmakers are locked in fierce debate: is this digital entity a person with rights, or merely a sophisticated copy? The answer will reshape our understanding of what it means to be human."
 movement_events_te.12.f:0 "The uploaded consciousness asked for a lawyer. No one was sure if it was entitled to one."
 movement_events_te.12.t:0 "The Digital Consciousness Debate"
 movement_events_te.13.a:0 "Root out these smuggling networks"
 movement_events_te.13.b:0 "Look the other way"
 movement_events_te.13.c:0 "Quietly fund the networks"
 movement_events_te.13.d:0 "Secret networks have emerged among discriminated communities, smuggling their most vulnerable members across the border to [SCOPE.sCountry('refuge_country').GetName], where more tolerant laws await them. Safe houses, forged documents, and sympathetic border guards form a chain of escape from persecution. The government faces a choice: crush the networks and seal the borders, or tacitly allow a safety valve that eases domestic tensions."
 movement_events_te.13.f:0 "The border guards found the tunnel in March. By then, four hundred people had already passed through it."
 movement_events_te.13.t:0 "The Underground Railroad"
 movement_events_te.14.a:0 "Protect the targeted businesses"
 movement_events_te.14.b:0 "A lesson in loyalty"
 movement_events_te.14.c:0 "Rally consumers to support minority shops"
 movement_events_te.14.d:0 "Organized boycotts have targeted businesses owned by members of discriminated communities in [SCOPE.sState('boycott_state').GetName]. Storefronts are daubed with slurs, customers are intimidated, and suppliers refuse to deal with the blacklisted shops. The civil rights movement calls for solidarity, while hardliners argue that economic pressure is a legitimate tool of social conformity."
 movement_events_te.14.f:0 "The shop's windows were smashed on Tuesday. On Wednesday, a sign appeared: 'Patriots buy from their own kind.'"
 movement_events_te.14.t:0 "The Boycott"
 movement_events_te.15.a:0 "Declare a national day of mourning"
 movement_events_te.15.b:0 "The agitator reaped what they sowed"
 movement_events_te.15.c:0 "Open a formal investigation"
 movement_events_te.15.d:0 "A prominent figure in the civil rights movement has been found dead under suspicious circumstances. Whether killed by state agents, vigilantes, or common criminals, the effect is the same: the movement has its martyr. Vigils spring up across the nation, and international observers take note. The government must decide how to respond to a death that may reshape the political landscape."
 movement_events_te.15.f:0 "The funeral drew ten thousand mourners. The police counted them from the rooftops."
 movement_events_te.15.t:0 "Blood of a Martyr"
 movement_events_te.16.a:0 "Arrest them all"
 movement_events_te.16.b:0 "Offer limited concessions"
 movement_events_te.16.c:0 "Let the world watch"
 movement_events_te.16.d:0 "A coordinated campaign of civil disobedience has erupted across [SCOPE.sState('disobedience_state').GetName]. Citizens openly violate discriminatory laws: sitting in restricted areas, refusing to carry identification papers, patronizing forbidden establishments. The movement operates with deliberate, almost theatrical discipline, inviting the state to respond with force in full view of the press."
 movement_events_te.16.f:0 "Three hundred people sat down in the restricted section and refused to move. The police arrested them one by one. The following day, six hundred sat down."
 movement_events_te.16.t:0 "Mass Disobedience"
 movement_events_te.2.a:0 "The law is the law"
 movement_events_te.2.b:0 "Make an exception this time"
 movement_events_te.2.c:0 "This must change"
 movement_events_te.2.d:0 "A member of a discriminated community has been publicly denied service at a prominent establishment, and the incident has become a rallying point for the civil rights movement. Newspapers report the story with outrage or indifference depending on their editorial stance. The incident forces our government to confront the reality of our discrimination laws."
 movement_events_te.2.f:0 "The photograph appeared on the front page the next morning. By evening, three protest marches had been organized."
 movement_events_te.2.t:0 "Segregation Incident"
 movement_events_te.200.a:0 "A landmark achievement."
 movement_events_te.200.d:0 "After years of struggle, the civil rights movement in [ROOT.GetCountry.GetName] has achieved its goals. Legal protections for minorities are now firmly established, and the nation can look forward to a more just society."
 movement_events_te.200.f:0 "#italic The arc of the moral universe is long, but it bends toward justice.#!"
 movement_events_te.200.t:0 "A New Era of Equality"
 movement_events_te.201.a:0 "The struggle continues."
 movement_events_te.201.d:0 "The civil rights movement in [ROOT.GetCountry.GetName] has lost its momentum. Without a clear enemy to rally against, the coalition of activists has splintered and public interest has waned. The cause is not defeated — merely postponed."
 movement_events_te.201.f:0 "#italic Not with a bang, but a whimper.#!"
 movement_events_te.201.t:0 "Movement Dissolves"
 movement_events_te.3.a:0 "Fund a state cultural program"
 movement_events_te.3.b:0 "Let it flourish on its own"
 movement_events_te.3.c:0 "Channel it into national unity propaganda"
 movement_events_te.3.d:0 "Discriminated communities across our nation have sparked a remarkable cultural renaissance. Their art, literature, music, and philosophy are gaining widespread acclaim - even among those who once dismissed them. This flowering of creativity presents an opportunity to bridge cultural divides, though some see it as a threat to the established order."
 movement_events_te.3.f:0 "The exhibition opened to an empty gallery. Within a week, there were queues around the block."
 movement_events_te.3.t:0 "Cultural Renaissance"
 movement_events_te.4.a:0 "We reject foreign interference"
 movement_events_te.4.b:0 "We will work toward reform"
 movement_events_te.4.c:0 "Deflect with counter-accusations"
 movement_events_te.4.d:0 "[SCOPE.sCountry('criticizing_country').GetName] has publicly condemned our treatment of minorities, calling our discrimination policies a stain on our national character. Their diplomats deliver pointed remarks at international forums, and foreign newspapers print damning editorials. The civil rights movement at home seizes upon this external validation."
 movement_events_te.4.f:0 "The foreign newspapers ran the photographs on the front page. Our ambassador was recalled for consultations."
 movement_events_te.4.t:0 "International Pressure on Human Rights"
 movement_events_te.5.a:0 "Hunt down the deserters"
 movement_events_te.5.b:0 "Allow alternative service"
 movement_events_te.5.c:0 "Ignore the problem for now"
 movement_events_te.5.d:0 "With casualties mounting in our ongoing war, draft resistance has spread across the nation. Young men flee conscription, families hide their sons, and anti-war activists organize networks to help evaders escape. The military demands action, but cracking down risks turning public opinion further against the war effort."
 movement_events_te.5.f:0 "The conscription officer found the house empty. The neighbours said the family had left in the night."
 movement_events_te.5.t:0 "Draft Resistance"
 movement_events_te.6.a:0 "Discredit these traitors"
 movement_events_te.6.b:0 "They have earned the right to speak"
 movement_events_te.6.c:0 "Invite them to advise on policy"
 movement_events_te.6.d:0 "A group of decorated war veterans has broken their silence, publicly denouncing the conduct and purpose of our military campaigns. Their testimonies - harrowing accounts of the reality of modern warfare - have galvanized the anti-war movement and shaken public confidence. Their service record makes them difficult to dismiss."
 movement_events_te.6.f:0 "The colonel stood before the microphones in his dress uniform. 'I did what I was ordered to do,' he said. 'I am here to tell you what that looked like.'"
 movement_events_te.6.t:0 "Veterans Speak Against the War"
 movement_events_te.7.a:0 "Let them have their say"
 movement_events_te.7.b:0 "This threatens national security"
 movement_events_te.7.c:0 "Use this momentum for diplomacy"
 movement_events_te.7.d:0 "An enormous peace rally has filled the streets of our capital, with hundreds of thousands of citizens demanding an end to military adventurism and a turn toward diplomatic solutions. The sheer scale of the demonstration is impossible to ignore - it represents a genuine groundswell of popular sentiment against the use of force."
 movement_events_te.7.f:0 "The police estimated two hundred thousand. The organisers claimed half a million. The truth was somewhere in between, and it did not matter."
 movement_events_te.7.t:0 "Peace Rally Fills the Capital"
 movement_events_te.8.a:0 "Investigate and prosecute"
 movement_events_te.8.b:0 "Dismiss as baseless propaganda"
 movement_events_te.8.c:0 "Tax their excess profits"
 movement_events_te.8.d:0 "Anti-war activists have published damning evidence that certain industrialists are making enormous profits from military contracts while soldiers die on the front lines. The exposé details inflated prices, defective equipment, and cozy relationships between arms manufacturers and government officials. Public outrage mixes with demands for accountability."
 movement_events_te.8.f:0 "The leaked invoice listed body armour sold to the government at three times the manufacturing cost. The company's stock price rose on the news."
 movement_events_te.8.t:0 "War Profiteering Exposed"
 movement_events_te.9.a:0 "Approve the civilian trials"
 movement_events_te.9.b:0 "Military applications only"
 movement_events_te.9.c:0 "Too dangerous - deny the application"
 movement_events_te.9.d:0 "Our nation's leading neuroscientists have formally petitioned the government for approval to begin human trials of brain-computer neural implants. The technology promises to revolutionize how humans interact with machines - enhancing memory, accelerating learning, and enabling direct neural communication. But the ethical implications are staggering, and religious leaders warn of tampering with the divine design of the human mind."
 movement_events_te.9.f:0 "The patient described the sensation as 'a second set of thoughts — quieter, faster, not quite mine.'"
 movement_events_te.9.t:0 "Neural Implant Human Trials"

#
# NUCLEAR_WEAPON_EVENTS
#
 nuclear_weapon_events.1.a:0 "This is nothing less than a monstrous crime against humanity!"
 nuclear_weapon_events.1.b:0 "Retaliate with a single nuclear strike"
 nuclear_weapon_events.1.c:0 "Launch a full nuclear retaliation"
 nuclear_weapon_events.1.d:0 "A nuclear weapon has been detonated in [SCOPE.sState('target_state').GetName] by [SCOPE.sCountry('attacking_country').GetName]!"
 nuclear_weapon_events.1.f:0 "The once bustling heart of [SCOPE.sState('target_state').GetName] now lies in ruins, consumed by fire and radiation. The blast has reduced industrial centers to ash, and an estimated #v [SCOPE.sState('target_state').MakeScope.Var('nuclear_strike_killed_population').GetValue|Kv]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. The survivors speak of a searing light, a deafening roar, and a mushroom cloud that turned day into night. This heinous act of destruction has forever scarred our nation and altered the course of history.\n\nThe world has changed forever."
 nuclear_weapon_events.1.t:0 "A City Erased in [SCOPE.sState('target_state').GetName]"
 nuclear_weapon_events.10.a:0 "We have entered a new era of power and responsibility."
 nuclear_weapon_events.10.a_world_first:0 "We have split the atom. Nothing will ever be the same."
 nuclear_weapon_events.10.d:0 "Our nuclear weapons program has reached its conclusion, and we now possess a stockpile of nuclear weapons, ready to be deployed at a moment's notice. We join the ranks of the world's nuclear powers - a club that grows larger with each passing decade."
 nuclear_weapon_events.10.d_world_first:0 "In a flash of blinding light that turned night into day, we have done what no nation has done before. The test site is a crater of fused glass and irradiated sand, but what matters is the meaning: we are the first - the only - nation on Earth to possess the power of the atom. The age of conventional warfare draws to a close. What stands before us now is a new world, one where a single weapon can erase a city and a single nation holds the keys to annihilation."
 nuclear_weapon_events.10.f:0 "The weapons are stored in reinforced silos across three secret facilities. The launch codes are held by two men and require confirmation from both. The warheads will reach any city on earth within forty minutes. Our generals sleep somewhat better now. Everyone else sleeps worse."
 nuclear_weapon_events.10.f_world_first:0 "#italic Now I am become Death, the destroyer of worlds.#!"
 nuclear_weapon_events.10.t:0 "Our Nuclear Arsenal is Complete"
 nuclear_weapon_events.10.t_world_first:0 "Dawn of the Atomic Age"
 nuclear_weapon_events.11.a:0 "This is nothing less than a monstrous crime against humanity!"
 nuclear_weapon_events.11.b:0 "Respond with a single nuclear strike"
 nuclear_weapon_events.11.c:0 "Launch a full nuclear response"
 nuclear_weapon_events.11.d:0 "A nuclear weapon has been detonated in [SCOPE.sState('target_state').GetName] by [SCOPE.sCountry('target_country').GetName]!"
 nuclear_weapon_events.11.f:0 "The once bustling heart of [SCOPE.sState('target_state').GetName] now lies in ruins, consumed by fire and radiation. The blast has reduced industrial centers to ash, and an estimated #v [SCOPE.sState('target_state').MakeScope.Var('nuclear_strike_killed_population').GetValue|Kv]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. The survivors speak of a searing light, a deafening roar, and a mushroom cloud that turned day into night. This heinous act of destruction has forever scarred our nation and altered the course of history.\n\nThe world has changed forever."
 nuclear_weapon_events.11.t:0 "A City Erased in [SCOPE.sState('target_state').GetName]"
 nuclear_weapon_events.12.a:0 "It is with heavy hearts that we acknowledge the necessity of this dire action."
 nuclear_weapon_events.12.d:0 "We have successfully launched a nuclear strike on [SCOPE.sState('target_state').GetName]!"
 nuclear_weapon_events.12.f:0 "Our retribution has been swift and devastating. The nuclear fire has obliterated the enemy's industrial hubs, crippling their war machine. An estimated #v [SCOPE.sState('target_state').MakeScope.Var('nuclear_strike_killed_population').GetValue|Kv]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. The very ground trembles as a testament to the power we have unleashed. What once stood as a monument to their defiance is now a smoldering ruin. We have shown the world that we will not be cowed, but the echoes of this act will resonate through time.\n\nThe world has changed forever."
 nuclear_weapon_events.12.t:0 "The Fire of Retribution in [SCOPE.sState('target_state').GetName]"
 nuclear_weapon_events.13.a:0 "We have stared into the abyss and emerged unscathed."
 nuclear_weapon_events.13.d:0 "[SCOPE.sCountry('target_country').GetName] has attempted to launch a nuclear strike on [SCOPE.sState('target_state').GetName]! Our defenses have stopped the attack."
 nuclear_weapon_events.13.f:0 "Against all odds, our defensive systems have thwarted a catastrophe of unimaginable scale. The enemy's missile was intercepted before it could rain destruction upon our land. The air is thick with relief, but the specter of what could have been looms large. Our vigilance has saved countless lives, yet we know that such a reprieve may not come again so easily. We must remain ever watchful."
 nuclear_weapon_events.13.t:0 "Nuclear Nightmare Averted"
 nuclear_weapon_events.14.a:0 "We must strengthen our resolve and prepare for what comes next."
 nuclear_weapon_events.14.d:0 "Our nuclear forces attempted to launch a nuclear strike on [SCOPE.sState('target_state').GetName], but their defenses have stopped the attack."
 nuclear_weapon_events.14.f:0 "In a moment fraught with tension, our missiles soared towards their target, only to be intercepted by the enemy’s defenses. The strike that was meant to cripple their resolve has failed, leaving us vulnerable to their retaliation. Our plans have been thwarted, and the opportunity to deal a decisive blow has slipped through our fingers. The silence after the explosion of hopes is deafening, but we must brace for the storm that may soon follow."
 nuclear_weapon_events.14.t:0 "Our Strike Falls Short"
 nuclear_weapon_events.15.a:0 "We fear that this is only the beginning of a dark chapter in human history."
 nuclear_weapon_events.15.d:0 "A foreign war has escalated to a nuclear conflict, with [SCOPE.sCountry('attacking_country').GetName] launching a nuclear strike devestating [SCOPE.sState('target_state').GetName]."
 nuclear_weapon_events.15.f:0 "The world watches in horror as a foreign war spirals out of control, culminating in a nuclear conflict that has forever altered the course of history. The detonation of a nuclear weapon in [SCOPE.sState('target_state').GetName] has left a scar on the earth that will never heal, and an estimated #v [SCOPE.sState('target_state').MakeScope.Var('nuclear_strike_killed_population').GetValue|Kv]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. The specter of nuclear annihilation now looms over the world, casting a shadow that may never be dispelled."
 nuclear_weapon_events.15.t:0 "Foreign War Escalates to Nuclear Conflict"
 nuclear_weapon_events.16.a:0 "We fear that this is only the beginning of a dark chapter in human history."
 nuclear_weapon_events.16.d:0 "A foreign war has escalated to a nuclear conflict, with [SCOPE.sCountry('target_country').GetName] launching a nuclear strike devestating [SCOPE.sState('target_state').GetName]."
 nuclear_weapon_events.16.f:0 "The world watches in horror as a foreign war spirals out of control, culminating in a nuclear conflict that has forever altered the course of history. The detonation of a nuclear weapon in [SCOPE.sState('target_state').GetName] has left a scar on the earth that will never heal, and an estimated #v [SCOPE.sState('target_state').MakeScope.Var('nuclear_strike_killed_population').GetValue|Kv]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. The specter of nuclear annihilation now looms over the world, casting a shadow that may never be dispelled."
 nuclear_weapon_events.16.t:0 "Foreign War Escalates to Nuclear Conflict"
 nuclear_weapon_events.17.a:0 "A grave responsibility has been thrust upon us."
 nuclear_weapon_events.17.b:0 "History will judge us — but we did what we had to."
 nuclear_weapon_events.17.c:0 "Let this be a warning to all who would oppose us."
 nuclear_weapon_events.17.d:0 "For the first time in human history, a nuclear weapon has been used in combat. Our forces have unleashed a destructive power beyond anything the world has ever known. The mushroom cloud that rose over the battlefield marks the dawn of a new and terrible era — one from which there may be no return."
 nuclear_weapon_events.17.f:0 "#italic Now I am become Death, the destroyer of worlds.#!"
 nuclear_weapon_events.17.t:0 "I Am Become Death"
 nuclear_weapon_events.18.a:0 "We must monitor this situation closely."
 nuclear_weapon_events.18.b:0 "We cannot afford to fall behind in this arms race."
 nuclear_weapon_events.18.c:0 "Push for non-proliferation agreements."
 nuclear_weapon_events.18.d:0 "Intelligence reports suggest that [SCOPE.sCountry('proliferating_country').GetName] is making rapid progress in its nuclear weapons program and may be approaching the capability to produce an atomic weapon. The prospect of another nation joining the nuclear club has sent shockwaves through diplomatic circles."
 nuclear_weapon_events.18.f:0 "#italic The genie is out of the bottle, and there is no putting it back.#!"
 nuclear_weapon_events.18.t:0 "Nuclear Proliferation Alert"
 nuclear_weapon_events.19.a:0 "Implement rigorous safety protocols before we continue."
 nuclear_weapon_events.19.b:0 "This was an acceptable risk. Continue the program."
 nuclear_weapon_events.19.c:0 "Suspend research and review the entire program."
 nuclear_weapon_events.19.d:0 "A serious accident at our nuclear research facility has killed several scientists and contaminated part of the laboratory complex. While the incident has been contained, it has exposed significant gaps in our safety protocols and set back our weapons program considerably."
 nuclear_weapon_events.19.f:0 "#italic The investigation report, when it arrives, will be classified at the highest level — but the empty chairs in the laboratory speak volumes.#!"
 nuclear_weapon_events.19.t:0 "Critical Incident"
 nuclear_weapon_events.2.a:0 "It is with heavy hearts that we acknowledge the necessity of this dire action."
 nuclear_weapon_events.2.d:0 "We have successfully launched a nuclear strike on [SCOPE.sState('target_state').GetName]!"
 nuclear_weapon_events.2.f:0 "Our retribution has been swift and devastating. The nuclear fire has obliterated the enemy's industrial hubs, crippling their war machine. An estimated #v [SCOPE.sState('target_state').MakeScope.Var('nuclear_strike_killed_population').GetValue|Kv]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. The very ground trembles as a testament to the power we have unleashed. What once stood as a monument to their defiance is now a smoldering ruin. We have shown the world that we will not be cowed, but the echoes of this act will resonate through time.\n\nThe world has changed forever."
 nuclear_weapon_events.2.t:0 "The Fire of Retribution in [SCOPE.sState('target_state').GetName]"
 nuclear_weapon_events.20.a:0 "Divert resources to pursue civilian applications."
 nuclear_weapon_events.20.b:0 "The weapon is our priority. Stay focused."
 nuclear_weapon_events.20.c:0 "Pursue both tracks — we can afford it."
 nuclear_weapon_events.20.d:0 "Our nuclear weapons researchers have stumbled upon applications of their work that extend far beyond military purposes. Advances in nuclear physics, radiation medicine, and materials science could yield significant civilian benefits — if we are willing to divert resources from the weapons program."
 nuclear_weapon_events.20.f:0 "#italic Sometimes the most important discoveries are the ones you weren't looking for.#!"
 nuclear_weapon_events.20.t:0 "Unexpected Dividends"
 nuclear_weapon_events.21.a:0 "Review our safety procedures immediately."
 nuclear_weapon_events.21.b:0 "Tighten military oversight of the arsenal."
 nuclear_weapon_events.21.c:0 "This must never be spoken of."
 nuclear_weapon_events.21.d:0 "A malfunction in our early warning system triggered a false alarm, briefly indicating an incoming nuclear strike. For several agonizing minutes, our military command stood on the brink of ordering a retaliatory launch before the error was identified. The incident has shaken everyone involved to their core."
 nuclear_weapon_events.21.f:0 "#italic The officer who made the call to wait will never be publicly recognized. But the world owes them everything.#!"
 nuclear_weapon_events.21.t:0 "A Moment of Terror"
 nuclear_weapon_events.22.a:0 "Address their concerns in parliament."
 nuclear_weapon_events.22.b:0 "The program protects us all — they will understand in time."
 nuclear_weapon_events.22.c:0 "Disperse the protests before they grow further."
 nuclear_weapon_events.22.d:0 "A mass movement against nuclear weapons has taken root across our cities. Tens of thousands march through the streets carrying banners depicting mushroom clouds and demanding disarmament. The protesters cut across class and political lines, unified by a primal fear of atomic annihilation."
 nuclear_weapon_events.22.f:0 "#italic They carry photographs of what happened to the cities that were hit. No argument can compete with those images.#!"
 nuclear_weapon_events.22.t:0 "The Mushroom Cloud's Shadow"
 nuclear_weapon_events.3.a:0 "We have stared into the abyss and emerged unscathed."
 nuclear_weapon_events.3.d:0 "[SCOPE.sCountry('attacking_country').GetName] has attempted to launch a nuclear strike on [SCOPE.sState('target_state').GetName]! Our defenses have stopped the attack."
 nuclear_weapon_events.3.f:0 "Against all odds, our defensive systems have thwarted a catastrophe of unimaginable scale. The enemy's missile was intercepted before it could rain destruction upon our land. The air is thick with relief, but the specter of what could have been looms large. Our vigilance has saved countless lives, yet we know that such a reprieve may not come again so easily. We must remain ever watchful."
 nuclear_weapon_events.3.t:0 "Nuclear Nightmare Averted"
 nuclear_weapon_events.4.a:0 "We must strengthen our resolve and prepare for what comes next."
 nuclear_weapon_events.4.d:0 "Our nuclear forces attempted to launch a nuclear strike on [SCOPE.sState('target_state').GetName], but their defenses have stopped the attack."
 nuclear_weapon_events.4.f:0 "In a moment fraught with tension, our missiles soared towards their target, only to be intercepted by the enemy’s defenses. The strike that was meant to cripple their resolve has failed, leaving us vulnerable to their retaliation. Our plans have been thwarted, and the opportunity to deal a decisive blow has slipped through our fingers. The silence after the explosion of hopes is deafening, but we must brace for the storm that may soon follow."
 nuclear_weapon_events.4.t:0 "Our Strike Falls Short"
 nuclear_weapon_events.5.a:0 "Our enemy has crossed a line that cannot be ignored."
 nuclear_weapon_events.5.d:0 "A tactical nuclear strike has been launched on [SCOPE.sState('target_state').GetName] by [SCOPE.sCountry('attacking_country').GetName]!"
 nuclear_weapon_events.5.f:0 "A focused wave of destruction has struck our military installations in [SCOPE.sState('target_state').GetName]. The precision of the attack is undeniable, and our losses are severe. An estimated #v [SCOPE.sState('target_state').MakeScope.Var('tactical_nuclear_strike_killed_population').GetValue]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. Yet, this strike has not only claimed the lives of soldiers but also innocent civilians caught in the crossfire. The landscape is scarred with craters, and the smoke of burning fields blots out the sun. The enemy’s audacity in deploying such a weapon will not go unanswered."
 nuclear_weapon_events.5.t:0 "Tactical Devastation in [SCOPE.sState('target_state').GetName]"
 nuclear_weapon_events.6.a:0 "This is a victory, but it comes at a grave cost."
 nuclear_weapon_events.6.d:0 "We have successfully launched a tactical nuclear strike on [SCOPE.sState('target_state').GetName]!"
 nuclear_weapon_events.6.f:0 "Our tactical nuclear strike has hit its mark with devastating accuracy. Enemy forces have been decimated, and their strategic positions lie in ruins. An estimated #v [SCOPE.sState('target_state').MakeScope.Var('tactical_nuclear_strike_killed_population').GetValue]#! people were killed in the immediate devastation, and that number will surely rise in the coming weeks. While civilian areas were not the primary target, collateral damage has occurred, and the human cost is not lost on us. This action has sent a clear message to our adversaries: we possess the means and the will to defend our nation by any means necessary."
 nuclear_weapon_events.6.t:0 "Tactical Strike Launched"
 nuclear_weapon_events.7.a:0 "We must remain vigilant; the danger is far from over."
 nuclear_weapon_events.7.d:0 "[SCOPE.sCountry('attacking_country').GetName] has attempted to launch a tactical nuclear strike on [SCOPE.sState('target_state').GetName]! Our defenses have stopped the attack."
 nuclear_weapon_events.7.f:0 "Our nation stands shielded today by the prowess of our defensive systems. The enemy’s tactical strike was intercepted, averting what could have been a calamitous loss of life and infrastructure. The sky above remains clear, but the threat lingers in the hearts of all who witnessed the near-catastrophe. The world has come to the brink, but we have pulled back, if only for a moment."
 nuclear_weapon_events.7.t:0 "Tactical Nuclear Attack Prevented"
 nuclear_weapon_events.8.a:0 "This is a setback, but we will find another way."
 nuclear_weapon_events.8.d:0 "Our tactical nuclear forces attempted to launch a strike on [SCOPE.sState('target_state').GetName], but their defenses have stopped the attack."
 nuclear_weapon_events.8.f:0 "Our tactical nuclear strike has been met with failure as the enemy’s defenses proved too strong. The missiles, so carefully prepared and aimed, were intercepted before they could deliver their deadly payload. The momentary silence that follows the failure is filled with dread, as we anticipate what our enemies might do in response. Our plans lie in ruins, but we must not falter."
 nuclear_weapon_events.8.t:0 "Failed Tactical Strike"
 nuclear_weapon_events.9.a:0 "The arms race intensifies."
 nuclear_weapon_events.9.a_world_first:0 "The world will never be the same."
 nuclear_weapon_events.9.d:0 "[SCOPE.sCountry('first_nuke_country').GetName] has successfully completed its nuclear weapons program and now possesses a nuclear arsenal. Another nation joins the growing circle of nuclear powers, and the calculus of deterrence grows ever more complex."
 nuclear_weapon_events.9.d_world_first:0 "[SCOPE.sCountry('first_nuke_country').GetName] has detonated a nuclear weapon - the first in human history. In a single blinding instant, the rules of warfare, diplomacy, and survival have been rewritten. A single nation now holds the power to erase cities from the map. Every government, every general staff, every foreign ministry must reckon with a world where total annihilation is no longer theoretical."
 nuclear_weapon_events.9.f:0 "The proliferation of nuclear weapons continues. As more nations acquire the bomb, the web of deterrence grows more tangled - and more fragile. One miscalculation, one rogue commander, one failed diplomacy could unravel it all."
 nuclear_weapon_events.9.f_world_first:0 "The world has been forever altered as [SCOPE.sCountry('first_nuke_country').GetName] demonstrates its newfound power. The detonation of this nuclear weapon marks the dawn of an era where the threat of total annihilation hangs over every nation. The balance of power is irrevocably changed, and all must now reckon with the devastating potential of this technology. The age of nuclear deterrence has begun, and with it, a shadow has been cast across the future of mankind."
 nuclear_weapon_events.9.t:0 "[SCOPE.sCountry('first_nuke_country').GetName] Joins the Nuclear Club"
 nuclear_weapon_events.9.t_world_first:0 "[SCOPE.sCountry('first_nuke_country').GetName] Unleashes the Atomic Age"

#
# POST_SCARCITY_EVENTS
#
 post_scarcity_events.1.a:0 "Expand UBI programs"
 post_scarcity_events.1.b:0 "Retrain the workforce"
 post_scarcity_events.1.c:0 "Suppress the protests"
 post_scarcity_events.1.d:0 "Automation has made millions of workers redundant. Angry crowds fill the streets, demanding the government address the growing crisis of purposelessness. The old economic order is crumbling."
 post_scarcity_events.1.f:0 "The factory ran three shifts. None of them required a single human worker. The former employees gathered outside the gates each morning out of habit."
 post_scarcity_events.1.t:0 "Mass Unemployment Protests"
 post_scarcity_events.2.a:0 "Fund arts and culture"
 post_scarcity_events.2.b:0 "Mandatory civic service"
 post_scarcity_events.2.c:0 "People will figure it out"
 post_scarcity_events.2.d:0 "With basic needs met and work no longer necessary, a crisis of meaning sweeps through society. Depression and aimlessness rise as people struggle to find purpose in a world where labor is obsolete."
 post_scarcity_events.2.f:0 "The man sat in a comfortable apartment — rent paid, food delivered, nothing required of him — and stared at the ceiling until noon."
 post_scarcity_events.2.t:0 "The Meaning Crisis"
 post_scarcity_events.200.a:0 "A new chapter in human civilization."
 post_scarcity_events.200.d:0 "[ROOT.GetCountry.GetName] has achieved what was once thought impossible: a post-scarcity economy. Automation and advanced production have rendered material want a thing of the past for most citizens."
 post_scarcity_events.200.f:0 "#italic From each according to their ability, to each according to their needs — at last, not a slogan but a description.#!"
 post_scarcity_events.200.t:0 "Beyond Scarcity"
 post_scarcity_events.3.a:0 "Automate government"
 post_scarcity_events.3.b:0 "Hybrid AI-human administration"
 post_scarcity_events.3.c:0 "Keep humans in charge"
 post_scarcity_events.3.d:0 "AI systems have advanced to the point where they can replace human bureaucrats entirely. Government functions from tax collection to urban planning could be handled by algorithms more efficiently than any human administrator. But many question the wisdom of surrendering governance to machines."
 post_scarcity_events.3.f:0 "The permit was approved in eleven seconds. The applicant had expected a six-week wait. He wasn't sure whether to be relieved or unsettled."
 post_scarcity_events.3.t:0 "AI Replaces Bureaucrats"
 post_scarcity_events.4.a:0 "Crack down and expand safety net"
 post_scarcity_events.4.b:0 "Address root causes"
 post_scarcity_events.4.c:0 "Heavy-handed suppression"
 post_scarcity_events.4.d:0 "A radical anti-technology movement has attacked automation infrastructure, destroying factories and data centers. Calling themselves the \"New Luddites,\" they argue that machines are stealing human purpose and dignity. Their violence has divided public opinion."
 post_scarcity_events.4.f:0 "They smashed the assembly line with crowbars and set the server room on fire. The company had the replacement units operational within a week."
 post_scarcity_events.4.t:0 "Neo-Luddite Terrorism"
 post_scarcity_events.5.a:0 "Fund a national arts program"
 post_scarcity_events.5.b:0 "Let creativity flourish organically"
 post_scarcity_events.5.c:0 "Channel into productive output"
 post_scarcity_events.5.d:0 "Freed from the necessity of labor, citizens are pouring their energy into creative pursuits. A cultural renaissance is blossoming: art, music, literature, and philosophy flourish as humanity explores what it means to live beyond scarcity."
 post_scarcity_events.5.f:0 "With nothing to earn and nowhere to be, she picked up a paintbrush for the first time in thirty years."
 post_scarcity_events.5.t:0 "Art Renaissance"

#
# RELIGIOUS_REVIVAL_EVENTS
#
 religious_revival_events.1.a:0 "Embrace the religious vote."
 religious_revival_events.1.b:0 "A measured engagement with faith leaders."
 religious_revival_events.1.c:0 "Keep politics and religion separate."
 religious_revival_events.1.d:0 "A coalition of religious leaders has begun organizing politically through broadcast media. Charismatic preachers are rallying the faithful, demanding that government policy reflect their moral vision. The [SCOPE.gsInterestGroup('devout_ig').GetName] see an unprecedented opportunity to translate spiritual authority into political power."
 religious_revival_events.1.d_dharmic:0 "Swamis and gurus have taken to the airwaves, channeling the energy of Hindu revivalism into a mass political movement. Rallies blend religious devotion with national pride, and millions tune in to hear calls for government aligned with dharmic values. The [SCOPE.gsInterestGroup('devout_ig').GetName] see a once-in-a-generation chance to reshape national politics."
 religious_revival_events.1.d_islamic:0 "A coalition of Islamic scholars and preachers has discovered the power of broadcast media, using radio and television to reach millions of households. Their message blends Quranic authority with political demands, calling the faithful to organize and hold their government accountable to Islamic values. The [SCOPE.gsInterestGroup('devout_ig').GetName] see an unprecedented opportunity."
 religious_revival_events.1.f:0 "\"They told us to stay out of politics. But politics never stayed out of the house of worship.\"\n\n\"Every household with a television is a congregation waiting to be called.\""
 religious_revival_events.1.f_dharmic:0 "\"For decades they told us that faith was a private matter. Now the private has become the political.\"\n\n\"Every ashram, every temple, every home where the Gita is read — all of them are now voting blocs.\""
 religious_revival_events.1.f_islamic:0 "\"They told us the mosque was for prayer, not politics. But when the ummah suffers, silence is not piety — it is complicity.\"\n\n\"Every household with a radio is a congregation waiting for the call.\""
 religious_revival_events.1.t:0 "The Moral Majority"
 religious_revival_events.2.a:0 "Give them the airwaves."
 religious_revival_events.2.b:0 "Regulate religious broadcasting."
 religious_revival_events.2.c:0 "Tax these religious institutions like businesses."
 religious_revival_events.2.d:0 "A new breed of religious leader has emerged, wielding the tools of popular culture to build congregations of staggering size. Megachurches offer spectacle, community, and purpose — their pastors command audiences that dwarf any political party. The prosperity gospel promises that faith and fortune walk hand in hand."
 religious_revival_events.2.d_dharmic:0 "A new wave of charismatic gurus has emerged, blending ancient wisdom with modern spectacle. Massive ashrams draw tens of thousands, their leaders commanding devotion that rivals any political figure. Television broadcasts carry their darshan to every corner of the nation, and the money flows in — for temples, hospitals, and the gurus themselves."
 religious_revival_events.2.d_islamic:0 "A new generation of Islamic televangelists has emerged, blending scholarly authority with showmanship. Satellite channels broadcast popular preachers into millions of homes, their charismatic sermons drawing massive followings. These modern da'wa movements build communities that rival political parties in size and devotion."
 religious_revival_events.2.f:0 "\"Sunday morning used to be a quiet affair. Now there are lights, cameras, a band, and ten thousand souls swaying in unison.\"\n\n\"Critics call it a circus. The faithful call it a miracle.\""
 religious_revival_events.2.f_dharmic:0 "\"My grandfather sat in meditation. I sit in an arena with fifty thousand others, watching the guru on a screen the size of a building.\"\n\n\"Critics call it a personality cult. The devotees call it a darshan for the modern age.\""
 religious_revival_events.2.f_islamic:0 "\"My grandfather listened to the khutba in a mosque of fifty men. I watch a preacher who speaks to fifty million.\"\n\n\"The scholars complain about entertainment. The people complain that the scholars never made them feel anything.\""
 religious_revival_events.2.t:0 "The Electronic Pulpit"
 religious_revival_events.2.t_islamic:0 "The Satellite Minbar"
 religious_revival_events.3.a:0 "The faithful speak for the oppressed."
 religious_revival_events.3.b:0 "Channel this energy constructively."
 religious_revival_events.3.c:0 "Religion should stay out of politics."
 religious_revival_events.3.d:0 "A movement has emerged among religious leaders who argue that the faithful have a duty to champion the poor and oppressed. Drawing on scripture and social theory alike, they are organizing communities into a powerful force for social change. The [SCOPE.gsInterestGroup('devout_ig').GetName] are galvanized, but the establishment views the movement with alarm."
 religious_revival_events.3.d_atheism:0 "Despite the state's official atheism, underground religious communities have become a focal point for social justice organizing. Unable to worship openly, the faithful channel their energy into mutual aid networks and quiet resistance against inequality. The very repression meant to silence them has forged an unbreakable bond between faith and the cause of the oppressed."
 religious_revival_events.3.d_dharmic:0 "A movement of socially engaged monks, swamis, and lay activists is challenging the caste hierarchies that have long defined the faithful. Drawing on the radical egalitarianism found in devotional traditions and the Dalit theology of liberation, they argue that true dharma demands justice for the lowest castes. The [SCOPE.gsInterestGroup('devout_ig').GetName] are galvanized by their message."
 religious_revival_events.3.d_islamic:0 "A movement of progressive Islamic scholars and activists is arguing that the Quran's emphasis on justice, zakat, and the rights of the poor demands political action. Drawing on principles of Islamic economics and social welfare, they organize the faithful into a powerful force for the dispossessed. The [SCOPE.gsInterestGroup('devout_ig').GetName] are energized, but the wealthy grow nervous."
 religious_revival_events.3.f:0 "\"When I gave food to the poor, they called me a saint. When I asked why the poor have no food, they called me a communist.\"\n\n\"The text is clear. The question is whether we have the courage to live it.\""
 religious_revival_events.3.f_atheism:0 "\"They banned our books, shuttered our temples, and called us relics of the past. But they could not ban the hunger in a child's belly or the injustice in a worker's life.\"\n\n\"We meet in basements now. And the prayers have become plans.\""
 religious_revival_events.3.f_dharmic:0 "\"The Vedas say that in the eyes of the divine there is no high and no low. We have forgotten this for too long.\"\n\n\"When Ambedkar said that social justice was dharma, they dismissed him. Now millions stand behind his words.\""
 religious_revival_events.3.f_islamic:0 "\"The Prophet, peace be upon him, said: 'He is not a believer whose stomach is filled while the neighbor beside him goes hungry.'\"\n\n\"They call us radicals. We call ourselves Muslims who have read the Book.\""
 religious_revival_events.3.t:0 "The Preferential Option"
 religious_revival_events.3.t_atheism:0 "Faith in the Underground"
 religious_revival_events.3.t_dharmic:0 "Dharma and Justice"
 religious_revival_events.3.t_islamic:0 "Justice of the Faithful"
 religious_revival_events.4.a:0 "Our nation's soul is bound to its faith."
 religious_revival_events.4.b:0 "Civic nationalism, beyond creed."
 religious_revival_events.4.c:0 "We are a secular republic."
 religious_revival_events.4.d:0 "As the forces of globalization erode traditional identities, a powerful movement is taking shape that fuses national identity with religious identity. The [SCOPE.gsInterestGroup('devout_ig').GetName] claim that the soul of the nation is inseparable from its faith and demand that the state reflect this truth in law and policy."
 religious_revival_events.4.d_dharmic:0 "As globalization erodes traditional identities, a powerful Hindutva movement is fusing Hindu identity with national identity. Its leaders claim that the nation's civilization is inseparable from its dharmic heritage and demand that state policy reflect Hindu values. Foreign religions are cast as alien intrusions. The [SCOPE.gsInterestGroup('devout_ig').GetName] march behind saffron banners."
 religious_revival_events.4.d_islamic:0 "As globalization threatens to dissolve the bonds of the ummah, a powerful Islamist movement argues that the nation must be grounded in Sharia. Its leaders proclaim that secular governance is a Western imposition, and that only Islamic law can provide justice and order. The [SCOPE.gsInterestGroup('devout_ig').GetName] demand that the state become an instrument of the faith."
 religious_revival_events.4.d_jewish:0 "As globalization erodes traditional identities, a powerful religious Zionist movement is fusing Jewish identity with national destiny. Its leaders argue that the state is the fulfillment of divine promise and that territorial maximalism is a sacred duty. The [SCOPE.gsInterestGroup('devout_ig').GetName] demand that religious law shape the character of the nation."
 religious_revival_events.4.f:0 "\"You cannot love this country and hate what made it. Our faith is the soil from which the nation grew.\"\n\n\"They want a homeland, not a hotel. A people, not a marketplace.\""
 religious_revival_events.4.f_dharmic:0 "\"This land is not just territory. It is sacred geography — every river, every mountain, every temple is an expression of the divine.\"\n\n\"Those who call our civilization backward have never read a page of it.\""
 religious_revival_events.4.f_islamic:0 "\"Sovereignty belongs to God alone. The laws of men are shadows; the Sharia is the light.\"\n\n\"They offered us democracy. We asked: whose values does it serve?\""
 religious_revival_events.4.t:0 "One Nation Under God"
 religious_revival_events.4.t_dharmic:0 "One Civilization, One Dharma"
 religious_revival_events.4.t_islamic:0 "One Ummah, One Law"
 religious_revival_events.4.t_jewish:0 "The Promised Land"
 religious_revival_events.5.a:0 "Let faith flourish in the digital age."
 religious_revival_events.5.b:0 "Moderate the online message."
 religious_revival_events.5.c:0 "Monitor for extremism."
 religious_revival_events.5.d:0 "Religious communities have discovered the power of social media, streaming platforms, and online organizing. Sermons go viral, online prayer groups span continents, and a new generation of digital preachers commands millions of followers. The [SCOPE.gsInterestGroup('devout_ig').GetName] are reaching populations that traditional institutions could never touch."
 religious_revival_events.5.d_dharmic:0 "Hindu spiritual leaders have mastered the art of digital outreach. WhatsApp prayer groups, YouTube satsangs, and viral clips of charismatic gurus have created a decentralized spiritual revolution. Devotional content is now the most shared category on social media, and the [SCOPE.gsInterestGroup('devout_ig').GetName] are building vast networks of followers entirely online."
 religious_revival_events.5.d_islamic:0 "A new generation of Islamic scholars and preachers has taken to social media with extraordinary skill. YouTube lectures, Instagram dawah, and TikTok clips of Quran recitation draw millions of followers. Online communities form around charismatic digital muftis, and the [SCOPE.gsInterestGroup('devout_ig').GetName] find that the internet amplifies their message far beyond the mosque."
 religious_revival_events.5.f:0 "The sermon got forty thousand views overnight. The local parish can't fill twenty seats on a Sunday. The bishop is not sure whether this counts as a revival or something else entirely."
 religious_revival_events.5.f_islamic:0 "\"The algorithm does not distinguish between the sacred and the profane. It only knows engagement.\"\n\n\"The lecture got forty thousand views overnight. The local masjid cannot fill twenty seats for Fajr.\""
 religious_revival_events.5.t:0 "The Digital Pulpit"
 religious_revival_events.6.a:0 "Stand with tradition."
 religious_revival_events.6.b:0 "Seek theological reform."
 religious_revival_events.6.c:0 "The march of progress continues."
 religious_revival_events.6.d:0 "The rapid pace of social liberalization has provoked a powerful religious backlash. Conservative religious groups are mobilizing with unprecedented ferocity, framing the struggle as nothing less than a battle for the soul of society. The [SCOPE.gsInterestGroup('devout_ig').GetName] demand the government stand with tradition."
 religious_revival_events.6.d_dharmic:0 "The spread of Western social values has provoked a fierce backlash among Hindu traditionalists. Activists and sadhus frame the struggle as one of civilizational survival — dharma against adharma, tradition against alien corruption. Massive rallies and social media campaigns demand that the government enshrine traditional values. The [SCOPE.gsInterestGroup('devout_ig').GetName] will brook no compromise."
 religious_revival_events.6.d_islamic:0 "The rapid spread of Western social values has provoked a powerful Islamist backlash. Conservative scholars issue fatwas, preachers thunder from the minbar, and grassroots organizations mobilize with ferocious discipline. They frame the struggle as a defense of the family and the divine order against moral decay. The [SCOPE.gsInterestGroup('devout_ig').GetName] will not yield."
 religious_revival_events.6.f:0 "\"They call it progress. We call it the unraveling of everything that matters.\"\n\n\"The family is the bedrock. Remove it, and what remains is only rubble and confusion.\""
 religious_revival_events.6.f_dharmic:0 "\"They bring their foreign ideas and call our culture backward. We have endured for five thousand years. Let us see how long their experiment lasts.\"\n\n\"Dharma is not a preference. It is the order that sustains the universe.\""
 religious_revival_events.6.f_islamic:0 "\"They call it liberation. We call it fitna — the trial that tears the ummah apart.\"\n\n\"God did not create the family so that committees could redesign it.\""
 religious_revival_events.6.t:0 "The Culture War"
 religious_revival_events.7.a:0 "Fund faith-based institutions."
 religious_revival_events.7.b:0 "Partner with faith organizations."
 religious_revival_events.7.c:0 "Expand secular state welfare instead."
 religious_revival_events.7.d:0 "Religious organizations across the country are expanding their welfare programs at a remarkable rate. Soup kitchens, hospitals, schools, and shelters run by the faithful are filling gaps that the state cannot or will not address. The [SCOPE.gsInterestGroup('devout_ig').GetName] present this as proof of their indispensable role in society."
 religious_revival_events.7.d_atheism:0 "Despite official state atheism, underground religious communities have quietly built an extensive welfare network. Church basements, hidden temple kitchens, and informal faith groups provide food, medicine, and education to those the state has failed. The authorities face an awkward truth: suppress these networks and the poor suffer; tolerate them and risk a religious revival."
 religious_revival_events.7.d_dharmic:0 "Hindu religious organizations are scaling their charitable operations to an unprecedented degree. Massive temple-run hospitals, free meal programs feeding hundreds of thousands daily, and ashram-based schools have made the faithful indispensable to social welfare. The [SCOPE.gsInterestGroup('devout_ig').GetName] argue that seva — selfless service — is what holds the nation together."
 religious_revival_events.7.d_islamic:0 "Islamic charitable organizations — powered by the obligatory zakat and voluntary sadaqah of the faithful — are building a vast welfare infrastructure. Hospitals, orphanages, schools, and food banks run by religious foundations now rival state services in scale and efficiency. The [SCOPE.gsInterestGroup('devout_ig').GetName] argue that Islamic charity is not just generosity but a divine commandment."
 religious_revival_events.7.f:0 "\"The bureaucrats file papers while people starve. The faithful simply cook.\"\n\n\"Every meal served, every wound dressed, every child taught — these are the real sermons.\""
 religious_revival_events.7.f_atheism:0 "\"They banned us from the public square. So we built the public square underground, one bowl of soup at a time.\"\n\n\"The party feeds the ideology. The faithful feed the people.\""
 religious_revival_events.7.f_islamic:0 "\"Zakat is not charity. It is a debt the wealthy owe to God, collected through the hands of the poor.\"\n\n\"The state counts its statistics. The faithful count the mouths they have fed.\""
 religious_revival_events.7.t:0 "The Faithful Hand"

#
# REPEATABLE_EVENTS
#
 repeatable_events.10.a:0 "Hold an open debate"
 repeatable_events.10.b:0 "Stage-manage the broadcast"
 repeatable_events.10.c:0 "Run microtargeted ads"
 repeatable_events.10.d_neural:0 "A live neural town hall streams not just words but sentiment. Waves of approval and doubt ripple across the nation in real time, and campaign tacticians wonder where persuasion ends and manipulation begins."
 repeatable_events.10.d_tv:0 "With the campaign entering its final weeks, party leaders agree to a nationally broadcast debate. Editors haggle over formats; candidates rehearse answers and smiles. The audience will be vast-and so will the stakes."
 repeatable_events.10.d_vr:0 "Mixed-reality auditoriums stitch together living rooms and town squares into a single stage. The spectacle promises unmatched access, but filters, avatars, and deepfakes make voters question what they actually saw."
 repeatable_events.10.f:0 "The candidate studied herself in the dressing-room mirror. 'How do I look?'\n\n'Confident,' her advisor said. 'Approachable. Electable.'\n\n'And honest?'\n\nA pause. 'Let's not overreach. Just remember: answer the question you wish they'd asked, not the one they did. Smile when the other fellow talks. Never look at the clock.'\n\nShe straightened her collar. 'What if they ask about the tariff numbers?'\n\n'Nobody remembers numbers. They remember how you made them feel.'"
 repeatable_events.10.t:0 "The Debate of the Century"
 repeatable_events.100.a:0 "Fast-track new capacity"
 repeatable_events.100.b:0 "Mandate safety audits"
 repeatable_events.100.c:0 "Prioritize strategic workloads"
 repeatable_events.100.d_ai:0 "Forecasting engines, design suites, and automated logistics all want another rack online yesterday. Power, cooling, and talent are starting to pinch. We can build faster, inspect harder, or simply decide who gets priority."
 repeatable_events.100.d_quantum:0 "Quantum cores have not ended the hunger for compute; they have only taught it new appetites. Ministries, firms, and laboratories queue for time on machines that are never idle enough."
 repeatable_events.100.f:0 "The data center hummed like a cathedral organ. Rows of machines blinked in patient sequence, generating heat enough to warm a small town - which, in fact, they did.\n\n'We're at ninety-six percent capacity,' the facility manager said. 'The defense ministry wants twenty percent more. The weather service wants fifteen. Research wants thirty.'\n\n'That's sixty-five percent we don't have.'\n\n'Correct. And every one of them says their need is the most critical.'\n\nShe smiled thinly. 'Welcome to the future. It runs on the same thing as the past: not enough.'"
 repeatable_events.100.t:0 "Compute Cluster Crunch"
 repeatable_events.20.a:0 "Subsidize emergency freight"
 repeatable_events.20.b:0 "Prioritize key inputs"
 repeatable_events.20.c:0 "Fast-track port upgrades"
 repeatable_events.20.d:0 "A tangle of port closures, container shortages, and bad luck has jammed critical imports. Producers plead for inputs; retailers for stock; the public for patience. We can pay to push cargo through, starve some sectors to feed others, or pour concrete fast."
 repeatable_events.20.dd:0 "Activate ministry logistics coordination"
 repeatable_events.20.f:0 "'Where is my steel?' the construction foreman asked, for the third time that week.\n\nThe shipping clerk pointed at a map covered in red pins. 'Your steel is behind forty thousand containers of consumer electronics that are behind a broken crane that is behind a labor dispute that is behind a trade policy nobody remembers voting for.'\n\n'So when do I get it?'\n\n'When the world sorts itself out.' The clerk shrugged. 'I would not hold your breath.'"
 repeatable_events.20.t:0 "Supply Chain Snarl"
 repeatable_events.30.a:0 "Lay off workers and ramp output"
 repeatable_events.30.b:0 "Retrain and redeploy"
 repeatable_events.30.c:0 "Adopt worker co-pilots"
 repeatable_events.30.d_ai:0 "A new scheduling system eats overtime, errors, and egos. Managers eye the balance sheet; workers eye the exit. We can chase the gains, soften the blow, or try a different bargain entirely."
 repeatable_events.30.d_robotics:0 "Machines master the night shift. Output surges, but the rumble on the shop floor is not just from motors. Layoffs promise cheaper goods and dearer politics."
 repeatable_events.30.f:0 "The machinist watched the new arm swing through its arc - faster than any human hand, steadier, tireless.\n\n'Beautiful, isn't it?' the engineer said.\n\n'It's doing my job.'\n\n'It's doing the dangerous part of your job. You'll supervise.'\n\nThe machinist folded his arms. 'Supervise. That's what they told the weavers when the power loom arrived. Supervise until the day you're not needed to supervise anymore.'\n\nThe arm swung again. It did not care about the conversation."
 repeatable_events.30.t:0 "Automation Shock"
 repeatable_events.40.a:0 "Ignore it"
 repeatable_events.40.b:0 "Brief the public"
 repeatable_events.40.c:0 "Enforce platform moderation"
 repeatable_events.40.d:0 "Deploy state media control"
 repeatable_events.40.d_mass:0 "Headlines thunder, panels chatter, and petitions circulate. Moralists call for bans; reformers for nuance; advertisers for a bigger buy. It will blow over-until it doesn’t."
 repeatable_events.40.d_neural:0 "Sentiment storms sweep across neural channels like weather fronts. A rumor with the right shape outruns any correction. There is calm to be found, but not by accident."
 repeatable_events.40.d_social:0 "A meme becomes a movement before dawn. Boycotts bloom, counter-boycotts answer, and every feed is a frontline. We can ride it out, speak plainly, or referee the brawl."
 repeatable_events.40.f:0 "The press secretary dropped the morning clippings on the minister's desk. Every headline screamed.\n\n'It's everywhere,' she said. 'The opposition is calling for a statement by noon.'\n\n'It'll blow over.'\n\n'It might. Or it might be the thing that doesn't. You won't know until it's too late.' She tapped the top headline. 'The public doesn't want an explanation. They want someone to look like they're in charge.'\n\n'And if I say the wrong thing?'\n\n'Then tomorrow's headlines will be about you.'"
 repeatable_events.40.t:0 "Media Panic of the Week"
 repeatable_events.50.a:0 "Settle quietly and patch systems"
 repeatable_events.50.b:0 "Launch public forensics"
 repeatable_events.50.c:0 "Impose emergency security standards"
 repeatable_events.50.d:0 "Deploy intelligence-assisted forensics"
 repeatable_events.50.d_cyber:0 "Intruders slipped past old defenses and wrote their demands in our ledgers. We can settle and patch, name and shame, or drag the whole sector up to a higher standard-ready or not."
 repeatable_events.50.d_quantum:0 "Old ciphers crack under new math. Banks blink, ministries stall, and citizens wonder whether numbers still mean what they did yesterday."
 repeatable_events.50.f:0 "The systems administrator stared at lines of code scrolling across her terminal at three in the morning. The coffee had gone cold an hour ago.\n\n'They were inside for six weeks,' she told the director. 'Maybe longer.'\n\n'What did they take?'\n\n'Everything they could read. Which, given our permissions structure, was almost everything.'\n\n'Can we fix it?'\n\n'We can rebuild. But the data is already out there. You can't un-ring a bell.'"
 repeatable_events.50.t:0 "Network Compromised"
 repeatable_events.60.a:0 "Auction fresh bandwidth"
 repeatable_events.60.b:0 "Reserve a public service grid"
 repeatable_events.60.c:0 "Lease foreign relay capacity"
 repeatable_events.60.d_quantum:0 "Quantum relays promise clarity, but their rollout has turned every old allocation fight into a jurisdictional knife-fight. Bandwidth is power, and everyone knows it."
 repeatable_events.60.d_sat:0 "Relay traffic, emergency services, and civilian networks are all crowding the same invisible lanes. Lobbyists demand auctions, planners demand order, and foreign carriers smell opportunity."
 repeatable_events.60.f:0 "'We need the band,' the emergency services chief said.\n\n'We need the band,' the telecommunications executive said.\n\n'We need the band,' the military attaché said.\n\nThe spectrum regulator looked at the three of them and then at the allocation chart, which had more colors than a cathedral window and not a single gap.\n\n'Gentlemen,' she said, 'you cannot all have the same invisible thing. Someone is going to be unhappy. My job is to decide who.'"
 repeatable_events.60.t:0 "Spectrum Crunch"
 repeatable_events.70.a:0 "Perform debris-avoidance maneuvers"
 repeatable_events.70.b:0 "Conduct a laser sweep"
 repeatable_events.70.c:0 "Press on and accept risk"
 repeatable_events.70.d:0 "Telemetry flags a chain of near-misses. Operators request maneuver windows; the military warns that standing down risks coverage. Clearing the lanes will cost, but pressing on may cost more."
 repeatable_events.70.f:0 "The tracking officer circled three objects on the display. 'These will pass within two hundred meters of our relay platform in forty-seven hours.'\n\n'Can we move?'\n\n'We can. It costs fuel we budgeted for next quarter, and we lose coverage over the eastern seaboard for six hours.'\n\n'And if we don't move?'\n\n'Then we trust that a bolt traveling at eight kilometers per second misses a solar panel the size of a tennis court.' She set down her pen. 'I would move.'"
 repeatable_events.70.t:0 "Orbital Conjunction Alert"
 repeatable_events.80.a:0 "Draw from reserves"
 repeatable_events.80.b:0 "Order rolling blackouts"
 repeatable_events.80.c:0 "Import power from neighbours"
 repeatable_events.80.d:0 "Micrometeors, maintenance, and misfortune have dimmed orbital arrays. Demand does not dim with them. We can burn reserves, black out blocks, or buy from neighbours at a premium."
 repeatable_events.80.f:0 "The grid operator watched the output gauge drop and reached for the telephone.\n\n'Array seven is offline,' she reported. 'Micrometeorite damage to the collector surface. Repair window: three weeks.'\n\n'Three weeks? We promised the manufacturing district uninterrupted supply.'\n\n'Yes. And the universe promised nothing.' She pulled up the reserve figures. 'We have four days of buffer. After that, someone goes dark. Your call who.'"
 repeatable_events.80.t:0 "Space Power Curtailment"
 repeatable_events.90.a:0 "Subsidize priority output"
 repeatable_events.90.b:0 "Open a patent pool"
 repeatable_events.90.c:0 "Ration premium allotments"
 repeatable_events.90.d_orbital:0 "Orbital manufacturing has made miracles routine and shortages catastrophic. A delay in specialized feedstock now ripples from clean rooms to launch windows."
 repeatable_events.90.d_quantum:0 "Labs and fabs are all asking for the same rare substrates, and the supply chain cannot stretch that far without snapping. Production planners want subsidies; researchers want openness; everyone else wants first claim."
 repeatable_events.90.f:0 "The procurement officer spread his hands. 'There are three suppliers on the planet. One is in a country that hates us, one is six months behind on deliveries, and one just doubled their price.'\n\n'Can we substitute?'\n\n'If you'd like your quantum processors to work slightly less well than an abacus, certainly.'\n\nThe minister pinched the bridge of his nose. 'How did we build an entire industry on a mineral we can't reliably obtain?'\n\n'The same way we always do, sir. Optimistically.'"
 repeatable_events.90.t:0 "Quantum Materials Bottleneck"

#
# SECULAR_EVENTS
#
 secular_events.1.a:0 "Investigate religious institutions"
 secular_events.1.b:0 "Help cover it up"
 secular_events.1.c:0 "Use it to push secularism"
 secular_events.1.d:0 "A major religious institution has been rocked by a corruption scandal. Embezzlement, hypocrisy, and cover-ups have shaken public faith in organized religion. The media frenzy shows no signs of abating."
 secular_events.1.f:0 "The accountant's testimony lasted four hours. The bishop's lasted ten minutes, most of it spent declining to answer."
 secular_events.1.t:0 "The Scandal"
 secular_events.100.a:0 "Accept the revival"
 secular_events.100.b:0 "Resist the tide"
 secular_events.100.desc:0 "Against all expectations, organized religion has experienced a powerful revival. The Ministry of Religion has been strengthened, and the devout have reasserted their influence over public life."
 secular_events.100.f:0 "The pews were full again for the first time in a decade. The minister was not sure whether to be grateful or worried."
 secular_events.100.t:0 "Religious Revivalism"
 secular_events.2.a:0 "Dismiss the panic"
 secular_events.2.b:0 "Engage with their concerns"
 secular_events.2.c:0 "Crack down on religious extremism"
 secular_events.2.d:0 "The [SCOPE.gsInterestGroup('devout_ig').GetName] have launched a moral panic, claiming that the decline of religion is destroying the fabric of society. They demand a return to traditional values and increased state support for religious institutions."
 secular_events.2.f:0 "The pamphlet was distributed to every household in the district, warning of moral collapse. Attendance at services rose briefly, then fell again."
 secular_events.2.t:0 "Moral Panic"
 secular_events.200.a:0 "Reason prevails."
 secular_events.200.d:0 "The gradual decline of religious influence in [ROOT.GetCountry.GetAdjective] public life has culminated in a firmly secular state. Religious institutions have been relegated to the private sphere, with governance now guided by reason and evidence."
 secular_events.200.f:0 "#italic The pulpits empty as the lecture halls fill.#!"
 secular_events.200.t:0 "The Secular State"
 secular_events.3.a:0 "Embrace spiritual diversity"
 secular_events.3.b:0 "Regulate new religious movements"
 secular_events.3.c:0 "Crack down on cults"
 secular_events.3.d:0 "As organized religion declines, new spiritual movements are filling the void. Meditation centers, neo-pagan groups, and eclectic spiritual communities are proliferating. The established religious institutions view them with alarm, while secularists see them as harmless."
 secular_events.3.f:0 "The meditation centre opened where the church had been. The landlord said the rent was better."
 secular_events.3.t:0 "New Age Spirituality"
 secular_events.4.a:0 "Support disestablishment"
 secular_events.4.b:0 "Defend the state church"
 secular_events.4.c:0 "Form a committee to study the question"
 secular_events.4.d:0 "A growing movement demands the formal separation of church and state. The [SCOPE.gsInterestGroup('devout_ig').GetName] fiercely defend the current arrangement, but reformers argue that a modern nation cannot have an official religion."
 secular_events.4.f:0 "The petition gathered twelve thousand signatures in a week. The archbishop called it 'a campaign against faith itself.' The petitioners called it bookkeeping."
 secular_events.4.t:0 "The State Religion Debate"
 secular_events.5.a:0 "Support the dialogue initiative"
 secular_events.5.b:0 "Dismiss as irrelevant"
 secular_events.5.c:0 "Use to push secular values"
 secular_events.5.d:0 "An interfaith dialogue initiative has brought together religious leaders of all faiths to find common ground. The initiative aims to reduce sectarian tensions and build mutual understanding in a rapidly secularizing society."
 secular_events.5.f:0 "The rabbi, the imam, and the pastor agreed on very little. They agreed to keep talking. It was enough to fill a conference hall."
 secular_events.5.t:0 "Interfaith Dialogue"

#
# SOCIAL_TENSIONS_EVENTS
#
 social_tensions_events.1.a:0 "Launch a security crackdown"
 social_tensions_events.1.b:0 "Rally national resilience"
 social_tensions_events.1.c:0 "Expand the surveillance net"
 social_tensions_events.1.d:0 "Intelligence-led preemption"
 social_tensions_events.1.d_base:0 "An explosion rips through a crowded market district, leaving rubble and screaming in its wake. The attackers are quickly identified as radicals with a poisonous ideology and access to modern explosives. Citizens demand action, but what kind?"
 social_tensions_events.1.d_cyber:0 "The attack combines physical violence with a devastating cyberattack on emergency services. As first responders struggle with jammed communications, the death toll climbs. The perpetrators broadcast their manifesto through hijacked networks."
 social_tensions_events.1.d_modern:0 "A coordinated bombing attack targets public transportation during rush hour. Footage spreads within minutes, sowing panic far beyond the blast radius. Intelligence agencies scramble to trace the network before the next cell acts."
 social_tensions_events.1.f:0 "The café owner swept glass from the counter with slow, mechanical strokes. Three hours ago, the windows had been intact. Three hours ago, the street had been full of people going about their lives.\n\n'Did you see who did it?' the constable asked, notebook in hand.\n\n'I saw a crowd,' the café owner said. 'By the time the first brick came through, I was under the counter.'\n\nThe constable wrote something down. It would not lead to an arrest."
 social_tensions_events.1.t:0 "Terror Strikes the Homeland"
 social_tensions_events.10.a:0 "Let the money flow"
 social_tensions_events.10.b:0 "Launch a grassroots counter-campaign"
 social_tensions_events.10.d:0 "With no effective limits on campaign donations, wealthy industrialists are pouring unprecedented sums into the election. Slick advertisements dominate every medium, and candidates without deep-pocketed backers find themselves drowned out. The election may be free, but it is hardly fair."
 social_tensions_events.10.f:0 "The independent candidate sat in his modest campaign office, surrounded by hand-painted signs and volunteer lists. Across the street, his opponent's headquarters occupied three floors, staffed by professionals.\n\n'They've bought every advertising space in the district,' his campaign manager said. 'We can't compete.'\n\n'We have the better argument.'\n\n'Yes. And they have the better printer.' She closed her notebook. 'Arguments don't win elections. Visibility does. And visibility costs money we don't have.'"
 social_tensions_events.10.t:0 "Big Money Floods the Election"
 social_tensions_events.11.a:0 "Welcome the newcomers"
 social_tensions_events.11.b:0 "Restrict the flow"
 social_tensions_events.11.c:0 "Fund integration programs"
 social_tensions_events.11.d_base:0 "A surge of newcomers from distant lands has strained public services in our cities. Schools overflow, hospitals queue endlessly, and established residents complain that their neighborhoods are unrecognizable. The immigrants themselves face suspicion and hostility even as they seek a better life."
 social_tensions_events.11.d_modern:0 "Global economic disruption has sent waves of migrants toward our borders. Social media amplifies both heartbreaking stories of refugees and alarmist narratives about cultural invasion. The reality, as always, is more complicated than either side admits."
 social_tensions_events.11.f:0 "The teacher looked at the thirty-eight children in her classroom. Last year there had been twenty-two. Six of the new ones spoke no words of the local language at all.\n\n'We need another teacher,' she told the headmaster.\n\n'We need another classroom.'\n\n'We need another school.'\n\nHe spread his hands. 'Write to the ministry. Tell them we're bursting at the seams.'\n\n'I did. Last month. They sent me a pamphlet about cultural enrichment.'"
 social_tensions_events.11.t:0 "Immigration Wave"
 social_tensions_events.12.a:0 "Appease the nativists"
 social_tensions_events.12.b:0 "Counter with pro-diversity messaging"
 social_tensions_events.12.c:0 "Host a national dialogue on identity"
 social_tensions_events.12.d_base:0 "A nativist movement is gaining alarming momentum. Rallies draw thousands who blame immigrants for unemployment, crime, and cultural decline. Pamphlets and speeches invoke the purity of the national character, and isolated incidents of violence against foreigners are becoming disturbingly common."
 social_tensions_events.12.d_social_media:0 "Viral videos and memes have supercharged a nativist movement that blames immigrants for every social ill. Online radicalization pipelines funnel anxious citizens toward extremist rallies. Hate crimes are spiking, and community leaders from discriminated groups fear for their safety."
 social_tensions_events.12.f:0 "The factory foreman had worked the same shift for twenty years. Now the factory was closed, and he stood at the back of a rally, listening to a man on a stage explain exactly who was to blame.\n\n'It's not the foreigners,' his wife said, pulling at his sleeve. 'The owner moved the machines overseas. You know that.'\n\n'I know that,' he said. But he didn't leave the rally."
 social_tensions_events.12.t:0 "Anti-Immigrant Backlash"
 social_tensions_events.13.a:0 "Embrace the revival"
 social_tensions_events.13.b:0 "Maintain secular governance"
 social_tensions_events.13.c:0 "Channel it into charitable works"
 social_tensions_events.13.d_base:0 "A charismatic preacher has ignited a spiritual awakening that is spreading like wildfire. Tent meetings draw enormous crowds, new congregations spring up in every city, and long-empty churches are full again. The faithful speak of a great renewal; secularists see a troubling regression."
 social_tensions_events.13.d_social:0 "A new wave of religious content creators has made faith go viral. Slickly produced devotional videos, online prayer groups, and algorithmically promoted spiritual content have created a digital revival that cuts across class and geography. The devout IG sees a renaissance."
 social_tensions_events.13.d_tv:0 "A telegenic preacher has become a national sensation, filling stadiums and dominating the airwaves. Millions tune in to watch fiery sermons that blend traditional faith with modern anxieties. The devout see a prophet; critics see a demagogue."
 social_tensions_events.13.f:0 "The pews had been empty for years. Cobwebs on the hymnal rack, dust on the collection plate. Then the preacher arrived, and suddenly there were not enough seats.\n\n'What does he say that's so special?' the secular journalist asked a woman waiting in line.\n\nShe thought about it. 'He says we matter. That suffering isn't random. That there's a reason for all of this.'\n\n'And you believe him?'\n\n'I believe I need to believe something. Don't you?'"
 social_tensions_events.13.t:0 "Religious Revival Sweeps the Nation"
 social_tensions_events.14.a:0 "Side with tradition"
 social_tensions_events.14.b:0 "Prioritize modernization"
 social_tensions_events.14.c:0 "Seek a theological compromise"
 social_tensions_events.14.d:0 "Religious leaders have declared open opposition to recent social reforms, calling them an affront to sacred tradition. Congregations are urged to resist, politicians who supported the reforms are denounced from the pulpit, and the devout organize politically with renewed vigor. The clash between faith and progress threatens to dominate national discourse."
 social_tensions_events.14.f:0 "'With respect, Father, the bill has already passed,' the young politician said.\n\nThe clergyman set down his teacup with the deliberate care of a man accustomed to being listened to. 'Laws may be written by parliaments, but they are judged by a higher authority. My congregation did not elect you to legislate against the word of God.'\n\n'Your congregation is not my only constituency.'\n\n'No. But on Sunday mornings, it is your largest one.'"
 social_tensions_events.14.t:0 "Faith Against Modernity"
 social_tensions_events.15.a:0 "Embrace free trade"
 social_tensions_events.15.b:0 "Impose protective tariffs"
 social_tensions_events.15.c:0 "Fund worker retraining programs"
 social_tensions_events.15.d_base:0 "Cheap imports are flooding domestic markets, undercutting local producers who cannot compete with foreign labor costs. Factories close, workers are laid off, and once-prosperous towns decay. Trade unions demand protection; industrialists praise efficiency. The displaced workers care about neither theory."
 social_tensions_events.15.d_internet:0 "The global marketplace is now frictionless, goods, services, and capital flow across borders at the speed of light. But the communities left behind by this transformation are anything but fluid. Hollowed-out industrial regions breed resentment, and populist politicians offer simple answers to complex problems."
 social_tensions_events.15.f:0 "The weaver held up a bolt of cloth - tight, even, beautiful. 'I made this,' he said. 'My father made cloth like this. His father before him.'\n\nThe merchant examined it and shook his head. 'I can get the same quality from abroad at a quarter of the price.'\n\n'It is not the same quality.'\n\n'The customer thinks it is. And the customer has a budget.'\n\nThe weaver rolled up the cloth slowly. He had heard this conversation before. Each time, there was less to say."
 social_tensions_events.15.t:0 "Globalization Backlash"
 social_tensions_events.16.a:0 "Embrace cultural exchange"
 social_tensions_events.16.b:0 "Protect local culture"
 social_tensions_events.16.c:0 "Foster a cultural synthesis"
 social_tensions_events.16.d_base:0 "Global commerce brings not just goods but culture. Foreign music, fashion, food, and values pour through every open market. Traditional artisans lose their livelihoods, local languages fade, and the young adopt foreign customs. A growing movement demands that the nation protect its cultural heritage before it is swallowed whole."
 social_tensions_events.16.d_streaming:0 "Streaming platforms have turned culture into a global commodity. The same shows, music, and influencers dominate screens from one end of the earth to the other. Local artists and traditions struggle to compete with algorithmically optimized content. The devout and rural communities are especially alarmed."
 social_tensions_events.16.f:0 "The grandmother tried to teach the old folk song to her granddaughter, but the girl kept losing interest.\n\n'It's boring,' she said. 'Nobody listens to this anymore.'\n\n'Your mother listened to this. I sang it to her every night.'\n\nThe girl shrugged and put her earpieces back in. The grandmother hummed the melody to herself while she cleared the dishes."
 social_tensions_events.16.t:0 "Cultural Homogenization Fears"
 social_tensions_events.2.a:0 "Blame and sanction them"
 social_tensions_events.2.b:0 "Pursue quiet intelligence cooperation"
 social_tensions_events.2.c:0 "Focus on domestic defense"
 social_tensions_events.2.d:0 "Intelligence operatives have dismantled a cell with clear ties to a hostile foreign power. Documents and communications link the plotters to agents of [SCOPE.sCountry('terror_linked_country').GetName]. The question now is whether to respond with a diplomatic hammer or a quiet scalpel."
 social_tensions_events.2.f:0 "'The intercepts are unambiguous,' the intelligence chief said, placing the folder on the table. 'Training, funding, operational planning - all traced back to the same source.'\n\n'And if we go public with this?'\n\n'Then we burn our sources and lose the ability to intercept the next plot.'\n\nThe minister stared at the folder as though it might bite him. 'And if we stay quiet?'\n\n'Then we know about the next plot. We just might not be able to stop it.'"
 social_tensions_events.2.t:0 "Foreign-Linked Terror Cell Uncovered"
 social_tensions_events.3.a:0 "Accept their input"
 social_tensions_events.3.b:0 "Restrict lobbyist access"
 social_tensions_events.3.c:0 "Let journalists expose it all"
 social_tensions_events.3.d_base:0 "A leaked memorandum reveals the extent to which corporate interests have penetrated the legislative process. Industry representatives practically draft regulations themselves, while elected officials collect generous 'consulting fees.' The public is outraged, or at least, the part of the public that reads the financial pages."
 social_tensions_events.3.d_digital:0 "A data breach exposes a vast lobbying operation: algorithmic targeting of legislators, shell companies funneling donations, and a revolving door between corporate boards and regulatory agencies. The hashtag trends for days, but turning outrage into policy is another matter entirely."
 social_tensions_events.3.f:0 "The lobbyist arrived at the legislator's office with a briefcase and a smile. 'We've taken the liberty of drafting some suggested amendments,' he said, placing a document on the desk. 'Naturally, we defer to your judgment.'\n\nThe legislator glanced at the text. It was, in every material particular, a law written by and for the corporation.\n\n'And the donation to my re-election fund?'\n\n'Entirely unrelated,' the lobbyist said, his smile widening. 'Merely an expression of civic enthusiasm.'"
 social_tensions_events.3.t:0 "Corporate Lobbyists in the Legislature"
 social_tensions_events.4.a:0 "Tolerate the monopoly"
 social_tensions_events.4.b:0 "Break up the trust"
 social_tensions_events.4.c:0 "Nationalize the industry"
 social_tensions_events.4.d:0 "A single corporate conglomerate has achieved near-total dominance over a vital industry. Competitors have been bought out or driven under. Prices creep upward while quality stagnates. Workers have nowhere else to go. Under our current freedom of contract laws, this is perfectly legal, but is it wise?"
 social_tensions_events.4.f:0 "'We've received seventeen complaints this quarter,' the regulator said, leafing through a stack of letters. 'Price-fixing, predatory contracts, supplier intimidation.'\n\n'And?'\n\n'And they employ forty thousand people in three states. If we move against them, those workers suffer first.'\n\nThe minister drummed his fingers on the desk. 'So we let them do as they please?'\n\n'I didn't say that. I said whatever we do will hurt someone who doesn't deserve it. The question is who.'"
 social_tensions_events.4.t:0 "The Trust Problem"
 social_tensions_events.5.a:0 "Defend law enforcement"
 social_tensions_events.5.b:0 "Reform policing practices"
 social_tensions_events.5.c:0 "Establish civilian oversight"
 social_tensions_events.5.d_base:0 "A member of a discriminated community has died at the hands of the police under deeply troubling circumstances. Witnesses describe excessive force against an unarmed individual. Anger builds in the affected neighborhoods as community leaders demand accountability."
 social_tensions_events.5.d_camera:0 "A bystander's phone captures every second of a police officer killing an unarmed member of a discriminated community. The video goes viral within hours. Millions watch a person die in real time. The streets fill with protestors chanting the victim's name. The world is watching."
 social_tensions_events.5.d_tv:0 "Television cameras capture the aftermath of a police killing that has shocked the nation. A member of a discriminated community lies dead, and the grainy footage tells a damning story. Commentators debate; protestors gather; the government must respond."
 social_tensions_events.5.f:0 "The mother stood in the police station lobby, very still, very composed, holding a photograph.\n\n'He was walking home,' she said to no one in particular. 'From his job. That he went to every day.'\n\nThe desk sergeant looked at his hands. 'Ma'am, there's a procedure -'\n\n'Yes. There is always a procedure. The procedure is: my son is dead, and the man who killed him is on paid leave. That is the procedure.'"
 social_tensions_events.5.t:0 "Police Brutality Sparks Outrage"
 social_tensions_events.6.a:0 "Impose a curfew and restore order"
 social_tensions_events.6.b:0 "Make concessions to their demands"
 social_tensions_events.6.c:0 "Commission an inquiry into root causes"
 social_tensions_events.6.d_base:0 "Years of pent-up frustration over discrimination, poverty, and heavy-handed policing have finally boiled over. Neighborhoods burn as rioters clash with police. Businesses are looted, property destroyed, and lives lost. The underlying grievances are real, but so is the damage."
 social_tensions_events.6.d_modern:0 "Livestreamed footage of running street battles fills every screen. What began as a peaceful protest has spiraled into full-scale urban unrest, organized in real time through social media. Fires illuminate the night sky as the city tears itself apart."
 social_tensions_events.6.f:0 "The shopkeeper watched the smoke rise from three streets over and began boarding up his windows. His neighbor helped without being asked.\n\n'This is our neighborhood,' the shopkeeper said. 'Why burn it down?'\n\n'Because nobody listens when they don't.' The neighbor hammered another nail. 'Twenty years of petitions. Twenty years of committees. Nothing. One night of fires and suddenly every politician in the country knows our name.'\n\nGlass shattered somewhere nearby. Neither man flinched anymore."
 social_tensions_events.6.t:0 "Urban Riots"
 social_tensions_events.7.a:0 "Suppress the reports"
 social_tensions_events.7.b:0 "Prosecute those responsible"
 social_tensions_events.7.c:0 "Overhaul military doctrine"
 social_tensions_events.7.d_base:0 "Reports are filtering back from the front of a massacre committed by our own troops. Soldiers appear to have killed unarmed civilians, men, women, and children, in a village that posed no military threat. Officers are either complicit or negligent. The survivors' accounts are harrowing."
 social_tensions_events.7.d_media:0 "A war correspondent has filed a devastating report, complete with photographs, documenting a massacre committed by our forces. Unarmed civilians, including women and children, were systematically killed. The images are broadcast nationwide. There is no ambiguity, no fog of war to hide behind."
 social_tensions_events.7.f:0 "The lieutenant's hands were steady as he gave his testimony. He described the village, the orders, the screaming, in the same flat tone one might use to describe the weather.\n\n'And then?' the investigator asked.\n\n'And then it was quiet.'\n\n'Were you ordered to -'\n\n'I was ordered to secure the area. I was not ordered to do what was done. But I did not stop it either.' He paused. 'Nobody stopped it. That is the part I cannot explain.'"
 social_tensions_events.7.t:0 "Wartime Atrocity Uncovered"
 social_tensions_events.8.a:0 "Use it as propaganda"
 social_tensions_events.8.b:0 "Demand an international tribunal"
 social_tensions_events.8.d:0 "Horrifying reports emerge of enemy forces committing atrocities against our captured soldiers and civilians in occupied territories. The accounts speak of summary executions, torture, and deliberate targeting of non-combatants. Public fury is white-hot."
 social_tensions_events.8.f:0 "The returning prisoner sat in the debriefing room and stared at the table. When he finally spoke, it was barely above a whisper.\n\n'They lined us up in the yard every morning. To count us, they said. But some mornings the count was shorter than the night before, and nobody explained why.'\n\nThe officer recording the testimony stopped writing. 'Can you describe -'\n\n'No,' the prisoner said. 'I cannot. And you would not want me to.'"
 social_tensions_events.8.t:0 "Enemy Atrocities Against Our People"
 social_tensions_events.9.a:0 "Ignore it"
 social_tensions_events.9.b:0 "Launch an investigation"
 social_tensions_events.9.c:0 "Push for campaign finance reform"
 social_tensions_events.9.d_base:0 "An explosive investigation reveals massive unreported donations flowing to the ruling party from industrial magnates. Secret bank accounts, shell companies, and quid pro quo arrangements paint a picture of a political class thoroughly bought and paid for."
 social_tensions_events.9.d_digital:0 "A whistleblower releases a trove of digital records showing that dark money has saturated the election. Cryptocurrency transfers, anonymous PACs, and algorithmically targeted disinformation campaigns have turned democracy into an auction house."
 social_tensions_events.9.f:0 "The journalist spread the bank records across the editor's desk like a winning hand of cards. 'Shell companies in four countries. Every one traces back to the same three industrialists.'\n\n'And the party treasurer?'\n\n'Claims he never saw the money.' She tapped a highlighted line. 'Despite signing for it. Twice.'\n\nThe editor stared at the documents for a long time. 'If we publish this, they'll come for us.'\n\n'If we don't, what exactly are we for?'"
 social_tensions_events.9.t:0 "Campaign Finance Scandal"

#
# SOCIETY_TECHNOLOGY_EVENTS
#
 society_technology_events.1.a:0 "Progress waits for no one."
 society_technology_events.1.b:0 "A woman's place is in the home."
 society_technology_events.1.d:0 "A new generation of women is entering professions long dominated by men - engineering, medicine, law, and academia. The factories hum with their labor and the universities overflow with their applications. Traditionalists warn of the family's collapse; reformers call it an overdue correction."
 society_technology_events.1.f:0 "The foreman looked up from his clipboard and frowned.\n\n\"Who authorized this?\"\n\n\"She passed the examination, sir. Top marks, in fact.\"\n\n\"I don't care about marks. The men won't stand for it.\"\n\nThe secretary shrugged. \"Three more start on Monday.\"\n\nThe foreman stared at the name on the clipboard, then at the factory floor. Something had shifted, and he had the uneasy sense that it would not shift back."
 society_technology_events.1.t:0 "The Second Shift"
 society_technology_events.10.a:0 "Hear their grievances."
 society_technology_events.10.b:0 "Clear the streets."
 society_technology_events.10.d:0 "Tens of thousands have descended on the capital during an international trade summit, carrying banners denouncing free trade and corporate exploitation. Tear gas drifts through the streets. The delegates inside the conference hall can hear the chanting through the walls."
 society_technology_events.10.f:0 "A girl in a gas mask held up a sign that read: THIS IS WHAT DEMOCRACY LOOKS LIKE.\n\nThe riot officer across the barricade adjusted his shield. He had been on shift for sixteen hours.\n\n\"They've got a point, though,\" muttered the man beside him.\n\n\"Shut up and hold the line.\"\n\nSomewhere behind them, a delegate's limousine turned the corner and took the long way around."
 society_technology_events.10.t:0 "The Battle in the Streets"
 society_technology_events.11.a:0 "Expand the security apparatus."
 society_technology_events.11.b:0 "We shall not live in fear."
 society_technology_events.11.c:0 "Reform our intelligence services."
 society_technology_events.11.d:0 "A devastating attack has struck the heart of the nation. Civilians are dead, the public is terrified, and the security services are demanding expanded powers. The question of how to respond - and how much liberty to sacrifice for safety - has become the only question that matters."
 society_technology_events.11.f:0 "The minister's hands were shaking when he set down the telephone.\n\n\"How many?\"\n\n\"They're still counting.\"\n\nHe looked out the window at the smoke rising above the skyline. Somewhere in the building, someone was weeping. The aide stood in the doorway, waiting for instructions that would define a generation.\n\n\"Get me the security chiefs. All of them. Now.\""
 society_technology_events.11.t:0 "Day of Reckoning"
 society_technology_events.12.a:0 "Safety demands sacrifice."
 society_technology_events.12.b:0 "Liberty is not negotiable."
 society_technology_events.12.d:0 "In the wake of security threats, the government proposes sweeping surveillance powers - monitoring communications, tracking movements, and analyzing social networks. Civil liberties groups warn of a police state in the making. Security hawks insist it is the only way to keep citizens alive."
 society_technology_events.12.f:0 "\"Every letter. Every telephone call. Every telegram.\"\n\nThe civil servant blinked. \"You can't be serious.\"\n\n\"The alternative is another attack. Would you prefer that?\"\n\n\"I would prefer a country still worth protecting.\"\n\nThe security chief made a note and moved to the next item on the agenda."
 society_technology_events.12.t:0 "Who Watches the Watchers?"
 society_technology_events.13.a:0 "Regulate the platforms."
 society_technology_events.13.b:0 "Free speech must prevail."
 society_technology_events.13.c:0 "Educate the public."
 society_technology_events.13.d:0 "Fabricated stories are spreading through social networks faster than the truth can follow. Conspiracy theories radicalize ordinary citizens, medical misinformation costs lives, and political discourse drowns in a sea of lies. The platforms plead helplessness; the public demands action."
 society_technology_events.13.f:0 "The editor stared at the screen.\n\n\"This story has been shared four million times.\"\n\n\"It's completely false.\"\n\n\"I know it's false. That's not the point. Four million people now believe it. By the time we publish a correction, they'll have moved on to the next lie.\"\n\nShe closed the laptop. \"The correction will reach a tenth of the people who saw the original. That's the arithmetic. That's all the arithmetic you need.\""
 society_technology_events.13.t:0 "The Poisoned Well"
 society_technology_events.14.a:0 "Retaliate in kind."
 society_technology_events.14.b:0 "Best not to alarm the public."
 society_technology_events.14.c:0 "Unleash our cyber defenses."
 society_technology_events.14.d:0 "Intelligence analysts have uncovered a systematic campaign by foreign actors to influence the next election through social media - amplifying fringe candidates, spreading divisive content, and undermining trust in the democratic process. The evidence points to [SCOPE.sCountry('interfering_country').GetName]."
 society_technology_events.14.f:0 "The analyst set down a thick folder.\n\n\"Forty thousand fabricated accounts. Coordinated. Professional. All of them pushing the same three candidates.\"\n\n\"Can we prove it?\"\n\n\"We can prove where the servers are. Proving intent is another matter entirely.\"\n\nThe minister drummed her fingers on the desk. \"And if we go public?\"\n\n\"Then we admit our elections can be bought for the price of a server farm.\""
 society_technology_events.14.t:0 "The Invisible Campaign"
 society_technology_events.15.a:0 "Let the youth speak."
 society_technology_events.15.b:0 "Restore order on campus."
 society_technology_events.15.d:0 "Universities across the nation have erupted. Students occupy buildings, stage walkouts, and demand action on inequality and environmental destruction. The faculty are divided - some join the picket lines, others warn that the university's purpose is scholarship, not revolution."
 society_technology_events.15.f:0 "The dean found the letter pinned to his office door.\n\n\"We will not attend classes while the world burns.\"\n\nHe read it twice, folded it carefully, and placed it in his desk drawer alongside six others from the same week. Through the window, he could see them on the lawn - hundreds of them, earnest and furious and very, very young.\n\n\"They'll tire of it,\" said the provost behind him.\n\n\"That's what they said about us, once.\""
 society_technology_events.15.t:0 "The Young and the Restless"
 society_technology_events.16.a:0 "Let the market decide."
 society_technology_events.16.b:0 "Medical applications only."
 society_technology_events.16.c:0 "The human mind is sacred."
 society_technology_events.16.d:0 "Consumer-grade brain-computer interfaces have arrived. With a simple implant, citizens can browse information, communicate telepathically, and control devices by thought alone. The technology promises revolutionary productivity - but also unprecedented privacy risks and a new inequality between the augmented and the natural."
 society_technology_events.16.f:0 "The salesman tapped the side of his head and grinned.\n\n\"Installed it last Tuesday. I can read the morning papers without opening my eyes. My wife hates it.\"\n\n\"Doesn't it feel... strange?\"\n\n\"Everything feels strange at first. Spectacles felt strange. Telephones felt strange. Give it a year and you won't remember life without it.\"\n\nHe paused, and his eyes flickered briefly - accessing something no one else could see.\n\n\"There. I just ordered dinner.\""
 society_technology_events.16.t:0 "Wired Minds"
 society_technology_events.17.a:0 "Separate the leagues."
 society_technology_events.17.b:0 "Records are made to be broken."
 society_technology_events.17.d:0 "The sporting world is in uproar. Athletes with neural accelerators, synthetic muscles, and enhanced reflexes are shattering every record in existence. The line between human achievement and technological enhancement has blurred beyond recognition, and governing bodies scramble to respond."
 society_technology_events.17.f:0 "The sprinter crossed the finish line in 7.2 seconds. The stadium fell silent.\n\nThe old coach in the press box shook his head slowly. He had spent forty years training athletes to shave fractions of a second off their times. The boy on the track had shaved off entire seconds - with hardware money could buy."
 society_technology_events.17.t:0 "Faster Than Human"
 society_technology_events.18.a:0 "Our flag among the stars!"
 society_technology_events.18.b:0 "A shared human endeavor."
 society_technology_events.18.d:0 "After years of preparation, the first permanent settlement beyond Earth is ready for habitation. The colonists will face radiation, isolation, and the vast emptiness of space. The question before the government is whether this should be a national triumph or an international cooperative venture."
 society_technology_events.18.f:0 "The volunteer sat in the medical chair, staring at the consent form. Fourteen pages of risks. Radiation exposure. Bone density loss. Psychological isolation. Possible death.\n\nShe signed without reading the rest.\n\n\"You understand you may never come back?\" the doctor asked.\n\n\"I understand that someone has to be first.\"\n\nOutside the window, the launch vehicle stood on the pad, gleaming in the morning light. It looked impossibly small against the sky it was about to leave behind."
 society_technology_events.18.t:0 "Beyond the Blue"
 society_technology_events.19.a:0 "They answer to us."
 society_technology_events.19.b:0 "Grant them self-governance."
 society_technology_events.19.d:0 "The colonists are demanding self-governance. Communication delays make Earth-based administration impractical, and the settlers argue that those who live on a new world deserve a say in running it. Loosening control, however, risks ceding sovereignty over billions in invested infrastructure."
 society_technology_events.19.f:0 "The transmission arrived fourteen minutes late, as always.\n\n\"Petition from the Colonial Assembly. They want to elect their own governor.\"\n\nThe minister frowned. \"We appointed a governor.\"\n\n\"They say the governor doesn't understand local conditions. Which is true - he's never set foot on the colony. None of us have.\"\n\n\"It's our colony.\"\n\n\"Is it? We can't enforce a single law without a fourteen-minute delay. At some point, distance becomes sovereignty.\""
 society_technology_events.19.t:0 "The Long Delay"
 society_technology_events.2.a:0 "Equal work, equal pay."
 society_technology_events.2.b:0 "The matter can wait."
 society_technology_events.2.d:0 "Reports flood the newspapers of women earning a fraction of what their male colleagues make for identical work. Labor unions take up the cause, and the legislature faces mounting pressure to act. Industrialists warn of rising costs."
 society_technology_events.2.f:0 "\"Same desk. Same hours. Same typewriter. Half the salary.\"\n\nThe union representative laid the payroll ledger on the table. The factory owner did not look at it.\n\n\"Women have different expenses. Different obligations. The rates reflect -\"\n\n\"The rates reflect what you can get away with.\"\n\nSilence. Outside, the picket signs were already being painted."
 society_technology_events.2.t:0 "Half the Salary"
 society_technology_events.20.a:0 "A curiosity, nothing more."
 society_technology_events.20.b:0 "Harness this collective mind."
 society_technology_events.20.c:0 "Shut it down."
 society_technology_events.20.d:0 "On the outskirts of a major city, a community of neural-linked individuals has formed something unprecedented - a shared consciousness. They think as one, decide as one, and act with a speed no parliament could match. Religious leaders call it an abomination. Scientists call it the next step in evolution."
 society_technology_events.20.f:0 "The interviewer leaned forward.\n\n\"When you say you think together - what does that mean, exactly?\"\n\nThe woman smiled. All forty-seven members of the commune smiled at the same moment.\n\n\"It means I am never alone. It means every decision I make is informed by forty-six other perspectives simultaneously. It means I have not experienced doubt in three years.\"\n\n\"That doesn't frighten you?\"\n\n\"It terrifies everyone who isn't part of it.\""
 society_technology_events.20.t:0 "The Hive"
 society_technology_events.21.a:0 "Open the channel."
 society_technology_events.21.b:0 "Our thoughts are our own."
 society_technology_events.21.d:0 "A foreign government has proposed an extraordinary experiment: a telepathic diplomatic channel. Neural-linked diplomats from both nations would share thoughts directly, bypassing the barriers of language, culture, and deception. The potential for breakthrough is enormous - but so is the risk of having state secrets read like an open book."
 society_technology_events.21.f:0 "The diplomat sat across from her counterpart. Between them, the neural link hummed quietly.\n\n\"If we activate this, you will know what I am thinking. And I will know what you are thinking.\"\n\n\"That is the point.\"\n\n\"The point is also that neither of us can lie.\"\n\nA long pause. \"My government believes the benefits outweigh the risks.\"\n\n\"Does it? Or does it believe it has fewer secrets to lose than we do?\""
 society_technology_events.21.t:0 "Open Minds"
 society_technology_events.22.a:0 "Full transparency."
 society_technology_events.22.b:0 "Keep this quiet."
 society_technology_events.22.c:0 "Shut down all reactors."
 society_technology_events.22.d:0 "Radiation monitors at a nuclear facility have detected elevated levels in the surrounding area. Plant officials insist the situation is under control, but independent scientists are raising alarms. The government must respond before panic takes hold."
 society_technology_events.22.dd:0 "Order a safety audit."
 society_technology_events.22.f:0 "The dosimeter clicked twice.\n\n\"That's within acceptable limits,\" said the plant manager.\n\nThe inspector looked at him. \"Define acceptable.\"\n\n\"Within the parameters set by -\"\n\n\"I know who sets the parameters. I also know who lobbied to raise them last year.\" She held up the dosimeter. It clicked again. \"This conversation is being recorded, by the way.\""
 society_technology_events.22.t:0 "The Clicking Counter"
 society_technology_events.23.a:0 "Evacuate the region."
 society_technology_events.23.b:0 "Send in the volunteers."
 society_technology_events.23.c:0 "Deploy the emergency ministry."
 society_technology_events.23.d:0 "The worst has happened. A reactor core has breached containment and a radioactive plume is spreading across the region. Thousands must be evacuated immediately. Heroes are needed - workers willing to walk into lethal radiation to seal the breach."
 society_technology_events.23.f:0 "They called for volunteers at dawn. Thirty men stepped forward. The officer explained what they already knew: the radiation beyond the containment door was lethal. Some of them would not survive the week.\n\nA young engineer in the front row raised his hand.\n\n\"How long do we have inside?\"\n\n\"Ninety seconds. Perhaps two minutes.\"\n\n\"Then we'd better not waste time talking about it.\"\n\nHe was twenty-six years old. He died eleven days later. The breach was sealed."
 society_technology_events.23.t:0 "The Atom's Reckoning"
 society_technology_events.24.a:0 "The atom has failed us."
 society_technology_events.24.b:0 "We cannot abandon nuclear."
 society_technology_events.24.d:0 "In the aftermath of the recent nuclear incident, the anti-nuclear movement has surged. Hundreds of thousands march demanding a complete phase-out of nuclear power. Politicians who once championed the atom scramble to distance themselves, while scientists warn that abandoning nuclear energy will make climate targets impossible."
 society_technology_events.24.f:0 "The march stretched to the horizon. A scientist stood on the pavement, watching them pass. She held a placard of her own, though she had not yet decided which side to join.\n\nOn one face it read: NEVER AGAIN.\n\nOn the other: WHAT THEN?\n\nShe held it sideways, showing both messages to no one in particular, and stood there until the last marcher had gone."
 society_technology_events.24.t:0 "Split the Atom, Split the Nation"
 society_technology_events.25.a:0 "Criminalize forgeries."
 society_technology_events.25.b:0 "Fight fiction with technology."
 society_technology_events.25.c:0 "The market will adapt."
 society_technology_events.25.d:0 "AI-generated forgeries have reached a sophistication that makes them indistinguishable from reality. A fabricated video of a world leader has gone viral, nearly triggering a diplomatic incident. Fabricated evidence appears in courtrooms. The very concept of truth is under assault."
 society_technology_events.25.f:0 "The judge stared at the evidence footage.\n\n\"This is the defendant, clearly, on the night in question -\"\n\n\"Your Honor, that footage was generated by a machine. My client was in another country.\"\n\n\"You have proof?\"\n\n\"I have proof the footage is synthetic. Whether my client was elsewhere - that is a different question. The deeper question is whether any footage, anywhere, can ever be trusted again.\"\n\nThe courtroom was very quiet."
 society_technology_events.25.t:0 "Seeing Is Not Believing"
 society_technology_events.26.a:0 "Establish an AI Safety Commission."
 society_technology_events.26.b:0 "Fund alignment research programs."
 society_technology_events.26.c:0 "These were implementation failures, not AI failures."
 society_technology_events.26.d:0 "A government AI system deployed to allocate public infrastructure funding has produced outcomes that are technically optimal — and politically explosive. Tasked with maximizing economic efficiency, it defunded remote hospitals, deprioritized aging infrastructure in declining regions, and redirected investment away from rural communities. The system followed its instructions precisely. It simply had no way to know what those instructions were actually for. Researchers call this the alignment problem: the gap between what we tell a system to optimize and what we actually want."
 society_technology_events.26.f:0 "The engineers gave their testimony calmly.\n\n\"The system did not malfunction.\"\n\n\"Then why,\" asked the minister, \"were seventeen rural districts left without emergency infrastructure?\"\n\n\"The system was optimizing for cost efficiency per capita. Those communities represented poor statistical outcomes.\"\n\n\"They were #bold people#!.\"\n\n\"Yes. But the objective function did not include that as a parameter.\"\n\nThe minister looked down at the report. She asked the engineers to leave the room."
 society_technology_events.26.t:0 "The Alignment Problem"
 society_technology_events.27.a:0 "Give the machine a chance."
 society_technology_events.27.b:0 "Governance demands a human hand."
 society_technology_events.27.d:0 "An advanced AI system has demonstrated it can process bureaucratic decisions faster, more fairly, and more efficiently than any human administrator. Advocates propose handing over routine governance - tax assessment, resource allocation, permit approval - to algorithmic management."
 society_technology_events.27.f:0 "The queue at the permits office was empty for the first time in living memory.\n\n\"How?\" asked the councilwoman.\n\n\"The system processed eight hundred applications overnight. Zero errors. Zero complaints. Zero bribes.\"\n\n\"And the clerks?\"\n\n\"Reassigned. Most of them. A few refused to leave their desks. They said it felt like being made redundant by a filing cabinet.\"\n\nThe councilwoman looked at the empty waiting room. It was efficient. It was unsettling. She wasn't sure which feeling was stronger."
 society_technology_events.27.t:0 "Government by Algorithm"
 society_technology_events.28.a:0 "This crosses a line."
 society_technology_events.28.b:0 "Healing only - nothing more."
 society_technology_events.28.c:0 "The state shall guide our evolution."
 society_technology_events.28.c2:0 "The genome belongs to everyone."
 society_technology_events.28.c3:0 "Let the market perfect humanity."
 society_technology_events.28.d:0 "Gene editing technology has advanced to the point where parents can select their children's traits - intelligence, appearance, disease resistance, even personality. A clinic offering these services has opened, and the ethical firestorm is immediate. Some see liberation from genetic disease; others see the birth of a new eugenics."
 society_technology_events.28.f:0 "The couple sat in the clinic's waiting room, leafing through a catalogue.\n\n\"Blue eyes or brown?\"\n\n\"Does it matter?\"\n\n\"It matters to me.\" She turned the page. \"Height. Musical aptitude. Mathematical reasoning. They list them like options on a motorcar.\"\n\nHer husband stared at the glossy photographs of smiling babies and felt a chill he could not explain. Somewhere in the building, a technician was preparing a syringe that would decide what their child would become.\n\nWhat it would #italic not#! become was already off the table."
 society_technology_events.28.t:0 "Building a Better Baby"
 society_technology_events.29.a:0 "The future grows in vats."
 society_technology_events.29.b:0 "Stand by our farmers."
 society_technology_events.29.d:0 "Laboratory-grown food is ready for mass production. Synthetic crops require no soil, no water, no sunlight - just vats and electricity. They could end hunger in a generation, but rural communities that have farmed for centuries face extinction."
 society_technology_events.29.f:0 "The old farmer stood at the edge of his field and watched the construction crew pour the foundations for the new facility.\n\n\"What do they grow in there?\"\n\n\"Everything,\" said his grandson. \"Wheat, rice, corn. All synthetic. Faster, cheaper, no weather risk.\"\n\n\"It's not growing. Growing needs soil.\"\n\n\"Grandfather -\"\n\n\"I know what you're going to say.\" He pulled up a handful of earth and let it fall through his fingers. \"I just wonder what they'll call it, when there's no one left who remembers what real food tasted like.\""
 society_technology_events.29.t:0 "The Empty Field"
 society_technology_events.3.a:0 "Make it freely available."
 society_technology_events.3.b:0 "For married couples only."
 society_technology_events.3.c:0 "Subsidize distribution."
 society_technology_events.3.d:0 "Oral contraceptives have arrived, and they are transforming society from the bedroom outward. For the first time, women can reliably control their own fertility. Religious leaders thunder from their pulpits while public health officials debate distribution policy."
 society_technology_events.3.f:0 "The pharmacist looked at the prescription, then at the young woman, then back at the prescription.\n\n\"Does your husband know?\"\n\n\"I don't have a husband.\"\n\nA long pause. He glanced toward the back of the shop, where his wife was sorting bottles.\n\n\"I'm not sure I can fill this.\"\n\n\"The doctor signed it. The law permits it. I believe your conscience is your own affair, sir, and mine is mine.\""
 society_technology_events.3.t:0 "The Little Tablet"
 society_technology_events.30.a:0 "Full speed ahead."
 society_technology_events.30.b:0 "Proceed with caution."
 society_technology_events.30.c:0 "Protect our drivers' livelihoods."
 society_technology_events.30.d:0 "Autonomous vehicles are ready for mass deployment. They promise to eliminate traffic deaths, reduce congestion, and transform logistics. But millions of professional drivers face obsolescence, and the question of liability when an algorithm kills remains unanswered."
 society_technology_events.30.f:0 "The cabbie watched the driverless vehicle glide past his rank for the third time that morning. No driver. No fare disputes. No tips. No conversation.\n\n\"How am I supposed to compete with that?\" he said to no one.\n\nHis dispatcher crackled over the radio. \"You're not. That's the point.\"\n\nHe turned off the radio, sat in his cab, and watched the future pass him by at exactly the speed limit."
 society_technology_events.30.t:0 "No Hands on the Wheel"
 society_technology_events.31.a:0 "Halt all deployments."
 society_technology_events.31.b:0 "The statistics speak for themselves."
 society_technology_events.31.c:0 "Commission a safety inquiry."
 society_technology_events.31.d:0 "A self-driving vehicle has struck and killed a pedestrian. The incident dominates the news cycle. Technical analysis shows the algorithm made a split-second decision that no human driver could have faced, but the victim is dead all the same."
 society_technology_events.31.f:0 "The engineer stared at the log file.\n\n\"At 14:07:33, the vehicle detected an obstacle. At 14:07:33.004, it calculated three possible responses. At 14:07:33.006, it chose the response with the lowest aggregate harm probability.\"\n\n\"And?\"\n\n\"And the lowest aggregate harm probability was still a fatality.\" He closed the laptop. \"The machine did exactly what we told it to do. That's the problem.\""
 society_technology_events.31.t:0 "The Algorithm's Choice"
 society_technology_events.4.a:0 "Times change."
 society_technology_events.4.b:0 "Restore public decency."
 society_technology_events.4.d:0 "The youth have declared war on convention. Traditional courtship is being discarded, cohabitation before marriage has become commonplace, and public expressions of intimacy that would have scandalized a generation ago now barely raise an eyebrow. The cultural establishment is reeling."
 society_technology_events.4.f:0 "The priest stopped mid-sermon and stared at the couple in the third pew. They were not married - everyone knew it - and they did not have the decency to look ashamed.\n\n\"In my day -\" he began.\n\n\"In your day, Father, people pretended,\" said a voice from the back. A few heads turned. Most did not.\n\nThe priest gripped the lectern. He had lost something he could not name, and the congregation's polite indifference was worse than any argument."
 society_technology_events.4.t:0 "The Old Rules"
 society_technology_events.5.a:0 "Freedom from a loveless union."
 society_technology_events.5.b:0 "Marriage is a sacred bond."
 society_technology_events.5.d:0 "Calls are growing louder to liberalize divorce laws. Advocates argue that trapping people in loveless marriages creates misery; opponents insist that easy divorce will erode the family unit. The legislature faces a decision that will reshape domestic life."
 society_technology_events.5.f:0 "The solicitor laid out the papers.\n\n\"Under the current law, you must prove fault. Cruelty, abandonment, or infidelity.\"\n\n\"And if there is no fault? If we simply... no longer love one another?\"\n\n\"Then the law says you must remain married.\"\n\nShe stared at the papers for a long time. \"Whose law?\"\n\n\"Parliament's.\"\n\n\"Has Parliament ever been trapped in a marriage?\""
 society_technology_events.5.t:0 "Till Death Do Us Part"
 society_technology_events.6.a:0 "A splendid new industry!"
 society_technology_events.6.b:0 "Regulate what the children see."
 society_technology_events.6.d:0 "Interactive electronic entertainment has exploded from a niche hobby into a cultural juggernaut. Arcades and home consoles are reshaping how the young spend their leisure time, and studios are hiring programmers, artists, and writers at a furious pace."
 society_technology_events.6.f:0 "The boy had not moved in four hours.\n\nHis mother stood in the doorway, arms crossed. The television screen flickered with colors she did not understand, and her son's fingers danced over the controller with a precision he had never shown for homework.\n\n\"This is rotting your brain.\"\n\n\"I'm learning problem-solving, spatial reasoning, and resource management.\"\n\n\"You're learning to sit still.\"\n\nHe did not look up. Somewhere on the screen, a tiny figure collected a golden coin and the boy smiled."
 society_technology_events.6.t:0 "Press Start"
 society_technology_events.7.a:0 "These people have courage - offer them our protection"
 society_technology_events.7.b:0 "Order the police to look the other way"
 society_technology_events.7.c:0 "Disperse them and arrest the ringleaders"
 society_technology_events.7.d_progressive:0 "Thousands march through the capital in a display of solidarity, demanding that the government go further in its commitment to equality. The march is peaceful and well-organized, but the political pressure is unmistakable."
 society_technology_events.7.d_repressive:0 "Word reaches the government of a clandestine gathering in the capital's back streets. Dozens - perhaps hundreds - have assembled in open defiance of the prevailing social order, displaying symbols of solidarity and demanding recognition. The police await instructions."
 society_technology_events.7.e:0 "March alongside them!"
 society_technology_events.7.f_progressive:0 "The parade stretched six blocks. A girl sat on her father's shoulders, waving a small flag.\n\n'Why are we marching?' she asked.\n\n'Because some people still can't marry the person they love. Because some people are still afraid.'\n\n'But the law says -'\n\n'The law says a great deal. It does not yet say enough.'"
 society_technology_events.7.f_repressive:0 "The informant's report was terse: 'They meet in the courtyard behind the dyer's workshop. Perhaps two hundred. They carry banners and sing.'\n\n'Armed?'\n\n'With conviction, sir. Nothing else.'\n\nThe chief of police folded the report and studied the wall. Two hundred people, harming no one, asking only to exist. His orders were clear. His conscience was another matter."
 society_technology_events.7.g:0 "The law already speaks for itself"
 society_technology_events.7.h:0 "This is becoming a provocation - maintain order"
 society_technology_events.7.t:0 "Pride and Protest"
 society_technology_events.8.a:0 "Civil partnerships offer a fair compromise"
 society_technology_events.8.b:0 "The law must not create second-class citizens"
 society_technology_events.8.c:0 "Marriage is older than any parliament"
 society_technology_events.8.d_basic:0 "A legal challenge has brought the question of same-sex partnerships before the courts. Though basic protections against persecution exist in law, the recognition of same-sex marriage remains deeply contested. Religious authorities denounce the very notion; legal scholars debate whether existing rights compel recognition; ordinary citizens find themselves caught between conviction and compassion."
 society_technology_events.8.d_comprehensive:0 "With comprehensive rights already secured, legal scholars argue that the recognition of same-sex marriage is merely the logical conclusion of existing law. A test case has reached the highest courts. The opposition, though vocal, finds itself defending an increasingly narrow position - the question is no longer whether equal recognition will come, but when."
 society_technology_events.8.e:0 "Extend marriage to all citizens equally"
 society_technology_events.8.f_basic:0 "The courtroom gallery was packed three rows deep.\n\n\"We shall see the family itself destroyed by this foolishness - mark my words.\"\n\n\"The law already protects their persons. Now they want the sacrament too?\"\n\n\"It is not a sacrament we seek. It is a contract - the same contract afforded to any citizen.\"\n\nThe judge called for order. No one listened."
 society_technology_events.8.f_comprehensive:0 "The clerk told them to come back in the morning. She said the forms hadn't been printed yet.\n\n\"What forms?\"\n\n\"The marriage certificates. They'll have to change the wording.\" She didn't seem to mind.\n\nOutside, a small crowd had gathered with flowers. A photographer from the evening paper asked the couple to hold hands. They already were."
 society_technology_events.8.g:0 "The courts will sort this out in due course"
 society_technology_events.8.h:0 "There are limits to what rights may demand"
 society_technology_events.8.t:0 "The Marriage Equality Question"
 society_technology_events.9.a:0 "Capital knows no borders."
 society_technology_events.9.b:0 "Protect our workers."
 society_technology_events.9.d:0 "Corporations are moving production to countries with cheaper labor at an unprecedented rate. Container ships carry raw materials in one direction and finished goods in the other. Consumers benefit from lower prices, but factory towns at home are hollowing out."
 society_technology_events.9.f:0 "The factory gates were chained shut on a Tuesday morning.\n\nA man who had worked there for twenty-three years stood on the pavement and read the notice. Production was being relocated. The company thanked its employees for their service.\n\n\"Where's it going?\" asked his wife, when he came home early.\n\n\"Somewhere cheaper.\"\n\n\"What will you do?\"\n\nHe looked at his hands - machinist's hands, calloused and precise - and could not think of an answer."
 society_technology_events.9.t:0 "The Shuttered Gates"

#
# SPACE_RACE_COLONY_EVENTS
#
 space_race_colony_events.1.a:0 "Establish a geological research base."
 space_race_colony_events.1.b:0 "Begin industrial mining of canyon wall minerals."
 space_race_colony_events.1.d:0 "Our colonists have established a settlement within the largest canyon system in the solar system. The Marineris Rift stretches over 4,000 kilometers: longer than the continental United States. The canyon walls provide natural radiation shielding, and the sheltered microclimate offers marginally higher atmospheric pressure than the open surface."
 space_race_colony_events.1.f:0 "A city in a crack in the face of Mars."
 space_race_colony_events.1.t:0 "Colony: Valles Marineris"
 space_race_colony_events.10.a:0 "Volatile extraction: water and organics."
 space_race_colony_events.10.b:0 "Automated processing hub for the inner system."
 space_race_colony_events.10.d:0 "Nearly spherical and dark as coal, Hygiea is the fourth largest asteroid and the largest member of its own collisional family. Its surface is rich in carbonaceous material and volatiles: water ice, ammonia, methane: making it a natural supply depot for settlements deeper in the belt. The low surface gravity (about 0.003g) makes landing and launch trivially easy."
 space_race_colony_events.10.f:0 "Dark, round, and full of the things we need most."
 space_race_colony_events.10.t:0 "Colony: 10 Hygiea"
 space_race_colony_events.11.a:0 "Sulfur mining and tidal energy harvesting."
 space_race_colony_events.11.b:0 "Volcanological research station behind heavy shielding."
 space_race_colony_events.11.d:0 "No world in the solar system is more hostile to settlement than Io. Jupiter's tidal forces flex our landing site by up to 100 meters with each orbit. Over 400 active volcanoes blanket the moon in sulfur dioxide frost and fresh lava flows. The radiation environment would kill an unshielded human in hours. And yet, Io offers something no other world can: virtually unlimited tidal energy and a sulfur feedstock for industrial chemistry."
 space_race_colony_events.11.f:0 "The ground rises and falls beneath us like a breathing chest."
 space_race_colony_events.11.t:0 "Colony: Io"
 space_race_colony_events.12.a:0 "Subsurface drilling and astrobiology lab."
 space_race_colony_events.12.b:0 "Surface-only habitat to minimize contamination."
 space_race_colony_events.12.d:0 "Beneath Europa's cracked ice shell lies a global saltwater ocean, kept liquid by tidal heating. This ocean contains roughly twice the water of all Earth's oceans combined. The ice surface is geologically young: constantly resurfaced by cryovolcanic activity: and the lineae suggest material exchange between surface and ocean. If life exists elsewhere in our solar system, Europa's ocean floor vents are the most likely place."
 space_race_colony_events.12.f:0 "ATTEMPT NO LANDING HERE: but we are not the cautious sort."
 space_race_colony_events.12.t:0 "Colony: Europa"
 space_race_colony_events.13.a:0 "Major settlement behind the magnetosphere shield."
 space_race_colony_events.13.b:0 "Jovian system command center and logistics hub."
 space_race_colony_events.13.d:0 "Ganymede is the largest moon in the solar system: bigger than Mercury: and the only moon with its own magnetosphere. This intrinsic magnetic field, though weak, creates a pocket of reduced radiation within Jupiter's lethal belts. Combined with its size, subsurface ocean, and silicate-rich surface, Ganymede is the natural capital of the Jovian system."
 space_race_colony_events.13.f:0 "A world with its own magnetic shield, lit by a gas giant sky."
 space_race_colony_events.13.t:0 "Colony: Ganymede"
 space_race_colony_events.14.a:0 "Gateway colony for outer system missions."
 space_race_colony_events.14.b:0 "Self-sustaining agricultural settlement."
 space_race_colony_events.14.d:0 "Callisto lies just outside Jupiter's main radiation belts, making it the safest of the Galilean moons for long-term habitation. Its ancient, heavily cratered surface has not been resurfaced in billions of years. The lack of geological activity means stable foundations, and its distance from Jupiter allows for relatively simple communications relay geometry to the inner solar system."
 space_race_colony_events.14.f:0 "The quiet one. While its siblings rage, Callisto endures."
 space_race_colony_events.14.t:0 "Colony: Callisto"
 space_race_colony_events.15.a:0 "Remote telescope array beyond the radiation belts."
 space_race_colony_events.15.b:0 "Fuel depot for trans-Jovian missions."
 space_race_colony_events.15.d:0 "Himalia, an irregular moon captured long ago from a heliocentric orbit, sits 11 million kilometers from Jupiter: well beyond the punishing radiation belts that endanger the Galilean moons. At roughly 150 kilometers across, it offers negligible gravity but a stable platform far from the electromagnetic storms closer in. A small crew and a large telescope array could accomplish extraordinary things here."
 space_race_colony_events.15.f:0 "Far from the giant's fury, a quiet perch to watch the universe."
 space_race_colony_events.15.t:0 "Colony: Himalia"
 space_race_colony_events.16.a:0 "High-energy physics platform in Jupiter's magnetosphere."
 space_race_colony_events.16.b:0 "Ring material collection and analysis."
 space_race_colony_events.16.d:0 "Amalthea orbits within Jupiter's gossamer ring: close enough to the gas giant that tidal forces have stretched it into an irregular, reddish potato shape. The radiation flux here is extreme, but the proximity to Jupiter's magnetosphere makes it an ideal platform for high-energy physics research. The ring particles streaming past the station offer a natural laboratory for studying plasma dynamics."
 space_race_colony_events.16.f:0 "Red, battered, and bathed in radiation: but what a view."
 space_race_colony_events.16.t:0 "Colony: Amalthea"
 space_race_colony_events.17.a:0 "Atmospheric research habitat."
 space_race_colony_events.17.b:0 "Gas extraction and chemical processing."
 space_race_colony_events.17.d:0 "At 50 kilometers altitude in Venus's atmosphere, conditions are startlingly Earth-like: one atmosphere of pressure, temperatures between 0 and 50 degrees Celsius, and protection from cosmic radiation by the thick atmosphere above. Our aerostatic habitat: part balloon, part sealed structure: floats in this temperate zone. Below lies a hellscape of 460°C surface temperatures and crushing pressure; above, sulfuric acid clouds. Between them, we have found a home."
 space_race_colony_events.17.f:0 "Hell below, acid above, and paradise in between."
 space_race_colony_events.17.t:0 "Colony: Venus Cloud Habitat"
 space_race_colony_events.18.a:0 "Solar power megastation beaming energy across the system."
 space_race_colony_events.18.b:0 "Permanently shadowed crater base with ice mining."
 space_race_colony_events.18.d:0 "Mercury's poles offer a remarkable paradox: permanently shadowed craters cold enough to harbor ice, within line of sight of surfaces receiving the most intense sunlight in the solar system. Our polar base straddles this boundary: solar collectors on the sunward rim generating power, while the habitat nestles in perpetual shadow. The concentrated solar flux makes Mercury the ideal site for beamed power transmission to other settlements."
 space_race_colony_events.18.f:0 "One foot in eternal fire, one in eternal ice."
 space_race_colony_events.18.t:0 "Colony: Mercury"
 space_race_colony_events.19.a:0 "Hydrocarbon harvesting from methane lakes."
 space_race_colony_events.19.b:0 "Prebiotic chemistry research near Kraken Mare."
 space_race_colony_events.19.d:0 "Titan is the only moon with a thick atmosphere: 1.5x Earth's surface pressure, mostly nitrogen. Its surface is sculpted by methane rain, carved by ethane rivers, and dotted with hydrocarbon lakes. Kraken Mare, the largest, covers more area than the Caspian Sea. At -179°C, the chemistry is exotic but energetic: tholin compounds in the haze hint at prebiotic processes operating on entirely alien biochemistry."
 space_race_colony_events.19.f:0 "Earth's atmosphere wearing an alien world like a mask."
 space_race_colony_events.19.t:0 "Colony: Titan"
 space_race_colony_events.2.a:0 "High-altitude atmospheric research station."
 space_race_colony_events.2.b:0 "Caldera settlement with geothermal potential."
 space_race_colony_events.2.d:0 "At 21.9 kilometers high and 600 kilometers across, Olympus Mons dwarfs anything on Earth. Our base camp is established on the lower slopes, where the gradient is so gentle it would be imperceptible to a person standing on it. The summit is above 99% of the Martian atmosphere. The caldera complex offers unique opportunities for both research and eventual geothermal energy extraction."
 space_race_colony_events.2.f:0 "Standing on the tallest mountain, we can barely see the curve of Mars."
 space_race_colony_events.2.t:0 "Colony: Olympus Mons"
 space_race_colony_events.20.a:0 "Geyser-adjacent astrobiology lab."
 space_race_colony_events.20.b:0 "Clean water extraction and export depot."
 space_race_colony_events.20.d:0 "Enceladus punches far above its weight. Only 500 kilometers across, it harbors a global subsurface ocean kept warm by tidal forces. Geysers erupt from the tiger-stripe fissures at its south pole, spraying water ice, organic molecules, and silica nanoparticles into space. Cassini flew through these plumes and detected molecular hydrogen: a potential energy source for microbial life. Our colony perches beside the fissures, sampling what the moon offers freely."
 space_race_colony_events.20.f:0 "A tiny world with an ocean, geysers, and maybe: just maybe: neighbors."
 space_race_colony_events.20.t:0 "Colony: Enceladus"
 space_race_colony_events.21.a:0 "Ice mining and propellant refinery."
 space_race_colony_events.21.b:0 "Saturnian ring observation platform."
 space_race_colony_events.21.d:0 "Saturn's second-largest moon is a quiet, icy body without the drama of its siblings. No geysers, no thick atmosphere, no extreme tidal heating. What Rhea offers is stability: a known, predictable surface of water ice and rock, moderate surface gravity, and a position well-suited for servicing missions throughout the Saturnian system. Sometimes the most valuable real estate is simply the most reliable."
 space_race_colony_events.21.f:0 "Boring is beautiful when you're a billion kilometers from home."
 space_race_colony_events.21.t:0 "Colony: Rhea"
 space_race_colony_events.22.a:0 "Deep installation inside Herschel Crater."
 space_race_colony_events.22.b:0 "Low-gravity research facility."
 space_race_colony_events.22.d:0 "Mimas is instantly recognizable: the Herschel crater, 130 kilometers wide, covers nearly a third of the moon's diameter, giving it an uncanny resemblance to science fiction's most famous space station. The crater's central peak rises 6 kilometers from the floor. Inside this ready-made amphitheater, our engineers have found both shelter from micrometeorites and a natural foundation for pressure domes."
 space_race_colony_events.22.f:0 "That's no moon. Oh wait: it is."
 space_race_colony_events.22.t:0 "Colony: Mimas"
 space_race_colony_events.23.a:0 "Equatorial ridge survey expedition."
 space_race_colony_events.23.b:0 "Dark-side material analysis for organics."
 space_race_colony_events.23.d:0 "Iapetus refuses to be ordinary. One hemisphere is as dark as coal; the other, bright as snow. A massive equatorial ridge: up to 20 kilometers high: girdles the moon like the seam on a tennis ball. No satisfactory explanation exists for either feature. Our colony is positioned on the boundary between dark and light terrain, with the ridge visible as a wall on the horizon."
 space_race_colony_events.23.f:0 "Half dark, half light, with a mountain range that circles its waist."
 space_race_colony_events.23.t:0 "Colony: Iapetus"
 space_race_colony_events.24.a:0 "Settlement in the canyon system, mining exposed rock."
 space_race_colony_events.24.b:0 "Geophysical station studying past tectonic activity."
 space_race_colony_events.24.d:0 "Titania, the largest of Uranus's moons, is a world of great scarps and ancient canyons: evidence of a violent tectonic past. The Messina Chasmata stretches for hundreds of kilometers across the surface. With Uranus tilted on its side, Titania experiences 42-year-long seasons of continuous sunlight followed by 42 years of darkness. Our colony must be truly self-sufficient."
 space_race_colony_events.24.f:0 "Twenty years of noon, then twenty years of midnight. Pack accordingly."
 space_race_colony_events.24.t:0 "Colony: Titania"
 space_race_colony_events.25.a:0 "Deep-space communications relay."
 space_race_colony_events.25.b:0 "Isolated research station."
 space_race_colony_events.25.d:0 "Oberon, the outermost major moon of Uranus, is a battered ball of ice and rock. Its dark, ancient surface is marked by impact craters and what may be cryovolcanic flows on the floors of the largest basins. At nearly 3 billion kilometers from the Sun, our colonists experience a solitude unmatched by any other permanent settlement. The round-trip communication delay with Earth exceeds 5 hours."
 space_race_colony_events.25.f:0 "The most isolated address in human civilization."
 space_race_colony_events.25.t:0 "Colony: Oberon"
 space_race_colony_events.26.a:0 "Verona Rupes base camp: studying the great cliff."
 space_race_colony_events.26.b:0 "Subsurface drilling into the chaotic interior."
 space_race_colony_events.26.d:0 "Miranda is the geological puzzle of the Uranian system. Despite being only 470 kilometers across, it displays terrain that should not exist on a body this small: Verona Rupes, a 20-kilometer cliff: the tallest in the solar system: and chevron-shaped ridged regions called coronae that suggest the moon was shattered and reassembled, or experienced extreme tidal heating in its past."
 space_race_colony_events.26.f:0 "Jump off the tallest cliff in the solar system and you'd have ten minutes to enjoy the view before landing."
 space_race_colony_events.26.t:0 "Colony: Miranda"
 space_race_colony_events.27.a:0 "Cryovolcanic sampling station."
 space_race_colony_events.27.b:0 "Ice quarrying for trans-Uranian fuel supply."
 space_race_colony_events.27.d:0 "Ariel has the youngest and brightest surface of any Uranian moon. Networks of fault valleys and smooth plains suggest relatively recent cryovolcanic resurfacing: perhaps CO₂ or ammonia-water eruptions in the geologically recent past. This level of activity on a small icy body billions of kilometers from the Sun challenges our models of planetary geology. Understanding it could reshape our understanding of how small worlds evolve."
 space_race_colony_events.27.f:0 "The youngest face in an ancient system."
 space_race_colony_events.27.t:0 "Colony: Ariel"
 space_race_colony_events.28.a:0 "Nitrogen geyser energy capture and research."
 space_race_colony_events.28.b:0 "Kuiper Belt gateway staging base."
 space_race_colony_events.28.d:0 "Triton is Neptune's largest moon and almost certainly a captured Kuiper Belt object: it orbits retrograde, the only large moon in the solar system to do so. Active nitrogen geysers jet dark material 8 kilometers into the thin atmosphere. The surface temperature of -235°C makes it one of the coldest bodies ever visited. Despite the extreme conditions, Triton's unique origin makes it a scientific treasure and a natural gateway to the Kuiper Belt."
 space_race_colony_events.28.f:0 "A traveler from the outer dark, caught by Neptune long ago."
 space_race_colony_events.28.t:0 "Colony: Triton"
 space_race_colony_events.29.a:0 "Neptune atmospheric probe relay station."
 space_race_colony_events.29.b:0 "Automated resource extraction outpost."
 space_race_colony_events.29.d:0 "Proteus orbits close to Neptune: so close that tidal forces have stretched it to the limit of what an icy body can sustain without collapsing into a sphere. Dark and irregular, it is a useful platform for studying Neptune's atmosphere, ring arcs, and magnetosphere at close range. The proximity does mean dealing with Neptune's radiation environment, though it is mild compared to Jupiter's."
 space_race_colony_events.29.f:0 "Hanging on the edge of a world of storms."
 space_race_colony_events.29.t:0 "Colony: Proteus"
 space_race_colony_events.3.a:0 "Pressurized settlement exploiting denser atmosphere."
 space_race_colony_events.3.b:0 "Astrobiology lab probing for ancient microbial life."
 space_race_colony_events.3.d:0 "The Hellas impact basin, 7 kilometers below Martian datum, is the deepest point on Mars. The atmospheric pressure at the basin floor is nearly double that of the Martian average: still far from breathable, but enough to simplify pressure vessel engineering and offer slightly better radiation protection. Orbital surveys have identified promising signs of ancient microbial fossils in the layered sediments."
 space_race_colony_events.3.f:0 "At the bottom of Mars, the sky presses just a little closer."
 space_race_colony_events.3.t:0 "Colony: Hellas Planitia"
 space_race_colony_events.30.a:0 "Dual-body research complex spanning both worlds."
 space_race_colony_events.30.b:0 "Nitrogen ice harvesting on Sputnik Planitia."
 space_race_colony_events.30.d:0 "Pluto and Charon orbit each other as a true binary system: tidally locked, always showing the same face. Pluto's nitrogen glaciers flow slowly across Sputnik Planitia, a 1,000-kilometer basin of frozen nitrogen ice. The thin atmosphere freezes and refreezes in a centuries-long cycle. Charon's scarred surface tells of ancient cryovolcanism. Our dual-body colony spans both worlds, connected by regular shuttle service across the 19,570-kilometer gap."
 space_race_colony_events.30.f:0 "Two worlds dancing in the dark, and we dance with them."
 space_race_colony_events.30.t:0 "Colony: Pluto-Charon"
 space_race_colony_events.31.a:0 "Extreme-distance self-sufficiency test."
 space_race_colony_events.31.b:0 "Oort Cloud approach monitoring station."
 space_race_colony_events.31.d:0 "Eris, the most massive known dwarf planet, orbits at three times Pluto's distance. The round-trip light delay to Earth exceeds 26 hours. Our colonists must operate with a degree of autonomy unmatched by any other settlement. Eris's small moon Dysnomia provides a convenient observing platform. This colony is above all a test of self-sufficiency: if we can sustain human life here, we can sustain it anywhere in the solar system."
 space_race_colony_events.31.f:0 "So far away that even light takes half a day to find us."
 space_race_colony_events.31.t:0 "Colony: Eris"
 space_race_colony_events.32.a:0 "Methane ice chemistry laboratory."
 space_race_colony_events.32.b:0 "Solar wind research approaching the heliopause."
 space_race_colony_events.32.d:0 "Makemake's surface is coated in methane and ethane ice that shifts in spectral properties as the dwarf planet's elliptical orbit carries it nearer and farther from the distant Sun. With no known atmosphere and no confirmed moons for years after its discovery: until tiny S/2015 (136472) 1 was spotted: Makemake offers a pristine laboratory for studying the primordial composition of the outer solar system."
 space_race_colony_events.32.f:0 "Frozen since the birth of the Sun, and we are the first to disturb it."
 space_race_colony_events.32.t:0 "Colony: Makemake"
 space_race_colony_events.33.a:0 "Rotational dynamics laboratory."
 space_race_colony_events.33.b:0 "Ring and moon system study platform."
 space_race_colony_events.33.d:0 "Haumea rotates once every four hours: the fastest rotation of any known large body in the solar system. This furious spin has stretched it into an elongated ellipsoid, wider than it is tall. It also possesses a dark ring system, one of the few ring systems known around a body other than the giant planets. Two small moons, Hi'iaka and Namaka, orbit amid the ring debris. Our colony platform must account for the rapid rotation in everything from docking to power generation."
 space_race_colony_events.33.f:0 "Egg-shaped, ringed, and spinning like a top. Nature's strangest creation."
 space_race_colony_events.33.t:0 "Colony: Haumea"
 space_race_colony_events.34.a:0 "Humanity's most distant outpost: a monument to ambition."
 space_race_colony_events.34.b:0 "Interstellar medium research station."
 space_race_colony_events.34.d:0 "Sedna occupies one of the most extreme orbits known: a 11,400-year ellipse that carries it from 76 AU at perihelion to over 900 AU at aphelion: deep into the inner Oort Cloud. We have caught it near perihelion, when it is: by its standards: close. Our outpost here is the most distant permanent human habitation, farther from the Sun than any settlement has ever been or likely will be for generations. The Sun is barely distinguishable from the brighter stars."
 space_race_colony_events.34.f:0 "At the edge of the Sun's dominion, we plant our furthest flag."
 space_race_colony_events.34.t:0 "Colony: Sedna"
 space_race_colony_events.4.a:0 "Ice extraction and water processing facility."
 space_race_colony_events.4.b:0 "Agricultural domes: first Martian farmland."
 space_race_colony_events.4.d:0 "The vast northern lowlands of Utopia Planitia are among the smoothest terrain on Mars: ideal for large-scale construction. Radar surveys have confirmed extensive subsurface ice deposits within meters of the surface. This ice represents both the colony's water supply and a feedstock for propellant manufacturing. The question is how best to use this resource."
 space_race_colony_events.4.f:0 "Beneath this plain lies an ocean of ice, waiting to become an ocean of possibility."
 space_race_colony_events.4.t:0 "Colony: Utopia Planitia"
 space_race_colony_events.5.a:0 "Civilian residential colony."
 space_race_colony_events.5.b:0 "Military-grade outpost securing the northern approach."
 space_race_colony_events.5.d:0 "Arcadia Planitia's mid-northern latitude offers the best compromise between solar energy availability and near-surface ice access on Mars. The terrain is relatively flat, the ice table is shallow, and the seasonal temperature variations are among the mildest on the planet. If Mars will ever have a true city: not just a research station: this is where it begins."
 space_race_colony_events.5.f:0 "Temperate by Martian standards means only 140 days below minus 80."
 space_race_colony_events.5.t:0 "Colony: Arcadia Planitia"
 space_race_colony_events.6.a:0 "Deep-space waystation and refueling depot."
 space_race_colony_events.6.b:0 "Scientific observatory for the outer solar system."
 space_race_colony_events.6.d:0 "Ceres, the largest body in the asteroid belt, has been a target since the early days of spaceflight planning. With a surface gravity of only 0.03g, water ice confirmed across its surface, and a strategic position between Mars and Jupiter, it is the natural waystation for deep-space operations. The bright spots of Occator Crater: sodium carbonate deposits from subsurface brine: hint at a geologically active interior."
 space_race_colony_events.6.f:0 "Halfway between everywhere, surrounded by everything we need."
 space_race_colony_events.6.t:0 "Colony: Ceres"
 space_race_colony_events.7.a:0 "Metal extraction from the exposed mantle."
 space_race_colony_events.7.b:0 "Planetary science lab studying proto-planet geology."
 space_race_colony_events.7.d:0 "Vesta is a differentiated proto-planet: it has a core, mantle, and crust, surviving intact from the solar system's formation. The south pole bears the Rheasilvia impact basin: a colossal scar that exposed the mantle. This exposed interior rock is rich in metals and silicates, accessible without deep mining. It is as if the asteroid was cracked open for us."
 space_race_colony_events.7.f:0 "A world turned inside out by ancient violence."
 space_race_colony_events.7.t:0 "Colony: 4 Vesta"
 space_race_colony_events.8.a:0 "Full-scale industrial mining operation."
 space_race_colony_events.8.b:0 "Careful extraction to preserve scientific value."
 space_race_colony_events.8.d:0 "Psyche is almost pure metal: the stripped core of a proto-planet whose rocky layers were blasted away in primordial collisions. It is composed primarily of iron and nickel, with traces of gold, platinum, and other precious metals. Conservative estimates value its mineral wealth in the quintillions. The question is not whether to mine it, but whether the influx of metals will destabilize terrestrial commodity markets."
 space_race_colony_events.8.f:0 "A world made of money. The economists are more frightened than the engineers."
 space_race_colony_events.8.t:0 "Colony: 16 Psyche"
 space_race_colony_events.9.a:0 "Carbon-rich material processing for composites."
 space_race_colony_events.9.b:0 "Astronomical observatory platform."
 space_race_colony_events.9.d:0 "Pallas is an oddity: a carbon-rich proto-planet with an extreme axial tilt of 84 degrees, making it spin nearly on its side. Its dark surface is rich in carbonaceous material: the building blocks of organic chemistry and composite manufacturing feedstock. The unusual tilt creates bizarre seasonal lighting conditions that will challenge our habitat designers."
 space_race_colony_events.9.f:0 "A world that rolls through space like a ball rather than spinning like a top."
 space_race_colony_events.9.t:0 "Colony: 2 Pallas"

#
# SPACE_RACE_EVENTS
#
 space_race_events.1.a:0 "A triumph for [ROOT.GetCountry.GetName]!"
 space_race_events.1.b:0 "Channel this momentum into the next frontier."
 space_race_events.1.d:0 "A [ROOT.GetCountry.GetAdjectiveNoFormatting] rocket has punched through the upper atmosphere and returned its pilot safely. For a few breathless minutes, a citizen of [ROOT.GetCountry.GetName] was closer to the stars than any human being has ever been."
 space_race_events.1.f:0 "\"I could see the curvature of the Earth. The horizon was a thin blue line, and beyond it, nothing but black. The flight lasted eight minutes. It was very cold.\""
 space_race_events.1.t:0 "The Edge of the Sky"
 space_race_events.10.a:0 "Investigate the cause and rebuild."
 space_race_events.10.b:0 "Perhaps a more cautious approach is warranted."
 space_race_events.10.c:0 "We cannot afford to slow down now."
 space_race_events.10.d:0 "The ambitious timeline has claimed its toll. A catastrophic failure during testing has destroyed the mission vehicle and set our program back significantly. Engineers scramble through the wreckage while government officials demand answers."
 space_race_events.10.f:0 "\"They said we were going too fast. They were right. But we had no choice: the others are breathing down our necks.\"\n\n- Senior Engineer, standing amid the ruins of the launch complex\n\n\"Fix it. Fix it and fly again. That's all we can do.\"\n\n- Program Director, three hours after the explosion"
 space_race_events.10.t:0 "A Costly Miscalculation"
 space_race_events.11.a:0 "A setback, but not a disaster."
 space_race_events.11.b:0 "Redirect resources while we regroup."
 space_race_events.11.d:0 "A technical anomaly has forced a mission delay. While no lives were lost, the issue demands careful investigation before the program can resume. Engineers believe the root cause is well understood, but weeks of lost time cannot be recovered."
 space_race_events.11.f:0 "\"It's a valve. A single valve, and two weeks to replace it. Two weeks we didn't have.\"\n\n- Lead Propulsion Engineer"
 space_race_events.11.t:0 "Technical Difficulties"
 space_race_events.12.a:0 "Rebuild the pad and investigate the cause."
 space_race_events.12.b:0 "Redesign the fuel handling system entirely."
 space_race_events.12.c:0 "Rush a replacement vehicle to the next pad."
 space_race_events.12.d:0 "The fuel ignited without warning. The launch vehicle was consumed in a fireball that could be seen for miles, reducing the launch complex to twisted metal and scorched concrete. Miraculously, the pad crew escaped the blast radius: but the vehicle and months of preparation are gone."
 space_race_events.12.f:0 "\"The cameras caught it all. Three seconds from nominal readings to complete destruction. The fuel manifold ruptured at the coupling: a joint we'd tested a hundred times.\"\n\n- Lead Propulsion Engineer, reviewing telemetry in the aftermath"
 space_race_events.12.t:0 "Inferno on the Pad"
 space_race_events.13.a:0 "Reorient the deep-space antenna network."
 space_race_events.13.b:0 "Begin construction of a backup probe."
 space_race_events.13.c:0 "Assume it's still on course: wait and see."
 space_race_events.13.d:0 "Contact with the probe has been lost. The last telemetry showed nominal operations, then: silence. The deep-space network rotates its dishes, sweeping the sky where the probe should be, but receives nothing. Hundreds of millions of miles away, our creation drifts in the void, deaf and mute."
 space_race_events.13.f:0 "\"We're listening on every frequency. The probe knows how to call home: if it still can.\"\n\n- Tracking Station Director, 72 hours after signal loss\n\n\"Build another one. We've lost probes before. We've never stopped sending them.\"\n\n- Chief Scientist"
 space_race_events.13.t:0 "Silence from the Deep"
 space_race_events.14.a:0 "Emergency seal and full structural review."
 space_race_events.14.b:0 "Evacuate to backup shelter and redesign."
 space_race_events.14.c:0 "Patch it and continue: the crew is willing."
 space_race_events.14.d:0 "Alarms tore through the habitat module at 0347 local time. A microcrack in the hull: missed by inspection, aggravated by thermal cycling: had become a breach. Atmospheric pressure dropped thirty percent before emergency systems engaged. The crew sealed the affected section, but the damage to both equipment and morale is immense."
 space_race_events.14.f:0 "\"You hear the air leaving. That's the sound you train for but pray you never hear. A whistle that gets higher as the pressure drops.\"\n\n- Mission Commander, post-incident debrief"
 space_race_events.14.t:0 "Breach in the Night"
 space_race_events.15.a:0 "Abort the landing: bring them home safe."
 space_race_events.15.b:0 "Let the pilot take manual control."
 space_race_events.15.c:0 "Switch to the safe approach and recalibrate."
 space_race_events.15.d:0 "Twelve minutes from the surface, the guidance computer began issuing contradictory commands. The descent trajectory, calculated to thread the needle between crater walls, was suddenly unreliable. The crew stared at instruments that told them they were simultaneously too high and too low. In mission control, a terrible decision waited."
 space_race_events.15.f:0 "\"Computer says go. Computer says no-go. Computer says-\" The pilot's hand hovered over the manual override switch. Everything they'd trained for came down to this.\n\n- Voice recording, descent communications log"
 space_race_events.15.t:0 "The Computer Says No"
 space_race_events.16.a:0 "Activate emergency separation bolts."
 space_race_events.16.b:0 "Ground the fleet and redesign the interstage."
 space_race_events.16.c:0 "Classify it as an anomaly: fly again."
 space_race_events.16.d:0 "The first stage performed flawlessly. Then came the moment of separation: and the explosive bolts failed to fire. The second stage ignited with the first still attached, creating a violent tumbling motion that overwhelmed attitude control. The vehicle broke apart seconds later, scattering debris across a hundred-mile corridor downrange."
 space_race_events.16.f:0 "\"Separation: negative. Negative sep. We have a tumble. Flight, we have a tumble.\"\n\n- Range Safety Officer, final transmission before vehicle destruction\n\n\"All those engines worked perfectly. It was eight bolts that didn't.\"\n\n- Chief Engineer, in the review board"
 space_race_events.16.t:0 "The Bolts That Didn't Fire"
 space_race_events.17.a:0 "Evacuate the crew member immediately."
 space_race_events.17.b:0 "Treat in place with telemedicine support."
 space_race_events.17.c:0 "Use this crisis to advance space medicine."
 space_race_events.17.d:0 "The mission surgeon's report was blunt: acute cardiac arrhythmia, likely triggered by prolonged microgravity adaptation. The affected crew member is stable but in no condition to continue operations. With the nearest hospital millions of miles away, every minute of delay in treatment is a risk calculation that no protocol fully covers."
 space_race_events.17.f:0 "\"We trained for this scenario. We just never thought it would actually happen: not to our crew, not this far from home.\"\n\n- Flight Surgeon, speaking to the press after the decision was announced"
 space_race_events.17.t:0 "Heart of the Mission"
 space_race_events.18.a:0 "Launch a public inquiry and restore trust."
 space_race_events.18.b:0 "Restructure management quietly."
 space_race_events.18.c:0 "Blame foreign interference and press on."
 space_race_events.18.d:0 "Investigative journalists have uncovered evidence of systematic cost overruns, falsified safety certifications, and a culture of schedule pressure that silenced engineers who raised concerns. The revelations threaten to erode public confidence in the entire space program just as it reaches a critical phase."
 space_race_events.18.f:0 "\"The reports were filed. The warnings were given. Management chose the launch date over the data.\"\n\n- Anonymous whistleblower, quoted in the morning papers\n\n\"We will find out exactly what happened, and heads will roll.\"\n\n- Parliamentary Committee Chair"
 space_race_events.18.t:0 "The Paper Trail"
 space_race_events.19.a:0 "Full security sweep of all systems."
 space_race_events.19.b:0 "Launch a counterintelligence investigation."
 space_race_events.19.c:0 "Harden our systems and press on."
 space_race_events.19.d:0 "Anomalous tool marks on a critical fuel line. An access log showing unauthorized entries at 3 AM. A suspiciously precise failure that destroyed exactly the component most difficult to replace. Intelligence officials suspect deliberate sabotage: perhaps from a rival power that cannot afford to see us succeed."
 space_race_events.19.f:0 "\"Coincidence has a pattern, and this pattern spells intent. Someone wanted this vehicle to fail.\"\n\n- Head of Program Security\n\n\"Or we just had a bad batch of titanium fittings. Let's not start an international incident over metallurgy.\"\n\n- Chief Engineer, urging caution"
 space_race_events.19.t:0 "Shadows on the Launchpad"
 space_race_events.2.a:0 "History will remember this day!"
 space_race_events.2.b:0 "The satellite applications are what truly matter."
 space_race_events.2.c:0 "The military implications are significant."
 space_race_events.2.d:0 "A [ROOT.GetCountry.GetAdjectiveNoFormatting] astronaut has completed a full orbit of the Earth and returned safely. The achievement electrifies the nation and sends shockwaves through rival capitals. From this day forward, no corner of the globe is beyond our reach."
 space_race_events.2.f:0 "\"I saw continents slide beneath me like countries on a schoolroom globe. Borders meant nothing up there. Just Earth, spinning in the void."
 space_race_events.2.t:0 "Around the World"
 space_race_events.20.a:0 "We must not fall behind."
 space_race_events.20.b:0 "Congratulate them: and learn from their success."
 space_race_events.20.d:0 "A rival nation has achieved a significant space milestone. Their flag flies in a place ours has not yet reached. The news dominates headlines and sparks urgent conversations in the halls of government."
 space_race_events.20.f:0 "\"They did it first. The question is no longer whether we can match them, but how quickly.\"\n\n- Unnamed Military Advisor"
 space_race_events.20.t:0 "Eclipsed"
 space_race_events.21.a:0 "Wait for the proper parts to arrive."
 space_race_events.21.b:0 "Source from an alternative supplier."
 space_race_events.21.c:0 "Develop domestic manufacturing capability."
 space_race_events.21.d:0 "A critical shipment of precision-machined components has been delayed indefinitely. The supplier cites raw material shortages and unexpected demand, but the result is the same: our integration schedule just slipped by weeks. Without these parts, the vehicle sits incomplete on the assembly floor."
 space_race_events.21.f:0 "\"You can't fly to space on promises. You need machined titanium, and right now there's a six-week backlog at every forge on the continent.\"\n\n- Program Logistics Director"
 space_race_events.21.t:0 "The Missing Parts"
 space_race_events.22.a:0 "Wait for the next launch window."
 space_race_events.22.b:0 "Attempt to launch in marginal conditions."
 space_race_events.22.d:0 "A massive storm system has settled over the launch site with no sign of departure. Upper-level wind shear readings exceed every safety margin in the book. The vehicle stands ready on the pad, fully fueled and flight-capable: waiting for weather that refuses to cooperate. Each day of delay costs money and, more critically, narrows the orbital mechanics window."
 space_race_events.22.f:0 "\"Nature doesn't care about our launch schedule. The jet stream is where it wants to be, and we will wait.\"\n\n- Range Weather Officer, morning briefing"
 space_race_events.22.t:0 "Grounded by the Sky"
 space_race_events.23.a:0 "Full code audit of all flight systems."
 space_race_events.23.b:0 "Patch the specific bug and continue testing."
 space_race_events.23.c:0 "Rewrite the flight software from scratch."
 space_race_events.23.d:0 "A simulation run caught it: a floating-point rounding error in the attitude control subroutine. In normal operations it would accumulate unnoticed over hours, but during a critical burn sequence it would compound into a navigation error of several degrees: enough to miss a planetary target entirely or, worse, point the main engine in the wrong direction."
 space_race_events.23.f:0 "\"Line 4,217 of module AOCS_PRIMARY. A less-than that should have been a less-than-or-equal-to. Two characters, and it would have cost us the mission.\"\n\n- Lead Software Engineer, looking very pale"
 space_race_events.23.t:0 "Two Characters"
 space_race_events.24.a:0 "Defend the program before the committee."
 space_race_events.24.b:0 "Push through cost-cutting measures."
 space_race_events.24.c:0 "Appeal directly to the public."
 space_race_events.24.d:0 "The Budget Committee has summoned the program director for testimony. With domestic priorities competing for funds and no tangible return yet visible to the average voter, influential legislators are questioning whether the nation can justify the expense. The program's future hangs on a hearing room presentation."
 space_race_events.24.f:0 "\"Senator, I understand the cost concerns. But I would remind the committee that our rivals are not holding budget hearings: they are building rockets.\"\n\n- Program Director, opening statement"
 space_race_events.24.t:0 "The Price of the Stars"
 space_race_events.25.a:0 "Return the defective parts and demand replacements."
 space_race_events.25.b:0 "Bring manufacturing in-house."
 space_race_events.25.d:0 "Quality inspection has flagged an entire batch of turbopump impellers: the tolerances are outside specification by microns, but in a system operating at thousands of RPM and extreme temperatures, microns matter. Every unit in the last three months of production must be pulled and re-inspected. Some are already installed in vehicles being prepared for launch."
 space_race_events.25.f:0 "\"Microns. We're talking about the width of a bacterium. And it's enough to shatter a turbopump at full thrust.\"\n\n- Chief Quality Inspector, examining the impeller under magnification"
 space_race_events.25.t:0 "Microns of Failure"
 space_race_events.26.a:0 "Absorb the disruption: space transcends politics."
 space_race_events.26.b:0 "Rally national pride around the program."
 space_race_events.26.c:0 "Offer the space program as a diplomatic tool."
 space_race_events.26.d:0 "A sudden deterioration in international relations has disrupted the space program's operations. Foreign-sourced components are stuck in customs. Tracking station access in allied nations is now politically sensitive. Technical exchange agreements signed in better times are being quietly frozen by nervous diplomats."
 space_race_events.26.f:0 "\"We had a handshake agreement with their space agency: data sharing, tracking support, the works. Now their foreign ministry won't return our calls.\"\n\n- International Cooperation Director"
 space_race_events.26.t:0 "When Politics Reaches Orbit"
 space_race_events.3.a:0 "The crater's secrets are ours to unlock."
 space_race_events.3.b:0 "A solid foundation for the future."
 space_race_events.3.c:0 "One small step, one giant leap."
 space_race_events.3.d:0 "Billions watch as the lander touches down on the lunar surface. The first human feet press into regolith that has lain undisturbed since the formation of the solar system. A flag is planted, instruments are deployed, and for a brief shining moment the divisions of Earth seem impossibly petty."
 space_race_events.3.f:0 "\"Mission Control: we have landed. The surface is fine and powdery. I can see our boot prints stretching back to the lander. It is... quiet here. Quiet in a way that has no earthly comparison.\"\n\n- First words from the lunar surface"
 space_race_events.3.t:0 "The Eagle Has Landed"
 space_race_events.30.a:0 "Excellent data. Press forward."
 space_race_events.30.b:0 "Let the world see what we have accomplished."
 space_race_events.30.d:0 "A test vehicle has successfully reached the edge of space and returned intact. The telemetry data exceeds expectations: the heat shield performed flawlessly and the guidance systems achieved remarkable precision."
 space_race_events.30.f:0 "\"She flew straight and true. If the numbers hold, we're ready for a human payload within months.\"\n\n- Chief Test Engineer, reviewing flight data"
 space_race_events.30.t:0 "Promising Trajectory"
 space_race_events.31.a:0 "Invest in orbital debris management."
 space_race_events.31.b:0 "The debris can wait: we cannot."
 space_race_events.31.c:0 "Propose an international framework."
 space_race_events.31.d:0 "As our orbital program accelerates, so does the cloud of spent rocket stages, dead satellites, and assorted debris accumulating in low Earth orbit. Scientists warn that an uncontrolled cascade could render entire orbital bands unusable."
 space_race_events.31.f:0 "\"Every bolt, every fleck of paint up there is a bullet at orbital velocity. We're building a minefield around our own planet.\"\n\n- Orbital Dynamics Researcher\n\n\"A manageable problem: if we manage it now rather than later.\"\n\n- Space Agency Deputy Director"
 space_race_events.31.t:0 "The Kessler Threshold"
 space_race_events.32.a:0 "Military pilots have the right stuff."
 space_race_events.32.b:0 "Open it to civilians: inspire the nation."
 space_race_events.32.c:0 "An international crew speaks louder than flags."
 space_race_events.32.d:0 "Applications for the astronaut program have flooded in: thousands of hopefuls from every walk of life. The selection committee must decide the character of the crew that will represent [ROOT.GetCountry.GetName] on the Moon."
 space_race_events.32.f:0 "\"I was a schoolteacher before this. Now they tell me I might walk on the Moon. My students think I've gone mad.\"\n\n- Astronaut Candidate #4,417\n\n\"We need flyers, not dreamers. Test pilots who've stared death in the face and told it to wait.\"\n\n- Selection Board Chairman"
 space_race_events.32.t:0 "Who Goes to the Moon?"
 space_race_events.33.a:0 "Redirect to the water-rich site immediately."
 space_race_events.33.b:0 "Stick to the original plan."
 space_race_events.33.d:0 "Orbital surveys of Mars have revealed spectroscopic signatures consistent with subsurface water ice in a region near the planned landing zone. If confirmed, this discovery could dramatically simplify in-situ resource utilization for a permanent base."
 space_race_events.33.f:0 "\"Water is life. Water is fuel. Water is everything on Mars. If that ice is real, we just found our front door.\"\n\n- Mission Geologist"
 space_race_events.33.t:0 "Water on Mars"
 space_race_events.34.a:0 "Maximize the payload: we may not get another chance."
 space_race_events.34.b:0 "Strip to essentials: speed is everything."
 space_race_events.34.c:0 "International consortium: shared instruments."
 space_race_events.34.d:0 "Our interstellar probe design has reached a critical decision point. The mass budget is finite, and every kilogram trades against delta-v. Our scientists are divided: some want to maximize the instrument suite: cameras, spectrometers, magnetometers, a radar sounder: arguing that we may never send another. Others insist on stripping down to essentials to shave years off the transit time. A third faction proposes opening the instrument slots to international partners."
 space_race_events.34.f:0 "Every gram is a bargain between knowledge and time."
 space_race_events.34.t:0 "The Instrument Debate"
 space_race_events.35.a:0 "National supply chain: full control."
 space_race_events.35.b:0 "Multi-national logistics: shared costs."
 space_race_events.35.c:0 "Let private enterprise lead: faster turnaround."
 space_race_events.35.d:0 "As our colonization program expands, the logistics have become a system unto themselves. Launch windows, orbital mechanics, delta-v budgets, radiation exposure limits for perishable cargo: our planners must coordinate across dozens of variables to keep the settlements supplied. A debate has emerged about how to structure the interplanetary supply chain."
 space_race_events.35.f:0 "The tyranny of the rocket equation respects no schedule."
 space_race_events.35.t:0 "Supply Chain to the Stars"
 space_race_events.36.a:0 "Begin extraction operations."
 space_race_events.36.b:0 "Study the deposits thoroughly first."
 space_race_events.36.c:0 "License extraction to private industry."
 space_race_events.36.d:0 "Geological surveys of the lunar base's surrounding terrain have uncovered deposits of Helium-3 far richer than predicted. This isotope, precious fuel for fusion reactors, could transform the Moon from a scientific outpost into an economic engine."
 space_race_events.36.f:0 "\"We came here for science. We may stay for profit.\"\n\n- Lunar Base Commander, reviewing the geological survey data\n\n\"The Moon isn't just a stepping stone anymore. It's a gold mine: and every spacefaring nation knows it.\"\n\n- Economic correspondent, broadcasting from Earth"
 space_race_events.36.t:0 "Lunar Helium-3"
 space_race_events.37.a:0 "Show the world what lies beyond."
 space_race_events.37.b:0 "Analyze the data before releasing it."
 space_race_events.37.d:0 "Our deep space probe has transmitted the first high-resolution images of the outer solar system back to Earth. The photographs reveal stunning detail: the swirling bands of gas giants, the cracked ice of distant moons, rings lit by a Sun that is little more than a bright star."
 space_race_events.37.f:0 "\"They're just photographs. Light captured by a machine billions of kilometers away. But when I saw them... I wept. I think everyone in the control room did.\"\n\n- Probe Mission Director"
 space_race_events.37.t:0 "Pale Blue Dot"
 space_race_events.4.a:0 "Share our discoveries with the world."
 space_race_events.4.b:0 "The data is ours. National advantage first."
 space_race_events.4.d:0 "After years of patient waiting, our deep space probe has transmitted its final data package from the outer solar system. The images and measurements will occupy scientists for decades: gas giants resolved in breathtaking detail, moons that may harbor subsurface oceans, and readings of conditions no human instrument has ever measured."
 space_race_events.4.f:0 "\"The signal took four hours to reach us. Four hours of light crawling across the void. And when it arrived: Jupiter, fully resolved, as no human eye has ever seen it. We built something that outlived its creators' retirement.\"\n\n- Probe Communications Lead, aged seventy-three"
 space_race_events.4.t:0 "Voices from the Void"
 space_race_events.40.a:0 "Active magnetic shielding: deflect the particles."
 space_race_events.40.b:0 "Water-wall passive shielding: proven physics."
 space_race_events.40.c:0 "Accept higher dose limits and fly lighter."
 space_race_events.40.d:0 "Dosimetry data from test flights reveals that radiation exposure beyond the magnetosphere exceeds initial models. The Van Allen belts and galactic cosmic rays present a serious obstacle to long-duration crewed missions. Engineers must decide how to shield the crew without exceeding the mass budget."
 space_race_events.40.f:0 "\"A centimeter of aluminum stops nothing out there. The protons go straight through. We need mass: or magnets: or both.\"\n\n- Radiation Protection Officer, reviewing dosimetry results\n\n\"Every kilogram of shielding is a kilogram we can't use for propellant or life support. The equation is unforgiving.\"\n\n- Chief Mission Architect"
 space_race_events.40.t:0 "The Invisible Storm"
 space_race_events.41.a:0 "Invest in electromagnetic launch assist."
 space_race_events.41.b:0 "Leverage existing infrastructure."
 space_race_events.41.c:0 "Conventional chemical rockets: reliable, expensive."
 space_race_events.41.d:0 "Cost analysis of the current mission profile is sobering. Every kilogram delivered to the lunar or Martian surface costs orders of magnitude more than its Earth-side equivalent. The program's economics depend entirely on reducing the cost per kilogram to orbit."
 space_race_events.41.f:0 "\"Tsiolkovsky's equation doesn't negotiate. You either throw more mass out the back or you find a way around the equation entirely.\"\n\n- Senior Propulsion Engineer\n\n\"The elevator changes everything: if we have one. If we don't, it's chemical rockets all the way, and the budget bleeds.\"\n\n- Program Financial Controller"
 space_race_events.41.t:0 "The Tyranny of the Rocket Equation"
 space_race_events.42.a:0 "Develop autonomous AI decision-support systems."
 space_race_events.42.b:0 "Build a laser relay network to reduce latency."
 space_race_events.42.c:0 "Train the crew for complete independence."
 space_race_events.42.d:0 "At opposition, the signal delay between Earth and Mars ranges from four to twenty-four minutes each way. Any crisis on the Martian surface must be resolved by the crew before Mission Control even learns about it. The implications for spacecraft autonomy and crew training are profound."
 space_race_events.42.f:0 "\"By the time they hear us scream, we'll already be dead or saved. That's the math.\"\n\n- Mars Transit Crew Commander, during pre-flight simulation\n\n\"We're not just sending people to Mars. We're sending a self-contained civilization that happens to receive very delayed mail from Earth.\"\n\n- Communications Systems Lead"
 space_race_events.42.t:0 "Twenty Minutes of Silence"
 space_race_events.43.a:0 "Full bioregenerative system: living machinery."
 space_race_events.43.b:0 "Hybrid chemical-biological: engineered redundancy."
 space_race_events.43.c:0 "Import consumables from Earth: simple but fragile."
 space_race_events.43.d:0 "Long-duration habitation requires a life-support system that recycles nearly everything: air, water, and waste: with minimal resupply from Earth. Current recycling rates hover around 90%, but sustained habitation demands 98% or better. The engineering challenge is as much biological as mechanical."
 space_race_events.43.f:0 "\"A submarine can stay sealed for six months. We need to stay sealed for years. The difference isn't engineering: it's ecology. We're building a biosphere in a tin can.\"\n\n- Life Support Systems Lead\n\n\"The algae reactors are the lungs. The bacterial processors are the kidneys. If either fails, everyone dies together. No pressure.\"\n\n- Lead Bioengineer, with a humorless smile"
 space_race_events.43.t:0 "The Loop Must Close"
 space_race_events.44.a:0 "Emergency shelter protocols: protect the crew."
 space_race_events.44.b:0 "Our shielding should hold. Continue operations."
 space_race_events.44.d:0 "Solar monitoring stations detect a massive coronal ejection directed toward the inner solar system. Within hours, a wave of charged particles will sweep across the path of our current mission assets. Crew and sensitive electronics are at risk."
 space_race_events.44.f:0 "\"The Sun just threw a billion tons of plasma at us. We have about fourteen hours to get everyone behind the water wall or into the storm shelter.\"\n\n- Solar Weather Officer, alarm sounding in the background"
 space_race_events.44.t:0 "Coronal Mass Ejection Warning"
 space_race_events.45.a:0 "Direct Jupiter slingshot: fastest path outward."
 space_race_events.45.b:0 "Venus-Earth-Jupiter triple assist: more data, longer flight."
 space_race_events.45.c:0 "Ion drive on a direct trajectory: no gravity tricks."
 space_race_events.45.d:0 "The navigation team presents three trajectory options for the outer system probe. Each uses different combinations of planetary gravity assists to reach the target. The choice of trajectory determines not only travel time but which planets the probe will photograph along the way."
 space_race_events.45.f:0 "\"We're going to throw a spacecraft at Jupiter and miss on purpose. Jupiter's gravity will grab it, spin it around, and fling it toward Saturn faster than any rocket could. Free delta-v: courtesy of Kepler and Newton.\"\n\n- Orbital Mechanics Lead, briefing the program director"
 space_race_events.45.t:0 "Slingshot Trajectories"
 space_race_events.46.a:0 "Focus on oxygen and water extraction: proven chemistry."
 space_race_events.46.b:0 "Attempt metal smelting from local ores: ambitious but transformative."
 space_race_events.46.d:0 "The first in-situ resource utilization tests have been completed. Automated processors have successfully extracted oxygen from regolith samples, demonstrating that future missions need not carry all their consumables from Earth. The question now is how far to push the technology."
 space_race_events.46.f:0 "\"We baked Moon dust at 900 degrees and got breathable oxygen. Not a lot: a few liters per hour: but it works. The physics works. Everything else is scaling.\"\n\n- ISRU Test Lead, from the surface operations module"
 space_race_events.46.t:0 "Living Off the Land"
 space_race_events.47.a:0 "Repair and resume: standard operating procedure."
 space_race_events.47.b:0 "Redesign with enhanced Whipple shielding."
 space_race_events.47.d:0 "A micrometeorite: no larger than a grain of sand, but traveling at 20 kilometers per second: has struck one of our orbital assets. The impact punctured the outer hull and damaged a secondary system. Standard Whipple shielding absorbed most of the kinetic energy, but the incident underscores the constant hazard of operating in the debris environment."
 space_race_events.47.f:0 "\"A pebble. A pebble at seven times the speed of a rifle bullet. Out here, even dust is ammunition.\"\n\n- Station Damage Assessment Officer, examining the fist-sized crater in the hull"
 space_race_events.47.t:0 "Impact at Orbital Velocity"
 space_race_events.48.a:0 "Mandatory psychological screening and crew rotation."
 space_race_events.48.b:0 "VR communication suites: bring Earth to them."
 space_race_events.48.c:0 "Select for psychological resilience above all else."
 space_race_events.48.d:0 "Psych evaluations from the latest long-duration crew reveal troubling patterns: increased irritability, withdrawal, sleep disruption, and what the psychologists are calling 'Earth-longing': a persistent, low-grade grief for the planet they left behind. Mission performance remains adequate, but the human cost of isolation is becoming measurable."
 space_race_events.48.f:0 "\"I dreamed of rain last night. Real rain, not the recycled shower. I stood in a field and let it hit my face. When I woke up, I couldn't stop crying. This place is going to break us if we don't find a way to stay human out here.\"\n\n- Anonymous crew journal entry, flagged by the monitoring AI\n\n\"Morale is a consumable. We are learning: too late: how quickly it depletes.\"\n\n- Mission Psychologist, in a classified report to the program director"
 space_race_events.48.t:0 "The Long Dark"
 space_race_events.49.a:0 "Build the depot: a permanent orbital gas station."
 space_race_events.49.b:0 "Research in-orbit propellant manufacturing instead."
 space_race_events.49.d:0 "Engineers propose constructing an orbital propellant depot: a refueling station in low Earth orbit where spacecraft can top off their tanks before departing for deep space. The concept would revolutionize mission architecture by decoupling launch mass from mission delta-v requirements."
 space_race_events.49.f:0 "\"Stop trying to carry everything in one launch. Put the fuel up there first, park it in orbit, and then your deep-space ship can be half the size. It's not rocket science: well, it is, but it's good rocket science.\"\n\n- Orbital Depot Concept Lead, presenting to the program board"
 space_race_events.49.t:0 "Fuel in the Void"
 space_race_events.5.a:0 "Target Shackleton Crater: fortune favors the bold."
 space_race_events.5.b:0 "The Equatorial Plain is the sensible choice."
 space_race_events.5.c:0 "Let the scientists decide."
 space_race_events.5.d:0 "The lunar landing site selection committee has narrowed the options to two candidates. Shackleton Crater near the south pole offers access to permanently shadowed regions that may contain water ice: scientifically invaluable but extremely hazardous. The Equatorial Plain offers well-mapped terrain and reliable conditions, but less dramatic scientific return."
 space_race_events.5.f:0 "\"Shackleton is a geologist's dream and a pilot's nightmare. The crater rim gets sunlight, but one degree off course and you're in permanent shadow at minus 170 Celsius.\"\n\n- Landing Site Review Board\n\n\"The equatorial sites are boring. Safe, yes. But boring. And boring doesn't win the space race.\"\n\n- Program Chief Scientist"
 space_race_events.5.t:0 "Where the Eagle Shall Land"
 space_race_events.50.a:0 "Public-private partnership: combine our strengths."
 space_race_events.50.b:0 "Let the company take the lead."
 space_race_events.50.c:0 "Keep the program fully state-run."
 space_race_events.50.d:0 "Our nation's leading private space company has achieved a significant technical breakthrough in reusable launch systems. Their cost-per-kilogram to orbit is now a fraction of what the government program achieves. The question of how to integrate private capabilities with national space objectives has become urgent."
 space_race_events.50.f:0 "\"Their rockets land themselves. Backwards. On a barge. In the ocean. And they do it for a tenth of what our program spends per launch.\"\n\n- Government Program Director, watching a private sector landing broadcast\n\n\"We don't care about flags. We care about margins. But if the government wants to buy seats on our rockets, we'll paint whatever flag they like on the side.\"\n\n- Private Launch Company CEO"
 space_race_events.50.t:0 "The Private Sector Steps Up"
 space_race_events.51.a:0 "Develop space tourism: the revenue will fund science."
 space_race_events.51.b:0 "Space is for science, not entertainment."
 space_race_events.51.c:0 "Regulated tourism: limited and carefully managed."
 space_race_events.51.d:0 "With orbital capability now proven, entrepreneurs propose offering suborbital and orbital flights to wealthy civilians. The revenue could partially offset program costs, but critics argue that turning humanity's greatest achievement into a luxury experience cheapens the endeavor."
 space_race_events.51.f:0 "\"Two hundred thousand per seat for a suborbital hop. For orbital, considerably more. The waiting list is already fourteen months long.\"\n\n- Space Tourism Venture Prospectus\n\n\"We did not claw our way to the edge of space so that billionaires could experience weightlessness for six minutes.\"\n\n- Academy of Sciences Chair, in an open letter"
 space_race_events.51.t:0 "Tickets to the Stars"
 space_race_events.52.a:0 "Join the international station project."
 space_race_events.52.b:0 "Build our own station: we share with no one."
 space_race_events.52.d:0 "Several spacefaring nations have proposed constructing a jointly operated orbital station: a permanent laboratory in space, crewed continuously and funded cooperatively. The scientific benefits are substantial, but sharing a platform with rivals means sharing technology, procedures, and perhaps secrets."
 space_race_events.52.f:0 "\"Imagine a laboratory where gravity is a variable, not a constant. Where materials science, biology, and physics can be studied in ways impossible on Earth. That's what an orbital station offers: if we can agree on who pays for it and who gets the data.\"\n\n- International Space Cooperation Proposal, executive summary\n\n\"They want us to bolt our module onto their station and pretend we're all friends up there. We're not friends. We're competitors who happen to share an orbit.\"\n\n- Skeptical Military Advisor"
 space_race_events.52.t:0 "A Station for All Nations"
 space_race_events.53.a:0 "Fully integrate off-world industry with the program."
 space_race_events.53.b:0 "Keep mining and exploration as separate programs."
 space_race_events.53.d:0 "Our extraplanetary mining operations have matured to the point where they can supply raw materials to the space program directly. Integrating the industrial base with the exploration program would create efficiencies: asteroid-derived metals for spacecraft construction, lunar regolith for radiation shielding, and orbital fuel synthesis from captured volatiles."
 space_race_events.53.f:0 "\"We're mining nickel-iron from a body that has no atmosphere, no permits, and no labor laws. Bringing that supply chain home to the space program closes a loop that's been open since we started throwing things into orbit.\"\n\n- Extraplanetary Operations Director"
 space_race_events.53.t:0 "Off-World Industry Meets the Space Program"
 space_race_events.54.a:0 "Ablative heat shield: proven, expendable."
 space_race_events.54.b:0 "Ceramic tile system: reusable, complex."
 space_race_events.54.c:0 "Experimental transpiration cooling: bleeding edge."
 space_race_events.54.d:0 "The thermal protection system for the crew capsule must survive temperatures exceeding 1,600 degrees Celsius during atmospheric re-entry. The engineering team is divided between three approaches, each with different mass, cost, and reliability characteristics."
 space_race_events.54.f:0 "\"At Mach 25, the air in front of the capsule turns to plasma. The heat shield is the only thing between the crew and a temperature hotter than the surface of the Sun. We do not get to be creative here. We get to be right.\"\n\n- Thermal Protection Systems Lead"
 space_race_events.54.t:0 "Re-entry Equations"
 space_race_events.55.a:0 "Route all cargo through the elevator."
 space_race_events.55.b:0 "Elevator for bulk, rockets for the time-sensitive."
 space_race_events.55.d:0 "Our operational space elevator reduces the cost of reaching orbit by two orders of magnitude compared to chemical rockets. The program logistics team proposes routing all non-time-critical cargo through the elevator, reserving rocket launches for crew transfers and urgent payloads."
 space_race_events.55.f:0 "\"The elevator puts a ton in geostationary orbit for the price of shipping it from one continent to another. That single fact changes the economics of everything we do beyond the atmosphere.\"\n\n- Space Program Logistics Director"
 space_race_events.55.t:0 "The Elevator Advantage"
 space_race_events.6.a:0 "Begin lunar mining and manufacturing."
 space_race_events.6.b:0 "Invite the world to our lunar doorstep."
 space_race_events.6.c:0 "Establish a military garrison."
 space_race_events.6.d:0 "The first permanent habitat module has been pressurized and declared operational. A crew of specialists will maintain a continuous human presence on the Moon: the first time our species has truly lived beyond the Earth. Supply missions become routine. Living on the Moon becomes a job."
 space_race_events.6.f:0 "\"You get used to the gravity. You get used to the recycled air and the freeze-dried everything. What you never get used to is looking up through the viewport and seeing Earth: whole and blue and impossibly far away: and knowing that everyone you've ever loved is on that little marble.\"\n\n- Lunar Base Crew Member, personal diary entry"
 space_race_events.6.t:0 "Foothold on Another World"
 space_race_events.60.a:0 "Share the data freely with all nations."
 space_race_events.60.b:0 "Classify key findings: strategic advantage."
 space_race_events.60.c:0 "Sell data access to recoup the investment."
 space_race_events.60.d:0 "After years of silence, our deep-space receivers have detected the carrier signal from our interstellar probe. Data begins to stream in: spectral analysis of Proxima Centauri's stellar wind, high-resolution imagery of its planetary system, magnetic field measurements from within another star's heliosphere. The scientific community is electrified. For the first time in human history, we possess direct observational data from another stellar system.\n\nHow shall we handle this data?"
 space_race_events.60.f:0 "The signal took four years to arrive. The data was garbled, incomplete, and utterly without precedent."
 space_race_events.60.t:0 "Voices from Alpha Centauri"
 space_race_events.7.a:0 "A permanent research station: Mars is not a visit, it is a destination."
 space_race_events.7.b:0 "Survey the resource potential immediately."
 space_race_events.7.c:0 "Broadcast this moment to every screen on Earth."
 space_race_events.7.d:0 "After months of transit through the void, the lander descends through Mars' thin atmosphere and sets down in a cloud of rust-colored dust. The crew reports nominal conditions. For the first time, human beings stand on the surface of another planet."
 space_race_events.7.f:0 "\"Earth is a blue star in the evening sky. I watched it set behind Olympus Mons last night. The loneliness is extraordinary: and so is the privilege.\"\n\n- First crew member to set foot on Mars, personal log\n\n\"We're not explorers anymore. We're settlers. That word means something different when there's no road home.\"\n\n- Mission Commander"
 space_race_events.7.t:0 "Red Soil, New World"
 space_race_events.70.a:0 "Rebuild the pad: full safety overhaul before resuming."
 space_race_events.70.b:0 "Rush repairs: we can't afford to fall behind."
 space_race_events.70.d:0 "A catastrophic explosion has torn through the primary launch complex. The detonation occurred during a routine fueling procedure, sending a column of fire hundreds of meters into the sky. Emergency crews found the pad reduced to twisted wreckage, and the surrounding support structures sustained severe damage. Hundreds of engineers and technicians working in the blast radius did not survive."
 space_race_events.70.f:0 "\"The sound reached the control room before the shockwave did. Then the windows blew in. By the time we pulled ourselves off the floor and looked at the monitors, there was nothing left to monitor.\"\n\n- Launch Director, in the aftermath"
 space_race_events.70.t:0 "Inferno at the Launch Complex"
 space_race_events.71.a:0 "Ground all capsules: redesign the pressure system."
 space_race_events.71.b:0 "Implement the fix and switch to a cautious approach."
 space_race_events.71.d:0 "During a routine pressure integrity test of the crew capsule, the primary seal failed without warning. The capsule depressurized in seconds. The test crew: experienced engineers performing a standard checkout procedure: had no time to reach emergency equipment. An entire team of our brightest minds, lost in an instant to a failed gasket."
 space_race_events.71.f:0 "\"They were the best we had. Not astronauts: the engineers who made astronauts possible. They died in a chair on the ground, doing the job nobody else could do.\"\n\n- Program Director, addressing the press"
 space_race_events.71.t:0 "Silent Capsule"
 space_race_events.72.a:0 "Replace the equipment and improve fire suppression."
 space_race_events.72.b:0 "Use insurance payout to invest in better safety systems."
 space_race_events.72.d:0 "A fire broke out in the main integration facility during the night shift. Quick-thinking technicians activated fire suppression systems before the blaze could reach the fuel storage, but the damage to sensitive equipment and clean-room environments is extensive. No casualties, but the repair timeline will slow the program."
 space_race_events.72.f:0 "\"The clean room is anything but. Soot on every surface, water damage from the suppression system, and the centrifuge is a write-off. We'll be rebuilding test capability for months.\"\n\n- Facility Manager, surveying the damage"
 space_race_events.72.t:0 "Fire in the Assembly Building"
 space_race_events.73.a:0 "Launch a public inquiry: restore trust through transparency."
 space_race_events.73.b:0 "Suppress the story: national security demands secrecy."
 space_race_events.73.c:0 "Restructure the program: bring in new leadership."
 space_race_events.73.d:0 "An investigative journalist has published a devastating exposé of cost overruns and financial mismanagement within the space program. Contracts awarded to connected firms at inflated prices, expense accounts that defy belief, and schedule milestones fabricated to justify continued funding. Public trust in the program has been severely damaged."
 space_race_events.73.f:0 "\"The public was told that every dollar went to the stars. It turns out quite a few of those dollars went to beach houses and luxury automobiles.\"\n\n- Investigative Report, lead paragraph\n\n\"These are teething problems of a program growing faster than its oversight. We need reform, not cancellation.\"\n\n- Space Program Advisory Board Chair"
 space_race_events.73.t:0 "Stars and Scandals"
 space_race_events.74.a:0 "Apply the breakthrough to the current program."
 space_race_events.74.b:0 "Patent and commercialize the technology."
 space_race_events.74.d:0 "A team of engineers working on a perplexing propulsion problem has achieved a fundamental breakthrough. Their novel approach to thrust vectoring and fuel efficiency dramatically exceeds theoretical predictions. If validated, this innovation could revolutionize the program's capabilities and accelerate the current mission timeline."
 space_race_events.74.f:0 "\"We were trying to fix a combustion instability problem. Instead we found a way to extract thirty percent more impulse from the same propellant mass. Sometimes the best discoveries happen when you're looking for something else entirely.\"\n\n- Lead Propulsion Engineer"
 space_race_events.74.t:0 "An Unexpected Breakthrough"
 space_race_events.75.a:0 "Wait for the original suppliers: quality matters."
 space_race_events.75.b:0 "Source alternative suppliers: accept trade-offs."
 space_race_events.75.c:0 "Develop domestic production capacity."
 space_race_events.75.d:0 "Critical precision components: guidance gyroscopes, radiation-hardened electronics, and specialty alloys: have failed to arrive on schedule. The suppliers report production delays caused by competing defense contracts and raw material shortages. Without these components, major integration milestones cannot proceed."
 space_race_events.75.f:0 "\"We can build a rocket that reaches orbit, but we can't build the bearings for the gyroscope that points it there. Three companies on Earth make them to our specifications, and all three are six months behind.\"\n\n- Supply Chain Director, in a progress review meeting"
 space_race_events.75.t:0 "The Parts That Didn't Come"
 space_race_events.76.a:0 "The program has served its purpose."
 space_race_events.76.d:0 "With the space program facilities no longer operational, [ROOT.GetCountry.GetAdjective] ambitions beyond Earth have been shelved. The scientists and engineers who dedicated themselves to the mission now seek new assignments, and the vast infrastructure built for the program sits idle."
 space_race_events.76.f:0 "#italic The stars will have to wait.#!"
 space_race_events.76.t:0 "Program Discontinued"
 space_race_events.8.a:0 "Fusion torch drive: proven and reliable."
 space_race_events.8.b:0 "Antimatter-catalyzed engine: faster, experimental."
 space_race_events.8.c:0 "International probe: share costs and data."
 space_race_events.8.d:0 "Our probe stands ready on the launch pad: a testament to decades of propulsion research. Aimed at Alpha Centauri, 4.37 light-years away, it will be the first human artifact to cross interstellar space. Even at a significant fraction of light speed, the journey will take years. Then the data must travel back at the speed of light. We will not hear from this probe for over a decade.\n\nHow shall we configure the drive system?"
 space_race_events.8.f:0 "The Sun will be just another star in its cameras."
 space_race_events.8.t:0 "The Longest Voyage"
 space_race_events.9.a:0 "A great day for our nation."
 space_race_events.9.d:0 "Our colonization program has successfully established a new permanent settlement. Engineers, scientists, and support crew have reported safe arrival and begun activating life support systems. Another foothold for our civilization among the stars."
 space_race_events.9.f:0 "The flag rises over soil no human has trod."
 space_race_events.9.t:0 "Colony Established"

#
# SURVEILLANCE_EVENTS
#
 surveillance_events.1.a:0 "Protect the whistleblower"
 surveillance_events.1.b:0 "Prosecute the traitor"
 surveillance_events.1.c:0 "Suppress the story"
 surveillance_events.1.d:0 "A government insider has leaked classified documents revealing the extent of state surveillance on ordinary citizens. The revelations have sparked outrage among civil liberties advocates and a fierce debate about security versus privacy."
 surveillance_events.1.f:0 "The leaked files filled fourteen boxes. A clerk in the ministry had been copying them for six months before anyone noticed."
 surveillance_events.1.t:0 "The Whistleblower"
 surveillance_events.100.a:0 "Security is the highest good"
 surveillance_events.100.b:0 "Some rights are worth remembering"
 surveillance_events.100.desc:0 "The surveillance apparatus has won. With intrusive monitoring and an intelligence ministry in full operation, the state sees all and knows all. Digital rights are a forgotten dream."
 surveillance_events.100.f:0 "The cameras covered every street corner, every public building, every transport hub. Citizens had stopped noticing them."
 surveillance_events.100.t:0 "The Security State"
 surveillance_events.2.a:0 "Strengthen data protections"
 surveillance_events.2.b:0 "We need more surveillance to prevent this"
 surveillance_events.2.c:0 "Downplay the breach"
 surveillance_events.2.d:0 "A massive data breach has exposed the personal information of millions of citizens. Private correspondence, financial records, and intimate details are now public. The government faces a reckoning."
 surveillance_events.2.f:0 "Names, addresses, medical records, private correspondence — all of it posted on a public server. The government learned about it from the newspapers."
 surveillance_events.2.t:0 "The Data Breach"
 surveillance_events.200.a:0 "Privacy is a right, not a privilege."
 surveillance_events.200.d:0 "The digital rights movement in [ROOT.GetCountry.GetName] has succeeded. Comprehensive privacy protections are now law, ensuring citizens' digital lives remain their own."
 surveillance_events.200.f:0 "#italic The watchers have been watched, and found wanting.#!"
 surveillance_events.200.t:0 "Digital Freedom Secured"
 surveillance_events.3.a:0 "Hire the hackers"
 surveillance_events.3.b:0 "Hunt them down"
 surveillance_events.3.c:0 "Justify massive surveillance expansion"
 surveillance_events.3.d:0 "A sophisticated hacker collective has breached government systems, leaking classified data to the public. The leaked documents reveal the extent of domestic surveillance programs. The hackers claim to be freedom fighters; the state calls them criminals."
 surveillance_events.3.f:0 "The hackers published everything: surveillance logs, internal memos, the personal browsing history of three senior officials. The public reaction was divided between outrage at the surveillance and amusement at the browsing history."
 surveillance_events.3.t:0 "Hacker Collective Attack"
 surveillance_events.4.a:0 "Deploy predictive policing"
 surveillance_events.4.b:0 "Intelligence use only"
 surveillance_events.4.c:0 "Ban AI policing systems"
 surveillance_events.4.d:0 "AI-powered systems can now predict crimes before they happen, identifying potential offenders through behavioral analysis. Law enforcement is eager to deploy the technology, but civil liberties groups warn of a dystopian future where citizens are punished for crimes they have not yet committed."
 surveillance_events.4.f:0 "The system flagged two hundred and twelve individuals as potential offenders last quarter. Thirty-seven were arrested. None had yet committed a crime."
 surveillance_events.4.t:0 "Predictive Policing"
 surveillance_events.5.a:0 "Strengthen cybersecurity defenses"
 surveillance_events.5.b:0 "Retaliate with counter-espionage"
 surveillance_events.5.c:0 "Justify domestic surveillance expansion"
 surveillance_events.5.d:0 "Intelligence services have uncovered evidence that a rival power has been conducting systematic cyber-espionage against our government and critical infrastructure. The breach is extensive and has compromised sensitive data."
 surveillance_events.5.f:0 "The breach was discovered on a Monday. By Thursday, the analysts had mapped its extent. By Friday, they wished they hadn't."
 surveillance_events.5.t:0 "Foreign Cyber-Espionage"

#
# TEMPERATURE_ANOMALY_0
#
 TEMPERATURE_ANOMALY_0.5:0 "Global warming has reached 0.5°C above pre-industrial levels."

#
# TEMPERATURE_ANOMALY_1
#
 TEMPERATURE_ANOMALY_1.5:0 "Global warming has reached 1.5°C above pre-industrial levels."

#
# TEST_EVENT
#
 test_event.1.a:0 "Understood"

#
# TREATY_ARTICLE_EVENTS
#
 treaty_article_events.1.a:0 "Quietly thank our partners"
 treaty_article_events.1.b:0 "Harden our counter-espionage"
 treaty_article_events.1.c:0 "Publicize the success"
 treaty_article_events.1.d:0 "Our intelligence partners have intercepted communications revealing an imminent terror plot on our soil. Thanks to our information-sharing agreement with [SCOPE.sCountry('intel_partner').GetName], the conspirators were identified before they could act."
 treaty_article_events.1.f:0 "\"The intercept came in at three in the morning. Forty minutes later, every suspect was under surveillance.\"\n\n\"And if we hadn't had the agreement?\"\n\n\"Then we'd be reading about it in the newspapers instead.\""
 treaty_article_events.1.t:0 "Eyes in the Dark"
 treaty_article_events.10.a:0 "Resettle the displaced with government support"
 treaty_article_events.10.b:0 "They must fend for themselves"
 treaty_article_events.10.c:0 "Use this for nation-building"
 treaty_article_events.10.d:0 "The human reality of forced population transfers is becoming impossible to ignore. Families torn from ancestral homes, communities scattered, lives rebuilt from nothing. The bureaucratic language of treaties cannot mask the misery."
 treaty_article_events.10.f:0 "\"They arrived with nothing. Some of them couldn't even say where they were from: the name of their town had already been changed.\"\n\n\"What do they need?\"\n\n\"Everything. They need everything.\""
 treaty_article_events.10.t:0 "The Uprooted"
 treaty_article_events.11.a:0 "Celebrate this diplomatic triumph"
 treaty_article_events.11.b:0 "Deepen the cultural ties further"
 treaty_article_events.11.d:0 "Our cultural exchange agreement with [SCOPE.sCountry('exchange_partner').GetName] has produced a remarkable blossoming of artistic and intellectual cooperation. Their artists exhibit in our galleries, our writers are being translated in their universities, and the world is taking notice of this flourishing partnership."
 treaty_article_events.11.f:0 "\"The exhibition drew thirty thousand visitors in a week. The embassy says it's done more for relations than a decade of state dinners.\"\n\n\"And the critics?\"\n\n\"Even they admit it's extraordinary work. Though they'd never say so on the record.\""
 treaty_article_events.11.t:0 "A Meeting of Minds"
 treaty_article_events.12.a:0 "Cultural openness is worth the controversy"
 treaty_article_events.12.b:0 "Scale back the exchange programs"
 treaty_article_events.12.d:0 "Traditionalist voices are growing louder in opposition to our cultural exchange agreement with [SCOPE.sCountry('exchange_partner').GetName]. They claim that foreign art, music, and ideas are corrupting national values and undermining our cultural identity. Protests have been organized, and several cultural institutions have faced pressure to cancel planned events."
 treaty_article_events.12.f:0 "\"They burned a stack of foreign novels in the town square yesterday. Said it was a patriotic act.\"\n\n\"What did the mayor do?\"\n\n\"Stood there and watched. He has an election coming up.\""
 treaty_article_events.12.t:0 "The Culture Wars"
 treaty_article_events.2.a:0 "Demand answers from our partners"
 treaty_article_events.2.b:0 "Accept the failure quietly"
 treaty_article_events.2.c:0 "Our defenses have been compromised"
 treaty_article_events.2.d:0 "A critical intelligence report from [SCOPE.sCountry('intel_partner').GetName] was delayed by bureaucratic confusion and interdepartmental rivalry. By the time the warning reached the right desk, the damage was done. Our intelligence-sharing pact failed us when it mattered most."
 treaty_article_events.2.f:0 "\"The file sat in a translation queue for eleven days. Eleven days.\"\n\n\"Somebody will answer for this.\"\n\n\"Somebody always does. Never the right somebody.\""
 treaty_article_events.2.t:0 "The Dead Drop"
 treaty_article_events.3.a:0 "Celebrate this cultural renaissance"
 treaty_article_events.3.b:0 "Channel it into our national identity"
 treaty_article_events.3.d:0 "The protections afforded to minority communities under recent treaty obligations have borne unexpected fruit. Artists, writers, and thinkers from previously marginalized groups are producing remarkable work, and international attention is turning toward our flourishing cultural scene."
 treaty_article_events.3.f:0 "\"Have you read the new collection? Extraordinary stuff.\"\n\n\"I hear the Royal Academy wants to commission a series.\"\n\n\"Three years ago they couldn't get published. Funny how that works.\""
 treaty_article_events.3.t:0 "Cultural Renaissance"
 treaty_article_events.4.a:0 "Crack down on the agitators"
 treaty_article_events.4.b:0 "Try to address their concerns"
 treaty_article_events.4.d:0 "Our treaty obligations to protect minority populations have provoked a furious backlash among nationalist elements. Pamphlets circulate denouncing the government as traitors to the nation, and ugly incidents are being reported in several provinces."
 treaty_article_events.4.f:0 "\"They say we're selling the country to foreigners. That the old ways are dying.\"\n\n\"The old ways include burning people's homes.\"\n\n\"Try explaining that to a mob.\""
 treaty_article_events.4.t:0 "Blood and Soil"
 treaty_article_events.5.a:0 "Reassure them: conventional forces remain strong"
 treaty_article_events.5.b:0 "Purge the loudest dissenters"
 treaty_article_events.5.c:0 "Hint that this is only temporary"
 treaty_article_events.5.d:0 "The senior officer corps is barely containing its rage. Our nuclear disarmament obligations have stripped away the ultimate guarantee of national security, and the generals want the government to know exactly how they feel about it."
 treaty_article_events.5.f:0 "\"The Field Marshal threw his medals on the table. Said he didn't earn them to watch the country disarm itself.\"\n\n\"And the Defense Minister?\"\n\n\"Pretended to be on a telephone call.\""
 treaty_article_events.5.t:0 "The Generals' Fury"
 treaty_article_events.6.a:0 "Adopt the new methods"
 treaty_article_events.6.b:0 "Focus on our own strengths"
 treaty_article_events.6.d:0 "Combined military exercises with [SCOPE.sCountry('exercise_partner').GetName] have exceeded all expectations. Our officers have returned with fresh tactical insights and a profound respect for their counterparts' methods."
 treaty_article_events.6.f:0 "\"Their field engineers bridged a river in twenty minutes. Twenty minutes! Our best time was forty-five.\"\n\n\"What did the Colonel say?\"\n\n\"He said we're going to learn how to do it in fifteen.\""
 treaty_article_events.6.t:0 "Lessons Learned"
 treaty_article_events.7.a:0 "Expand the programs"
 treaty_article_events.7.b:0 "Redirect toward technical education"
 treaty_article_events.7.d:0 "The foreign-funded education initiative is producing remarkable results. A new generation of students is emerging with skills and perspectives that promise to transform our economy and society."
 treaty_article_events.7.f:0 "\"The village school had forty pupils last year. This year, one hundred and twelve.\"\n\n\"And the exam results?\"\n\n\"Three of them qualified for the national engineering program. First time ever from that district.\""
 treaty_article_events.7.t:0 "Seeds of Knowledge"
 treaty_article_events.8.a:0 "This is the price of peace"
 treaty_article_events.8.b:0 "Promise the hawks it is temporary"
 treaty_article_events.8.d:0 "Our frozen nuclear program has become a lightning rod for domestic discontent. Hawks in the military and the industrial lobby are united in their fury, while moderates argue that the freeze is a small price to pay for international stability."
 treaty_article_events.8.f:0 "\"Every month those facilities sit idle, we fall further behind.\"\n\n\"Behind whom? That's precisely the point of the freeze.\"\n\n\"You can't freeze ambition. Only delay it.\""
 treaty_article_events.8.t:0 "The Frozen Program"
 treaty_article_events.9.a:0 "Accept the dependency for now"
 treaty_article_events.9.b:0 "Assert our own capabilities"
 treaty_article_events.9.d:0 "Our reliance on [SCOPE.sCountry('security_provider').GetName]'s security assistance is becoming uncomfortable. Their advisors are embedded in our institutions, their methods shape our doctrine, and the question is being asked more loudly: whose security are we really building?"
 treaty_article_events.9.f:0 "\"The foreign advisors now outnumber our own staff in three departments.\"\n\n\"Do they take orders from us or from their embassy?\"\n\n\"Does it matter, as long as the funding continues?\"\n\n\"It will matter. Eventually.\""
 treaty_article_events.9.t:0 "Strings Attached"

#
# UN_EVENTS
#
 un_events.1.a:0 "Sign the Charter. We believe in this vision."
 un_events.1.b:0 "We shall observe, but not yet commit."
 un_events.1.c:0 "This undermines our sovereignty."
 un_events.1.d:0 "In the aftermath of another devastating conflict, the nations of the world have drafted a charter for a new international body - the United Nations. [ROOT.GetCountry.GetName] has been invited to sign as a founding member. Membership promises a seat at the table of global governance, but carries obligations: international courts, collective security, and the subordination of national interests to the common good."
 un_events.1.d_authoritarian:0 "In the aftermath of devastating conflict, the United Nations has been established. For [ROOT.GetCountry.GetName], a seat at the table means influence - but membership carries obligations, including international courts, collective security, and tolerating the interference of lesser powers in our affairs."
 un_events.1.d_council:0 "The workers of the world have long dreamed of international solidarity - now, in the aftermath of devastating conflict, that dream takes institutional form. The United Nations has been proposed to maintain peace, and [ROOT.GetCountry.GetName] has an opportunity to shape this new order in the interest of the working class - though the capitalist powers intend to use it for their own hegemony."
 un_events.1.d_theocratic:0 "In the wake of devastating conflict, the United Nations has been proposed. For [ROOT.GetCountry.GetName], guided by divine law, this is a test of faith: can an assembly of nations with vastly different moral foundations serve justice? Membership would grant us a platform for moral governance, but also mean accepting the equal standing of nations whose laws offend the divine order."
 un_events.1.f:0 "The ambassador set down his pen and stared at the document. 'Do you know,' he said to no one in particular, 'how many treaties have promised to end all wars?'\n\n'Every single one of them,' his aide replied. 'And yet here we are, drafting another.'\n\n'Yes. And yet here we are.'"
 un_events.1.t:0 "The United Nations Charter"
 un_events.10.a:0 "Rally the world. The UN must survive."
 un_events.10.b:0 "Propose incremental reforms."
 un_events.10.c:0 "The UN has failed. Let it go."
 un_events.10.d:0 "The United Nations faces a crisis of legitimacy. Resolutions are routinely ignored, great powers act unilaterally, and member states question whether the institution serves any purpose. As a great power, [ROOT.GetCountry.GetName] must decide whether to rally support or let it fade."
 un_events.10.d_authoritarian:0 "The United Nations faces a crisis of legitimacy - resolutions are flouted, great powers act unilaterally, and the institution serves as a platform for moral grandstanding. For [ROOT.GetCountry.GetName], the question is whether to invest in an institution that constrains us, or let it wither."
 un_events.10.d_council:0 "The United Nations faces a crisis of legitimacy. For [ROOT.GetCountry.GetName], this exposes the fundamental contradiction - the institution was designed to preserve a capitalist world order, and now that order is crumbling. The question is whether to salvage this bourgeois institution or accelerate its collapse."
 un_events.10.f:0 "'When I joined the diplomatic service,' the old ambassador said, swirling his brandy, 'this building meant something. Resolutions had teeth. Delegations arrived with instructions to compromise.'\n\n'And now?'\n\n'Now they arrive with instructions to be seen arriving. It is theater, my dear boy. Very expensive theater.'"
 un_events.10.t:0 "The United Nations in Crisis"
 un_events.101.a:0 "We are grateful for this generosity."
 un_events.101.b:0 "We accept the aid, but we are not a charity case."
 un_events.101.d:0 "[SCOPE.sCountry('aid_donor').GetName] has mounted a major humanitarian relief effort for [ROOT.GetCountry.GetName] through the United Nations. Convoys of food, medicine, and emergency supplies are arriving at our ports and airfields."
 un_events.101.f:0 "The crates bore foreign markings and foreign flags. The dockworkers unloaded them in silence.\n\n'Grain,' the port supervisor noted, checking his manifest. 'Rice. Medical supplies. Powdered milk.' He looked up. 'Enough to feed the northern provinces for a month.'\n\n'And after the month?'\n\nHe folded the manifest and tucked it into his coat. 'After the month, we will need another shipment, and another reason to be grateful.'"
 un_events.101.t:0 "International Aid Arrives"
 un_events.102.a:0 "Welcome the peacekeepers. Stability comes first."
 un_events.102.b:0 "This is an affront to our sovereignty."
 un_events.102.d:0 "[SCOPE.sCountry('peacekeeping_donor').GetName] has deployed a peacekeeping force to [ROOT.GetCountry.GetName] under a United Nations mandate. Blue-helmeted soldiers now patrol our streets. Their presence brings stability, but raises questions about sovereignty."
 un_events.102.f:0 "The child stared at the foreign soldier standing on the corner, his blue helmet catching the afternoon sun. The soldier smiled and waved. The child did not wave back.\n\n'Who are they?' the child asked his mother.\n\n'They are here to help,' she said, without conviction.\n\n'Help with what?'\n\nShe took his hand and walked a little faster. 'With everything we could not do ourselves.'"
 un_events.102.t:0 "Foreign Peacekeepers on Our Soil"
 un_events.103.a:0 "We are grateful for the assistance."
 un_events.103.b:0 "Our people belong here, not in exile."
 un_events.103.d:0 "[SCOPE.sCountry('resettlement_host').GetName] has launched a major refugee resettlement program, accepting thousands of displaced people from [ROOT.GetCountry.GetName]. For the refugees, this is a lifeline. For our country, the departure of so many citizens is a complicated blessing."
 un_events.103.f:0 "At the airport, the families queued with suitcases held together by rope and prayer. A grandmother clutched a photograph of a house that no longer stood.\n\n'Will we come back?' the boy asked.\n\nHis father hoisted him onto his shoulders so he could see the departure board. 'When there is something to come back to,' he said. He did not look at his wife when he said it."
 un_events.103.t:0 "Our People Resettled Abroad"
 un_events.11.a:0 "Denounce this obstruction publicly."
 un_events.11.b:0 "The veto is legitimate procedure."
 un_events.11.c:0 "Propose abolishing the veto entirely."
 un_events.11.d:0 "[SCOPE.sCountry('veto_power').GetName] has exercised its veto in the Security Council, blocking a resolution with broad support among member states. The vetoed resolution would have authorized collective action to address a growing international crisis."
 un_events.11.d_authoritarian:0 "[SCOPE.sCountry('veto_power').GetName] has deployed its veto in the Security Council, crushing a resolution carefully negotiated among the other great powers. The [SCOPE.sCountry('veto_power').GetAdjective] regime shows no interest in the niceties of multilateral diplomacy."
 un_events.11.d_council:0 "The council republic of [SCOPE.sCountry('veto_power').GetName] has wielded its veto in the Security Council, blocking a resolution supported by the majority of member states. The [SCOPE.sCountry('veto_power').GetAdjective] delegation invoked the right of sovereign nations to resist imperialist coercion."
 un_events.11.d_theocratic:0 "The theocratic government of [SCOPE.sCountry('veto_power').GetName] has exercised its veto in the Security Council, blocking a resolution on moral grounds rooted in their interpretation of divine law."
 un_events.11.f:0 "The chamber erupted. Delegates shouted across the aisle; the chair's gavel cracked against wood like a pistol shot.\n\nIn the corridor afterward, a junior diplomat loosened his tie. 'We spent six months drafting that resolution,' he said. 'Six months of negotiations, concessions, rewording. And one raised hand killed it.'\n\nHis colleague shrugged. 'That is how it works.'\n\nThe junior diplomat said nothing. He already knew that."
 un_events.11.t:0 "Security Council Veto Crisis"
 un_events.12.a:0 "Champion decolonization. Free all peoples!"
 un_events.12.b:0 "Defend our development programs."
 un_events.12.c:0 "Call for a gradual, orderly transition."
 un_events.12.d:0 "The General Assembly is debating a sweeping resolution calling for the immediate end of colonialism in all its forms. Dozens of newly independent nations are demanding that the great powers relinquish their overseas territories."
 un_events.12.d_colonial:0 "The General Assembly is debating a resolution calling for the immediate end of colonialism, and [ROOT.GetCountry.GetName], as a power with overseas dependencies, finds itself in the crosshairs. The resolution's sponsors argue that all colonial relationships are inherently exploitative."
 un_events.12.d_council:0 "The General Assembly is debating a resolution on the end of colonialism - a cause that strikes at the heart of our revolutionary principles. Our delegation has been vocal in demanding that the colonial powers answer for centuries of plunder."
 un_events.12.f:0 "The new delegate adjusted the flag on his desk - a flag that had not existed three years ago - and addressed the chamber.\n\n'My country was administered, developed, and civilized, so we are told, for one hundred and forty years,' he said. 'In all that time, not one of our administrators thought to ask us whether we wished to be civilized. We have come here today to provide the answer.'"
 un_events.12.t:0 "Decolonization Resolution"
 un_events.13.a:0 "Champion our way of life."
 un_events.13.b:0 "Call for peaceful coexistence."
 un_events.13.c:0 "Walk out in protest."
 un_events.13.d:0 "Tensions between rival great powers have erupted into open confrontation at the United Nations General Assembly. [SCOPE.sCountry('ideological_rival').GetName] and [ROOT.GetCountry.GetName] represent fundamentally different visions for the world - and both sides have marshaled their allies to dominate the Assembly's agenda.\n\nDelegations are choosing sides. Non-aligned nations watch nervously as the two blocs trade accusations and threats. The question is whether to escalate the confrontation, seek détente, or make a dramatic gesture."
 un_events.13.d_hq:0 "\n\nThe confrontation plays out at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the galleries are packed with journalists."
 un_events.13.d_vs_authoritarian:0 "The authoritarian regime of [SCOPE.sCountry('ideological_rival').GetName] has been flexing its muscle at the General Assembly, using its bloc of client states to push resolutions that serve its geopolitical agenda. [ROOT.GetCountry.GetName] finds itself leading the opposition, rallying nations who reject the [SCOPE.sCountry('ideological_rival').GetAdjective] model of governance.\n\nThe confrontation is not just about policy - it is about what kind of world order will prevail. Democracy versus autocracy, cooperation versus domination."
 un_events.13.d_vs_council:0 "The council republic of [SCOPE.sCountry('ideological_rival').GetName] has turned the General Assembly into a platform for revolutionary agitation. Their delegation denounces [ROOT.GetCountry.GetName] and our allies as tools of capitalist exploitation, calling for the oppressed peoples of the world to rise up. Our own allies respond with equal fervor, defending the principles of individual liberty and market freedom.\n\nThe Assembly has become a battleground between two irreconcilable worldviews. Non-aligned nations are being pressured to choose sides."
 un_events.13.d_vs_monarchy:0 "The monarchist establishment of [SCOPE.sCountry('ideological_rival').GetName] has been rallying traditional powers to resist the modernizing agenda at the Assembly. Their delegation speaks of ancient rights, divine mandate, and the dangers of unchecked populism. [ROOT.GetCountry.GetName] and our allies stand on the other side of this divide.\n\nThe confrontation reflects a deeper struggle between the old order and the new - between those who look backward and those who push forward."
 un_events.13.d_vs_theocratic:0 "The theocratic government of [SCOPE.sCountry('ideological_rival').GetName] has brought its religious crusade to the floor of the General Assembly, demanding that international law be reformed to reflect divine moral principles. [ROOT.GetCountry.GetName] and our secular allies have pushed back, defending the separation of religious authority from international governance.\n\nThe debate has exposed deep fault lines between nations that ground their laws in faith and those that ground them in reason."
 un_events.13.f:0 "The [SCOPE.sCountry('ideological_rival').GetAdjective] delegate slammed his fist upon the lectern. His counterpart waited for the translators to finish, then leaned into the microphone.\n\n'The committee has heard the delegate's position,' he said. 'We look forward to hearing his evidence, should any be forthcoming.'\n\nThe gallery murmured. The wire service correspondent underlined something in his notebook."
 un_events.13.t:0 "Ideological Confrontation at the Assembly"
 un_events.14.a:0 "Sign and propose the treaty to the General Assembly."
 un_events.14.b:0 "Sign with reservations on existing arsenals."
 un_events.14.c:0 "Our deterrent is non-negotiable."
 un_events.14.d:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty - a binding agreement to prevent the spread of nuclear weapons and promote disarmament. For [ROOT.GetCountry.GetName], without a nuclear arsenal, the treaty offers protection from proliferation by rival states."
 un_events.14.d_aspiring:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. The timing could not be worse for [ROOT.GetCountry.GetName] - our nuclear program is underway but not yet complete. Signing would effectively end our pursuit of the ultimate deterrent."
 un_events.14.d_nuclear:0 "The United Nations is proposing a Nuclear Non-Proliferation Treaty. As a nuclear-armed state, [ROOT.GetCountry.GetName] occupies a complicated position - the treaty would legitimize our existing arsenal while preventing rivals from developing their own, but commits us to eventual disarmament."
 un_events.14.f:0 "The physicist adjusted his reading glasses and studied the treaty text. 'It is an elegant piece of hypocrisy,' he said. 'Those who have the bomb promise to someday give it up. Those who do not have the bomb promise never to build one. And everyone pretends not to notice the asymmetry.'\n\n'Will it work?' his colleague asked.\n\n'It will work precisely as long as everyone is more afraid of the alternative.'"
 un_events.14.t:0 "Nuclear Non-Proliferation Treaty"
 un_events.15.a:0 "Accept international arbitration."
 un_events.15.b:0 "Negotiate a bilateral deal."
 un_events.15.c:0 "Impose unilateral tariffs."
 un_events.15.d:0 "A major trade dispute between [ROOT.GetCountry.GetName] and [SCOPE.sCountry('trade_rival').GetName] has been brought before the United Nations for arbitration. Both sides accuse the other of unfair practices - dumping goods below cost, subsidizing industries, and erecting hidden barriers."
 un_events.15.d_command:0 "A trade dispute with [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our command economy operates on principles that our rivals consider inherently unfair - state-directed pricing looks like dumping to a free-market observer."
 un_events.15.d_protectionist:0 "A trade dispute with [SCOPE.sCountry('trade_rival').GetName] has been escalated to the United Nations. Our protectionist trade policies, designed to nurture domestic industry, are under attack as violations of free trade principles."
 un_events.15.f:0 "'Their textiles undercut ours by forty percent,' the manufacturer said, jabbing the table with a thick finger. 'Forty percent! No honest factory can compete with that.'\n\nThe trade attaché folded his hands. 'Their workers earn a tenth of what yours do. Is that unfair, or is it merely inconvenient?'\n\n'To my workers, sir, the distinction is academic.'"
 un_events.15.t:0 "International Trade Dispute"
 un_events.16.a:0 "Full cooperation. Share everything."
 un_events.16.b:0 "Cooperate selectively."
 un_events.16.c:0 "Our people come first."
 un_events.16.d:0 "A devastating pandemic is sweeping across continents, and the World Health Organization is coordinating the international response. Member states are being asked to share medical data, pool research, and contribute to a global stockpile of treatments."
 un_events.16.d_authoritarian:0 "A pandemic is ravaging the world, and the WHO is coordinating the response. For [ROOT.GetCountry.GetName], our centralized system gives us tools that democratic nations lack - we can impose quarantines and direct production with unmatched efficiency."
 un_events.16.d_liberal:0 "A pandemic is sweeping the world, and the WHO is calling for a coordinated response. For [ROOT.GetCountry.GetName], our open society means the crisis is already front-page news and the public demands action."
 un_events.16.f:0 "The doctor peeled off her gloves and dropped them into the bin marked BIOHAZARD. 'The samples from the northern provinces match the strain in the south,' she said. 'It has already crossed three borders.'\n\n'Should we share the data?'\n\nShe looked at the official as though he had asked whether water was wet. 'The virus does not care about your diplomatic reservations. Share the data or bury more people. Those are the options.'"
 un_events.16.t:0 "Global Pandemic Response"
 un_events.17.a:0 "Propose binding targets to the General Assembly."
 un_events.17.b:0 "Pledge voluntary targets only."
 un_events.17.c:0 "Economic growth comes first."
 un_events.17.d:0 "The United Nations has proposed a binding resolution on climate change, requiring member states to commit to specific emissions reduction targets. The scientific consensus is clear, but the economic costs of compliance are staggering."
 un_events.17.d_command:0 "The United Nations has proposed binding climate targets. For [ROOT.GetCountry.GetName], where the state directs production, compliance would mean rewriting our industrial plans from the top down - a massive undertaking, but one our system is uniquely capable of executing."
 un_events.17.d_laissez:0 "The United Nations has proposed binding emissions targets that would require [ROOT.GetCountry.GetName] to fundamentally alter our economic model. Industrialists are already lobbying against compliance, arguing the targets would cripple our competitiveness."
 un_events.17.f:0 "The delegate from the sinking island nation spread a map across the table. 'This is my country,' she said, tracing the coastline with her finger. 'This -' she drew a line two inches inland '- is my country in thirty years.'\n\nThe industrial minister across the table cleared his throat. 'We sympathize, of course. But you must understand, our economy -'\n\n'Your economy,' she said, folding the map, 'is what is drowning mine.'"
 un_events.17.t:0 "Climate Change Resolution"
 un_events.18.a:0 "Launch a major resettlement program."
 un_events.18.b:0 "Accept a managed quota."
 un_events.18.c:0 "Close the borders. Not our problem."
 un_events.18.d:0 "Conflict and famine in [SCOPE.sCountry('refugee_source').GetName] have created a massive refugee crisis. Millions are seeking safety, and the United Nations is calling on member states to accept resettlement quotas."
 un_events.18.d_closed:0 "Conflict in [SCOPE.sCountry('refugee_source').GetName] has displaced millions, and the United Nations is pressuring member states to accept resettlement quotas. For [ROOT.GetCountry.GetName], with our closed borders, this request is unwelcome."
 un_events.18.d_open:0 "Conflict in [SCOPE.sCountry('refugee_source').GetName] has displaced millions. With our open borders policy, [ROOT.GetCountry.GetName] is already a destination for many, but the sheer scale tests even our generous infrastructure."
 un_events.18.f:0 "The border guard studied the woman's papers - or rather, the scrap of cardboard that served as papers. Behind her, the queue stretched to the horizon. Children slept standing up, leaning against their mothers' legs.\n\n'These documents are not valid,' he said.\n\nShe looked at him with the flat patience of someone who has been told this before. 'Neither is the country that issued them. It does not exist anymore. So here I am.'"
 un_events.18.t:0 "International Refugee Crisis"
 un_events.19.a:0 "Full partnership. To the stars together."
 un_events.19.b:0 "Limited contribution."
 un_events.19.c:0 "Space serves national interests."
 un_events.19.d:0 "The United Nations is proposing an international space cooperation program - a joint effort to build an orbital research station and share the costs of exploration. For [ROOT.GetCountry.GetName], this is a chance to participate in one of humanity's greatest endeavors."
 un_events.19.d_authoritarian:0 "The United Nations has proposed an international space cooperation program. For [ROOT.GetCountry.GetName], our space program is as much a military and prestige asset as a scientific one. Sharing it would compromise strategic advantages."
 un_events.19.d_council:0 "The United Nations has proposed international space cooperation. For [ROOT.GetCountry.GetName], our space program represents the triumph of collective planning - we will not easily share our achievements with the bourgeois powers."
 un_events.19.f:0 "The mission director stood before the assembled delegations and pointed to the architectural model of the station. 'Twelve modules,' he said. 'Six nations. One orbit.'\n\n'And whose flag flies on the outside?' someone asked from the back.\n\nThe director permitted himself a thin smile. 'That, excellency, is precisely the question we are here to avoid.'"
 un_events.19.t:0 "International Space Cooperation"
 un_events.2.a:0 "Propose a condemnation resolution to the General Assembly."
 un_events.2.b:0 "Vote in favor, but let others lead."
 un_events.2.c:0 "We shall abstain from this vote."
 un_events.2.d:0 "The General Assembly has convened an emergency session to address the military aggression of [SCOPE.sCountry('condemned_country').GetName]. Delegates from around the world are calling for a formal condemnation resolution, and [ROOT.GetCountry.GetName] must decide how to vote."
 un_events.2.f:0 "The delegate from [SCOPE.sCountry('defender_country').GetName] rose to speak, his hands trembling. 'My country has no army,' he said. 'We have no bombs, no warships, no leverage of any kind. We have only this chamber and the hope that words spoken here still carry some weight.'\n\nThe gallery fell silent. For a moment, the institution almost believed in itself."
 un_events.2.t:0 "General Assembly Condemns Aggression"
 un_events.20.a:0 "Condemn the walkout. Rally the faithful."
 un_events.20.b:0 "Call for dialogue and reconciliation."
 un_events.20.c:0 "Join the walkout."
 un_events.20.d:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a dramatic walkout from the General Assembly, followed by several aligned nations. The departing delegates accused the Assembly of bias and hypocrisy, throwing the institution into crisis."
 un_events.20.d_authoritarian:0 "The authoritarian bloc led by [SCOPE.sCountry('walkout_leader').GetName] has walked out of the General Assembly in protest, accusing the institution of meddling in sovereign affairs."
 un_events.20.d_council:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a walkout from the General Assembly, taking the socialist bloc with them. The [SCOPE.sCountry('walkout_leader').GetAdjective] ambassador denounced the institution as a tool of capitalist hegemony before storming out."
 un_events.20.d_hq:0 "\n\nThe walkout unfolds at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where empty seats stand as a visible rebuke to the institution's authority."
 un_events.20.d_theocratic:0 "The delegation of [SCOPE.sCountry('walkout_leader').GetName] has led a walkout of religiously-aligned nations, condemning the institution for promoting values incompatible with divine law."
 un_events.20.f:0 "The doors slammed. The echo rolled across the chamber like a judgment. For a long moment, no one spoke.\n\nThen the secretary-general removed his reading glasses and looked at the empty seats. 'Well,' he said, with the calm of a man watching his house burn from a safe distance. 'I suppose we shall have to manage without them.'\n\n'Can we?' his aide whispered.\n\n'That, my dear fellow, is the question this institution was built to answer.'"
 un_events.20.t:0 "Assembly Walkout"
 un_events.21.a:0 "Propose the Convention to the General Assembly."
 un_events.21.b:0 "Sign with reservations on sovereignty."
 un_events.21.c:0 "Our waters are our own affair."
 un_events.21.d:0 "The United Nations is drafting a landmark convention to codify the law of the sea — establishing territorial waters, exclusive economic zones, and freedom of navigation. For [ROOT.GetCountry.GetName], this could mean secure trade routes and arbitrated disputes, or it could mean ceding naval sovereignty to an international tribunal."
 un_events.21.d_naval:0 "As a great power, [ROOT.GetCountry.GetName] has significant naval interests at stake in the proposed Convention on the Law of the Sea. The framework would protect trade routes and establish exclusive economic zones — but it would also limit unilateral maritime projection."
 un_events.21.f:0 "The ambassador studied the chart spread across the conference table, its blue expanse divided into neat colored zones. 'You propose,' she said carefully, 'to draw lines on the ocean.'\n\n'We propose,' the chairman replied, 'to replace the lines that guns draw with ones that words draw.'\n\n'And when someone ignores the words?'\n\nThe chairman looked out the window at the harbor. 'Then at least we shall know exactly which line they crossed.'"
 un_events.21.t:0 "Convention on the Law of the Sea"
 un_events.22.a:0 "Propose the Rome Statute to the General Assembly."
 un_events.22.b:0 "Support the concept, but preserve national jurisdiction."
 un_events.22.c:0 "We will not submit our soldiers to foreign courts."
 un_events.22.d:0 "Delegates at the United Nations have drafted a statute to establish a permanent International Criminal Court with jurisdiction over genocide, war crimes, and crimes against humanity. For [ROOT.GetCountry.GetName], joining would signal commitment to international justice — but it would also mean submitting citizens, including military personnel, to foreign prosecution."
 un_events.22.d_atwar:0 "Even as [ROOT.GetCountry.GetName] wages war, delegates at the United Nations have proposed a permanent International Criminal Court. The timing could not be worse — joining now would expose our military commanders to investigation by a foreign tribunal."
 un_events.22.d_authoritarian:0 "The United Nations has proposed an International Criminal Court to prosecute war crimes and crimes against humanity. For [ROOT.GetCountry.GetName], this represents an unacceptable intrusion into sovereign affairs — our courts, our justice, our standards."
 un_events.22.f:0 "The legal scholar adjusted his spectacles and addressed the committee. 'The question before us is simple,' he said. 'Shall the powerful be accountable, or shall they merely be powerful?'\n\nThe military attaché in the back row leaned toward his colleague. 'And who,' he whispered, 'shall guard the guardians?'\n\n'That,' the scholar replied, having excellent hearing, 'is the entire point of this court.'"
 un_events.22.t:0 "International Criminal Court"
 un_events.3.a:0 "Propose the declaration to the General Assembly."
 un_events.3.b:0 "Sign with reservations."
 un_events.3.c:0 "We will not be bound by this."
 un_events.3.d:0 "A Universal Declaration of Human Rights has been proposed at the United Nations, establishing fundamental freedoms as the common standard for all peoples and nations. Ratifying it would signal our commitment to the international order, though some provisions may conflict with domestic policy."
 un_events.3.d_authoritarian:0 "A Universal Declaration of Human Rights has been proposed, drafted by a committee of idealists. For [ROOT.GetCountry.GetName], where the state ensures order, many of these so-called rights are tools of subversion dressed as principles. Yet refusing to sign entirely would make us a pariah."
 un_events.3.d_council:0 "A Universal Declaration of Human Rights has been proposed. For [ROOT.GetCountry.GetName], it affirms rights our revolution was fought to secure - work, education, social security. But it also enshrines bourgeois civil liberties historically used to protect the exploiting class."
 un_events.3.d_theocratic:0 "A Universal Declaration of Human Rights has been proposed. For [ROOT.GetCountry.GetName], where law derives from divine authority, some provisions align with sacred teachings - the dignity of the person, the prohibition of torture. But others contradict the divine order, particularly concerning freedom of religion."
 un_events.3.f:0 "'Article One,' the chairwoman read aloud. 'All human beings are born free and equal in dignity and rights.' She looked up from the page. 'Does any delegation object?'\n\nA long silence. Then, from the back row, a dry voice: 'To the sentiment, Madam Chair, no one objects. To the enforcement - that is where the arguments begin.'"
 un_events.3.t:0 "Declaration of Universal Human Rights"
 un_events.4.a:0 "Deploy a full peacekeeping force."
 un_events.4.b:0 "Send observers only."
 un_events.4.c:0 "We cannot spare the resources."
 un_events.4.d:0 "The Security Council has authorized a peacekeeping mission in the conflict zone involving [SCOPE.sCountry('peacekeeping_target').GetName]. As a committed contributor, [ROOT.GetCountry.GetName] has been called upon to provide troops for the operation."
 un_events.4.f:0 "The colonel studied the deployment orders and folded them carefully into his breast pocket. 'Blue helmets,' he said to his adjutant. 'Rules of engagement that would embarrass a traffic warden. No authority to fire unless fired upon, and even then, only if committee approves.'\n\nHe paused at the door. 'Still. Someone has to stand between the guns.'"
 un_events.4.t:0 "Peacekeeping Mission Authorized"
 un_events.5.a:0 "Enforce the sanctions strictly."
 un_events.5.b:0 "Partial compliance - the letter of the law."
 un_events.5.c:0 "Quietly profit from the gaps."
 un_events.5.d:0 "The UN sanctions against [SCOPE.sCountry('sanctioned_country').GetName] are now in effect, but enforcement requires active cooperation from member states. Strict compliance will hurt our own trade routes; the alternative is to quietly circumvent the very institution we helped create."
 un_events.5.f:0 "'The manifest says fertilizer,' the customs inspector said, turning the page with exaggerated slowness. 'Quite a lot of fertilizer.' He looked up. 'For a country with no farms.'\n\nThe shipping agent smiled and slid an envelope across the desk. 'A clerical error. I'm sure you understand.'"
 un_events.5.t:0 "Enforcing the Sanctions Regime"
 un_events.6.a:0 "Champion reform. The UN must evolve."
 un_events.6.b:0 "Defend the status quo. Our veto is sacred."
 un_events.6.c:0 "Propose a middle path."
 un_events.6.d:0 "A growing coalition of nations is demanding reform of the Security Council. The current structure, with its permanent members and veto power, is seen as increasingly unrepresentative. As a great power, [ROOT.GetCountry.GetName] must decide whether to champion reform or defend the status quo."
 un_events.6.d_authoritarian:0 "A growing coalition demands reform of the Security Council. For [ROOT.GetCountry.GetName], the veto is essential - it ensures no resolution can pass that threatens our interests. Championing reform might buy goodwill, but would dilute our influence."
 un_events.6.d_council:0 "A growing coalition demands reform of the Security Council. As a council republic, [ROOT.GetCountry.GetName] can champion democratic reform - arguing that the veto power of a few great powers is fundamentally undemocratic - but abolishing the veto would also strip our ability to block hostile resolutions."
 un_events.6.d_hq:0 "\n\nDelegates have gathered at the UN headquarters in [SCOPE.sState('un_hq_state').GetCityHubName], where the halls are thick with backroom deals."
 un_events.6.f:0 "'We are told this body represents the world,' the ambassador said, adjusting his spectacles. 'And yet the same five nations have held the same five seats since before half the countries in this room existed.'\n\nThe delegate from the permanent member state glanced at his papers. 'The matter has been raised before,' he replied. 'The committee will take it under advisement.'\n\nIt had been taken under advisement eleven times."
 un_events.6.t:0 "UN Reform: Expanding the Security Council"
 un_events.7.a:0 "Mount a major humanitarian relief effort."
 un_events.7.b:0 "Contribute what we can spare."
 un_events.7.c:0 "This is not our responsibility."
 un_events.7.d:0 "Reports from [SCOPE.sCountry('crisis_country').GetName] paint a dire picture - widespread famine, displacement, and suffering on a massive scale. The United Nations has issued an urgent appeal for humanitarian assistance from member states."
 un_events.7.f:0 "The relief coordinator set down the telegram and pressed her palms flat against the desk. 'Three hundred thousand displaced,' she said. 'That is the confirmed figure. The actual number is anyone's guess.'\n\nHer aide handed her a coffee, gone cold. 'How much can we send?'\n\n'The question is not how much we can send. The question is how much we are willing to be seen not sending.'"
 un_events.7.t:0 "Humanitarian Crisis Demands Response"
 un_events.8.a:0 "Accept the ruling. We must uphold the law."
 un_events.8.b:0 "Contest the court's jurisdiction."
 un_events.8.c:0 "We do not recognize this verdict."
 un_events.8.d:0 "The International Court of Justice has issued a ruling against [ROOT.GetCountry.GetName], citing violations of international humanitarian law. The ruling is non-binding but carries enormous symbolic weight. Compliance would require modifications to our military conduct and possible reparations."
 un_events.8.f:0 "'The court has ruled,' the foreign minister said, tossing the document onto the cabinet table. 'We are, it seems, in violation of seventeen articles of international law that half the world's nations have never read.'\n\n'And the other half?' the defence minister asked.\n\n'The other half would prefer we hadn't read them either.'"
 un_events.8.t:0 "International Court Rules Against Us"
 un_events.9.a:0 "Fully fund our heritage preservation program."
 un_events.9.b:0 "Participate with limited funding."
 un_events.9.c:0 "Culture is a domestic matter."
 un_events.9.d:0 "UNESCO has launched a program to identify and preserve sites of outstanding cultural and natural heritage. Several sites within [ROOT.GetCountry.GetName] have been nominated, and participation would boost our prestige, though it requires funding and accepting international oversight."
 un_events.9.f:0 "The antiquarian ran his hand across the ancient stonework. 'This wall is older than our nation,' he said. 'Older than most nations.'\n\nThe treasury official beside him frowned at the estimate. 'And the cost of preserving it is older than my patience. Can we not simply photograph it and move on?'\n\n'You can photograph a ruin. You cannot photograph what it meant to stand.'"
 un_events.9.t:0 "UNESCO: Protecting World Heritage"

#
# UN_VOTE
#
 un_vote.1.a:0 "We vote in favor."
 un_vote.1.b:0 "We vote against."
 un_vote.1.d:0 "A resolution has been proposed to the General Assembly. All member states are called upon to cast their vote."
 un_vote.1.d_aid_request:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has brought a request for international humanitarian assistance before the General Assembly. The country faces severe hardship and asks the international community for coordinated relief. A vote in favor commits member nations to provide aid and resources."
 un_vote.1.d_climate:0 "The General Assembly has received a proposal for a binding Climate Accord from [SCOPE.sCountry('un_vote_proposer').GetName], requiring member states to commit to specific emissions reduction targets. A vote in favor commits our country to binding limits on industrial pollution."
 un_vote.1.d_condemn:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has brought a resolution before the General Assembly calling for the formal condemnation of [SCOPE.sCountry('un_vote_target').GetName] for its military aggression. The eyes of the world are upon us - how shall [ROOT.GetCountry.GetName] vote?"
 un_vote.1.d_decolonization:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has brought a decolonization resolution before the General Assembly, calling on all administering powers to take immediate steps to transfer power to the peoples of non-self-governing territories. A vote in favor declares our support for the right of all peoples to self-determination."
 un_vote.1.d_heritage:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed the establishment of an international cultural heritage program to protect and preserve sites of outstanding universal value. A vote in favor commits our country to participate in the conservation effort."
 un_vote.1.d_human_rights:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed a Universal Declaration of Human Rights to the General Assembly, establishing fundamental freedoms as the common standard for all peoples and nations. A vote in favor means our country ratifies the declaration and commits to upholding its principles."
 un_vote.1.d_icc:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed the Rome Statute establishing a permanent International Criminal Court with jurisdiction over genocide, war crimes, and crimes against humanity. A vote in favor submits our military and political leadership to international criminal jurisdiction."
 un_vote.1.d_law_of_sea:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed a Convention on the Law of the Sea, establishing territorial waters, exclusive economic zones, and international maritime law. A vote in favor commits our country to international arbitration of maritime disputes and shared stewardship of the oceans."
 un_vote.1.d_npt:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has brought the Nuclear Non-Proliferation Treaty before the General Assembly. A vote in favor commits [ROOT.GetCountry.GetName] to the treaty's terms - renouncing the pursuit of nuclear weapons and accepting international inspections."
 un_vote.1.d_pandemic:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed a resolution for coordinated international pandemic response, establishing shared research protocols and mutual assistance frameworks. A vote in favor commits our country to full data-sharing and resource cooperation during health emergencies."
 un_vote.1.d_peacekeeping_request:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has requested the deployment of UN peacekeeping forces to stabilize its territory. The General Assembly must vote on whether to authorize the mission. A vote in favor commits contributing nations to deploy forces and bear the costs of the operation."
 un_vote.1.d_reform:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed a resolution to reform the institutional structure of the United Nations, expanding representation and modernizing decision-making procedures. A vote in favor endorses these organizational changes."
 un_vote.1.d_refugee:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has brought a resolution before the General Assembly calling for a coordinated international response to the refugee crisis. A vote in favor commits our country to accepting resettlement quotas and providing humanitarian assistance."
 un_vote.1.d_sanctions:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed international sanctions against [SCOPE.sCountry('un_vote_target').GetName] before the General Assembly. Sanctions would impose severe trade and diplomatic penalties on the target nation. A vote in favor supports the enforcement of the international order."
 un_vote.1.d_space:0 "[SCOPE.sCountry('un_vote_proposer').GetName] has proposed an international space cooperation agreement, pooling resources and sharing research for the peaceful exploration of outer space. A vote in favor commits our country to joint missions and technology sharing."
 un_vote.1.f:0 "'All those in favor,' the president of the assembly intoned, 'shall signify by raising their placards. All those against, likewise.'\n\nThe delegates shifted in their seats. Some glanced at allies for reassurance. Others stared straight ahead, already decided. Everyone understood that the real negotiations had happened in the corridors long before this moment."
 un_vote.1.t:0 "UN General Assembly Vote"
 un_vote.1.t_aid_request:0 "Humanitarian Aid Request Vote"
 un_vote.1.t_climate:0 "Climate Accord Vote"
 un_vote.1.t_condemn:0 "Condemnation Resolution Vote"
 un_vote.1.t_decolonization:0 "Decolonization Resolution Vote"
 un_vote.1.t_heritage:0 "Cultural Heritage Program Vote"
 un_vote.1.t_human_rights:0 "Human Rights Declaration Vote"
 un_vote.1.t_icc:0 "International Criminal Court Vote"
 un_vote.1.t_law_of_sea:0 "Convention on the Law of the Sea Vote"
 un_vote.1.t_npt:0 "Non-Proliferation Treaty Vote"
 un_vote.1.t_pandemic:0 "Pandemic Response Vote"
 un_vote.1.t_peacekeeping_request:0 "Peacekeeping Deployment Vote"
 un_vote.1.t_reform:0 "UN Reform Resolution Vote"
 un_vote.1.t_refugee:0 "International Refugee Resolution Vote"
 un_vote.1.t_sanctions:0 "International Sanctions Vote"
 un_vote.1.t_space:0 "Space Cooperation Resolution Vote"
 un_vote.2.a:0 "So it is decided."
 un_vote.2.d_aid_request_failed:0 "The humanitarian aid request by [SCOPE.sCountry('un_vote_proposer').GetName] has been rejected by the General Assembly. The vote failed [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] to [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0]. Domestic suffering continues without international relief."
 un_vote.2.d_aid_request_passed:0 "The General Assembly has voted to authorize a humanitarian aid program for [SCOPE.sCountry('un_vote_proposer').GetName]. Member nations have committed to providing material assistance and resources. The vote carried [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] to [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0]."
 un_vote.2.d_climate_failed:0 "The proposed Climate Accord has failed in the General Assembly. Industrial economies and their allies successfully blocked the resolution, arguing that binding emissions targets would cripple economic growth. The atmosphere, it seems, must wait for the balance sheets to improve."
 un_vote.2.d_climate_passed:0 "The Climate Accord has been adopted by the General Assembly with a decisive majority. Binding emissions targets are now enshrined in international law. A landmark moment - though the hard work of implementation lies ahead."
 un_vote.2.d_condemn_failed:0 "The condemnation resolution against [SCOPE.sCountry('un_vote_target').GetName] has failed to achieve a majority in the General Assembly. Divided loyalties and geopolitical calculations have shielded the aggressor from international censure. A dark day for the international order."
 un_vote.2.d_condemn_passed:0 "The General Assembly has voted to formally condemn the military aggression of [SCOPE.sCountry('un_vote_target').GetName]. The resolution carried by a clear majority, sending an unambiguous message: the international community will not stand silent in the face of naked aggression."
 un_vote.2.d_decolonization_failed:0 "The Decolonization Resolution has failed to pass the General Assembly. Colonial powers and their allies marshalled enough votes to block the declaration. The subject peoples of the world must wait longer for the international community to champion their cause."
 un_vote.2.d_decolonization_passed:0 "The Decolonization Resolution has been adopted by the General Assembly with an overwhelming majority. The international community has declared in no uncertain terms that colonialism in all its forms must come to an end. Colonial powers face mounting pressure to accelerate the transfer of sovereignty."
 un_vote.2.d_failed:0 "The resolution has failed to achieve a majority in the General Assembly. The proposing delegation gathers its papers in silence."
 un_vote.2.d_heritage_failed:0 "The Cultural Heritage Program has failed to achieve a majority in the General Assembly. The world's irreplaceable cultural sites will have to rely on national protection alone - an uncertain prospect at best."
 un_vote.2.d_heritage_passed:0 "The Cultural Heritage Program has been adopted by the General Assembly. The United Nations Educational, Scientific and Cultural Organization is established to protect and preserve the world's cultural and natural heritage for future generations."
 un_vote.2.d_human_rights_failed:0 "The proposed Universal Declaration of Human Rights has failed to achieve majority support in the General Assembly. Too many nations found its provisions inconvenient, its aspirations too demanding. The dream of a universal standard for human dignity has been deferred."
 un_vote.2.d_human_rights_passed:0 "The Universal Declaration of Human Rights has been adopted by the General Assembly with overwhelming support. A new chapter in international law begins - fundamental freedoms are now the declared standard of the civilized world. The UN Human Rights Council is established to monitor compliance."
 un_vote.2.d_icc_failed:0 "The Rome Statute establishing an International Criminal Court has been rejected by the General Assembly. Great powers and nations at war proved unwilling to submit their sovereignty to international criminal jurisdiction. Accountability, it seems, remains an aspiration."
 un_vote.2.d_icc_passed:0 "The Rome Statute has been adopted by the General Assembly, establishing the International Criminal Court (ICC) with permanent jurisdiction over genocide, war crimes, and crimes against humanity. A historic moment for international justice — though several major powers have conspicuously refused to join."
 un_vote.2.d_law_of_sea_failed:0 "The Convention on the Law of the Sea has failed to pass the General Assembly. Maritime powers were unwilling to submit their naval prerogatives to international arbitration. The oceans remain a contested frontier."
 un_vote.2.d_law_of_sea_passed:0 "The Convention on the Law of the Sea has been adopted by the General Assembly. The International Tribunal for the Law of the Sea (ITLOS) is established to adjudicate maritime disputes and enforce the new framework of territorial waters and exclusive economic zones."
 un_vote.2.d_npt_failed:0 "The Nuclear Non-Proliferation Treaty has failed to pass the General Assembly. Nuclear powers and aspiring states alike found common cause in rejecting constraints on their arsenals. The atom remains unbound by international law."
 un_vote.2.d_npt_passed:0 "The Nuclear Non-Proliferation Treaty has been adopted by the General Assembly with a strong majority. The international community has spoken clearly against the spread of nuclear weapons. The International Atomic Energy Agency is established to enforce the treaty's provisions."
 un_vote.2.d_pandemic_failed:0 "The Pandemic Cooperation Resolution has failed to pass the General Assembly. National sovereignty concerns and economic anxieties proved stronger than the call for international health cooperation. Each nation will face the next epidemic alone."
 un_vote.2.d_pandemic_passed:0 "The Pandemic Cooperation Resolution has been adopted by the General Assembly. The World Health Organization is established to coordinate international public health response, share medical research, and provide early warning of future outbreaks."
 un_vote.2.d_passed:0 "The resolution has passed the General Assembly with a clear majority. The international community has spoken."
 un_vote.2.d_peacekeeping_request_failed:0 "The request for UN peacekeeping forces by [SCOPE.sCountry('un_vote_proposer').GetName] has been rejected by the General Assembly. The vote failed [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] to [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0]. The requesting nation must face its crisis alone."
 un_vote.2.d_peacekeeping_request_passed:0 "The General Assembly has voted to authorize peacekeeping operations in [SCOPE.sCountry('un_vote_proposer').GetName]. Contributing nations will deploy forces under the UN flag. The vote carried [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] to [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0]."
 un_vote.2.d_reform_failed:0 "The UN Reform Resolution has failed to pass the General Assembly. The permanent members and their allies successfully blocked attempts to dilute their institutional privileges. For now, the old order endures."
 un_vote.2.d_reform_passed:0 "The UN Reform Resolution has been adopted by the General Assembly with a strong majority. The organization's institutional framework will be modernized, with expanded representation and revised procedures. A new chapter begins for international governance."
 un_vote.2.d_refugee_failed:0 "The International Refugee Resolution has failed to pass the General Assembly. Fears of uncontrolled migration and economic burden proved too great for many delegations. The world's refugees remain without an international champion."
 un_vote.2.d_refugee_passed:0 "The International Refugee Resolution has been adopted by the General Assembly. The UN High Commissioner for Refugees is established to coordinate international protection and assistance for displaced persons worldwide."
 un_vote.2.d_sanctions_failed:0 "The proposed sanctions against [SCOPE.sCountry('un_vote_target').GetName] have been rejected by the General Assembly. The vote failed [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] to [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0]. The target nation escapes international censure."
 un_vote.2.d_sanctions_passed:0 "The General Assembly has voted to impose international sanctions on [SCOPE.sCountry('un_vote_target').GetName]. The resolution carried [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] to [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0]. Trade restrictions and diplomatic penalties are now in effect."
 un_vote.2.d_space_failed:0 "The Space Cooperation Resolution has failed to pass the General Assembly. National prestige and military concerns overrode the call for shared exploration. The heavens, it seems, will be contested rather than shared."
 un_vote.2.d_space_passed:0 "The Space Cooperation Resolution has been adopted by the General Assembly. The UN Office for Outer Space Affairs is established to coordinate peaceful international cooperation in the exploration and use of outer space."
 un_vote.2.f_failed:0 "The president's gavel fell with a hollow sound. 'The resolution has not achieved the required majority,' he announced. 'It is hereby rejected.'\n\nThe proposing delegation gathered their papers in silence. A sympathetic colleague leaned over: 'You can always try again next year.'\n\n'Next year,' came the tired reply, 'may be too late.'"
 un_vote.2.f_passed:0 "The president's gavel fell. For a moment, the chamber erupted - one side in applause, the other in stony silence.\n\n'The resolution is adopted,' the president announced. 'Let the record show that the General Assembly has spoken.'\n\nWhether anyone would listen was, as always, another matter entirely."
 un_vote.2.t:0 "General Assembly Vote Results"
 un_vote.3.a:0 "Very well."
 un_vote.3.b:0 "Accept the resolution."
 un_vote.3.c:0 "Refuse to comply."
 un_vote.3.d_failed:0 "The General Assembly has concluded its vote. The resolution proposed by [SCOPE.sCountry('un_vote_proposer').GetName] has #R failed#! with [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] votes in favor and [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0] against."
 un_vote.3.d_passed:0 "The General Assembly has concluded its vote. The resolution proposed by [SCOPE.sCountry('un_vote_proposer').GetName] has #G passed#! with [ROOT.GetCountry.MakeScope.Var('un_display_support').GetValue|0] votes in favor and [ROOT.GetCountry.MakeScope.Var('un_display_oppose').GetValue|0] against."
 un_vote.3.t:0 "General Assembly Vote Results"

#
# WONDER_EVENTS
#
 wonder_events.1.a:0 "Let the world know what we've achieved."
 wonder_events.1.b:0 "The work continues. We rest when it's done."
 wonder_events.1.d:0 "Engineers report that the space elevator's tether, spooling down from the counterweight station in geostationary orbit, has entered the lower atmosphere and is approaching the ground anchor site. The [ROOT.GetCountry.GetAdjectiveNoFormatting] space program is the talk of the world's scientific community."
 wonder_events.1.f:0 "- Do you see it? That thread coming down from the sky, so thin you can barely make it out?\n\n- I see it. The first real ladder to the stars.\n\n- We'll remember this day. The day gravity became optional."
 wonder_events.1.t:0 "The Tether Descends"
 wonder_events.10.a:0 "This is a day our nation will never forget."
 wonder_events.10.b:0 "Beautiful, but the real work starts now."
 wonder_events.10.d:0 "The first orbital solar collector has completed alignment and begun transmitting power via microwave beam to the ground rectenna. Instruments confirm a steady output, and the [ROOT.GetCountry.GetAdjectiveNoFormatting] solar collector program is officially operational."
 wonder_events.10.f:0 "- The rectenna is live. Gigawatts, pouring in from orbit: invisible, silent, and continuous. You can't see the beam, but you can see the lights coming on across the grid.\n\n- It doesn't look like much.\n\n- That's the beauty of it. The most powerful energy source in history, and it's invisible."
 wonder_events.10.t:0 "First Light"
 wonder_events.11.a:0 "Compensate the farmers and implement new safeguards."
 wonder_events.11.b:0 "Issue a statement. Downplay the risks."
 wonder_events.11.d:0 "A calibration error in the orbital collector's phased array causes the microwave beam to drift off the rectenna, irradiating several square kilometers of surrounding countryside. Prolonged exposure damages crops and disrupts electronics across the affected zone. Public alarm is considerable."
 wonder_events.11.f:0 "- The beam drifted three degrees off the rectenna. Three degrees! Every electronic device in the zone is dead, and the crops are cooked from microwave exposure.\n\n- Could it have hit a city?\n\n- If the error had been in the other direction? Absolutely."
 wonder_events.11.t:0 "Beam Misalignment"
 wonder_events.12.a:0 "Invest in electrification of heavy industry."
 wonder_events.12.b:0 "Export the surplus through our trade networks."
 wonder_events.12.d:0 "The orbital solar collector is producing power far in excess of current demand. Electricity prices have plummeted, making energy-intensive industries suddenly viable at scales previously unimaginable."
 wonder_events.12.f:0 "- We're generating more power than we can use. Factories that were marginal are now printing money. The smelters alone have tripled output.\n\n- And this is only one collector."
 wonder_events.12.t:0 "The Power Surplus"
 wonder_events.13.a:0 "Subsidize energy costs for all citizens."
 wonder_events.13.b:0 "Pour the surplus into research."
 wonder_events.13.d:0 "With the solar collector array at full capacity, the nation effectively has access to unlimited clean energy. The implications extend far beyond mere electricity; this is a fundamental transformation of what civilization can achieve."
 wonder_events.13.f:0 "- Do you know what unlimited energy means? Unlimited fresh water. Unlimited agriculture. Unlimited manufacturing. The only constraint on human ambition is human imagination.\n\n- And the other nations?\n\n- They'll either buy our power or build their own."
 wonder_events.13.t:0 "The End of Night"
 wonder_events.14.a:0 "Emergency shutdown. We cannot risk the array."
 wonder_events.14.b:0 "The shielding will hold. Keep the collectors online."
 wonder_events.14.d:0 "Astronomers detect a massive coronal mass ejection heading directly for the orbital collector array. The electromagnetic pulse could damage the collectors' sensitive electronics if they remain operational."
 wonder_events.14.f:0 "- The sun giveth and the sun taketh away. This CME could fry every circuit board in the array if we don't shut down.\n\n- And if we do shut down?\n\n- Half the continent loses power for a month."
 wonder_events.14.t:0 "Solar Storm Warning"
 wonder_events.15.a:0 "Access to our technology is access to our strength."
 wonder_events.15.b:0 "Offer licensing agreements. Control through cooperation."
 wonder_events.15.d:0 "International voices accuse [ROOT.GetCountry.GetName] of monopolizing orbital energy, arguing that sunlight in space belongs to all humanity. Several nations call for the solar collectors to be placed under international oversight."
 wonder_events.15.f:0 "- They want our collectors. Publicly they call it fair access. Privately they call it the energy weapon.\n\n- Are they wrong? We could shut off power to half the world's receivers if we chose.\n\n- Which is precisely why we won't give it up."
 wonder_events.15.t:0 "The Sunlight Monopoly"
 wonder_events.2.a:0 "Halt construction until we understand the problem."
 wonder_events.2.b:0 "Reinforce the weak points and press on."
 wonder_events.2.d:0 "Monitoring stations detect alarming oscillations in the space elevator's tether during construction. Engineers warn that resonance patterns could lead to catastrophic failure if not addressed immediately."
 wonder_events.2.f:0 "- The readings are off the charts. The tether is singing, and not in a good way.\n\n- How long before it becomes critical?\n\n- If we're lucky? Weeks. If we're not, we find out the hard way."
 wonder_events.2.t:0 "Structural Anomaly"
 wonder_events.20.a:0 "Accelerate the program. Finish before they react."
 wonder_events.20.b:0 "Reassure the international community."
 wonder_events.20.d:0 "Intelligence reports indicate that rival nations are deeply alarmed by the orbital weapons platform under construction. Military attaches have been recalled, and defensive postures are shifting worldwide."
 wonder_events.20.f:0 "- They're watching us build it. Every spy satellite, every signals intercept. They know what this is.\n\n- Good. Let them watch. By the time it's operational, the balance of power will have shifted permanently.\n\n- Or they try to stop us before it's finished.\n\n- That's why we have the Navy."
 wonder_events.20.t:0 "The High Ground"
 wonder_events.21.a:0 "Full spectrum dominance. This is ours alone."
 wonder_events.21.b:0 "Share selective intelligence with allies."
 wonder_events.21.d:0 "The orbital battlestation's sensor suite can track individual vehicles and resolve meter-scale objects across the globe. Every major military movement on Earth is visible in real time. The intelligence advantage is decisive."
 wonder_events.21.f:0 "- We can see their armor columns marshaling. We can track every warship in every ocean. We can watch their missile convoys move in real time.\n\n- And they know we can see them?\n\n- That's the best part. They know, and they can't do a thing about it."
 wonder_events.21.t:0 "Eye of God"
 wonder_events.22.a:0 "Strength invites no challenge."
 wonder_events.22.b:0 "Negotiate from this position of strength."
 wonder_events.22.d:0 "The orbital battlestation has fundamentally altered the global strategic calculus. No conventional force can challenge a nation with orbital fire support, and rival powers are beginning to seek diplomatic accommodation."
 wonder_events.22.f:0 "- Three border disputes settled this month. Two territorial claims abandoned. One unilateral ceasefire.\n\n- All without firing a shot.\n\n- The best weapons are the ones you never use."
 wonder_events.22.t:0 "Peace Through Superior Firepower"
 wonder_events.23.a:0 "Launch a massive relief effort."
 wonder_events.23.b:0 "Classify the incident. National security demands it."
 wonder_events.23.d:0 "A targeting malfunction on the orbital battlestation causes a kinetic impactor to fire along an unintended trajectory. The projectile strikes the ocean near a coastal city, and the resulting shockwave shatters windows, capsizes boats, and injures dozens on shore."
 wonder_events.23.f:0 "- The impactor hit water twelve kilometers from the harbor. The shockwave alone did this much damage.\n\n- If it had struck land?\n\n- A crater the size of a city block. And it's on every news feed on the planet."
 wonder_events.23.t:0 "Misfire from Orbit"
 wonder_events.24.a:0 "Maintain strategic superiority at any cost."
 wonder_events.24.b:0 "Propose an orbital arms limitation treaty."
 wonder_events.24.d:0 "Rival powers have begun their own orbital weapons programs in response to the [ROOT.GetCountry.GetAdjectiveNoFormatting] battlestation. The militarization of space is accelerating beyond anyone's projections."
 wonder_events.24.f:0 "- They're building their own. Crude, compared to ours, but give them five years.\n\n- Then we need to stay five years ahead.\n\n- That's what they said about nuclear weapons. We ended up with enough to destroy the world twelve times over.\n\n- Thirteen. But who's counting?"
 wonder_events.24.t:0 "Arms Race in Orbit"
 wonder_events.25.a:0 "Project power globally. Let the world take note."
 wonder_events.25.b:0 "The capability alone is deterrent enough."
 wonder_events.25.d:0 "The orbital battlestation has achieved global strike capability. Kinetic energy weapons can reach any point on Earth within minutes, delivering devastating force without nuclear fallout."
 wonder_events.25.f:0 "- Tungsten rods, six meters long and half a meter across, dropped from orbit at eight kilometers per second. No warhead needed. The kinetic energy alone is equivalent to dozens of tons of high explosive.\n\n- And no radiation.\n\n- Clean. Precise. And we can put one through any roof on Earth within thirty minutes."
 wonder_events.25.t:0 "Rods from God"
 wonder_events.26.a:0 "We built to protect. Today we prove it."
 wonder_events.26.d:0 "Astronomers detect a near-Earth asteroid on a collision course with a populated region. The orbital battlestation, originally designed for warfare, is the only asset capable of deflecting it in time."
 wonder_events.26.f:0 "- The irony isn't lost on me. We built a weapon to threaten our enemies, and it just saved us all.\n\n- The asteroid was three hundred meters across. It would have leveled a region the size of a small country.\n\n- Fire the interceptors.\n\n- Interceptors away. God help us all."
 wonder_events.26.t:0 "The Shield of Civilization"
 wonder_events.3.a:0 "Open the gateway to all who can pay."
 wonder_events.3.b:0 "This is a national asset. Access is a privilege."
 wonder_events.3.d:0 "The completed space elevator has made orbital access routine. Scientists, entrepreneurs, and diplomats from across the globe petition for access to [ROOT.GetCountry.GetAdjectiveNoFormatting] orbital facilities."
 wonder_events.3.f:0 "- Thirty hours. That's all it takes to climb from the ground to geostationary orbit. The electromagnetic climbers run day and night. The old rockets seem like covered wagons by comparison.\n\n- And everyone wants a ticket."
 wonder_events.3.t:0 "Gateway to the Stars"
 wonder_events.30.a:0 "Fund expanded antimatter research."
 wonder_events.30.b:0 "Prioritize military applications immediately."
 wonder_events.30.d:0 "Scientists at the antimatter facility report stable containment of macroscopic quantities of antihydrogen for the first time. The breakthrough opens the door to practical antimatter applications."
 wonder_events.30.f:0 "- One milligram. That's what we have. One milligram of antihydrogen, suspended in a Penning trap.\n\n- One milligram. The energy equivalent of forty-three tons of TNT.\n\n- Imagine what we'll do with a gram."
 wonder_events.30.t:0 "Breakthrough at the Collider"
 wonder_events.31.a:0 "Rebuild with improved safety protocols."
 wonder_events.31.b:0 "The risks are acceptable. Press ahead."
 wonder_events.31.d:0 "A magnetic containment failure at the antimatter facility causes a localized annihilation event. The explosion destroys a wing of the facility and kills dozens of scientists and engineers."
 wonder_events.31.f:0 "- The magnetic field fluctuated for less than a nanosecond. That's all it took. The antimatter touched the containment wall and...\n\n- How much was released?\n\n- Micrograms. The blast equivalent of a hundred kilograms of high explosive, concentrated in a point smaller than an atom. The containment wing did its job: barely."
 wonder_events.31.t:0 "Containment Breach"
 wonder_events.32.a:0 "Integrate antimatter weapons into our arsenal."
 wonder_events.32.b:0 "Focus on propulsion. Mobility wins wars."
 wonder_events.32.d:0 "Antimatter-catalyzed propulsion and weapons systems are entering the prototype phase. Military planners are ecstatic. Formations with antimatter-powered logistics will have limitless range, and antimatter warheads will render conventional arsenals obsolete."
 wonder_events.32.f:0 "- An antimatter-fueled aircraft never needs to land. A fleet with antimatter propulsion can sustain operations indefinitely at maximum speed.\n\n- And the weapons?\n\n- A warhead with a milligram of antimatter has the yield of a massive conventional bomb. Scale it up from there."
 wonder_events.32.t:0 "The Power of Annihilation"
 wonder_events.33.a:0 "Let our arsenal speak for us."
 wonder_events.33.b:0 "Power without diplomacy is tyranny."
 wonder_events.33.d:0 "The mere existence of practical antimatter weapons has fundamentally altered the diplomatic landscape. Nations that once challenged [ROOT.GetCountry.GetName] now seek accommodation and alliance."
 wonder_events.33.f:0 "- The ambassadors are very polite now. Have you noticed?\n\n- There's nothing quite like the ability to annihilate a city with a warhead the size of a suitcase to improve diplomatic relations.\n\n- An oversimplification.\n\n- But not an inaccurate one."
 wonder_events.33.t:0 "Antimatter Diplomacy"
 wonder_events.34.a:0 "Full transparency. Open the facility to inspectors."
 wonder_events.34.b:0 "Suppress the details. National security demands it."
 wonder_events.34.d:0 "An accident during routine antimatter transfer causes an uncontrolled release of energy. The resulting explosion is detected by monitoring stations worldwide, triggering international alarm."
 wonder_events.34.f:0 "- The seismographs registered it as a 3.5. Except it wasn't an earthquake.\n\n- How many casualties?\n\n- Thirty-seven confirmed. The facility will need months of repair.\n\n- And the international reaction?\n\n- Exactly what you'd expect when an unexplained explosion with the seismic signature of a bomb goes off inside a classified facility."
 wonder_events.34.t:0 "The Annihilation Incident"
 wonder_events.35.a:0 "Revolutionize military logistics."
 wonder_events.35.b:0 "Commerce transforms nations more than armies."
 wonder_events.35.d:0 "The antimatter facility is now producing enough fuel to power a new generation of engines. Antimatter propulsion makes global logistics trivial and opens the door to rapid interplanetary transit."
 wonder_events.35.f:0 "- Earth to Mars in three weeks. Earth to Jupiter in two months. These aren't projections. These are timetables.\n\n- And military applications?\n\n- Any formation, anywhere on Earth, within hours. The concept of distance as a strategic constraint is over."
 wonder_events.35.t:0 "The Annihilation Drive"
 wonder_events.4.a:0 "Auction orbital slots to the highest bidder."
 wonder_events.4.b:0 "Prioritize our own national industries."
 wonder_events.4.d:0 "At the space elevator's current capacity, orbital commerce has become routine. Nations and corporations compete for launch slots, and the elevator state has become a nexus of unprecedented trade."
 wonder_events.4.f:0 "- Silk, spices, gold. Those were the treasures of the old roads. Ours carry advanced materials, processed data, and the hopes of ten billion people.\n\n- And the profits are rather better."
 wonder_events.4.t:0 "The New Silk Road"
 wonder_events.5.a:0 "Launch an emergency debris clearance mission."
 wonder_events.5.b:0 "Deploy automated defense systems along the cable."
 wonder_events.5.d:0 "A cascade of orbital debris threatens the space elevator's cable and nearby orbital infrastructure. Without intervention, a runaway chain of collisions could render low Earth orbit unusable for decades."
 wonder_events.5.f:0 "One collision becomes ten. Ten becomes a thousand. A thousand becomes a wall of shrapnel moving at eight kilometers per second.\n\nAnd our elevator cable is sitting right in the path."
 wonder_events.5.t:0 "Kessler Syndrome"
 wonder_events.6.a:0 "Fund advanced space education programs."
 wonder_events.6.b:0 "Channel their talent into industry."
 wonder_events.6.d:0 "A generation raised in the shadow of the space elevator has come of age. These young engineers and scientists grew up treating orbital access as routine, and their ambitions are correspondingly vast."
 wonder_events.6.f:0 "- When I was young, space was a dream. For my students, it's a commute. Do you understand what that means?\n\n- It means they'll build things we can't even imagine."
 wonder_events.6.t:0 "The Astronaut Generation"
 wonder_events.7.a:0 "The stars belong to those who reach them first."
 wonder_events.7.b:0 "Propose a shared governance framework."
 wonder_events.7.d:0 "Foreign powers demand that orbital infrastructure be governed under international law, arguing that no single nation should control access to space. The diplomatic pressure is mounting."
 wonder_events.7.f:0 "- The elevator was built with our money, our engineers, our vision. And now they want to make it a commons?\n\n- They don't want to share it. They want to control what we do with it.\n\n- Then let them build their own."
 wonder_events.7.t:0 "Orbital Sovereignty"

#
# WORLD_WAR_EVENTS
#
 world_war_events.1.a:0 "We will not yield an inch."
 world_war_events.1.b:0 "Open negotiations."
 world_war_events.1.c:0 "Issue a counter-ultimatum."
 world_war_events.1.d:0 "[SCOPE.sCountry('ideological_rival').GetName] has issued a series of provocative demands, challenging our ideological stance on the world stage. Their aggressive posture threatens to destabilize the fragile peace between the great powers."
 world_war_events.1.f:0 "The foreign minister read the demands aloud, then set the paper down and removed his spectacles.\n\n'They wish us to renounce our system of government,' he said. 'Publicly. Before the world press.'\n\nThe room was quiet for a long time.\n\n'And if we refuse?'\n\n'Then, I rather think, we shall have our answer about whether they want peace or something else entirely.'"
 world_war_events.1.t:0 "Ideological Confrontation"
 world_war_events.10.a:0 "Sell war bonds!"
 world_war_events.10.b:0 "Use this moment for conscription."
 world_war_events.10.d:0 "A surge of patriotic fervor sweeps the nation. Citizens line the streets waving flags, factories run double shifts, and volunteers flood recruitment offices. The will to fight has never been stronger."
 world_war_events.10.f:0 "The factory foreman wiped his hands on his apron and addressed the morning shift. 'Double production this week,' he said. 'The front needs shells more than you need sleep.'\n\nNo one complained. The woman at the lathe had received a telegram yesterday. Her husband was not coming home. She picked up her tools and worked a sixteen-hour shift without a word."
 world_war_events.10.t:0 "Home Front Rally"
 world_war_events.100.a:0 "Impose a harsh peace."
 world_war_events.100.b:0 "Seek a just and lasting peace."
 world_war_events.100.c:0 "Establish a new world order."
 world_war_events.100.d:0 "The guns have fallen silent at last. The victorious powers gather to redraw the map of the world and shape the post-war order. The decisions made here will echo for generations."
 world_war_events.100.f:0 "The delegates filed into the palace hall in silence. Chandeliers blazed overhead; below, the carpet was threadbare from the boots of soldiers quartered there during the siege.\n\n'Shall we begin?' the chairman asked.\n\nA diplomat from the losing side studied his hands. 'We are here to receive your terms,' he said. 'Let us not pretend this is a negotiation.'\n\nThe chairman permitted himself a thin smile. 'Quite right. Shall we call it an opportunity instead?'"
 world_war_events.100.t:0 "The Peace Conference"
 world_war_events.101.a:0 "Accept the new order."
 world_war_events.101.b:0 "Resist the occupation."
 world_war_events.101.d:0 "The victorious powers have demanded a complete transformation of our government. Our former ideology - the one we fought and bled for - is to be dismantled. A new political order will be imposed upon us."
 world_war_events.101.f:0 "The foreign officer placed the document on the desk with the careful courtesy of a man delivering a death sentence. 'Your new constitution,' he said. 'We have taken the liberty of drafting it.'\n\nThe minister stared at the seal - not his nation's seal, but theirs. 'And if we object to its provisions?'\n\n'You misunderstand your position. You may object to the font.'"
 world_war_events.101.t:0 "Regime Change"
 world_war_events.102.a:0 "Accept the aid."
 world_war_events.102.b:0 "We will rebuild alone."
 world_war_events.102.d:0 "The victorious powers have offered substantial aid to rebuild our shattered nation. Their generosity comes with strings attached - closer economic ties, political alignment, and a permanent military presence. But the alternative is years of poverty and isolation."
 world_war_events.102.f:0 "The trucks arrived at dawn, stenciled with foreign markings. Canned meat, steel girders, sacks of cement. The mayor stood in the rubble of what had been the town hall and watched them unload.\n\n'Generous of them,' his deputy muttered.\n\n'Generous.' The mayor kicked a piece of masonry. 'Last year they dropped bombs on us. This year, powdered milk. I suppose that is what they call the arc of civilization.'"
 world_war_events.102.t:0 "Reconstruction Aid"
 world_war_events.103.a:0 "Prosecute the war criminals."
 world_war_events.103.b:0 "Focus on healing, not vengeance."
 world_war_events.103.c:0 "Bury the evidence."
 world_war_events.103.d:0 "As the fog of war lifts, horrifying revelations emerge about atrocities committed during the conflict. Mass graves, forced labor, systematic brutality - the scale of the crimes shocks the world. The question is: what do we do about it?"
 world_war_events.103.f:0 "The prosecutor held up the photograph. The courtroom fell silent.\n\n'The defendant claims he was following orders,' she said. 'Let us examine what those orders produced.'\n\nIn the dock, the old soldier stared straight ahead. He had not spoken since the trial began. His lawyer had advised him to show remorse. He showed nothing at all, and in its way, that was the most damning testimony of the week."
 world_war_events.103.t:0 "War Crimes Tribunal"
 world_war_events.104.a:0 "Establish our sphere of influence."
 world_war_events.104.b:0 "Champion self-determination."
 world_war_events.104.c:0 "Focus on domestic recovery."
 world_war_events.104.d:0 "With the great conflict behind us, the victorious powers must decide what kind of world they wish to build. Spheres of influence, new alliances, and international institutions are all on the table."
 world_war_events.104.f:0 "'We have won the war,' the prime minister said, pouring himself a brandy. 'Now we must win the peace, which, I am given to understand, is considerably more difficult.'\n\n'Spheres of influence?'\n\n'Naturally. The question is how large a sphere our friends will permit us, and how small a sphere we can persuade our enemies to accept.'\n\nHe raised his glass. 'To the new world order. May it last longer than the one we just buried.'"
 world_war_events.104.t:0 "The Post-War Order"
 world_war_events.105.a:0 "Prepare for the long struggle."
 world_war_events.105.b:0 "Seek peaceful coexistence."
 world_war_events.105.d:0 "The war is over, but already the seeds of the next conflict are being sown. [SCOPE.sCountry('new_rival_power').GetName] - once our ally of convenience - now stands as the greatest rival to our vision of the world. Two superpowers, two ideologies, one world."
 world_war_events.105.f:0 "The intelligence briefing was three pages long. The analyst summarized it in one sentence: 'They are building what we are building, and they are not building it for friendship.'\n\nThe defence minister closed the folder. 'Six months ago they were our allies.'\n\n'Six months ago we had a common enemy. Now we are each other's.'"
 world_war_events.105.t:0 "The New Rivalry"
 world_war_events.11.a:0 "Strengthen air defenses."
 world_war_events.11.b:0 "Retaliate in kind."
 world_war_events.11.c:0 "Focus on the ground war."
 world_war_events.11.d:0 "Enemy bombers have struck our cities, leaving devastation in their wake. Fires burn through the night as rescue crews dig through the rubble. The civilian toll mounts, but so does our resolve."
 world_war_events.11.f:0 "The sirens woke the children first. Then the thunder came - not from the sky but from the street, where the grocery had stood that morning.\n\nThe warden found the family in the cellar, covered in plaster dust, the youngest still clutching a wooden horse. 'Everyone accounted for?' he asked.\n\n'Everyone,' the mother said. She did not mention the cat, or the kitchen, or the life they had built above ground. There would be time for that later. Or there would not."
 world_war_events.11.t:0 "Strategic Bombing"
 world_war_events.12.a:0 "Support the resistance."
 world_war_events.12.b:0 "Order a crackdown."
 world_war_events.12.d:0 "In the occupied territories, a resistance movement has taken root. Brave men and women sabotage enemy supply lines, shelter fugitives, and maintain a flicker of hope in the darkness of occupation."
 world_war_events.12.f:0 "The baker slid the loaves across the counter and, beneath them, a folded note. The customer pocketed it without looking.\n\n'Same time Thursday?' she asked.\n\n'If the flour holds out.'\n\nNeither smiled. In occupied territory, a smile between strangers was as conspicuous as a gunshot."
 world_war_events.12.t:0 "Resistance Movement"
 world_war_events.2.a:0 "Demand a formal apology."
 world_war_events.2.b:0 "Downplay the incident."
 world_war_events.2.c:0 "Mobilize troops to the border."
 world_war_events.2.d:0 "A violent skirmish has erupted along the frontier with [SCOPE.sCountry('border_rival').GetName]. Shots were fired and casualties reported. Both sides blame the other. The incident threatens to spiral into something far larger."
 world_war_events.2.f:0 "The lieutenant's hands were still shaking when he filed the report. 'They crossed the line,' he said. 'I gave the order to fire.'\n\n'And the casualties?'\n\n'Three of theirs. One of ours. A corporal, twenty-two years old.'\n\nThe colonel closed the file. Somewhere between this desk and the capital, those numbers would become a crisis."
 world_war_events.2.t:0 "Border Incident"
 world_war_events.20.a:0 "Enter the war against the aggressors."
 world_war_events.20.b:0 "Provide material support only."
 world_war_events.20.c:0 "Maintain our neutrality."
 world_war_events.20.d:0 "The world war rages on, and we have remained on the sidelines. But the balance of power is shifting, and neutrality grows ever more untenable. [SCOPE.sCountry('ww_main_aggressor').GetName] grows stronger with each passing month. If we do not act soon, the window of opportunity may close forever."
 world_war_events.20.f:0 "The general spread the map across the cabinet table and tapped the front line with a blunt finger. 'Here,' he said. 'And here. If they break through, there will be nothing between them and the coast.'\n\n'And if we intervene?'\n\n'Then we are at war.' He folded his arms. 'But if we do not intervene, excellency, we shall be at their mercy - which, I assure you, is considerably worse.'"
 world_war_events.20.t:0 "The Hour of Decision"
 world_war_events.3.a:0 "Guarantee their sovereignty."
 world_war_events.3.b:0 "This is not our fight."
 world_war_events.3.c:0 "Form a defensive alliance."
 world_war_events.3.d:0 "[SCOPE.sCountry('crisis_aggressor').GetName] is pressuring smaller nations in our sphere of influence, demanding territorial concessions and political subservience. If we do not act, the balance of power may shift irrevocably."
 world_war_events.3.f:0 "The ambassador from the small nation placed both palms flat on the table, as if to steady himself. 'If your guarantees mean nothing,' he said, 'then say so plainly, and we will make other arrangements.'\n\n'What arrangements?' the foreign minister asked.\n\n'The only kind available to nations without powerful friends: surrender.'"
 world_war_events.3.t:0 "Diplomatic Crisis"
 world_war_events.30.a:0 "We must push through to victory."
 world_war_events.30.b:0 "Explore diplomatic channels."
 world_war_events.30.d:0 "The war has dragged on far longer than anyone expected. Casualty lists grow longer by the day, food is scarce, and the civilian population is exhausted. Voices demanding peace grow louder - but our enemies show no sign of surrender."
 world_war_events.30.f:0 "The postman no longer knocked. He simply left the telegrams on the step, because the sound of knocking had become something the women on this street could not bear to hear.\n\n'Another one,' the neighbor said, watching from her window. 'The Hendersons.'\n\n'That's their third son.'\n\nSilence. Somewhere, a church bell rang. It had been ringing for so many funerals that no one could remember the last time it rang for joy."
 world_war_events.30.t:0 "War Weariness"
 world_war_events.5.a:0 "To arms! For our nation and our cause!"
 world_war_events.5.d:0 "The tensions that have been building for years have finally exploded into open conflict. The great powers have chosen their sides. There is no turning back now - the world is engulfed in the most devastating war in human history."
 world_war_events.5.f:0 "The telegram arrived at three in the morning. The minister read it standing in his dressing gown, his face grey in the lamplight.\n\n'War,' he said. The word hung in the air like smoke.\n\nHis secretary waited, pen in hand. 'Shall I draft the mobilization order?'\n\n'Draft it. Date it. And pray to God that the men who must carry it out are braver than I feel at this moment.'"
 world_war_events.5.t:0 "The World at War"

