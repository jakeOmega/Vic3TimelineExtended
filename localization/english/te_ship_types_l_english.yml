l_english:

#
# SHIP_TYPES
#
 ship_type_amphibious_assault_ship: "Amphibious Assault Ship"
 ship_type_amphibious_assault_ship_desc: "A modern landing helicopter assault platform that can deploy a battalion of marines onto a hostile coast in a single wave. Replaces wartime troop transports."
 ship_type_antimatter_battleship: "Antimatter Battleship"
 ship_type_antimatter_battleship_desc: "A fusion-driven capital ship armed with antimatter-tipped mass-driver projectiles. The terminal expression of surface naval firepower."
 ship_type_arsenal_ship: "Arsenal Ship"
 ship_type_arsenal_ship_desc: "A capital-class missile platform packing hundreds of vertical-launch cells. Slow and lightly defended, but unmatched in sustained firepower."
 ship_type_asw_destroyer: "ASW Destroyer"
 ship_type_asw_destroyer_desc: "An anti-submarine specialist destroyer equipped with sonar arrays and depth charges. Outclasses earlier destroyers against subsurface threats."
 ship_type_autonomous_swarm_submarine: "Autonomous Swarm Submarine"
 ship_type_autonomous_swarm_submarine_desc: "An unmanned wolfpack of cooperating attack drones, coordinated by onboard AI. Devastating against capitals; vulnerable to dedicated point-defense escorts."
 ship_type_expeditionary_fast_transport: "Expeditionary Fast Transport"
 ship_type_expeditionary_fast_transport_desc: "A high-speed catamaran troop transport that keeps pace with carrier strike groups. Trades capacity for speed — the inverse doctrine of the Expeditionary Sea Base."
 ship_type_expeditionary_sea_base: "Expeditionary Sea Base"
 ship_type_expeditionary_sea_base_desc: "A floating staging platform that supports rapid forward deployment of marines and supplies far from any friendly port."
 ship_type_fleet_carrier: "Fleet Carrier"
 ship_type_fleet_carrier_desc: "A heavy fleet carrier purpose-built around carrier aviation doctrine. Projects air power across a task force at long range while screening capital ships from torpedo strikes."
 ship_type_guided_missile_ship: "Guided Missile Ship"
 ship_type_guided_missile_ship_desc: "A destroyer-class warship armed with guided anti-ship missiles. Trades close-in armament for stand-off precision strike capability."
 ship_type_hypersonic_missile_platform: "Hypersonic Missile Platform"
 ship_type_hypersonic_missile_platform_desc: "A capital warship optimized as a launch platform for hypersonic anti-ship missiles, capable of striking targets thousands of kilometers away in minutes."
 ship_type_marine_assault_ship: "Marine Assault Ship"
 ship_type_marine_assault_ship_desc: "A Cold War-era helicopter-capable amphibious assault ship. Replaces wartime LHAs as the standard troop transport once precision-guided munitions doctrine matures."
 ship_type_networked_air_defense_cruiser: "Networked Air Defense Cruiser"
 ship_type_networked_air_defense_cruiser_desc: "An anti-air and anti-missile escort that pools tracking data with allied ships and aircraft. Excels at swatting incoming guided weapons before they reach the fleet."
 ship_type_nuclear_submarine: "Nuclear Submarine"
 ship_type_nuclear_submarine_desc: "A nuclear-powered attack submarine capable of patrolling the deep ocean for months without surfacing. Devastating against capital ships."
 ship_type_nuclear_supercarrier: "Nuclear Supercarrier"
 ship_type_nuclear_supercarrier_desc: "A massive nuclear-powered fleet carrier with virtually unlimited endurance, projecting overwhelming air power across the world's oceans."
 ship_type_orbital_support_amphibious_mothership: "Orbital Support Mothership"
 ship_type_orbital_support_amphibious_mothership_desc: "A sea-based mothership that calls in orbital drop pods for marine deployment. Carries a brigade of marines and weeks of independent supply."
 ship_type_pulsed_laser_escort: "Pulsed Laser Escort"
 ship_type_pulsed_laser_escort_desc: "A cruiser equipped with directed-energy weapons. Pinpoint accuracy makes it devastating against missiles, aircraft, and small craft."
 ship_type_stealth_attack_submarine: "Stealth Attack Submarine"
 ship_type_stealth_attack_submarine_desc: "An air-independent-propulsion boat with a near-silent acoustic signature. Carries a heavy torpedo and cruise-missile payload designed to gut capital ships."
 ship_type_stealth_battlecruiser: "Stealth Battlecruiser"
 ship_type_stealth_battlecruiser_desc: "A network-linked capital ship with a radar-absorbent hull. Coordinates with offboard sensors to engage at extreme range while remaining hard to detect."
 ship_type_swarm_coordination_vessel: "Swarm Coordination Vessel"
 ship_type_swarm_coordination_vessel_desc: "Cruiser-sized command ship that coordinates large drone swarms, multiplying the effective firepower of every other ship in its fleet."
