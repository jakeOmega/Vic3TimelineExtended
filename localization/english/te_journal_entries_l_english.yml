#
# JOURNAL_ENTRIES
#
 je_banking_cycle:"Boom & Bust Cycle"
 je_civil_rights:0 "Civil Rights Movement"
 je_civil_rights_desc:0 "A political movement demanding equal rights for discriminated communities has taken root. How we respond will shape our nation's character."
 je_civil_rights_status_discriminatory:0 "Our current laws perpetuate #N discrimination#! against minority communities. The movement demands systemic reform."
 je_civil_rights_status_hostile:0 "Our laws enforce #R active hostility#! toward minority communities. The movement faces a long and difficult struggle."
 je_civil_rights_status_indifferent:0 "Our government takes no position on minority rights. The movement pushes for #G active protection#!."
 je_civil_rights_status_protective:0 "We have enacted protective measures, but the movement will not rest until #G full equality#! is achieved."
 je_colonial_empire:0 "Colonial Empire"
 je_colonial_empire_complete_tt:0 "All colonial territories with high acceptance have been integrated as permanent homelands. The solidified modifier permanently boosts cultural acceptance growth."
 je_colonial_empire_fail_tt:0 "The colonial empire has collapsed. All non-homeland territories are released as independent nations."
 je_colonial_empire_pressure_extreme:0 "#R Extreme great power decolonization pressure!#! Virtually every great power demands we release our colonies."
 je_colonial_empire_pressure_high:0 "#R High great power decolonization pressure.#! The international community is firmly against our empire."
 je_colonial_empire_pressure_low:0 "#Y Minimal great power decolonization pressure.#! One major power opposes our colonial holdings."
 je_colonial_empire_pressure_moderate:0 "#O Moderate great power decolonization pressure.#! Several powers demand decolonization."
 je_colonial_empire_pressure_none:0 "#G No great power decolonization pressure.#!"
 je_colonial_empire_status_collapsing:0 "#R Colonial empire is on the verge of collapse!#! Immediate action is needed or we will lose everything."
 je_colonial_empire_status_crumbling:0 "#R Colonial empire is crumbling.#! Unrest is widespread and maintaining control grows more costly by the day."
 je_colonial_empire_status_solidified:0 "#G Colonial empire nearly fully integrated.#! The overseas territories are becoming a permanent part of the nation."
 je_colonial_empire_status_stable:0 "#Y Colonial holdings are stable.#! Integration is proceeding, though challenges remain."
 je_colonial_empire_status_strained:0 "#O Colonial empire is under strain.#! Rising tensions and international pressure threaten our hold."
 je_create_new_religion:0 "Create New Religion"
 je_create_new_religion_reason:0 "We have the opportunity to create a new religion that will shape the beliefs and practices of our people. This will require significant resources and effort, but the potential benefits are immense. What path shall we choose?"
 je_global_warming:0 "Global Warming"
 je_global_warming_status_catastrophic:0 "#bold Warming:#! #R Catastrophic#! - Temperatures have surpassed 3°C. Cascading ecological failures are now irreversible."
 je_global_warming_status_moderate:0 "#bold Warming:#! #Y Moderate#! - The planet has warmed noticeably. Crop disruptions and erratic weather become common."
 je_global_warming_status_negligible:0 "#bold Warming:#! #G Negligible#! - Global temperatures remain near pre-industrial levels."
 je_global_warming_status_severe:0 "#bold Warming:#! #R Severe#! - The climate crisis is dire. Famine, ecological collapse, and surging mortality threaten civilisation."
 je_global_warming_status_significant:0 "#bold Warming:#! #O Significant#! - Warming has reached dangerous levels. Coastal flooding, drought, and mass displacement accelerate."
 je_global_warming_status_slight:0 "#bold Warming:#! #Y Slight#! - Global temperatures have risen slightly. Early signs of shifting weather patterns emerge."
 je_group_environment:0 "Environment"
 je_heir_education:0 "Heir Education"
 je_heir_education_desc:0 "The future of the realm hangs upon the character of the next sovereign. By setting the direction of our heir's education — choosing between administrative, diplomatic, and military training, and selecting tutors of various political persuasions — we shape the next generation of leadership. Education proceeds gradually; the heir's aptitudes, ideology, and factional loyalties will be determined when they come of age."
 je_heir_education_reason:0 "Set educational focuses for the heir. Each active focus has a monthly chance of advancing that area of study.\n\n#bold Trait Focuses:#! Administrative, diplomatic, or military — only one at a time. Greater investment improves chances of developing better aptitude traits.\n\n#bold Ideology:#! Progressive or conservative tutors shape the heir\'s political outlook.\n\n#bold Faction:#! Establishment or reformist mentors influence the heir\'s interest group affiliation.\n\n#bold Completion:#! The heir\'s education resolves when they reach adulthood. Outcomes are probabilistic — sustained focus improves odds but guarantees nothing."
 je_heir_education_status_active:0 "#G Education Active#!\nThe heir is being educated. Use the focus buttons to direct their studies."
 je_heir_education_status_no_focus:0 "No educational focus is set. Select a trait focus, ideology, or faction mentorship to begin shaping the heir's development."
 je_nuclear_program:0 "Nuclear Program"
 je_state_collapse:0 "State Collapse"
 je_state_collapse_reason:0 "State Collapse is the failure of a state to provide basic services and security to its citizens. This can be caused by a variety of factors, including corruption, conflict, and natural disasters. State Collapse can lead to widespread suffering, displacement, and violence."
 je_un_active_policies:0 "Join the United Nations to access programs and participate in resolutions."
 je_un_active_programs:0 "\n#bold Resolutions & Programs:#!\n• Peacekeeping: [SCOPE.GetRootScope.ScriptValue('un_peacekeeping_count')|0] contributing\n• Development Aid: [SCOPE.GetRootScope.ScriptValue('un_development_count')|0] funding\n• Human Rights: [SCOPE.GetRootScope.ScriptValue('un_human_rights_champion_count')|0] champions, [SCOPE.GetRootScope.ScriptValue('un_human_rights_signatories')|0] declaration signatories\n• Arms Control: [SCOPE.GetRootScope.ScriptValue('un_arms_control_count')|0] signatories\n• Non-Proliferation: [SCOPE.GetRootScope.ScriptValue('un_nonproliferation_signatories')|0] treaty signatories\n• Climate Accord: [SCOPE.GetRootScope.ScriptValue('un_climate_signatories')|0] bound\n• Heritage: [SCOPE.GetRootScope.ScriptValue('un_heritage_participants')|0] participating\n• Sanctions: [SCOPE.GetRootScope.ScriptValue('un_sanctions_target_count')|0] under sanction"
 je_un_agencies_header:0 "\n#bold Specialized Agencies:#! [SCOPE.GetRootScope.ScriptValue('un_agency_count')|0] of 7 established:\n"
 je_un_agency_iaea_active:0 "  #G • IAEA#! — nuclear energy oversight\n"
 je_un_agency_icj_active:0 "  #G • ICJ#! — International Court of Justice\n"
 je_un_agency_unep_active:0 "  #G • UNEP#! — environment programme\n"
 je_un_agency_unesco_active:0 "  #G • UNESCO#! — heritage and culture\n"
 je_un_agency_unhcr_active:0 "  #G • UNHCR#! — refugee agency\n"
 je_un_agency_unhrc_active:0 "  #G • UNHRC#! — human rights council\n"
 je_un_agency_who_active:0 "  #G • WHO#! — World Health Organization\n"
 je_un_authority_collapsed:0 "#R UN Authority: Collapsed#! (below 10). The institution has lost all credibility. #bold No membership benefits.#!\n"
 je_un_authority_dominant:0 "#B UN Authority: Dominant#! (85+). The UN shapes global policy. #bold Benefits at 1.7×–2.0× base.#!\n"
 je_un_authority_drift:0 "#bold Monthly Drift:#! Toward 50 (±0.5).\n#G [SCOPE.GetRootScope.ScriptValue('un_gp_with_humanitarian_regs')|0] GPs with Humanitarian Regs: +0.2 ea.#!\n #R [SCOPE.GetRootScope.ScriptValue('un_member_wars_count')|0] members at war: −1 ea.#!\n"
 je_un_authority_moderate:0 "#v UN Authority: Moderate#! (30–59). Major powers comply selectively. #bold Benefits at 0.6×–1.2× base.#!\n"
 je_un_authority_strong:0 "#G UN Authority: Strong#! (60–84). Resolutions carry real weight. #bold Benefits at 1.2×–1.7× base.#!\n"
 je_un_authority_weak:0 "#Y UN Authority: Weak#! (10–29). Resolutions routinely ignored. #bold No membership benefits#! (need 30+).\n"
 je_un_hq_established:0 "\n#bold Headquarters:#! [GetGlobalVariable('un_hq_country').GetCountry.GetName]"
 je_un_hq_host:0 "\n#bold Headquarters:#! #G In our capital.#! (+10 Diplo Rep, +100 Prestige, +10 Leverage)"
 je_un_security_council_member:0 "\n#bold Security Council:#! [SCOPE.GetRootScope.ScriptValue('un_security_council_count')|0] permanent members. #G We hold a seat.#!"
 je_un_security_council_nonmember:0 "\n#bold Security Council:#! [SCOPE.GetRootScope.ScriptValue('un_security_council_count')|0] permanent members. We do not hold a seat."
 je_un_statistics:0 "\n#bold General Assembly:#! [SCOPE.GetRootScope.ScriptValue('un_member_count')|0] of [SCOPE.GetRootScope.ScriptValue('un_independent_country_count')|0] nations ([SCOPE.GetRootScope.ScriptValue('un_member_gdp_share')|0]% world GDP, [SCOPE.GetRootScope.ScriptValue('un_member_pop_share')|0]% population)\n#bold Great Powers:#! [SCOPE.GetRootScope.ScriptValue('un_gp_member_count')|0] of [SCOPE.GetRootScope.ScriptValue('un_total_gp_count')|0] are members\n"
 je_un_status_member:0 "#G Active member.#! Benefits scale with Authority (×authority/50 when ≥30).\n"
 je_un_status_not_member:0 "#v Not a member.#! Join to gain #bold +5 Diplo Rep#!, #bold +5 Leverage#!, and access to UN programs.\n"
 je_united_nations:0 "United Nations"
 je_world_war:0 "The Gathering Storm"
 je_world_war_ideology_authoritarian:0 "#bold Our Ideology:#! Authoritarian"
 je_world_war_ideology_communist:0 "#bold Our Ideology:#! #R Communist#!"
 je_world_war_ideology_democratic:0 "#bold Our Ideology:#! #G Democratic#!"
 je_world_war_ideology_fascist:0 "#bold Our Ideology:#! #R Fascist#!"
 je_world_war_ideology_nonaligned:0 "#bold Our Ideology:#! Non-Aligned"
 je_world_war_reason:0 "Ideological tensions between the great powers are escalating. Democratic, fascist, and communist blocs eye one another with growing hostility. The world teeters on the brink of a conflict unlike any before."
 je_world_war_status_active_war:0 "#bold THE WORLD IS AT WAR.#! Our forces are engaged in total combat against the enemy bloc. Every factory, every citizen, every resource is committed to victory."
 je_world_war_status_crisis:0 "#R CRISIS:#! War is imminent. The great powers have drawn their lines. Any incident could ignite the powder keg."
 je_world_war_status_high_tension:0 "#Y HIGH TENSION:#! The ideological divide deepens. Military buildups accelerate. Diplomatic channels are strained to breaking point."
 je_world_war_status_observing:0 "The great powers are at war. We remain outside the conflict — for now. Pressure mounts to choose a side."
 je_world_war_status_post_war:0 "The guns have fallen silent. The world holds its breath as the victors and vanquished negotiate the shape of the post-war order."
 je_world_war_status_rising_tension:0 "Tensions are rising between the ideological blocs. Arms races have begun, and border incidents grow more frequent."
 je_world_war_status_simmering:0 "The great powers watch each other warily. Ideological differences simmer beneath the surface of diplomacy."
 je_world_war_status_total_war:0 "#bold TOTAL WAR.#! #R The conflict has raged for years. Cities lie in ruins. Entire generations are being consumed by the furnace of war.#!"
 je_world_war_status_war_declared:0 "#bold WAR HAS BEEN DECLARED.#! The ideological blocs have taken up arms. The world holds its breath."
