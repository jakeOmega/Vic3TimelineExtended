 je_iw_ops_header:0 "\n#bold Cyber Operations:#! [ROOT.ScriptValue('cyber_active_display')] / [ROOT.ScriptValue('cyber_slots_display')] slots ([ROOT.ScriptValue('cyber_available_slots_display')] available)"
 je_iw_sovereignty_gdp:0 "  GDP Share: #v [ROOT.ScriptValue('digital_sovereignty_from_gdp_display')]#!"
 je_iw_sovereignty_header:0 "\n#bold Digital Sovereignty Breakdown:#!"
 je_iw_sovereignty_literacy:0 "  Literacy: #v [ROOT.ScriptValue('digital_sovereignty_from_literacy_display')]#!"
 je_iw_sovereignty_modifiers:0 "  Tech/Laws/Institutions: #v [ROOT.ScriptValue('digital_sovereignty_from_modifiers_display')]#!"
 je_iw_status_defended:0 "#Y Defended.#! Our cyber defenses are adequate, though determined adversaries may find vulnerabilities."
 je_iw_status_exposed:0 "#O Exposed.#! Our digital infrastructure has significant gaps. We are vulnerable to sustained cyber campaigns."
 je_iw_status_fortress:0 "#bold DIGITAL FORTRESS.#! #G [ROOT.GetCountry.GetName]'s cyber defenses are virtually impenetrable.#! Foreign operations face near-certain detection."
 je_iw_status_hardened:0 "#G Hardened.#! Our digital infrastructure is well-defended. Only the most sophisticated operations have a chance of success."
 je_iw_status_vulnerable:0 "#R Vulnerable.#! Our nation's digital defenses are dangerously weak. Foreign intelligence services operate with near impunity."
 je_lgbtq_rights:0 "LGBTQ+ Rights Movement"
 je_lgbtq_rights_status_basic:0 "#G Basic protections are in place,#! but the movement pushes for comprehensive equality."
 je_lgbtq_rights_status_comprehensive:0 "#G Comprehensive rights have been achieved.#! Full equality and protection remains the goal."
 je_lgbtq_rights_status_limbo:0 "#Y LGBTQ+ citizens exist in legal limbo.#! Neither protected nor actively persecuted, but lacking formal rights."
 je_lgbtq_rights_status_persecuted:0 "#R LGBTQ+ citizens face active persecution under the law.#! The movement fights for basic survival."
 je_mental_health_crisis:0 "Mental Health Crisis"
 je_mental_health_status_crisis:0 "#R The mental health crisis deepens.#! Without rehabilitative justice, society treats symptoms as crimes."
 je_mental_health_status_rehab:0 "#G Rehabilitation-focused justice is in place,#! but comprehensive mental health infrastructure is still needed."
 je_nuclear_program:0 "Nuclear Program"
 je_post_scarcity:0 "Post-Scarcity Transition"
 je_post_scarcity_status_early:0 "#Y The age of automation dawns.#! Mass unemployment looms as machines replace workers across all sectors."
 je_post_scarcity_status_transition:0 "#G Post-scarcity technology exists.#! The final transition to a new economic paradigm awaits political will."
 je_post_scarcity_status_ubi:0 "#G Universal Basic Income is in place,#! but the full transition to post-scarcity remains distant."
 je_second_wave_feminism:0 "Second-Wave Feminism"
 je_space_race_interstellar_probe:0 "Interstellar Probe"
 je_space_race_interstellar_probe_reason:0 "We are developing a probe capable of reaching another star system, pushing the boundaries of what is possible."
 je_space_race_interstellar_probe_status_ambitious:0 "#bold Approach:#! Ambitious\n#bold Status:#! Aggressive development of interstellar propulsion systems. High risk of mission failure, but the probe could launch years ahead of schedule."
 je_space_race_interstellar_probe_status_default:0 "#bold Status:#! Designing and building a probe to reach Alpha Centauri. Select an approach to proceed."
 je_space_race_interstellar_probe_status_safe:0 "#bold Approach:#! Safe\n#bold Status:#! Methodical development and testing of interstellar drive systems. Slower but reliable."
 je_space_race_interstellar_results:0 "Interstellar Probe: Awaiting Data"
 je_space_race_interstellar_results_reason:0 "Our interstellar probe is transmitting data from the void between stars. The results could reshape our understanding of the universe."
 je_space_race_interstellar_results_status:0 "Our probe is en route to Alpha Centauri. At best speed, the journey will take five to six years. Electromagnetic transmissions must then cross 4.37 light-years back to Earth. We wait."
 je_space_race_mars_landing:0 "Mars Landing"
 je_space_race_mars_landing_reason:0 "The red planet beckons. A crewed Mars landing would be humanity's greatest achievement in space exploration."
 je_space_race_mars_landing_status_ambitious:0 "#bold Approach:#! Ambitious\n#bold Status:#! Crews are training for the long transit to Mars. Every test brings us closer: and every failure could set us back years."
 je_space_race_mars_landing_status_default:0 "#bold Status:#! We have begun planning for a crewed Mars mission. Select an approach to begin making progress."
 je_space_race_mars_landing_status_safe:0 "#bold Approach:#! Safe\n#bold Status:#! Careful incremental testing of life support, propulsion, and landing systems for the Mars transit."
 je_space_race_moon_base:0 "Moon Base"
 je_space_race_moon_base_reason:0 "A permanent lunar outpost will serve as a stepping stone for deeper space exploration and a symbol of our civilization's ambition."
 je_space_race_moon_base_status_ambitious:0 "#bold Approach:#! Ambitious\n#bold Status:#! Rapid-deployment habitat modules are being launched in quick succession. The base takes shape with breathtaking speed."
 je_space_race_moon_base_status_default:0 "#bold Status:#! With a successful landing behind us, we can now establish a permanent lunar presence. Select an approach."
 je_space_race_moon_base_status_safe:0 "#bold Approach:#! Safe\n#bold Status:#! Each module is thoroughly tested on Earth before launch. The base grows slowly but reliably."
 je_space_race_moon_landing:0 "Moon Landing"
 je_space_race_moon_landing_reason:0 "The ultimate prize of the space race: landing humans on the Moon and returning them safely to Earth."
 je_space_race_moon_landing_status_ambitious:0 "#bold Approach:#! Ambitious\n#bold Status:#! The lunar lander is being fast-tracked through testing. Bold decisions and compressed timelines push us toward the Moon."
 je_space_race_moon_landing_status_default:0 "#bold Status:#! We are planning a crewed mission to the Moon's surface. Select an approach and landing site."
 je_space_race_moon_landing_status_equatorial:0 "#bold Landing Site:#! Equatorial Plain (Low Risk)\n#bold Approach:#! Methodical survey and landing at a well-mapped equatorial site."
 je_space_race_moon_landing_status_safe:0 "#bold Approach:#! Safe\n#bold Status:#! Robotic precursor missions map the surface in detail before any crew is committed."
 je_space_race_moon_landing_status_shackleton:0 "#bold Landing Site:#! Shackleton Crater (High Risk)\n#bold Approach:#! Targeting the permanently shadowed south polar crater: treacherous terrain, but immense scientific potential."
 je_space_race_orbital:0 "Orbital Flight"
 je_space_race_orbital_reason:0 "Having achieved suborbital flight, our engineers are working to put a satellite or crewed capsule into stable orbit around the Earth."
 je_space_race_orbital_status_ambitious:0 "#bold Approach:#! Ambitious\n#bold Status:#! Accelerated testing of orbital insertion systems. The race to put a person in orbit is on."
 je_space_race_orbital_status_default:0 "#bold Status:#! With suborbital flight mastered, we now set our sights on a full orbital mission. Select an approach."
 je_space_race_orbital_status_safe:0 "#bold Approach:#! Safe\n#bold Status:#! Methodical testing of heat shields, life support, and orbital mechanics. Each step carefully validated."
 je_space_race_probe:0 "Outer Solar System Probe"
 je_space_race_probe_reason:0 "With orbital capability proven, we can now send unmanned probes to explore the solar system and gather scientific data."
 je_space_race_probe_status_ambitious:0 "#bold Approach:#! Ambitious\n#bold Status:#! The probe is being built to an aggressive timeline with cutting-edge but unproven instruments."
 je_space_race_probe_status_default:0 "#bold Status:#! We are designing an unmanned probe to explore the outer solar system. Select an approach."
 je_space_race_probe_status_safe:0 "#bold Approach:#! Safe\n#bold Status:#! Proven instrument packages and conservative flight plans ensure the probe reaches its destination intact."
 je_space_race_solar_colonization:0 "Solar System Colonization"
 je_space_race_solar_colonization_reason:0 "The colonization of the solar system represents the next great chapter for our civilization, establishing permanent settlements beyond Earth."
 je_space_race_solar_colonization_status_stage1:0 "#bold Stage 1: Inner Solar System#!\nEstablishing colonies on Mars and the asteroid belt. [SCOPE.GetRootScope.ScriptValue('sr_colony_count')|0] colonies established."
 je_space_race_solar_colonization_status_stage2:0 "#bold Stage 2: Gas Giant Frontier#!\nColonizing Jupiter's moons and the upper atmosphere of Venus. [SCOPE.GetRootScope.ScriptValue('sr_colony_count')|0] colonies established."
 je_space_race_solar_colonization_status_stage3:0 "#bold Stage 3: Mid-System Expansion#!\nEstablishing footholds on Mercury and Saturn's moons. [SCOPE.GetRootScope.ScriptValue('sr_colony_count')|0] colonies established."
 je_space_race_solar_colonization_status_stage4:0 "#bold Stage 4: Ice Giant Frontier#!\nPushing outward to the moons of Uranus and Neptune. [SCOPE.GetRootScope.ScriptValue('sr_colony_count')|0] colonies established."
 je_space_race_solar_colonization_status_stage5:0 "#bold Stage 5: Kuiper Belt & Beyond#!\nThe final frontier: dwarf planets and trans-Neptunian objects. [SCOPE.GetRootScope.ScriptValue('sr_colony_count')|0] colonies established."
 je_space_race_suborbital:0 "Suborbital Flight"
 je_space_race_suborbital_reason:0 "Our scientists are developing rocketry capable of reaching the edge of space. A successful suborbital flight will demonstrate our nation's technological prowess."
 je_space_race_suborbital_status_ambitious:0 "#bold Approach:#! Ambitious\n#bold Status:#! Rapid test launches with human-rated payloads. Fortune favors the bold."
 je_space_race_suborbital_status_default:0 "#bold Status:#! Our rocketry program is ready to reach for the skies. Select an approach to begin the space race."
 je_space_race_suborbital_status_safe:0 "#bold Approach:#! Safe\n#bold Status:#! Careful, incremental test flights building toward the edge of space."
 je_state_collapse:0 "State Collapse"
 je_state_collapse_reason:0 "State Collapse is the failure of a state to provide basic services and security to its citizens. This can be caused by a variety of factors, including corruption, conflict, and natural disasters. State Collapse can lead to widespread suffering, displacement, and violence."
 je_un_active_policies:0 "Join the United Nations to access programs and participate in resolutions."
 je_un_active_programs:0 "\n#bold Resolutions & Programs:#!\n• Peacekeeping: [SCOPE.GetRootScope.ScriptValue('un_peacekeeping_count')|0] contributing\n• Development Aid: [SCOPE.GetRootScope.ScriptValue('un_development_count')|0] funding\n• Human Rights: [SCOPE.GetRootScope.ScriptValue('un_human_rights_champion_count')|0] champions, [SCOPE.GetRootScope.ScriptValue('un_human_rights_signatories')|0] declaration signatories\n• Arms Control: [SCOPE.GetRootScope.ScriptValue('un_arms_control_count')|0] signatories\n• Non-Proliferation: [SCOPE.GetRootScope.ScriptValue('un_nonproliferation_signatories')|0] treaty signatories\n• Climate Accord: [SCOPE.GetRootScope.ScriptValue('un_climate_signatories')|0] bound\n• Heritage: [SCOPE.GetRootScope.ScriptValue('un_heritage_participants')|0] participating\n• Sanctions: [SCOPE.GetRootScope.ScriptValue('un_sanctions_target_count')|0] under sanction"
