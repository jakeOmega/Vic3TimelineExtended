 je_iw_op_financial_subversion_active:0 "  • #Y Financial Subversion#! — Destabilizing a rival's banking system"
 je_iw_op_infrastructure_sabotage_active:0 "  • #R Infrastructure Sabotage#! — Disrupting enemy production and transport"
