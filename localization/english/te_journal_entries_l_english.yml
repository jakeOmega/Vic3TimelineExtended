 je_un_authority_collapsed:0 "#R UN Authority: Collapsed#! (below 10). The institution has lost all credibility. #bold No membership benefits.#!\n"
 je_un_authority_dominant:0 "#B UN Authority: Dominant#! (85+). The UN shapes global policy. #bold Benefits at 1.7×–2.0× base.#!\n"
 je_un_authority_drift:0 "#bold Monthly Authority Drift:#!\n Base (toward 50): #v [SCOPE.GetRootScope.ScriptValue('un_authority_drift_base')|2]#!\n Humanitarian Governance: #G [SCOPE.GetRootScope.ScriptValue('un_authority_drift_democracy')|2]#!\n Championing Order: #G [SCOPE.GetRootScope.ScriptValue('un_authority_drift_champion')|2]#!\n Undermining Order: #R [SCOPE.GetRootScope.ScriptValue('un_authority_drift_undermine')|2]#!\n Member Wars: #R [SCOPE.GetRootScope.ScriptValue('un_authority_drift_wars')|1]#!\n ──────\n #bold Total: #v [SCOPE.GetRootScope.ScriptValue('un_authority_drift_total')|2]#! per month#!\n"
