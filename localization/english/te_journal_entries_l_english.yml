 je_civil_rights:0 "Civil Rights Movement"
 je_civil_rights_desc:0 "A political movement demanding equal rights for discriminated communities has taken root. How we respond will shape our nation's character."
 je_civil_rights_status_discriminatory:0 "Our current laws perpetuate #N discrimination#! against minority communities. The movement demands systemic reform."
 je_civil_rights_status_hostile:0 "Our laws enforce #R active hostility#! toward minority communities. The movement faces a long and difficult struggle."
 je_civil_rights_status_indifferent:0 "Our government takes no position on minority rights. The movement pushes for #G active protection#!."
 je_civil_rights_status_protective:0 "We have enacted protective measures, but the movement will not rest until #G full equality#! is achieved."
 je_colonial_empire:0 "Colonial Empire"
 je_colonial_empire_complete_tt:0 "All colonial territories with high acceptance have been integrated as permanent homelands. The solidified modifier permanently boosts cultural acceptance growth."
 je_colonial_empire_fail_tt:0 "The colonial empire has collapsed. All non-homeland territories are released as independent nations."
 je_colonial_empire_pressure_extreme:0 "#R Extreme great power decolonization pressure!#! Virtually every great power demands we release our colonies."
 je_colonial_empire_pressure_high:0 "#R High great power decolonization pressure.#! The international community is firmly against our empire."
 je_colonial_empire_pressure_low:0 "#Y Minimal great power decolonization pressure.#! One major power opposes our colonial holdings."
 je_colonial_empire_pressure_moderate:0 "#O Moderate great power decolonization pressure.#! Several powers demand decolonization."
 je_colonial_empire_pressure_none:0 "#G No great power decolonization pressure.#!"
 je_colonial_empire_status_collapsing:0 "#R Colonial empire is on the verge of collapse!#! Immediate action is needed or we will lose everything."
 je_colonial_empire_status_crumbling:0 "#R Colonial empire is crumbling.#! Unrest is widespread and maintaining control grows more costly by the day."
 je_colonial_empire_status_solidified:0 "#G Colonial empire nearly fully integrated.#! The overseas territories are becoming a permanent part of the nation."
 je_colonial_empire_status_stable:0 "#Y Colonial holdings are stable.#! Integration is proceeding, though challenges remain."
 je_colonial_empire_status_strained:0 "#O Colonial empire is under strain.#! Rising tensions and international pressure threaten our hold."
 je_create_new_religion:0 "Create New Religion"
 je_create_new_religion_reason:0 "We have the opportunity to create a new religion that will shape the beliefs and practices of our people. This will require significant resources and effort, but the potential benefits are immense. What path shall we choose?"
 je_cultural_hegemony:0 "Cultural Hegemony"
 je_cultural_hegemony_reason:0 "Our nation's arts, technology, and way of life project influence across the globe. The world watches, imitates, or resents our cultural dominance."
 je_cultural_hegemony_status_dominant:0 "#bold #G CULTURAL HEGEMON#!#!\n[ROOT.GetCountry.GetName] is the undisputed center of global culture. Our art, language, and political model are the world's aspiration."
 je_cultural_hegemony_status_major:0 "#bold #G Major Cultural Power#!#!\n[ROOT.GetCountry.GetName] exerts significant cultural influence worldwide. Our media, innovations, and lifestyle set global trends."
 je_cultural_hegemony_status_minor:0 "#bold Minor Cultural Influence#!\nOur cultural output is modest. Few outside our borders look to [ROOT.GetCountry.GetName] for inspiration."
 je_cultural_hegemony_status_moderate:0 "#bold #Y Moderate Cultural Influence#!#!\n[ROOT.GetCountry.GetName] has a growing cultural footprint, but we are far from dominant."
 je_cultural_hegemony_status_negligible:0 "#bold #R Negligible Cultural Influence#!#!\n[ROOT.GetCountry.GetName] has virtually no global cultural presence."
 je_cultural_hegemony_status_significant:0 "#bold #Y Significant Cultural Presence#!#!\n[ROOT.GetCountry.GetName]'s culture resonates beyond our borders. The world is taking notice of our achievements."
 je_decline_of_religion:0 "Decline of Religion"
 je_decline_religion_status_ministry:0 "#Y The Ministry of Religion still holds power,#! but secular forces push to disestablish it."
 je_decline_religion_status_secular:0 "#G The state has separated from organized religion,#! but a meaning vacuum persists."
 je_digital_rights:0 "Digital Rights & Surveillance"
 je_digital_rights_status_minimal:0 "#Y Minimal privacy protections exist,#! but the surveillance state grows."
 je_digital_rights_status_moderate:0 "#G Moderate data privacy laws are in place,#! but comprehensive digital rights remain unachieved."
 je_digital_rights_status_surveillance:0 "#R An intrusive surveillance apparatus monitors the population.#! Privacy advocates fight an uphill battle."
 je_environmental_crisis:0 "Environmental Crisis Response"
 je_environmental_status_no_ministry:0 "#R No environmental ministry exists.#! Pollution continues unchecked as industry prioritizes profit over the planet."
 je_global_warming:0 "Global Warming"
 je_global_warming_status_catastrophic:0 "#bold Warming:#! #R Catastrophic#! - Temperatures have surpassed 3°C. Cascading ecological failures are now irreversible."
 je_global_warming_status_moderate:0 "#bold Warming:#! #Y Moderate#! - The planet has warmed noticeably. Crop disruptions and erratic weather become common."
 je_global_warming_status_negligible:0 "#bold Warming:#! #G Negligible#! - Global temperatures remain near pre-industrial levels."
 je_global_warming_status_severe:0 "#bold Warming:#! #R Severe#! - The climate crisis is dire. Famine, ecological collapse, and surging mortality threaten civilisation."
 je_global_warming_status_significant:0 "#bold Warming:#! #O Significant#! - Warming has reached dangerous levels. Coastal flooding, drought, and mass displacement accelerate."
 je_global_warming_status_slight:0 "#bold Warming:#! #Y Slight#! - Global temperatures have risen slightly. Early signs of shifting weather patterns emerge."
