 je_group_environment:0 "Environment"
 je_group_soft_power:0 "Soft Power"
 je_heir_education:0 "Heir Education"
 je_heir_education_desc:0 "The future of the realm hangs upon the character of the next sovereign. By setting the direction of our heir's education: choosing between administrative, diplomatic, and military training, and selecting tutors of various political persuasions: we shape the next generation of leadership. Education proceeds gradually; the heir's aptitudes, ideology, and factional loyalties will be determined when they come of age."
 je_heir_education_reason:0 "Set educational focuses for the heir. Each active focus has a monthly chance of advancing that area of study.\n\n#bold Trait Focuses:#! Administrative, diplomatic, or military: only one at a time. Greater investment improves chances of developing better aptitude traits.\n\n#bold Ideology:#! Progressive or conservative tutors shape the heir's political outlook.\n\n#bold Faction:#! Establishment or reformist mentors influence the heir's interest group affiliation.\n\n#bold Completion:#! The heir's education resolves when they reach adulthood. Outcomes are probabilistic: sustained focus improves odds but guarantees nothing."
 je_heir_education_status_active:0 "#G Education Active#!\nThe heir is being educated. Use the focus buttons to direct their studies."
 je_heir_education_status_bright:0 "#G The heir is a quick study.#! Education is progressing well."
 je_heir_education_status_no_focus:0 "No educational focus is set. Select a trait focus, ideology, or faction mentorship to begin shaping the heir's development."
 je_heir_education_status_slow:0 "#R The heir struggles to grasp concepts.#! Education makes slow progress."
 je_human_augmentation:0 "Human Augmentation Debate"
 je_information_warfare:0 "Information Warfare"
 je_information_warfare_reason:0 "The digital battlefield is invisible but decisive. Our intelligence services wage shadow wars of subversion and sabotage, while our Digital Sovereignty protects us from foreign interference."
 je_iw_funding_status:0 "\n#bold Funding Level:#! [ROOT.ScriptValue('cyber_funding_level_display')] / 3"
 je_iw_no_operations:0 "  No active operations. Use @diplomacy_icon diplomatic actions to launch operations against rivals."
