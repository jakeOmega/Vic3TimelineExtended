 UN_FOUND:0 "Found the United Nations"
 UN_FOUND_DESC:0 "Establish the United Nations as an international body for diplomacy and cooperation. Requires #bold Great Power#! status and #bold Intergovernmental Organizations#! technology. Costs prestige and bureaucracy. The founding nation becomes the first member, hosts the headquarters, and gains a permanent Security Council seat."
 UN_FUND_DEVELOPMENT:0 "Fund Development Programs"
 UN_HUMAN_RIGHTS:0 "Champion Human Rights Resolution"
 UN_JOIN:0 "Join the United Nations"
 UN_JOIN_DESC:0 "Join the United Nations. Grants permanent #bold +5 Diplomatic Reputation#! and #bold +5 Leverage#!. When UN Authority is 30+, also receive scaled membership benefits (#bold +5 Diplo Rep, +1% Research, +25 Prestige#! at Authority 50). Enables all UN policy programs."
 UN_LEAVE:0 "Leave the United Nations"
 UN_LEAVE_DESC:0 "Withdraw from the United Nations. #R Removes all UN modifiers#! (membership, peacekeeping, development, human rights, arms control). Applies #bold −15 Diplo Rep#! and #bold −50 Prestige#! penalty for 3 years. #bold −3 UN Authority.#!"
 UN_LIFT_SANCTIONS:0 "Lift Sanctions"
 UN_PEACEKEEPING:0 "Contribute to Peacekeeping"
 UN_PEACEKEEPING_DESC:0 "Commit military resources to UN peacekeeping. Grants #bold +5 Diplomatic Reputation#! and #bold +25 Prestige#!, but increases #bold Military Goods Cost +3%#!. #G +3 UN Authority.#! Requires Major Power rank. Peacekeeping events may deploy forces abroad for additional prestige."
 UN_PROPOSE_CONDEMN:0 "Propose Condemnation"
 UN_PROPOSE_SANCTIONS:0 "Propose Sanctions"
 UN_REQUEST_AID:0 "Request Humanitarian Aid"
 UN_REQUEST_PEACEKEEPERS:0 "Request UN Peacekeepers"
 UN_STOP_CHAMPIONING:0 "Stop Championing Order"
 UN_STOP_UNDERMINING:0 "Stop Undermining Order"
 UN_UNDERMINE_ORDER:0 "Undermine International Order"
 WW_APPEASE_BUTTON:0 "Pursue Appeasement"
 WW_REARM_BUTTON:0 "Begin Rearmament"
 accepted_cultures_cost:0 "Accepted Cultures Cost"
 accepted_cultures_cost_desc:0 "Modifies the cost associated with accepted cultures."
 addiction_public_health_modifier_desc:0 "A public health approach to addiction has improved outcomes and reduced mortality."
 adopt_local_culture:0 "Adopt Local Culture"
 adopt_local_culture_desc:0 "Our state exists entire outside of the homelands of our primary culture. Perhaps it is time for the local culture to become our primary culture."
 advanced_materials:0 "Advanced Materials"
 ai_assisted_governance_modifier_desc:0 "AI assists human bureaucrats rather than replacing them, improving efficiency while maintaining employment."
 ai_bureaucracy_modifier:0 "AI Bureaucratic Automation"
 ai_bureaucracy_modifier_desc:0 "AI systems have replaced much of the traditional bureaucracy, dramatically improving efficiency but causing unemployment."
 ai_policing_banned_modifier_desc:0 "A ban on AI in law enforcement protects civil liberties but limits security capabilities."
 alternative_service_modifier:0 "Alternative Service Program"
 alternative_service_modifier_desc:0 "An alternative service program for conscientious objectors has reduced military manpower but eased social tensions."
 amendment_community_service:0 "Community Service Alternative"
 amendment_community_service_desc:0 "An amendment allowing community service as an alternative to incarceration for non-violent offenses, introducing a restorative element to an otherwise punishment-focused system."
 amendment_compromise_modifier:0 "Compromise Amendment"
 amendment_compromise_modifier_desc:0 "Accepting an amendment has broadened the coalition in favour of the law, easing its passage."
 amendment_cooperative_preference:0 "Worker Cooperative Preference"
 amendment_cooperative_preference_desc:0 "An amendment giving worker-owned cooperatives preferential treatment in antitrust enforcement, encouraging democratic ownership of industry."
 amendment_corporate_data_exemption_desc:0 "An amendment carving out an exception that allows businesses to collect and use personal data for commercial purposes under privacy law."
 amendment_langreform_advisory_panel_desc:0 "A panel of scholars publishes authoritative guidelines on language use, carrying moral weight without force of law."
 amendment_langreform_constructed:0 "Constructed Language"
 amendment_langreform_constructed_desc:0 "The state has adopted an entirely new constructed language designed for logical grammar and universal accessibility, accelerating technological exchange at the cost of traditional cultural bonds."
 amendment_langreform_minority_protection_desc:0 "The state language reform includes protections and revival programmes for minority and regional languages, reducing separatist sentiment."
 amendment_langreform_national_focus_desc:0 "The state language reform concentrates all resources on promoting the national language, accelerating assimilation but fueling minority resentment."
 amendment_langreform_powerful_academy_desc:0 "A powerful state language academy has been established with authority to regulate terminology, grammar, and orthography."
 amendment_langreform_revival:0 "Classical Language Revival"
 amendment_langreform_revival_desc:0 "The state is reviving a classical or ancestral language as the modern national standard, inspiring cultural pride and religious fervor."
 amendment_langreform_revived_arabic_desc:0 "The state has chosen to revive Classical Arabic as the literary and administrative standard, building on its prestige as the language of the Quran, of philosophy, mathematics, and poetry."
 amendment_langreform_revived_aramaic_desc:0 "The state has chosen to revive Aramaic, the ancient lingua franca of the Near East and the language of the Talmud and early Christianity, as the foundation for a modern national standard."
 amendment_langreform_revived_avestan_desc:0 "The state has chosen to revive Avestan, the sacred tongue of the Zoroastrian Gathas, as the foundation for a national language rooted in the deepest antiquity."
 amendment_langreform_revived_chinese_desc:0 "The state has chosen to revive Literary Chinese as the national written standard, drawing on the classical tradition shared across centuries of East Asian scholarship, law, and governance."
 amendment_langreform_revived_coptic_desc:0 "The state has chosen to revive Coptic, the last descendant of the language of the pharaohs, preserved through centuries of Christian liturgy as the foundation for a modern literary standard."
 amendment_langreform_revived_geez_desc:0 "The state has chosen to revive Ge'ez, the ancient liturgical tongue preserved through centuries of monastic manuscript tradition, as the basis for a modern literary standard."
 amendment_langreform_revived_gothic_desc:0 "The state has chosen to revive Gothic, the earliest attested Germanic language, known through Wulfila's fourth-century Bible translation, as the scholarly foundation for a modern standard."
 amendment_langreform_revived_greek_desc:0 "The state has chosen to revive Classical Greek as the national scholarly standard, harnessing the language of philosophy, democracy, and the sciences."
 amendment_langreform_revived_hebrew_desc:0 "The state has chosen to revive Hebrew as the modern national language, transforming an ancient scriptural tongue into a living vehicle for law, commerce, and science."
 amendment_langreform_revived_irish_desc:0 "The state has chosen to revive Classical Irish as the national literary standard, drawing on the oldest vernacular literature in Western Europe and centuries of Gaelic legal, poetic, and monastic tradition."
 amendment_langreform_revived_latin_desc:0 "The state has chosen to revive Latin as the national scholarly and administrative standard, drawing on centuries of Western legal, diplomatic, and ecclesiastical tradition."
 amendment_langreform_revived_mayan_desc:0 "The state has chosen to revive Classic Mayan as the national literary standard, restoring the courtly language of Tikal, Palenque, and Copán and its intricate hieroglyphic script."
 amendment_langreform_revived_nahuatl_desc:0 "The state has chosen to revive Classical Nahuatl, the courtly language of the Aztec Triple Alliance, renowned for its poetry, legal codes, and philosophical discourse."
 amendment_langreform_revived_norse_desc:0 "The state has chosen to revive Old Norse as the national standard, drawing on the language of the Eddas, the sagas, and the oldest parliamentary tradition in Europe."
 amendment_langreform_revived_pali_desc:0 "The state has chosen to revive Pali, the canonical language of Theravada Buddhism, as the national scholarly standard - a tongue of elegant simplicity and monastic discipline."
 amendment_langreform_revived_prussian_desc:0 "The state has chosen to revive Old Prussian, the extinct Baltic tongue prized by linguists for its extraordinary archaism, in an unprecedented act of cultural resurrection."
 amendment_langreform_revived_sanskrit_desc:0 "The state has chosen to revive Sanskrit as the foundation of the national language, harnessing its unmatched grammatical precision and vast philosophical-scientific literature."
 amendment_langreform_revived_slavonic_desc:0 "The state has chosen to revive Old Church Slavonic as a pan-Slavic literary standard, drawing on its centuries of use as the sacred language of Orthodox Slavic civilization."
 amendment_langreform_simplification:0 "Language Simplification"
 amendment_langreform_simplification_desc:0 "The state is standardizing and simplifying the national language, making it more accessible to learners and boosting education."
 amendment_language_naturalization_requirement_desc:0 "An amendment requiring proficiency in the national language as a condition for citizenship, linking language policy to immigration law."
 amendment_mandatory_minimums:0 "Mandatory Minimum Sentences"
 amendment_mandatory_minimums_desc:0 "An amendment establishing mandatory minimum prison terms for certain offenses, introduced as a compromise to pass rehabilitation-focused justice reform."
 amendment_military_necessity_clause_desc:0 "An amendment carving out exceptions for 'military necessity' in humanitarian regulations, appeasing the armed forces at the cost of international reputation."
 amendment_minority_script_preservation_desc:0 "An amendment requiring that minority writing systems be taught alongside the reformed national script in regions where they are traditionally used."
 amendment_national_champion_exemption_desc:0 "An amendment exempting the nation's largest company from antitrust breakup, preserving a 'national champion' capable of competing internationally."
 amendment_no_first_strike_desc:0 "An amendment formally committing the nation never to initiate the use of nuclear weapons, enhancing diplomatic standing."
 amendment_official_bilingualism:0 "Official Bilingualism"
 amendment_official_bilingualism_desc:0 "An amendment establishing the most widely spoken minority language as a co-official language alongside the national tongue, with all government services available in both."
 amendment_purist_modifier:0 "Unamended Bill"
 amendment_purist_modifier_desc:0 "Rejecting proposed amendments preserves the bill's purity, though building consensus may be harder."
 amendment_religious_exemption:0 "Religious Exemption Clause"
 amendment_religious_exemption_desc:0 "An amendment exempting religious institutions from LGBTQ protections, a compromise that gets the devout on board but limits the law's reach."
 amendment_small_donor_matching_desc:0 "An amendment requiring the government to match small individual campaign donations, boosting grassroots political participation."
 amendment_whistleblower_shield:0 "Whistleblower Protection Act"
 amendment_whistleblower_shield_desc:0 "An amendment protecting government employees who expose malfeasance from prosecution, boosting transparency at the cost of state authority."
 anglo_union:0 "Anglosphere"
 anti_colonial_ideology:0 "Anti-colonial ideology"
 anti_colonial_momentum_modifier_desc:0 "The crackdown on anti-colonial intellectuals has only strengthened their movement."
 anti_conscription_sentiment:0 "Anti-conscription sentiment"
 anti_exploitation_sentiment:0 "Anti-exploitation sentiment"
 anti_imperialist_sentiment:0 "Anti-imperialist sentiment"
 anti_minority_boycott_modifier_desc:0 "State-encouraged boycotts of minority businesses are deepening social divisions and breeding resentment."
 anti_regulation_ideology:0 "Anti-regulation ideology"
 antimatter_facility_progress:0 "Antimatter Facility Progress"
 antimatter_facility_progress_desc:0 "Tracks accumulated progress toward completing the Antimatter Containment Facility."
 antitrust_public_outrage_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 antitrust_public_outrage_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 appeasement_colonial_concession:0 "Colonial Concession"
 appeasement_colonial_concession_desc:0 "Granting concessions to colonial subjects"
 appeasement_colonial_crackdown:0 "Colonial Crackdown"
 appeasement_colonial_crackdown_desc:0 "Cracking down on colonial dissent"
 appeasement_environmental_deregulation:0 "Environmental Deregulation"
 appeasement_environmental_deregulation_desc:0 "Rolling back environmental protection measures"
 appeasement_environmental_regulation:0 "Environmental Regulation"
 appeasement_environmental_regulation_desc:0 "Enacting environmental protection measures"
 appeasement_fossil_expansion:0 "Fossil Fuel Expansion"
 appeasement_fossil_expansion_desc:0 "Expanding fossil fuel production and infrastructure"
 appeasement_green_investment:0 "Green Investment"
 appeasement_green_investment_desc:0 "Investing in green technology and sustainable infrastructure"
 arabic_union:0 "Arabic Union"
 arctic_adaptation_modifier:0 "Arctic Adaptation Research"
 arctic_adaptation_modifier_desc:0 "Having accepted the inevitability of polar ice loss, we are redirecting resources from futile coastal defense into adaptation research. Our prestige suffers but our scientists find new opportunities."
 arctic_melting_modifier:0 "Melting Ice Caps"
 arctic_melting_modifier_desc:0 "The polar ice caps are melting at an alarming rate, disrupting shipping lanes, devastating fishing grounds, and raising sea levels across all coastal regions."
 arms_race_escalation_modifier_desc:0 "Our nation is engaged in a dangerous arms race, pouring resources into military expansion to match a rival power's buildup."
 arms_race_ignored_modifier_desc:0 "We chose not to match our rival's military buildup, saving resources but weakening our deterrent posture."
 arms_race_rival_pressure_modifier_desc:0 "A rival power is matching our military expansion, forcing increased defense spending."
 art_renaissance_funded_modifier_desc:0 "Government funding for the arts provides meaning and purpose in a post-scarcity society, boosting prestige."
 artificial_intelligence:0 "Artificial General Intelligence"
 artificial_intelligence_desc:0 "We're creating machines that can think and reason like humans. While this could transform industries from healthcare to finance, it does raise some rather tricky questions about our new creations."
 assassinate_domestic:0 "Assassinate"
 assassinate_domestic_desc:0 "Assassinate a domestic target."
 assassinate_foreign:0 "Assassinate"
 assassinate_foreign_desc:0 "Assassinate a foreign target."
 atlantic_charter:0 "Atlantic Charter"
 augment_ethics_board_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 augment_ethics_board_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 augmentation_ban_modifier:0 "Augmentation Ban"
 augmentation_ban_modifier_desc:0 "The augmentation ban reduces social tension but stifles innovation."
 augmentation_crackdown_modifier:0 "Augmentation Crackdown"
 augmentation_crackdown_modifier_desc:0 "The crackdown on black market implants restores order at bureaucratic cost."
 augmentation_crime_ban_modifier_desc:0 "Banning augmentation for convicted criminals has reduced recidivism but drawn criticism from civil rights advocates."
 augmentation_debate_active_modifier_desc:0 "The augmentation debate drives innovation but creates social disruption."
 augmentation_devout_victory_modifier_desc:0 "Religious authorities have won major concessions on augmentation restrictions, boosting their influence."
 augmentation_divide_modifier:0 "Augmentation Divide"
 augmentation_divide_modifier_desc:0 "The divide between augmented and natural citizens creates ongoing social tension."
 augmentation_divide_permanent_modifier_desc:0 "The augmentation divide has become a permanent feature of society."
 augmentation_ethics_board_modifier_desc:0 "An ethics board provides oversight of augmentation technology, building trust at bureaucratic cost."
 augmentation_integrated_modifier:0 "Augmentation Integrated"
 augmentation_integrated_modifier_desc:0 "Augmentation technology has been equitably integrated into society."
 augmentation_kill_switch_modifier_desc:0 "Mandatory kill switches in all augmentation implants deter criminal use but reduce their effectiveness."
 augmentation_mandate_modifier:0 "Augmentation Mandate"
 augmentation_mandate_modifier_desc:0 "Mandatory augmentation for certain professions drives innovation but creates backlash among traditionalists."
 augmentation_market_efficiency_modifier_desc:0 "Allowing companies to prefer augmented workers has increased productivity but deepened the augmentation divide."
 augmentation_market_forces_modifier_desc:0 "Unregulated augmentation markets benefit the wealthy elite while the unaugmented working class falls further behind."
 augmentation_regulation_modifier:0 "Augmentation Regulation"
 augmentation_regulation_modifier_desc:0 "Augmentation regulation balances safety with innovation."
 augmentation_religious_anger_modifier_desc:0 "Religious authorities are furious over the government's permissive stance on human augmentation."
 augmentation_subsidies_modifier:0 "Augmentation Subsidies"
 augmentation_subsidies_modifier_desc:0 "Government subsidies make augmentation accessible, driving innovation at a cost."
 augmentation_subsidy_modifier:0 "Augmentation Subsidies"
 augmentation_subsidy_modifier_desc:0 "Government subsidies for human augmentation have improved standard of living across all strata but strain the bureaucracy."
 augmentation_workplace_protection_modifier_desc:0 "Legal protections for unaugmented workers prevent workplace discrimination and maintain social stability."
 augmented_police_modifier:0 "Augmented Police Force"
 augmented_police_modifier_desc:0 "Deploying augmented officers in law enforcement has dramatically reduced crime at the cost of civil liberties concerns."
 automation_slowdown_modifier:0 "Automation Slowdown"
 automation_slowdown_modifier_desc:0 "The government has slowed automation to address public concerns, maintaining employment at the cost of productivity."
 banking_asset_relief_program_desc:0 "Applies the effects of the Asset Relief Program banking policy."
 banking_capital_controls_out_desc:0 "Applies the effects of the Capital Controls on Outflows banking policy."
 banking_countercyclical_capital_buffer_desc:0 "Applies the effects of the Counter-cyclical Capital Buffer banking policy."
 banking_cycle_progress_desc:"Free Intervention Points: [ROOT.GetCountry.GetModifier.GetValueWithBreakdownFor('country_banking_intervention_max_add')]/[ROOT.ScriptValue('banking_law_base_points_value')]"
