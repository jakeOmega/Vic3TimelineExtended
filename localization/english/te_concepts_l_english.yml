 whistleblower_prosecuted_modifier_desc:0 "The prosecution of the whistleblower sends a chilling message but strengthens state authority."
 whistleblower_reform_modifier:0 "Whistleblower Reforms"
 whistleblower_reform_modifier_desc:0 "Whistleblower protections have been enacted, reducing state authority but earning prestige."
