 covert_comms_disruption:0 "Communications Disruption"
 covert_comms_disruption_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their communications disruption operations."
 covert_comms_disruption_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched a communications disruption operation."
 covert_comms_disruption_action_desc:0 "Jam and disrupt enemy military command and control systems. Requires an active war with the target. Reduces their offensive and defensive capability."
 covert_comms_disruption_desc:0 "Enemy covert operations are degrading our military communications, reducing combat effectiveness."
 covert_destabilization_action:0 "Covert: Destabilization"
 covert_destabilization_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their destabilization operations."
 covert_destabilization_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched a destabilization campaign."
 covert_destabilization_action_desc:0 "Covertly fund separatist movements and general unrest in a rival nation. Requires a rivalry and peace. Especially boosts secessionist movements while also providing general radicalism."
 covert_destabilization_general:0 "Foreign Destabilization"
 covert_destabilization_general_desc:0 "A foreign power is covertly fueling general unrest and radicalism across all political movements."
 covert_destabilization_separatist:0 "Foreign-Backed Separatism"
 covert_destabilization_separatist_desc:0 "A foreign power is covertly funding and arming separatist movements, dramatically increasing their strength and radicalism."
 covert_election_interference:0 "Foreign Election Interference"
 covert_election_interference_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their election interference operations."
 covert_election_interference_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched an election interference campaign."
 covert_election_interference_action_desc:0 "Launch a covert campaign to undermine the political legitimacy of a foreign nation. Requires peace. Reduces their legitimacy and authority."
 covert_election_interference_desc:0 "A foreign power is covertly manipulating our political processes, undermining government legitimacy and authority."
 covert_espionage_base:0 "Basic Espionage"
 covert_espionage_base_desc:0 "Our intelligence services are gathering what they can, but the target has no technological advantage to exploit. Only basic innovation gains are possible."
 covert_financial_subversion:0 "Financial Subversion"
 covert_financial_subversion_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their financial subversion operations."
 covert_financial_subversion_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched a financial subversion operation."
 covert_financial_subversion_action_desc:0 "Destabilize a foreign nation's economy through covert currency manipulation and market attacks. Requires peace. Increases their financial bubble pressure."
 covert_financial_subversion_desc:0 "A foreign power is destabilizing our financial markets through covert operations, increasing the risk of a banking crisis."
 covert_ideological_subversion:0 "Ideological Subversion"
 covert_ideological_subversion_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their ideological subversion operations."
 covert_ideological_subversion_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched an ideological subversion campaign."
 covert_ideological_subversion_action_desc:0 "Covertly support political movements aligned with your government type in a foreign nation. Does not require rivalry. Boosts matching movements' radicalism and pop attraction."
 covert_ideological_subversion_desc:0 "A foreign power is covertly supporting political movements aligned with their ideology within our borders."
 covert_industrial_espionage:0 "Industrial Espionage"
 covert_industrial_espionage_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their industrial espionage operations."
 covert_industrial_espionage_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched an industrial espionage operation."
 covert_industrial_espionage_action_desc:0 "Steal production secrets and technology from a foreign nation. Requires peace. Full tech spread bonus requires the target to have more technologies researched."
 covert_industrial_espionage_desc:0 "Our intelligence services are extracting production techniques and industrial secrets from a rival, boosting our innovation."
 covert_influence_campaign:0 "Foreign Influence Campaign"
 covert_influence_campaign_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their influence campaign operations."
 covert_influence_campaign_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched an influence campaign."
 covert_influence_campaign_action_desc:0 "Bribery, blackmail, and covert media campaigns to weaken a nation's resistance to power bloc pressure. Requires Power Bloc leadership. Reduces target's leverage resistance."
 covert_influence_campaign_desc:0 "A foreign power is conducting bribery and blackmail campaigns to undermine our resistance to international pressure."
 covert_infrastructure_sabotage:0 "Infrastructure Sabotage"
 covert_infrastructure_sabotage_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their infrastructure sabotage operations."
 covert_infrastructure_sabotage_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched an infrastructure sabotage operation."
 covert_infrastructure_sabotage_action_desc:0 "Conduct sabotage against enemy industrial and transport infrastructure. Requires an active war with the target. Reduces infrastructure and throughput in enemy states."
 covert_infrastructure_sabotage_desc:0 "Enemy covert operations are disrupting our infrastructure and production capacity."
 covert_military_espionage:0 "Military Espionage"
 covert_military_espionage_action_action_notification_break_desc:0 "[INITIATOR_COUNTRY.GetName] has discontinued their military espionage operations."
 covert_military_espionage_action_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] has launched a military espionage operation."
 covert_military_espionage_action_desc:0 "Gather intelligence on a foreign nation's military capabilities. Requires peace. Boosts your military technology spread and unit effectiveness if the target has a tech advantage."
 covert_military_espionage_desc:0 "Our intelligence services are gathering classified military intelligence from a rival, improving our armed forces' capabilities."
 covert_operation_funding_cost_desc:0 "The cost of maintaining active covert intelligence operations against foreign targets."
 creative_productivity_modifier:0 "Creative Productivity"
 creative_productivity_modifier_desc:0 "Embracing AI as a creative tool has unlocked new forms of art and boosted cultural output."
 crimjust_reform_debate_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 crimjust_reform_debate_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 crisis_resolution:0 "Crisis Resolution"
 crisis_resolution_desc:0 "Crisis Resolution is a diplomatic action that allows a country to resolve crises to stabilize bloc members, at the cost of authority."
 crop_failure_austerity_modifier_desc:0 "By refusing to fund crop failure relief, the government saves on bureaucratic overhead. The people endure, but the administration runs leaner."
 crop_failure_ministry_modifier_desc:0 "The environment ministry has coordinated a drought response program, mitigating agricultural losses and maintaining standards of living."
 crop_failure_modifier:0 "Widespread Crop Failures"
 crop_failure_modifier_desc:0 "Climate change has devastated harvests across the nation. Agricultural output is severely reduced and mortality is rising."
 crop_failure_relief_modifier_desc:0 "Emergency food imports and agricultural relief programs are mitigating the worst effects of crop failures, at significant cost."
 cultural_concord:0 "Cultural Concord"
 cultural_cooptation_modifier:0 "Cultural Unity Campaign"
 cultural_cooptation_modifier_desc:0 "The government has co-opted a minority cultural movement into a national unity narrative, boosting prestige at the cost of intellectual authenticity."
 cultural_exchange_backlash_modifier_desc:0 "Domestic critics have pushed back against foreign cultural influence, temporarily dampening our cultural reach."
 cultural_exchange_deepened_ties_modifier_desc:0 "Sustained cultural exchange has deepened mutual understanding between our peoples."
 cultural_exchange_program:0 "Cultural Exchange Program"
 cultural_exchange_program_desc:0 "A mutual agreement to promote cultural understanding, boosting cultural acceptance and prestige for both participating nations."
 cultural_exchange_retrenchment_modifier_desc:0 "Concessions to cultural traditionalists have slowed cultural acceptance and weakened our diplomatic standing."
 cultural_exchange_soft_power_modifier_desc:0 "A wave of cultural exchange has amplified our soft power, drawing international admiration and boosting our cultural pull."
 cultural_flowering_modifier:0 "Cultural Flowering"
 cultural_flowering_modifier_desc:0 "Protected minority communities are producing a cultural renaissance."
 cultural_hegemony_effect:0 "Cultural Hegemony"
 cultural_hegemony_effect_desc:0 "Our nation's global [concept_cultural_pull] attracts migrants, enhances trade advantage in $fine_art$, generates diplomatic [concept_leverage], and projects our [concept_prestige] worldwide. Strength scales with [concept_cultural_pull_share]."
 cultural_hegemony_foreign_benchmark_desc:0 "The global cultural hegemon's lifestyle raises expectations among our population, who demand a similar [concept_standard_of_living]. Reduces government legitimacy. See [concept_foreign_cultural_benchmark]."
 cultural_openness_modifier:0 "Cultural Openness"
 cultural_openness_modifier_desc:0 "The nation embraces cultural exchange, accelerating assimilation and international prestige."
 cultural_protection_modifier:0 "Cultural Protectionism"
 cultural_protection_modifier_desc:0 "Measures to protect local culture from foreign influence strengthen traditional institutions."
 cultural_reclamation_modifier:0 "Cultural Reclamation"
