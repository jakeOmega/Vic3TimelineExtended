 UN_END_PEACEKEEPING:0 "End Peacekeeping Contribution"
 UN_FOUND:0 "Found the United Nations"
 UN_FOUND_DESC:0 "Establish the United Nations as an international body for diplomacy and cooperation. Requires #bold Great Power#! status and #bold Intergovernmental Organizations#! technology. Costs prestige and bureaucracy. The founding nation becomes the first member, hosts the headquarters, and gains a permanent Security Council seat."
 UN_FUND_DEVELOPMENT:0 "Fund Development Programs"
 UN_HUMAN_RIGHTS:0 "Champion Human Rights Resolution"
 UN_JOIN:0 "Join the United Nations"
 UN_JOIN_DESC:0 "Join the United Nations. Grants permanent #bold +5 Diplomatic Reputation#! and #bold +5 Leverage#!. When UN Authority is 30+, also receive scaled membership benefits (#bold +5 Diplo Rep, +1% Research, +25 Prestige#! at Authority 50). Enables all UN policy programs."
 UN_LEAVE:0 "Leave the United Nations"
 UN_LEAVE_DESC:0 "Withdraw from the United Nations. #R Removes all UN modifiers#! (membership, peacekeeping, development, human rights, arms control). Applies #bold −15 Diplo Rep#! and #bold −50 Prestige#! penalty for 3 years. #bold −3 UN Authority.#!"
 UN_LIFT_SANCTIONS:0 "Lift Sanctions"
 UN_PEACEKEEPING:0 "Contribute to Peacekeeping"
 UN_PEACEKEEPING_DESC:0 "Commit military resources to UN peacekeeping. Grants #bold +5 Diplomatic Reputation#! and #bold +25 Prestige#!, but increases #bold Military Goods Cost +3%#!. #G +3 UN Authority.#! Requires Major Power rank. Peacekeeping events may deploy forces abroad for additional prestige."
 UN_PROPOSE_CONDEMN:0 "Propose Condemnation"
 UN_PROPOSE_SANCTIONS:0 "Propose Sanctions"
 UN_REQUEST_AID:0 "Request Humanitarian Aid"
 UN_REQUEST_PEACEKEEPERS:0 "Request UN Peacekeepers"
 UN_STOP_CHAMPIONING:0 "Stop Championing Order"
 UN_STOP_UNDERMINING:0 "Stop Undermining Order"
 UN_UNDERMINE_ORDER:0 "Undermine International Order"
 WW_APPEASE_BUTTON:0 "Pursue Appeasement"
 WW_REARM_BUTTON:0 "Begin Rearmament"
 accepted_cultures_cost:0 "Accepted Cultures Cost"
 accepted_cultures_cost_desc:0 "Modifies the cost associated with accepted cultures."
 adopt_local_culture:0 "Adopt Local Culture"
 adopt_local_culture_desc:0 "Our state exists entire outside of the homelands of our primary culture. Perhaps it is time for the local culture to become our primary culture."
 advanced_materials:0 "Advanced Materials"
 alternative_service_modifier:0 "Alternative Service Program"
 alternative_service_modifier_desc:0 "An alternative service program for conscientious objectors has reduced military manpower but eased social tensions."
 amendment_community_service:0 "Community Service Alternative"
 amendment_community_service_desc:0 "An amendment allowing community service as an alternative to incarceration for non-violent offenses, introducing a restorative element to an otherwise punishment-focused system."
 amendment_compromise_modifier:0 "Compromise Amendment"
 amendment_compromise_modifier_desc:0 "Accepting an amendment has broadened the coalition in favour of the law, easing its passage."
 amendment_cooperative_preference:0 "Worker Cooperative Preference"
 amendment_cooperative_preference_desc:0 "An amendment giving worker-owned cooperatives preferential treatment in antitrust enforcement, encouraging democratic ownership of industry."
 amendment_corporate_data_exemption_desc:0 "An amendment carving out an exception that allows businesses to collect and use personal data for commercial purposes under privacy law."
 amendment_language_naturalization_requirement_desc:0 "An amendment requiring proficiency in the national language as a condition for citizenship, linking language policy to immigration law."
 amendment_mandatory_minimums:0 "Mandatory Minimum Sentences"
 amendment_mandatory_minimums_desc:0 "An amendment establishing mandatory minimum prison terms for certain offenses, introduced as a compromise to pass rehabilitation-focused justice reform."
 amendment_military_necessity_clause_desc:0 "An amendment carving out exceptions for 'military necessity' in humanitarian regulations, appeasing the armed forces at the cost of international reputation."
 amendment_minority_script_preservation_desc:0 "An amendment requiring that minority writing systems be taught alongside the reformed national script in regions where they are traditionally used."
 amendment_national_champion_exemption_desc:0 "An amendment exempting the nation's largest company from antitrust breakup, preserving a 'national champion' capable of competing internationally."
 amendment_no_first_strike_desc:0 "An amendment formally committing the nation never to initiate the use of nuclear weapons, enhancing diplomatic standing."
 amendment_official_bilingualism:0 "Official Bilingualism"
 amendment_official_bilingualism_desc:0 "An amendment establishing the most widely spoken minority language as a co-official language alongside the national tongue, with all government services available in both."
 amendment_purist_modifier:0 "Unamended Bill"
 amendment_purist_modifier_desc:0 "Rejecting proposed amendments preserves the bill's purity, though building consensus may be harder."
 amendment_religious_exemption:0 "Religious Exemption Clause"
 amendment_religious_exemption_desc:0 "An amendment exempting religious institutions from LGBTQ protections, a compromise that gets the devout on board but limits the law's reach."
 amendment_small_donor_matching_desc:0 "An amendment requiring the government to match small individual campaign donations, boosting grassroots political participation."
 amendment_whistleblower_shield:0 "Whistleblower Protection Act"
 amendment_whistleblower_shield_desc:0 "An amendment protecting government employees who expose malfeasance from prosecution, boosting transparency at the cost of state authority."
 anglo_union:0 "Anglosphere"
 anti_colonial_momentum_modifier_desc:0 "The crackdown on anti-colonial intellectuals has only strengthened their movement."
 antimatter_facility_progress:0 "Antimatter Facility Progress"
 antimatter_facility_progress_desc:0 "Tracks accumulated progress toward completing the Antimatter Containment Facility."
 antitrust_public_outrage_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 antitrust_public_outrage_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 arabic_union:0 "Arabic Union"
 arctic_adaptation_modifier:0 "Arctic Adaptation Research"
 arctic_adaptation_modifier_desc:0 "Having accepted the inevitability of polar ice loss, we are redirecting resources from futile coastal defense into adaptation research. Our prestige suffers but our scientists find new opportunities."
 arctic_melting_modifier:0 "Melting Ice Caps"
 arctic_melting_modifier_desc:0 "The polar ice caps are melting at an alarming rate, disrupting shipping lanes, devastating fishing grounds, and raising sea levels across all coastal regions."
 arms_race_escalation_modifier_desc:0 "Our nation is engaged in a dangerous arms race, pouring resources into military expansion to match a rival power's buildup."
 arms_race_ignored_modifier_desc:0 "We chose not to match our rival's military buildup, saving resources but weakening our deterrent posture."
 arms_race_rival_pressure_modifier_desc:0 "A rival power is matching our military expansion, forcing increased defense spending."
 artificial_intelligence:0 "Artificial General Intelligence"
 artificial_intelligence_desc:0 "We're creating machines that can think and reason like humans. While this could transform industries from healthcare to finance, it does raise some rather tricky questions about our new creations."
 assassinate_domestic:0 "Assassinate"
 assassinate_domestic_desc:0 "Assassinate a domestic target."
 assassinate_foreign:0 "Assassinate"
 assassinate_foreign_desc:0 "Assassinate a foreign target."
 atlantic_charter:0 "Atlantic Charter"
 augment_ethics_board_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 augment_ethics_board_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 augmentation_market_forces_modifier_desc:0 "Unregulated augmentation markets benefit the wealthy elite while the unaugmented working class falls further behind."
 augmentation_subsidy_modifier:0 "Augmentation Subsidies"
 augmentation_subsidy_modifier_desc:0 "Government subsidies for human augmentation have improved standard of living across all strata but strain the bureaucracy."
 banking_asset_relief_program_desc:0 "Applies the effects of the Asset Relief Program banking policy."
 banking_capital_controls_out_desc:0 "Applies the effects of the Capital Controls on Outflows banking policy."
 banking_countercyclical_capital_buffer_desc:0 "Applies the effects of the Counter-cyclical Capital Buffer banking policy."
 banking_cycle_progress_desc:"Free Intervention Points: [ROOT.ScriptValue('banking_current_free_points_val')]/[ROOT.ScriptValue('banking_law_base_points_value')]"
 banking_cycle_progress_desc_command:"Free Planning Budget: [ROOT.ScriptValue('banking_current_free_points_val')]/[ROOT.ScriptValue('banking_law_base_points_value')]"
 banking_cycle_progress_desc_coop:"Free Council Mandate Points: [ROOT.ScriptValue('banking_current_free_points_val')]/[ROOT.ScriptValue('banking_law_base_points_value')]"
 banking_directed_credit_infrastructure_desc:0 "Applies the effects of the Directed Credit for Infrastructure banking policy."
 banking_emergency_liquidity_program_desc:0 "Applies the effects of the Emergency Liquidity Program banking policy."
 banking_expand_deposit_guarantee_desc:0 "Applies the effects of the Expand Deposit Guarantee banking policy."
 banking_export_credit_facility_desc:0 "Applies the effects of the Export Credit Facility banking policy."
 banking_fx_devaluation:0 "Currency Devaluation"
 banking_fx_devaluation_desc:0 "Applies the effects of the Currency Devaluation banking policy."
 banking_fx_support:0 "Foreign Exchange Support"
 banking_fx_support_desc:0 "Applies the effects of the Foreign Exchange Support banking policy."
 banking_fx_swap_lines_desc:0 "Applies the effects of the FX Swap Lines banking policy."
 banking_moral_suasion:0 "Moral Suasion"
 banking_moral_suasion_desc:0 "Applies the effects of the Moral Suasion banking policy."
 banking_open_market_ops_desc:0 "Applies the effects of the Open Market Operations banking policy."
 banking_policy_rate_hike_desc:0 "Applies the effects of the Policy Rate Hike banking policy."
 banking_raise_margin_requirements_desc:0 "Speculation on credit has become too common among the middle strata. By requiring higher upfront collateral for loans, we ensure that only stable ventures proceed, protecting the economy."
 bantu_union:0 "Bantu Union"
 bergius_process:0 "Bergius Process"
 bergius_process_desc:0 "By hydrogenating coal at high temperatures and pressures, we can create synthetic fuel. A useful trick to have up our sleeve when oil is scarce."
 bg_resettlement:0 "Resettlement"
 big_money_election_modifier_desc:0 "Wealthy interests dominate the election, boosting business confidence but undermining democratic legitimacy."
 biohacker_legalized_modifier:0 "Licensed Biohacking"
 biohacker_legalized_modifier_desc:0 "Formerly underground biohackers now operate under license, contributing to research while requiring regulatory oversight."
 biohacker_research_modifier:0 "Biohacker Research Program"
 biohacker_research_modifier_desc:0 "Academic researchers studying underground biohacking techniques have made breakthroughs in human augmentation technology."
 border_dispute_active_modifier_desc:0 "A territorial dispute with a neighboring nation over colonial-era borders is causing diplomatic tension."
 border_dispute_resolved_modifier_desc:0 "The resolution of a border dispute has brought stability and improved relations with our neighbors."
 bull_market:0 "Bull Market"
 bull_market_desc:0 "A period of rising stock prices and investor confidence, often leading to increased economic activity."
 campaign_scandal_ignored_modifier_desc:0 "A campaign finance scandal has been ignored by the ruling party, eroding public trust."
 campaign_scandal_investigation_modifier_desc:0 "An official investigation into campaign finance irregularities is underway."
 campaign_scandal_reform_modifier_desc:0 "Public pressure has created momentum for meaningful campaign finance reform."
 carbon_tax_modifier:0 "Carbon Tax"
 carbon_tax_modifier_desc:0 "A levy on fossil fuel industries that reduces coal and oil output while raising taxes on manufacturing and fossil extraction. Directly reduces the nation's greenhouse gas emissions by 20%."
 cheaty:0 "Debug Boost"
 cheaty_desc:0 "A powerful temporary modifier used for testing or special scripted effects."
 chinese_union:0 "Chinese Union"
 city_rank_number:0 "[State.MakeScope.ScriptValue('city_size_rank')]"
 civil_rights_government_endorsement_modifier_desc:0 "The government's bold endorsement of the civil rights march has energized political movements and given voice to those demanding change."
 civil_rights_march_calming_desc:0 "The government's concessions to marchers have calmed the civil rights movement, reducing the urgency of their demands."
 civil_rights_march_momentum_modifier_desc:0 "The peaceful civil rights march has generated positive momentum for reform and raised our nation's profile as a beacon of democracy."
 civil_rights_suppression_modifier_desc:0 "The suppression of civil rights demonstrators has damaged our reputation and increased social unrest."
 civil_rights_triumph_modifier_desc:0 "Our nation's embrace of civil rights has earned us prestige and goodwill."
 climate_adaptation_modifier:0 "Climate Adaptation Program"
 climate_adaptation_modifier_desc:0 "Government spending on climate resilience infrastructure - flood defences, heat-resistant crops, cooling centres. Lowers mortality and raises local standards of living, but carries a large political authority cost."
 climate_awareness_modifier:0 "Climate Awareness Initiative"
 climate_awareness_modifier_desc:0 "Scientists and academics have raised awareness of the changing climate. The government is funding preliminary studies into environmental protection, making it easier to establish environmental institutions."
 climate_crisis_emergency_modifier_desc:0 "A massive emergency response to the climate crisis, diverting enormous resources to protect the population and rapidly build environmental institutions."
 climate_political_turmoil_modifier_desc:0 "The clash between environmental and industrial interests has radicalised political movements across the country."
 climate_refugee_rejection_modifier_desc:0 "The nation has closed its borders to climate refugees, drawing international condemnation but avoiding the strain of mass migration."
 climate_refugee_welcome_modifier_desc:0 "The nation has opened its borders to climate refugees, gaining international prestige but straining local resources."
 climate_summit_leader_modifier_desc:0 "Our nation took the lead at an international climate summit, gaining enormous prestige and demonstrating commitment to reducing emissions."
 climate_summit_pledge_modifier_desc:0 "Our nation signed an international climate accord, pledging to reduce emissions in solidarity with the global community."
 climate_turmoil_movement_radicalism_desc:0 "Political turmoil over climate change is radicalizing the environmental movement, pushing activists toward more extreme demands."
 coastal_flood_defense_modifier_desc:0 "Ministry-coordinated engineering projects have constructed flood barriers and drainage systems, reducing port disruption and improving infrastructure."
 coastal_flooding_modifier:0 "Coastal Flooding"
 coastal_flooding_modifier_desc:0 "Rising sea levels have flooded coastal areas, disrupting ports, fishing, and lowering the standard of living."
 coastal_relocation_modifier:0 "Coastal Population Relocation"
 coastal_relocation_modifier_desc:0 "We are relocating coastal populations inland to escape rising sea levels. The disruption to daily life is severe, but reduced port dependency and new migration patterns may prove beneficial."
 colonial_crackdown_modifier:0 "Colonial Crackdown"
 colonial_crackdown_modifier_desc:0 "The government has deployed security forces to suppress independence movements in our colonial possessions, damaging our international reputation."
 colonial_crumbling_movement_radicalism_desc:0 "The disintegration of our colonial empire has emboldened the civil rights movement, whose demands grow ever more urgent."
 colonial_cultural_assimilation_modifier_desc:0 "A government program is promoting cultural assimilation of colonial populations, accelerating acceptance growth."
 colonial_culture_change:0 "Colonial Culture Change"
 colonial_culture_change_action_notification_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] has changed the culture and religion of [TARGET_COUNTRY.GetName]."
 colonial_culture_change_desc:0 "Colonial Culture Change is a diplomatic action that allows a country to change the culture and religion of a colonial subject."
 colonial_development_investment_modifier_desc:0 "The government is investing in infrastructure and institutions in colonial territories, draining bureaucratic resources."
 colonial_empire_collapsed_modifier_desc:0 "Our colonial empire has collapsed. The loss of overseas territories has dealt a severe blow to national prestige and living standards."
 colonial_empire_crumbling_modifier_desc:0 "Our colonial empire is crumbling. Widespread unrest and radical movements threaten to tear our overseas territories away."
 colonial_empire_solidified_modifier_desc:0 "Our colonial territories have been fully integrated into the nation. Cultural acceptance is high and the overseas lands are now permanent parts of our country."
 colonial_empire_under_pressure_modifier_desc:0 "Our colonial holdings are under increasing strain. International pressure and local unrest are making maintenance costly."
 colonial_integration_progress_modifier_desc:0 "A colonial territory has reached a milestone in integration, with high cultural acceptance among the local population."
 colonial_military_garrison_modifier_desc:0 "Military forces are stationed in colonial territories to maintain order, reducing our available military projection."
 colonial_overstretch_tt:0 "Imperial overstretch (number of colonial states)"
 colonial_pressure_movement_radicalism_desc:0 "Colonial instability is radicalizing civil rights advocates, who see the empire's weakness as an opportunity for change."
 colonial_reparations_modifier:0 "Colonial Reparations Paid"
 colonial_reparations_modifier_desc:0 "The government is paying reparations to a former colony, acknowledging past wrongs at significant financial cost."
 colonial_stability_bar_desc:0 "Measures the stability of our colonial holdings. At 100, the empire is fully integrated. At 0, it collapses."
 colonial_unrest_suppressed_modifier_desc:0 "Military force has been used to suppress unrest in a colonial territory, at the cost of our international reputation."
 colonial_war_exhaustion_modifier_desc:0 "A brutal colonial conflict has drained our military resources and sapped the nation's morale."
 construction:0 "Construction Services"
 construction_cost_scaling:0 "Development Cost Scaling"
 construction_cost_scaling_desc:0 "Higher GDP per capita increases construction costs, reflecting more expensive labor and real estate markets. Provides a natural catchup mechanism for developing nations."
 consumer_appliances:0 "Consumer Appliances"
 cooperative_capital_plan:0 "Collective Capital Investment Plan"
 cooperative_capital_plan_desc:0 "Member cooperatives are pooling surplus for a coordinated light industrial investment program, strengthening capacity and accelerating reinvestment momentum."
 cooperative_consumption_ceiling:0 "Consumption Ceiling"
 cooperative_consumption_ceiling_desc:0 "A hard democratic cap on per-member consumption allowances is in force, voted in by the Federation Council. Powerfully deflates speculative pressure at the cost of significant lower strata discontent."
 cooperative_council_directive:0 "Council Advisory Directive"
 cooperative_council_directive_desc:0 "The Federation Council has issued formal advisory guidance to member cooperative boards on financial restraint and reinvestment priorities."
 cooperative_credit_expansion:0 "Credit Union Expansion"
 cooperative_credit_expansion_desc:0 "Federation credit unions have expanded lending capacity at reduced interest rates, providing liquidity to member cooperatives during the downturn."
 cooperative_dividend_restraint:0 "Dividend Restraint Resolution"
 cooperative_dividend_restraint_desc:0 "The cooperative council has voted to cap payout ratios and redirect surplus to collective reinvestment funds. Reduces bubble pressure at the cost of some trade union enthusiasm."
 cooperative_mutual_aid:0 "Mutual Aid Fund Deployment"
 cooperative_mutual_aid_desc:0 "Federation mutual aid reserves are being deployed to cooperatives near financial distress, stabilising the network and boosting lower strata loyalty."
 cooperative_solidarity_campaign:0 "Worker Solidarity Campaign"
 cooperative_solidarity_campaign_desc:0 "A coordinated media campaign is urging worker-owners to voluntarily moderate consumption in the collective interest."
 cooperative_worker_buyout:0 "Worker Buyout Facilitation"
 cooperative_worker_buyout_desc:0 "The federation is actively supporting worker acquisitions of failing enterprises before insolvency cascades through the collective network."
 corporate_concessions:0 "Corporate Concessions"
 corporate_concessions_desc:0 "An agreement forcing a country to give preferential regulatory treatment to corporate interests, boosting company throughput at the expense of political stability."
 corporate_lobbying_accepted_modifier_desc:0 "Industry lobbyists enjoy open access to the legislative process, boosting business confidence at the expense of democratic accountability."
 corporate_lobbying_exposed_modifier_desc:0 "Investigative journalism has exposed the extent of corporate influence over government, damaging public trust."
 corporate_lobbying_restricted_modifier_desc:0 "New rules limit corporate influence on legislation, strengthening democratic legitimacy."
 counter_propaganda_backlash_modifier_desc:0 "Our propaganda campaign has been effectively countered, damaging our international credibility."
 country_add_anticolonial_ideology_to_igs_bool_desc:"Add the Anticolonial Ideology to the Trade Unions and Intelligentsia interest groups."
 country_add_multicultural_ideology_to_intelligentsia_bool_desc:"Add the Multicultural Ideology to the Intelligentsia interest group."
 country_advanced_agri_stats_pb_principles_bool_desc:0 "Unlocks tier IV [Concept('concept_power_bloc_principle', '$concept_power_bloc_principles$')] in the $principle_group_rural$ [concept_power_bloc_principle_group] for [Concept('concept_power_bloc', '$concept_power_blocs$')]."
 country_anti_war_pb_principles_bool_desc:0 "Unlocks tier V [Concept('concept_power_bloc_principle', '$concept_power_bloc_principles$')] in the $principle_group_defensive_cooperation$ [concept_power_bloc_principle_group] for [Concept('concept_power_bloc', '$concept_power_blocs$')]."
 country_auto_surveillance_pb_principles_bool_desc:0 "Unlocks tier V [Concept('concept_power_bloc_principle', '$concept_power_bloc_principles$')] in the $principle_group_police_coordination$ [concept_power_bloc_principle_group] for [Concept('concept_power_bloc', '$concept_power_blocs$')]."
 country_building_renewable_energy_plant_require_subsidies_bool_desc:0 "Renewable energy plants must be subsidized by the government and cannot operate without public funding."
 country_can_impose_same_lawgroup_ministry_of_science_in_power_bloc_bool_desc:"Allowed to #b Impose#! the same [concept_law] as their own in the [GetLawGroup('lawgroup_ministry_of_science').GetName] group on other [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')]"
 country_can_impose_same_lawgroup_minority_rights_in_power_bloc_bool_desc:"Allowed to #b Impose#! the same [concept_law] as their own in the [GetLawGroup('lawgroup_minority_rights').GetName] group on other [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')]"
 country_can_join_united_nations_bool_desc:0 "Allows the country to join the United Nations, gaining diplomatic reputation and leverage. UN membership enables all UN policy programs and provides scaled benefits based on UN authority."
 country_can_use_asset_relief_bool_desc:0 "A banking cycle tool that purchases non-performing assets from private ledgers. Improves financial conditions and reduces bubble pressure, at the cost of tax revenue and [concept_bureaucracy]."
 country_can_use_biotech_companies_bool_desc:0 "Allows the formation of biotech [Concept('concept_company', '$concept_companies$')]."
 country_can_use_countercyclical_buffer_bool_desc:0 "A banking cycle tool that forces financial institutions to retain earnings during boom years. Sharply reduces bubble pressure and slows financial momentum, but reduces investment pool contributions."
 country_can_use_cultural_assimilation_bool_desc:0 "Launch a program to assimilate colonial populations into the metropolitan culture. Increases acceptance of non-homeland cultures, at the cost of [concept_bureaucracy]."
 country_can_use_deposit_guarantee_bool_desc:0 "A banking cycle tool that guarantees the savings of citizens during a financial panic. Reduces loan interest rates and bubble pressure, and generates loyalists among the population."
 country_can_use_emergency_liquidity_bool_desc:0 "A banking cycle tool that acts as a lender of last resort during a financial panic. Provides a massive boost to the financial cycle and reduces loan interest rates, but greatly increases bubble pressure and costs treasury reserves."
 country_can_use_export_credit_bool_desc:0 "A banking cycle tool that provides subsidized credit to exporters. Boosts export advantage and financial momentum, but increases bubble pressure and drains tax revenue."
 country_can_use_fx_devaluation_bool_desc:0 "A banking cycle tool that artificially lowers the currency's value. Boosts export advantage at the expense of import advantage and raises loan interest rates. Mutually exclusive with #bold FX Support#!."
 country_can_use_fx_support_bool_desc:0 "A banking cycle tool that deploys reserves to prop up the currency. Boosts import advantage and reduces bubble pressure, at the cost of export advantage and tax revenue. Mutually exclusive with #bold FX Devaluation#!."
 country_can_use_fx_swap_lines_bool_desc:0 "A banking cycle tool that establishes reciprocal credit lines with Great Powers to stabilize markets. Reduces bubble pressure and boosts imports, at the cost of [concept_influence]. Not available to Great Powers."
 country_can_use_open_market_ops_bool_desc:0 "A banking cycle tool that injects cash into the banking system through purchase of government securities. Reduces loan interest rates and boosts services output, but increases financial momentum and bubble pressure."
 country_can_use_rearmament_bool_desc:0 "Initiate a major military buildup during rising ideological tensions. Boosts army offense, defense, and [concept_prestige] from military power projection, at the cost of increased military goods spending."
 country_can_use_total_war_economy_bool_desc:0 "Redirect the entire national economy toward the war effort during a world war. Provides massive boosts to army offense, defense, morale recovery, and conscription, but sharply reduces [concept_sol] and increases [concept_construction] costs."
 country_can_use_war_propaganda_bool_desc:0 "Mobilize the press and media for the war effort during a world war. Reduces unit morale loss, increases [concept_authority], and suppresses [Concept('concept_political_movement', '$concept_political_movements$')] radicalism."
