 nuclear_standoff_tension_modifier_desc:0 "The nuclear standoff is rattling our population and undermining economic confidence."
 nuclear_standoff_terror_modifier_desc:0 "A rival power's full military mobilization during a nuclear crisis has plunged our nation into existential dread."
