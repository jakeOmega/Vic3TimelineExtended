 un_refused_aid_penalty_modifier_desc:0 "This nation's refusal to contribute humanitarian aid has damaged its international standing and credibility."
 un_rejectionist_modifier:0 "UN Rejectionist"
 un_rejectionist_modifier_desc:0 "This country has rejected the United Nations, strengthening domestic authority but damaging international standing."
 un_request_cooldown:0 "UN Request Cooldown"
 un_request_cooldown_desc:0 "A recent request to the General Assembly is still being processed. Further requests must wait."
 un_sanctions_busting_modifier_desc:0 "This country is quietly circumventing UN sanctions for commercial advantage, at the cost of diplomatic reputation."
 un_sanctions_cooldown:0 "Recent Sanctions Action"
 un_sanctions_cooldown_desc:0 "A sanctions action was recently taken."
 un_sanctions_enforcement_modifier_desc:0 "Strictly enforcing UN sanctions, this country takes a small trade hit but gains significant diplomatic credibility."
 un_sanctions_enforcer_modifier_desc:0 "This country is enforcing UN sanctions against a target state."
 un_sanctions_partial_modifier_desc:0 "This country is partially complying with UN sanctions - enough to avoid condemnation, but not enough to impress."
 un_sanctions_target_modifier_desc:0 "This country is under UN sanctions, suffering severe trade and diplomatic penalties."
 un_security_council_modifier_desc:0 "This country holds a permanent seat on the UN Security Council, the body responsible for maintaining international peace and security. Grants enhanced diplomatic leverage and authority."
 un_space_independent_modifier_desc:0 "This country has rejected international space cooperation in favor of an independent program, prioritizing national prestige and military applications."
 un_space_partnership_modifier_desc:0 "This country is participating fully in the UN international space cooperation program, accelerating research and boosting prestige."
 un_tariff_retaliation_modifier_desc:0 "A rival nation has imposed unilateral tariffs, hurting our trade competitiveness and diplomatic reputation."
 un_trade_arbitration_modifier_desc:0 "This country has accepted international arbitration in a trade dispute, demonstrating commitment to the rules-based order."
 un_trade_deal_bilateral_modifier_desc:0 "A bilateral trade agreement has improved trade competitiveness and diplomatic standing."
 un_undermine_order_cost_desc:0 "Actively undermining the United Nations international order. Ongoing cost to authority and influence generation."
 un_unilateral_tariffs_modifier_desc:0 "This country has imposed unilateral tariffs in defiance of international arbitration, boosting domestic industry at the cost of diplomatic reputation."
 un_veto_abolition_modifier_desc:0 "This country has proposed abolishing the Security Council veto, pushing for democratic reform of the United Nations."
 un_veto_crisis_modifier_desc:0 "This country publicly denounced a great power's veto at the Security Council, gaining diplomatic standing at the cost of institutional authority."
 un_vote_failure_penalty_desc:0 "Failed to pass a UN resolution. Our diplomatic standing has suffered."
 un_vote_success_reward_desc:0 "Successfully led a UN resolution to passage. Our diplomatic standing is enhanced."
 un_walkout_condemn_modifier_desc:0 "This country condemned a bloc walkout at the General Assembly and rallied the remaining members."
 un_walkout_join_modifier_desc:0 "This country joined a bloc walkout at the General Assembly, rejecting the institution's authority."
 un_walkout_mediator_modifier_desc:0 "This country attempted to mediate after a dramatic walkout at the General Assembly."
 un_withdrawal_penalty_modifier_desc:0 "Having withdrawn from the United Nations, this country faces a temporary reduction in diplomatic reputation and prestige."
 united_nations:0 "United Nations"
 use_one_nuke_desc:0 "Use one nuclear weapon from our stockpile."
 veteran_advisory_modifier:0 "Veteran Advisory Board"
 veteran_advisory_modifier_desc:0 "Experienced veterans advising on military policy have improved our military research capabilities."
 veterans_peace_testimony_modifier_desc:0 "The respected voices of war veterans speaking for peace have boosted our national prestige and calmed the anti-war movement."
 veterans_testimony_movement_calming_desc:0 "The powerful testimonies of decorated veterans speaking against the war have given the anti-war movement greater legitimacy and reduced its radicalism."
 war_crime_coverup_modifier_desc:0 "The government has attempted to suppress reports of war crimes committed by its forces."
 war_crime_reform_modifier_desc:0 "A comprehensive overhaul of military doctrine emphasizes rules of engagement and protection of civilians."
 war_crime_scandal_modifier_desc:0 "A failed cover-up has made a war crimes scandal far worse, devastating national prestige and government credibility."
 war_crime_tribunal_modifier_desc:0 "Those responsible for wartime atrocities are being prosecuted, restoring some faith in military justice."
 war_profit_tax_modifier_desc:0 "A tax on excess war profits channels military-industrial wealth back to the state treasury."
 war_profiteering_investigation_modifier_desc:0 "The investigation into war profiteers has improved public trust but diverted bureaucratic resources."
 water_crisis_infrastructure_modifier_desc:0 "The government is investing in desalination plants and water distribution infrastructure to address the growing water shortage."
 water_crisis_ministry_modifier_desc:0 "The environment ministry has deployed water management programs including rationing coordination and emergency desalination, stabilizing water supplies."
 water_crisis_rationing_modifier_desc:0 "Strict water rationing measures are in place across the nation, severely impacting quality of life and agricultural production."
 we_am_annihilation_military_desc:0 "Antimatter-powered weapons systems are being integrated into the national arsenal."
 we_am_annihilation_propulsion_desc:0 "Antimatter-powered engines are revolutionizing military mobility and logistics."
 we_am_breach_press_ahead_desc:0 "The antimatter program continues at full speed despite the containment breach, accepting elevated risk."
 we_am_breach_rebuild_desc:0 "The facility is being rebuilt with improved safety protocols after the containment breach."
 we_am_breakthrough_military_desc:0 "Antimatter research is being fast-tracked for immediate military applications."
 we_am_breakthrough_research_desc:0 "Stable antimatter containment has energized the scientific community and accelerated research across all fields."
 we_am_incident_suppress_desc:0 "Details of the antimatter accident have been suppressed, concentrating authority but damaging international reputation."
 we_am_incident_transparent_desc:0 "Full transparency after the antimatter accident has earned legitimacy at the cost of national prestige."
 we_am_propulsion_civilian_desc:0 "Antimatter propulsion is transforming civilian commerce and heavy industry logistics."
 we_am_propulsion_military_desc:0 "Antimatter propulsion has eliminated distance as a strategic constraint for military formations."
 we_ob_arms_race_maintain_desc:0 "The escalating orbital arms race demands increased military spending to maintain superiority."
 we_ob_arms_race_treaty_desc:0 "A proposed arms limitation treaty de-escalates orbital tensions and earns international goodwill."
 we_ob_deterrence_negotiate_desc:0 "The battlestation's military superiority enables advantageous diplomatic agreements."
 we_ob_deterrence_strength_desc:0 "The orbital battlestation's presence deters all conventional military challenges."
 we_ob_highground_accelerate_desc:0 "The orbital battlestation program has been accelerated in response to international alarm."
 we_ob_highground_assure_desc:0 "The government has reassured the international community about the defensive nature of the battlestation."
 we_ob_shield:0 "Shield of Civilization"
 we_ob_shield_desc:0 "The orbital battlestation deflected an asteroid that would have devastated a populated region."
 we_ob_strike_defensive_desc:0 "The battlestation maintains a defensive posture, its mere capability serving as deterrent."
 we_ob_strike_project_desc:0 "Orbital kinetic weapons provide devastating global strike capability."
 we_ob_surveillance_dominance_desc:0 "The orbital battlestation's sensor suite provides total awareness of all military movements on Earth."
 we_ob_surveillance_share_desc:0 "Selective sharing of orbital intelligence strengthens alliances and diplomatic relationships."
 we_ob_weapons_test_classify_desc:0 "The weapons test accident has been classified, concentrating authority at the cost of public trust."
 we_ob_weapons_test_relief_desc:0 "A massive relief effort following the weapons test accident has cost prestige but demonstrated responsibility."
 we_sc_beam_compensate_desc:0 "The government has compensated those affected by the beam misalignment and implemented new safeguards."
 we_sc_beam_minimize_desc:0 "The government's attempt to downplay the beam misalignment has damaged public trust."
 we_sc_first_light_focus_desc:0 "The first successful power transmission drives intensified research into orbital energy systems."
 we_sc_first_light_pride_desc:0 "The successful activation of the first orbital solar collector is a source of immense national pride."
 we_sc_monopoly_assert_desc:0 "The nation has rejected international demands for shared control of its orbital energy infrastructure."
 we_sc_monopoly_share_desc:0 "Technology licensing agreements give the nation influence while sharing orbital energy capabilities."
 we_sc_postscarcity_research_desc:0 "Unlimited clean energy is being channeled directly into research facilities across the nation."
 we_sc_postscarcity_subsidize_desc:0 "The government subsidizes energy costs for all citizens, leveraging the orbital collector's output."
 we_sc_storm_rideout_desc:0 "The orbital collectors survived the solar storm intact, vindicating the decision to keep them online."
 we_sc_storm_shutdown_desc:0 "The orbital solar collectors have been temporarily shut down to protect them from a coronal mass ejection."
 we_sc_surplus_export_desc:0 "Surplus orbital energy is being exported through trade networks, boosting commerce."
 we_sc_surplus_invest_desc:0 "Cheap orbital energy is powering a surge in industrial output across the nation."
 we_se_astronaut_education_desc:0 "Government-funded space education programs are producing a new generation of researchers and innovators."
 we_se_astronaut_industry_desc:0 "A generation raised with orbital access is revolutionizing construction and engineering."
 we_se_debris_clearance_desc:0 "An expensive but successful debris clearance operation has secured orbital trade lanes."
 we_se_debris_defense_desc:0 "Automated defense systems protect the elevator cable from orbital debris."
 we_se_gateway_open_desc:0 "The space elevator is open to international access, attracting talent and investment from across the world."
 we_se_gateway_restricted_desc:0 "The space elevator operates under strict national control, enhancing sovereignty over orbital infrastructure."
 we_se_milestone_celebrate_desc:0 "The nation celebrates a major milestone in space elevator construction, drawing global attention."
 we_se_milestone_focus_desc:0 "All attention is focused on completing the space elevator as quickly as possible."
 we_se_shared_access_desc:0 "A cooperative governance framework for orbital infrastructure enhances international cooperation."
 we_se_sovereignty:0 "Orbital Sovereignty Asserted"
 we_se_sovereignty_desc:0 "The nation has asserted sovereign control over its orbital infrastructure against international pressure."
 we_se_structural_halt_desc:0 "Space elevator construction has been paused while engineers investigate structural anomalies."
 we_se_structural_reinforce_desc:0 "Resources are being diverted to reinforce the space elevator tether against oscillation."
 we_se_trade_auction_desc:0 "Auctioned orbital launch slots are generating unprecedented trade volumes."
 we_se_trade_national_desc:0 "Domestic industries receive priority access to orbital launch capacity."
 welfare_automation_fears_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 welfare_automation_fears_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 ww_appeasement_modifier:0 "Policy of Appeasement"
 ww_appeasement_modifier_desc:0 "We are pursuing diplomatic accommodation with hostile powers, hoping to preserve peace through concessions."
 ww_arsenal_of_democracy_modifier_desc:0 "As a late-entering democratic power, our industrial might fuels the war effort of the entire alliance."
 ww_defeated_modifier:0 "Defeated Power"
 ww_defeated_modifier_desc:0 "Our nation lies defeated in the great war. Our military is broken, our prestige shattered."
 ww_devastation_modifier:0 "War Devastation"
 ww_devastation_modifier_desc:0 "This state has been ravaged by the world war. Infrastructure lies in ruins and the population suffers."
 ww_fresh_forces_modifier_desc:0 "Our troops enter the war rested and well-supplied, giving us a significant temporary advantage over the exhausted belligerents."
 ww_ground_offensive_modifier_desc:0 "All available forces have been committed to a decisive ground offensive, boosting combat effectiveness at the cost of accelerating war exhaustion."
 ww_home_front_strain_modifier_desc:0 "The prolonged war is taking a terrible toll on the civilian population. Unrest grows."
 ww_late_entry_cooldown_desc:0 "We have recently made a decision regarding intervention in the world war."
 ww_lend_lease_modifier_desc:0 "We are supplying military equipment and resources to allied belligerents without committing our own forces."
 ww_liberation_hero_modifier_desc:0 "Our nation is celebrated as a champion of freedom and justice in the aftermath of the great war."
 ww_occupation_duties_modifier_desc:0 "Maintaining order in occupied territories demands significant military resources and administrative effort."
 ww_prolonged_war_exhaustion_modifier_desc:0 "Years of total war have pushed our nation to the breaking point. Casualties mount, the economy groans, and revolution threatens."
 ww_rearmament_modifier:0 "Rearmament Program"
 ww_rearmament_modifier_desc:0 "A major military buildup is underway in response to the ideological threat posed by rival great powers."
 ww_reconstruction_modifier:0 "Post-War Reconstruction"
 ww_reconstruction_modifier_desc:0 "A massive reconstruction effort is underway, rebuilding what was destroyed in the great war."
 ww_regime_change_modifier_desc:0 "The victorious powers have imposed a new political system. The transition is turbulent."
 ww_rising_tensions_modifier_desc:0 "Ideological rivalries between the great powers are intensifying. Arms races and diplomatic crises are becoming more frequent."
 ww_total_war_economy_modifier_desc:0 "The entire national economy has been redirected toward the war effort. Military production soars, but civilian life suffers enormously."
 ww_victors_peace_modifier_desc:0 "We have emerged victorious from the greatest conflict in human history. Our prestige and influence are at their zenith."
 ww_war_crimes_exposed_modifier_desc:0 "Evidence of terrible atrocities committed during the war has come to light, damaging our international reputation."
 ww_war_propaganda_modifier_desc:0 "The government has mobilized the press and media to maintain public support for the war effort."
 ww_wartime_rationing_modifier_desc:0 "Strict rationing has been imposed to ensure the military has the supplies it needs. Civilian consumption suffers."
