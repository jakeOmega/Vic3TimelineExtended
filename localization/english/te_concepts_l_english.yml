 concept_ch_rank_8_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_8').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_8_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_8_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_8_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_8_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_8_raw').GetValue|1]#!"
 concept_ch_rank_9_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_9').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_9_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_9_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_9_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_9_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_9_raw').GetValue|1]#!"
 concept_ch_sol:0 "Standard of Living"
 concept_ch_sol_desc:0 "[concept_cultural_pull] from quality of life. Equals your average [concept_standard_of_living] minus the population-weighted global average, clamped to the range -5 to +20. Nations with higher living standards than the world average gain cultural influence; those below lose it. The parenthetical shows (your SoL / global average SoL). Part of [concept_cultural_pull_components]."
 concept_ch_tech_leadership_desc:0 "[concept_cultural_pull] from being first in the world to research technologies. When a Great Power or Major Power researches a technology that no other country has yet discovered, they earn +2 tech leadership points (capped at 30). These points decay by 10% each year, so sustained technological innovation is needed to maintain this bonus. Part of [concept_cultural_pull_components]."
 concept_civil_rights_movement_desc:0 "A movement for equal rights and an end to discrimination. Tracked as a journal entry that drives progress on minority rights laws, from Violent Hostility through Ghettoization, Discrimination, Indifference, Protection, to Affirmative Action."
 concept_climate_policy:0 "Climate Policy"
 concept_climate_policy_desc:0 "Actions a country can take to address [concept_global_warming_system]. Includes carbon taxes, emission standards, fossil fuel divestment, renewable energy investment, and other measures. Each policy has economic trade-offs but reduces the country's contribution to global [concept_greenhouse_gas_emissions]."
 concept_colonial_stability:0 "Colonial Stability"
 concept_colonial_stability_desc:0 "A measure of how effectively a colonial power maintains control over its colonies (0–100). High stability indicates firm control; low stability risks colonial collapse. Stability is affected by colonial policy choices, global trends toward self-determination, and the relative military and economic power of the colonizer."
 concept_combined_arms:0 "Combined Arms"
 concept_combined_arms_desc:0 "A military doctrine bonus based on unit type diversity in formations. Armies that field a mix of infantry, cavalry, artillery, and other unit types receive combat bonuses. Encourages balanced military composition rather than single-type spam."
 concept_construction_cost_scaling_desc:0 "A mechanic where construction costs scale with GDP per capita. Wealthier nations pay more to build, reflecting higher labor costs and land prices. This prevents runaway growth in rich countries and enables catch-up by developing nations."
 concept_covert_efficiency:0 "Efficiency Factor"
 concept_covert_efficiency_desc:0 "Your espionage efficiency reduces the chance of [concept_operation_detection]. A higher efficiency factor means your agents are better trained and harder to detect. Efficiency is determined by the country_covert_operation_efficiency_mult modifier, which can be improved through technologies, laws, and institutional investment. The efficiency percentage shown is the reduction applied to the raw detection chance."
 concept_covert_operations:0 "Covert Operations"
 concept_covert_operations_desc:0 "Covert operations launched against rival nations via diplomatic actions. Nine types are available:\n• #bold Election Interference#! — Reduces target legitimacy and authority (peacetime, requires rivalry)\n• #bold Financial Subversion#! — Increases target bubble pressure, risking a [concept_banking_crash] (peacetime, requires rivalry)\n• #bold Industrial Espionage#! — Boosts your production tech spread and innovation (peacetime, requires rivalry)\n• #bold Military Espionage#! — Boosts your military tech spread and unit effectiveness (peacetime, requires rivalry)\n• #bold Influence Campaign#! — Reduces target leverage resistance (peacetime, requires Power Bloc leadership)\n• #bold Ideological Subversion#! — Boosts movements matching your ideology in target (peacetime, no rivalry required)\n• #bold Destabilization#! — Boosts separatist movements and general radicalism in target (peacetime, requires rivalry)\n• #bold Infrastructure Sabotage#! — Reduces target infrastructure and throughput (wartime)\n• #bold Communications Disruption#! — Reduces target military offense and defense (wartime)\nEach operation occupies a slot and requires funding. Operations risk [concept_operation_detection] each month. Unused slots provide a domestic intelligence bonus."
 concept_covert_warfare_system_desc:0 "A covert warfare system where nations build [concept_intelligence_capacity] defenses and launch [concept_covert_operations] against rivals. Defense has two layers: general IC (from technologies, institutions, literacy, GDP) and type-specific defense (Economic, Military, Ideological — from relevant laws). Truces block all operations, and amicable relations block hostile operations. Offensive operations can undermine enemy legitimacy, destabilize finances, steal technology, weaken power bloc resistance, subvert foreign movements, boost separatists, sabotage infrastructure, or disrupt military communications. Unused operation slots provide domestic intelligence benefits. Unlocks with the Television technology. Can be toggled via game rules."
 concept_cultural_hegemony_system_desc:0 "A soft power system where nations compete for global cultural influence. [concept_cultural_pull] determines each country's share of world cultural output. The dominant cultural power gains migration attraction and technology spread bonuses, while lagging nations face rising [concept_foreign_cultural_benchmark] expectations. Unlocks with the Romanticism technology. Can be toggled via game rules."
 concept_cultural_pull:0 "Cultural Pull"
 concept_cultural_pull_components_desc:0 "The factors that determine a nation's [concept_cultural_pull]:\n• [concept_ch_art_production] — Fine art output relative to global production\n• [concept_ch_prestige] — National prestige relative to world total\n• [concept_ch_sol] — Standard of living compared to global average\n• [concept_ch_tech_leadership] — World-first technology breakthroughs\n• [concept_ch_monuments] — Wonder buildings and cultural landmarks\n• [concept_ch_megaprojects] — Advanced megastructures\n• [concept_ch_modifiers] — Bonuses from technologies, laws, and events\n• [concept_ch_infamy] — Penalty from aggressive foreign policy\n• [concept_ch_instability] — Penalty from turmoil and civil war\n• [concept_ch_modifier_bonus] — Percentage multiplier from modifiers"
 concept_cultural_pull_desc:0 "A country's raw cultural influence score, computed from [concept_cultural_pull_components] and then converted to a global share percentage (0–100%). The share determines the strength of the Cultural Hegemony modifier. Technologies, country rank, and events can boost Cultural Pull through the Cultural Pull modifier."
 concept_cultural_pull_raw_score_desc:0 "The sum of all cultural pull components before conversion to a global percentage share. Each country's raw score is divided by the global total to produce its Cultural Share. Raw scores have no inherent meaning on their own — only the relative share matters."
 concept_cultural_pull_share_desc:0 "Your nation's percentage of global cultural influence (0–100%). Calculated as your [concept_cultural_pull_raw_score] divided by the sum of all nations' raw scores. A higher share means stronger [concept_cultural_hegemony_system] effects: migration attraction, technology spread, and cultural prestige. Updated monthly; global totals cached yearly."
 concept_custom_treaty_articles_desc:0 "Extended timeline adds numerous treaty articles beyond vanilla: money transfers, company seizure/disbanding, minority protection, free port concessions, corporate concessions, privatization enforcement, religious missions, demilitarized zones, forced disarmament, cultural exchanges, emissions reduction, influence requests, education/healthcare/security/science aid, nuclear disarmament and program control, intelligence sharing, joint military exercises, UN membership, and population transfers."
 concept_decolonization_system:0 "Decolonization"
 concept_decolonization_system_desc:0 "The process by which colonial empires release or lose their colonial subjects. Tracked by the Colonial Empire journal entry with a [concept_colonial_stability] progress bar (0–100). Eight policy buttons allow colonial powers to manage the transition. Great Powers can adopt stances for or against colonialism. When stability collapses, colonies may break free in a cascade of independence movements."
 concept_digital_rights_system_desc:0 "The tension between state surveillance and individual privacy in the digital age. Laws range from Intrusive Surveillance (complete state monitoring) through Minimal Privacy Protection and Moderate Data Privacy to Strong Privacy Rights. Internet governance laws interact with this system."
 concept_environmental_crisis:0 "Environmental Crisis"
 concept_environmental_crisis_desc:0 "An environmental awareness movement tied to the Ministry of the Environment institution. Tracks growing public concern about pollution, resource depletion, and ecological damage. Progress leads to stronger environmental protections and emissions controls."
 concept_feminism_movement:0 "Second-Wave Feminism"
 concept_feminism_movement_desc:0 "A social movement expanding women's rights beyond suffrage to workplace equality, reproductive rights, and legal protections. Tracked as a journal entry that advances through law changes and social development."
 concept_financial_regulation:0 "Financial Regulation"
 concept_financial_regulation_desc:0 "Laws governing the banking and financial system. Ranges from Unregulated Banking (high volatility and crash risk but more dynamic growth) through various intermediate forms to Central Bank Independence (lowest crash risk, most stability). Different laws modify Banking Cycle Volatility and Banking Crash Likelihood."
 concept_foreign_cultural_benchmark_desc:0 "When a dominant cultural power vastly exceeds your nation's [concept_cultural_pull], your population's expectations rise. They see the hegemon's lifestyle and demand similar [concept_standard_of_living], increasing SoL expectations and reducing government legitimacy. The larger the gap between the hegemon's [concept_cultural_pull_share] and yours, the stronger the effect (up to +3 SoL expectation and -15 legitimacy). Part of the [concept_cultural_hegemony_system]."
 concept_global_warming_system_desc:0 "A persistent system tracking global [concept_greenhouse_gas_emissions] and their effect on the [concept_temperature_anomaly]. As industrialization advances, emissions rise and temperatures increase, triggering threshold events at 1°C, 1.5°C, 2°C, 3°C, and 4°C anomaly. Countries can adopt [concept_climate_policy] measures to reduce their emissions through scripted policy buttons on the Global Warming journal entry."
 concept_greenhouse_gas_emissions_desc:0 "The total output of climate-warming gases from a country's industrial activity. Emissions are driven primarily by coal and oil consumption in buildings. Global cumulative emissions determine the rate of increase in [concept_temperature_anomaly]."
 concept_heir_education_system_desc:0 "A monthly-pulse education system for monarchies that shapes the future ruler's capabilities. The heir can be focused on 8 different areas (military, diplomacy, economy, etc.). An intelligence system (1–5) determines learning speed. Education resolves into 5-tier aptitude traits when the heir comes of age. A rebel child mechanic can also trigger, creating unpredictable heirs."
 concept_human_augmentation_system_desc:0 "A social and technological debate over cybernetic and biological enhancement. Laws range from Human Purity (complete ban) through Medical Only, Regulated Market, and Unrestricted Augmentation to Mandatory Augmentation. Involves biohacking, brain-computer interfaces, and questions of what it means to be human."
 concept_intelligence_capacity:0 "Intelligence Capacity"
 concept_intelligence_capacity_desc:0 "A country's general counterintelligence capability (0–100), computed from three components: technology and institutional investment, national literacy rate (capped at 20), and GDP share (capped at 15). Higher Intelligence Capacity protects against separatism and coups. In the [concept_covert_warfare_system], IC forms the general defense component — augmented by type-specific defenses (Economic, Military, Ideological) from relevant laws to determine the total defense against each operation type."
 concept_lgbtq_rights_movement_desc:0 "A social movement journal entry tracking the progression of LGBTQ+ rights from Active Persecution through Legal Limbo, Basic Protections, and Comprehensive Rights to Full Equality and Protection. Progress is driven by social attitudes, urbanization, and related law changes."
 concept_mental_health_crisis_desc:0 "Growing awareness of mental health issues in an industrializing and modernizing society. Tied to criminal justice reform, with progression from punishment-focused systems toward rehabilitation and restorative justice approaches."
 concept_migration_crowding:0 "Migration Crowding"
 concept_migration_crowding_desc:0 "A density-based reduction in migration pull for overpopulated states. As a state's population density increases beyond comfortable levels, it becomes less attractive to new migrants. This prevents unrealistic hyper-concentration of population."
 concept_ministry_system:0 "Ministry System"
 concept_ministry_system_desc:0 "A set of 16 custom institutions representing government ministries: War, Commerce, Foreign Affairs, National Bank, Culture, Labor, Environment, Intelligence and Security, Refugee Affairs, Propaganda, Science, Thought Control, Consumer Protection, Urban Planning, Religion, and International Aid. Each ministry has multiple investment levels that provide scaling modifiers. Ministry laws control which ministries are active."
 concept_nuclear_program:0 "Nuclear Program"
 concept_nuclear_program_desc:0 "A country's nuclear weapons development effort, tracked by a journal entry with a progress bar. Research of the Nuclear Weapons technology and continued funding advances the program. A complete nuclear program enables the use of diplomatic actions for strategic and tactical [concept_nuclear_strike]s, and is a major factor in [concept_nuclear_stockpile] size and deterrence."
 concept_nuclear_stockpile:0 "Nuclear Stockpile"
 concept_nuclear_stockpile_desc:0 "The quantity of nuclear weapons a country possesses. Determined by the number of nuclear weapon production facilities (Arms Industry buildings with nuclear PMs) and relevant technologies. A larger stockpile increases deterrence value but may provoke international concern."
 concept_nuclear_strike:0 "Nuclear Strike"
 concept_nuclear_strike_desc:0 "A devastating attack using nuclear weapons. Success chance is determined by the attacker's nuclear attack modifier (from technologies like Nuclear Weapons, ICBMs, Hypersonic Weapons, and Orbital Weapon Platforms) minus the target's defense modifier (from Military Aviation, Radar, Missile Defense Systems, Directed Energy Defenses, and Orbital Weapon Platforms). The result is clamped between 5% and 100%."
 concept_operation_detection:0 "Operation Detection"
 concept_operation_detection_desc:0 "Each month, active [concept_covert_operations] have a chance of being detected by the target. Base detection chance is 10%, increased by high funding levels (+10% at level 3) and the [concept_target_defenses], and reduced by your [concept_covert_efficiency]. Detection burns the operation, generates +5 infamy, and alerts the target nation. The target can then choose to bolster defenses or retaliate."
 concept_pollution_system:0 "Pollution"
 concept_pollution_system_desc:0 "A state-level system tracking industrial pollution based on building output. High pollution reduces local quality of life and increases mortality. Pollution can be mitigated through environmental regulations, cleaner production methods, and the Ministry of the Environment institution."
 concept_post_scarcity_system_desc:0 "An economic transition toward a society where material abundance eliminates traditional scarcity. Tracked through journal entries tied to automation, AI, and advanced production technologies. Includes Universal Basic Income as an intermediate step toward full post-scarcity."
 concept_religious_revival:0 "Religious Revival"
 concept_religious_revival_desc:0 "Events that counteract the [concept_decline_of_religion] trend. Religious revival events fire periodically to represent waves of renewed faith in response to social upheaval, uncertainty, or cultural backlash against secularization. Religion-specific variants provide different narrative flavor. Can be removed by the Secularization Campaign decision."
 concept_religious_trait_desc:0 "A classification grouping religions by their shared theological traditions, such as Abrahamic, Dharmic, or Eastern faiths. Countries with the same religious trait have higher diplomatic acceptance despite following different specific religions."
 concept_rules_of_war_system_desc:0 "Laws governing the conduct of warfare. Range from Total War (no restrictions) through Traditional Rules of War, War Crimes Forbidden, and Humanitarian Regulations to Limited War (maximum restrictions). Stricter rules reduce wartime atrocities but may limit military options."
 concept_sol_expectations:0 "Adaptive SoL Expectations"
 concept_sol_expectations_desc:0 "A system where the population's expected standard of living gradually adapts toward their actual standard of living over roughly two decades. When SoL rises suddenly, expectations lag behind — creating a period of contentment as reality exceeds what people are accustomed to. When SoL drops, expectations remain high for years — causing prolonged dissatisfaction. This adds historical inertia to social stability, making sudden economic shocks more painful and sustained growth more rewarding."
 concept_solar_colonization:0 "Solar Colonization"
 concept_solar_colonization_desc:0 "The establishment of permanent settlements throughout the solar system. After completing the core [concept_space_race] milestones, countries can pursue 34 colonization targets across 5 stages: near-Earth asteroids and Lagrange points, Mars and lunar settlements, outer planet moons, dwarf planets and distant bodies, and multi-generation colonies."
 concept_space_milestone:0 "Space Milestone"
 concept_space_milestone_desc:0 "A major achievement in the [concept_space_race]. There are 9 milestones in the main sequence: Suborbital Flight, Orbital Flight, Space Station, Lunar Flyby, Moon Landing, Moon Base, Mars Landing, Mars Base, and Interstellar Probe. Each milestone requires specific technologies and sufficient space program funding to complete."
 concept_space_race:0 "Space Race"
 concept_space_race_desc:0 "A competition between nations to achieve [concept_space_milestone]s, from suborbital flight through orbital flight, Moon landing, Moon base, Mars landing, and ultimately interstellar probes. Each milestone can be pursued with a Safe or Ambitious approach — ambitious is faster but risks failure. Being the first country to achieve a milestone grants bonus prestige and technology. A fully developed space program also enables [concept_solar_colonization]."
 concept_state_collapse_system_desc:0 "A journal entry system tracking countries on the verge of total collapse. When a nation's stability deteriorates past critical thresholds due to revolution, debt, military defeat, or other crises, it may experience cascading state failure leading to fragmentation or regime change."
 concept_target_defenses:0 "Target's Defenses"
 concept_target_defenses_desc:0 "The target nation's total defense against a given operation type combines their general [concept_intelligence_capacity] plus type-specific defense (Economic, Military, or Ideological). Countries with stronger counterintelligence programs, higher literacy, larger GDP, and laws targeting the relevant defense category are harder to spy on. Each operation's detection chance is calculated individually based on that specific target's total defense compared to your IC."
 concept_temperature_anomaly:0 "Temperature Anomaly"
 concept_temperature_anomaly_desc:0 "The current deviation from pre-industrial global average temperature (in °C). Increases over time as [concept_greenhouse_gas_emissions] accumulate. Crossing threshold values (1°C, 1.5°C, 2°C, 3°C, 4°C) triggers escalating climate events including extreme weather, agricultural disruption, sea level rise, and mass displacement."
 concept_tourism_system:0 "Tourism"
 concept_tourism_system_desc:0 "A state-level economic system modeling tourist activity based on state features, cultural attractions, and infrastructure. Tourism generates revenue and creates demand for services goods. States with notable features, historical sites, or natural beauty attract more tourists."
 concept_united_nations_system_desc:0 "An international organization that can form once certain global conditions are met. Countries can join via treaty article. UN membership provides diplomatic bonuses and access to UN voting topics. The UN also enables cross-system bonuses including space partnerships and joint scientific endeavors like the International Space Station."
 concept_wonder_building:0 "Wonder Building"
 concept_wonder_building_desc:0 "A special megastructure built in two phases: first a construction site that accumulates progress, then the completed wonder that provides powerful bonuses. Examples include the Space Elevator, Orbital Solar Collector, Orbital Battlestation, Mind Upload Nexus, and Antimatter Facility. Each wonder can only be built once per country and requires specific technologies."
 concept_world_war_system_desc:0 "A journal entry system that activates when a sufficiently large and destructive conflict erupts. World wars bring escalation mechanics, total war economy effects, war propaganda, and dramatic global consequences. Victory or defeat in a world war reshapes the international order."
 consciousness_network_progress:0 "Consciousness Network Progress"
 consciousness_network_progress_desc:0 "Tracks accumulated progress toward completing the Consciousness Network."
 construction:0 "Construction Services"
 construction_cost_scaling:0 "Development Cost Scaling"
 construction_cost_scaling_desc:0 "Higher GDP per capita increases construction costs, reflecting more expensive labor and real estate markets. Provides a natural catchup mechanism for developing nations."
 consumer_appliances:0 "Consumer Appliances"
 contraception_restricted_modifier:0 "Contraception Restrictions"
 contraception_restricted_modifier_desc:0 "Restrictions on contraception have pleased religious authorities but harmed women's health and reduced our innovation capacity."
 cooperative_capital_plan:0 "Collective Capital Investment Plan"
 cooperative_capital_plan_desc:0 "Member cooperatives are pooling surplus for a coordinated light industrial investment program, strengthening capacity and accelerating reinvestment momentum."
 cooperative_consumption_ceiling:0 "Consumption Ceiling"
 cooperative_consumption_ceiling_desc:0 "A hard democratic cap on per-member consumption allowances is in force, voted in by the Federation Council. Powerfully deflates speculative pressure at the cost of significant lower strata discontent."
 cooperative_council_directive:0 "Council Advisory Directive"
 cooperative_council_directive_desc:0 "The Federation Council has issued formal advisory guidance to member cooperative boards on financial restraint and reinvestment priorities."
 cooperative_credit_expansion:0 "Credit Union Expansion"
 cooperative_credit_expansion_desc:0 "Federation credit unions have expanded lending capacity at reduced interest rates, providing liquidity to member cooperatives during the downturn."
 cooperative_dividend_restraint:0 "Dividend Restraint Resolution"
 cooperative_dividend_restraint_desc:0 "The cooperative council has voted to cap payout ratios and redirect surplus to collective reinvestment funds. Reduces bubble pressure at the cost of some trade union enthusiasm."
 cooperative_mutual_aid:0 "Mutual Aid Fund Deployment"
 cooperative_mutual_aid_desc:0 "Federation mutual aid reserves are being deployed to cooperatives near financial distress, stabilising the network and boosting lower strata loyalty."
 cooperative_solidarity_campaign:0 "Worker Solidarity Campaign"
 cooperative_solidarity_campaign_desc:0 "A coordinated media campaign is urging worker-owners to voluntarily moderate consumption in the collective interest."
 cooperative_worker_buyout:0 "Worker Buyout Facilitation"
 cooperative_worker_buyout_desc:0 "The federation is actively supporting worker acquisitions of failing enterprises before insolvency cascades through the collective network."
 corporate_concessions:0 "Corporate Concessions"
 corporate_concessions_desc:0 "An agreement forcing a country to give preferential regulatory treatment to corporate interests, boosting company throughput at the expense of political stability."
 corporate_lobbying_accepted_modifier_desc:0 "Industry lobbyists enjoy open access to the legislative process, boosting business confidence at the expense of democratic accountability."
 corporate_lobbying_exposed_modifier_desc:0 "Investigative journalism has exposed the extent of corporate influence over government, damaging public trust."
 corporate_lobbying_restricted_modifier_desc:0 "New rules limit corporate influence on legislation, strengthening democratic legitimacy."
 counter_espionage_modifier:0 "Counter-Espionage Operations"
 counter_espionage_modifier_desc:0 "Active counter-espionage operations have disrupted foreign intelligence networks operating in our territory."
 counter_propaganda_backlash_modifier_desc:0 "Our propaganda campaign has been effectively countered, damaging our international credibility."
 country_add_anticolonial_ideology_to_igs_bool_desc:"Add the Anticolonial Ideology to the Trade Unions and Intelligentsia interest groups."
 country_add_multicultural_ideology_to_intelligentsia_bool_desc:"Add the Multicultural Ideology to the Intelligentsia interest group."
 country_advanced_agri_stats_pb_principles_bool_desc:0 "Unlocks tier IV [Concept('concept_power_bloc_principle', '$concept_power_bloc_principles$')] in the [GetPowerBlocPrincipleGroup('principle_group_rural').GetName] [concept_power_bloc_principle_group] for [Concept('concept_power_bloc', '$concept_power_blocs$')]."
 country_anti_war_pb_principles_bool_desc:0 "Unlocks tier V [Concept('concept_power_bloc_principle', '$concept_power_bloc_principles$')] in the [GetPowerBlocPrincipleGroup('principle_group_defensive_cooperation').GetName] [concept_power_bloc_principle_group] for [Concept('concept_power_bloc', '$concept_power_blocs$')]."
 country_auto_surveillance_pb_principles_bool_desc:0 "Unlocks tier V [Concept('concept_power_bloc_principle', '$concept_power_bloc_principles$')] in the [GetPowerBlocPrincipleGroup('principle_group_police_coordination').GetName] [concept_power_bloc_principle_group] for [Concept('concept_power_bloc', '$concept_power_blocs$')]."
 country_building_renewable_energy_plant_require_subsidies_bool_desc:0 "Renewable energy plants must be subsidized by the government and cannot operate without public funding."
 country_can_impose_same_lawgroup_ministry_of_science_in_power_bloc_bool_desc:"Allowed to #b Impose#! the same [concept_law] as their own in the [GetLawGroup('lawgroup_ministry_of_science').GetName] group on other [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')]"
 country_can_impose_same_lawgroup_minority_rights_in_power_bloc_bool_desc:"Allowed to #b Impose#! the same [concept_law] as their own in the [GetLawGroup('lawgroup_minority_rights').GetName] group on other [Concept('concept_power_bloc_member','$concept_power_bloc_members_short$')]"
 country_can_join_united_nations_bool_desc:0 "Allows the country to join the United Nations, gaining diplomatic reputation and leverage. UN membership enables all UN policy programs and provides scaled benefits based on UN authority."
 country_can_use_asset_relief_bool_desc:0 "A banking cycle tool that purchases non-performing assets from private ledgers. Improves financial conditions and reduces bubble pressure, at the cost of tax revenue and [concept_bureaucracy]."
 country_can_use_biotech_companies_bool_desc:0 "Allows the formation of biotech [Concept('concept_company', '$concept_companies$')]."
 country_can_use_countercyclical_buffer_bool_desc:0 "A banking cycle tool that forces financial institutions to retain earnings during boom years. Sharply reduces bubble pressure and slows financial momentum, but reduces investment pool contributions."
 country_can_use_cultural_assimilation_bool_desc:0 "Launch a program to assimilate colonial populations into the metropolitan culture. Increases acceptance of non-homeland cultures, at the cost of [concept_bureaucracy]."
 country_can_use_deposit_guarantee_bool_desc:0 "A banking cycle tool that guarantees the savings of citizens during a financial panic. Reduces loan interest rates and bubble pressure, and generates loyalists among the population."
 country_can_use_emergency_liquidity_bool_desc:0 "A banking cycle tool that acts as a lender of last resort during a financial panic. Provides a massive boost to the financial cycle and reduces loan interest rates, but greatly increases bubble pressure and costs treasury reserves."
 country_can_use_export_credit_bool_desc:0 "A banking cycle tool that provides subsidized credit to exporters. Boosts export advantage and financial momentum, but increases bubble pressure and drains tax revenue."
 country_can_use_fx_devaluation_bool_desc:0 "A banking cycle tool that artificially lowers the currency's value. Boosts export advantage at the expense of import advantage and raises loan interest rates. Mutually exclusive with #bold FX Support#!."
 country_can_use_fx_support_bool_desc:0 "A banking cycle tool that deploys reserves to prop up the currency. Boosts import advantage and reduces bubble pressure, at the cost of export advantage and tax revenue. Mutually exclusive with #bold FX Devaluation#!."
 country_can_use_fx_swap_lines_bool_desc:0 "A banking cycle tool that establishes reciprocal credit lines with Great Powers to stabilize markets. Reduces bubble pressure and boosts imports, at the cost of [concept_influence]. Not available to Great Powers."
 country_can_use_open_market_ops_bool_desc:0 "A banking cycle tool that injects cash into the banking system through purchase of government securities. Reduces loan interest rates and boosts services output, but increases financial momentum and bubble pressure."
