 ruler_average_administrator:0 "Average Administrator"
 ruler_average_administrator_desc:0 "A ruler of ordinary administrative ability. The bureaucracy neither thrives nor suffers unduly under their direction."
 ruler_average_commander:0 "Adequate Commander"
 ruler_average_commander_desc:0 "A ruler with a serviceable understanding of military matters. Neither inspiring nor dismaying to the officer corps."
 ruler_exceptional_administrator:0 "Exceptional Administrator"
 ruler_exceptional_administrator_desc:0 "A master of governance whose administrative brilliance transforms the machinery of state. Bureaucracy hums with efficiency under their stewardship."
 ruler_exceptional_commander:0 "Military Genius"
 ruler_exceptional_commander_desc:0 "A commander of extraordinary vision whose strategic brilliance inspires confidence across the armed forces and strikes fear into the hearts of enemies."
 ruler_poor_administrator:0 "Poor Administrator"
 ruler_poor_administrator_desc:0 "A ruler with little aptitude for the mundane business of governance. Paperwork piles up, decisions are delayed, and the bureaucracy groans."
 ruler_poor_commander:0 "Inept Commander"
 ruler_poor_commander_desc:0 "A ruler with no instinct for war. Their strategic judgment is questionable at best, and the officer corps has little confidence in their martial leadership."
 ruler_skilled_administrator:0 "Skilled Administrator"
 ruler_skilled_administrator_desc:0 "A ruler with a fine head for governance who keeps the machinery of state running smoothly. Bureaucrats and administrators work more effectively under their direction."
 ruler_skilled_commander:0 "Skilled Commander"
 ruler_skilled_commander_desc:0 "A ruler with a keen understanding of military strategy and the respect of the officer corps. Troops under their command fight with greater discipline and morale."
 ruler_terrible_administrator:0 "Terrible Administrator"
 ruler_terrible_administrator_desc:0 "An utterly incompetent ruler with no grasp of governance whatsoever. The bureaucracy is in shambles, records are lost, and even basic administration grinds to a halt."
 ruler_terrible_commander:0 "Terrible Commander"
 ruler_terrible_commander_desc:0 "A military leader of breathtaking incompetence. Troops are mismanaged, battles are lost through sheer blundering, and soldiers lose faith in the chain of command."
 satellite_communications:0 "Satellite Communications"
 satellite_communications_desc:0 "Satellites have given us a global communication network. Now we can transmit information instantly across the world, making our planet a much more connected place."
 science_aid:0 "Modernization Aid"
 science_aid_2_desc:0 "Extensive Modernization Aid is a diplomatic action that allows a country to provide scientific assistance to another country, at the cost of [concept_innovation], increasing [concept_technology_spread] in the target country."
 security_aid:0 "Security Aid"
 security_aid_desc:0 "Security Aid is a diplomatic action that allows a country to provide security assistance to another country, at the cost of [concept_bureaucracy], decreasing [concept_turmoil]'s impact in the target country."
 security_dependency_modifier:0 "Security Dependency"
 security_dependency_modifier_desc:0 "Growing reliance on foreign security assistance has eroded sovereign authority."
 security_independence_modifier:0 "Security Self-Reliance"
