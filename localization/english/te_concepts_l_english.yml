 renewable_investment_modifier:0 "Renewable Energy Investment"
 renewable_investment_modifier_desc:0 "State investment in renewable energy that requires subsidies for renewable plants, boosts renewable plant output while reducing conventional power plant throughput, speeds renewable construction, and cuts greenhouse gas emissions by 15%."
