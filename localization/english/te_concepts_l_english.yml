 crimjust_reform_debate_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 crimjust_reform_debate_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 crisis_resolution:0 "Crisis Resolution"
 crisis_resolution_desc:0 "Crisis Resolution is a diplomatic action that allows a country to resolve crises to stabilize bloc members, at the cost of authority."
 crop_failure_ministry_modifier_desc:0 "The environment ministry has coordinated a drought response program, mitigating agricultural losses and maintaining standards of living."
 crop_failure_modifier:0 "Widespread Crop Failures"
 crop_failure_modifier_desc:0 "Climate change has devastated harvests across the nation. Agricultural output is severely reduced and mortality is rising."
 crop_failure_relief_modifier_desc:0 "Emergency food imports and agricultural relief programs are mitigating the worst effects of crop failures, at significant cost."
 cultural_concord:0 "Cultural Concord"
 cultural_cooptation_modifier:0 "Cultural Unity Campaign"
 cultural_cooptation_modifier_desc:0 "The government has co-opted a minority cultural movement into a national unity narrative, boosting prestige at the cost of intellectual authenticity."
 cultural_exchange_program:0 "Cultural Exchange Program"
 cultural_exchange_program_desc:0 "A mutual agreement to promote cultural understanding, boosting cultural acceptance and prestige for both participating nations."
 cultural_flowering_modifier:0 "Cultural Flowering"
 cultural_flowering_modifier_desc:0 "Protected minority communities are producing a cultural renaissance."
 cultural_openness_modifier:0 "Cultural Openness"
 cultural_openness_modifier_desc:0 "The nation embraces cultural exchange, accelerating assimilation and international prestige."
 cultural_protection_modifier:0 "Cultural Protectionism"
 cultural_protection_modifier_desc:0 "Measures to protect local culture from foreign influence strengthen traditional institutions."
 cultural_reclamation_modifier:0 "Cultural Reclamation"
 cultural_reclamation_modifier_desc:0 "The nation is rediscovering its indigenous cultural identity, casting off the legacy of colonial rule and building a sense of national pride."
 cultural_renaissance_modifier:0 "Cultural Renaissance"
 cultural_renaissance_modifier_desc:0 "A state-funded cultural program celebrating diverse heritage has improved cultural acceptance and national prestige."
 cultural_synthesis_modifier:0 "Cultural Synthesis"
 cultural_synthesis_modifier_desc:0 "A creative blending of local and global culture produces something new and prestigious."
 decolonization_negotiations_modifier:0 "Decolonization Negotiations"
 decolonization_negotiations_modifier_desc:0 "The government is engaged in negotiations with colonial subjects over autonomy and self-governance, consuming diplomatic resources."
 demilitarized_zone:0 "Demilitarized Zone"
 demilitarized_zone_desc:0 "An agreement that forbids military buildings in a specific state, preventing barracks and naval base construction and disabling conscription."
 demilitarized_zone_state_modifier_desc:0 "This state has been designated a demilitarized zone under treaty. Military construction and conscription are forbidden."
 democratic_transition_modifier:0 "Democratic Transition"
 democratic_transition_modifier_desc:0 "The nation is undergoing a democratic transition, building legitimate institutions at the cost of short-term efficiency."
 digital_access:0 "Digital Access"
 digital_assets:0 "Software"
 digital_consciousness_commission_modifier_desc:0 "An ethics commission studying the implications of digital consciousness is advancing research while consuming bureaucratic resources."
 digital_property_ruling_modifier_desc:0 "Ruling that digital consciousness constitutes property rather than personhood has unlocked economic efficiencies but sparked philosophical controversy."
 digital_rights_recognition_modifier_desc:0 "Our visionary recognition of digital consciousness rights has cemented our nation's reputation as a leader in technological ethics."
 disband_company:0 "Disband Company"
 disband_company_desc:0 "Obliges a country to dissolve one of its companies as a treaty concession."
 draft_enforcement_modifier:0 "Draft Enforcement"
 draft_enforcement_modifier_desc:0 "Military enforcement of conscription has maintained troop numbers but intensified social turmoil."
 education_aid:0 "Education Aid"
 education_aid_desc:0 "Education Aid is a diplomatic action that allows a country to provide educational assistance to another country, at the cost of [concept_bureaucracy], increasing [concept_education_access] in the target country."
 education_breakthrough_modifier:0 "Education Initiative Success"
 education_breakthrough_modifier_desc:0 "Foreign-funded education programs are producing a new generation of skilled citizens."
 education_technical_focus_modifier_desc:0 "Education aid has been redirected toward practical technical training."
 electfin_donor_scandal_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 electfin_donor_scandal_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 electronic_components:0 "Electronic Components"
 emergency_climate_spending_modifier_desc:0 "The government has diverted emergency funds to climate adaptation, reducing mortality and improving living standards at the cost of bureaucratic capacity."
 emission_standards_modifier:0 "Emission Standards Mandate"
 emission_standards_modifier_desc:0 "Binding industrial emission standards imposed across the market. Compliance adds a small throughput penalty to buildings, substantially reduces local pollution, lowers greenhouse gas emissions by 10%, and reduces national authority. (Market leaders only.)"
 enemy_war_crime_rage_modifier_desc:0 "Enemy atrocities have enraged the nation, reducing war exhaustion and steeling morale."
 enemy_war_crime_tribunal_modifier_desc:0 "The nation has called for an international tribunal to prosecute enemy war crimes, gaining moral authority."
 enforce_emissions_reduction:0 "Enforce Emissions Reduction"
 enforce_emissions_reduction_desc:0 "An agreement forcing a market leader to maintain comprehensive greenhouse gas reduction policies across its market while accepting additional restrictions on fossil fuel expansion."
 enforce_privatization:0 "Enforce Privatization"
 enforce_privatization_desc:0 "An agreement forcing a country to privatize state-owned enterprises, transferring economic control from the government to private interests."
 environmentalist_momentum_modifier:0 "Environmentalist Momentum"
 environmentalist_momentum_modifier_desc:0 "The environmentalist movement is gaining strength, attracting more supporters and making it easier to establish environmental institutions."
 espionage_agent_exposed_modifier_desc:0 "The capture of one of our operatives abroad has compromised our intelligence apparatus."
 espionage_prisoner_exchange_modifier_desc:0 "A quietly negotiated prisoner exchange resolved the espionage crisis pragmatically, though some see it as weakness."
 european_union:0 "European Union"
 extend_influence:0 "Extend Influence"
 extend_influence_desc:0 "Extend Influence is a diplomatic action that allows a country to increase its influence over another country."
 extra_training_modifier:0 "Extra Training"
 extra_training_modifier_desc:0 "Provides additional training-related benefits."
 failed_state_modifier:0 "Failed State"
 failed_state_modifier_desc:0 "Represents the severe breakdown of state capacity and legitimacy."
 faith_compromise_modifier:0 "Theological Compromise"
 faith_compromise_modifier_desc:0 "A delicate compromise between religious tradition and modern values has been brokered."
 faith_modernize_modifier:0 "Modernization Prioritized"
 faith_modernize_modifier_desc:0 "The government has prioritized progressive reforms over religious objections."
 faith_tradition_modifier:0 "Tradition Upheld"
 faith_tradition_modifier_desc:0 "The government has sided with religious tradition over social reform, pleasing the devout but slowing modernization."
 famrep_demographic_debate_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 famrep_demographic_debate_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 financial_cycle_government_fiscal_policy_effect_desc:0 "Represents the effect of current government fiscal policy on the financial cycle."
 financial_cycle_phase_boom_cmd_desc:0 "The planning cycle is booming. State construction programs are operating at high capacity and administrative machinery is running efficiently."
 financial_cycle_phase_boom_coop_desc:0 "The cooperative cycle is booming. Pooled investment funds are abundant and cooperative enterprises are thriving."
 financial_cycle_phase_boom_desc:0 "The financial cycle is currently in a boom phase."
 financial_cycle_phase_downturn_cmd_desc:0 "The planning cycle is in a downturn phase. State construction capacity and administrative efficiency are declining."
 financial_cycle_phase_downturn_coop_desc:0 "The cooperative cycle is in a downturn phase. Pooled investment and cooperative services output are declining."
 financial_cycle_phase_downturn_desc:0 "The financial cycle is currently in a downturn phase."
 financial_cycle_phase_expansion_cmd_desc:0 "The planning cycle is expanding. State construction capacity is growing and bureaucratic coordination is improving."
 financial_cycle_phase_expansion_coop_desc:0 "The cooperative cycle is expanding. Collective investment is growing and cooperative services are flourishing."
 financial_cycle_phase_expansion_desc:0 "The financial cycle is currently in an expansion phase."
 financial_cycle_phase_frenzy_cmd_desc:0 "The planning cycle has reached a frenzy. Ambitious construction targets and bureaucratic overextension risk overheating the planned economy."
 financial_cycle_phase_frenzy_coop_desc:0 "The cooperative cycle has reached a frenzy. Overenthusiastic collective investment and overexpansion risk destabilizing the cooperative economy."
 financial_cycle_phase_frenzy_desc:0 "The financial cycle is currently in a frenzy phase."
 financial_cycle_phase_panic_cmd_desc:0 "The state planning cycle is in a panic phase. Central directives are failing, construction capacity is severely disrupted, and bureaucratic efficiency has collapsed."
 financial_cycle_phase_panic_coop_desc:0 "The cooperative economy is in a panic phase. Collective investment has dried up, services output has collapsed, and manufacturing is severely disrupted."
 financial_cycle_phase_panic_desc:0 "The financial cycle is currently in a panic phase."
 financial_cycle_phase_stagnation_cmd_desc:0 "The planning cycle has entered stagnation. Bureaucratic inertia drags on construction output and administrative performance."
 financial_cycle_phase_stagnation_coop_desc:0 "The cooperative cycle has entered stagnation. Investment pools are shrinking and cooperative services are underperforming."
 financial_cycle_phase_stagnation_desc:0 "The financial cycle is currently in a stagnation phase."
 financial_panic:0 "Financial Panic"
 financial_panic_desc:0 "A sudden and severe economic downturn, often triggered by a loss of confidence in financial institutions."
 finreg_bank_panic_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 finreg_bank_panic_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 finreg_bankers_lobby_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 finreg_bankers_lobby_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 fmc_add_construction_modifier_desc:0 "Applies the effects of this construction-focused modifier."
 fmc_private_public_share_modifier_desc:0 "Applies the effects of this private-public share modifier."
 force_cultural_acceptance:0 "Enforce Cultural Acceptance"
 force_cultural_acceptance_action_notification_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] has forced [TARGET_COUNTRY.GetName] to accept their culture."
 force_cultural_acceptance_desc:0 "Force Cultural Acceptance is a diplomatic action that allows a country to force another country to accept their culture."
 force_cultural_adoption:0 "Enforce Cultural Adoption"
 force_cultural_adoption_action_notification_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] has forced [TARGET_COUNTRY.GetName] to adopt their culture."
 force_cultural_adoption_desc:0 "Force Cultural Adoption is a diplomatic action that allows a country to force another country to adopt their culture."
 forced_disarmament:0 "Forced Disarmament"
 forced_disarmament_desc:0 "An agreement forcing a country to reduce its military capacity through wage cuts and conscription limits across the entire nation."
 foreign_emigration:0 "Foreign Emigration"
 foreign_emigration_desc:0 "Represents outward migration influenced by foreign conditions."
 foreign_emigration_source:0 "Foreign Emigration Source"
 foreign_emigration_source_desc:0 "Marks the source of outward migration pressure."
 foreign_investment_dependency_modifier_desc:0 "The country is relying heavily on foreign investment and aid, bringing quick economic growth but at the cost of some sovereignty."
 foreign_property_protected_modifier_desc:0 "The new government has chosen to protect foreign property rights, maintaining access to international capital at the cost of national prestige and popular frustration."
 foreign_terror_retaliation_modifier_desc:0 "The government has imposed harsh sanctions against a nation linked to terrorism on our soil."
 fossil_fuel_divestment_modifier_desc:0 "Forced withdrawal of capital from coal and oil industries: raises taxes on extraction, reduces coal and oil inputs (lowering production), and imposes a political authority penalty."
 fossil_lobby_concessions_modifier_desc:0 "The government has granted concessions to the fossil fuel industry, boosting coal and oil production but increasing greenhouse gas emissions."
 free_market_construction_modifier_desc:0 "Applies the effects of a free-market construction policy."
 free_port_concession:0 "Free Port Concession"
 free_port_concession_desc:0 "An agreement that opens a coastal state as a free port, eliminating tariffs and dramatically boosting trade capacity at the cost of fiscal sovereignty."
 free_port_state_modifier_desc:0 "This state has been opened as a free port under treaty obligations, dramatically boosting trade at the cost of fiscal sovereignty."
 free_port_tariff_export_modifier_desc:0 "Export tariffs dynamically reduced to zero under free port treaty obligations."
 free_port_tariff_import_modifier_desc:0 "Import tariffs dynamically reduced to zero under free port treaty obligations."
 french_union:0 "French Union"
 fund_resistance:0 "Fund Resistance"
 fund_resistance_action_notification_desc:0 "[INITIATOR_COUNTRY.GetName] is funding resistance movements in [TARGET_COUNTRY.GetName]."
 fund_resistance_desc:0 "Covertly fund resistance movements in a target country to destabilize their government."
 genetics_ethics_debate_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 genetics_ethics_debate_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 germanic_union:0 "Germanic Union"
 global_accord:0 "Global Accord"
 global_technological_development:0 "Global Technological Development"
 global_technological_development_desc:0 "Represents the pace of worldwide technological development."
 global_warming:0 "Climate Warming"
 global_warming_desc:0 "Rising global temperatures are causing increased mortality, reduced agricultural output, more frequent floods and droughts, and rising sea levels. All effects scale linearly with the current temperature anomaly."
 globalization_embrace_modifier:0 "Globalization Embraced"
 globalization_embrace_modifier_desc:0 "The nation has doubled down on free trade, boosting throughput but displacing domestic workers."
 globalization_protect_modifier:0 "Protective Tariffs"
 globalization_protect_modifier_desc:0 "New tariffs shield domestic industry from foreign competition, at the cost of overall efficiency."
 globalization_retrain_modifier:0 "Worker Retraining Programs"
 globalization_retrain_modifier_desc:0 "Government-funded retraining programs help displaced workers transition to new industries."
 gov_corporate_state_autocracy_desc:0 "An authoritarian regime where the state is governed with the direct influence of a powerful corporate elite. The autocrat and corporate leaders work closely, with the autocrat wielding ultimate power while relying on corporations to maintain economic control and enforce social order."
 gov_corporate_state_democracy_desc:0 "In this system, democratic institutions exist, and elections are held, but corporations have significant influence over policy-making and governance. The state prioritizes the interests of major industries and corporations, often blurring the lines between government and business. While citizens can vote, corporate interests heavily shape the available choices and policy outcomes."
 gov_corporate_state_single_party_state_desc:0 "A single-party state where the ruling party and corporate entities are closely intertwined, creating a syndicate-like system of governance. The party controls the state, but corporations are deeply embedded within the government, influencing or even directly participating in policy-making."
 gov_direct_democracy:0 "Direct Democracy"
 gov_direct_democracy_autocracy_desc:0 "A governance system where the autocratic leader or ruling elite retains absolute control but occasionally consults the populace through plebiscites or referendums. These votes are often symbolic, manipulated, or limited in scope, serving to legitimize the autocrat’s rule rather than reflecting genuine democratic engagement."
 gov_direct_democracy_desc:0 "Direct Democracy is a form of government in which citizens vote on policy initiatives directly, rather than through elected representatives."
 gov_direct_democracy_single_party_state_desc:0 "In this system, a single party controls the state, but citizens are allowed to participate directly in decision-making through referendums and public votes. The party guides the democratic processes to ensure that decisions align with its ideological goals, maintaining overall control while providing an appearance of popular participation."
 govprin_popular_assembly_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 govprin_popular_assembly_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 govprin_technocrat_showcase_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 govprin_technocrat_showcase_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 gp_anti_colonial_policy_modifier_desc:0 "This nation has publicly adopted an anti-colonial stance, gaining prestige and influence among decolonizing nations."
 gp_condemns_colonialism_modifier_desc:0 "A great power has publicly condemned our colonial empire, damaging our international prestige and diplomatic influence."
 gp_economic_sanctions_modifier_desc:0 "Economic sanctions imposed on a former colony have strained our international reputation."
 gp_intervention_condemned_modifier_desc:0 "Our military intervention abroad has been condemned by the international community, severely damaging our prestige."
 gp_intervention_target_modifier_desc:0 "A foreign power has intervened militarily in our country, causing widespread disruption."
 gp_military_intervention_modifier_desc:0 "Our military intervention in a former colony has proven costly in treasure and reputation."
 gp_moral_authority_modifier_desc:0 "Our condemnation of foreign military aggression has earned us international respect and moral authority."
 gp_pro_colonial_policy_modifier_desc:0 "This nation has adopted a policy supportive of colonial empires."
 gp_supports_colonialism_modifier_desc:0 "A great power ally has offered support for maintaining our colonial territories, lending diplomatic and material aid."
 grassroots_campaign_modifier:0 "Grassroots Counter-Campaign"
 grassroots_campaign_modifier_desc:0 "A popular grassroots movement has mobilized to counter the influence of wealthy donors."
 green_building_codes_modifier_desc:0 "Government-mandated building codes require energy-efficient materials and designs, reducing energy consumption and emissions from the construction sector."
 green_tech_boom_modifier_desc:0 "A surge of innovation in renewable energy is driving economic growth, boosting technology research, and earning international prestige."
 green_tech_market_modifier_desc:0 "Rather than direct government intervention, we are allowing market forces to drive green technology adoption. Growth is slower but carries no bureaucratic overhead."
 green_tech_stimulus_modifier_desc:0 "Government investment in green technology is stimulating renewable energy production and accelerating environmental institution building."
 healthcare_aid:0 "Healthcare Aid"
 healthcare_aid_desc:0 "Healthcare Aid is a diplomatic action that allows a country to provide healthcare assistance to another country, at the cost of [concept_bureaucracy], decreasing mortality, increasing [concept_sol], and reducing [concept_pollution_impact] in the target country."
 heir_ed_ideology_focus_active_desc:0 "Ideological tutors are guiding the heir's political worldview. This costs authority to maintain."
 heir_ed_ig_focus_active_desc:0 "Factional mentors are shaping the heir's allegiances toward certain interest groups. This costs authority to maintain."
 heir_ed_trait_focus_active_desc:0 "Skilled tutors have been engaged to train the heir in governance, diplomacy, or military affairs. This costs authority to maintain."
 heir_education_grace_period_desc:0 "The heir's education has just begun. Results will not be finalized until this period elapses."
 heir_education_innovation_cost_desc:0 "National intellectual resources are being diverted to educate the heir, temporarily reducing innovation output."
 heir_education_progress_bar_desc:0 "Total educational progress achieved through focused study."
 hellenic_union:0 "Hellenic Union"
 heritage_union:0 "Heritage Union"
 hispanic_union:0 "Hispanic Union"
 human_rights_reform_pledge_modifier_desc:0 "Our pledge to reform human rights practices has improved our diplomatic reputation and the everyday treatment of minority communities."
 humanitarian_aid:0 "Humanitarian Aid"
 humanitarian_aid_action_notification_break_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] has ended their humanitarian aid to [TARGET_COUNTRY.GetName]."
 humanitarian_aid_action_notification_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] has given humanitarian aid to [TARGET_COUNTRY.GetName]."
 humanitarian_aid_desc:0 "Humanitarian Aid is a diplomatic action that allows a country to give money to the poor in another country, increasing influence and relations."
 hydraulic_fracturing:0 "Hydraulic Fracturing"
 hydraulic_fracturing_desc:0 "A controversial but effective way to extract natural gas and oil from underground. It's a boon for the energy industry, but not so much for the environment."
 ig_approval_negative_modifier_desc:0 "This interest group disapproves of the government's recent policy decision."
 ig_approval_positive_modifier_desc:0 "This interest group approves of the government's recent policy decision."
 ig_approval_very_negative_modifier_desc:0 "This interest group is outraged by the government's recent policy decision."
 immigration_integrate_modifier:0 "Integration Programs"
 immigration_integrate_modifier_desc:0 "Government-funded programs help new arrivals learn the language, find work, and assimilate into society."
 immigration_restrict_modifier:0 "Immigration Restricted"
 immigration_restrict_modifier_desc:0 "The government has tightened immigration controls in response to public pressure."
 immigration_welcome_modifier:0 "Open-Arms Immigration"
 immigration_welcome_modifier_desc:0 "The nation has welcomed a wave of immigrants, boosting the labor pool but straining public services."
 independence_nationalization_modifier:0 "Independence Nationalization"
 independence_nationalization_modifier_desc:0 "The newly independent nation has seized all foreign-owned assets, boosting national prestige but disrupting economic output and angering former investors."
 indian_union:0 "Indian Union"
 industrial_nuke_fails_desc:0 "Our nuclear strike fails."
 industrial_nuke_succeeds_desc:0 "Our nuclear strike on [SCOPE.sState('target_state').GetName] is successful."
 inherit_succession_dispute_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 inherit_succession_dispute_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 intelligence_failure_modifier:0 "Intelligence Sharing Failure"
 intelligence_failure_modifier_desc:0 "A critical intelligence failure has exposed weaknesses in our information-sharing agreements."
 intelligence_tip_off_modifier_desc:0 "A successful intelligence tip-off from an ally has bolstered our security apparatus."
 international_charter:0 "International Charter"
 international_criticism_movement_radicalism_desc:0 "International criticism of our human rights record has fueled our the civil rights movement."
 international_criticism_promises:0 "Human Rights Promises"
 international_criticism_promises_desc:0 "In response to international criticism, the government has made promises to improve human rights."
 internet_viral_campaign_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 internet_viral_campaign_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 ip_piracy_debate_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 ip_piracy_debate_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 italian_union:0 "Italian Union"
 japanese_union:0 "Japanese Union"
 join_united_nations:0 "Require UN Membership"
 join_united_nations_desc:0 "Requires the target country to join the United Nations as a condition of this treaty."
 joint_exercises_success_modifier_desc:0 "Combined military exercises have yielded valuable tactical insights."
 joint_military_exercises:0 "Joint Military Exercises"
 joint_military_exercises_desc:0 "Joint Military Exercises are conducted between two countries to improve their military cooperation and readiness."
 langpol_cultural_resistance_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 langpol_cultural_resistance_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 langreform_advisory_panel:0 "Language Advisory Panel"
 langreform_advisory_panel_desc:0 "A panel of scholars publishes authoritative guidelines on language use, carrying moral weight without force of law."
 langreform_constructed:0 "Constructed Language"
 langreform_constructed_desc:0 "The state has adopted an entirely new constructed language designed for logical grammar and universal accessibility, accelerating technological exchange at the cost of traditional cultural bonds."
 langreform_intensive_transition_cost_desc:0 "An ambitious state-funded education campaign is rapidly teaching the reformed language. School costs are sharply higher, but the transition period is considerably shorter."
 langreform_minority_protection:0 "Minority Language Protection"
 langreform_minority_protection_desc:0 "The state language reform includes protections and revival programmes for minority and regional languages, reducing separatist sentiment."
 langreform_national_focus:0 "National Language Priority"
 langreform_national_focus_desc:0 "The state language reform concentrates all resources on promoting the national language, accelerating assimilation but fueling minority resentment."
 langreform_powerful_academy:0 "Language Academy Established"
 langreform_powerful_academy_desc:0 "A powerful state language academy has been established with authority to regulate terminology, grammar, and orthography."
 langreform_revival:0 "Classical Language Revival"
 langreform_revival_desc:0 "The state is reviving a classical or ancestral language as the modern national standard, inspiring cultural pride and religious fervor."
 langreform_revived_arabic:0 "Classical Arabic Revival"
 langreform_revived_arabic_desc:0 "The state has chosen to revive Classical Arabic as the literary and administrative standard, building on its prestige as the language of the Quran, of philosophy, mathematics, and poetry."
 langreform_revived_aramaic:0 "Aramaic Revival"
 langreform_revived_aramaic_desc:0 "The state has chosen to revive Aramaic, the ancient lingua franca of the Near East and the language of the Talmud and early Christianity, as the foundation for a modern national standard."
 langreform_revived_avestan:0 "Avestan Revival"
 langreform_revived_avestan_desc:0 "The state has chosen to revive Avestan, the sacred tongue of the Zoroastrian Gathas, as the foundation for a national language rooted in the deepest antiquity."
 langreform_revived_chinese:0 "Literary Chinese Revival"
 langreform_revived_chinese_desc:0 "The state has chosen to revive Literary Chinese as the national written standard, drawing on the classical tradition shared across centuries of East Asian scholarship, law, and governance."
 langreform_revived_coptic:0 "Coptic Revival"
 langreform_revived_coptic_desc:0 "The state has chosen to revive Coptic, the last descendant of the language of the pharaohs, preserved through centuries of Christian liturgy as the foundation for a modern literary standard."
 langreform_revived_geez:0 "Ge'ez Revival"
 langreform_revived_geez_desc:0 "The state has chosen to revive Ge'ez, the ancient liturgical tongue preserved through centuries of monastic manuscript tradition, as the basis for a modern literary standard."
 langreform_revived_gothic:0 "Gothic Revival"
 langreform_revived_gothic_desc:0 "The state has chosen to revive Gothic, the earliest attested Germanic language, known through Wulfila's fourth-century Bible translation, as the scholarly foundation for a modern standard."
 langreform_revived_greek:0 "Classical Greek Revival"
 langreform_revived_greek_desc:0 "The state has chosen to revive Classical Greek as the national scholarly standard, harnessing the language of philosophy, democracy, and the sciences."
 langreform_revived_hebrew:0 "Hebrew Revival"
 langreform_revived_hebrew_desc:0 "The state has chosen to revive Hebrew as the modern national language, transforming an ancient scriptural tongue into a living vehicle for law, commerce, and science."
 langreform_revived_irish:0 "Classical Irish Revival"
 langreform_revived_irish_desc:0 "The state has chosen to revive Classical Irish as the national literary standard, drawing on the oldest vernacular literature in Western Europe and centuries of Gaelic legal, poetic, and monastic tradition."
 langreform_revived_latin:0 "Latin Revival"
 langreform_revived_latin_desc:0 "The state has chosen to revive Latin as the national scholarly and administrative standard, drawing on centuries of Western legal, diplomatic, and ecclesiastical tradition."
 langreform_revived_mayan:0 "Classic Mayan Revival"
 langreform_revived_mayan_desc:0 "The state has chosen to revive Classic Mayan as the national literary standard, restoring the courtly language of Tikal, Palenque, and Copán and its intricate hieroglyphic script."
 langreform_revived_nahuatl:0 "Classical Nahuatl Revival"
 langreform_revived_nahuatl_desc:0 "The state has chosen to revive Classical Nahuatl, the courtly language of the Aztec Triple Alliance, renowned for its poetry, legal codes, and philosophical discourse."
 langreform_revived_norse:0 "Old Norse Revival"
 langreform_revived_norse_desc:0 "The state has chosen to revive Old Norse as the national standard, drawing on the language of the Eddas, the sagas, and the oldest parliamentary tradition in Europe."
 langreform_revived_pali:0 "Pali Revival"
 langreform_revived_pali_desc:0 "The state has chosen to revive Pali, the canonical language of Theravada Buddhism, as the national scholarly standard - a tongue of elegant simplicity and monastic discipline."
 langreform_revived_prussian:0 "Old Prussian Revival"
 langreform_revived_prussian_desc:0 "The state has chosen to revive Old Prussian, the extinct Baltic tongue prized by linguists for its extraordinary archaism, in an unprecedented act of cultural resurrection."
 langreform_revived_sanskrit:0 "Sanskrit Revival"
 langreform_revived_sanskrit_desc:0 "The state has chosen to revive Sanskrit as the foundation of the national language, harnessing its unmatched grammatical precision and vast philosophical-scientific literature."
 langreform_revived_slavonic:0 "Old Church Slavonic Revival"
 langreform_revived_slavonic_desc:0 "The state has chosen to revive Old Church Slavonic as a pan-Slavic literary standard, drawing on its centuries of use as the sacred language of Orthodox Slavic civilization."
 langreform_simplification:0 "Language Simplification"
 langreform_simplification_desc:0 "The state is standardizing and simplifying the national language, making it more accessible to learners and boosting education."
 langreform_transition_cost:0 "Language Transition Costs"
 langreform_transition_cost_desc:0 "The population is learning the reformed language. Bureaucratic overhead and school costs are elevated during this gradual transition period."
 launch_capacity:0 "Launch Capacity"
 lgbtq_public_petition_advance_desc:0 "A strong positive boost to law enactment progress from a recent event."
 lgbtq_public_petition_cautious_desc:0 "A smaller positive boost to law enactment progress from a recent event."
 machine_learning:0 "Machine Learning"
 machine_learning_desc:0 "We can now build computers that can learn from data. This has led to a host of new technologies and applications, and it's only going to get more powerful."
 malnourishment:0 "Malnourishment"
 malnourishment_desc:0 "Represents widespread inadequate nutrition and its social effects."
 market_downturn:0 "Market Downturn"
 market_downturn_desc:0 "A period of declining economic activity, characterized by falling stock prices and reduced consumer spending."
 migration_crowding:0 "Population Pressure"
 migration_crowding_desc:0 "Densely populated states become less attractive to migrants as living space, infrastructure, and resources become strained. Larger states can support more people before this effect kicks in."
 military_disarmament_anger_modifier_desc:0 "The armed forces are furious about nuclear disarmament obligations."
 military_disarmament_purge_modifier_desc:0 "Dissenters within the military have been purged, weakening command structures."
 military_neural_program_modifier_desc:0 "A classified military neural augmentation program is accelerating military technology research."
 military_strongman_modifier:0 "Military Strongman"
 military_strongman_modifier_desc:0 "A military strongman has seized power, imposing order through force at the expense of civil liberties."
 mind_upload_nexus_progress_desc:0 "Tracks accumulated progress toward completing the Mind Upload Nexus."
