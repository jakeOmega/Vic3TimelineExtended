 banking_directed_credit_infrastructure_desc:0 "Applies the effects of the Directed Credit for Infrastructure banking policy."
 banking_emergency_liquidity_program_desc:0 "Applies the effects of the Emergency Liquidity Program banking policy."
 banking_expand_deposit_guarantee_desc:0 "Applies the effects of the Expand Deposit Guarantee banking policy."
 banking_export_credit_facility_desc:0 "Applies the effects of the Export Credit Facility banking policy."
 banking_fx_devaluation:0 "Currency Devaluation"
 banking_fx_devaluation_desc:0 "Applies the effects of the Currency Devaluation banking policy."
 banking_fx_support:0 "Foreign Exchange Support"
 banking_fx_support_desc:0 "Applies the effects of the Foreign Exchange Support banking policy."
 banking_fx_swap_lines_desc:0 "Applies the effects of the FX Swap Lines banking policy."
 banking_moral_suasion:0 "Moral Suasion"
 banking_moral_suasion_desc:0 "Applies the effects of the Moral Suasion banking policy."
 banking_open_market_ops_desc:0 "Applies the effects of the Open Market Operations banking policy."
 banking_policy_rate_hike_desc:0 "Applies the effects of the Policy Rate Hike banking policy."
 banking_raise_margin_requirements_desc:0 "Speculation on credit has become too common among the middle strata. By requiring higher upfront collateral for loans, we ensure that only stable ventures proceed, protecting the economy."
 bantu_union:0 "Bantu Union"
 bergius_process:0 "Bergius Process"
 bergius_process_desc:0 "By hydrogenating coal at high temperatures and pressures, we can create synthetic fuel. A useful trick to have up our sleeve when oil is scarce."
 bg_resettlement:0 "Resettlement"
 big_money_election_modifier_desc:0 "Wealthy interests dominate the election, boosting business confidence but undermining democratic legitimacy."
 biohacker_legalized_modifier:0 "Licensed Biohacking"
 biohacker_legalized_modifier_desc:0 "Formerly underground biohackers now operate under license, contributing to research while requiring regulatory oversight."
 biohacker_research_modifier:0 "Biohacker Research Program"
 biohacker_research_modifier_desc:0 "Academic researchers studying underground biohacking techniques have made breakthroughs in human augmentation technology."
 border_dispute_active_modifier_desc:0 "A territorial dispute with a neighboring nation over colonial-era borders is causing diplomatic tension."
 border_dispute_resolved_modifier_desc:0 "The resolution of a border dispute has brought stability and improved relations with our neighbors."
 bubble_inertia_extreme:0 "Speculative Euphoria"
 bubble_inertia_extreme_desc:0 "Rampant speculation drives a powerful feedback loop — prices rise because prices are rising."
 bubble_inertia_high:0 "Speculative Feedback"
 bubble_inertia_high_desc:0 "Elevated speculation creates a self-reinforcing cycle of rising prices and investor confidence."
 bubble_inertia_moderate:0 "Speculative Inertia"
 bubble_inertia_moderate_desc:0 "Rising asset prices attract further speculation, maintaining market momentum."
 bull_market:0 "Bull Market"
 bull_market_desc:0 "A period of rising stock prices and investor confidence, often leading to increased economic activity."
 campaign_scandal_ignored_modifier_desc:0 "A campaign finance scandal has been ignored by the ruling party, eroding public trust."
 campaign_scandal_investigation_modifier_desc:0 "An official investigation into campaign finance irregularities is underway."
 campaign_scandal_reform_modifier_desc:0 "Public pressure has created momentum for meaningful campaign finance reform."
 carbon_tax_modifier:0 "Carbon Tax"
 carbon_tax_modifier_desc:0 "A levy on fossil fuel industries that reduces coal and oil output while raising taxes on manufacturing and fossil extraction. Directly reduces the nation's greenhouse gas emissions by 20%."
 ch_adopted_education:0 "Foreign Education Model"
 ch_adopted_education_desc:0 "Adoption of the hegemon's education system is boosting research and education access, but foreign ideology seeps through the curricula."
 ch_art_commercialization:0 "Art Commercialization"
 ch_art_commercialization_desc:0 "Our cultural treasures are generating commercial revenue, though the commodification of art undermines artistic prestige."
 ch_brain_drain_remittances_desc:0 "The exodus of talent weakens our research capacity, though remittances provide some economic benefit."
 ch_cultural_adaptation:0 "Cultural Adaptation"
 ch_cultural_adaptation_desc:0 "Modest investment in domestic cultural institutions provides a small boost to cultural relevance."
 ch_cultural_exchange:0 "Cultural Exchange"
 ch_cultural_exchange_desc:0 "An openness to foreign ideas is stimulating intellectual exchange and accelerating research."
 ch_cultural_investment:0 "Cultural Investment"
 ch_cultural_investment_desc:0 "Investment in cultural institutions is boosting our creative output and research capabilities."
 ch_cultural_renaissance:0 "Cultural Renaissance"
 ch_cultural_renaissance_desc:0 "A flowering of domestic creativity is boosting our cultural influence and research output."
 ch_cultural_renaissance_ig_desc:0 "The intelligentsia thrives during this period of cultural flourishing."
 ch_cultural_resistance_ig_desc:0 "The interest group draws strength from leading the resistance against foreign cultural influence."
 ch_domestic_consolidation:0 "Domestic Consolidation"
 ch_domestic_consolidation_desc:0 "Investment in domestic institutions strengthens the state apparatus, improves bureaucratic efficiency, and boosts education rather than projecting cultural influence abroad."
 ch_domestic_education_defense_desc:0 "A renewed commitment to domestic educational traditions strengthens state authority and cultural identity."
 ch_domestic_university_focus_desc:0 "Exclusive focus on domestic students strengthens our own education system but misses the opportunity to attract foreign talent."
 ch_entertainment_adaptation:0 "Cultural Adaptation"
 ch_entertainment_adaptation_desc:0 "A creative blending of foreign and domestic entertainment traditions is producing something uniquely our own."
 ch_entertainment_embrace:0 "Foreign Entertainment Embrace"
 ch_entertainment_embrace_desc:0 "Foreign entertainment enriches daily life, but traditional cultural authorities view the trend with alarm."
 ch_entertainment_restriction:0 "Entertainment Import Restrictions"
 ch_entertainment_restriction_desc:0 "Restrictions on foreign entertainment protect domestic cultural production and strengthen state authority."
 ch_foreign_ideas_embrace_ig_desc:0 "The interest group draws strength from embracing cosmopolitan foreign influences."
 ch_foreign_ideological_influence_ig_desc:0 "Foreign cultural influence is boosting the political strength and appeal of this interest group."
 ch_foreign_influence_crackdown_desc:0 "A heavy-handed suppression of foreign cultural influence bolsters state authority but damages cultural relevance and legitimacy."
 ch_hegemon_ideological_pressure_desc:0 "The cultural hegemon's political ideology is fueling this movement, attracting supporters and radicalizing existing members."
 ch_hegemon_ideological_pressure_weak_desc:0 "The cultural hegemon's political ideology is lending modest fuel to this movement."
 ch_international_university:0 "International University Programs"
 ch_international_university_desc:0 "International scholarship programs attract the world's brightest minds to our universities, boosting research and migration at significant administrative cost."
 ch_language_academies:0 "Language Academies Abroad"
 ch_language_academies_desc:0 "State-sponsored language academies in foreign capitals formalize our linguistic dominance, extending cultural and diplomatic influence at considerable administrative cost."
 ch_media_dominance:0 "Media Dominance"
 ch_media_dominance_desc:0 "Our media apparatus dominates international discourse, granting exceptional cultural influence and political authority."
 ch_media_freedom:0 "Media Freedom"
 ch_media_freedom_desc:0 "A free and open press attracts immigrants and enhances our legitimacy and cultural prestige."
 ch_media_freedom_ig_desc:0 "The intelligentsia appreciates the commitment to a free press."
 ch_narrative_control:0 "State Narrative Control"
 ch_narrative_control_desc:0 "State censors are controlling the narrative, limiting foreign cultural influence at the cost of some authority and cultural relevance."
 ch_nationalist_rally_ig_desc:0 "The interest group draws strength from a surge of nationalist sentiment against foreign cultural influence."
 ch_natural_lingua_franca_desc:0 "Our language spreads organically through commerce and scholarship, opening new trade routes without the costs of formal promotion."
 ch_selective_education:0 "Selective Education Adoption"
 ch_selective_education_desc:0 "A pragmatic approach to foreign educational practices — adopting what works while preserving domestic traditions."
 ch_soft_power_dividend_desc:0 "Our cultural prestige is paying dividends in international influence and immigration."
 ch_state_propaganda:0 "State Propaganda"
 ch_state_propaganda_desc:0 "Cultural output has been redirected toward state messaging, boosting national prestige and authority."
 ch_state_propaganda_ig_desc:0 "The intelligentsia chafes under the restrictions of state-directed cultural policy."
 ch_talent_retention:0 "Talent Retention Program"
 ch_talent_retention_desc:0 "Funding for universities and research institutions helps retain our brightest minds."
 ch_touring_exhibition:0 "Touring Exhibition"
 ch_touring_exhibition_desc:0 "An internationally touring art exhibition showcases our cultural achievements, boosting prestige and cultural influence at the cost of administrative attention."
 ch_tourism_exploitation:0 "Tourism Exploitation"
 ch_tourism_exploitation_desc:0 "Aggressive monetization of the tourist trade squeezes more revenue from tourism output but damages our international reputation and cultural appeal."
 ch_tourism_infrastructure:0 "Tourism Infrastructure"
 ch_tourism_infrastructure_desc:0 "Investment in tourism infrastructure boosts the tourism industry and enhances cultural appeal, though the bureaucratic overhead is significant."
 cheap_energy_interest:0 "Cheap energy dependence"
 cheaty:0 "Debug Boost"
 cheaty_desc:0 "A powerful temporary modifier used for testing or special scripted effects."
 chinese_union:0 "Chinese Union"
 city_rank_number:0 "[State.MakeScope.ScriptValue('city_size_rank')]"
 civil_disobedience_concessions_modifier_desc:0 "Limited concessions to civil disobedience campaigners have defused immediate tensions."
 civil_disobedience_crackdown_modifier_desc:0 "Mass arrests of civil disobedience participants have restored immediate authority but at great cost to our reputation."
 civil_disobedience_movement_galvanized_desc:0 "The spectacle of peaceful protesters being arrested has galvanized the civil rights movement and attracted international attention."
 civil_rights_government_endorsement_modifier_desc:0 "The government's bold endorsement of the civil rights march has energized political movements and given voice to those demanding change."
 civil_rights_investigation_modifier_desc:0 "A formal investigation into the killing of a civil rights figure has earned some goodwill."
 civil_rights_march_calming_desc:0 "The government's concessions to marchers have calmed the civil rights movement, reducing the urgency of their demands."
 civil_rights_march_momentum_modifier_desc:0 "The peaceful civil rights march has generated positive momentum for reform and raised our nation's profile as a beacon of democracy."
 civil_rights_martyrdom_modifier_desc:0 "The death of a civil rights figure has galvanized the movement and shifted public sympathy toward reform."
 civil_rights_stagnation_modifier_desc:0 "The civil rights question remains unresolved after years of struggle. Our international reputation suffers and social tensions fester."
 civil_rights_struggle_active_modifier_desc:0 "An active civil rights movement is challenging the social order. Tensions run high and political movements attract more radicals."
 civil_rights_suppression_modifier_desc:0 "The suppression of civil rights demonstrators has damaged our reputation and increased social unrest."
 civil_rights_triumph_modifier_desc:0 "Our nation's embrace of civil rights has earned us prestige and goodwill."
 climate_accord_rejection_modifier_desc:0 "By rejecting the international climate accord, our fossil fuel industries operate without the constraints accepted by other nations, boosting coal and oil output at the cost of increased emissions."
 climate_accord_rejection_no_gw_modifier_desc:0 "By rejecting the international climate accord, our fossil fuel industries operate without environmental constraints accepted by other nations, boosting coal and oil output at the cost of increased pollution."
 climate_adaptation_modifier:0 "Climate Adaptation Program"
 climate_adaptation_modifier_desc:0 "Government spending on climate resilience infrastructure - flood defences, heat-resistant crops, cooling centres. Lowers mortality and raises local standards of living, but carries a large political authority cost."
 climate_awareness_modifier:0 "Climate Awareness Initiative"
 climate_awareness_modifier_desc:0 "Scientists and academics have raised awareness of the changing climate. The government is funding preliminary studies into environmental protection, making it easier to establish environmental institutions."
 climate_concern:0 "Climate change concerns"
 climate_crisis_emergency_modifier_desc:0 "A massive emergency response to the climate crisis, diverting enormous resources to protect the population and rapidly build environmental institutions."
 climate_deregulation_modifier:0 "Climate Deregulation"
 climate_deregulation_modifier_desc:0 "With the climate threat receding, we are rolling back environmental regulations. Industry benefits from reduced compliance costs and freed bureaucratic capacity, though emissions are creeping back up."
 climate_deregulation_no_gw_modifier_desc:0 "With the environmental threat receding, we are rolling back regulations. Industry benefits from reduced compliance costs and freed bureaucratic capacity, though pollution is creeping back up."
 climate_dismissal_boost_modifier_desc:0 "By dismissing climate warnings, our industries continue to operate without environmental restrictions. Throughput is higher, but so are greenhouse gas emissions."
 climate_dismissal_boost_no_gw_modifier_desc:0 "By dismissing environmental warnings, our industries continue to operate without restrictions. Throughput is higher, but so is pollution."
 climate_inaction_savings_modifier_desc:0 "Rather than spending on costly climate adaptation, we are redirecting those resources to keep government operations running smoothly. The population suffers, but the treasury is better for it."
 climate_measures_sunset_modifier_desc:0 "With temperatures returning to manageable levels, emergency climate regulations have been dismantled. Industry is thriving without environmental compliance costs, though emissions are rising again."
 climate_measures_sunset_no_gw_modifier_desc:0 "Emergency environmental regulations have been dismantled. Industry is thriving without compliance costs, though pollution is rising again."
 climate_political_turmoil_modifier_desc:0 "The clash between environmental and industrial interests has radicalised political movements across the country."
 climate_refugee_rejection_modifier_desc:0 "The nation has closed its borders to climate refugees, drawing international condemnation but avoiding the strain of mass migration."
 climate_refugee_welcome_modifier_desc:0 "The nation has opened its borders to climate refugees, gaining international prestige but straining local resources."
 climate_summit_leader_modifier_desc:0 "Our nation took the lead at an international climate summit, gaining enormous prestige and demonstrating commitment to reducing emissions."
 climate_summit_leader_no_gw_modifier_desc:0 "Our nation took the lead at an international environmental summit, gaining enormous prestige and demonstrating commitment to reducing pollution."
 climate_summit_pledge_modifier_desc:0 "Our nation signed an international climate accord, pledging to reduce emissions in solidarity with the global community."
 climate_summit_pledge_no_gw_modifier_desc:0 "Our nation signed an international environmental accord, pledging to reduce pollution in solidarity with the global community."
 climate_turmoil_movement_radicalism_desc:0 "Political turmoil over climate change is radicalizing the environmental movement, pushing activists toward more extreme demands."
 climate_victory_dividend_modifier_desc:0 "Having declared victory over climate change, our nation basks in prestige and channels former climate spending into economic growth. Some worry this complacency may prove premature."
 climate_victory_dividend_no_gw_modifier_desc:0 "Having declared victory over environmental challenges, our nation basks in prestige and channels former environmental spending into economic growth. Some worry this complacency may prove premature."
 coastal_flood_defense_modifier_desc:0 "Ministry-coordinated engineering projects have constructed flood barriers and drainage systems, reducing port disruption and improving infrastructure."
 coastal_flooding_modifier:0 "Coastal Flooding"
 coastal_flooding_modifier_desc:0 "Rising sea levels have flooded coastal areas, disrupting ports, fishing, and lowering the standard of living."
 coastal_relocation_modifier:0 "Coastal Population Relocation"
 coastal_relocation_modifier_desc:0 "We are relocating coastal populations inland to escape rising sea levels. The disruption to daily life is severe, but reduced port dependency and new migration patterns may prove beneficial."
 colonial_crackdown_modifier:0 "Colonial Crackdown"
 colonial_crackdown_modifier_desc:0 "The government has deployed security forces to suppress independence movements in our colonial possessions, damaging our international reputation."
 colonial_crumbling_movement_radicalism_desc:0 "The disintegration of our colonial empire has emboldened the civil rights movement, whose demands grow ever more urgent."
 colonial_cultural_assimilation_modifier_desc:0 "A government program is promoting cultural assimilation of colonial populations, accelerating acceptance growth."
 colonial_culture_change:0 "Colonial Culture Change"
 colonial_culture_change_action_notification_desc:0 "[SCOPE.GetRootScope.GetDiplomaticPact.GetSecondCountry.GetName] has changed the culture and religion of [TARGET_COUNTRY.GetName]."
 colonial_culture_change_desc:0 "Colonial Culture Change is a diplomatic action that allows a country to change the culture and religion of a colonial subject."
 colonial_development_investment_modifier_desc:0 "The government is investing in infrastructure and institutions in colonial territories, draining bureaucratic resources."
 colonial_economic_interest:0 "Economic interests in colonial plantations"
 colonial_empire_collapsed_modifier_desc:0 "Our colonial empire has collapsed. The loss of overseas territories has dealt a severe blow to national prestige and living standards."
 colonial_empire_crumbling_modifier_desc:0 "Our colonial empire is crumbling. Widespread unrest and radical movements threaten to tear our overseas territories away."
 colonial_empire_solidified_modifier_desc:0 "Our colonial territories have been fully integrated into the nation. Cultural acceptance is high and the overseas lands are now permanent parts of our country."
 colonial_empire_under_pressure_modifier_desc:0 "Our colonial holdings are under increasing strain. International pressure and local unrest are making maintenance costly."
 colonial_integration_progress_modifier_desc:0 "A colonial territory has reached a milestone in integration, with high cultural acceptance among the local population."
 colonial_military_garrison_modifier_desc:0 "Military forces are stationed in colonial territories to maintain order, reducing our available military projection."
 colonial_overstretch_tt:0 "Imperial overstretch (number of colonial states)"
 colonial_pressure_movement_radicalism_desc:0 "Colonial instability is radicalizing civil rights advocates, who see the empire's weakness as an opportunity for change."
 colonial_reparations_modifier:0 "Colonial Reparations Paid"
 colonial_reparations_modifier_desc:0 "The government is paying reparations to a former colony, acknowledging past wrongs at significant financial cost."
 colonial_resource_interest:0 "Resource extraction interests"
 colonial_resource_loss:0 "Loss of colonial resources"
 colonial_revenue_loss:0 "Loss of colonial revenue"
 colonial_stability_bar_desc:0 "Measures the stability of our colonial holdings. At 100, the empire is fully integrated. At 0, it collapses."
 colonial_trade_interest:0 "Colonial trade interests"
 colonial_unrest_suppressed_modifier_desc:0 "Military force has been used to suppress unrest in a colonial territory, at the cost of our international reputation."
 colonial_war_exhaustion_modifier_desc:0 "A brutal colonial conflict has drained our military resources and sapped the nation's morale."
 compliance_costs:0 "Compliance costs for businesses"
 concept_banking_contagion:0 "Banking Contagion"
 concept_banking_contagion_desc:0 "When a major economy experiences a [concept_banking_crash], the financial shock can spread to other countries through trade links and capital flows. Countries with larger trade exposure to the crash source are more vulnerable to contagion effects."
 concept_banking_crash:0 "Banking Crash"
 concept_banking_crash_desc:0 "A sudden financial collapse triggered when [concept_bubble_pressure] is high. A crash dramatically reduces the financial cycle value, wipes out bubble pressure, and can trigger [concept_banking_contagion] that spreads to other countries with interlinked economies. The probability of a crash depends on bubble pressure and is scaled by the Banking Crash Likelihood modifier from [concept_financial_regulation] laws."
 concept_banking_cycle:0 "Banking Cycle"
 concept_banking_cycle_desc:0 "A financial cycle simulation tracking three key variables: [concept_banking_cycle] value (0–100, representing economic phase from bust to boom), [concept_banking_momentum] (rate and direction of change), and [concept_bubble_pressure]. The cycle drives periodic booms, busts, and crashes that affect the entire economy. Market economies experience this as a traditional financial cycle, while command economies see it as administrative strain and coordination pressure, and cooperative economies track it as overextension of worker commitments. [concept_financial_regulation] laws control volatility and crash risk."
 concept_banking_momentum:0 "Banking Momentum"
 concept_banking_momentum_desc:0 "The rate and direction of change in the [concept_banking_cycle]. Positive momentum pushes the cycle toward expansion, negative momentum toward contraction. Momentum is influenced by random nudges (scaled by banking volatility modifiers), fiscal policy, and mean-reversion forces that pull the cycle back toward equilibrium. In command economies this reflects coordination speed; in cooperative economies, reinvestment pace."
 concept_bubble_pressure:0 "Bubble Pressure"
 concept_bubble_pressure_desc:0 "A measure of speculative excess building up in the financial system (0–100). Bubble pressure accumulates during boom phases when [concept_banking_momentum] is positive and cycle value is high. When bubble pressure is high, the risk of a [concept_banking_crash] increases dramatically. In command economies, this manifests as administrative strain; in cooperative economies, as overextension of commitments. Bubble pressure decays slowly over time and drops sharply after a crash."
 concept_ch_art_production_desc:0 "[concept_cultural_pull] from $fine_art$ goods production. Scored as the minimum of absolute output and global market share percentage — early on you're limited by volume, later by your share of global production. The parenthetical shows (your production / world production). Boosted by the $country_cultural_hegemony_art_mult$ modifier. Part of [concept_cultural_pull_components]."
 concept_ch_infamy:0 "Infamy"
 concept_ch_infamy_desc:0 "[concept_cultural_pull] penalty from high [concept_infamy]. Each point of infamy reduces cultural pull by 0.1 (10 infamy = -1.0, 50 infamy = -5.0). Aggressive wars and treaty violations tarnish your nation's cultural image. Always a negative contribution — reduce infamy to remove this penalty. Part of [concept_cultural_pull_components]."
 concept_ch_instability:0 "Instability"
 concept_ch_instability_desc:0 "[concept_cultural_pull] penalty from domestic turmoil and civil war. Average turmoil (0–100%) is multiplied by -10, so 50% turmoil costs -5.0 points. An active civil war adds an additional -20 penalty. Internal chaos makes your nation a cautionary tale rather than a cultural beacon. Part of [concept_cultural_pull_components]."
 concept_ch_megaprojects:0 "Megaprojects"
 concept_ch_megaprojects_desc:0 "[concept_cultural_pull] from advanced megastructures. Each megaproject contributes +3 points. Qualifying megaprojects include space elevators, solar collectors, orbital battlestations, mind upload nexuses, antimatter facilities, nanofabrication centers, and consciousness networks. Maximum contribution: 21 points (7 megaprojects × 3). Part of [concept_cultural_pull_components]."
 concept_ch_modifier_bonus_desc:0 "$country_cultural_pull_mult$ modifier. Applied after all [concept_cultural_pull_components] are summed. Bonuses from technologies like Mass Media, events, and government policies contribute here. Shown as a percentage increase above base."
 concept_ch_modifiers:0 "Other Modifiers"
 concept_ch_modifiers_desc:0 "[concept_cultural_pull] from the $country_cultural_pull_add$ modifier. This is a catch-all for bonuses granted by technologies, laws, events, diplomatic treaties, and other game mechanics. Check your country's modifier tooltip to see what is contributing. Part of [concept_cultural_pull_components]."
 concept_ch_monuments:0 "Monuments"
 concept_ch_monuments_desc:0 "[concept_cultural_pull] from wonder buildings. Each monument or wonder in your nation contributes +3 points. Monuments are unique buildings that represent iconic landmarks, architectural achievements, and cultural treasures. Build more monuments to increase your cultural influence. Part of [concept_cultural_pull_components]."
 concept_ch_prestige:0 "Prestige"
 concept_ch_prestige_desc:0 "[concept_cultural_pull] from national [concept_prestige]. Uses the same min(absolute, share) formula as [concept_ch_art_production]: your prestige divided by 5, capped at your percentage of world prestige. The parenthetical shows (your prestige / world prestige). High prestige from military victories, diplomatic achievements, and national projects all contribute. Part of [concept_cultural_pull_components]."
 concept_ch_rank_10_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_10').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_10_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_10_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_10_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_10_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_10_raw').GetValue|1]#!"
 concept_ch_rank_1_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_1').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_1_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_1_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_1_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_1_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_1_raw').GetValue|1]#!"
 concept_ch_rank_2_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_2').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_2_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_2_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_2_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_2_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_2_raw').GetValue|1]#!"
 concept_ch_rank_3_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_3').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_3_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_3_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_3_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_3_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_3_raw').GetValue|1]#!"
 concept_ch_rank_4_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_4').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_4_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_4_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_4_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_4_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_4_raw').GetValue|1]#!"
 concept_ch_rank_5_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_5').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_5_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_5_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_5_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_5_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_5_raw').GetValue|1]#!"
 concept_ch_rank_6_breakdown_desc:0 "[concept_cultural_pull_components] for [GetGlobalVariable('ch_rank_6').GetCountry.GetNameNoFormatting]:\n\n  [concept_ch_art_production]: #v [GetGlobalVariable('ch_rank_6_art').GetValue|1]#!\n  [concept_ch_prestige]: #v [GetGlobalVariable('ch_rank_6_prs').GetValue|1]#!\n  [concept_ch_sol]: #v [GetGlobalVariable('ch_rank_6_sol').GetValue|1]#!\n  [concept_ch_tech_leadership]: #v [GetGlobalVariable('ch_rank_6_tech').GetValue|1]#!\n\n  [concept_cultural_pull_raw_score]: #v [GetGlobalVariable('ch_rank_6_raw').GetValue|1]#!"
