l_english:
 utility_mod_sonar_suite: "Sonar Suite"
 utility_mod_sonar_suite_desc: "Active and passive sonar arrays paired with depth-charge mounts. Devastating against submarines, with greatly improved general detection."
 utility_mod_drone_complement: "Drone Complement"
 utility_mod_drone_complement_desc: "An onboard drone hangar and control suite that improves the ship's accuracy and screening capability while extending detection range."
 utility_mod_ballistic_missile_bay: "Ballistic Missile Bay"
 utility_mod_ballistic_missile_bay_desc: "Vertical-launch missile cells turn the ship into a long-range bombardment platform, dramatically increasing its blockade strength and hull damage."
 utility_mod_dew_point_defense: "DEW Point Defense"
 utility_mod_dew_point_defense_desc: "Directed-energy point-defense turrets shoot down incoming missiles and aircraft, sharply reducing the ship's vulnerability and contributing to fleet screening."
 utility_mod_nuclear_propulsion: "Nuclear Propulsion"
 utility_mod_nuclear_propulsion_desc: "A compact nuclear reactor replaces conventional power, granting extreme cruising speed and effectively unlimited operational endurance."
 utility_mod_aegis_air_defense: "Aegis Air Defense"
 utility_mod_aegis_air_defense_desc: "Networked phased-array radars and surface-to-air missile cells provide layered fleet air defense, particularly effective at engaging missile-armed surface combatants before they reach launch range."
 utility_mod_composite_armor_plating: "Composite Armor Plating"
 utility_mod_composite_armor_plating_desc: "Layered ceramic-and-metal-matrix composite armor with reactive elements absorbs and deflects modern anti-ship munitions, reducing both incoming damage and the chance of catastrophic critical hits."
 utility_mod_helicopter_pad: "Helicopter Pad"
 utility_mod_helicopter_pad_desc: "A flight deck and hangar for naval helicopters and tilt-rotor aircraft, expanding the ship's troop transport and amphibious assault capabilities."
 utility_mod_underway_replenishment: "Underway Replenishment"
 utility_mod_underway_replenishment_desc: "Specialized fuel and stores transfer systems allow the ship to be resupplied at sea, dramatically extending operational range and time-on-station."
