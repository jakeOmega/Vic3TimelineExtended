l_english:

#
# SHIP_MODIFICATIONS
#
 ship_mod_arsenal_ship_armor_high: "Heavy Composite Plate"
 ship_mod_arsenal_ship_armor_high_desc: "Maximum-density composite armor over every critical compartment. A missile box built to absorb counter-fire."
 ship_mod_arsenal_ship_armor_light: "Composite Plate"
 ship_mod_arsenal_ship_armor_light_desc: "Standard composite naval plate. Adequate for blue-water operations under air cover."
 ship_mod_arsenal_ship_armor_medium: "Reinforced Composite"
 ship_mod_arsenal_ship_armor_medium_desc: "Multi-layer composite with Kevlar inserts protecting magazines and engineering spaces."
 ship_mod_arsenal_ship_guns_high: "Saturated VLS Cells"
 ship_mod_arsenal_ship_guns_high_desc: "Hull packed with VLS cells from stem to stern. One ship's first salvo can wipe out a small fleet's defensive picture."
 ship_mod_arsenal_ship_guns_light: "Standard VLS Cells"
 ship_mod_arsenal_ship_guns_light_desc: "A single 64-cell vertical launching system. The minimum loadout to count as an arsenal ship."
 ship_mod_arsenal_ship_guns_medium: "Expanded VLS Cells"
 ship_mod_arsenal_ship_guns_medium_desc: "Multiple VLS modules totaling several hundred cells, with mixed anti-ship and land-attack rounds."
 ship_mod_arsenal_ship_propulsion_high: "Heavy Integrated Drive"
 ship_mod_arsenal_ship_propulsion_high_desc: "Full integrated electric propulsion sourced from gas-turbine generators. Powers both propulsion and the future weapons load with margin."
 ship_mod_arsenal_ship_propulsion_light: "Diesel-Gas Turbine"
 ship_mod_arsenal_ship_propulsion_light_desc: "Hybrid plant: diesel for cruise, gas turbine for sprint. Cost-effective and serviceable."
 ship_mod_arsenal_ship_propulsion_medium: "Combined Diesel-Electric"
 ship_mod_arsenal_ship_propulsion_medium_desc: "Integrated electric drive on a diesel-electric power bus. Quieter and more efficient than direct mechanical drive."
 ship_mod_arsenal_ship_range_high: "Strategic Magazines"
 ship_mod_arsenal_ship_range_high_desc: "Maximum magazine capacity plus reload-at-sea fittings. Essentially unlimited firepower while replenishment ships are available."
 ship_mod_arsenal_ship_range_light: "Tactical Magazines"
 ship_mod_arsenal_ship_range_light_desc: "Single-engagement magazine load. Limited to one major naval action before resupply."
 ship_mod_arsenal_ship_range_medium: "Operational Magazines"
 ship_mod_arsenal_ship_range_medium_desc: "Sustained-operations magazine load supports multiple engagements without leaving the theater."
 ship_mod_asw_destroyer_armor_high: "Acoustic-Stealth Hull"
 ship_mod_asw_destroyer_armor_high_desc: "Sound-dampening hull treatment paired with double-layered armor plating. Both harder to find and harder to sink."
 ship_mod_asw_destroyer_armor_light: "Standard Hull Plating"
 ship_mod_asw_destroyer_armor_light_desc: "Modern naval-grade steel hull. The baseline expectation for any postwar destroyer."
 ship_mod_asw_destroyer_armor_medium: "Reinforced Hull Plating"
 ship_mod_asw_destroyer_armor_medium_desc: "Welded composite plate over high-tensile steel. Survives anti-ship missile glancing hits and torpedo near-misses."
 ship_mod_asw_destroyer_guns_high: "Heavy ASW Battery"
 ship_mod_asw_destroyer_guns_high_desc: "Vertical-launch ASROC cells, towed sonar array, and Mk-46 lightweight torpedoes. A nuclear submarine's worst day."
 ship_mod_asw_destroyer_guns_light: "Light ASW Battery"
 ship_mod_asw_destroyer_guns_light_desc: "Standard depth-charge mounts and a 5-inch dual-purpose gun. Sufficient against snorkeling diesel boats."
 ship_mod_asw_destroyer_guns_medium: "Standard ASW Suite"
 ship_mod_asw_destroyer_guns_medium_desc: "Hedgehog and Limbo ahead-throwing weapons paired with homing torpedo tubes. The post-war destroyer standard."
 ship_mod_asw_destroyer_propulsion_high: "Combined Diesel-Electric / Gas Turbine"
 ship_mod_asw_destroyer_propulsion_high_desc: "CODAG plant: diesel-electric for quiet patrol, gas turbine for sprint pursuit. Best of both regimes."
 ship_mod_asw_destroyer_propulsion_light: "Standard Diesel-Electric Drive"
 ship_mod_asw_destroyer_propulsion_light_desc: "Reliable, quiet, fuel-efficient. Ideal for sub-hunting where engine noise gives you away."
 ship_mod_asw_destroyer_propulsion_medium: "Twin-Shaft Gas Turbine"
 ship_mod_asw_destroyer_propulsion_medium_desc: "Aviation-derived gas turbines drive twin shafts. Faster than the diesel-electric option but louder and thirstier."
 ship_mod_asw_destroyer_range_high: "Extended Bluewater Loadout"
 ship_mod_asw_destroyer_range_high_desc: "Sustainment for indefinite forward deployment, with onboard cold storage and replenishment-at-sea fittings."
 ship_mod_asw_destroyer_range_light: "Coastal Patrol Loadout"
 ship_mod_asw_destroyer_range_light_desc: "Provisions for short coastal patrols. Designed to refuel from a tender every few days."
 ship_mod_asw_destroyer_range_medium: "Standard Bluewater Loadout"
 ship_mod_asw_destroyer_range_medium_desc: "Provisioning sufficient for several weeks of bluewater operations away from a tender."
 ship_mod_expeditionary_sea_base_armor_high: "Hardened Mission Hull"
 ship_mod_expeditionary_sea_base_armor_high_desc: "Compartmentalized hardened hull with redundant damage-control trunks. Survives hits a normal auxiliary would not."
 ship_mod_expeditionary_sea_base_armor_light: "Standard Mercantile Hull"
 ship_mod_expeditionary_sea_base_armor_light_desc: "Auxiliary-grade hull. Optimized for cargo capacity, not combat survivability."
 ship_mod_expeditionary_sea_base_armor_medium: "Reinforced Auxiliary Hull"
 ship_mod_expeditionary_sea_base_armor_medium_desc: "Selectively reinforced bulkheads protect critical mission-systems compartments and the helicopter hangar."
 ship_mod_expeditionary_sea_base_guns_high: "Heavy Defensive Battery"
 ship_mod_expeditionary_sea_base_guns_high_desc: "Mixed gun and missile defenses across the superstructure. The ship can hold off light attackers without escorts."
 ship_mod_expeditionary_sea_base_guns_light: "Defensive Battery"
 ship_mod_expeditionary_sea_base_guns_light_desc: "Light point-defense guns and CIWS mounts. Self-defense only."
 ship_mod_expeditionary_sea_base_guns_medium: "Multi-Role Battery"
 ship_mod_expeditionary_sea_base_guns_medium_desc: "Light surface-to-air cells plus reinforced point defense. Capable of escorting itself in low-threat areas."
 ship_mod_expeditionary_sea_base_propulsion_high: "Heavy Cruising Drive"
 ship_mod_expeditionary_sea_base_propulsion_high_desc: "High-power diesel-electric plant. Keeps pace with most amphibious task groups even in heavy seas."
 ship_mod_expeditionary_sea_base_propulsion_light: "Cruising Drive"
 ship_mod_expeditionary_sea_base_propulsion_light_desc: "Economical mercantile drive. Slow but cheap to run."
 ship_mod_expeditionary_sea_base_propulsion_medium: "Sustained Cruising Drive"
 ship_mod_expeditionary_sea_base_propulsion_medium_desc: "Improved diesel powerplant rated for continuous high-load operation. Better suited to keeping up with surface task groups."
 ship_mod_expeditionary_sea_base_range_high: "Theater Logistics"
 ship_mod_expeditionary_sea_base_range_high_desc: "Maximum-capacity logistics suite with onboard fabrication. The sea base becomes a self-sustaining forward operating site."
 ship_mod_expeditionary_sea_base_range_light: "Forward Logistics"
 ship_mod_expeditionary_sea_base_range_light_desc: "Standard sea-base provisioning. Sustains a small expeditionary force for weeks."
 ship_mod_expeditionary_sea_base_range_medium: "Sustained Logistics"
 ship_mod_expeditionary_sea_base_range_medium_desc: "Expanded vehicle and provisioning storage. Enables sustained forward operations for a battalion-sized force."
 ship_mod_guided_missile_ship_armor_high: "Hardened Combatant Hull"
 ship_mod_guided_missile_ship_armor_high_desc: "Compartmentalized double hull with Kevlar splinter shielding throughout. The missile box that takes a punch."
 ship_mod_guided_missile_ship_armor_light: "Standard Naval Hull"
 ship_mod_guided_missile_ship_armor_light_desc: "Conventional steel hull with damage-control compartmentalization. Adequate against shrapnel and small-caliber fire."
 ship_mod_guided_missile_ship_armor_medium: "Reinforced Composite Hull"
 ship_mod_guided_missile_ship_armor_medium_desc: "Composite plating over the magazines and engineering spaces. Cuts the chance of a missile hit going catastrophic."
 ship_mod_guided_missile_ship_guns_high: "Saturated Missile Battery"
 ship_mod_guided_missile_ship_guns_high_desc: "Vertical-launch cells across the foredeck and aft. Throws enough missiles in one salvo to overwhelm any defense."
 ship_mod_guided_missile_ship_guns_light: "Single Missile Battery"
 ship_mod_guided_missile_ship_guns_light_desc: "An eight-cell launcher for early subsonic anti-ship missiles. A coastal escort with stand-off teeth."
 ship_mod_guided_missile_ship_guns_medium: "Twin Missile Battery"
 ship_mod_guided_missile_ship_guns_medium_desc: "Two-bank launcher firing both anti-ship and surface-to-air missiles. Multi-role at the cost of magazine depth."
 ship_mod_guided_missile_ship_propulsion_high: "Combined-Cycle Drive"
 ship_mod_guided_missile_ship_propulsion_high_desc: "CODAG plant for quiet cruise and high-power sprint. The mature destroyer powerplant."
 ship_mod_guided_missile_ship_propulsion_light: "Diesel-Electric Drive"
 ship_mod_guided_missile_ship_propulsion_light_desc: "Quiet and fuel-efficient. Adequate cruise speed but unimpressive sprint."
 ship_mod_guided_missile_ship_propulsion_medium: "Gas Turbine Drive"
 ship_mod_guided_missile_ship_propulsion_medium_desc: "Aero-derivative gas turbines on twin shafts. Sprints with the carriers."
 ship_mod_guided_missile_ship_range_high: "Theater Magazines"
 ship_mod_guided_missile_ship_range_high_desc: "Maximum-load magazine arrangement. The ship can sustain a campaign at sea given any replenishment route."
 ship_mod_guided_missile_ship_range_light: "Standard Magazines"
 ship_mod_guided_missile_ship_range_light_desc: "Routine missile and gun ammunition load — enough for a single high-tempo engagement."
 ship_mod_guided_missile_ship_range_medium: "Extended Magazines"
 ship_mod_guided_missile_ship_range_medium_desc: "Augmented magazine capacity supports multiple engagements without returning to port."
 ship_mod_hypersonic_missile_platform_armor_high: "Plasma Defense Hull"
 ship_mod_hypersonic_missile_platform_armor_high_desc: "Active plasma-window defense disperses incoming directed-energy weapons. Critical against later-era laser threats."
 ship_mod_hypersonic_missile_platform_armor_light: "Stealthed Composite Hull"
 ship_mod_hypersonic_missile_platform_armor_light_desc: "Radar-absorbent composite hull. Reduces detection range and incidental damage."
 ship_mod_hypersonic_missile_platform_armor_medium: "Energetic Reactive Plating"
 ship_mod_hypersonic_missile_platform_armor_medium_desc: "Reactive armor panels detonate outward to disrupt incoming kinetic projectiles. Effective against shaped-charge anti-ship warheads."
 ship_mod_hypersonic_missile_platform_guns_high: "Heavy MaRV Salvo"
 ship_mod_hypersonic_missile_platform_guns_high_desc: "Maneuvering reentry vehicles with terminal-phase course correction. No fixed defense intercepts them reliably."
 ship_mod_hypersonic_missile_platform_guns_light: "Single Hypersonic Salvo"
 ship_mod_hypersonic_missile_platform_guns_light_desc: "A single battery of glide-vehicle hypersonic missiles. Devastating accuracy at theater range."
 ship_mod_hypersonic_missile_platform_guns_medium: "Dual-Mode Salvo Battery"
 ship_mod_hypersonic_missile_platform_guns_medium_desc: "Mixed boost-glide and air-breathing hypersonic missiles. Different defenses, different counters."
 ship_mod_hypersonic_missile_platform_propulsion_high: "Superconducting Magnetic Drive"
 ship_mod_hypersonic_missile_platform_propulsion_high_desc: "Cryogenic superconducting motors with magnetohydrodynamic thrust assist. Silent, efficient, fast."
 ship_mod_hypersonic_missile_platform_propulsion_light: "Combined-Cycle Drive"
 ship_mod_hypersonic_missile_platform_propulsion_light_desc: "Combined gas-and-steam cycle drives twin shafts. The mature surface-combatant powerplant."
 ship_mod_hypersonic_missile_platform_propulsion_medium: "Integrated Electric Propulsion"
 ship_mod_hypersonic_missile_platform_propulsion_medium_desc: "Full IEP with high-density power bus. Powers the propulsion and any future directed-energy fitments."
 ship_mod_hypersonic_missile_platform_range_high: "Global Strike Range"
 ship_mod_hypersonic_missile_platform_range_high_desc: "Maximum-range hypersonic glide vehicles plus extended endurance package. The ship can hold any target on Earth at risk."
 ship_mod_hypersonic_missile_platform_range_light: "Theater Strike Range"
 ship_mod_hypersonic_missile_platform_range_light_desc: "Magazine load configured for theater-scale strike operations."
 ship_mod_hypersonic_missile_platform_range_medium: "Continental Strike Range"
 ship_mod_hypersonic_missile_platform_range_medium_desc: "Extended-range missile complement and supporting magazines. Continental-scale reach from a single position."
 ship_mod_nuclear_submarine_armor_high: "Deep-Diving Pressure Hull"
 ship_mod_nuclear_submarine_armor_high_desc: "Titanium-alloy pressure hull. Operates below the layer where surface escorts cannot detect or attack it."
 ship_mod_nuclear_submarine_armor_light: "Pressure Hull"
 ship_mod_nuclear_submarine_armor_light_desc: "HY-80 high-yield steel pressure hull. Standard for a first-generation nuclear attack submarine."
 ship_mod_nuclear_submarine_armor_medium: "Reinforced Pressure Hull"
 ship_mod_nuclear_submarine_armor_medium_desc: "HY-100 hull with anechoic tile coating. Goes deeper, runs quieter."
 ship_mod_nuclear_submarine_guns_high: "Mk-48 ADCAP Battery"
 ship_mod_nuclear_submarine_guns_high_desc: "Advanced-capability heavyweight torpedoes plus vertical-launch anti-ship missile cells. Few capital ships survive a successful approach."
 ship_mod_nuclear_submarine_guns_light: "Mk-37 Torpedo Battery"
 ship_mod_nuclear_submarine_guns_light_desc: "First-generation electric homing torpedoes in standard 21-inch tubes. Lethal against unsuspecting surface ships."
 ship_mod_nuclear_submarine_guns_medium: "Wire-Guided Torpedo Suite"
 ship_mod_nuclear_submarine_guns_medium_desc: "Wire-guided, swim-out torpedoes paired with the early SUBROC anti-submarine missile. The submarine becomes a long-range stalker."
 ship_mod_nuclear_submarine_propulsion_high: "S8G Natural-Circulation Reactor"
 ship_mod_nuclear_submarine_propulsion_high_desc: "Natural-circulation reactor — no main coolant pumps below patrol speed. The quietest plant ever put to sea."
 ship_mod_nuclear_submarine_propulsion_light: "S5W Reactor Plant"
 ship_mod_nuclear_submarine_propulsion_light_desc: "First-generation pressurized-water naval reactor. The early standard for nuclear-powered submarines."
 ship_mod_nuclear_submarine_propulsion_medium: "S6G Reactor Plant"
 ship_mod_nuclear_submarine_propulsion_medium_desc: "Second-generation reactor with quieter pumped-coolant flow. Faster and harder to track."
 ship_mod_nuclear_submarine_range_high: "Indefinite Patrol Provisioning"
 ship_mod_nuclear_submarine_range_high_desc: "Onboard mass-balance and food-printing systems. Patrol duration is limited only by crew morale."
 ship_mod_nuclear_submarine_range_light: "Patrol Provisioning"
 ship_mod_nuclear_submarine_range_light_desc: "Standard 60-day patrol stores. Adequate for routine cruises within friendly waters."
 ship_mod_nuclear_submarine_range_medium: "Strategic Patrol Provisioning"
 ship_mod_nuclear_submarine_range_medium_desc: "90-day patrol stores with redundant air-revitalization equipment. Suited to deterrent patrols anywhere on Earth."
 ship_mod_nuclear_supercarrier_armor_high: "Reinforced Damage-Control Hull"
 ship_mod_nuclear_supercarrier_armor_high_desc: "Layered armor protection with redundant damage-control trunks throughout. The carrier that fights through hits and keeps launching."
 ship_mod_nuclear_supercarrier_armor_light: "Compartmentalized Hull"
 ship_mod_nuclear_supercarrier_armor_light_desc: "Multi-bulkhead hull design with armored flight deck. Standard for postwar fleet carriers."
 ship_mod_nuclear_supercarrier_armor_medium: "Composite Hull Plating"
 ship_mod_nuclear_supercarrier_armor_medium_desc: "Hardened composite plate over the reactor spaces and aviation magazines. Mitigates the worst-case scenarios."
 ship_mod_nuclear_supercarrier_guns_high: "Fleet Strike Group"
 ship_mod_nuclear_supercarrier_guns_high_desc: "Maximum-strike-density air wing — multi-role fighters, stand-off bombers, refueling tankers. Power projection in air-frame form."
 ship_mod_nuclear_supercarrier_guns_light: "Fleet Air Defense Wing"
 ship_mod_nuclear_supercarrier_guns_light_desc: "An air group composed primarily of interceptors and anti-submarine helicopters. Optimized for fleet defense."
 ship_mod_nuclear_supercarrier_guns_medium: "Composite Carrier Air Wing"
 ship_mod_nuclear_supercarrier_guns_medium_desc: "Mixed wing of strike fighters, electronic-warfare aircraft, and AEW. The post-1960s carrier standard."
 ship_mod_nuclear_supercarrier_propulsion_high: "Heavy Twin-Reactor Plant"
 ship_mod_nuclear_supercarrier_propulsion_high_desc: "Twin A6W reactors with electric-drive integration. Indefinite range, blistering top speed, full damage redundancy."
 ship_mod_nuclear_supercarrier_propulsion_light: "Single-Reactor Plant"
 ship_mod_nuclear_supercarrier_propulsion_light_desc: "A single A4W naval reactor drives all four shafts via reduction gearing. Adequate cruise; modest sprint."
 ship_mod_nuclear_supercarrier_propulsion_medium: "Twin-Reactor Plant"
 ship_mod_nuclear_supercarrier_propulsion_medium_desc: "Twin A4W reactors on independent shaft pairs. Survives a hit to one reactor and keeps moving."
 ship_mod_nuclear_supercarrier_range_high: "Permanent Strike Group"
 ship_mod_nuclear_supercarrier_range_high_desc: "Maximum stores capacity plus replenishment integration. The carrier remains at sea for the entire campaign."
 ship_mod_nuclear_supercarrier_range_light: "Coastal Operations"
 ship_mod_nuclear_supercarrier_range_light_desc: "Storage configured for short forward-deployed cruises. The carrier still needs the home port nearby."
 ship_mod_nuclear_supercarrier_range_medium: "Forward Strike Group"
 ship_mod_nuclear_supercarrier_range_medium_desc: "Provisioning for sustained forward-deployed operations with periodic underway replenishment."
 ship_mod_pulsed_laser_escort_armor_high: "Adaptive Thermal Hull"
 ship_mod_pulsed_laser_escort_armor_high_desc: "Phase-change cooling channels embedded in the armor distribute incident heat. Resists sustained DEW engagements."
 ship_mod_pulsed_laser_escort_armor_light: "Heat-Resistant Hull"
 ship_mod_pulsed_laser_escort_armor_light_desc: "Ceramic-impregnated composite hull. Resists thermal damage from directed-energy fire."
 ship_mod_pulsed_laser_escort_armor_medium: "Reflective Composite Hull"
 ship_mod_pulsed_laser_escort_armor_medium_desc: "Mirrored coatings over the heat-resistant substrate. Bounces a meaningful fraction of incoming laser energy."
 ship_mod_pulsed_laser_escort_guns_high: "Pulsed Laser Array"
 ship_mod_pulsed_laser_escort_guns_high_desc: "Phase-locked turret array delivers focused pulses with sub-millisecond timing. Lethal against capital ships at line of sight."
 ship_mod_pulsed_laser_escort_guns_light: "Single Laser Battery"
 ship_mod_pulsed_laser_escort_guns_light_desc: "One main directed-energy turret with supporting capacitor bank. Effective against soft targets and missiles."
 ship_mod_pulsed_laser_escort_guns_medium: "Multi-Spectrum Laser Suite"
 ship_mod_pulsed_laser_escort_guns_medium_desc: "Multiple wavelength bands in independent turrets. Penetrates a wider range of armor and counter-laser defenses."
 ship_mod_pulsed_laser_escort_propulsion_high: "Sustained High-Power Drive"
 ship_mod_pulsed_laser_escort_propulsion_high_desc: "Triple-redundant turbine generators with cryogenic capacitor banking. Sustains weapon-fire and propulsion simultaneously."
 ship_mod_pulsed_laser_escort_propulsion_light: "Power-Density Drive"
 ship_mod_pulsed_laser_escort_propulsion_light_desc: "Compact gas-turbine plant balanced for the ship's electrical demands."
 ship_mod_pulsed_laser_escort_propulsion_medium: "High-Power Drive"
 ship_mod_pulsed_laser_escort_propulsion_medium_desc: "Augmented turbine generators with heavy-load DC bus. The standard plant for a directed-energy combatant."
 ship_mod_pulsed_laser_escort_range_high: "Sustained Capacitor Bank"
 ship_mod_pulsed_laser_escort_range_high_desc: "Maximum-capacity hybrid capacitor and battery stack with onboard fast-charge generation. Effectively unlimited weapon fire."
 ship_mod_pulsed_laser_escort_range_light: "Capacitor Bank"
 ship_mod_pulsed_laser_escort_range_light_desc: "Standard capacitor stack supports limited high-rate-of-fire engagements."
 ship_mod_pulsed_laser_escort_range_medium: "Heavy Capacitor Bank"
 ship_mod_pulsed_laser_escort_range_medium_desc: "Expanded capacitor and supercapacitor stack. Many sustained engagements before recharge."
 ship_mod_swarm_coordination_vessel_armor_high: "Self-Healing Composite Hull"
 ship_mod_swarm_coordination_vessel_armor_high_desc: "Active polymer composite redistributes itself to seal small breaches. The ship literally repairs minor damage on the fly."
 ship_mod_swarm_coordination_vessel_armor_light: "Networked Hull Sensors"
 ship_mod_swarm_coordination_vessel_armor_light_desc: "Distributed strain and damage sensors. Damage-control teams have real-time hull awareness."
 ship_mod_swarm_coordination_vessel_armor_medium: "Distributed Damage Control"
 ship_mod_swarm_coordination_vessel_armor_medium_desc: "Automated damage-control nodes seal compartments and route firefighting resources without crew intervention."
 ship_mod_swarm_coordination_vessel_guns_high: "Saturated Drone Swarm"
 ship_mod_swarm_coordination_vessel_guns_high_desc: "Maximum hangar capacity with on-board drone fabrication. The vessel projects a self-replicating, distributed combat presence."
 ship_mod_swarm_coordination_vessel_guns_light: "Drone Hangar"
 ship_mod_swarm_coordination_vessel_guns_light_desc: "Compact internal drone bay launches and recovers a modest drone swarm continuously."
 ship_mod_swarm_coordination_vessel_guns_medium: "Expanded Drone Hangar"
 ship_mod_swarm_coordination_vessel_guns_medium_desc: "Multi-deck drone bay with simultaneous launch and recovery from flight, surface, and submerged drone classes."
 ship_mod_swarm_coordination_vessel_propulsion_high: "Distributed Power Mesh"
 ship_mod_swarm_coordination_vessel_propulsion_high_desc: "Mesh-topology power network with autonomous reconfiguration. No part of the ship loses power unless the entire ship does."
 ship_mod_swarm_coordination_vessel_propulsion_light: "Networked Power Plant"
 ship_mod_swarm_coordination_vessel_propulsion_light_desc: "Distributed gas-turbine generators on a redundant power network. Survives single-point failures."
 ship_mod_swarm_coordination_vessel_propulsion_medium: "Integrated Power Network"
 ship_mod_swarm_coordination_vessel_propulsion_medium_desc: "Fully integrated electric propulsion with priority-rerouting bus. Power flows where it's needed in milliseconds."
 ship_mod_swarm_coordination_vessel_range_high: "Drone Strategic Base"
 ship_mod_swarm_coordination_vessel_range_high_desc: "Onboard drone fabrication, repair, and stockpiling. The vessel's drone swarm is regenerated faster than it is attrited."
 ship_mod_swarm_coordination_vessel_range_light: "Drone Refit Bay"
 ship_mod_swarm_coordination_vessel_range_light_desc: "Onboard drone rearming and minor refit capability. Sustains drone operations for limited engagements."
 ship_mod_swarm_coordination_vessel_range_medium: "Drone Forward Base"
 ship_mod_swarm_coordination_vessel_range_medium_desc: "Full drone refit, rearming, and field repair facilities. Sustains a drone air group through extended operations."
 utility_mod_aegis_air_defense: "Aegis Air Defense"
 utility_mod_aegis_air_defense_desc: "Networked phased-array radars and surface-to-air missile cells provide layered fleet air defense, particularly effective at engaging missile-armed surface combatants before they reach launch range."
 utility_mod_ballistic_missile_bay: "Ballistic Missile Bay"
 utility_mod_ballistic_missile_bay_desc: "Vertical-launch missile cells turn the ship into a long-range bombardment platform, dramatically increasing its blockade strength and hull damage."
 utility_mod_composite_armor_plating: "Composite Armor Plating"
 utility_mod_composite_armor_plating_desc: "Layered ceramic-and-metal-matrix composite armor with reactive elements absorbs and deflects modern anti-ship munitions, reducing both incoming damage and the chance of catastrophic critical hits."
 utility_mod_dew_point_defense: "DEW Point Defense"
 utility_mod_dew_point_defense_desc: "Directed-energy point-defense turrets shoot down incoming missiles and aircraft, sharply reducing the ship's vulnerability and contributing to fleet screening."
 utility_mod_drone_complement: "Drone Complement"
 utility_mod_drone_complement_desc: "An onboard drone hangar and control suite that improves the ship's accuracy and screening capability while extending detection range."
 utility_mod_helicopter_pad: "Helicopter Pad"
 utility_mod_helicopter_pad_desc: "A flight deck and hangar for naval helicopters and tilt-rotor aircraft, expanding the ship's troop transport and amphibious assault capabilities."
 utility_mod_sonar_suite: "Sonar Suite"
 utility_mod_sonar_suite_desc: "Active and passive sonar arrays paired with depth-charge mounts. Devastating against submarines, with greatly improved general detection."
 utility_mod_underway_replenishment: "Underway Replenishment"
 utility_mod_underway_replenishment_desc: "Specialized fuel and stores transfer systems allow the ship to be resupplied at sea, dramatically extending operational range and time-on-station."
