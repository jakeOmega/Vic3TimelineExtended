l_english:
 WW_APPEASE_BUTTON:0 "Pursue Appeasement"
 WW_APPEASE_BUTTON_DESC:0 "Seek to accommodate the demands of rival powers through diplomatic concessions, hoping to avoid war. Improves diplomatic reputation but weakens military readiness. Only available for democratic nations."
 WW_APPEASE_POSSIBLE_TT:0 "Must be a democratic nation with ideological tensions above 20%."
 WW_JOIN_WAR_BUTTON:0 "Enter the War"
 WW_JOIN_WAR_BUTTON_DESC:0 "Commit our nation to the ongoing world war against the aggressor powers. Our fresh forces will have a temporary combat advantage, but we will bear the full costs of total war."
 WW_JOIN_WAR_POSSIBLE_TT:0 "A world war must be active, we must not already be at war, and we must not have recently attempted to join."
 WW_LEND_LEASE_BUTTON:0 "Provide Lend-Lease"
 WW_LEND_LEASE_BUTTON_DESC:0 "Supply military equipment and resources to nations fighting on the side we favor, without committing our own troops to combat. Boosts prestige and influence at the cost of increased military goods spending."
 WW_LEND_LEASE_POSSIBLE_TT:0 "Must be at least a major power with ideological tensions above 40%, or during an active world war."
 WW_PROPAGANDA_POSSIBLE_TT:0 "Must have researched Mass Media and be actively at war during the world war."
 WW_REARM_BUTTON:0 "Begin Rearmament"
 WW_REARM_BUTTON_DESC:0 "Initiate a major military buildup in response to rising ideological tensions. Increases military effectiveness and prestige but raises costs and generates unrest among workers."
 WW_REARM_POSSIBLE_TT:0 "Must have researched Combined Arms with ideological tensions above 30%."
 WW_STOP_APPEASE_BUTTON:0 "End Appeasement"
 WW_STOP_APPEASE_BUTTON_DESC:0 "Abandon the policy of diplomatic accommodation. Appeasement has failed."
 WW_STOP_LEND_LEASE_BUTTON:0 "End Lend-Lease"
 WW_STOP_LEND_LEASE_BUTTON_DESC:0 "Cease supplying military equipment to foreign belligerents."
 WW_STOP_REARM_BUTTON:0 "Halt Rearmament"
 WW_STOP_REARM_BUTTON_DESC:0 "Scale back military buildup, reducing costs but weakening deterrence."
 WW_STOP_TOTAL_WAR_ECONOMY_BUTTON:0 "Demobilize Economy"
 WW_STOP_TOTAL_WAR_ECONOMY_BUTTON_DESC:0 "Return the economy to peacetime production. Removes the total war economy bonuses and penalties."
 WW_STOP_WAR_PROPAGANDA_BUTTON:0 "End War Propaganda"
 WW_STOP_WAR_PROPAGANDA_BUTTON_DESC:0 "Cease the government propaganda campaign."
 WW_STOP_WARTIME_RATIONING_BUTTON:0 "End Rationing"
 WW_STOP_WARTIME_RATIONING_BUTTON_DESC:0 "End wartime rationing and restore civilian consumption levels."
 WW_TOTAL_WAR_ECONOMY_BUTTON:0 "Total War Economy"
 WW_TOTAL_WAR_ECONOMY_BUTTON_DESC:0 "Redirect the entire national economy toward the war effort. Massive military bonuses and conscription boost, but severely damages civilian standard of living and increases construction costs."
 WW_TOTAL_WAR_POSSIBLE_TT:0 "Must have researched Combined Arms and be actively at war during the world war."
 WW_WAR_PROPAGANDA_BUTTON:0 "Launch War Propaganda"
 WW_WAR_PROPAGANDA_BUTTON_DESC:0 "Mobilize the press and media for the war effort. Boosts morale and authority but generates disapproval from intellectuals."
 WW_WARTIME_RATIONING_BUTTON:0 "Impose Rationing"
 WW_WARTIME_RATIONING_BUTTON_DESC:0 "Institute strict wartime rationing to ensure military supply. Hurts standard of living but keeps agriculture functional."
 je_world_war:0 "The Gathering Storm"
 je_world_war_reason:0 "Ideological tensions between the great powers are escalating. Democratic, fascist, and communist blocs eye one another with growing hostility. The world teeters on the brink of a conflict unlike any before."
 je_world_war_ideology_authoritarian:0 "#bold Our Ideology:#! Authoritarian"
 je_world_war_ideology_communist:0 "#bold Our Ideology:#! #R Communist#!"
 je_world_war_ideology_democratic:0 "#bold Our Ideology:#! #G Democratic#!"
 je_world_war_ideology_fascist:0 "#bold Our Ideology:#! #R Fascist#!"
 je_world_war_ideology_nonaligned:0 "#bold Our Ideology:#! Non-Aligned"
 je_world_war_status_active_war:0 "#bold THE WORLD IS AT WAR.#! Our forces are engaged in total combat against the enemy bloc. Every factory, every citizen, every resource is committed to victory."
 je_world_war_status_crisis:0 "#R CRISIS:#! War is imminent. The great powers have drawn their lines. Any incident could ignite the powder keg."
 je_world_war_status_high_tension:0 "#Y HIGH TENSION:#! The ideological divide deepens. Military buildups accelerate. Diplomatic channels are strained to breaking point."
 je_world_war_status_rising_tension:0 "Tensions are rising between the ideological blocs. Arms races have begun, and border incidents grow more frequent."
 je_world_war_status_simmering:0 "The great powers watch each other warily. Ideological differences simmer beneath the surface of diplomacy."
 je_world_war_status_total_war:0 "#bold TOTAL WAR.#! #R The conflict has raged for years. Cities lie in ruins. Entire generations are being consumed by the furnace of war.#!"
 je_world_war_status_war_declared:0 "#bold WAR HAS BEEN DECLARED.#! The ideological blocs have taken up arms. The world holds its breath."
 world_war_events.1.t:0 "Ideological Confrontation"
 world_war_events.1.d:0 "[SCOPE.sCountry('ideological_rival').GetName] has issued a series of provocative demands, challenging our ideological stance on the world stage. Their aggressive posture threatens to destabilize the fragile peace between the great powers."
 world_war_events.1.f:0 "The airwaves crackle with hostile rhetoric as two visions of civilization stare each other down."
 world_war_events.1.a:0 "We will not yield an inch."
 world_war_events.1.b:0 "Open negotiations."
 world_war_events.1.c:0 "Issue a counter-ultimatum."
 world_war_events.2.t:0 "Border Incident"
 world_war_events.2.d:0 "A violent skirmish has erupted along the frontier with [SCOPE.sCountry('border_rival').GetName]. Shots were fired and casualties reported. Both sides blame the other. The incident threatens to spiral into something far larger."
 world_war_events.2.f:0 "In the tense silence after the gunfire, diplomats scramble to contain the damage."
 world_war_events.2.a:0 "Demand a formal apology."
 world_war_events.2.b:0 "Downplay the incident."
 world_war_events.2.c:0 "Mobilize troops to the border."
 world_war_events.3.t:0 "Diplomatic Crisis"
 world_war_events.3.d:0 "[SCOPE.sCountry('crisis_aggressor').GetName] is pressuring smaller nations in our sphere of influence, demanding territorial concessions and political subservience. If we do not act, the balance of power may shift irrevocably."
 world_war_events.3.f:0 "The map of the world is being redrawn at gunpoint. The question is whether we will stand by and watch."
 world_war_events.3.a:0 "Guarantee their sovereignty."
 world_war_events.3.b:0 "This is not our fight."
 world_war_events.3.c:0 "Form a defensive alliance."
 world_war_events.5.t:0 "The World at War"
 world_war_events.5.d:0 "The tensions that have been building for years have finally exploded into open conflict. The great powers have chosen their sides. There is no turning back now â€” the world is engulfed in the most devastating war in human history."
 world_war_events.5.f:0 "The cannons speak where diplomats have fallen silent."
 world_war_events.5.a:0 "To arms! For our nation and our cause!"
 world_war_events.10.t:0 "Home Front Rally"
 world_war_events.10.d:0 "A surge of patriotic fervor sweeps the nation. Citizens line the streets waving flags, factories run double shifts, and volunteers flood recruitment offices. The will to fight has never been stronger."
 world_war_events.10.f:0 "In times of total war, the home front is as important as the battlefield."
 world_war_events.10.a:0 "Sell war bonds!"
 world_war_events.10.b:0 "Use this moment for conscription."
 world_war_events.11.t:0 "Strategic Bombing"
 world_war_events.11.d:0 "Enemy bombers have struck our cities, leaving devastation in their wake. Fires burn through the night as rescue crews dig through the rubble. The civilian toll mounts, but so does our resolve."
 world_war_events.11.f:0 "The drone of engines overhead has become the soundtrack of this war."
 world_war_events.11.a:0 "Strengthen air defenses."
 world_war_events.11.b:0 "Retaliate in kind."
 world_war_events.11.c:0 "Focus on the ground war."
 world_war_events.12.t:0 "Resistance Movement"
 world_war_events.12.d:0 "In the occupied territories, a resistance movement has taken root. Brave men and women sabotage enemy supply lines, shelter fugitives, and maintain a flicker of hope in the darkness of occupation."
 world_war_events.12.f:0 "From the shadows, they fight on."
 world_war_events.12.a:0 "Support the resistance."
 world_war_events.12.b:0 "Order a crackdown."
 world_war_events.20.t:0 "The Hour of Decision"
 world_war_events.20.d:0 "The world war rages on, and we have remained on the sidelines. But the balance of power is shifting, and neutrality grows ever more untenable. [SCOPE.sCountry('ww_main_aggressor').GetName] grows stronger with each passing month. If we do not act soon, the window of opportunity may close forever."
 world_war_events.20.f:0 "History does not wait for the indecisive."
 world_war_events.20.a:0 "Enter the war against the aggressors."
 world_war_events.20.b:0 "Provide material support only."
 world_war_events.20.c:0 "Maintain our neutrality."
 world_war_events.30.t:0 "War Weariness"
 world_war_events.30.d:0 "The war has dragged on far longer than anyone expected. Casualty lists grow longer by the day, food is scarce, and the civilian population is exhausted. Voices demanding peace grow louder â€” but our enemies show no sign of surrender."
 world_war_events.30.f:0 "How much more can a nation endure?"
 world_war_events.30.a:0 "We must push through to victory."
 world_war_events.30.b:0 "Explore diplomatic channels."
 world_war_events.100.t:0 "The Peace Conference"
 world_war_events.100.d:0 "The guns have fallen silent at last. The victorious powers gather to redraw the map of the world and shape the post-war order. The decisions made here will echo for generations."
 world_war_events.100.f:0 "From the ashes of the old world, a new one must be built."
 world_war_events.100.a:0 "Impose a harsh peace."
 world_war_events.100.b:0 "Seek a just and lasting peace."
 world_war_events.100.c:0 "Establish a new world order."
 world_war_events.101.t:0 "Regime Change"
 world_war_events.101.d:0 "The victorious powers have demanded a complete transformation of our government. Our former ideology â€” the one we fought and bled for â€” is to be dismantled. A new political order will be imposed upon us."
 world_war_events.101.f:0 "The victors write history, and now they write our constitution."
 world_war_events.101.a:0 "Accept the new order."
 world_war_events.101.b:0 "Resist the occupation."
 world_war_events.102.t:0 "Reconstruction Aid"
 world_war_events.102.d:0 "The victorious powers have offered substantial aid to rebuild our shattered nation. Their generosity comes with strings attached â€” closer economic ties, political alignment, and a permanent military presence. But the alternative is years of poverty and isolation."
 world_war_events.102.f:0 "Pride is a luxury the defeated cannot always afford."
 world_war_events.102.a:0 "Accept the aid."
 world_war_events.102.b:0 "We will rebuild alone."
 world_war_events.103.t:0 "War Crimes Tribunal"
 world_war_events.103.d:0 "As the fog of war lifts, horrifying revelations emerge about atrocities committed during the conflict. Mass graves, forced labor, systematic brutality â€” the scale of the crimes shocks the world. The question is: what do we do about it?"
 world_war_events.103.f:0 "Justice delayed is justice denied â€” but justice selective is justice perverted."
 world_war_events.103.a:0 "Prosecute the war criminals."
 world_war_events.103.b:0 "Focus on healing, not vengeance."
 world_war_events.103.c:0 "Bury the evidence."
 world_war_events.104.t:0 "The Post-War Order"
 world_war_events.104.d:0 "With the great conflict behind us, the victorious powers must decide what kind of world they wish to build. Spheres of influence, new alliances, and international institutions are all on the table."
 world_war_events.104.f:0 "The peace is won. Now comes the harder task: keeping it."
 world_war_events.104.a:0 "Establish our sphere of influence."
 world_war_events.104.b:0 "Champion self-determination."
 world_war_events.104.c:0 "Focus on domestic recovery."
 world_war_events.105.t:0 "The New Rivalry"
 world_war_events.105.d:0 "The war is over, but already the seeds of the next conflict are being sown. [SCOPE.sCountry('new_rival_power').GetName] â€” once our ally of convenience â€” now stands as the greatest rival to our vision of the world. Two superpowers, two ideologies, one world."
 world_war_events.105.f:0 "The more things change, the more they stay the same."
 world_war_events.105.a:0 "Prepare for the long struggle."
 world_war_events.105.b:0 "Seek peaceful coexistence."
 ww_appeasement_modifier:0 "Policy of Appeasement"
 ww_appeasement_modifier_desc:0 "We are pursuing diplomatic accommodation with hostile powers, hoping to preserve peace through concessions."
 ww_arsenal_of_democracy_modifier:0 "Arsenal of Democracy"
 ww_arsenal_of_democracy_modifier_desc:0 "As a late-entering democratic power, our industrial might fuels the war effort of the entire alliance."
 ww_defeated_modifier:0 "Defeated Power"
 ww_defeated_modifier_desc:0 "Our nation lies defeated in the great war. Our military is broken, our prestige shattered."
 ww_devastation_modifier:0 "War Devastation"
 ww_devastation_modifier_desc:0 "This state has been ravaged by the world war. Infrastructure lies in ruins and the population suffers."
 ww_fresh_forces_modifier:0 "Fresh Forces"
 ww_fresh_forces_modifier_desc:0 "Our troops enter the war rested and well-supplied, giving us a significant temporary advantage over the exhausted belligerents."
 ww_home_front_strain_modifier:0 "Home Front Strain"
 ww_home_front_strain_modifier_desc:0 "The prolonged war is taking a terrible toll on the civilian population. Unrest grows."
 ww_late_entry_cooldown:0 "Recent Intervention Decision"
 ww_late_entry_cooldown_desc:0 "We have recently made a decision regarding intervention in the world war."
 ww_lend_lease_modifier:0 "Lend-Lease Program"
 ww_lend_lease_modifier_desc:0 "We are supplying military equipment and resources to allied belligerents without committing our own forces."
 ww_liberation_hero_modifier:0 "Liberation Hero"
 ww_liberation_hero_modifier_desc:0 "Our nation is celebrated as a champion of freedom and justice in the aftermath of the great war."
 ww_occupation_duties_modifier:0 "Occupation Duties"
 ww_occupation_duties_modifier_desc:0 "Maintaining order in occupied territories demands significant military resources and administrative effort."
 ww_prolonged_war_exhaustion_modifier:0 "Prolonged War Exhaustion"
 ww_prolonged_war_exhaustion_modifier_desc:0 "Years of total war have pushed our nation to the breaking point. Casualties mount, the economy groans, and revolution threatens."
 ww_rearmament_modifier:0 "Rearmament Program"
 ww_rearmament_modifier_desc:0 "A major military buildup is underway in response to the ideological threat posed by rival great powers."
 ww_reconstruction_modifier:0 "Post-War Reconstruction"
 ww_reconstruction_modifier_desc:0 "A massive reconstruction effort is underway, rebuilding what was destroyed in the great war."
 ww_regime_change_modifier:0 "Imposed Regime Change"
 ww_regime_change_modifier_desc:0 "The victorious powers have imposed a new political system. The transition is turbulent."
 ww_rising_tensions_modifier:0 "Rising Global Tensions"
 ww_rising_tensions_modifier_desc:0 "Ideological rivalries between the great powers are intensifying. Arms races and diplomatic crises are becoming more frequent."
 ww_total_war_economy_modifier:0 "Total War Economy"
 ww_total_war_economy_modifier_desc:0 "The entire national economy has been redirected toward the war effort. Military production soars, but civilian life suffers enormously."
 ww_victors_peace_modifier:0 "Victor's Peace"
 ww_victors_peace_modifier_desc:0 "We have emerged victorious from the greatest conflict in human history. Our prestige and influence are at their zenith."
 ww_war_crimes_exposed_modifier:0 "War Crimes Exposed"
 ww_war_crimes_exposed_modifier_desc:0 "Evidence of terrible atrocities committed during the war has come to light, damaging our international reputation."
 ww_war_propaganda_modifier:0 "War Propaganda Campaign"
 ww_war_propaganda_modifier_desc:0 "The government has mobilized the press and media to maintain public support for the war effort."
 ww_wartime_rationing_modifier:0 "Wartime Rationing"
 ww_wartime_rationing_modifier_desc:0 "Strict rationing has been imposed to ensure the military has the supplies it needs. Civilian consumption suffers."
