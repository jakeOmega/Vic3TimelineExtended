# Duplicate-image allowlist for /duplicate-images.
# See docs/guides/python_tools.md.
#
# Each entry covers a cluster of entities that all share visually-identical
# art. Two cluster shapes:
#
#   image:  gfx/foo.dds          # singular: all entities use the SAME path
#   entities: [a, b]
#
#   images:                       # plural: entities use DIFFERENT paths
#     - gfx/x.dds                 # whose .dds files have IDENTICAL bytes
#     - gfx/y.dds                 # (i.e. duplicate art under different names)
#   entities: [a, b]
#
# Adding a new entity to a cluster (or a new file with the same content) re-flags
# it until this file is updated, which forces a fresh review. Replace the
# placeholder reason with a real one once you've confirmed the share is
# intentional. To re-flag a cluster as a real bug to fix with new art, simply
# delete the entry.

