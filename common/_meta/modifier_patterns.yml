# Modifier pattern catalog — guaranteed-tracked dynamic modifier templates.
#
# Each entry maps a modifier-name pattern (with one `{placeholder}` token) to
# the placeholder name and the vocabulary that supplies valid values. The
# mod state server consumes this on startup and on `POST /reload` to:
#   1. classify engine-doc modifier names into pattern families,
#   2. group modifiers in the rendered modifier reference,
#   3. validate mod-defined modifier names that match a pattern but use a
#      placeholder value not in the vocabulary (likely typos).
#
# An auto-discovery pass extends this set with patterns the server infers
# from the engine docs that aren't listed here. Promote desirable
# discoveries into this file by hand.
#
# Schema:
#   pattern:     full modifier name with `{placeholder}` substituted in.
#   placeholder: human-readable token name appearing in `pattern`.
#   vocab:       VOCABULARY_TYPES key (good, building, bg, ig, poptype, …).
#   scope:       free-form mask hint, used for sectioning the rendered MD.
#   family:      free-form group name (production_output, throughput, …).
#   notes:       optional one-liner shown in modifier_patterns.md.

patterns:

  # --- Goods (per-good output / input) ---
  - pattern: "goods_output_{good}_add"
    placeholder: good
    vocab: good
    scope: goods
    family: production_output
    notes: "Flat additive to the output of a specific good across the economy."

  - pattern: "goods_output_{good}_mult"
    placeholder: good
    vocab: good
    scope: goods
    family: production_output
    notes: "Multiplicative bonus to a specific good's output."

  - pattern: "goods_input_{good}_add"
    placeholder: good
    vocab: good
    scope: goods
    family: production_input
    notes: "Extra flat input consumption of a specific good."

  - pattern: "goods_input_{good}_mult"
    placeholder: good
    vocab: good
    scope: goods
    family: production_input

  - pattern: "goods_sales_tax_{good}_add"
    placeholder: good
    vocab: good
    scope: goods
    family: tax

